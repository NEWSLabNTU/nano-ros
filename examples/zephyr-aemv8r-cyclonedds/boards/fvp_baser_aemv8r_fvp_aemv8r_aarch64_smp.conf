# FVP-board override layered on top of `prj.conf`. Mirrors
# `packages/boards/nros-board-fvp-aemv8r-smp/boards/fvp_baser_aemv8r_fvp_aemv8r_aarch64_smp.conf`
# so the example builds standalone (per CLAUDE.md examples
# convention — no walk-up paths).

CONFIG_SMP=y
CONFIG_MP_MAX_NUM_CPUS=4

CONFIG_ETH_DRIVER=y

# Heap budget — leave room for app message buffers atop the DDS
# participant + per-topic descriptors.
CONFIG_HEAP_MEM_POOL_SIZE=196608

# RNG — FVP has no entropy peripheral. Test PRNG is the only
# `sys_rand_get` backend.
CONFIG_TEST_RANDOM_GENERATOR=y
