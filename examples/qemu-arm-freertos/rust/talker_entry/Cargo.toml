[workspace]

[package]
name = "freertos_rs_talker_entry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-2 — FreeRTOS MPS2-AN385 Entry pkg for the `freertos_rs_talker` Component pkg."

[[bin]]
name = "freertos_rs_talker_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "freertos"


# Phase 212.L.2 — deploy-target overlay. Per the L.2 spec
# (`Cargo.toml` carries `[package.metadata.nros.deploy.<board>]`
# with board / rmw / domain_id / locator), populated from the
# `nros-board-*` shim's config-default values.
[package.metadata.nros.deploy.freertos]
rmw = "zenoh"
domain_id = 0
# Issue #48 cause 1 — slirp addressing (`-nic user,model=lan9118`): the guest
# sits on 10.0.2.0/24 with gateway/host alias 10.0.2.2 and dials the host
# zenohd via that alias. `nros::main!()` threads these into the firmware's boot
# `Config` via `BoardEntry::run_with_deploy` (the block was inert before).
ip = "10.0.2.15"
gateway = "10.0.2.2"
locator = "tcp/10.0.2.2:7451"
[dependencies]
freertos_rs_talker = { path = "../talker" }
# Phase 213.C.1 — `nros::main!()` proc-macro lives here.
# Phase 212.M-F.22 — `default-features = false` prevents the umbrella's
# `std` default from cascading to `nros-serdes/std` which breaks the
# `thumbv7m-none-eabi` cross build (no_std target has no std crate).
# The Entry pkg only needs `nros::main!()` proc-macro — no runtime
# features required at this layer.
nros = { path = "../../../../packages/core/nros", default-features = false }
# Phase 212.N.3 tier-1 per-board shim. `Mps2An385::run` provides the
# `BoardEntry` lifecycle the Entry pkg's `main.rs` invokes.
nros-board-mps2-an385-freertos = { path = "../../../../packages/boards/nros-board-mps2-an385-freertos" }
# Phase 212.N.1 trait surface — `BoardEntry`, `RuntimeCtx`, …
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-freertos"] }
# NOTE: sibling Component pkg dep deliberately NOT listed in step-2.
# The launch file is empty so codegen emits an `Ok(())` body; the
# Component pkg's `register()` wrapper is reached only when a
# populated launch.xml lands in step-3+. Mirrors the entry-poc
# convention of keeping the Entry-pkg dep graph minimal.

# No `[profile.*] panic = "abort"` needed: `thumbv7m-none-eabi` already
# defaults to `panic-strategy = abort`, and the embedded `#[panic_handler]`
# is owned by the board crate (#45 / RFC-0032 §3.1). The old "the sibling
# Component's staticlib needs it" rationale is moot — the Component is
# `crate-type = ["rlib"]` after #45.

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
