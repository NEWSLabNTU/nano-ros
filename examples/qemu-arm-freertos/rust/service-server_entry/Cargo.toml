[workspace]

[package]
name = "freertos_rs_service_server_entry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-2 — FreeRTOS MPS2-AN385 Entry pkg for the `freertos_rs_service_server` Component pkg."

[[bin]]
name = "freertos_rs_service_server_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "freertos"


# Phase 212.L.2 — deploy-target overlay. Per the L.2 spec
# (`Cargo.toml` carries `[package.metadata.nros.deploy.<board>]`
# with board / rmw / domain_id / locator), populated from the
# `nros-board-*` shim's config-default values.
[package.metadata.nros.deploy.freertos]
rmw = "zenoh"
domain_id = 0
# Issue #48 — slirp addressing: guest on 10.0.2.0/24, host alias 10.0.2.2.
# `nros::main!()` threads these into the firmware boot `Config` via
# `BoardEntry::run_with_deploy`. Mirrors talker_entry.
ip = "10.0.2.15"
gateway = "10.0.2.2"
locator = "tcp/10.0.2.2:7451"
[dependencies]
freertos_rs_service_server = { path = "../service-server" }
# Phase 213.C.1 — `nros::main!()` proc-macro lives here.
nros = { version = "*", default-features = false }
# Phase 212.N.3 tier-1 per-board shim. `Mps2An385::run` provides the
# `BoardEntry` lifecycle the Entry pkg's `main.rs` invokes.
# Phase 248 C6f (#60 T5) — the BOARD is the RMW+platform selection point:
# `features = ["rmw-zenoh"]` links+registers the zenoh-pico C backend (via
# `nros-board-freertos`'s `nros-rmw-zenoh` dep + boot-path `register()`) AND
# brings `nros-platform/platform-freertos`. The sibling node pkg + this Entry's
# `nros` dep name neither `rmw-*` nor `platform-*`.
nros-board-mps2-an385-freertos = { version = "*", features = ["rmw-zenoh"] }
# Phase 212.N.1 trait surface — `BoardEntry`, `RuntimeCtx`, …
nros-platform = { version = "*", default-features = false, features = ["platform-freertos"] }
# NOTE: sibling Component pkg dep deliberately NOT listed in step-2.
# The launch file is empty so codegen emits an `Ok(())` body; the
# Component pkg's `register()` wrapper is reached only when a
# populated launch.xml lands in step-3+. Mirrors the entry-poc
# convention of keeping the Entry-pkg dep graph minimal.
