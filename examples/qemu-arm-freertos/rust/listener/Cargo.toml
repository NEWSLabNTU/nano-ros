[package]
name = "freertos_rs_listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "FreeRTOS QEMU MPS2-AN385 listener — Phase 212.L Component pkg"

[lib]
crate-type = ["rlib", "staticlib"]

[features]
# Phase 214.S.5 — `rmw-cyclonedds` parity row. The default deploy rmw is
# still selected via `[package.metadata.nros.deploy.<rtos>].rmw`; this
# row gives users `cargo build --features rmw-cyclonedds` as an
# alternative build target without changing the default. 1-entry shape
# mirrors S.4 (umbrella pulls the backend transitively).
rmw-cyclonedds = ["nros/rmw-cyclonedds"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "platform-freertos", "ros-humble"] }
std_msgs = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "freertos_rs_listener::Listener"
name = "listener"
default_namespace = "/"

[package.metadata.nros.deploy.freertos]
board = "qemu-mps2-an385"
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:7447"

[package.metadata.ament]
build_depend = ["std_msgs"]
exec_depend = ["std_msgs"]

[profile.release]
opt-level = "s"
lto = true

[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
