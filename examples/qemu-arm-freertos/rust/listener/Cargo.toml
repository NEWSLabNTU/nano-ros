[package]
name = "freertos_rs_listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "FreeRTOS QEMU MPS2-AN385 listener — Phase 212.L Component pkg"

[lib]
crate-type = ["rlib"]

# Phase 248 C6f (#60 T5) — Node pkg is platform/RMW-AGNOSTIC. The old
# `rmw-zenoh`/`rmw-xrce`/`rmw-cyclonedds` parity rows (which forwarded
# `nros/rmw-*`) are gone, as is `nros/platform-freertos`: platform + the
# concrete RMW backend now flow from the BOARD crate the sibling firmware Entry
# pkg deps (`nros-board-mps2-an385-freertos` built with `rmw-zenoh`
# self-links+registers the zenoh-pico C backend AND brings
# `nros-platform/platform-freertos`). This lib carries only the functional
# `nros` features below (alloc + the rmw-cffi vtable seam + ROS edition).

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
std_msgs = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "freertos_rs_listener::Listener"
name = "listener"
default_namespace = "/"

[package.metadata.nros.deploy.freertos]
board = "qemu-mps2-an385"
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:7447"

[package.metadata.ament]
build_depend = ["std_msgs"]
exec_depend = ["std_msgs"]

[profile.dev]
# Phase 214.S.5.b — `panic = "abort"` is required for the no_std
# rlib crate-type (pure-cargo Entry-pkg path; #45). The Entry pkg inherits this on the
# firmware build; the standalone host `cargo check` also needs it for
# its host-only panic-handler shim (see src/lib.rs::host_shim).
panic = "abort"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

[workspace]
