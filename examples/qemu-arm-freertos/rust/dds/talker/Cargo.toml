[package]
name = "qemu-freertos-dds-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "DDS talker example on QEMU MPS2-AN385 with FreeRTOS + lwIP (Phase 97.4.freertos)"

[[bin]]
name = "qemu-freertos-dds-talker"
test = false
bench = false

[features]
default = []

[dependencies]
# `default-features = false` drops the zenoh-pico optional deps + the
# boot-time `zpico_set_task_config` call. The board crate keeps every
# generic FreeRTOS / lwIP / network init code path active.
nros-board-mps2-an385-freertos = { path = "../../../../../packages/boards/nros-board-mps2-an385-freertos", default-features = false }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["rmw-cffi", "platform-freertos", "ros-humble"] }
# Phase 97.1 prerequisites:
#   * `global-allocator` — `<FreeRtosPlatform as PlatformAlloc>` →
#     Rust `#[global_allocator]`.
#   * `critical-section` — Cortex-M PRIMASK → `critical_section::Impl`,
#     resolves the `_critical_section_1_0_*` symbols dust-dds references.
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-freertos", "global-allocator"] }
# Phase 115.L.5 — cffi shim that exposes dust-dds via `nros_rmw_vtable_t`.
# `main.rs` calls `register()` before `Executor::open`.
nros-rmw-dds = { path = "../../../../../packages/dds/nros-rmw-dds", features = ["platform-freertos"] }
# Phase 121.3.deprecate-rust-remove — the Rust nros-platform-freertos
# crate is gone; the C port (compiled by the board's build.rs)
# provides the canonical `nros_platform_*` symbols. The
# `debug-cortex-m-semihosting` trace feature has no equivalent yet;
# add it back to the C port if needed.
# dust-dds's `critical_section::Impl` registration now comes from
# the `nros-platform-critical-section` shim crate (Phase 121.9).
nros-platform-critical-section = { path = "../../../../../packages/core/nros-platform-critical-section" }
std_msgs = { version = "*", default-features = false }
panic-semihosting = { version = "0.6", features = ["exit"] }
