[package]
name = "qemu-freertos-dds-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "DDS listener example on QEMU MPS2-AN385 with FreeRTOS + lwIP (Phase 97.4.freertos)"

[[bin]]
name = "qemu-freertos-dds-listener"
test = false
bench = false

[features]
default = []

[dependencies]
nros-mps2-an385-freertos = { path = "../../../../../packages/boards/nros-mps2-an385-freertos", default-features = false }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["rmw-dds", "platform-freertos", "ros-humble"] }
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-freertos", "global-allocator", "critical-section"] }
std_msgs = { version = "*", default-features = false }
panic-semihosting = { version = "0.6", features = ["exit"] }
