[package]
name = "qemu-freertos-action-client"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Action client example on QEMU MPS2-AN385 with FreeRTOS + lwIP"

[[bin]]
name = "qemu-freertos-action-client"
test = false
bench = false

[features]
default = []

[dependencies]
nros-board-mps2-an385-freertos = { path = "../../../../../packages/boards/nros-board-mps2-an385-freertos" }
# Phase 88.16.C — user diagnostics route through `nros-log`.
nros-log = { path = "../../../../../packages/core/nros-log", default-features = false }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["rmw-cffi", "platform-freertos", "ros-humble"] }
nros-rmw-zenoh = { path = "../../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-freertos", "ros-humble"] }
example_interfaces = { version = "*", default-features = false }
panic-semihosting = { version = "0.6", features = ["exit"] }
