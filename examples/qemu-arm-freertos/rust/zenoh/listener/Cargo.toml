[package]
name = "qemu-freertos-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Listener example on QEMU MPS2-AN385 with FreeRTOS + lwIP"

[[bin]]
name = "qemu-freertos-listener"
test = false
bench = false

[features]
default = []

[dependencies]
nros-board-mps2-an385-freertos = { path = "../../../../../packages/boards/nros-board-mps2-an385-freertos" }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["rmw-zenoh", "platform-freertos", "link-tcp", "link-udp-unicast", "ros-humble"] }
std_msgs = { version = "*", default-features = false }
panic-semihosting = { version = "0.6", features = ["exit"] }
