[package]
name = "qemu-freertos-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Talker example on QEMU MPS2-AN385 with FreeRTOS + lwIP (Phase 118 collapsed)"

[[bin]]
name = "qemu-freertos-talker"
test = false
bench = false

# Phase 175.B — the CycloneDDS FreeRTOS path is CMake-driven because
# the backend is C++ plus cmake-time idlc descriptors. The `rlib`
# keeps the existing pure-cargo `_start` binary path intact; the
# `staticlib` exposes `app_main` for the C startup used by CMake.
[lib]
name = "qemu_freertos_talker"
crate-type = ["staticlib", "rlib"]
path = "src/lib.rs"

[features]
# Phase 118 — RMW selected at build time. Default is `rmw-zenoh` so
# `cargo build` Just Works for the docs-first path. The board crate's
# zenoh-pico default features are gated under `rmw-zenoh`; rmw-cyclonedds
# disables them via the optional dep stanza below.
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh", "nros-board-mps2-an385-freertos/rmw-zenoh"]
rmw-cyclonedds   = ["dep:nros-rmw-cyclonedds-sys", "dep:nros-platform-critical-section"]

[dependencies]
# Board crate — default features include zenoh-pico glue; `rmw-cyclonedds`
# leans on the non-zenoh init paths only.
nros-board-mps2-an385-freertos = { path = "../../../../packages/boards/nros-board-mps2-an385-freertos", default-features = false }
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["rmw-cffi", "platform-freertos", "ros-humble"] }
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-freertos", "global-allocator"] }
std_msgs = { version = "*", default-features = false }
panic-semihosting = { version = "0.6", features = ["exit"] }

# Optional RMW deps — exactly one is enabled by the corresponding feature.
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-freertos", "ros-humble"], optional = true }
nros-rmw-cyclonedds-sys   = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys", default-features = false, optional = true }
# Only needed by the CycloneDDS path — registers `critical_section::Impl`.
nros-platform-critical-section = { path = "../../../../packages/core/nros-platform-critical-section", optional = true }

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
[patch.crates-io]
builtin_interfaces = { path = "build/nros_generator_rs/builtin_interfaces" }
std_msgs = { path = "build/nros_generator_rs/std_msgs" }

# nros-* runtime crates
nros = { path = "../../../../packages/core/nros" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
nros-platform = { path = "../../../../packages/core/nros-platform" }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi" }
nros-node = { path = "../../../../packages/core/nros-node" }
nros-rmw = { path = "../../../../packages/core/nros-rmw" }
nros-rmw-cffi = { path = "../../../../packages/core/nros-rmw-cffi" }
nros-log = { path = "../../../../packages/core/nros-log" }
nros-macros = { path = "../../../../packages/core/nros-macros" }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }
# === END nros-managed [patch.crates-io] ===


