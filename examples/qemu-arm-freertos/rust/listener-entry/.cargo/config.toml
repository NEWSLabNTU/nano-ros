[build]
target = "thumbv7m-none-eabi"
# nros-board-freertos/build.rs needs these to locate the FreeRTOS + CFFI platform
# glue. Previously only the `just freertos` overlay / the run-plan test injected
# them, forcing a compile-in-test fallback; carrying them here (relative to this
# example dir) lets the Entry build standalone → prebuilt as a fixture instead.
[env]
NROS_PLATFORM_FREERTOS_SRC = { value = "../../../../packages/core/nros-platform-freertos/src", relative = true }
NROS_PLATFORM_CFFI_INCLUDE = { value = "../../../../packages/core/nros-platform-api/include", relative = true }


[target.thumbv7m-none-eabi]
runner = "qemu-system-arm -cpu cortex-m3 -machine mps2-an385 -nographic -semihosting-config enable=on,target=native -kernel"
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C", "link-arg=-Tmps2_an385.ld",
    "-C", "link-arg=--nmagic",
]

[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
nros = { path = "../../../../packages/core/nros" }  # nros-managed
nros-board-mps2-an385-freertos = { path = "../../../../packages/boards/nros-board-mps2-an385-freertos" }  # nros-managed
nros-core = { path = "../../../../packages/core/nros-core" }  # nros-managed
nros-platform = { path = "../../../../packages/core/nros-platform" }  # nros-managed
nros-serdes = { path = "../../../../packages/core/nros-serdes" }  # nros-managed
std_msgs = { path = "generated/std_msgs" }  # nros-managed
