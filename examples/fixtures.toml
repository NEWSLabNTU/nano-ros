# `src/qemu_nuttx_entry/build.rs`. `NUTTX_DIR` is exported by the
# `just nuttx build-examples` recipe. Standalone bootable image — the
# cargo binary IS the NuttX flat-build kernel image. `skip_probe` —
# the stale probe runs the default stable toolchain and cannot replicate
# the nightly + build-std + NUTTX_DIR recipe env.
[[workspace_fixture]]
