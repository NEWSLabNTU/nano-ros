# Phase 225.O — ESP32-C3 QEMU (OpenETH) workspace Entry. Built by the
# cargo lane (`scripts/build/workspace-fixtures-build.sh esp32 rust`):
# nightly + `-Z build-std` via the per-row `env` (a global `[unstable]
# build-std` in the shared `.cargo/config.toml` would break the
# native/freertos/threadx rows). The riscv link flags come from the
# workspace `.cargo/config.toml` `[target.riscv32imc-unknown-none-elf]`
# block. ESP_LOG / arena / UDP-socket knobs match the single-node esp32
# example so the booted image fits + the executor arena is sized.
[[workspace_fixture]]
id = "workspace-rust-esp32"
platform = "esp32"
lang = "rust"
rmw = "zenoh"
dir = "examples/workspaces/rust"
bringup = "src/demo_bringup"
entry = "esp32_entry"
codegen_out = "build-fixtures/demo_bringup"
target_dir = "target-fixtures/esp32"
target = "riscv32imc-unknown-none-elf"
# skip_probe = true (issue 0030): esp32 is NOT in the `build-test-fixtures`
# platform fan-out (build-test-fixtures-leaves runs zephyr/native/qemu/freertos/
# nuttx/threadx_linux/threadx_riscv64/stm32f4 — no esp32), so the standard
# fixture build never produces this Entry. Like `workspace-rust-qemu-nuttx`,
# it is built only by its own lane (`just esp32 build-fixtures` →
# workspace-fixtures-build.sh esp32). Requiring it in the test-all preflight
# would hard-fail the whole suite on every host (the esp32 e2e test already
# skip!s at runtime on the absent binary). The stale-probe also can't replicate
# the nightly + build-std + esp env.
skip_probe = true
# ZPICO_SUBSCRIBER_LARGE_SIZE: shrink the Phase 231 (RFC-0038) size-class large
# receive buffer from the 16 KiB default to 4 KiB on esp32 (issue #24). The
# static large-payload blocks are MAX_LARGE_SUBSCRIBERS(2) × RING_DEPTH(4) ×
# LARGE_SIZE, i.e. 128 KiB at the default — which overflows esp32 DRAM `.bss`
# by ~54 KiB. 4 KiB cuts that block to 32 KiB (saves ~96 KiB); 4096 > the 2048
# size threshold so the small/large split holds, and esp32 cannot buffer 16 KiB
# messages anyway.
env = { RUSTUP_TOOLCHAIN = "nightly-2026-04-11", CARGO_UNSTABLE_BUILD_STD = "core,alloc", ESP_LOG = "info", NROS_EXECUTOR_ARENA_SIZE = "16384", NROS_SMOLTCP_MAX_UDP_SOCKETS = "2", ZPICO_SUBSCRIBER_LARGE_SIZE = "4096" }

