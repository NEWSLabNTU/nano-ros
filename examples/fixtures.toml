# Single source of truth for example/test FIXTURE build options.
#
# Phase 177.9. Consumed by BOTH the fixture build recipes (`just <plat>
# build-fixtures`, via scripts/build/fixtures-manifest.py) AND the test-all
# staleness probe (scripts/test/rust-fixture-stale.sh). Keeping the build
# options here — rather than scattered across just/*.just — guarantees the
# probe rebuilds each fixture with the EXACT same features/target-dir/env the
# real build used (mismatched features cause feature-thrash rebuilds and false
# staleness, so default-feature probing is not acceptable).
#
# Scope: per-FIXTURE build options only. Platform ENV (toolchain paths, board
# cache vars, SDK dirs) stays in the recipes — it is platform-level, not
# per-fixture.
#
# Single-node entry schema ([[fixture]]):
#   platform   required  "native" | "qemu-arm-baremetal" | "freertos" | ...
#   lang       required  "rust" | "c" | "cpp"
#   dir        required  build cwd (cargo: the crate dir; cmake: the example dir)
#   rmw        optional  "zenoh" | "xrce" | "cyclonedds" (informational/filter)
#   id         optional  stable id (default: derived from dir+target_dir+features)
#   # --- rust (cargo) ---
#   features            optional  string[] passed as --features a,b
#   no_default_features optional  bool      adds --no-default-features
#   target_dir          optional  --target-dir <dir> (relative to `dir`)
#   target              optional  --target <triple> (cross)
#   env                 optional  { KEY = "VAL" } exported for the build
#   # --- cmake (c/cpp) — rollout pending; see C/C++ section below ---
#   cmake_defs          optional  { NROS_RMW = "zenoh", ... } -> -D<K>=<V>
#
# Migration status: native rust = authored + consumed by the probe. Build-recipe
# consumption (B) + C/C++ cmake cells + cross platforms = rollout in progress.
#
# Workspace fixture schema ([[workspace_fixture]]):
#   id          required  stable id used by build/test helper names
#   platform    required  platform family, initially "native"
#   lang        required  "rust" | "c" | "cpp" | "mixed"
#   dir         required  workspace root
#   rmw         required  "zenoh" | "xrce" | "cyclonedds"
#   bringup     required  Bringup pkg path relative to `dir`
#   entry       required  Entry pkg / CMake target name
#   codegen_out optional  `nros codegen-system --out` path relative to `dir`
#   build_subdir optional CMake build dir relative to `dir`
#   target_dir  optional  Cargo target dir relative to `dir`
#   board       required when platform=="zephyr"  west `-b <board>` target
#   conf_files  optional  string[] Kconfig overlays (west `-DCONF_FILE=`)
#   # --- rust (cargo) ---
#   features            optional  string[] passed as --features a,b
#   no_default_features optional  bool      adds --no-default-features
#   target              optional  --target <triple> (cross)
#   env                 optional  { KEY = "VAL" } exported for the build
#   cmake_defs  optional  extra -D<K>=<V> defs; `rmw` still expands to NROS_RMW
#
# Workspace fixtures are intentionally listed here but built by a dedicated
# workspace lane, not by the legacy single-node `fixtures-build.sh` loop. The
# build recipe must execute the documented user workflow: `nros ws sync`,
# `nros codegen-system --bringup ...`, then cargo/cmake/platform build.

