[package]
name = "esp32s3-qemu-dds-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "DDS talker example on ESP32-S3 QEMU + OpenETH + smoltcp (Phase 117)"

[[bin]]
name = "esp32s3-qemu-dds-talker"
test = false
bench = false

[dependencies]
# `default-features = false` drops the zenoh-pico optional deps + the
# boot-time `zpico_set_task_config` call. `dds-heap` flips the
# bare-metal heap from 32 KB to 256 KB so dust-dds's
# `DcpsDomainParticipant` builtin entities fit.
nros-board-esp32s3-qemu = { path = "../../../../../packages/boards/nros-board-esp32s3-qemu", default-features = false, features = ["ethernet", "dds-heap"] }

# Phase 117 prerequisites:
#   * `global-allocator` — `<Esp32QemuPlatform as PlatformAlloc>` →
#     Rust `#[global_allocator]`.
#   * `critical-section` provided by `esp-hal` itself (RISC-V single
#     core via `portable-atomic/unsafe-assume-single-core`).
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "platform-bare-metal", "ros-humble"] }
nros-rmw-dds = { path = "../../../../../packages/dds/nros-rmw-dds", features = ["platform-bare-metal", "debug-esp-println"] }
# `global-allocator` ON for DDS — registers a 256 KB static
# `FreeListHeap` from `nros-platform-esp32s3-qemu/memory.rs` (gated
# behind the platform crate's `dds-heap` feature, also forwarded
# by `nros-board-esp32s3-qemu/dds-heap`). With this feature on, the
# board crate skips the smaller `esp_alloc::heap_allocator!(64K)`
# call so the two `#[global_allocator]` registrations don't
# collide (Phase 101.7).
# Phase 117.2c — drop `nros-platform/global-allocator` so the
# board's `esp_alloc::heap_allocator!` (DRAM region) +
# `esp_alloc::HEAP.add_region(...)` (PSRAM region) can register a
# single multi-region `EspHeap` as the global allocator. The
# platform-side `FreeListHeap` static stays alive for direct
# `Esp32s3QemuPlatform::alloc()` calls but is no longer the
# `#[global_allocator]`; the C3 sibling keeps the
# `global-allocator` shape because that path doesn't have PSRAM
# to combine with.
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-esp32s3-qemu"] }

# Generated message types (from package.xml via cargo nano-ros generate)
std_msgs = { version = "*", default-features = false }

# Required for #[main] proc macro
esp-hal = { version = "~1.0.0", features = ["esp32s3", "unstable"] }
esp-backtrace = { version = "~0.18.0", features = ["esp32s3", "panic-handler", "println"] }

[profile.release]
debug = true
debug-assertions = true
lto = "fat"
codegen-units = 1
