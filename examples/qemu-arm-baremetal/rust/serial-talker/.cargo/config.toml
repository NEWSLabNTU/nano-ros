[build]
target = "thumbv7m-none-eabi"

# Phase 132 — serial-only firmware. `zpico-sys`'s `build.rs` reads
# this env var and skips compiling smoltcp glue into `zpico.c` (no
# `smoltcp_init` / `smoltcp_cleanup` link refs), defining
# `ZPICO_SERIAL` instead. Without the opt-out the bare-metal link
# fails — Phase 128 retired the per-transport Cargo features that
# used to gate this and `LinkFeatures::from_env()` now hardcodes
# tcp/udp on.
[env]
ZPICO_NO_SMOLTCP = "1"

[patch.crates-io.builtin_interfaces]
path = "generated/builtin_interfaces"

[patch.crates-io.nros-core]
path = "../../../../packages/core/nros-core"

[patch.crates-io.nros-serdes]
path = "../../../../packages/core/nros-serdes"

[patch.crates-io.std_msgs]
path = "generated/std_msgs"

[target.thumbv7m-none-eabi]
# -serial pty: QEMU exposes UART0 as a host PTY (for zenohd serial plugin)
# No -netdev / -net: serial transport doesn't need Ethernet
runner = "qemu-system-arm -cpu cortex-m3 -machine mps2-an385 -nographic -semihosting-config enable=on,target=native -serial pty -kernel"
rustflags = [
    "-C",
    "link-arg=-Tlink.x",
]
