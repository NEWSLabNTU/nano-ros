[package]
name = "service_server_rtic_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for the QEMU RTIC service server example (example_interfaces/AddTwoInts on /add_two_ints)"

[lib]
crate-type = ["rlib"]

[dependencies]
# nros declarative-node API (RMW-agnostic application logic).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Generated interface types (from package.xml via nros ws sync).
example_interfaces = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "service_server_rtic_pkg::AddTwoIntsServer"
name = "add_server"
default_namespace = "/"
dispatch = "deferred"

[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
action_msgs = { path = "generated/action_msgs" }
builtin_interfaces = { path = "generated/builtin_interfaces" }
example_interfaces = { path = "generated/example_interfaces" }
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-rmw-cyclonedds = { path = "../../../../packages/dds/nros-rmw-cyclonedds" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
