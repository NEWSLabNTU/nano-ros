[package]
name = "service_client_rtic_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for the QEMU RTIC service client example (example_interfaces/AddTwoInts on /add_two_ints)"

[lib]
crate-type = ["rlib"]

[dependencies]
# nros declarative-node API (RMW-agnostic application logic).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Generated interface types (from package.xml via nros ws sync).
example_interfaces = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "service_client_rtic_pkg::AddTwoIntsClient"
name = "add_client"
default_namespace = "/"
dispatch = "deferred"

[workspace]
