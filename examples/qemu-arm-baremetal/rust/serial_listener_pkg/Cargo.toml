[package]
name = "serial_listener_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for the QEMU serial listener example (std_msgs/Int32 on /chatter)"

[lib]
crate-type = ["rlib"]

[dependencies]
# nros declarative-node API (RMW/transport-agnostic application logic).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
nros-log = { path = "../../../../packages/core/nros-log", default-features = false }
std_msgs = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "serial_listener_pkg::SerialListenerNode"
name = "serial_listener"
default_namespace = "/"
dispatch = "deferred"

[workspace]
