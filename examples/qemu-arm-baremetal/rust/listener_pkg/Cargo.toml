[package]
name = "listener_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for the QEMU MPS2-AN385 bare-metal listener (subscribes to /chatter)"

[lib]
crate-type = ["rlib"]

[package.metadata.nros.node]
class = "listener_pkg::ListenerNode"
name = "qemu_bsp_listener"
default_namespace = "/"
dispatch = "deferred"

[dependencies]
# nros Executor API (RMW-agnostic node logic).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Phase 88.16.C — user diagnostics route through `nros-log`.
nros-log = { path = "../../../../packages/core/nros-log", default-features = false }

# Generated message types (from package.xml via nros generate-rust).
std_msgs = { version = "*", default-features = false }

# Phase 208.F1 — empty `[workspace]` table makes this pkg a standalone
# workspace root (see the Entry pkg's note for the full rationale).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
