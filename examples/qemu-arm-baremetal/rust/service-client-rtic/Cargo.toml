[package]
name = "qemu-rtic-service-client"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "RTIC service client example for nros on QEMU MPS2-AN385"

[[bin]]
name = "qemu-rtic-service-client"
test = false
bench = false

# Self-contained standalone example (issue 0100): node logic in this crate's
# lib.rs (`nros::node!` -> `register_dispatch`); `node_pkgs` self-references
# this crate; `main.rs` is the `nros::main!()` RTIC Entry.
[lib]
crate-type = ["rlib"]

[package.metadata.nros.entry]
deploy = "rtic-mps2-an385"
node_pkgs = ["qemu-rtic-service-client"]

[package.metadata.nros.node]
class = "qemu_rtic_service_client::AddTwoIntsClient"
name = "add_two_ints_client"
default_namespace = "/"
dispatch = "deferred"

# This example's own net, overlaid onto the board's baked
# qemu_config by `RticBoardEntry::init_hardware_with_deploy`. Distinct ip/port
# from the talker (.10/7450), listener (.11), and action server (.12/7470) so
# they coexist on the QEMU net.
[package.metadata.nros.deploy.rtic-mps2-an385]
# Phase 289 (#178) — MUST match the harness router port
# `platform::BAREMETAL.zenohd_port_for(<variant>, Rust)` (7450 + variant offset):
# both pair images share ONE router; per-image ports made the pair unroutable.
locator = "tcp/10.0.2.2:7460"
ip = "10.0.2.15"
gateway = "10.0.2.2"
netmask = "255.255.255.0"

[dependencies]
# Node deps folded in from the former service_client_rtic_pkg (issue 0100).
example_interfaces = { version = "*", default-features = false }
# nros Executor API + bare-metal platform glue.
nros = { version = "*", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# User diagnostics route through `nros-log`; the dispatcher is installed by the
# board boot scaffold.
nros-log = { version = "*", default-features = false }
# RTIC board entry: brings up hardware + network, opens the executor, builds the
# RTIC dispatch runtime consumed by the generated `#[rtic::app]`.
nros-board-rtic-mps2-an385 = { version = "*" }
# Linked RMW backend (registered by the board boot scaffold).
nros-rmw-zenoh = { version = "*", features = ["platform-bare-metal", "ros-humble"] }

# MPS2-AN385 PAC (interrupt bindings for RTIC dispatchers)
mps2-an385-pac = { version = "*" }

# RTIC v2
rtic = { version = "2.1", features = ["thumbv7-backend"] }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }

# Panic handler (required for no_std)
panic-semihosting = { version = "0.6", features = ["exit"] }

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = "s"
overflow-checks = false

# Size-optimized profile.
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# The empty `[workspace]` table makes this example a standalone
# workspace root (copy-out template promise).
[workspace]
