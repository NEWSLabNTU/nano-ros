[package]
name = "action_server_rtic_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for the QEMU RTIC action server example (example_interfaces/Fibonacci on /fibonacci)"

[lib]
crate-type = ["rlib"]

[dependencies]
# nros declarative-node API (RMW-agnostic application logic).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Generated interface types (from package.xml via nros ws sync).
example_interfaces = { version = "*", default-features = false }
# Fixed-capacity goal/sequence buffers (no global allocator on the tick path).
heapless = "0.8"

[package.metadata.nros.node]
class = "action_server_rtic_pkg::FibonacciServer"
name = "fibonacci_server"
default_namespace = "/"
dispatch = "deferred"

[workspace]
