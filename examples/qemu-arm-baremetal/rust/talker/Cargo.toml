[package]
name = "qemu-bsp-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Simple QEMU talker example (nros::main!() BoardEntry shape, MPS2-AN385)"

[[bin]]
name = "qemu-bsp-talker"
test = false
bench = false

# Entry-pkg lib companion: `nros::main!()` Form-1 self-bringup emits
# `::qemu_bsp_talker::register(runtime)`, which this lib re-exports from the
# sibling `talker_pkg` Node pkg (see src/lib.rs).
[lib]
crate-type = ["rlib"]

[package.metadata.nros.entry]
deploy = "qemu-mps2-an385"

# Issue #48 cause 1 — net config the legacy `Config { .. }` literal hardcoded.
# `nros::main!()` bakes these into a `DeployOverlay` and `BoardEntry::
# run_with_deploy` overlays them onto the board boot Config. `netmask` replaces
# the old `prefix = 24`.
[package.metadata.nros.deploy.qemu-mps2-an385]
locator = "tcp/10.0.2.2:7450"
ip = "10.0.2.10"
gateway = "10.0.2.2"
netmask = "255.255.255.0"

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Phase 244.D1 enabler — `board-entry` pulls the `nros_platform::BoardEntry`
# impl so `nros::main!(deploy = "qemu-mps2-an385")` can drive this board. Keeps
# the board crate's existing ethernet + rmw-zenoh defaults.
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385", features = ["board-entry"] }
# Linked RMW backend (force-linked; self-registers via the macro's
# `__register_linked_rmw()` on `target_os = "none"`).
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-bare-metal", "ros-humble"] }
# Node pkg holding the agnostic talker logic.
talker_pkg = { path = "../talker_pkg" }

# Bare-metal Cortex-M entry: `nros::main!()` emits `#[cortex_m_rt::entry]` for
# the `qemu-mps2-an385` deploy; the reset trampoline halts via `cortex_m::asm`.
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
# Panic handler (required for no_std).
panic-semihosting = { version = "0.6", features = ["exit"] }

# Phase 204.3 — size-optimized profile: opt-level "s" + strip, inheriting
# release's lto/codegen-units. Build with `cargo build --profile size`
# (or fleet-wide via `NROS_CARGO_PROFILE=size just <plat> build`).
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise.
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between the BEGIN/END markers —
# re-run sync instead. The firmware build root resolves the generated message
# crates pulled in transitively via `talker_pkg`; `[patch]` only applies from
# the workspace root being built, so the entries live here as well as in the
# Node pkg.
builtin_interfaces = { path = "../talker_pkg/generated/builtin_interfaces" }
std_msgs = { path = "../talker_pkg/generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
