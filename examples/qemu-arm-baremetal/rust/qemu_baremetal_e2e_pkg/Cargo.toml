[package]
name = "qemu_baremetal_e2e_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for the Phase 244.D1 bare-metal nros::main!() BoardEntry E2E fixture (QEMU MPS2-AN385)"

[lib]
crate-type = ["rlib"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "platform-bare-metal", "ros-humble"] }
# Bare-metal MPS2-AN385 board — used only for `exit_success()` to signal the
# E2E success path (QEMU semihosting exit). RMW-agnostic.
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385" }

[package.metadata.nros.node]
class = "qemu_baremetal_e2e_pkg::E2eNode"
name = "qemu_baremetal_e2e"
default_namespace = "/"
dispatch = "deferred"

[workspace]
