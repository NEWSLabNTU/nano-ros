[package]
name = "qemu-rtic-action-client"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "RTIC action client example for nros on QEMU MPS2-AN385"

[[bin]]
name = "qemu-rtic-action-client"
test = false
bench = false

# Self-contained standalone example (issue 0100): node logic in this crate's
# lib.rs (`nros::node!` -> `register_dispatch`); `node_pkgs` self-references
# this crate; `main.rs` is the `nros::main!()` RTIC Entry.
[lib]
crate-type = ["rlib"]

[package.metadata.nros.entry]
deploy = "rtic-mps2-an385"
node_pkgs = ["qemu-rtic-action-client"]

[package.metadata.nros.node]
class = "qemu_rtic_action_client::FibonacciClient"
name = "fibonacci_client"
default_namespace = "/"
dispatch = "deferred"

# Phase 244.D1 — this example's own net, overlaid onto the board's baked
# qemu_config by `RticBoardEntry::init_hardware_with_deploy`. Distinct ip/port
# from the talker (.10/7450), listener (.11), and action-server (.12/7470) so
# they coexist on the QEMU net.
[package.metadata.nros.deploy.rtic-mps2-an385]
locator = "tcp/10.0.2.2:7471"
ip = "10.0.2.13"
gateway = "10.0.2.2"
netmask = "255.255.255.0"

[dependencies]
# Node deps folded in from the former action_client_rtic_pkg (issue 0100).
example_interfaces = { version = "*", default-features = false }
heapless = "0.8"
# nros Executor API + bare-metal platform glue.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# RTIC board entry: brings up hardware + network, opens the executor, builds the
# RTIC dispatch runtime consumed by the generated `#[rtic::app]`.
nros-board-rtic-mps2-an385 = { path = "../../../../packages/boards/nros-board-rtic-mps2-an385" }
# Linked RMW backend (registered by the board boot scaffold).
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-bare-metal", "ros-humble"] }

# MPS2-AN385 PAC (interrupt bindings for RTIC dispatchers)
mps2-an385-pac = { path = "../../../../packages/boards/mps2-an385-pac" }

# RTIC v2
rtic = { version = "2.1", features = ["thumbv7-backend"] }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }

# Panic handler (required for no_std)
panic-semihosting = { version = "0.6", features = ["exit"] }

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = "s"
overflow-checks = false

# Phase 204.3 — size-optimized profile.
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root (copy-out template promise).
[workspace]
