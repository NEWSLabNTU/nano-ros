[package]
name = "qemu-rtic-action-client"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "RTIC action client example for nros on QEMU MPS2-AN385"

[[bin]]
name = "qemu-rtic-action-client"
test = false
bench = false

# Phase 212.L.2 — Application pkg shape. Single-board bare-metal
# binary; deploy target matches the platform path it lives under.
[package.metadata.nros.application]
deploy = ["qemu-arm-baremetal"]

[dependencies]
# Board crate for hardware + network init
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385" }

# MPS2-AN385 PAC (interrupt bindings for RTIC dispatchers)
mps2-an385-pac = { path = "../../../../packages/boards/mps2-an385-pac" }

# nros Executor API
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["rmw-cffi", "ros-humble"] }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-bare-metal", "ros-humble"] }

# Generated message types (from package.xml via nros generate-rust)
example_interfaces = { version = "*", default-features = false }

# RTIC v2
rtic = { version = "2.1", features = ["thumbv7-backend"] }
rtic-monotonics = { version = "2.0", features = ["cortex-m-systick"] }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }

# Panic handler (required for no_std)
panic-semihosting = { version = "0.6", features = ["exit"] }

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = "s"
overflow-checks = false

# Phase 204.3 — size-optimized profile: opt-level "z" + strip, inheriting
# release's lto/codegen-units. Build with `cargo build --profile size`
# (or fleet-wide via `NROS_CARGO_PROFILE=size just <plat> build`).
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
action_msgs = { path = "generated/action_msgs" }
builtin_interfaces = { path = "generated/builtin_interfaces" }
example_interfaces = { path = "generated/example_interfaces" }
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
