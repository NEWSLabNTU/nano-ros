[package]
name = "phase216_rtic_e2e_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for Phase 216.B QEMU RTIC generated-entry E2E fixture"

[lib]
crate-type = ["rlib"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385" }

[package.metadata.nros.node]
class = "phase216_rtic_e2e_pkg::E2eNode"
name = "phase216_rtic_e2e"
default_namespace = "/"
dispatch = "deferred"

[workspace]
