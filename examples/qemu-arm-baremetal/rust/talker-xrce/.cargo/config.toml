[build]
target = "thumbv7m-none-eabi"

# Phase 132 — serial-only firmware. `zpico-sys`'s `build.rs` reads
# this env var and skips compiling smoltcp glue into `zpico.c` (no
# `smoltcp_init` / `smoltcp_cleanup` link refs), defining
# `ZPICO_SERIAL` instead. Without the opt-out the bare-metal link
# fails — Phase 128 retired the per-transport Cargo features that
# used to gate this and `LinkFeatures::from_env()` now hardcodes
# tcp/udp on.
[env]
ZPICO_NO_SMOLTCP = "1"
# Phase 204.7 — serial-only: shed the IP link layer entirely.
# `ZPICO_NO_SMOLTCP` skips the smoltcp *glue*, but the vendor IP-link C
# (`Z_FEATURE_LINK_TCP/UDP`) was still compiled (hardcoded on). `NROS_LINK_IP=0`
# turns those off → no IP-link C; `--gc-sections` (above) strips the residual
# smoltcp platform impl. Serial link (`Z_FEATURE_LINK_SERIAL`) stays on.
NROS_LINK_IP = "0"
# Phase 207.6 — shrink the vendor XRCE session-state pools so the
# `xrce_session_state_t` calloc fits in a small heap (~390 KB at the
# defaults; ~12 KB at these). A pub-only talker doesn't need subscribers
# / services; `RING_DEPTH=1` collapses the per-subscriber ring; `MTU=512`
# matches the SERIAL_TRANSPORT_MTU; `STREAM_HISTORY=4` is the floor.
NROS_XRCE_STREAM_HISTORY        = "4"
NROS_XRCE_CUSTOM_TRANSPORT_MTU  = "512"
NROS_XRCE_MAX_SUBSCRIBERS       = "1"
NROS_XRCE_MAX_SERVICE_SERVERS   = "1"
NROS_XRCE_MAX_SERVICE_CLIENTS   = "1"
NROS_XRCE_SUBSCRIBER_RING_DEPTH = "1"
NROS_XRCE_BUFFER_SIZE           = "256"
# #184 — the phase-271 per-entry executor backing is a single ~75 KB
# allocation, so the phase-204.5 "XRCE session + margin" 24 KB heap OOMs at
# boot (`memory allocation of 74888 bytes failed`). Match the #176 board
# default (128 KB): HEAP is `.bss` on the 16 MB MPS2-AN385 — no flash cost.
# The tight XRCE pools above still bound the session struct itself.
NROS_HEAP_SIZE = "131072"

[target.thumbv7m-none-eabi]
# -serial pty: QEMU exposes UART0 as a host PTY (for zenohd serial plugin)
# No -netdev / -net: serial transport doesn't need Ethernet
runner = "qemu-system-arm -cpu cortex-m3 -machine mps2-an385 -nographic -semihosting-config enable=on,target=native -serial pty -kernel"
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C",
    "link-arg=-Tlink.x",
]

[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
nros = { path = "../../../../packages/core/nros" }  # nros-managed
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385" }  # nros-managed
nros-core = { path = "../../../../packages/core/nros-core" }  # nros-managed
nros-log = { path = "../../../../packages/core/nros-log" }  # nros-managed
nros-serdes = { path = "../../../../packages/core/nros-serdes" }  # nros-managed
std_msgs = { path = "generated/std_msgs" }  # nros-managed

