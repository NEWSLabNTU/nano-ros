[package]
name = "qemu-talker-xrce"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "XRCE (custom UART transport) talker example using nros-board-mps2-an385"

[[bin]]
name = "qemu-talker-xrce"
test = false
bench = false

# Entry-pkg lib companion: `nros::main!()` Form-1 self-bringup emits
# `::qemu_talker_xrce::register(runtime)`, which this lib re-exports from the
# sibling `xrce_talker_pkg` Node pkg (see src/lib.rs).
[lib]
crate-type = ["rlib"]

# Phase 244.D1 — Entry pkg shape. The bare-metal Cortex-M boot scaffold is
# generated by `nros::main!()`; node logic lives in `xrce_talker_pkg`.
[package.metadata.nros.entry]
deploy = "qemu-mps2-an385"

# Phase 244.D1 — XRCE deploy: `transport = "xrce"` makes `nros::main!()` call
# `BoardEntry::setup_transport` (which the board, built `xrce-transport`,
# overrides to install the XRCE-over-UART vtable) BEFORE `__register_linked_rmw()`
# — the ordering XRCE needs. `locator = "custom://uart"` selects the custom link.
[package.metadata.nros.deploy.qemu-mps2-an385]
transport = "xrce"
locator = "custom://uart"
domain_id = 0

[dependencies]
# nros + the XRCE RMW (rmw-xrce makes `__register_linked_rmw()` register the
# XRCE backend on `target_os = "none"`; it pulls nros-rmw-xrce-cffi + linkme-register).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Board built with the XRCE custom transport (xrce-transport → serial UART +
# nros-rmw-xrce-cffi). `board-entry` pulls the BoardEntry impl + setup_transport.
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385", default-features = false, features = ["board-entry", "xrce-transport"] }
# Node pkg holding the agnostic talker logic.
xrce_talker_pkg = { path = "../xrce_talker_pkg" }

# Bare-metal Cortex-M entry: `nros::main!()` emits `#[cortex_m_rt::entry]`.
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
# Panic handler (required for no_std).
panic-semihosting = { version = "0.6", features = ["exit"] }

# Phase 204.3 — size-optimized profile.
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root (copy-out template promise).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "../xrce_talker_pkg/generated/builtin_interfaces" }
std_msgs = { path = "../xrce_talker_pkg/generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
