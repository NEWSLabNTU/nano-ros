[package]
name = "qemu-talker-xrce"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "XRCE (custom UART transport) talker example using nros-board-mps2-an385"

[[bin]]
name = "qemu-talker-xrce"
test = false
bench = false

# Self-contained standalone example (issue 0100): `lib.rs` IS the node
# (`nros::node!(XrceTalkerNode)` emits `register`); `main.rs` is the
# `nros::main!()` Form-1 Entry dispatching to this same crate's `register`.
[lib]
crate-type = ["rlib"]

[package.metadata.nros.entry]
deploy = "qemu-mps2-an385"

[package.metadata.nros.node]
class = "qemu_talker_xrce::XrceTalkerNode"
name = "talker_xrce"
default_namespace = "/"
dispatch = "deferred"

# Phase 244.D1 — XRCE deploy: `transport = "xrce"` makes `nros::main!()` call
# `BoardEntry::setup_transport` (which the board, built `xrce-transport`,
# overrides to install the XRCE-over-UART vtable) BEFORE `__register_linked_rmw()`
# — the ordering XRCE needs. `locator = "custom://uart"` selects the custom link.
[package.metadata.nros.deploy.qemu-mps2-an385]
transport = "xrce"
locator = "custom://uart"
domain_id = 0

[dependencies]
# nros + the XRCE RMW (rmw-xrce makes `__register_linked_rmw()` register the
# XRCE backend on `target_os = "none"`; it pulls nros-rmw-xrce-cffi + linkme-register).
nros = { version = "*", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Board built with the XRCE custom transport (xrce-transport → serial UART +
# nros-rmw-xrce-cffi). `board-entry` pulls the BoardEntry impl + setup_transport.
nros-board-mps2-an385 = { version = "*", default-features = false, features = ["board-entry", "xrce-transport"] }
# User diagnostics route through `nros-log`; the dispatcher is installed by the
# board BoardEntry boot scaffold — this crate only registers its Logger handle.
nros-log = { version = "*", default-features = false }
# Generated message types (from package.xml via `nros generate-rust`).
std_msgs = { version = "*", default-features = false }

# Bare-metal Cortex-M entry: `nros::main!()` emits `#[cortex_m_rt::entry]`.
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
# Panic handler (required for no_std).
panic-semihosting = { version = "0.6", features = ["exit"] }

# Phase 204.3 — size-optimized profile.
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root (copy-out template promise).
[workspace]
