[workspace]

[package]
name = "qemu-talker-xrce"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Bare-metal XRCE talker (CMSDK UART custom transport) — Phase 207"

[[bin]]
name = "qemu-talker-xrce"
test = false
bench = false

[features]
default = []

# Phase 212.L.2 — Application pkg shape. Single-board bare-metal
# binary; deploy target matches the platform path it lives under.
[package.metadata.nros.application]
deploy = ["qemu-arm-baremetal"]

[dependencies]
# Board crate: serial UART + the XRCE custom-transport shim (Phase 207.2).
# `xrce-transport` forwards through to `serial` (shares `UART_DEVICE` with
# the zenoh-pico serial path). No `rmw-zenoh` marker — this build is XRCE-only.
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385", default-features = false, features = ["serial", "xrce-transport"] }
nros-log = { path = "../../../../packages/core/nros-log", default-features = false }

# nros Executor API (rmw-cffi-lean — pub-only, sub trampolines stay stubbed
# at the cffi VTABLE level, see Phase 204.1.L). No link-tcp/link-udp — serial.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["rmw-cffi", "ros-humble"] }

# XRCE backend (Rust cffi shim around `nros-rmw-xrce`'s C library). Carries
# `nros_rmw_xrce_register()` + the Phase 207.1 `set_custom_transport_ops`
# wrapper this example installs before `Executor::open`.
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", default-features = false }

# Generated message types (from package.xml via nros generate-rust).
std_msgs = { version = "*", default-features = false }

# Panic handler (required for no_std).
panic-semihosting = { version = "0.6", features = ["exit"] }

# Phase 204.3 — size-optimized profile (`cargo build --profile size`).
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
