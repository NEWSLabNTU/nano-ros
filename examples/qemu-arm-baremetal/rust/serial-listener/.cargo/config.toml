[build]
target = "thumbv7m-none-eabi"

# Phase 132 — serial-only firmware. See serial-talker/.cargo/config.toml
# for the full rationale; `zpico-sys`'s build.rs honours this env
# var and skips the smoltcp glue that would otherwise fail to link.
[env]
ZPICO_NO_SMOLTCP = "1"
# Phase 204.7 — serial-only: shed the IP link layer (Z_FEATURE_LINK_TCP/UDP=0);
# --gc-sections strips the residual smoltcp impl. Serial link stays on.
NROS_LINK_IP = "0"
# Phase 204.5 — zenoh-pico tcp/serial client working set is small; shrink the
# 64 KB default static heap.
NROS_HEAP_SIZE = "24576"

[target.thumbv7m-none-eabi]
# -serial pty: QEMU exposes UART0 as a host PTY (for zenohd serial plugin)
# No -netdev / -net: serial transport doesn't need Ethernet
runner = "qemu-system-arm -cpu cortex-m3 -machine mps2-an385 -nographic -semihosting-config enable=on,target=native -serial pty -kernel"
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C",
    "link-arg=-Tlink.x",
]

[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
nros-core = { path = "../../../../packages/core/nros-core" }  # nros-managed
nros-serdes = { path = "../../../../packages/core/nros-serdes" }  # nros-managed
std_msgs = { path = "generated/std_msgs" }  # nros-managed

