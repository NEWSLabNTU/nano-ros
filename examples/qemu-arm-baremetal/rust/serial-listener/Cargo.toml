[package]
name = "qemu-serial-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Serial (UART) listener example using nros-board-mps2-an385"

[[bin]]
name = "qemu-serial-listener"
test = false
bench = false

# Entry-pkg lib companion: `nros::main!()` Form-1 self-bringup emits
# `::qemu_serial_listener::register(runtime)`, which this lib re-exports from the
# sibling `serial_listener_pkg` Node pkg (see src/lib.rs).
[lib]
crate-type = ["rlib"]

# Phase 244.D1 — Entry pkg shape. The bare-metal Cortex-M boot scaffold is
# generated by `nros::main!()`; the node logic lives in `serial_listener_pkg`.
[package.metadata.nros.entry]
deploy = "qemu-mps2-an385"

# Phase 244.D1 — serial deploy: the board is built with the `serial` feature
# (no `ethernet`), so `BoardEntry::run_with_deploy` boots `Config::serial_default`
# and this overlay only supplies the UART zenoh locator + domain (no ip/gateway —
# the serial link has no IP).
[package.metadata.nros.deploy.qemu-mps2-an385]
locator = "serial/UART_0#baudrate=115200"
domain_id = 0

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Board built with the serial UART link (no ethernet).
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385", default-features = false, features = ["board-entry", "serial", "rmw-zenoh"] }
# Linked RMW backend (force-linked; self-registers via the macro's
# `__register_linked_rmw()` on `target_os = "none"`).
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-bare-metal", "ros-humble"] }
# Node pkg holding the agnostic serial-listener logic.
serial_listener_pkg = { path = "../serial_listener_pkg" }

# Bare-metal Cortex-M entry: `nros::main!()` emits `#[cortex_m_rt::entry]`.
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
# Panic handler (required for no_std).
panic-semihosting = { version = "0.6", features = ["exit"] }

# Phase 204.3 — size-optimized profile.
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root (copy-out template promise).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "../serial_listener_pkg/generated/builtin_interfaces" }
std_msgs = { path = "../serial_listener_pkg/generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
