[package]
name = "qemu-rtic-action-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "RTIC action server example for nros on QEMU MPS2-AN385"

[[bin]]
name = "qemu-rtic-action-server"
test = false
bench = false

# Phase 244.D1 — Entry pkg shape. The node set comes from `node_pkgs` (NOT a lib
# re-export); the RTIC boot scaffold is generated by `nros::main!()`.
[package.metadata.nros.entry]
deploy = "rtic-mps2-an385"
node_pkgs = ["action_server_rtic_pkg"]

# Phase 244.D1 — this example's own net, overlaid onto the board's baked
# qemu_config by `RticBoardEntry::init_hardware_with_deploy`. Distinct ip/port
# from the talker (.10/7450) + listener (.11) so they coexist on the QEMU net.
[package.metadata.nros.deploy.rtic-mps2-an385]
locator = "tcp/10.0.2.2:7470"
ip = "10.0.2.12"
gateway = "10.0.2.2"
netmask = "255.255.255.0"

[dependencies]
# nros Executor API + bare-metal platform glue.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# RTIC board entry: brings up hardware + network, opens the executor, builds the
# RTIC dispatch runtime consumed by the generated `#[rtic::app]`.
nros-board-rtic-mps2-an385 = { path = "../../../../packages/boards/nros-board-rtic-mps2-an385" }
# Linked RMW backend (registered by the board boot scaffold).
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-bare-metal", "ros-humble"] }
# Declarative action-server node (application logic).
action_server_rtic_pkg = { path = "../action_server_rtic_pkg" }

# MPS2-AN385 PAC (interrupt bindings for RTIC dispatchers)
mps2-an385-pac = { path = "../../../../packages/boards/mps2-an385-pac" }

# RTIC v2
rtic = { version = "2.1", features = ["thumbv7-backend"] }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }

# Panic handler (required for no_std)
panic-semihosting = { version = "0.6", features = ["exit"] }

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = "s"
overflow-checks = false

# Phase 204.3 — size-optimized profile.
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root (copy-out template promise).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
action_msgs = { path = "../action_server_rtic_pkg/generated/action_msgs" }
builtin_interfaces = { path = "../action_server_rtic_pkg/generated/builtin_interfaces" }
example_interfaces = { path = "../action_server_rtic_pkg/generated/example_interfaces" }
unique_identifier_msgs = { path = "../action_server_rtic_pkg/generated/unique_identifier_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
