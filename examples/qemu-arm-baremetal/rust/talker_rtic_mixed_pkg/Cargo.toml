[package]
name = "talker_rtic_mixed_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for the QEMU mixed-priority RTIC talker example (std_msgs/Int32 on /chatter)"

[lib]
crate-type = ["rlib"]

[dependencies]
# nros declarative-node API (RMW-agnostic application logic).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# User diagnostics route through `nros-log`; the dispatcher is installed by the
# board BoardEntry boot scaffold — this pkg only registers its Logger handle.
nros-log = { path = "../../../../packages/core/nros-log", default-features = false }
# Generated message types (from package.xml via nros generate-rust).
std_msgs = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "talker_rtic_mixed_pkg::TalkerNode"
name = "talker"
default_namespace = "/"
dispatch = "deferred"

[workspace]
