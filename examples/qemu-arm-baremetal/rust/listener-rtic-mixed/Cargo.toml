[package]
name = "qemu-rtic-mixed-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Mixed-priority RTIC listener example for nros on QEMU MPS2-AN385 (ffi-sync)"

[[bin]]
name = "qemu-rtic-mixed-listener"
test = false
bench = false

# Self-contained standalone example (issue 0100): node logic in this crate's
# lib.rs (`nros::node!` -> `register_dispatch`); `node_pkgs` self-references
# this crate; `main.rs` is the `nros::main!()` RTIC Entry.
[lib]
crate-type = ["rlib"]

[package.metadata.nros.entry]
deploy = "rtic-mps2-an385"
node_pkgs = ["qemu-rtic-mixed-listener"]

[package.metadata.nros.node]
class = "qemu_rtic_mixed_listener::ListenerNode"
name = "qemu_rtic_mixed_listener"
default_namespace = "/"
dispatch = "deferred"

# Phase 244.D1 — per-example net overlay applied onto the board's baked
# `qemu_config`. This listener must NOT share its ip with the talker on the
# QEMU slirp net (carried over verbatim from the old hand-written `Config`).
[package.metadata.nros.deploy.rtic-mps2-an385]
locator = "tcp/10.0.2.2:7450"
ip = "10.0.2.11"
gateway = "10.0.2.2"
netmask = "255.255.255.0"
domain_id = 0

[dependencies]
# Node deps folded in from the former listener_rtic_mixed_pkg (issue 0100).
nros-log = { version = "*", default-features = false }
std_msgs = { version = "*", default-features = false }
# nros Executor API — ffi-sync enables critical_section guards around FFI calls.
nros = { version = "*", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble", "ffi-sync"] }

# RTIC board Entry (RticBoardEntry) — owns the `#[rtic::app]` boot scaffold.
nros-board-rtic-mps2-an385 = { version = "*" }

# RMW backend (zenoh-pico) linked + registered by the board Entry.
nros-rmw-zenoh = { version = "*", features = ["platform-bare-metal", "ros-humble"] }


# MPS2-AN385 PAC (interrupt bindings for RTIC dispatchers).
mps2-an385-pac = { version = "*" }

# RTIC v2
rtic = { version = "2.1", features = ["thumbv7-backend"] }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }

# Panic handler (required for no_std)
panic-semihosting = { version = "0.6", features = ["exit"] }

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = "s"
overflow-checks = false

# Phase 204.3 — size-optimized profile: opt-level "z" + strip, inheriting
# release's lto/codegen-units. Build with `cargo build --profile size`
# (or fleet-wide via `NROS_CARGO_PROFILE=size just <plat> build`).
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
