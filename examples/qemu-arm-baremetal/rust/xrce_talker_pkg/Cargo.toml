[package]
name = "xrce_talker_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Node package for the QEMU XRCE talker example (std_msgs/Int32 on /chatter)"

[lib]
crate-type = ["rlib"]

[dependencies]
# nros declarative-node API (RMW/transport-agnostic application logic).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
nros-log = { path = "../../../../packages/core/nros-log", default-features = false }
std_msgs = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "xrce_talker_pkg::XrceTalkerNode"
name = "talker_xrce"
default_namespace = "/"
dispatch = "deferred"

[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
