[package]
name = "qemu-rs-common"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Common code for QEMU bare-metal examples with smoltcp + zenoh-pico"

[lib]
name = "qemu_rs_common"

[dependencies]
lan9118-smoltcp = { path = "../../../crates/lan9118-smoltcp" }
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

cortex-m = "0.7"
