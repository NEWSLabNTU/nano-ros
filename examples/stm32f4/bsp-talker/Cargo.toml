[package]
name = "stm32f4-bsp-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Simplified nros talker example for STM32F4 using BSP"

[[bin]]
name = "stm32f4-bsp-talker"
path = "src/main.rs"

[dependencies]
# Platform crate handles all hardware setup
nros-stm32f4 = { path = "../../../packages/boards/nros-stm32f4" }

# Generated message types (from package.xml via cargo nano-ros generate)
std_msgs = { version = "*", default-features = false }

# Panic handler
panic-probe = { version = "0.3", features = ["print-defmt"] }

# Logging backend
defmt-rtt = "0.4"

[features]
default = ["stm32f429"]
stm32f429 = ["nros-stm32f4/stm32f429"]
stm32f407 = ["nros-stm32f4/stm32f407"]

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = 3
overflow-checks = false

[profile.dev]
codegen-units = 1
debug = 2
incremental = false
opt-level = 1
