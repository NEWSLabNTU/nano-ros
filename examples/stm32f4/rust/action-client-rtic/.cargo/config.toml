include = ["../../../../../nros-patch.toml"]
[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C",
    "link-arg=-Tlink.x",
]

# STM32F429ZI has 192K SRAM. The default arena (~74 KB at MAX_CBS=4)
# overflows `.uninit`. The action client owns a single `ActionClient`
# slot, so cap callback capacity at 1 and use the same single-action
# arena budget as the STM32 action-server fixture.
[env]
# Issue 0024 — shrink the Phase 231 size-class large receive block from the
# 16384 default (2 x 4 x 16384 = 128 KiB) to 4096 (= 32 KiB) so the static
# blocks fit stm32f4 RAM (.bss/.uninit overflowed by ~37 KiB at the default).
ZPICO_SUBSCRIBER_LARGE_SIZE = "4096"
NROS_EXECUTOR_MAX_CBS = "1"
NROS_EXECUTOR_ARENA_SIZE = "18432"
NROS_SUBSCRIPTION_BUFFER_SIZE = "512"

[patch.crates-io]
nros-board-rtic-stm32f4 = { path = "../../../../packages/boards/nros-board-rtic-stm32f4" }  # nros-managed

