[package]
name = "stm32f4_listener_pkg_rtic"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "STM32F4 listener Node pkg (RTIC flavor) ‚Äî Deferred-dispatch shape, no Spawner handle"

# Phase 216.B.5 Node pkg shape ‚Äî lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register / init / dispatch / tick
# trampolines; the framework Entry pkg (`listener-rtic`) brings up
# the executor + spin loop via `nros::main!()`.
#
# This is the **RTIC sibling** of `listener_pkg` (Embassy flavor).
# The two pkgs share the Deferred-dispatch + tag-based subscription
# shape but differ in `ListenerState`: Embassy's flavor holds an
# `Option<embassy_executor::Spawner>` for the spawn-from-sync escape,
# whereas RTIC's task spawn is by static module symbol
# (`task_name::spawn()`) ‚Äî no runtime handle, so the RTIC
# `ListenerState` only carries the `SubscriptionTag`. Keeping the
# Embassy-flavored `listener_pkg` untouched preserves the
# spawn-from-sync demo landed in 216.C.5; this sibling carries the
# RTIC variant cleanly.
[lib]
crate-type = ["rlib"]

[dependencies]
# Phase 216.B.5 ‚Äî single `nros` dep matches the locked `nros::main!()`
# design (`book/src/internals/main-macro.md`). `std_msgs` is intentionally
# absent: the B.5 skeleton uses a tiny `PlaceholderInt32` RosMessage impl
# so the example compiles without `nros ws sync` materialising
# `generated/std_msgs/`. A follow-up to the B-wave migration adds the
# real `std_msgs` dep once the trampoline-registration story lands.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }

# Phase 216.B.5 ‚Äî `defmt` used by the placeholder `on_callback` body
# for the `info!("Received: ...")` log. Real flash brings up the RTT
# transport via the Entry pkg's `defmt-rtt` global; the Node pkg only
# needs the `defmt` facade.
defmt = "0.3"

[package.metadata.nros.node]
class = "stm32f4_listener_pkg_rtic::Listener"
name = "listener"
default_namespace = "/"
# Phase 216.D.1 ‚Äî explicit dispatch hint mirrors `Node::DISPATCH` in
# `src/lib.rs` (Deferred). Read by `nros check`'s framework √ó
# DispatchStrategy matrix; the RTIC sibling pairs with the
# `rtic-stm32f4` board, the matrix's `(rtic, deferred)` cell.
dispatch = "deferred"

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

# Phase 208.F1 ‚Äî empty `[workspace]` table makes this pkg a standalone
# workspace root, mirroring the sibling Entry pkgs. Without it, a fresh
# `cargo check --target thumbv7em-none-eabihf` from inside the crate dir
# walks up into the nano-ros superproject workspace and trips the
# "current package believes it's in a workspace" guard.
[workspace]
