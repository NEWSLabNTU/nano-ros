[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
rustflags = [
    "-C",
    "link-arg=-Tlink.x",
]

# STM32F429ZI has 192K SRAM. Action client static arenas (Phase 99.M
# growth) overflow `.uninit` by ~1.5K with default buf sizes. Halving
# DEFAULT_RX_BUF_SIZE 1024 → 512 saves ~7.5K (arena + 3 action bufs)
# without functional impact for the small example messages
# (`example_interfaces::action::Fibonacci`).
[env]
NROS_SUBSCRIPTION_BUFFER_SIZE = "512"

[patch.crates-io.nros-core]
path = "../../../../../packages/core/nros-core"

[patch.crates-io.nros-serdes]
path = "../../../../../packages/core/nros-serdes"

[patch.crates-io.example_interfaces]
path = "generated/example_interfaces"

[patch.crates-io.builtin_interfaces]
path = "generated/builtin_interfaces"

[patch.crates-io.action_msgs]
path = "generated/action_msgs"

[patch.crates-io.unique_identifier_msgs]
path = "generated/unique_identifier_msgs"
