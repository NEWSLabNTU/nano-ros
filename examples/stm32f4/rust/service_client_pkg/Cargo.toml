[package]
name = "stm32f4_service_client_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "STM32F4 service client Node pkg — Inline-dispatch shape, board-agnostic so a future Embassy Entry pkg can reuse it"

# Phase 216.B.5 Node pkg shape — lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register / init / dispatch / tick
# trampolines; the framework Entry pkg (`service-client-rtic` for
# 216.B.5, mirroring the sibling `service-server-rtic` /
# `service_server_pkg` split) brings up the executor + spin loop via
# `nros::main!()`.
#
# Unlike the server sibling (Deferred — service requests arrive as
# callbacks the dispatch runtime hands off to a framework-owned task),
# the client side stays on `DispatchStrategy::Inline`: the legacy
# Pattern A `service-client-rtic` polled `Promise::try_recv()` from a
# user-owned RTIC `#[task]` — no callbacks fire on the reply path —
# and a future-shaped client API doesn't need the Deferred runtime
# trampoline. A real call body is the next 216.B wave; today's
# skeleton just registers the client handle in `register()`.
[lib]
crate-type = ["rlib"]

[dependencies]
# Phase 216.B.5 — single `nros` dep matches the locked `nros::main!()`
# design (`book/src/internals/main-macro.md`).
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }

# Phase 216.B.5 — reuse the sibling server pkg's `PlaceholderSrv` +
# `PlaceholderInt32` so the wire shape (4-byte LE `i32`, Request ==
# Reply) is guaranteed to match across both sides without dragging
# `example_interfaces` codegen into either skeleton. A follow-up
# swaps both pkgs to a real `example_interfaces::srv::AddTwoInts`
# once the trampoline-registration story lands and `generated/`
# ships.
stm32f4_service_server_pkg = { path = "../service_server_pkg" }

# Phase 216.B.5 — `defmt` used by the placeholder body for log lines.
# Real flash brings up the RTT transport via the Entry pkg's
# `defmt-rtt` global; the Node pkg only needs the `defmt` facade.
defmt = "0.3"

[package.metadata.nros.node]
class = "stm32f4_service_client_pkg::ServiceClient"
name = "service_client"
default_namespace = "/"
# Phase 216.D.1 — explicit dispatch hint mirrors `Node::DISPATCH` in
# `src/lib.rs` (Inline; client side polls `Promise::try_recv()` from
# its own task — no spin-thread callbacks). Read by `nros check`'s
# framework × DispatchStrategy matrix.
dispatch = "inline"

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

# Phase 208.F1 — empty `[workspace]` table makes this pkg a standalone
# workspace root, mirroring the sibling Entry pkgs. Without it, a fresh
# `cargo check --target thumbv7em-none-eabihf` from inside the crate dir
# walks up into the nano-ros superproject workspace and trips the
# "current package believes it's in a workspace" guard.
[workspace]
