[package]
name = "stm32f4_service_server_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "STM32F4 service server Node pkg — Deferred-dispatch shape, board-agnostic so a future Embassy Entry pkg can reuse it"

# Phase 216.B.5 Node pkg shape — lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register / init / dispatch / tick
# trampolines; the framework Entry pkg (`service-server-rtic` for
# 216.B.5, mirroring the C.5 `listener-embassy` / `listener_pkg` split)
# brings up the executor + spin loop via `nros::main!()`. Like
# `listener_pkg` (Deferred), service callbacks are exactly the
# Deferred-dispatch use case — request arrival is a callback the
# dispatch runtime hands off to a framework-owned task.
[lib]
crate-type = ["rlib"]

[dependencies]
# Phase 216.B.5 — single `nros` dep matches the locked `nros::main!()`
# design (`book/src/internals/main-macro.md`). `example_interfaces` is
# intentionally absent: this skeleton uses a tiny `PlaceholderSrv`
# `RosService` impl so the example compiles without `nros ws sync`
# materialising `generated/example_interfaces/`. A follow-up to the
# B-wave migration adds the real `example_interfaces` dep (and the
# matching `[package.metadata.ament]` depend rows) once the
# trampoline-registration story lands.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }

# Phase 216.B.5 — `defmt` used by the placeholder `on_callback` body
# for the `info!("Service request received")` log. Real flash brings
# up the RTT transport via the Entry pkg's `defmt-rtt` global; the
# Node pkg only needs the `defmt` facade. Mirrors `listener_pkg`'s
# defmt dep.
defmt = "0.3"

[package.metadata.nros.node]
class = "stm32f4_service_server_pkg::ServiceServer"
name = "service_server"
default_namespace = "/"
# Phase 216.D.1 — explicit dispatch hint mirrors `Node::DISPATCH` in
# `src/lib.rs` (Deferred). Read by `nros check`'s framework ×
# DispatchStrategy matrix; service request callbacks are exactly the
# Deferred-dispatch use case on RTIC / Embassy.
dispatch = "deferred"

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

# Phase 208.F1 — empty `[workspace]` table makes this pkg a standalone
# workspace root, mirroring the sibling Entry pkgs. Without it, a fresh
# `cargo check --target thumbv7em-none-eabihf` from inside the crate dir
# walks up into the nano-ros superproject workspace and trips the
# "current package believes it's in a workspace" guard.
[workspace]
