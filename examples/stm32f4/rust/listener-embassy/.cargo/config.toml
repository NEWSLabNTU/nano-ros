[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip STM32F429ZITx"
rustflags = [
    "-C", "link-arg=--gc-sections",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

[build]
target = "thumbv7em-none-eabihf"

[env]
# Issue 0024 — shrink the Phase 231 size-class large receive block from the
# 16384 default (2 x 4 x 16384 = 128 KiB) to 4096 (= 32 KiB) so the static
# blocks fit stm32f4 RAM (.bss/.uninit overflowed by ~37 KiB at the default).
ZPICO_SUBSCRIBER_LARGE_SIZE = "4096"
DEFMT_LOG = "debug"

[patch.crates-io]
nros = { path = "../../../../packages/core/nros" }  # nros-managed
nros-board-embassy-stm32f4 = { path = "../../../../packages/boards/nros-board-embassy-stm32f4" }  # nros-managed
nros-core = { path = "../../../../packages/core/nros-core" }  # nros-managed
nros-serdes = { path = "../../../../packages/core/nros-serdes" }  # nros-managed
