[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip STM32F429ZITx"
rustflags = [
    "-C", "link-arg=--gc-sections",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

[build]
target = "thumbv7em-none-eabihf"

[env]
NROS_SMOLTCP_MAX_SOCKETS = "1"
NROS_SMOLTCP_MAX_UDP_SOCKETS = "1"
DEFMT_LOG = "debug"
