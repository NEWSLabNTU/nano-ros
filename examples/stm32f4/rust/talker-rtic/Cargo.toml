[package]
name = "stm32f4-rs-rtic-example"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "RTIC example for nros on STM32F4 — Phase 216.B.5 nros::main!() shape"

[[bin]]
name = "stm32f4-rs-rtic-example"
path = "src/main.rs"

# Self-contained standalone example (issue 0100): the node logic lives in this
# crate's `lib.rs` (`nros::node!(Talker)` → `register_dispatch`); `node_pkgs`
# self-references this crate. `main.rs` is the `nros::main!()` RTIC Entry that
# routes onto the B.3 RTIC emit branch via the `rtic-stm32f4` deploy key.
[lib]
crate-type = ["rlib"]

[package.metadata.nros.entry]
deploy = "rtic-stm32f4"
node_pkgs = ["stm32f4-rs-rtic-example"]

[package.metadata.nros.node]
class = "stm32f4_rs_rtic_example::Talker"
name = "talker"
default_namespace = "/"
dispatch = "inline"

[dependencies]
# Phase 216.B.5 — `nros::main!()` proc-macro family. The macro emits
# the `#[rtic::app]` body + `__nros_spin` / `__nros_dispatch` RTIC task
# sidekicks via the B.3 routing branch, so this Entry pkg only needs
# `nros` + the board crate + the talker Node pkg. The legacy hand-rolled
# `#[rtic::app] mod app` stack (rtic, rtic-monotonics, stm32f4xx-hal,
# nros-rmw-zenoh, std_msgs, cortex-m) is dropped — the macro emit + the
# board crate own those.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Phase 216.B.2 board crate — supplies the `RticStm32F4` ZST the
# macro-generated body delegates init to via
# `RticBoardEntry::init_hardware`. Today the bringup body is
# `todo!()` so a flash surfaces the unimplemented panic; the macro
# emit only needs to compile here.
nros-board-rtic-stm32f4 = { path = "../../../../packages/boards/nros-board-rtic-stm32f4" }
# RTIC runtime — re-listed because the macro-emitted body references
# `::rtic::app`, `#[task]`, etc. by absolute path. The Entry pkg owns
# the rtic version pin (`2.1` matches `nros-board-rtic-stm32f4`).
rtic = { version = "2.1", features = ["thumbv7-backend"] }

# STM32F4 PAC — referenced literally by the B.3 macro emit's
# `#[rtic::app(device = stm32f4xx_hal::pac, dispatchers = [USART1,
# USART2])]` attribute, so the Entry pkg must surface the crate in its
# own dep graph (the proc-macro can't add it for us). Mirrors the
# board crate's pin.
stm32f4xx-hal = { version = "0.21", features = ["stm32f429"] }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
panic-halt = "0.2"

# Logging
defmt = "0.3"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = 3
overflow-checks = false

[profile.dev]
codegen-units = 1
debug = 2
incremental = false
opt-level = 1

# Phase 204.3 — size-optimized profile: opt-level "z" + strip, inheriting
# release's lto/codegen-units. Build with `cargo build --profile size`
# (or fleet-wide via `NROS_CARGO_PROFILE=size just <plat> build`).
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
