[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C",
    "link-arg=-Tlink.x",
]

# STM32F429ZI has 192K SRAM. Phase 122.3.0 grew the Executor arena's
# per-entry budget to cover ActionClient worst-case (`3 × 4480 +
# 3 × rx_buf + 1536` bytes), pushing the 4-slot default over the
# .uninit budget. Talker only owns one publisher and never registers
# callbacks — the executor never allocates from its arena — so pin
# `NROS_EXECUTOR_ARENA_SIZE` to the 8 KB floor.
[env]
# Issue 0024 — shrink the Phase 231 size-class large receive block from the
# 16384 default (2 x 4 x 16384 = 128 KiB) to 4096 (= 32 KiB) so the static
# blocks fit stm32f4 RAM (.bss/.uninit overflowed by ~37 KiB at the default).
ZPICO_SUBSCRIBER_LARGE_SIZE = "4096"
NROS_EXECUTOR_MAX_CBS = "1"
NROS_EXECUTOR_ARENA_SIZE = "4096"
NROS_SUBSCRIPTION_BUFFER_SIZE = "512"

[patch.crates-io]
nros-core = { path = "../../../../packages/core/nros-core" }  # nros-managed
nros-serdes = { path = "../../../../packages/core/nros-serdes" }  # nros-managed

