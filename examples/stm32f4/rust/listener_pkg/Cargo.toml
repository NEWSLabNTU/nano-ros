[package]
name = "stm32f4_listener_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "STM32F4 listener Node pkg â€” Deferred-dispatch shape, shared across embassy + rtic Entry pkgs"

# Phase 216.C.5 Node pkg shape â€” lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register / init / dispatch / tick
# trampolines; the framework Entry pkg (`listener-embassy` for
# 216.C.5, the parallel `listener-rtic` migration scheduled under
# Phase 216.B.5 for the RTIC framework) brings up the executor +
# spin loop via `nros::main!()`. Unlike `talker_pkg` (Inline), this
# pkg declares `Node::DISPATCH = DispatchStrategy::Deferred` so the
# board-side dispatch runtime enqueues signaled callbacks onto a
# framework-owned task instead of the spin task.
[lib]
crate-type = ["rlib"]

[dependencies]
# Phase 216.C.5 â€” single `nros` dep matches the locked `nros::main!()`
# design (`book/src/internals/main-macro.md`). `std_msgs` is intentionally
# absent: the C.5 skeleton uses a tiny `PlaceholderInt32` RosMessage impl
# so the example compiles without `nros ws sync` materialising
# `generated/std_msgs/`. A follow-up to the C-wave migration adds the
# real `std_msgs` dep (and the matching `[package.metadata.ament]`
# depend rows) once the trampoline-registration story lands.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }

# Phase 216.C.5 â€” `embassy-executor` brings in the `Spawner` type the
# `ListenerState::spawner` field holds. The "spawn-from-sync escape"
# pattern (sync `on_callback` body enqueues an `async` task on the
# framework's executor) is the whole point of `DispatchStrategy::
# Deferred` on an Embassy board, so this dep is intrinsic to the
# Node pkg, not just the Entry pkg. Version pin tracks
# `nros-board-embassy-stm32f4`'s pin.
embassy-executor = { version = "0.7", features = ["arch-cortex-m", "executor-thread"] }

# Phase 216.C.5 â€” `defmt` used by the async sidekick task body for
# the placeholder `info!("Received: ...")` log. Real flash brings up
# the RTT transport via the Entry pkg's `defmt-rtt` global; the Node
# pkg only needs the `defmt` facade.
defmt = "0.3"

[package.metadata.nros.node]
class = "stm32f4_listener_pkg::Listener"
name = "listener"
default_namespace = "/"
# Phase 216.D.1 â€” explicit dispatch hint mirrors `Node::DISPATCH` in
# `src/lib.rs` (Deferred). Read by `nros check`'s framework Ă—
# DispatchStrategy matrix; legal on RTIC / Embassy / OwnedSpin boards.
dispatch = "deferred"

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

# Phase 208.F1 â€” empty `[workspace]` table makes this pkg a standalone
# workspace root, mirroring the sibling Entry pkgs. Without it, a fresh
# `cargo check --target thumbv7em-none-eabihf` from inside the crate dir
# walks up into the nano-ros superproject workspace and trips the
# "current package believes it's in a workspace" guard.
[workspace]
