[package]
name = "stm32f4_talker_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "STM32F4 talker Node pkg — shared across embassy + rtic Entry pkgs"

# Phase 216.C.4 Node pkg shape — lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register / init / dispatch / tick
# trampolines; the framework Entry pkg (`talker-embassy` for 216.C.4,
# `talker-rtic` for the parallel B.5 wave) brings up the executor +
# spin loop via `nros::main!()`.
[lib]
crate-type = ["rlib"]

[dependencies]
# Phase 216.C.4 — single `nros` dep matches the locked `nros::main!()`
# design (`book/src/internals/main-macro.md`). `std_msgs` is intentionally
# absent: the C.4 skeleton uses a tiny `PlaceholderInt32` RosMessage impl
# so the example compiles without `nros ws sync` materialising
# `generated/std_msgs/`. A follow-up to the C-wave migration adds the
# real `std_msgs` dep (and the matching `[package.metadata.ament]`
# depend rows) once the trampoline-registration story lands.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }

[package.metadata.nros.node]
class = "stm32f4_talker_pkg::Talker"
name = "talker"
default_namespace = "/"
# Phase 216.D.1 — explicit dispatch hint for `nros check`'s framework ×
# DispatchStrategy matrix. Mirrors `Node::DISPATCH` in `src/lib.rs`.
# Inline matches the publisher path (no callbacks fire on the spin
# path). The matrix lint flags the (board, node) pair at Entry pkg
# resolution time, not on the Node pkg in isolation — so Inline here
# is legal as long as the deploying Entry pkg's board is OwnedSpin.
dispatch = "inline"

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

# Phase 208.F1 — empty `[workspace]` table makes this pkg a standalone
# workspace root, mirroring the sibling Entry pkgs. Without it, a fresh
# `cargo check --target thumbv7em-none-eabihf` from inside the crate dir
# walks up into the nano-ros superproject workspace and trips the
# "current package believes it's in a workspace" guard.
[workspace]

