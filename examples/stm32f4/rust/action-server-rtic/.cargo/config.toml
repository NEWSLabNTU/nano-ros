[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C",
    "link-arg=-Tlink.x",
]

# STM32F429ZI has 192K SRAM. The default arena (~74 KB at MAX_CBS=4)
# overflows `.uninit`. The action server owns a single `ActionServer`
# slot — cap `NROS_EXECUTOR_MAX_CBS` at 1 and size the arena to a
# single action entry (`3 × 4480 + 3 × 512 + 1536 + 2048` ≈ 18 KB).
[env]
NROS_SMOLTCP_MAX_SOCKETS = "1"
NROS_SMOLTCP_MAX_UDP_SOCKETS = "1"
NROS_EXECUTOR_MAX_CBS = "1"
NROS_EXECUTOR_ARENA_SIZE = "18432"
NROS_SUBSCRIPTION_BUFFER_SIZE = "512"

[patch.crates-io.nros-core]
path = "../../../../packages/core/nros-core"

[patch.crates-io.nros-serdes]
path = "../../../../packages/core/nros-serdes"

[patch.crates-io.example_interfaces]
path = "generated/example_interfaces"
