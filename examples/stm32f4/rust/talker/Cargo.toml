[package]
name = "stm32f4-bsp-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Simplified nros talker example for STM32F4 using BSP"

[[bin]]
name = "stm32f4-bsp-talker"
path = "src/main.rs"

[dependencies]
# Platform crate handles all hardware setup
nros-board-stm32f4 = { path = "../../../../packages/boards/nros-board-stm32f4" }
# Phase 88.16.F — user diagnostics route through `nros-log`.
# `nros-platform-stm32f4`'s `PlatformLog` impl forwards every
# record to `defmt::{trace,debug,info,warn,error}!`, so existing
# `defmt_rtt` / `probe-rs attach` workflows keep working.
nros-log = { path = "../../../../packages/core/nros-log", default-features = false }

# nros Executor API
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["rmw-cffi", "platform-bare-metal", "ros-humble"] }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-bare-metal", "ros-humble"] }

# Generated message types (from package.xml via nros generate-rust)
std_msgs = { version = "*", default-features = false }

# Panic handler (default: defmt-printing). The `minimal` feature swaps in
# panic-halt (no message formatting) — see [features].
panic-probe = { version = "0.3", features = ["print-defmt"], optional = true }
panic-halt = { version = "0.2", optional = true }

# Logging. defmt + its global logger (defmt-rtt) are unconditional: the board
# crate (`nros_board_common::board_init`) logs via defmt and needs the
# `#[defmt::global_logger]`, so they stay linked even in the minimal build.
defmt = "0.3"
defmt-rtt = "0.4"

[features]
default = ["stm32f429", "diagnostics"]
stm32f429 = ["nros-board-stm32f4/stm32f429"]
stm32f407 = ["nros-board-stm32f4/stm32f407"]
# Default diagnostics: defmt-printing panic + nros-log app diagnostics on.
diagnostics = ["dep:panic-probe"]
# Phase 204.4 — minimal-panic / no-fmt size build: panic-halt (no panic message
# formatting) + nros-log compiled off (`max-level-off`), so the panic-message +
# nros-log `core::fmt`/`Debug` machinery is dead-stripped. (defmt stays — the
# board crate needs it.) Build with
# `--no-default-features --features stm32f429,minimal`.
minimal = ["dep:panic-halt", "nros-log/max-level-off"]

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = 3
overflow-checks = false

# Phase 204.3 — size-critical build: `cargo build --profile size`. Same
# aggressive cross-crate inlining (lto=fat, codegen-units=1) as release but
# opt-level "z" (size) instead of 3 (speed) + stripped (no on-target debuginfo).
# panic is already abort on the thumbv7em target. Quantified z-vs-3 in
# docs/roadmap/phase-204-embedded-binary-size.md (204.3).
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

[profile.dev]
codegen-units = 1
debug = 2
incremental = false
opt-level = 1

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }

# nros-* runtime crates
nros = { path = "../../../../packages/core/nros" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
nros-platform = { path = "../../../../packages/core/nros-platform" }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi" }
nros-node = { path = "../../../../packages/core/nros-node" }
nros-rmw = { path = "../../../../packages/core/nros-rmw" }
nros-rmw-cffi = { path = "../../../../packages/core/nros-rmw-cffi" }
nros-log = { path = "../../../../packages/core/nros-log" }
nros-macros = { path = "../../../../packages/core/nros-macros" }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }
# === END nros-managed [patch.crates-io] ===
