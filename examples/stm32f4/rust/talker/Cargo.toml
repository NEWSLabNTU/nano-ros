[package]
name = "stm32f4-bsp-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Simplified nros talker example for STM32F4 (nros::main!() BoardEntry shape)"

[[bin]]
name = "stm32f4-bsp-talker"
test = false
bench = false

# Self-contained standalone example (issue 0100): `lib.rs` IS the node
# (`nros::node!(TalkerNode)` emits `register`); `main.rs` is the `nros::main!()`
# Form-1 Entry dispatching to this same crate's `register`.
[lib]
crate-type = ["rlib"]

[package.metadata.nros.entry]
deploy = "stm32f4"

[package.metadata.nros.node]
class = "stm32f4_bsp_talker::TalkerNode"
name = "talker"
default_namespace = "/"
dispatch = "deferred"

# Net config the legacy `Config::nucleo_f429zi()` literal hardcoded.
# `nros::main!()` bakes these into a `DeployOverlay` and `BoardEntry::
# run_with_deploy` overlays them onto the board boot Config. `netmask` replaces
# the old `prefix = 24`.
[package.metadata.nros.deploy.stm32f4]
locator = "tcp/192.168.1.1:7447"
ip = "192.168.1.10"
gateway = "192.168.1.1"
netmask = "255.255.255.0"

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Phase 244.C5 enabler — `board-entry` pulls the `nros_platform::BoardEntry`
# impl so `nros::main!(deploy = "stm32f4")` can drive this board. Keeps the
# board crate's existing ethernet + rmw-zenoh defaults.
nros-board-stm32f4 = { path = "../../../../packages/boards/nros-board-stm32f4", features = ["stm32f429", "ethernet", "rmw-zenoh", "board-entry"], default-features = false }
# Linked RMW backend (force-linked; self-registers via the macro's
# `__register_linked_rmw()` on `target_os = "none"`).
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-bare-metal", "ros-humble"] }
# User diagnostics route through `nros-log`; the dispatcher is installed by the
# board BoardEntry boot scaffold — this crate only registers its Logger handle.
nros-log = { path = "../../../../packages/core/nros-log", default-features = false }
# Generated message types (from package.xml via `nros generate-rust`).
std_msgs = { version = "*", default-features = false }

# Bare-metal Cortex-M entry: `nros::main!()` emits `#[cortex_m_rt::entry]` for
# the `stm32f4` deploy; the reset trampoline halts via `cortex_m::asm`.
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"

# Logging + panic. defmt + its global logger (defmt-rtt) are unconditional: the
# board crate logs via defmt and needs the `#[defmt::global_logger]`. The panic
# handler prints through defmt.
defmt = "0.3"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = 3
overflow-checks = false

# Phase 204.3 — size-critical build: `cargo build --profile size`. Same
# aggressive cross-crate inlining (lto=fat, codegen-units=1) as release but
# opt-level "s" (size) instead of 3 (speed) + stripped (no on-target debuginfo).
[profile.size]
inherits = "release"
opt-level = "s"
debug = false
strip = true

[profile.dev]
codegen-units = 1
debug = 2
incremental = false
opt-level = 1

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
