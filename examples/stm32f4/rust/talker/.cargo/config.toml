[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
rustflags = [
    "-C",
    "link-arg=-Tlink.x",
    # Phase 204.8 — dead-strip unreferenced code. The cc-rs vendor C (zenoh-pico)
    # is `-ffunction-sections -fdata-sections` (manifest) + rustc emits
    # per-function sections, so `--gc-sections` drops everything the final image
    # never calls (e.g. zenoh-pico link types the locator never selects).
    # cortex-m-rt's `link.x` KEEPs the vector table / essential sections.
    # rust-lld is invoked directly (no gcc driver), so pass `--gc-sections`
    # straight to the linker — NOT the `-Wl,` driver-prefixed form.
    "-C",
    "link-arg=--gc-sections",
]

# STM32F429ZI has 192K SRAM. Default arena (~74 KB) is sized for
# the worst-case `ActionClient` entry; this talker only owns one
# publisher and never registers callbacks, so pin the arena to the
# 4 KB floor.
[env]
NROS_EXECUTOR_MAX_CBS = "1"
NROS_EXECUTOR_ARENA_SIZE = "4096"
NROS_SUBSCRIPTION_BUFFER_SIZE = "512"

[patch.crates-io.builtin_interfaces]
path = "generated/builtin_interfaces"

[patch.crates-io.nros-core]
path = "../../../../packages/core/nros-core"

[patch.crates-io.nros-serdes]
path = "../../../../packages/core/nros-serdes"

[patch.crates-io.std_msgs]
path = "generated/std_msgs"
