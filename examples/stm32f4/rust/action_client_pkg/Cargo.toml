[package]
name = "stm32f4_action_client_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "STM32F4 action-client Node pkg — Inline-dispatch shape, board-agnostic"

# Phase 216.B.5 Node pkg shape — lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register / init / dispatch / tick
# trampolines; the framework Entry pkg (`action-client-rtic` for
# 216.B.5; a parallel `action-client-embassy` migration will follow
# once the C-wave catches up) brings up the executor + spin loop via
# `nros::main!()`.
#
# DISPATCH = Inline — unlike the sibling `action_server_pkg`, the
# client side has no callbacks on the spin path: the existing Pattern
# A `main.rs` polls for goal-accept / feedback / result via
# `try_recv*()` loops driven from an `async fn` in the Entry pkg's
# `#[rtic::app]`. The skeleton therefore picks `Inline` to match the
# `talker_pkg` / Inline-publisher precedent; the integration story
# (send_goal + poll bodies) is the follow-up TODO documented in
# `src/lib.rs`. Inline is the simpler matrix cell for `nros check`
# (Phase 216.D.1) — `(RTIC, Inline)` is the same cell `talker-rtic`
# uses.
[lib]
crate-type = ["rlib"]

[dependencies]
# Phase 216.B.5 — single `nros` dep matches the locked `nros::main!()`
# design (`book/src/internals/main-macro.md`). `example_interfaces` is
# intentionally absent: the B.5 skeleton reuses `PlaceholderAct` from
# the sibling `action_server_pkg` so the example compiles without
# `nros ws sync` materialising `generated/example_interfaces/` (which
# would also drag in `action_msgs` + `unique_identifier_msgs` +
# `builtin_interfaces`). A follow-up to the B-wave migration adds the
# real `example_interfaces` dep (and the matching
# `[package.metadata.ament]` depend rows) once the trampoline-
# registration story lands.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }

# Phase 216.B.5 — reuse the `PlaceholderAct` from the sibling
# `action_server_pkg` so the client + server wire shapes stay aligned
# by construction. When the real `example_interfaces::action::Fibonacci`
# lands (follow-up B wave), both pkgs flip together. The dep also
# pulls the same minimal compile surface the server pkg uses
# (`nros` default-features = false + `alloc`/`rmw-cffi`/
# `ros-humble`; the platform comes from the board the Entry pkg links,
# Phase 248 C6c).
stm32f4_action_server_pkg = { path = "../action_server_pkg" }

# Phase 216.B.5 — `defmt` used by `register()` for the placeholder
# `info!("Action client registered")` log. Real flash brings up the
# RTT transport via the Entry pkg's `defmt-rtt` global; the Node pkg
# only needs the `defmt` facade.
defmt = "0.3"

[package.metadata.nros.node]
class = "stm32f4_action_client_pkg::ActionClient"
name = "fibonacci_client"
default_namespace = "/"
# Phase 216.D.1 — explicit dispatch hint mirrors `Node::DISPATCH` in
# `src/lib.rs` (Inline; client polls `try_recv*()` from an async fn —
# no spin-thread callbacks). Read by `nros check`'s framework ×
# DispatchStrategy matrix.
dispatch = "inline"

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

# Phase 208.F1 — empty `[workspace]` table makes this pkg a standalone
# workspace root, mirroring the sibling Entry pkgs. Without it, a fresh
# `cargo check --target thumbv7em-none-eabihf` from inside the crate dir
# walks up into the nano-ros superproject workspace and trips the
# "current package believes it's in a workspace" guard.
[workspace]
