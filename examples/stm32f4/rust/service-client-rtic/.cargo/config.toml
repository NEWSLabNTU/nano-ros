[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C",
    "link-arg=-Tlink.x",
]

# STM32F429ZI has 192K SRAM. Default arena (~74 KB) is sized for
# the worst-case `ActionClient` entry; the service client owns one
# service callback, so pin it to the small service footprint.
[env]
# Issue 0024 — shrink the Phase 231 size-class large receive block from the
# 16384 default (2 x 4 x 16384 = 128 KiB) to 4096 (= 32 KiB) so the static
# blocks fit stm32f4 RAM (.bss/.uninit overflowed by ~37 KiB at the default).
ZPICO_SUBSCRIBER_LARGE_SIZE = "4096"
NROS_EXECUTOR_MAX_CBS = "1"
NROS_EXECUTOR_ARENA_SIZE = "8192"
NROS_SUBSCRIPTION_BUFFER_SIZE = "512"

[patch.crates-io]
action_msgs = { path = "generated/action_msgs" }  # nros-managed
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
example_interfaces = { path = "generated/example_interfaces" }  # nros-managed
nros-core = { path = "../../../../packages/core/nros-core" }  # nros-managed
nros-rmw-cyclonedds = { path = "../../../../packages/dds/nros-rmw-cyclonedds" }  # nros-managed
nros-serdes = { path = "../../../../packages/core/nros-serdes" }  # nros-managed
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }  # nros-managed

