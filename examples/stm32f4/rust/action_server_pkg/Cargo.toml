[package]
name = "stm32f4_action_server_pkg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "STM32F4 action-server Node pkg â€” Deferred-dispatch shape, board-agnostic"

# Phase 216.B.5 Node pkg shape â€” lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register / init / dispatch / tick
# trampolines; the framework Entry pkg (`action-server-rtic` for
# 216.B.5; a parallel `action-server-embassy` migration will follow
# once the C-wave catches up) brings up the executor + spin loop via
# `nros::main!()`. Like `listener_pkg` (Phase 216.C.5), this pkg
# declares `Node::DISPATCH = DispatchStrategy::Deferred` because
# action callbacks (goal / cancel / accepted) are exactly the
# Deferred-dispatch use case: the body wants to do async-shaped
# work (publish feedback, await a long-running goal) without
# blocking the spin task.
[lib]
crate-type = ["rlib"]

[dependencies]
# Phase 216.B.5 â€” single `nros` dep matches the locked `nros::main!()`
# design (`book/src/internals/main-macro.md`). `example_interfaces` is
# intentionally absent: the B.5 skeleton uses a tiny `PlaceholderAct`
# RosAction impl so the example compiles without `nros ws sync`
# materialising `generated/example_interfaces/` (which would also
# drag in `action_msgs` + `unique_identifier_msgs` + `builtin_interfaces`).
# A follow-up to the B-wave migration adds the real `example_interfaces`
# dep (and the matching `[package.metadata.ament]` depend rows) once the
# trampoline-registration story lands.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }

# Phase 216.B.5 â€” unlike `listener_pkg`, this Node pkg does NOT depend
# on `embassy-executor`. The RTIC Entry pkg's macro emit hands the
# Deferred dispatch off via an `rtic::Mutex`-guarded SPSC ring (not a
# `Spawner`), so the spawn-from-sync escape here is the RTIC
# `task::spawn()` API exposed via the board crate's runtime handle.
# That handle's type only exists in the Entry pkg's `#[rtic::app]`
# scope, so for now the placeholder body stores `()` and a follow-up
# wave of Phase 216.B threads the handle through.

# Phase 216.B.5 â€” `defmt` used by the action callback body for the
# placeholder `info!("Goal: ...")` log. Real flash brings up the RTT
# transport via the Entry pkg's `defmt-rtt` global; the Node pkg only
# needs the `defmt` facade.
defmt = "0.3"

[package.metadata.nros.node]
class = "stm32f4_action_server_pkg::ActionServer"
name = "fibonacci_server"
default_namespace = "/"
# Phase 216.D.1 â€” explicit dispatch hint mirrors `Node::DISPATCH` in
# `src/lib.rs` (Deferred). Action goal/cancel/accepted callbacks are
# Deferred-dispatch territory. Read by `nros check`'s framework Ă—
# DispatchStrategy matrix.
dispatch = "deferred"

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

# Phase 208.F1 â€” empty `[workspace]` table makes this pkg a standalone
# workspace root, mirroring the sibling Entry pkgs. Without it, a fresh
# `cargo check --target thumbv7em-none-eabihf` from inside the crate dir
# walks up into the nano-ros superproject workspace and trips the
# "current package believes it's in a workspace" guard.
[workspace]
