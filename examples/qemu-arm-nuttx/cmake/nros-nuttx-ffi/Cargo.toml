[workspace]

[package]
name = "nros-nuttx-ffi"
version = "0.1.0"
edition = "2024"
publish = false
description = "NuttX kernel + nros C/C++ FFI bundle for CMake-built examples"

[dependencies]
nros-board-nuttx-qemu-arm = { path = "../../../../packages/boards/nros-board-nuttx-qemu-arm" }
nros-c = { path = "../../../../packages/core/nros-c", features = [
    "std", "cffi-zenoh-cffi", "platform-nuttx", "link-tcp", "link-udp-unicast", "ros-humble"
] }
nros-cpp = { path = "../../../../packages/core/nros-cpp", features = [
    "std", "rmw-zenoh-cffi", "platform-nuttx", "link-tcp", "link-udp-unicast", "ros-humble"
] }
# Phase 115.L.x — link cffi shim directly so `register()` is callable
# from main.rs before app_main() jumps into C/C++ code.
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-nuttx", "link-tcp", "ros-humble"] }

[build-dependencies]
cc = "1"

[profile.release]
opt-level = "s"
lto = true
