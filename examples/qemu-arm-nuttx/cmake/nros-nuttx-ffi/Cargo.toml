[workspace]

[package]
name = "nros-nuttx-ffi"
version = "0.1.0"
edition = "2024"
publish = false
description = "NuttX kernel + nros C/C++ FFI bundle for CMake-built examples"

[dependencies]
nros-nuttx-qemu-arm = { path = "../../../../packages/boards/nros-nuttx-qemu-arm" }
nros-c = { path = "../../../../packages/core/nros-c", features = [
    "std", "rmw-zenoh", "platform-nuttx", "link-tcp", "link-udp-unicast", "ros-humble"
] }
nros-cpp = { path = "../../../../packages/core/nros-cpp", features = [
    "std", "rmw-zenoh", "platform-nuttx", "link-tcp", "link-udp-unicast", "ros-humble"
] }

[build-dependencies]
cc = "1"

[profile.release]
opt-level = "s"
lto = true
