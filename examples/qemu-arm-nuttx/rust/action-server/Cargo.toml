[package]
name = "nuttx-rs-action-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX QEMU ARM action server example using nros"

[[bin]]
name = "nuttx-rs-action-server"
test = false
bench = false

[dependencies]
nros-board-nuttx-qemu-arm = { path = "../../../../packages/boards/nros-board-nuttx-qemu-arm" }
# Phase 88.16.D — user diagnostics route through `nros-log`.
nros-log = { path = "../../../../packages/core/nros-log", default-features = false }
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-nuttx", "ros-humble"] }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-nuttx", "ros-humble"] }
example_interfaces = { version = "*", default-features = false }
heapless = "0.8"

[profile.release]
opt-level = "s"
lto = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
