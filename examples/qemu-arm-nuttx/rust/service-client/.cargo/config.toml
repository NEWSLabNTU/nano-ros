include = ["../../../../../nros-patch.toml"]
[build]
target = "armv7a-nuttx-eabihf"

[unstable]
build-std = ["std", "panic_abort"]
build-std-features = ["compiler-builtins-mem"]

[target.armv7a-nuttx-eabihf]
linker = "arm-none-eabi-gcc"
rustflags = [
    "-C", "link-arg=-mcpu=cortex-a7",
    "-C", "link-arg=-mfloat-abi=hard",
    "-C", "link-arg=-mfpu=neon-vfpv4",
]

[env]
CC_armv7a_nuttx_eabihf = "arm-none-eabi-gcc"
CFLAGS_armv7a_nuttx_eabihf = "-mcpu=cortex-a7 -mfloat-abi=hard -mfpu=neon-vfpv4"


# Phase 214.M — patched libc for build-std (post-`ws sync` fix-up
# from scripts/build/nuttx-libc-patch.sh). The pinned nightly's
# `std` references `libc::_SC_HOST_NAME_MAX`, which crates.io
# `libc 0.2.183` does not expose for the NuttX target. The patched
# fork at `third-party/nuttx/libc/` adds it. `nros-board.toml`
# declares this patch but `nros ws sync` 0.3.7 strips it from the
# rendered config — re-append until the upstream CLI is fixed.
[patch.crates-io]
libc = { path = "../../../../third-party/nuttx/libc" }
action_msgs = { path = "generated/action_msgs" }  # nros-managed
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
example_interfaces = { path = "generated/example_interfaces" }  # nros-managed
nros-platform = { path = "../../../../packages/core/nros-platform" }  # nros-managed
nros-rmw-cyclonedds = { path = "../../../../packages/dds/nros-rmw-cyclonedds" }  # nros-managed
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }  # nros-managed
