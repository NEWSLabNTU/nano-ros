[package]
name = "nuttx_rs_service_client"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX QEMU ARM AddTwoInts service client — Component pkg"

[lib]
crate-type = ["rlib", "staticlib"]

[dependencies]
nros = { version = "*", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-platform = { version = "*", default-features = false, features = ["platform-nuttx"] }
example_interfaces = { version = "*", default-features = false }
# Demo-parity log lines route through the `log` facade; the platform
# entry runtime owns the sink.
log = "0.4"

[package.metadata.nros.node]
class = "nuttx_rs_service_client::AddTwoIntsClient"
name = "service_client"
default_namespace = "/"

[package.metadata.nros.deploy.nuttx]
board = "qemu-armv7a-nsh"
target = "armv7a-nuttx-eabihf"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["example_interfaces"]
exec_depend = ["example_interfaces"]

[profile.release]
opt-level = "s"
lto = true

[workspace]
