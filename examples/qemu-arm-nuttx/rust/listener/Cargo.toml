[package]
name = "nuttx_rs_listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX QEMU ARM listener — Phase 212.L Component pkg"

[lib]
crate-type = ["rlib", "staticlib"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-nuttx"] }
std_msgs = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "nuttx_rs_listener::Listener"
name = "listener"
default_namespace = "/"

[package.metadata.nros.deploy.nuttx]
board = "qemu-armv7a-nsh"
target = "armv7a-nuttx-eabihf"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["std_msgs"]
exec_depend = ["std_msgs"]

[profile.release]
opt-level = "s"
lto = true

[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
