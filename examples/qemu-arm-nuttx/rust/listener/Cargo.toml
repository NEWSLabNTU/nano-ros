[package]
name = "nuttx_rs_listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX QEMU ARM listener — Phase 212.L Component pkg"

[lib]
crate-type = ["rlib", "staticlib"]

[dependencies]
nros = { version = "*", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-platform = { version = "*", default-features = false, features = ["platform-nuttx"] }
std_msgs = { version = "*", default-features = false }
# phase-277 W4 — chatter log lines (`Publishing:` / `I heard:`) route through
# the `log` facade; the platform entry runtime owns the sink.
log = "0.4"

[package.metadata.nros.node]
class = "nuttx_rs_listener::Listener"
name = "listener"
default_namespace = "/"

[package.metadata.nros.deploy.nuttx]
board = "qemu-armv7a-nsh"
target = "armv7a-nuttx-eabihf"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["std_msgs"]
exec_depend = ["std_msgs"]

[profile.release]
opt-level = "s"
lto = true

[workspace]
