[package]
name = "nuttx-rs-service-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX QEMU ARM service server example using nros"

[[bin]]
name = "nuttx-rs-service-server"
test = false
bench = false

[dependencies]
nros-board-nuttx-qemu-arm = { path = "../../../../../packages/boards/nros-board-nuttx-qemu-arm" }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh", "platform-nuttx", "link-tcp", "ros-humble"] }
example_interfaces = { version = "*", default-features = false }

[profile.release]
opt-level = "s"
lto = true
