[package]
name = "nuttx-rs-dds-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "DDS listener example on QEMU NuttX ARM (Phase 97.4.nuttx)"

[[bin]]
name = "nuttx-rs-dds-listener"
test = false
bench = false

[dependencies]
nros-board-nuttx-qemu-arm = { path = "../../../../../packages/boards/nros-board-nuttx-qemu-arm" }
# `alloc` (not `std`) so the dust-dds `nostd-runtime` path is selected
# instead of the `rtps_udp_transport` socket2 path. See the talker's
# Cargo.toml for the full rationale.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-dds-cffi", "platform-nuttx", "ros-humble"] }
# Phase 115.L.5 — cffi shim exposes dust-dds via `nros_rmw_vtable_t`.
nros-rmw-dds-cffi = { path = "../../../../../packages/dds/nros-rmw-dds-cffi", features = ["platform-nuttx"] }
std_msgs = { version = "*", default-features = false }
# See talker Cargo.toml for the rationale on the std-backed
# critical-section impl.
critical-section = { version = "1.2", default-features = false, features = ["std"] }

[profile.release]
opt-level = "s"
lto = true
