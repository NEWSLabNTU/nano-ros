[package]
name = "nuttx_rs_service_server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX QEMU ARM AddTwoInts service server — Phase 212.L Component pkg"

[lib]
crate-type = ["rlib", "staticlib"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-nuttx"] }
example_interfaces = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "nuttx_rs_service_server::AddTwoIntsServer"
name = "service_server"
default_namespace = "/"

[package.metadata.nros.deploy.nuttx]
board = "qemu-armv7a-nsh"
target = "armv7a-nuttx-eabihf"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["example_interfaces"]
exec_depend = ["example_interfaces"]

[profile.release]
opt-level = "s"
lto = true

[workspace]
