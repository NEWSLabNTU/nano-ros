[package]
name = "nuttx_rs_talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX QEMU ARM talker — Phase 212.L Component pkg"

# Phase 212.L.1 Component pkg shape — lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register trampoline; the generated
# runtime (driven by `nros codegen-system` via the integrations/nuttx
# H.2 adapter shim) owns the spin loop + executor.
[lib]
crate-type = ["rlib", "staticlib"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-nuttx"] }
std_msgs = { version = "*", default-features = false }

[package.metadata.nros.node]
class = "nuttx_rs_talker::Talker"
name = "talker"
default_namespace = "/"

[package.metadata.nros.deploy.nuttx]
board = "qemu-armv7a-nsh"
target = "armv7a-nuttx-eabihf"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["std_msgs"]
exec_depend = ["std_msgs"]

[profile.release]
opt-level = "s"
lto = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root (copy-out template promise + outer-workspace adoption guard).
[workspace]
