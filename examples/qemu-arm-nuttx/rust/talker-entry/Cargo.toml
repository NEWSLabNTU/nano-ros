[workspace]

[package]
name = "nuttx_rs_talker_entry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-2 — Entry pkg for the NuttX QEMU ARM talker Component pkg."

[[bin]]
name = "nuttx_rs_talker_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "nuttx"


# Phase 212.L.2 — deploy-target overlay. Per the L.2 spec
# (`Cargo.toml` carries `[package.metadata.nros.deploy.<board>]`
# with board / rmw / domain_id / locator), populated from the
# `nros-board-*` shim's config-default values.
[package.metadata.nros.deploy.nuttx]
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:8200"
[dependencies]
nuttx_rs_talker = { path = "../talker" }
# Phase 213.C.2 — `nros::main!()` proc-macro lives here.
nros = { version = "*", default-features = false }
# Phase 212.N.3 tier-1 per-board shim — provides
# `<QemuArmVirt as BoardEntry>::run` that owns init → executor open →
# `setup(runtime)` → spin → exit. The `BoardEntry` impl is gated
# `target_os = "nuttx"`; the rest (BoardInit/BoardPrint/BoardExit) is
# unconditional, so this Entry pkg `cargo check`s on host without a
# NuttX SDK and produces the real binary when cross-built for
# `armv7a-nuttx-eabihf`.
# #127: `rmw-zenoh` bakes the zenoh RMW backend into the image (the board's
# `run_entry` registers it explicitly — NuttX has no .init_array
# auto-register); without it `Executor::open` fails instantly with
# Transport(ConnectionFailed) before touching the network.
nros-board-nuttx-qemu-arm = { version = "*", features = ["rmw-zenoh"] }
# Phase 212.N.1 trait surface — `BoardEntry`, `RuntimeCtx`.
nros-platform = { version = "*", default-features = false }

# Sibling Component pkg dep deliberately NOT listed here — step-2
# ships with an empty launch.xml, so codegen emits no
# `nuttx_rs_talker::register(runtime)?` calls and the dep would only
# add weight. Matches the entry-poc pattern + the freertos / zephyr
# wave-4 siblings (see tmp/wave4/N.7.qemu-arm-freertos.md choice 5).
# Step-3+ adds the dep when launch.xml is populated.
