[build]
target = "armv7a-nuttx-eabihf"

[unstable]
build-std = ["std", "panic_abort"]
build-std-features = ["compiler-builtins-mem"]

# #127 — STATIC image-link args only (board-centric link convention,
# RFC-0032 "third leg"; SSoT: nros-board-nuttx-qemu-arm/nros-board.toml
# `cargo_config`). The dynamic pieces (processed dramboot.ld in the board
# OUT_DIR, the vectortab+builtins-stub boot archive, the -L search dirs
# for OUT_DIR / $NUTTX_DIR/staging / arch/arm/src/board) PROPAGATE from
# `nros-board-nuttx-qemu-arm`'s build.rs. ZERO entry build.rs.
# The cpu flags make the gcc driver pick the cortex-a7 hard-float multilib,
# so the trailing `-lgcc` resolves the ARM intrinsics without an absolute
# `-print-libgcc-file-name` path. `-Tdramboot.ld` is by NAME — GNU ld
# resolves it through the propagated `-L` search path. The kernel libs are
# mutually recursive -> `--start-group`; the Rust rlibs precede this group,
# so libsched's `nsh_main` reference resolves to the board crate's.
[target.armv7a-nuttx-eabihf]
linker = "arm-none-eabi-gcc"
rustflags = [
    "-C", "link-arg=-mcpu=cortex-a7",
    "-C", "link-arg=-mfloat-abi=hard",
    "-C", "link-arg=-mfpu=neon-vfpv4",
    "-C", "link-arg=-Tdramboot.ld",
    "-C", "link-arg=--entry=__start",
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-nodefaultlibs",
    "-C", "link-arg=-Wl,--start-group",
    "-C", "link-arg=-lsched",
    "-C", "link-arg=-ldrivers",
    "-C", "link-arg=-lboards",
    "-C", "link-arg=-lc",
    "-C", "link-arg=-lmm",
    "-C", "link-arg=-larch",
    "-C", "link-arg=-lxx",
    "-C", "link-arg=-lapps",
    "-C", "link-arg=-lnet",
    "-C", "link-arg=-lcrypto",
    "-C", "link-arg=-lfs",
    "-C", "link-arg=-lbinfmt",
    "-C", "link-arg=-lopenamp",
    "-C", "link-arg=-lboard",
    "-C", "link-arg=-lgcc",
    "-C", "link-arg=-Wl,--end-group",
]

[env]
CC_armv7a_nuttx_eabihf = "arm-none-eabi-gcc"
CFLAGS_armv7a_nuttx_eabihf = "-mcpu=cortex-a7 -mfloat-abi=hard -mfpu=neon-vfpv4"

[patch.crates-io]
# #127 blocker-1: the patched libc for build-std lives UNDER this single
# [patch.crates-io] table — never a second `[patch.crates-io]` header
# (duplicate table -> invalid TOML). The pinned nightly's `std` references
# `libc::_SC_HOST_NAME_MAX`, which crates.io libc does not define for NuttX;
# the fork at third-party/nuttx/libc adds it. Path is relative to the
# invocation cwd (this example dir), not the config file. Untagged (no
# `# nros-managed` suffix), so `nros ws sync` preserves it as a user key.
libc = { path = "../../../../third-party/nuttx/libc" }
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
nros = { path = "../../../../packages/core/nros" }  # nros-managed
nros-board-nuttx-qemu-arm = { path = "../../../../packages/boards/nros-board-nuttx-qemu-arm" }  # nros-managed
nros-core = { path = "../../../../packages/core/nros-core" }  # nros-managed
nros-platform = { path = "../../../../packages/core/nros-platform" }  # nros-managed
nros-serdes = { path = "../../../../packages/core/nros-serdes" }  # nros-managed
std_msgs = { path = "generated/std_msgs" }  # nros-managed
