[workspace]

[package]
name = "nuttx_rs_action_client_entry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-2 — Entry pkg for the NuttX QEMU ARM action-client Component pkg."

[[bin]]
name = "nuttx_rs_action_client_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "nuttx"


# Phase 212.L.2 — deploy-target overlay. Per the L.2 spec
# (`Cargo.toml` carries `[package.metadata.nros.deploy.<board>]`
# with board / rmw / domain_id / locator), populated from the
# `nros-board-*` shim's config-default values.
[package.metadata.nros.deploy.nuttx]
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:7452"
[dependencies]
nuttx_rs_action_client = { path = "../action-client" }
# Phase 213.C.2 — `nros::main!()` proc-macro lives here.
nros = { path = "../../../../packages/core/nros", default-features = false }
nros-board-nuttx-qemu-arm = { path = "../../../../packages/boards/nros-board-nuttx-qemu-arm" }
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false }

# Sibling Component pkg dep deliberately omitted in step-2 — see the
# talker_entry sibling Cargo.toml for rationale.
