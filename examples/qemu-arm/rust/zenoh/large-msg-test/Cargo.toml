[package]
name = "qemu-bsp-large-msg-test"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "QEMU large message publish test using nros-mps2-an385"

[[bin]]
name = "qemu-bsp-large-msg-test"
test = false
bench = false

[features]
default = []
docker = ["nros-mps2-an385/docker"]

[dependencies]
# Board crate for hardware + network init
nros-mps2-an385 = { path = "../../../../../packages/boards/nros-mps2-an385" }

# nros Executor API
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["rmw-zenoh", "platform-bare-metal", "link-tcp"] }

# Generated message types
std_msgs = { version = "*", default-features = false }

# Panic handler
panic-semihosting = { version = "0.6", features = ["exit"] }
