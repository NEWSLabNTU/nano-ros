# Zephyr Rust examples build via `west build`, which invokes Corrosion →
# cargo under its own environment. Without this pin, Corrosion picks up
# the workspace's root `rust-toolchain.toml` (stable, thumbv7em target),
# which misses the features the Zephyr Rust integration relies on.
#
# Matches `examples/qemu-arm-nuttx/rust-toolchain.toml`'s pattern. Bump
# to a newer nightly when the Zephyr examples or zephyr-lang-rust
# require it — run `just zephyr test` after any change to confirm.
[toolchain]
channel = "nightly-2026-04-11"
# Phase 208 — `clippy` added: the Zephyr build runs `cargo clippy` on the
# user crate via the `run_rust_clippy` CMake target (zephyr-lang-rust). Without
# it `west build` aborts: "cargo-clippy is not installed for the toolchain".
components = ["rust-src", "rustfmt", "clippy"]
# aarch64-unknown-none — the FVP AEMv8-R lane (issue #216: the lane rotted
# to E0463 "can't find crate for `core`" because this pin lacked the target;
# rustup auto-installs the targets listed here on first use).
targets = ["x86_64-unknown-none", "armv7a-none-eabi", "armv7a-none-eabihf", "aarch64-unknown-none"]
