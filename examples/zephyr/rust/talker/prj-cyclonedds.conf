# RMW overlay: Cyclone DDS backend (Phase 169.5).
#
# Cyclone DDS source is C++ (libcyclonedds-cxx + nros-rmw-cyclonedds
# register glue), so CONFIG_CPP=y is required even for Rust callers
# — the C++ register entry is wrapped behind `extern "C"` in
# `nros_rmw_cyclonedds.h` and the Rust shim crate
# `nros-rmw-cyclonedds-sys` re-exposes it as a normal extern fn.

CONFIG_NROS_RMW_CYCLONEDDS=y
CONFIG_CPP=y
CONFIG_NROS_CYCLONE_DOMAIN_ID=0

# RTPS uses UDP multicast for SPDP discovery.
CONFIG_NET_IPV4_IGMP=y
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16
CONFIG_MAX_PTHREAD_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16

# Resource sizing — Cyclone is heavy.
CONFIG_MAIN_STACK_SIZE=524288
CONFIG_HEAP_MEM_POOL_SIZE=4194304
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

CONFIG_NET_PKT_RX_COUNT=64
CONFIG_NET_PKT_TX_COUNT=64
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128
CONFIG_PICOLIBC_ASSERT_VERBOSE=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
CONFIG_THREAD_CUSTOM_DATA=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_THREAD_LOCAL_STORAGE=y
