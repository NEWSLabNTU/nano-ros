# SPDX-License-Identifier: Apache-2.0
# nros Zephyr XRCE Talker Example (Rust)
#
# A ROS 2 compatible publisher running on Zephyr RTOS using XRCE-DDS backend.

[package]
# Phase 112.F: package name is descriptive; the staticlib still outputs
# `librustapp.a` via [lib] name to satisfy zephyr-lang-rust's hard-coded
# linker expectation. Workaround until upstream zephyr-lang-rust accepts
# a parameterized library name.
name = "nros_zephyr_xrce_talker"
version = "0.1.0"
edition = "2021"
description = "nros XRCE talker for Zephyr RTOS"
license = "Apache-2.0"

[lib]
name = "rustapp"
crate-type = ["staticlib"]

[dependencies]
# Zephyr support from zephyr-lang-rust module
zephyr = "0.1.0"
log = "0.4"

# nros unified API (patched to local via .cargo/config.toml)
nros = { version = "*", default-features = false, features = ["rmw-xrce", "platform-zephyr"] }

# Generated message types (patched to local via .cargo/config.toml)
std_msgs = { version = "*", default-features = false }

[features]
default = []

[profile.release]
opt-level = "s"
lto = true
debug = false

# Phase 92.4a — same shape as samples/philosophers. zephyr-build at
# build-dep level wires Kconfig values into Rust `cfg` flags, which
# is required for embedded ARM (Cortex-A) targets; native_sim doesn't
# need it but stays compatible.
[build-dependencies]
zephyr-build = "0.1.0"
