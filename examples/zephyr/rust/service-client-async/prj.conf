# Base config: common subset across zenoh / dds / xrce. RMW choice +
# RMW-specific resource sizing come from prj-<rmw>.conf overlays.

CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

CONFIG_LOG_BACKEND_RTT=n
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_DNS_RESOLVER=n

CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

CONFIG_NROS=y
CONFIG_NROS_RUST_API=y

CONFIG_NET_LOG=y
CONFIG_NET_STATISTICS=y
