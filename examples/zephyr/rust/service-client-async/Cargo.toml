# SPDX-License-Identifier: Apache-2.0
# nros Zephyr Service Client Async Example (Rust) — Phase 212.M.3 deferred.
#
# Embassy-async driven; the Component / ExecutableComponent traits do not
# yet model an async callback shape, so this example stays on the legacy
# `rust_main` + `Executor` pattern until the async-Component seam ships
# (follow-up wave; tracked alongside the imperative service-client call
# seam in `nros::CallbackCtx`/`TickCtx`). All other Zephyr Rust examples
# have migrated to the Phase 212.L.1 Component pkg shape.

[package]
name = "nros_zephyr_service_client_async"
version = "0.1.0"
edition = "2021"
description = "nros service-client-async for Zephyr RTOS (multi-RMW)"
license = "MIT OR Apache-2.0"

[lib]
name = "rustapp"
crate-type = ["staticlib"]

[features]
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]

[dependencies]
# `time-driver` is required by DDS path; harmless for zenoh.
zephyr = { version = "0.1.0", features = ["executor-zephyr", "time-driver"] }
log = "0.4"

nros = { version = "*", default-features = false, features = ["rmw-cffi", "platform-zephyr"] }

nros-rmw-zenoh = { version = "*", default-features = false, features = ["platform-zephyr", "ros-humble"], optional = true }

# Embassy async runtime + timer + static cell.
embassy-executor = { version = "0.7", default-features = false, features = ["task-arena-size-262144"] }
embassy-time = { version = "0.4", features = ["tick-hz-1_000"] }
static_cell = "2"

example_interfaces = { version = "*", default-features = false }

[build-dependencies]
zephyr-build = "0.1.0"

[profile.release]
opt-level = "s"
lto = true
debug = false

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
[patch.crates-io]
action_msgs = { path = "build/nros_generator_rs/action_msgs" }
builtin_interfaces = { path = "build/nros_generator_rs/builtin_interfaces" }
example_interfaces = { path = "build/nros_generator_rs/example_interfaces" }
unique_identifier_msgs = { path = "build/nros_generator_rs/unique_identifier_msgs" }

# nros-* runtime crates
nros = { path = "../../../../packages/core/nros" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
nros-platform = { path = "../../../../packages/core/nros-platform" }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi" }
nros-node = { path = "../../../../packages/core/nros-node" }
nros-rmw = { path = "../../../../packages/core/nros-rmw" }
nros-rmw-cffi = { path = "../../../../packages/core/nros-rmw-cffi" }
nros-log = { path = "../../../../packages/core/nros-log" }
nros-macros = { path = "../../../../packages/core/nros-macros" }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }
# === END nros-managed [patch.crates-io] ===
