# Phase 217.D.1 — App-level Zephyr base config for the Rust talker on
# the FVP AEMv8-R Cortex-A SMP target.
#
# `nano_ros_use_board(fvp-aemv8r-smp)` layers
# `packages/boards/nros-board-fvp-aemv8r-smp/{prj.conf,boards/*}` ahead
# of this file — the board crate already brings in CONFIG_NROS / Rust /
# POSIX / net / kernel sizes / SMP + NUM_CPUS / eth driver / RNG.
#
# This file is the base layer (no RMW selection). Cyclone-DDS-specific
# Kconfig lives in `prj-cyclonedds.conf` — kept separate so this example
# stays shape-parallel with `examples/zephyr/rust/talker/` (prj.conf +
# prj-<rmw>.conf overlay) even though this carve-out is single-RMW.

# Sample tag — the build smoke greps for this in the boot banner.
CONFIG_LOG_BACKEND_RTT=n
