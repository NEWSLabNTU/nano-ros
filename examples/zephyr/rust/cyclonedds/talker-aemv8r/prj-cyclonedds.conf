# Phase 217.D.1 — RMW overlay: Cyclone DDS backend on Zephyr.
#
# Mirrors `examples/zephyr/rust/talker/prj-cyclonedds.conf` minus the
# native_sim NSOS knobs (FVP uses the real ethernet driver pulled by
# the board crate's `boards/fvp_baser_aemv8r_*.conf` overlay, which sets
# CONFIG_ETH_DRIVER=y).
#
# Cyclone DDS is C++ (libcyclonedds-cxx + nros-rmw-cyclonedds register
# glue), so CONFIG_CPP=y is required even for Rust callers — the C++
# register entry is wrapped behind `extern "C"` in
# `nros_rmw_cyclonedds.h` and the Rust shim crate
# `nros-rmw-cyclonedds-sys` re-exposes it as a normal extern fn.

CONFIG_NROS_RMW_CYCLONEDDS=y
CONFIG_CPP=y
CONFIG_NROS_CYCLONE_DOMAIN_ID=0

# RTPS uses UDP multicast for SPDP discovery.
CONFIG_NET_IPV4_IGMP=y
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=256
CONFIG_MAX_PTHREAD_COND_COUNT=256
CONFIG_POSIX_THREAD_THREADS_MAX=16

# Resource sizing — Cyclone is heavy. Override the board crate's more
# conservative defaults (main stack 16 KiB, heap 128 KiB).
CONFIG_MAIN_STACK_SIZE=524288
CONFIG_HEAP_MEM_POOL_SIZE=4194304
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

CONFIG_NET_PKT_RX_COUNT=64
CONFIG_NET_PKT_TX_COUNT=64
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128

# Phase 11W — universal Cyclone-DDS-on-Zephyr bool configs
# (THREAD_LOCAL_STORAGE / THREAD_CUSTOM_DATA / DYNAMIC_THREAD(+ALLOC) /
# THREAD_STACK_INFO / THREAD_MONITOR / NET_TCP) are `select`ed by
# CONFIG_NROS_RMW_CYCLONEDDS in zephyr/Kconfig — no need to repeat.
#
#   COMMON_LIBC_MALLOC_ARENA_SIZE — Cyclone's participant init does
#     many small mallocs; the default trips ddsrt_malloc → abort().
#     16 MiB gives ample headroom.
#   DYNAMIC_THREAD_STACK_SIZE — per-worker-thread stack.
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=16777216
CONFIG_DYNAMIC_THREAD_STACK_SIZE=32768

# NET_TCP — sockwaitset self-pipe. Kept here because selecting it from
# NROS_RMW_CYCLONEDDS forms a Kconfig dependency loop through
# NET_SOCKETS.
CONFIG_NET_TCP=y

# Diagnostics — verbose asserts + immediate logging keep Cyclone init
# failures legible (picolibc drops fprintf(stderr)).
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
CONFIG_PICOLIBC_ASSERT_VERBOSE=y
CONFIG_LOG_MODE_IMMEDIATE=y
