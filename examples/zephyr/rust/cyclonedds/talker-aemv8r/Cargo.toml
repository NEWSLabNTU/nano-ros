# SPDX-License-Identifier: Apache-2.0
# Phase 217.D.1 — Rust talker on ARM FVP Base_RevC AEMv8-R (Cortex-A
# SMP) under Zephyr. Rust-side sibling of
# `examples/zephyr/cpp/cyclonedds/talker-aemv8r/`.
#
# Shape mirrors `examples/zephyr/rust/talker/Cargo.toml` (Phase 212.M.3
# component pkg; `nros::node!()` exports node hooks and
# `nros::zephyr_component_main!()` provides the Zephyr `rust_main`).
#
# This example is the FVP-specific carve-out: pinned to the single
# board id `fvp_baser_aemv8r/fvp_aemv8r_aarch64/smp` + the Cyclone DDS
# RMW. The board-agnostic `examples/zephyr/rust/talker/` keeps the
# Cargo features for RMW switching; this example only exposes
# `rmw-cyclonedds`.

[package]
name = "nros_zephyr_aemv8r_cyclonedds_talker_rs"
version = "0.1.0"
edition = "2021"
description = "nano-ros Rust talker on ARM FVP AEMv8-R Cortex-A SMP (Cyclone DDS, Zephyr 3.7)"
license = "MIT OR Apache-2.0"

[lib]
name = "rustapp"
crate-type = ["rlib", "staticlib"]

[features]
default = ["rmw-cyclonedds"]
# Phase 248 C6g — RMW is selected by config and the FVP board's CMake glue
# (Cyclone DDS Zephyr module, `CONFIG_NROS_RMW_CYCLONEDDS=y`) links the concrete
# backend, NOT a Rust `nros rmw-*` dep. This row is now an inert build-target
# marker, kept so EXTRA_CARGO_ARGS `--features rmw-cyclonedds` still resolves;
# it no longer forwards `nros rmw-*`. (#60 T5)
rmw-cyclonedds = []

[dependencies]
zephyr = "0.1.0"
log = "0.4"

nros = { version = "*", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Concrete platform vtable — the Zephyr board/CMake also links it; kept explicit
# for the Rust link map. NOT the agnostic-forbidden `nros platform-*`.
nros-platform = { version = "*", default-features = false, features = ["platform-zephyr"] }

std_msgs = { version = "*", default-features = false }

[build-dependencies]
zephyr-build = "0.1.0"
# phase-291 (#211) — shared Kconfig→rustc-env bake (locator/domain/XRCE);
# resolved by the `nros sync` leaf-local patch.
nros-zephyr-build = "*"

# Phase 212.L.1 Component pkg metadata. `class` matches the
# `<pkg-name>::<UserClass>` shape that `nros check` enforces.
[package.metadata.nros.node]
class = "nros_zephyr_aemv8r_cyclonedds_talker_rs::Talker"
name = "aemv8r_talker"
default_namespace = "/"

# Phase 212.L.2 deploy-target overlay — pinned to the FVP AEMv8-R
# board + Cyclone DDS RMW.
[package.metadata.nros.deploy.zephyr]
board = "fvp_baser_aemv8r/fvp_aemv8r_aarch64/smp"
rmw = "cyclonedds"
domain_id = 0

[package.metadata.ament]
build_depend = ["std_msgs"]
exec_depend = ["std_msgs"]

[profile.release]
opt-level = "s"
lto = true
debug = false

# Phase 208.F1 — empty `[workspace]` table makes this example a
# standalone workspace root (per the CLAUDE.md "Examples = Standalone
# Projects" contract).
[workspace]
