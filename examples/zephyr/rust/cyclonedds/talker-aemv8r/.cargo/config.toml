include = ["../../../../../../nros-patch.toml"]
# Phase 217.D.1 — pin SPDP unicast locator + mcast TX iface for the
# Cyclone DDS RMW; harmless for other backends (read only by
# `nros-platform-zephyr`). Same shape as
# `examples/zephyr/rust/talker/.cargo/config.toml`.
[env]
NROS_LOCAL_IPV4 = "127.0.0.10"
NROS_LOCAL_IPV4_BYTES = "127,0,0,10"

[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
nros-platform = { path = "../../../../../packages/core/nros-platform" }  # nros-managed
nros-zephyr-build = { path = "../../../../../packages/core/nros-zephyr-build" }  # nros-managed
std_msgs = { path = "generated/std_msgs" }  # nros-managed
