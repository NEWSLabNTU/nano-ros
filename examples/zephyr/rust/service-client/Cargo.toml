# SPDX-License-Identifier: Apache-2.0
# nros Zephyr Service Client Example (Rust) — Phase 212.M.3 Component pkg.
#
# Phase 226 follow-up shape — the component crate owns Zephyr's
# `rust_main` via `nros::zephyr_component_main!()`, while
# `nros::node!()` exports the node registration and dispatch hooks.
#
# RMW selection still flows through the Kconfig overlay (`prj-<rmw>.conf`)
# → CMakeLists.txt EXTRA_CARGO_ARGS for now.

[package]
name = "nros_zephyr_service_client"
version = "0.1.0"
edition = "2021"
description = "nros service-client for Zephyr RTOS (Component pkg, multi-RMW)"
license = "MIT OR Apache-2.0"

[lib]
name = "rustapp"
crate-type = ["rlib", "staticlib"]

[features]
default = ["rmw-zenoh"]
# Phase 248 C6g — RMW is selected by config and the Zephyr board's CMake C-port
# (zenoh-pico Zephyr module / Cyclone CMake) links the concrete backend, NOT a
# Rust `nros rmw-*` dep. These rows are now inert build-target markers, kept so
# the Zephyr `CMakeLists.txt` EXTRA_CARGO_ARGS `--features rmw-<x>` still
# resolves; they no longer forward `nros rmw-*`. (#60 T5)
rmw-zenoh = []
rmw-cyclonedds = []
rmw-xrce = []

[dependencies]
zephyr = "0.1.0"
log = "0.4"

nros = { version = "*", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Concrete platform vtable — the Zephyr board/CMake also links it; kept explicit
# for the Rust link map. NOT the agnostic-forbidden `nros platform-*`.
nros-platform = { version = "*", default-features = false, features = ["platform-zephyr"] }

example_interfaces = { version = "*", default-features = false }

[build-dependencies]
zephyr-build = "0.1.0"

# Phase 212.L.1 Component pkg metadata. `class` MUST match the
# `<pkg-name>::<UserClass>` shape that `nros check` (L.4) enforces.
[package.metadata.nros.node]
class = "nros_zephyr_service_client::AddTwoIntsClient"
name = "service_client"
default_namespace = "/"

[package.metadata.nros.deploy.zephyr]
board = "native_sim/native/64"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["example_interfaces"]
exec_depend = ["example_interfaces"]

[profile.release]
opt-level = "s"
lto = true
debug = false

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
