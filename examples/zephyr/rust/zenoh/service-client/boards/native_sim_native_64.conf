# Board-specific config for native_sim/native/64
# Client role uses zeth1 (server uses zeth0)

CONFIG_ETH_NATIVE_POSIX_DRV_NAME="zeth1"

# Slow down simulated time to match real wall-clock time.
# Without this, zenoh-pico query timeouts (z_get) expire at CPU speed
# while network I/O through TAP takes real wall-clock time, causing
# service calls to time out before replies arrive.
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y
