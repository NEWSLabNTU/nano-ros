# SPDX-License-Identifier: Apache-2.0
# nros Zephyr Action Server Example (Rust) — Phase 212.M.3 Component pkg.
#
# Phase 212.L.1 shape — lib only, no `rust_main` entry. `nros::node!()`
# exports the register trampoline; the generated runtime (`system_main.c`,
# emitted by `nros codegen-system` via the H.1 Zephyr adapter shim — both
# L.7 self-bringup planner + M-F.3 Zephyr self-pkg case LANDED — invoked
# from this pkg's CMakeLists.txt via
# `nros_system_generate(${CMAKE_CURRENT_SOURCE_DIR})`) owns init, executor
# open, RMW registration, and the spin loop.
#
# RMW selection still flows through the Kconfig overlay (`prj-<rmw>.conf`)
# → CMakeLists.txt EXTRA_CARGO_ARGS for now. The H.1 shim reads the
# Kconfig `CONFIG_NROS_RMW_*` choice and threads it into the codegen
# `--target zephyr-<rmw>` arg; `[package.metadata.nros.deploy.zephyr].rmw`
# is the planner-side default when the Kconfig is unset.

[package]
name = "nros_zephyr_action_server"
version = "0.1.0"
edition = "2021"
description = "nros action-server for Zephyr RTOS (Component pkg, multi-RMW)"
license = "MIT OR Apache-2.0"

[lib]
name = "rustapp"
crate-type = ["rlib", "staticlib"]

[features]
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-cyclonedds = ["dep:nros-rmw-cyclonedds-sys"]
rmw-xrce  = ["dep:nros-rmw-xrce-cffi"]

[dependencies]
zephyr = "0.1.0"
log = "0.4"

nros = { version = "*", default-features = false, features = ["rmw-cffi", "platform-zephyr"] }

nros-rmw-zenoh = { version = "*", default-features = false, features = ["platform-zephyr", "ros-humble"], optional = true }
nros-rmw-cyclonedds-sys = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys", default-features = false, optional = true }
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", default-features = false, optional = true }

example_interfaces = { version = "*", default-features = false }
heapless = "0.8"

[build-dependencies]
zephyr-build = "0.1.0"

# Phase 212.L.1 Component pkg metadata. `class` MUST match the
# `<pkg-name>::<UserClass>` shape that `nros check` (L.4) enforces.
[package.metadata.nros.node]
class = "nros_zephyr_action_server::FibonacciServer"
name = "action_server"
default_namespace = "/"

[package.metadata.nros.deploy.zephyr]
board = "native_sim/native/64"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["example_interfaces"]
exec_depend = ["example_interfaces"]

[profile.release]
opt-level = "s"
lto = true
debug = false

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
action_msgs = { path = "generated/action_msgs" }
builtin_interfaces = { path = "generated/builtin_interfaces" }
example_interfaces = { path = "generated/example_interfaces" }
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
nros = { path = "../../../../packages/core/nros" }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }
# === END nros-managed [patch.crates-io] ===
