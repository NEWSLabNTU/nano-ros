# SPDX-License-Identifier: Apache-2.0
# nros Zephyr DDS Listener Example (Rust) — Phase 71.8

[package]
# Name must be "rustapp" for zephyr-lang-rust integration
name = "rustapp"
version = "0.1.0"
edition = "2024"
description = "nros DDS listener for Zephyr RTOS"
license = "Apache-2.0"

[lib]
crate-type = ["staticlib"]

[dependencies]
zephyr = "0.1.0"
log = "0.4"

nros = { version = "*", default-features = false, features = ["rmw-dds", "platform-zephyr"] }

std_msgs = { version = "*", default-features = false }

[features]
default = []

[profile.release]
opt-level = "s"
lto = true
debug = false
