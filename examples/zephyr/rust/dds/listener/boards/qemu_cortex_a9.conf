# Phase 92 — qemu_cortex_a9 networking overlay (listener)
# Mirror of the talker overlay; differs only in static IPv4 so the two
# guests aren't on the same address.

CONFIG_NET_QEMU_ETHERNET=y
CONFIG_ETH_XLNX_GEM=y

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.2"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_IPV4_IGMP=y
CONFIG_NET_IF_MCAST_IPV4_ADDR_COUNT=4

# Heap + libc malloc arena — Rust global allocator on Zephyr calls
# picolibc malloc(), backed by COMMON_LIBC_MALLOC_ARENA_SIZE. dust-dds
# needs ~1 MiB.
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=1048576
CONFIG_HEAP_MEM_POOL_SIZE=524288

CONFIG_EXTRA_EXCEPTION_INFO=y
CONFIG_FAULT_DUMP=2

# ARMv7-A exception stacks: qemu_cortex_a9_defconfig sets these to
# 8 KiB. Rust formatting + dust-dds setup overflow that. Bumping
# them across the board gives headroom.
CONFIG_ARMV7_EXCEPTION_STACK_SIZE=32768
CONFIG_ARMV7_FIQ_STACK_SIZE=32768
CONFIG_ARMV7_SVC_STACK_SIZE=32768
CONFIG_ARMV7_SYS_STACK_SIZE=32768
CONFIG_ISR_STACK_SIZE=32768
