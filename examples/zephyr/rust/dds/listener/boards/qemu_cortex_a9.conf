# Phase 92 — qemu_cortex_a9 networking overlay (listener)
# Mirror of the talker overlay; differs only in static IPv4 so the two
# guests aren't on the same address.

CONFIG_NET_QEMU_ETHERNET=y
CONFIG_ETH_XLNX_GEM=y

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.2"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_IPV4_IGMP=y
CONFIG_NET_IF_MCAST_IPV4_ADDR_COUNT=4

CONFIG_HEAP_MEM_POOL_SIZE=8388608
