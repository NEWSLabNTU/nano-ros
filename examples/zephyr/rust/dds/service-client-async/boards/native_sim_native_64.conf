# Native Sim Offloaded Sockets (NSOS) — uses host kernel BSD sockets
# instead of TAP devices. No bridge/root needed. Multiple instances work.
CONFIG_ETH_NATIVE_POSIX=n
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y

# Zephyr's malloc on native_sim is backed by picolibc's COMMON_LIBC_MALLOC
# arena. dust-dds + heapless message queues hit ~256 KB easily; size up.
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=4194304
