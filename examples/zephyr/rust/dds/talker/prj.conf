# nros Zephyr DDS Talker (Rust) Configuration — Phase 71.8

# =============================================================================
# General
# =============================================================================
CONFIG_MAIN_STACK_SIZE=131072
CONFIG_HEAP_MEM_POOL_SIZE=524288
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
# Detect stack overflows so future regressions don't silently corrupt
# the saved interrupt-return PC and reboot us into z_arm_reset.
CONFIG_HW_STACK_PROTECTION=y
CONFIG_STACK_SENTINEL=y

# =============================================================================
# Rust Support (zephyr-lang-rust)
# =============================================================================
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

CONFIG_LOG_BACKEND_RTT=n

# =============================================================================
# Logging
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# =============================================================================
# Networking
# =============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# RTPS uses UDP multicast for SPDP discovery (239.255.0.1:7400+250·domain).
CONFIG_NET_IPV4_IGMP=y

# Network buffers — DDS RTPS may fragment large messages across many
# datagrams; size generously.
CONFIG_NET_PKT_RX_COUNT=64
CONFIG_NET_PKT_TX_COUNT=64
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128
CONFIG_NET_MAX_CONTEXTS=16

CONFIG_NET_L2_ETHERNET=y

CONFIG_DNS_RESOLVER=n

# =============================================================================
# POSIX API (BSD sockets, mutex, cond — used by nros-platform-zephyr)
# =============================================================================
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16
CONFIG_MAX_PTHREAD_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16

# =============================================================================
# Timing
# =============================================================================
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# =============================================================================
# nros Module
# =============================================================================
CONFIG_NROS=y
CONFIG_NROS_RUST_API=y
CONFIG_NROS_RMW_DDS=y
CONFIG_NROS_DDS_DOMAIN_ID=0

# =============================================================================
# Logging detail
# =============================================================================
CONFIG_NET_LOG=y
CONFIG_NET_STATISTICS=y
