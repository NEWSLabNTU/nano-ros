# Phase 180.C — nano-ros C talker as a Zephyr sample (Twister-discoverable).
#
# Discovered via the module mechanism: `samples:` in the repo's
# zephyr/module.yml lists this dir, so `zephyr_module.py` emits a
# `-T <repo>/examples/zephyr/c/talker` arg to Twister automatically.
#
# RMW is selected with the module-contributed snippet (Zephyr 4.x): the
# `nros-zenoh` SNIPPET appends the RMW Kconfig fragment — the 4.x-native
# equivalent of the legacy `-DCONF_FILE="...;prj-zenoh.conf"` overlay.
# native_sim NSOS comes from the auto-applied boards/native_sim_*.conf.
#
# build_only: this is a build-coverage sample. A single talker image has
# no peer to receive from, so we assert the boot banner only (the data
# plane is exercised by the nros-tests Zephyr E2E suite, which pairs
# talker+listener with a zenohd router).
sample:
  name: nano-ros C Talker
  description: nano-ros ROS 2 publisher (C API) on Zephyr, zenoh RMW
common:
  tags:
    - nano-ros
    - nros
  harness: console
  harness_config:
    type: one_line
    regex:
      - "nros Zephyr C Talker"
tests:
  sample.nano-ros.c.talker.zenoh:
    build_only: true
    platform_allow:
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - SNIPPET=nros-zenoh
