# SPDX-License-Identifier: Apache-2.0
# nano-ros Zephyr Action Client Example (Rust)
#
# A ROS 2 compatible action client running on Zephyr RTOS using nano-ros API.

[package]
# Name must be "rustapp" for zephyr-lang-rust integration
name = "rustapp"
version = "0.1.0"
edition = "2024"
description = "nano-ros action client for Zephyr RTOS"
license = "Apache-2.0"

[lib]
crate-type = ["staticlib"]

[dependencies]
# Zephyr support from zephyr-lang-rust module
zephyr = "0.1.0"
log = "0.4"

# nano-ros unified API (patched to local via .cargo/config.toml)
nano-ros = { version = "*", default-features = false, features = ["platform-zephyr"] }

# Generated message types (patched to local via .cargo/config.toml)
example_interfaces = { version = "*", default-features = false }

[features]
default = []

[profile.release]
opt-level = "s"
lto = true
debug = false
