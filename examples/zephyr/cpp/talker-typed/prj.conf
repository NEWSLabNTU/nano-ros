# Base config (Phase 168.4 collapsed shape). RMW choice + RMW-specific
# sizing come from prj-<rmw>.conf overlays.

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=n

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_DNS_RESOLVER=n

CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

CONFIG_NROS=y
CONFIG_NROS_CPP_API=y
CONFIG_STD_CPP14=y
# Issue #58: nros-cpp parameter.hpp (242.3) includes <initializer_list>; the
# toolchain libstdc++ headers are only on the include path with full libcpp.
CONFIG_REQUIRES_FULL_LIBCPP=y

CONFIG_NET_LOG=y
CONFIG_NET_STATISTICS=y
