# RMW overlay: Cyclone DDS backend (Phase 117 / 169.5).
#
# Cyclone DDS is C++-only (depends on NROS_CPP_API). The C side
# can't select it.

CONFIG_NROS_RMW_CYCLONEDDS=y
CONFIG_NROS_CYCLONE_DOMAIN_ID=0

# RTPS uses UDP multicast for SPDP discovery.
CONFIG_NET_IPV4_IGMP=y
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=256
CONFIG_MAX_PTHREAD_COND_COUNT=256
CONFIG_POSIX_THREAD_THREADS_MAX=16

# Resource sizing — Cyclone is heavy.
CONFIG_MAIN_STACK_SIZE=524288
CONFIG_HEAP_MEM_POOL_SIZE=4194304
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

CONFIG_NET_PKT_RX_COUNT=64
CONFIG_NET_PKT_TX_COUNT=64
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128

# Phase 11W.12 — runtime parity with the Rust cyclonedds overlay.
# The universal bool configs (THREAD_LOCAL_STORAGE / THREAD_CUSTOM_DATA
# / DYNAMIC_THREAD(+ALLOC) / THREAD_STACK_INFO / THREAD_MONITOR) come
# from CONFIG_NROS_RMW_CYCLONEDDS in zephyr/Kconfig. The int knobs +
# native_sim NSOS offload are example-local:
#   COMMON_LIBC_MALLOC_ARENA_SIZE — Cyclone's participant init does
#     many small mallocs; the ARCH_POSIX default (16 KiB) trips
#     ddsrt_malloc → CODE_UNREACHABLE in picolibc libc-hooks. 16 MiB
#     gives ample headroom.
#   DYNAMIC_THREAD_STACK_SIZE — per-worker-thread stack.
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=16777216
CONFIG_DYNAMIC_THREAD_STACK_SIZE=32768

# NET_TCP — sockwaitset self-pipe (loopback TCP socket pair). Kept
# here because selecting it from NROS_RMW_CYCLONEDDS forms a Kconfig
# dependency loop through NET_SOCKETS.
CONFIG_NET_TCP=y

# Diagnostics — verbose asserts + immediate logging keep Cyclone init
# failures legible (picolibc drops fprintf(stderr)).
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
CONFIG_PICOLIBC_ASSERT_VERBOSE=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Phase 11W.8 — force NSOS (board overlay not auto-applied under
# explicit CONF_FILE). Host BSD sockets instead of zeth/TAP.
# native_sim-only; real hardware uses its actual net stack.
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
