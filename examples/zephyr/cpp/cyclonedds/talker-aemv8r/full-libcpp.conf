# Phase 189.D — FVP full-libstdc++ regression profile.
#
# Layered via EXTRA_CONF_FILE on top of prj.conf to mirror the Autoware
# safety-island actuation build's C library / C++ runtime: full newlib +
# the GNU libstdc++ (not Zephyr's minimal libcpp). This is the profile a
# real downstream C++ application uses on fvp_baser_aemv8r, and it is what
# exercises the Phase 189 fixes that the default minimal-libcpp build never
# touches:
#   - 189.A / 189.C — the cxx-compat shims must defer to the real libstdc++
#     (<atomic>/<chrono>/<utility>/<cstdlib>/...) pulled in by nros-cpp +
#     Cyclone TUs; with minimal libcpp the shims are needed and never collide.
#   - 189.B — net.c multicast join (struct ip_mreq vs ip_mreqn) under newlib.
#   - 189.F — zpico-zephyr net_if IPv4 version gate.
#   - 189.G — Cyclone ddsrt POSIX weak stubs (recvmsg / pthread_* / _open).
#
# Build-coverage only: a regression guard so nano-ros CI catches a re-break of
# the consumable-on-FVP-with-full-libstdc++ profile. Runtime exercised by the
# downstream consumer (Autoware safety-island), not here.
CONFIG_NEWLIB_LIBC=y
CONFIG_GLIBCXX_LIBCPP=y
