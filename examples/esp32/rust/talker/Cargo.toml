[package]
name = "esp32-bsp-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "ESP-IDF talker example — Phase 212.M.7 Entry pkg"

# Phase 212.M.7 — migrated from `platform-bare-metal` (esp-hal /
# `nros-board-esp32`) to the ESP-IDF `idf.py` workflow via the
# `integrations/nano-ros/` component shell. The crate is a staticlib
# linked into the IDF `main` component, exposing `rust_app_main()`
# which `main/app_main.c` calls after IDF boot. The nros runtime
# (Executor, Publisher, etc.) is provided by the `integrations/
# nano-ros` shim's nros-rmw-xrce-cffi staticlib + C ABI — the
# example's Rust crate is a minimal stub mirroring the H.5 fixture
# shape until Wi-Fi bring-up + real Pub/Sub wiring lands (follow-up).
[lib]
name       = "esp32_bsp_talker"
crate-type = ["staticlib", "rlib"]

[package.metadata.nros.entry]
# Phase 212.L.2 — Entry pkg metadata (Bringup pkg retired). The board
# corresponds to the ESP-IDF target the user selects via
# `idf.py set-target esp32c3`; deploy carries the RMW + locator.
name      = "talker"
deploy    = "esp32-c3"
rmw       = "xrce"
domain_id = 0
# Locator points at the host bridge; users override in `sdkconfig`
# / Kconfig overlays per their Wi-Fi network.
locator   = "tcp/192.168.1.1:7447"

[package.metadata.ament]
build_depend = ["std_msgs"]
exec_depend  = ["std_msgs"]

# Phase 204.11 release profile reconcile — debug-assertions off,
# fat-LTO + single codegen unit so the staticlib stays compact.
[profile.release]
debug             = false
debug-assertions  = false
lto               = "fat"
codegen-units     = 1
opt-level         = "s"
panic             = "abort"

# Phase 208.F1 — empty `[workspace]` table makes this example a
# standalone workspace root (copy-out template promise + outer-
# workspace adoption guard).
[workspace]

