# Phase 212.M.7 — ESP-IDF build via `idf.py`. Corrosion drives the
# Rust target + rustflags from CMake (`integrations/nano-ros/
# CMakeLists.txt` sets `Rust_CARGO_TARGET` per `IDF_TARGET`), so this
# file deliberately omits `[build] target = …` and any linker-script
# rustflags — those would conflict with IDF's own linker.
#
# `--cfg=portable_atomic_unsafe_assume_single_core` is required for
# riscv32imc transitive `portable-atomic` consumers; the integration
# shim documents the workspace-level dispatch (see
# `<repo-root>/.cargo/config.toml`). This stub crate has no
# dependencies, so the cfg is unused here — it's wired only if
# follow-up work pulls nros core into the staticlib directly.
[target.riscv32imc-unknown-none-elf]
rustflags = ["--cfg=portable_atomic_unsafe_assume_single_core"]
