[target.riscv32imc-unknown-none-elf]
runner = "espflash flash --monitor"
rustflags = [
  "-C", "link-arg=-Tlinkall.x",
  "-C", "force-frame-pointers",
]

[build]
target = "riscv32imc-unknown-none-elf"

[env]
ESP_LOG = "info"
NROS_EXECUTOR_MAX_CBS = "1"
NROS_EXECUTOR_MAX_NODES = "1"
NROS_EXECUTOR_ARENA_SIZE = "8192"
NROS_SUBSCRIPTION_BUFFER_SIZE = "512"

[unstable]
build-std = ["core", "alloc"]

[patch.crates-io.builtin_interfaces]
path = "generated/builtin_interfaces"

[patch.crates-io.nros-core]
path = "../../../../../packages/core/nros-core"

[patch.crates-io.nros-serdes]
path = "../../../../../packages/core/nros-serdes"

[patch.crates-io.std_msgs]
path = "generated/std_msgs"
