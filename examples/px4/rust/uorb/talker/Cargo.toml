[package]
name = "px4_rs_talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "PX4 nano-ros talker example — publishes SensorPing via uORB (Phase 99 typed loan API)"

[lib]
crate-type = ["staticlib"]
doctest = false

[dependencies]
# `no_std` chain — no `std` feature anywhere in the closure. The
# Phase 99.L redesign of nros-rmw-uorb dropped the `alloc` feature
# from the publish/subscribe path entirely; everything lives in the
# Executor's static arena.
nros-node            = { path = "../../../../../packages/core/nros-node", default-features = false, features = ["rmw-uorb"] }
nros-px4             = { path = "../../../../../packages/px4/nros-px4", default-features = false }
px4-log              = { path = "../../../../../third-party/px4/px4-rs/crates/px4-log", default-features = false }
px4-sys              = { path = "../../../../../third-party/px4/px4-rs/crates/px4-sys", default-features = false }
px4-uorb             = { path = "../../../../../third-party/px4/px4-rs/crates/px4-uorb", default-features = false }
px4-msg-macros       = { path = "../../../../../third-party/px4/px4-rs/crates/px4-msg-macros" }

[profile.release]
panic = "abort"
opt-level = "s"
lto = "fat"
strip = "symbols"

[profile.dev]
panic = "abort"
