[package]
name = "px4-offboard-companion"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "PX4 XRCE-DDS companion: subscribe /fmu/out/vehicle_odometry, publish /fmu/in/offboard_control_mode (RFC-0039 Track B / Phase 233)"

[[bin]]
name = "offboard-companion"
path = "src/main.rs"

# Companion runs on the host (or a peer MCU) beside PX4, not in firmware.
[package.metadata.nros.application]
deploy = ["px4"]

[features]
# XRCE-DDS only — this is the companion path (peer of PX4's uxrce_dds_client).
# Phase 277 W3.b — single-RMW example: the backend dep is unconditional
# (below). `rmw-xrce` is kept as a no-op feature name so existing
# `--features rmw-xrce` invocations (just/px4.just) keep working.
default = ["rmw-xrce"]
rmw-xrce = []

[dependencies]
nros = { version = "*", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-rmw-xrce-cffi = { version = "*", default-features = false, features = ["std"] }
nros-platform-cffi = { version = "*", features = ["posix-c-port"] }

# Generated CDR `px4_msgs::msg::*` (from the PX4 `.msg` tree via
# `nros generate-px4-msgs`; trimmed to the two topics this example touches).
px4_msgs = { version = "*", default-features = false, features = ["std"] }

log = "0.4"
env_logger = "0.11"

# Empty `[workspace]` table — standalone copy-out template (see the native
# examples' note). Canonical in-tree builds also pass via the root `exclude`.
[workspace]

[patch.crates-io]
# px4_msgs is generated from the PX4-Autopilot .msg tree by `nros
# generate-px4-msgs` (just px4 build-fixtures) — this row is maintained by
# hand, outside the nros-managed block (`nros sync` leaves it alone).
px4_msgs = { path = "generated/px4_msgs" }
