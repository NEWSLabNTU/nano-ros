[package]
name = "px4-stub"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Fake-PX4 XRCE-DDS stub: publishes /fmu/out/vehicle_odometry so the companion example (and CI) can exercise the round-trip without PX4 SITL (RFC-0039 Track B / Phase 233)"

[[bin]]
name = "px4-stub"
path = "src/main.rs"

[package.metadata.nros.application]
deploy = ["px4"]

[features]
# Phase 277 W3.b — single-RMW example: the xrce backend dep is unconditional
# (below). `rmw-xrce` is kept as a no-op feature name so existing
# `--features rmw-xrce` invocations (just/px4.just) keep working.
default = ["rmw-xrce"]
rmw-xrce = []

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-rmw-xrce-cffi = { path = "../../../../../packages/xrce/nros-rmw-xrce-cffi", default-features = false, features = ["std"] }
nros-platform-cffi = { path = "../../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
px4_msgs = { version = "*", default-features = false, features = ["std"] }
log = "0.4"
env_logger = "0.11"

[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
px4_msgs = { path = "generated/px4_msgs" }
nros-core = { path = "../../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
