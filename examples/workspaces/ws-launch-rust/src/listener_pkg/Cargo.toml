[package]
name = "listener_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — subscribes the relative topic `chatter`, republishes the count on `heard`."

[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "listener_pkg::Listener"
name = "listener"
default_namespace = "/"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
std_msgs = { version = "*", default-features = false }
