[package]
name = "reading_talker_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — publishes the in-workspace custom_msgs/Reading on /reading."

[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "reading_talker_pkg::ReadingTalker"
name = "reading_talker"
default_namespace = "/"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
# In-workspace custom interface package — generated by `nros ws sync` into
# `generated/custom_msgs`, resolved through the auto-managed [patch.crates-io].
custom_msgs = "*"
