# phase-281 W3c — base config for the Zephyr C RT-tiers workspace entry (ctrl + telem).
# RMW choice + RMW-specific sizing come from the prj-<rmw>.conf overlay. Mirrors the
# workspaces/c/src/zephyr_entry base (the proven C Zephyr entry shape).

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_DNS_RESOLVER=n

CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

CONFIG_NROS=y
# CRITICAL (phase-281 W3c): the RT-tiers node code is C (NROS_C_COMPONENT), so C_API is
# required. The W3a seam (zephyr_run_tiers.c → nros_board_zephyr_run_tiers) is gated on
# `CONFIG_NROS_C_API OR CONFIG_NROS_CPP_API` in zephyr/CMakeLists.txt, so C_API alone pulls
# the seam; without either the link fails on `nros_board_zephyr_run_tiers`.
CONFIG_NROS_C_API=y
# The TYPED Zephyr entry is C++ (it drives the C tier nodes via ZephyrBoard::run_tiers), so
# the nros-cpp header surface must be on the app include path and the entry compiles as C++14.
CONFIG_NROS_CPP_API=y
CONFIG_STD_CPP14=y

CONFIG_NET_LOG=y
CONFIG_NET_STATISTICS=y
