# phase-264 W4a/W4b (RFC-0004 §10) — parameterised-node showcase bringup.
#
# The launch `<param>` initials are COMPILE-BAKED by `nros::main!` and read at
# `register` time via `ctx.param(...)` (W4a). `[param_services]` (W4b) tells the macro
# to also register the 6 ROS 2 parameter services + seed a volatile RAM store from the
# baked initials, so `ros2 param list/get/set` works against the running node —
# reconfigured values live until the next boot (persistence out of scope, issue 0080).
# No `[lifecycle]`: this is a plain (unmanaged) parameterised node.

[system]
name = "param_demo"
rmw = "zenoh"
domain_id = 0
default_launch = "system.launch.xml"

# W4b — declare the ROS 2 parameter services (`ros2 param get/set`). Presence is the
# switch; the Entry enables `nros/param-services` so the registration compiles in.
[param_services]

[[component]]
pkg = "param_talker_pkg"
class = "param_talker_pkg::ParamTalker"
name = "param_talker"

[deploy.native]
kind = "self"
target = "x86_64-unknown-linux-gnu"
