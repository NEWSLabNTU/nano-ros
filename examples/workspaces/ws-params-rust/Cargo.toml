# phase-264 W4a — parameterised-node showcase workspace (RFC-0004 §10).
#
# The launch `<param>` initials are COMPILE-BAKED by `nros::main!` and read at
# `register` time via `ctx.param(...)`; the node's timer period comes from the launch
# file with no per-app glue and no extra `nros` feature. The first WORKSPACE
# (plain-cargo) parameter demo — enabled by phase-264 W4a teaching the macro to bake
# `<param>` values and seed them into NodeContext.

[workspace]
resolver = "2"
members = [
    "src/param_talker_pkg",
    "src/native_entry",
]
# `demo_bringup` is declarative (no Cargo.toml) and is NOT a member.

[workspace.metadata.nros]
default_system = "demo_bringup"

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../packages/core/nros-core" }
nros-serdes = { path = "../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
