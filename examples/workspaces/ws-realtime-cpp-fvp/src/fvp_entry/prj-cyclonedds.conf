# phase-292 W1.a — Cyclone DDS RMW selection for the FVP workspace entry.
# Matches the board crate's NROS_BOARD_DEFAULT_RMW (cyclonedds) — the RMW the
# ASI reference consumer ships. Kept as a separate overlay for shape-parity
# with the other workspace entries (prj.conf + prj-<rmw>.conf).

CONFIG_NROS_RMW_CYCLONEDDS=y

# Heap budget — DDS participant + per-topic descriptors + two tier nodes'
# message buffers (mirrors the single-app cpp talker-aemv8r board overlay).
# phase-298 W1 (issue 0232) — Cyclone spawns ~8 worker threads whose 32 KiB
# DYNAMIC_THREAD stacks are allocated from this heap (DYNAMIC_THREAD_POOL_SIZE=0),
# ~256 KiB just for stacks; 192 KiB overflowed it (pthread_create -> "tid in
# use" / ddsrt_thread_create failed panic). Match the nros-cyclonedds snippet's
# 4 MiB (the value the working ASI image uses).
CONFIG_HEAP_MEM_POOL_SIZE=4194304

# RNG — the FVP has no entropy peripheral; the test PRNG is the only
# `sys_rand_get` backend.
CONFIG_TEST_RANDOM_GENERATOR=y
