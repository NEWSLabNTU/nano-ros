# phase-292 W1.a — FVP AEMv8-R workspace C++ RT-tiers entry config.
#
# Layered ON TOP of the board crate's base prj.conf
# (packages/boards/nros-board-fvp-aemv8r-smp/prj.conf), which already carries
# the kernel/pthread sizing, POSIX API, ethernet networking, and logging for
# this target. This fragment only (a) flips the app language surface from the
# board default (Rust) to C++, and (b) enables the RT-tiers seam.

# This is a C++ entry — the board base conf targets the Rust talker and
# enables the zephyr-lang-rust module; a C++ consumer (the ASI shape) must
# switch it off or the build drags in the whole cargo toolchain.
CONFIG_RUST=n
CONFIG_NROS_RUST_API=n

# C++ Support
CONFIG_CPP=y
CONFIG_STD_CPP14=y

# nros C + C++ APIs. CRITICAL (phase-281 W3b): the RT-tiers entry drives the
# tier nodes via ZephyrBoard::run_tiers; the W3a seam (zephyr_run_tiers.c →
# nros_board_zephyr_run_tiers) is gated on `CONFIG_NROS_C_API OR
# CONFIG_NROS_CPP_API` in zephyr/CMakeLists.txt.
CONFIG_NROS_C_API=y
CONFIG_NROS_CPP_API=y
