        priority: 80
      freertos:
        priority: 5
    low:
      spin_period_us: 100000
      posix:
        priority: 10
      freertos:
        priority: 2
        # phase-296 W5.11 — placement dim on FreeRTOS: pin the LOW (spawned)
        # tier to core 0. The mps2-an385 target is uniprocessor (no
        # configUSE_CORE_AFFINITY), so the board seam logs the LOUD "core pin
