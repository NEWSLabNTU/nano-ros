# Canonical 3-role nano-ros workspace template.
#
#   src/talker_pkg/    — Node pkg (lib, `nros::node!`), publishes /chatter.
#   src/listener_pkg/  — Node pkg (lib, `nros::node!`), subscribes /chatter.
#   src/demo_bringup/  — Bringup pkg (declarative: package.xml + system.toml
#                        + launch/*.launch.xml). No Cargo.toml — NOT a member.
#   src/native_entry/  — Entry pkg (bin, `nros::main!(launch = "demo_bringup:...")`).
#   src/*_entry/       — alternate Entry pkgs for platform builds.
#
# See README.md for the copy-out / build / plan / check / launch flow.

[workspace]
resolver = "2"
members = [
    "src/talker_pkg",
    "src/listener_pkg",
    "src/native_entry",
    "src/qemu_freertos_entry",
    "src/threadx_linux_entry",
]
# `demo_bringup` is declarative (no Cargo.toml) and is NOT a member.
# The pkg-index walks `package.xml` anywhere under the workspace root.
#
# `src/zephyr_entry` is a Zephyr `west build` app (a `staticlib`
# exporting `rust_main`, built for a Zephyr target — not plain cargo),
# so it is `exclude`d from the cargo workspace rather than listed as a
# member. It deliberately carries NO `[workspace]` table of its own so
# the `nros::main!` macro's pkg-index still resolves the sibling node
# pkgs against THIS workspace root (see src/zephyr_entry/Cargo.toml).
exclude = ["src/zephyr_entry"]

[workspace.metadata.nros]
default_system = "demo_bringup"

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../packages/core/nros-core" }
nros-serdes = { path = "../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
