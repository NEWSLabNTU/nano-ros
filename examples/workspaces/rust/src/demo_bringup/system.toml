# Bringup pkg system descriptor — declarative topology + per-target
# deploy config. No Cargo.toml / CMakeLists.txt / src/ lives here.
#
# `default_launch` is the launch file `nros::main!(launch = "demo_bringup")`
# (or `nros plan demo_bringup` with no explicit file) picks by default.

[system]
name = "demo"
rmw = "zenoh"
domain_id = 0
default_launch = "system.launch.xml"

[[component]]
pkg = "talker_pkg"
class = "talker_pkg::Talker"
name = "talker"

[[component]]
pkg = "listener_pkg"
class = "listener_pkg::Listener"
name = "listener"

# phase-263 A1 — service round-trip components. Listed in the catalog; only the
# `showcase.launch.xml` runs them (the default `system.launch.xml` stays
# talker+listener). `add_client` calls `add_server` on /add_two_ints each tick
# and republishes the sum on /sum.
[[component]]
pkg = "service_server_pkg"
class = "service_server_pkg::AddServer"
name = "add_server"

[[component]]
pkg = "service_client_pkg"
class = "service_client_pkg::AddClient"
name = "add_client"

# phase-263 A4 — action round-trip components. Like the service pair, only the
# `showcase.launch.xml` runs them. `fibonacci_client` sends one goal to
# `fibonacci_server` on /fibonacci and republishes the final number on
# /fib_result.
[[component]]
pkg = "action_server_pkg"
class = "action_server_pkg::FibonacciServer"
name = "fibonacci_server"

[[component]]
pkg = "action_client_pkg"
class = "action_client_pkg::FibonacciClient"
name = "fibonacci_client"

[deploy.native]
kind = "self"
target = "x86_64-unknown-linux-gnu"

# Phase 211.F — per-host deploy targets for the multi-host launch
# (`launch/multihost.launch.xml`: talker on robot1, listener on robot2). The
# target id matches the launch `<node machine="…">` id, so each maps onto its
# host's bake: `nros codegen entry --host robot1` (or
# `nros::main!(launch="demo_bringup:multihost.launch.xml", host="robot1")`)
# builds robot1's binary, deployed via `[deploy.robot1]`. (RFC-0004 §4 home;
# NOT a root nros.toml — see issue #51.)
[deploy.robot1]
kind = "self"
target = "x86_64-unknown-linux-gnu"
launch = "multihost.launch.xml"

[deploy.robot2]
kind = "self"
target = "x86_64-unknown-linux-gnu"
launch = "multihost.launch.xml"
