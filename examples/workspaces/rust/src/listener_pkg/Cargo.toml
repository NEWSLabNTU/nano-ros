[package]
name = "listener_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — subscribes to std_msgs/Int32 on /chatter."

# Node pkg shape — lib only. `nros::node!()` exports the register /
# init / dispatch trampolines; sibling Entry pkgs own the executor +
# spin loop via `nros::main!()`.
[lib]
path = "src/lib.rs"

# Phase 248 C6a (#60 T5) — Node pkgs are platform/RMW-AGNOSTIC. The old
# `native/freertos/threadx-linux/nuttx/zephyr/esp32` matrix is gone: platform +
# RMW flow from the BOARD crate the sibling Entry pkg deps. See talker_pkg for
# the full rationale.

[package.metadata.nros.node]
class = "listener_pkg::Listener"
name = "listener"
default_namespace = "/"

[dependencies]
# Single platform/RMW-agnostic `nros` dep — `alloc` baseline + the rmw-cffi
# vtable seam only; the board crate links the concrete RMW backend.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
std_msgs = { version = "*", default-features = false }
