[package]
name = "listener_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — subscribes to std_msgs/Int32 on /chatter."

# Node pkg shape — lib only. `nros::node!()` exports the register /
# init / dispatch trampolines; sibling Entry pkgs own the executor +
# spin loop via `nros::main!()`.
[lib]
path = "src/lib.rs"

[features]
default = ["native"]
native = ["nros/alloc", "nros/rmw-cffi", "nros/platform-posix", "nros/ros-humble"]
freertos = ["nros/alloc", "nros/rmw-cffi", "nros/platform-freertos", "nros/ros-humble"]
threadx-linux = ["nros/std", "nros/rmw-cffi", "nros/platform-threadx", "nros/ros-humble"]
nuttx = ["nros/std", "nros/rmw-cffi", "nros/platform-nuttx", "nros/ros-humble"]
zephyr = ["nros/alloc", "nros/rmw-cffi", "nros/platform-zephyr", "nros/ros-humble"]
# ESP32-C3 / riscv32imc bare-metal — see talker_pkg for the rationale.
esp32 = ["nros/alloc", "nros/rmw-cffi", "nros/platform-bare-metal", "nros/ros-humble"]

[package.metadata.nros.node]
class = "listener_pkg::Listener"
name = "listener"
default_namespace = "/"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false }
std_msgs = { version = "*", default-features = false }
