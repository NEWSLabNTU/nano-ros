[package]
name = "action_client_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — calls example_interfaces/Fibonacci on /fibonacci, republishes the result on /fib_result."

# Node pkg shape — lib only. `nros::node!()` exports the register / init /
# dispatch trampolines; the sibling Entry pkg brings up the executor + spin.
[lib]
path = "src/lib.rs"

# Platform/RMW-agnostic Node pkg. Platform + RMW flow from the board crate the
# Entry pkg deps; this lib names neither.
[package.metadata.nros.node]
class = "action_client_pkg::FibonacciClient"
name = "fibonacci_client"
default_namespace = "/"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
example_interfaces = { version = "*", default-features = false }
std_msgs = { version = "*", default-features = false }
