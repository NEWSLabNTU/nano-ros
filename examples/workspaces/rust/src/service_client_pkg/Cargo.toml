[package]
name = "service_client_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — calls AddTwoInts on /add_two_ints, publishes the sum on /sum."

[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "service_client_pkg::AddClient"
name = "add_client"
default_namespace = "/"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
example_interfaces = { version = "*", default-features = false }
std_msgs = { version = "*", default-features = false }
