# RMW overlay: Micro-XRCE-DDS backend.

CONFIG_NROS_RMW_XRCE=y
CONFIG_NROS_XRCE_AGENT_ADDR="127.0.0.1"
CONFIG_NROS_XRCE_AGENT_PORT=2018

# XRCE uses UDP to reach the agent (no TCP needed) — but the base
# transport-posix-udp.c also pulls TCP headers; keep TCP on for the
# same reason zenoh does.
CONFIG_NET_TCP=y

# XRCE-DDS doesn't require POSIX threads — Kconfig in
# `nros-rmw-xrce-cffi` already gates the platform-zephyr feature.

# Resource sizing — XRCE is lighter than DDS, heavier than zenoh.
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64

CONFIG_NET_SHELL=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_DEBUG=y
