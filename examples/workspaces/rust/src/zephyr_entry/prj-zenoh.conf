# RMW overlay: zenoh-pico backend.

CONFIG_NROS_RMW_ZENOH=y

# Zenoh-pico uses TCP to reach zenohd.
CONFIG_NET_TCP=y

# zenoh-pico thread + mutex requirements.
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16

# Resource sizing — zenoh-pico is lighter than DDS. The two-node Entry
# opens one executor + one session shared by both nodes.
# COMMON_LIBC_MALLOC_ARENA_SIZE (2026-07-03): the Rust global allocator
# (zephyr-lang-rust) wraps libc malloc — picolibc's arena, default 16 KiB.
# `Executor::open` on current main heap-allocates its ~75 KiB backing
# (phase-271 externalised storage), which kernel-panics against the default
# ("memory allocation of 75080 bytes failed"). native_sim runs on host RAM,
# so size it generously.
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=1048576
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64

CONFIG_NET_SHELL=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_DEBUG=y
