# Entry pkg ‚Äî boots the `demo_bringup` demo topology on the CI-runnable
# ESP32-C3 QEMU (OpenETH) board.
#
# Phase 225.O ‚Äî the Entry source is the same one-line
# `nros::main!(launch = ...)` the native / freertos / threadx / zephyr
# entries use. The macro routes `deploy = "esp32-qemu"` to the
# `Framework::Esp32` emit shape, which emits a `#[esp_hal::main] fn
# main() -> !` (esp-riscv-rt's `_start` requires the esp-hal entry
# registration ‚Äî a bare `extern "C" fn main` does not boot) that
# delegates to the board crate's real-runtime `BoardEntry::run`.
#
# Built via plain `cargo build -p esp32_entry --target
# riscv32imc-unknown-none-elf` with nightly + `-Z build-std` (supplied
# per-row by the fixtures.toml `env` + the workspace `.cargo/config.toml`
# `[target.riscv32imc-unknown-none-elf]` block), so it is a normal cargo
# workspace member (unlike the west-built `zephyr_entry`).

[package]
name = "esp32_entry"
version = "0.1.0"
edition = "2024"
publish = false
description = "Entry pkg ‚Äî boots the demo topology on ESP32-C3 QEMU (OpenETH)."

[[bin]]
name = "esp32_entry"
path = "src/main.rs"
test = false
bench = false

# Entry pkg metadata ‚Äî `deploy = "esp32-qemu"` routes the `nros::main!()`
# proc-macro onto the `Framework::Esp32` emit branch and feeds
# `nros check`.
[package.metadata.nros.entry]
deploy = "esp32-qemu"

[package.metadata.nros.deploy.esp32-qemu]
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:9830"

[dependencies]
# Phase 248 C6a (#60 T5) ‚Äî agnostic `nros` (alloc + rmw-cffi vtable + ROS
# edition). The old `platform-bare-metal` marker is an empty no-op feature; the
# concrete platform (`platform-esp32-qemu`) AND the zenoh backend come from the
# board crate. `nros` names neither rmw nor platform.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }

# CI-runnable ESP32-C3 QEMU board crate ‚Äî supplies `Esp32QemuEntry`
# (real-runtime `BoardEntry`) + hardware/transport bringup + the
# `esp_bootloader_esp_idf` re-export used for the app descriptor. It is the
# RMW+platform selection point: `rmw-zenoh` (default-on) links+registers the
# zenoh backend and brings `nros-platform/platform-esp32-qemu`.
nros-board-esp32-qemu = { path = "../../../../../packages/boards/nros-board-esp32-qemu", features = ["rmw-zenoh"] }

# Required for the `#[esp_hal::main]` proc-macro path the macro emits.
esp-hal = { version = "~1.0.0", features = ["esp32c3", "unstable"] }

# Panic handler (required for no_std).
esp-backtrace = { version = "~0.18.0", features = ["esp32c3", "panic-handler", "println"] }

# Node pkg rlibs (platform/RMW-agnostic) ‚Äî the launch XML names `talker` +
# `listener`, so the macro emits both `register` calls; the bin links both.
talker_pkg = { path = "../talker_pkg", default-features = false }
listener_pkg = { path = "../listener_pkg", default-features = false }

# Phase 204.11 ‚Äî release profile matches the single-node esp32 example:
# drop debug-assertions out of release, no debuginfo in the flashed
# image, lto=fat + codegen-units=1 for size.
[profile.release]
debug = false
debug-assertions = false
lto = "fat"
codegen-units = 1
