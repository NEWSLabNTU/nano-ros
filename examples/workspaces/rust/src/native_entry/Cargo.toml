[package]
name = "native_entry"
version = "0.1.0"
edition = "2024"
publish = false
description = "Entry pkg — boots the demo topology against the native board."

[[bin]]
name = "native_entry"
path = "src/main.rs"

# Entry pkg — `[package.metadata.nros.entry] deploy = "native"` routes
# the `nros::main!()` proc-macro onto the native board emit branch
# (`<NativeBoard as BoardEntry>::run`). The deploy key also feeds
# `nros check`. The `launch = "demo_bringup:system.launch.xml"` form
# in `src/main.rs` makes the macro walk the workspace pkg-index, parse
# the launch XML, and emit one `<node_pkg>::register(runtime)?;` call
# per `<node>` entry — so the bin must link both Node pkg rlibs below.
[package.metadata.nros.entry]
deploy = "native"

[dependencies]
# Phase 248 C6a (#60 T5) — agnostic `nros`: alloc + rmw-cffi vtable + ROS
# edition only. Platform (`platform-posix`) AND the concrete RMW backend are
# brought by the board crate below; the umbrella names neither.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
# Board crate — supplies the `NativeBoard` ZST the macro-emitted
# `<NativeBoard as BoardEntry>::run(...)` call resolves (`deploy = "native"` →
# `nros_board_native::NativeBoard`) AND is the RMW+platform selection point:
# `features = ["rmw-zenoh"]` self-links+registers the zenoh backend
# (`RMW_INIT_ENTRIES`) and brings `nros-platform/platform-posix` into the graph.
nros-board-native = { path = "../../../../../packages/boards/nros-board-native", features = ["rmw-zenoh"] }
# Node pkg rlibs (platform/RMW-agnostic) — the launch XML names `talker` +
# `listener`, so the macro emits both `register` calls; the bin links both.
talker_pkg = { path = "../talker_pkg", default-features = false }
listener_pkg = { path = "../listener_pkg", default-features = false }
