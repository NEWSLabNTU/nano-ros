[package]
name = "native_default_entry"
version = "0.1.0"
edition = "2024"
publish = false
description = "Entry pkg — boots the demo topology using the Bringup default launch."

[[bin]]
name = "native_default_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "native"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "platform-posix",
    "ros-humble",
] }
nros-board-native = { path = "../../../../../packages/boards/nros-board-native" }
talker_pkg = { path = "../talker_pkg" }
listener_pkg = { path = "../listener_pkg" }
