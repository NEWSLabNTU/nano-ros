[package]
name = "native_entry_robot1"
version = "0.1.0"
edition = "2024"
publish = false
description = "Phase 211.F — per-host entry for `robot1` (the multi-host demo)."

[[bin]]
name = "native_entry_robot1"
path = "src/main.rs"

# Per-host Entry pkg. `nros::main!(launch = "demo_bringup:multihost.launch.xml",
# host = "robot1")` partitions the multi-host launch onto `robot1`: the macro's
# `host` filter keeps only `<node machine="robot1">` (the talker) + any unhosted
# (shared) node, so it emits `talker_pkg::register` only. Sibling
# `native_entry_robot2` does the same for `robot2` (the listener). Running both
# as two processes is the multi-host runtime topology.
[package.metadata.nros.entry]
deploy = "native"

[dependencies]
# Phase 248 C6a (#60 T5) — agnostic `nros`; the board brings RMW+platform.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
nros-board-native = { path = "../../../../../packages/boards/nros-board-native", features = ["rmw-zenoh"] }
# robot1 hosts only the talker, so the macro emits `talker_pkg::register`.
talker_pkg = { path = "../talker_pkg", default-features = false }
