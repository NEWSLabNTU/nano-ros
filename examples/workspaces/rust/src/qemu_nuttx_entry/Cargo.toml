# Entry pkg — boots the `demo_bringup` demo topology on NuttX QEMU ARM
# virt (Cortex-A7 + virtio-net).
#
# Phase 225.O follow-up (known-issue #18) — the Entry source is the same
# one-line `nros::main!(launch = ...)` the native / freertos / threadx /
# zephyr / esp32 entries use. The macro routes `deploy = "nuttx"` to the
# `Framework::Nuttx` emit shape, which emits a
# `#[no_mangle] extern "C" fn nsh_main(...)` (NuttX's flat-build init
# entrypoint, `CONFIG_INIT_ENTRYPOINT="nsh_main"`) that delegates to the
# board crate's real-runtime `BoardEntry::run`
# (`nros-board-nuttx::run_entry`).
#
# Built via plain `cargo build -p qemu_nuttx_entry --target
# armv7a-nuttx-eabihf` with nightly + `-Z build-std=std,panic_abort`
# (supplied per-row by the fixtures.toml `env` + the workspace
# `.cargo/config.toml` `[target.armv7a-nuttx-eabihf]` block + the
# patched NuttX `libc`), so it is a normal cargo workspace member.
#
# #127 — ZERO entry build.rs (board-centric link, RFC-0032 "third leg"):
# the dynamic link pieces (processed `dramboot.ld`, the vectortab +
# builtins-stub boot archive, the `-L` search dirs for
# `$NUTTX_DIR/staging` etc.) PROPAGATE from the board dep's build.rs
# (`nros_board_common::nuttx_image_link`); the static args
# (`-Tdramboot.ld`, `--entry=__start`, the kernel-lib `--start-group`
# list, `-lgcc`) live in the workspace `.cargo/config.toml`
# `[target.armv7a-nuttx-eabihf]` rustflags.

[package]
name = "qemu_nuttx_entry"
version = "0.1.0"
edition = "2024"
publish = false
description = "Entry pkg — boots the demo topology on NuttX QEMU ARM virt."

[[bin]]
name = "qemu_nuttx_entry"
path = "src/main.rs"
test = false
bench = false

# Entry pkg metadata — `deploy = "nuttx"` routes the `nros::main!()`
# proc-macro onto the `Framework::Nuttx` emit branch (board ->
# `nros_board_nuttx_qemu_arm::QemuArmVirt`) and feeds `nros check`.
[package.metadata.nros.entry]
deploy = "nuttx"

[package.metadata.nros.deploy.nuttx]
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:8230"

[dependencies]
# Phase 248 C6a (#60 T5) — agnostic `nros`. NuttX ships `std`, so the ENTRY
# pins `std` (the contract's per-entry std/alloc choice); the board brings the
# zenoh backend + `platform-nuttx`. The concrete RMW (`nros-rmw-zenoh` +
# zpico-sys, with the NuttX setsockopt guards) and its explicit boot-path
# `register()` (NuttX has no linkme/.init_array auto-register) now flow from the
# board's `rmw-zenoh` feature below — `nros` names neither rmw nor platform.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "std",
    "rmw-cffi",
    "ros-humble",
] }
# NuttX QEMU ARM virt board crate — supplies `QemuArmVirt` (real-runtime
# `BoardEntry`, gated `target_os = "nuttx"`) + the `nros_platform_nuttx`
# C shim (compiled by its own build.rs) + (via `nros-board-nuttx`)
# `platform-nuttx` and `nros/std`. `rmw-zenoh` feature → the board links
# `nros-rmw-zenoh` (platform-nuttx) and its `run_entry` explicitly registers it.
nros-board-nuttx-qemu-arm = { path = "../../../../../packages/boards/nros-board-nuttx-qemu-arm", features = ["rmw-zenoh"] }
# Concrete platform impl — also pulled by the board; kept explicit for the link
# map. NOT the agnostic-forbidden `nros/platform-*`.
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-nuttx"] }

# Node pkg rlibs (platform/RMW-agnostic) — the launch XML names `talker` +
# `listener`, so the macro emits both `register` calls; the bin links both.
talker_pkg = { path = "../talker_pkg", default-features = false }
listener_pkg = { path = "../listener_pkg", default-features = false }
