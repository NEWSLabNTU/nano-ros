[package]
name = "reliable_talker_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — publishes std_msgs/Int32 on /qos_chatter with reliable + transient-local QoS."

[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "reliable_talker_pkg::ReliableTalker"
name = "reliable_talker"
default_namespace = "/"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
std_msgs = { version = "*", default-features = false }
