# phase-263 A3 / phase-264 W2 — managed-node (lifecycle) showcase workspace.
#
# system.toml declares `[lifecycle] autostart = "active"`; `nros::main!` registers
# the 5 REP-2002 lifecycle services + autostarts the node (Configure → Activate).
# The first WORKSPACE (plain-cargo) lifecycle demo — enabled by phase-264 W2 teaching
# the macro to wire `[lifecycle]` (the bake already did).

[workspace]
resolver = "2"
members = [
    "src/talker_pkg",
    "src/native_entry",
]
# `demo_bringup` is declarative (no Cargo.toml) and is NOT a member.

[workspace.metadata.nros]
default_system = "demo_bringup"
