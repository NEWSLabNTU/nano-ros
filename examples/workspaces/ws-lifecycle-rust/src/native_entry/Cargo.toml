[package]
name = "native_entry"
version = "0.1.0"
edition = "2024"
publish = false
description = "Entry pkg — boots the managed (lifecycle) system on the native board."

[[bin]]
name = "native_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "native"

[dependencies]
# phase-264 W2 — `lifecycle-services` puts the REP-2002 service registration in
# scope; `nros::main!` calls it because system.toml declares `[lifecycle]`. (A bake
# build adds this feature automatically from `[lifecycle]`; the hand-cargo entry
# sets it explicitly.)
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
    "lifecycle-services",
] }
nros-board-native = { path = "../../../../../packages/boards/nros-board-native", features = ["rmw-zenoh"] }
talker_pkg = { path = "../talker_pkg", default-features = false }
