[system]
name = "mixed_demo"
rmw = "zenoh"
domain_id = 0
default_launch = "system.launch.xml"

[[component]]
pkg = "c_talker_pkg"
class = "c_talker_pkg::Talker"
name = "talker"

[[component]]
pkg = "cpp_listener_pkg"
class = "cpp_listener_pkg::Listener"
name = "listener"

# phase-263 A1 (services, MIXED) — cross-language AddTwoInts: a C server + a C++ client (#203; catalog
# only; run as the two native_service_{server,client}_entry processes — issue 0096).
[[component]]
pkg = "c_add_server_pkg"
class = "c_add_server_pkg::AddServer"
name = "add_server"

[[component]]
pkg = "cpp_add_client_pkg"
class = "cpp_add_client_pkg::AddClient"
name = "add_client"

# phase-263 A4 (actions, MIXED) — Fibonacci action: a C server + a C client (catalog only; run
# as the two native_action_{server,client}_entry processes — issue 0096).
[[component]]
pkg = "c_fib_server_pkg"
class = "c_fib_server_pkg::FibServer"
name = "fib_server"

[[component]]
pkg = "c_fib_client_pkg"
class = "c_fib_client_pkg::FibClient"
name = "fib_client"

[deploy.native]
kind = "self"
target = "x86_64-unknown-linux-gnu"

# phase-263 Track C — per-host deploy targets for the multi-host launch
# (`launch/multihost.launch.xml`: C talker + Rust heartbeat on robot1, C++ listener on
# robot2). `native_entry_robot{1,2}` bake each host's nodes via the
# `nano_ros_entry(HOST <id> …)` codegen partition.
[deploy.robot1]
kind = "self"
target = "x86_64-unknown-linux-gnu"
launch = "multihost.launch.xml"

[deploy.robot2]
kind = "self"
target = "x86_64-unknown-linux-gnu"
launch = "multihost.launch.xml"
