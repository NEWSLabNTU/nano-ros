[package]
name = "rust_heartbeat_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Rust Node pkg for the mixed C/C++/Rust workspace."

[lib]
path = "src/lib.rs"
# phase-263 C2c — `rlib` only. A workspace Rust NODE is always BUNDLED into the
# `nros_ws_runtime` umbrella staticlib (which provides the platform's allocator + panic
# handler via its nros-cpp dep) — it is never a standalone staticlib. Keeping the `staticlib`
# crate-type made cargo build that variant too, which on a no_std cross target (thumbv7m
# FreeRTOS / x86_64-unknown-none Zephyr) fails: "no global allocator / #[panic_handler]
# required" (on host std silently supplied them). The umbrella only ever consumes the rlib.
crate-type = ["rlib"]

[package.metadata.nros.node]
class = "rust_heartbeat_pkg::Heartbeat"
name = "heartbeat"
default_namespace = "/"

# Agnostic Node pkg dep — no `platform-*` / concrete `rmw-*`. The RMW +
# platform selection flows from the Entry pkg's board + `system.toml`
# `[system].rmw` (RFC-0004/0031, phase-248 C6b); the node lib carries
# only functional features (`std`/`alloc`, the `rmw-cffi` vtable, ROS
# edition).
[dependencies]
# phase-263 C2c — no `std` feature: the node body uses only the nros API + a u32 counter, so
# it stays `no_std` (alloc-only) and compiles for both host (native/threadx-linux) and the
# genuinely-no_std embedded Rust targets (thumbv7m FreeRTOS, x86_64-unknown-none Zephyr).
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }

[workspace]
