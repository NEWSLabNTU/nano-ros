[package]
name = "rust_heartbeat_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Rust Node pkg for the mixed C/C++/Rust workspace."

[lib]
path = "src/lib.rs"
crate-type = ["staticlib", "rlib"]

[package.metadata.nros.node]
class = "rust_heartbeat_pkg::Heartbeat"
name = "heartbeat"
default_namespace = "/"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "std",
    "rmw-cffi",
    "platform-posix",
    "ros-humble",
] }

[patch."https://github.com/NEWSLabNTU/nros-cli.git"]
nros-build = { path = "../../../../../packages/cli/nros-build" }

[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
nros-core = { path = "../../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
