# phase-263 C2c-zephyr — base config for the Zephyr MIXED workspace entry (C talker +
# C++ listener + Rust heartbeat). RMW choice + sizing come from the prj-<rmw>.conf overlay.

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_DNS_RESOLVER=n

CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

CONFIG_NROS=y
CONFIG_NROS_C_API=y
# The TYPED Zephyr entry is C++ (drives the C + C++ components via ZephyrBoard::run_components),
# so the nros-cpp header surface must be on the app include path and the entry compiles C++14.
CONFIG_NROS_CPP_API=y
CONFIG_STD_CPP14=y

CONFIG_NET_LOG=y
CONFIG_NET_STATISTICS=y
