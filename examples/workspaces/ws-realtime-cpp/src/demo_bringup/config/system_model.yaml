meta:
  version: 1
# RFC-0052 / phase-296 R2 — resolved SystemModel for the ws-realtime-cpp demo.
# Hand-authored to mirror the equivalent `system.toml` (2 nodes, 2 tiers,
# group→tier bindings); play_launch resolves tiers from a `--sched` platform
# file, so this is the shape `play_launch resolve --sched <platform.yaml>`
# emits. NO deploy layer: the SAME two nodes build for native / nuttx / zephyr,
# so every entry keeps all nodes and resolves the tier table for its board's
# RTOS. The typed C++ path resolves each node's component class from the cmake
# metadata by (pkg, exec); the model carries pkg + exec.
structure:
  scopes:
    /: {}
  nodes:
    /ctrl_node:
      scope: /
      pkg: ctrl_pkg
      exec: ctrl
    /telem_node:
      scope: /
      pkg: telem_pkg
      exec: telem
execution:
  tiers:
    # phase-296 W5.8 follow-up — mirror of the ws-realtime-rust W5.5 EDF
    # exercise, for the C/C++ arm: `high` is real_time with a ZEPHYR-SCOPED
    # `deadline_us`, so the Zephyr C/C++ image's boot tier fires the W5.8
    # kernel-EDF path (`zephyr_apply_tier_deadline`: tier_class=="real_time"
    # && deadline_us>0 ⇒ k_thread_deadline_set + the `nros: EDF deadline set
    # tier=` marker, printed only when CONFIG_SCHED_DEADLINE applied it).
    # The generic `class` head with NO generic deadline/budget/period lowers
    # to None (Fifo, byte-identical) on posix/nuttx.
    high:
      class: real_time
      spin_period_us: 10000
      posix:
        priority: 80
      zephyr:
        priority: 5
        deadline_us: 10000
      nuttx:
        priority: 110
        # phase-296 W5.9 — NUTTX-SCOPED sporadic policy: with class real_time
        # this arms the kernel sporadic server (SCHED_SPORADIC) when the
        # kernel has CONFIG_SCHED_SPORADIC, else the boot logs the loud
        # "executor SchedContext only" note. Other platforms' bakes see no
        # budget/period (sub-table scoped — no cooperative gating flips).
        budget_us: 5000
        period_us: 10000
    low:
      spin_period_us: 100000
      posix:
        priority: 10
      zephyr:
        priority: 10
      nuttx:
        priority: 100
  bindings:
    /ctrl_node/ctrl: high
    /telem_node/telem: low
