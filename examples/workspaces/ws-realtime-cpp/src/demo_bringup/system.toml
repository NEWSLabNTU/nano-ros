[system]
name = "realtime_cpp_demo"
rmw = "zenoh"
domain_id = 0

# Phase 269 W4 (RFC-0015 §4.2) — C++ two-tier realtime demo.
# The ctrl node publishes /ctrl every 10 ms (high tier);
# the telem node publishes /telem every 100 ms (low tier).
# Phase 273 W2 (RFC-0047): group→tier binding moved from [[node_overrides]] to
# [[component]].group_tiers (deployment config, not package manifest).
# CALLBACK_GROUPS in cmake declares the group IDs; group_tiers here assigns
# them to the named tiers. nros codegen emits NodeBuilder::sched() calls so
# each node binds to its posix-priority sched context.
[[component]]
pkg = "ctrl_pkg"
class = "ctrl_pkg::Ctrl"
name = "ctrl_node"
group_tiers = { ctrl = "high" }

[[component]]
pkg = "telem_pkg"
class = "telem_pkg::Telem"
name = "telem_node"
group_tiers = { telem = "low" }

[tiers.high]
spin_period_us = 10000
[tiers.high.posix]
priority = 80

[tiers.low]
spin_period_us = 100000
[tiers.low.posix]
priority = 10

[deploy.native]
kind = "self"
target = "x86_64-unknown-linux-gnu"
