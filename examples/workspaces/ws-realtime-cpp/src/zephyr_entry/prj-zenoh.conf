# phase-281 W3b — zenoh RMW overlay for the Zephyr C++ RT-tiers workspace entry. Mirrors the
# cpp/zephyr_entry zenoh overlay plus the ws-realtime-rust realtime tweaks.

CONFIG_NROS_RMW_ZENOH=y

CONFIG_NET_TCP=y
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=262144
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=1048576
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64

# phase-276 W2 — the 100 Hz ctrl tier needs > 100 tx windows/s: Zephyr zsock serializes send
# behind the read task's recv window, so the window must be far shorter than the fastest
# publish period (issues 0129/0139).
CONFIG_NROS_ZENOH_SOCKET_TIMEOUT_MS=5
