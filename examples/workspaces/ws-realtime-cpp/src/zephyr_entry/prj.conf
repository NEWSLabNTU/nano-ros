# phase-281 W3b — base config for the Zephyr C++ RT-tiers workspace entry (ctrl + telem).
# RMW choice + RMW-specific sizing come from the prj-<rmw>.conf overlay. Mirrors the C++
# workspaces/cpp/src/zephyr_entry base (the proven C++ zephyr build shape).

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_DNS_RESOLVER=n

CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

CONFIG_NROS=y
CONFIG_NROS_C_API=y
# CRITICAL (phase-281 W3b): the RT-tiers entry is C++ and drives the tier nodes via
# ZephyrBoard::run_tiers. The W3a seam (zephyr_run_tiers.c → nros_board_zephyr_run_tiers) is
# gated on `CONFIG_NROS_C_API OR CONFIG_NROS_CPP_API` in zephyr/CMakeLists.txt; without
# CONFIG_NROS_CPP_API the seam is not compiled and the link fails on
# `nros_board_zephyr_run_tiers`. Enabling the C++ API also puts the nros-cpp header surface on
# the app include path and compiles the entry as C++14.
CONFIG_NROS_CPP_API=y
CONFIG_STD_CPP14=y

CONFIG_NET_LOG=y
CONFIG_NET_STATISTICS=y
