# Entry pkg ‚Äî boots the E2E-safety (CRC) `demo_bringup` system on Zephyr.
#
# phase-276 W4 (#102 H1, issue #128) ‚Äî the safety-on-embedded projection of
# `ws-safety-rust`: the same one-line `nros::main!(launch = ...)` entry as the
# native sibling, deployed as a Zephyr `west build` app (`staticlib` exporting
# `rust_main`, consumed by zephyr-lang-rust's `rust_cargo_application()`).
# The system declares `[system].features = ["safety"]`; on the Rust side that
# lowers to the `safety-e2e` backend feature ‚Äî the zenoh backend attaches the
# E2E CRC + sequence number on publish and validates on receive, and
# `safe_listener_pkg` reads the per-message `CallbackCtx::integrity()`. Both
# nodes run on-target; the listener republishes its CRC-VALIDATED receive
# count on `/safe_ok` for cross-process observers (Track D).
#
# Shape mirrors `ws-qos-rust/src/zephyr_entry` (phase-276 W5): RMW flows
# Kconfig overlay (`prj-zenoh.conf`) ‚Üí `CONFIG_NROS_RMW_ZENOH` ‚Üí
# EXTRA_CARGO_ARGS; board from `west build -b <board>`. Built by `west build`,
# NOT plain cargo ‚Äî the parent workspace `exclude`s this dir, and it carries NO
# `[workspace]` table so the macro's pkg-index resolves the sibling
# `talker_pkg` + `safe_listener_pkg` / `demo_bringup` against the real workspace root.

[package]
name = "zephyr_entry"
version = "0.1.0"
edition = "2024"
publish = false
description = "Entry pkg ‚Äî boots the E2E-safety (CRC) system on Zephyr (west app, zenoh RMW)."

[lib]
# Must be `rustapp`: zephyr-lang-rust's `rust_cargo_application()` links the
# app staticlib by the fixed name `librustapp.a`.
name = "rustapp"
crate-type = ["staticlib", "rlib"]

[features]
default = ["rmw-zenoh"]
# Issue #129 (RFC-0031 C5b amendment) ‚Äî a REAL backend dep, not an inert
# marker: on a Rust Zephyr app the entry owns the backend link + register
# (the `nros::main!` Zephyr arm emits `::nros_rmw_zenoh::register()` from the
# deploy metadata's `rmw` key; nothing else registers on `target_os = "none"`).
rmw-zenoh = ["dep:nros-rmw-zenoh"]

# Entry pkg metadata ‚Äî `deploy = "zephyr"` routes the `nros::main!()`
# proc-macro onto the `Framework::Zephyr` emit branch.
[package.metadata.nros.entry]
deploy = "zephyr"

[package.metadata.nros.deploy.zephyr]
board = "native_sim/native/64"
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:7467"

[package.metadata.ament]
exec_depend = ["talker_pkg", "safe_listener_pkg", "demo_bringup"]

[dependencies]
zephyr = "0.1.0"
log = "0.4"

# Agnostic `nros` dep ‚Äî `alloc` (no `std`; Zephyr is `no_std`) + `rmw-cffi`
# vtable + ROS edition. The safety capability rides the BACKEND feature
# (`nros-rmw-zenoh/safety-e2e` below) + the listener pkg's `safety-e2e`.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }

# Zephyr family board ‚Äî `ZephyrBoard` (NetworkWait link-up gate only).
nros-board-zephyr = { path = "../../../../../packages/boards/nros-board-zephyr" }

# Concrete platform vtable ‚Äî the Zephyr board/CMake also links it.
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-zephyr"] }

# Issue #129 (C5b amendment) ‚Äî the concrete zenoh backend, entry-owned on
# Zephyr (see the `[features]` note). `safety-e2e` = the CRC attach/validate
# path (phase-263 B1); `zpico-sys/zephyr` consumes the west build's
# INCLUDE_DIRS/INCLUDE_DEFINES env to compile zenoh-pico for Zephyr.
nros-rmw-zenoh = { path = "../../../../../packages/zpico/nros-rmw-zenoh", default-features = false, features = [
    "platform-zephyr",
    "ros-humble",
    "safety-e2e",
], optional = true }

# The launch-named Node pkgs (platform/RMW-agnostic). `safety-e2e` on the
# listener forwards `nros/safety-e2e`, putting `CallbackCtx::integrity()`
# in scope.
talker_pkg = { path = "../talker_pkg", default-features = false }
safe_listener_pkg = { path = "../safe_listener_pkg", default-features = false, features = [
    "safety-e2e",
] }

[build-dependencies]
zephyr-build = "0.1.0"

[profile.release]
opt-level = "s"
lto = true
debug = false

# Message-binding + intra-repo crate resolution. Excluded from the parent
# workspace, so it does NOT inherit the parent's `[patch.crates-io]`; the
# generated message crates live at the workspace-root `generated/` (provisioned
# by `nros ws sync` at `examples/workspaces/ws-safety-rust/`).
[patch.crates-io]
builtin_interfaces = { path = "../../generated/builtin_interfaces" }
std_msgs = { path = "../../generated/std_msgs" }
nros-core = { path = "../../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../../packages/core/nros-serdes" }
