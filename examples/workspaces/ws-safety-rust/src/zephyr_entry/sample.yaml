# phase-276 W4 — nano-ros E2E-safety (CRC) Rust workspace Entry as a Zephyr
# sample (Twister-discoverable). Boots the talker + safe_listener pair with
# the zenoh backend's CRC attach/validate from a single launch + system.toml.
sample:
  name: nano-ros Rust Safety Workspace Entry
  description: nano-ros E2E-safety (CRC) workspace Entry on Zephyr, zenoh RMW
common:
  tags:
    - nano-ros
    - nros
  harness: console
  harness_config:
    type: one_line
    regex:
      - "nros: zephyr workspace entry up"
tests:
  sample.nano-ros.rust.ws-params-entry.zenoh:
    build_only: true
    platform_allow:
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - SNIPPET=nros-zenoh
