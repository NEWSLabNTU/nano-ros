# phase-263 B1 — E2E-safety (CRC) showcase workspace.
#
# A talker publishes std_msgs/Int32 on /chatter; the system declares
# `[system].features = ["safety"]`, so the zenoh backend attaches the E2E CRC +
# sequence number on publish. `safe_listener_pkg` declares a SAFETY subscription
# (`create_subscription_for_callback_name_with_safety`) and reads the per-message
# `CallbackCtx::integrity()` (CRC valid / gap / duplicate) alongside the payload.
#
# Demonstrates the nano-ros differentiator that no starter workspace shows:
# wire-level message integrity, declared once in system.toml, lowered to the Rust
# `safety-e2e` features (phase-261) + the C/C++ `NANO_ROS_SAFETY_E2E` knob.

[workspace]
resolver = "2"
members = [
    "src/talker_pkg",
    "src/safe_listener_pkg",
    "src/native_entry",
]
# `demo_bringup` is declarative (no Cargo.toml) and is NOT a member.

[workspace.metadata.nros]
default_system = "demo_bringup"
