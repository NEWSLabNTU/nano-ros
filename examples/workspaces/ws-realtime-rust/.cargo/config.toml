include = ["../../../../nros-patch.toml"]
# phase-281 W3-nuttx — NuttX QEMU ARM virt (Cortex-A7) Entry link flags. Only
# applies when `--target armv7a-nuttx-eabihf` is selected (the `nuttx_entry`
# fixture row), so it is inert for the native rows. `-Z build-std=std,panic_abort`
# arrives per-row via `CARGO_UNSTABLE_BUILD_STD` in fixtures.toml so this shared
# workspace config stays buildable on stable for the other members.
#
# #127 — STATIC image-link args only (board-centric link, RFC-0032 "third leg";
# SSoT: nros-board-nuttx-qemu-arm/nros-board.toml `cargo_config`). The dynamic
# pieces (processed dramboot.ld in the board OUT_DIR, the vectortab+builtins-stub
# boot archive, the `-L` search dirs) PROPAGATE from the board build.rs
# (`nros_board_common::nuttx_image_link`). ZERO entry build.rs. Copied verbatim
# from `examples/workspaces/rust/.cargo/config.toml`.
[target.armv7a-nuttx-eabihf]
linker = "arm-none-eabi-gcc"
rustflags = [
    "-C", "link-arg=-mcpu=cortex-a7",
    "-C", "link-arg=-mfloat-abi=hard",
    "-C", "link-arg=-mfpu=neon-vfpv4",
    "-C", "link-arg=-Tdramboot.ld",
    "-C", "link-arg=--entry=__start",
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-nodefaultlibs",
    "-C", "link-arg=-Wl,--start-group",
    "-C", "link-arg=-lsched",
    "-C", "link-arg=-ldrivers",
    "-C", "link-arg=-lboards",
    "-C", "link-arg=-lc",
    "-C", "link-arg=-lmm",
    "-C", "link-arg=-larch",
    "-C", "link-arg=-lxx",
    "-C", "link-arg=-lapps",
    "-C", "link-arg=-lnet",
    "-C", "link-arg=-lcrypto",
    "-C", "link-arg=-lfs",
    "-C", "link-arg=-lbinfmt",
    "-C", "link-arg=-lopenamp",
    "-C", "link-arg=-lboard",
    "-C", "link-arg=-lgcc",
    "-C", "link-arg=-Wl,--end-group",
]

[env]
CC_armv7a_nuttx_eabihf = "arm-none-eabi-gcc"
CFLAGS_armv7a_nuttx_eabihf = "-mcpu=cortex-a7 -mfloat-abi=hard -mfpu=neon-vfpv4"

# phase-281 W3-nuttx — patched NuttX `libc` for `-Z build-std` (the pinned
# nightly's `std` references `libc::_SC_HOST_NAME_MAX`, absent from crates.io
# `libc` for the NuttX target; the fork at `third-party/nuttx/libc/` adds it).
# REQUIRED for a cold build-std of the nuttx row; cargo reports it "not used in
# the crate graph" because it patches only build-std's `std` libc, NOT the
# regular graph (the native rows keep crates.io `libc`, unaffected). Path is
# relative to the workspace root. Mirrors `examples/workspaces/rust`.
[patch.crates-io]
libc = { path = "../../../third-party/nuttx/libc" }
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
std_msgs = { path = "generated/std_msgs" }  # nros-managed
