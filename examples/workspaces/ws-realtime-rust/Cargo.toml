# phase-263 B2 — scheduling-tiers (RFC-0015) showcase workspace.
#
# Two nodes on two priority tiers: a 10 ms control loop on `high`, a 100 ms
# telemetry node on `low`. Each Node pkg declares its `callback_groups` (id → tier)
# in Cargo metadata; `system.toml [tiers.<name>.<rtos>]` gives the per-RTOS knobs
# (POSIX priority here). `nros::main!()` resolves the 2-tier table and emits the
# multi-tier `run_tiers` entry — one task per tier. The nano-ros differentiator no
# starter workspace shows: deployment-time real-time scheduling, declared in config.

[workspace]
resolver = "2"
members = [
    "src/ctrl_pkg",
    "src/telem_pkg",
    "src/native_entry",
    # phase-281 W3-nuttx — NuttX flat-build kernel-image entry. Built ONLY with
    # `--target armv7a-nuttx-eabihf` (its `QemuArmVirt::run_tiers` call is
    # `target_os = "nuttx"`-gated); the fixture lane builds it `-p nuttx_entry
    # --target …`, never wholesale on host (same as `workspaces/rust`).
    "src/nuttx_entry",
    # phase-285 W5 — the rv-virt (riscv32) sibling. Built ONLY with
    # `--target riscv32imac-unknown-nuttx-elf.json` (its `QemuRvVirt::run_tiers`
    # call is `target_os = "nuttx"`-gated); the fixture lane builds it
    # `-p riscv_nuttx_entry --target …`, never wholesale on host.
    "src/riscv_nuttx_entry",
    # phase-297 W5 — ThreadX-Linux hosted-simulation entry (host x86_64;
    # ThreadX threads are pthreads). Needs `THREADX_DIR` (activate.sh) for the
    # board dep's kernel build, like the monolith ws's threadx_linux_entry.
    "src/threadx_entry",
]
# `src/zephyr_entry` is a Zephyr `west build` app (phase-276 W2) — excluded
# so plain `cargo build` in the workspace never tries to link the RTOS app.
exclude = ["src/zephyr_entry"]
# `demo_bringup` is declarative (no Cargo.toml) and is NOT a member.

[workspace.metadata.nros]
default_system = "demo_bringup"
