# phase-263 B2 — scheduling-tiers (RFC-0015) showcase workspace.
#
# Two nodes on two priority tiers: a 10 ms control loop on `high`, a 100 ms
# telemetry node on `low`. Each Node pkg declares its `callback_groups` (id → tier)
# in Cargo metadata; `system.toml [tiers.<name>.<rtos>]` gives the per-RTOS knobs
# (POSIX priority here). `nros::main!()` resolves the 2-tier table and emits the
# multi-tier `run_tiers` entry — one task per tier. The nano-ros differentiator no
# starter workspace shows: deployment-time real-time scheduling, declared in config.

[workspace]
resolver = "2"
members = [
    "src/ctrl_pkg",
    "src/telem_pkg",
    "src/native_entry",
]
# `demo_bringup` is declarative (no Cargo.toml) and is NOT a member.

[workspace.metadata.nros]
default_system = "demo_bringup"

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
nros-core = { path = "../../../packages/core/nros-core" }
nros-serdes = { path = "../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
