# phase-276 W2 / issue #128 half 2 — nano-ros RT-tiers Rust workspace Entry
# as a Zephyr sample (Twister-discoverable). Boots the ctrl (10 ms, high
# tier) + telem (100 ms, low tier) pair via ZephyrBoard::run_tiers.
sample:
  name: nano-ros Rust RT-Tiers Workspace Entry
  description: nano-ros RT-tiers (run_tiers) workspace Entry on Zephyr, zenoh RMW
common:
  tags:
    - nano-ros
    - nros
  harness: console
  harness_config:
    type: one_line
    regex:
      - "nros: zephyr workspace entry up"
tests:
  sample.nano-ros.rust.ws-params-entry.zenoh:
    build_only: true
    platform_allow:
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - SNIPPET=nros-zenoh
