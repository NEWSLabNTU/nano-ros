# RMW overlay: zenoh-pico backend.

CONFIG_NROS_RMW_ZENOH=y

# Zenoh-pico uses TCP to reach zenohd.
CONFIG_NET_TCP=y

# zenoh-pico thread + mutex requirements.
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16

# Resource sizing. The params entry allocates MORE than the base pub/sub
# entry: `apply_param_services` (#128 emit) builds the volatile param store +
# the six ROS 2 parameter services — one ~75 KiB Rust heap allocation
# ("memory allocation of 75080 bytes failed" on the base sizing). The Rust
# global allocator (zephyr-lang-rust) wraps **libc malloc** — picolibc's
# arena, sized by CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE (default 16 KiB) —
# NOT the kernel heap, so THAT is the load-bearing knob. 256 KiB for both
# (native_sim runs on host RAM; the cost is irrelevant).
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=262144
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=1048576
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64

CONFIG_NET_SHELL=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_DEBUG=y

# phase-276 W2 — the 100 Hz ctrl tier needs > 100 tx windows/s: Zephyr zsock
# serializes send behind the read task's recv window, so the window must be
# far shorter than the fastest publish period (issues 0129/0139).
CONFIG_NROS_ZENOH_SOCKET_TIMEOUT_MS=5
