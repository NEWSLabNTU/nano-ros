# nros Zephyr workspace Entry (Rust) — Phase 225.P.
#
# Base config: common subset across zenoh / dds / xrce. RMW choice +
# resource sizing comes from prj-<rmw>.conf overlays. Build via:
#
#   west build -b native_sim/native/64 -d build-<rmw> \
#     src/zephyr_entry -- -DCONF_FILE="prj.conf;prj-<rmw>.conf"
#
# =============================================================================
# Rust Support (zephyr-lang-rust)
# =============================================================================
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

CONFIG_LOG_BACKEND_RTT=n

# =============================================================================
# Logging
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# =============================================================================
# Networking (common)
# =============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_DNS_RESOLVER=n

# =============================================================================
# Timing
# =============================================================================
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# =============================================================================
# Scheduling — EDF (phase-296 W5.5)
# =============================================================================
# Kernel earliest-deadline-first: `k_thread_deadline_set` is a no-op without
# it. The `high` tier is real_time with a zephyr-scoped deadline_us, so the
# nros-board-zephyr `zephyr-edf` path applies a real kernel deadline at boot.
CONFIG_SCHED_DEADLINE=y

# =============================================================================
# nros Module
# =============================================================================
CONFIG_NROS=y
CONFIG_NROS_RUST_API=y

# =============================================================================
# Logging detail
# =============================================================================
CONFIG_NET_LOG=y
CONFIG_NET_STATISTICS=y
