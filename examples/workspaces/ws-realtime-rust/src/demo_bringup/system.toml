[system]
name = "demo"
rmw = "zenoh"
domain_id = 0

# Phase 273 W2 (RFC-0047): group→tier binding added to [[component]].group_tiers.
# This is the new SSoT for deployment config; the package-manifest
# `callback_groups` tier binding in Cargo.toml is deprecated and will be removed
# in W4 (the nros::main!() proc-macro migration). For now, both sources exist:
# the CLI resolver (collect_callback_groups) uses group_tiers; the proc-macro
# still reads Cargo.toml (W4 scope).
[[component]]
pkg = "ctrl_pkg"
class = "ctrl_pkg::Control"
name = "control_node"
group_tiers = { ctrl = "high" }

[[component]]
pkg = "telem_pkg"
class = "telem_pkg::Telem"
name = "telem_node"
group_tiers = { telem = "low" }

# Two priority tiers (RFC-0015 §4.2). Only the `posix` sub-table is needed for
# the native deploy; priorities are raw POSIX (advisory on native).
# phase-296 W5.5 — the CONSUMED tier model for every entry is the hand-authored
# `demo_bringup/config/system_model.yaml` (all four entries use
# `nros::main!(model = ...)`). There the `high` tier gains `class = "real_time"`
# plus a ZEPHYR-SCOPED `[tiers.high.zephyr].deadline_us` that fires the Zephyr
# kernel-EDF path (k_thread_deadline_set) while lowering to None (Fifo,
# unchanged) on posix/nuttx. This system.toml table is NOT re-parsed for tiers
# here; the sub-table `deadline_us` field the model uses is not in this file's
# stricter `nros_orchestration_ir` schema, so it is intentionally left in the
# YAML only.
[tiers.high]
spin_period_us = 1000
[tiers.high.posix]
priority = 80
# phase-276 W2 / issue #128 half 2 — RAW Zephyr priority (preemptive; lower
# number = higher priority). Consumed by the zephyr_entry projection.
[tiers.high.zephyr]
priority = 5
# phase-281 W3-nuttx — RAW NuttX SCHED_FIFO priority (higher number = higher
# priority). `[tiers.*.nuttx]` flips the macro's generic OwnedSpin arm onto
# `<QemuArmVirt>::run_tiers` (RFC-0015 Model 1), one std::thread (NuttX pthread)
# per tier over one shared session.
[tiers.high.nuttx]
priority = 110
# phase-297 W5 — RAW ThreadX priority (lower number = higher priority), near
# the app thread priority (4). Mirrors config/system_model.yaml (the entries
# read the model; this file feeds `play_launch resolve --system`).
[tiers.high.threadx]
priority = 5

[tiers.low]
spin_period_us = 10000
[tiers.low.posix]
priority = 10
[tiers.low.zephyr]
priority = 10
[tiers.low.nuttx]
priority = 100
[tiers.low.threadx]
priority = 15
