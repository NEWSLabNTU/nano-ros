# Entry pkg — boots the RT-tiers `demo_bringup` system on NuttX QEMU ARM virt
# (Cortex-A7 + virtio-net).
#
# phase-281 W3-nuttx (RFC-0015 Model 1) — the tiers-on-NuttX projection of
# `ws-realtime-rust`: the SAME one-line `nros::main!(launch = ...)` entry as the
# native / zephyr siblings, deployed as a NuttX flat-build kernel image. NuttX
# rides `Framework::OwnedSpin`; `system.toml` declares two `[tiers.*]` with
# `[tiers.*.nuttx]` priorities, so the macro's generic multi-tier OwnedSpin arm
# emits `<QemuArmVirt>::run_tiers(&deploy, TIERS, closure)` — one `std::thread`
# per tier over ONE shared zenoh session (NuttX is `std` + zenoh-pico
# `Z_FEATURE_MULTI_THREAD = 1`); `ctrl` (10 ms, high) publishes `/ctrl` and
# `telem` (100 ms, low) publishes `/telem` for cross-process observers.
#
# Built via the cargo cross lane (`scripts/build/workspace-fixtures-build.sh
# nuttx rust`): nightly + `-Z build-std=std,panic_abort` (NuttX is a std-capable
# POSIX target). The Cortex-A7 link flags + `#127` static image-link args come
# from the workspace `.cargo/config.toml` `[target.armv7a-nuttx-eabihf]` block;
# the dynamic pieces (processed linker script, boot archive, `-L` search dirs)
# PROPAGATE from the board dep's build.rs — ZERO entry build.rs.

[package]
name = "nuttx_entry"
version = "0.1.0"
edition = "2024"
publish = false
description = "Entry pkg — boots the RT-tiers system on NuttX QEMU ARM virt."

[[bin]]
name = "nuttx_entry"
path = "src/main.rs"
test = false
bench = false

# Entry pkg metadata — `deploy = "nuttx"` routes the `nros::main!()` proc-macro
# onto the NuttX board (`nros_board_nuttx_qemu_arm::QemuArmVirt`, OwnedSpin) and
# feeds `nros check`.
[package.metadata.nros.entry]
deploy = "nuttx"

[package.metadata.nros.deploy.nuttx]
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:17866"

[dependencies]
# Agnostic `nros`. NuttX ships `std`, so the ENTRY pins `std`; the board brings
# the zenoh backend + `platform-nuttx`.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "std",
    "rmw-cffi",
    "ros-humble",
] }
# NuttX QEMU ARM virt board crate — supplies `QemuArmVirt` (real-runtime
# `BoardEntry` + `run_tiers`, gated `target_os = "nuttx"`) + the `nros_platform_nuttx`
# C shim + (via `nros-board-nuttx`) `platform-nuttx` and `nros/std`. `rmw-zenoh`
# → the board links `nros-rmw-zenoh` and its `run_{entry,tiers}` register it.
nros-board-nuttx-qemu-arm = { path = "../../../../../packages/boards/nros-board-nuttx-qemu-arm", features = ["rmw-zenoh"] }
# Concrete platform impl — also pulled by the board; kept explicit for the link map.
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-nuttx"] }

# The launch-named Node pkgs (platform/RMW-agnostic) — `system.launch.xml` names
# ctrl + telem, so the macro emits both `register` calls; the bin links both.
ctrl_pkg = { path = "../ctrl_pkg", default-features = false }
telem_pkg = { path = "../telem_pkg", default-features = false }
