[package]
name = "talker_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — publishes std_msgs/Int32 on /chatter (the bridge's source)."

[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "talker_pkg::Talker"
name = "talker"
default_namespace = "/"

# phase-267 W1c — declare the published topic+type so the planner resolves the
# `[[bridge]]`'s topic NAME to its ROS type pre-build (no sidecar, no build).
[[package.metadata.nros.node.publishes]]
topic = "/chatter"
type = "std_msgs/msg/Int32"

# phase-267 (non-flat types) — a NESTED message (std_msgs/Header =
# builtin_interfaces/Time stamp + string frame_id). Its schema can't ride the flat
# `fields` list, so `nros sync` emits a `[[register_type]]` and the bridge entry
# stages the Cyclone descriptor via a typed `register::<std_msgs::msg::Header>()`.
[[package.metadata.nros.node.publishes]]
topic = "/header"
type = "std_msgs/msg/Header"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
std_msgs = { version = "*", default-features = false }
