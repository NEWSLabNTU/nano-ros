# phase-263 B3 / phase-267 — cross-RMW bridge (RFC-0009) showcase workspace.
#
# A declarative `[[bridge]]` in `src/demo_bringup/system.toml` forwards /chatter
# from the zenoh session to a cyclonedds session, in ONE process. The entry is a
# PLAIN `nros::main!` (config-driven, phase-267 W1c — NOT a baked relay): because
# system.toml declares a `[[bridge]]`, `nros sync` resolves it into
# `nros-bridge.toml` (sessions + topics + the forwarded type's field schema), the
# macro `include_str!`s it and emits `run_from_config_str` + the backend
# `register()` calls, and the runtime opens `Executor::open_multi`, stages the
# Cyclone descriptor from the field schema, and pumps a `PubSubBridge`.
#
# `talker_pkg` is the only hand-written component (the bridge's source);
# `native_entry` is the bridge entry (a workspace member, plain `nros::main!`).

[workspace]
resolver = "2"
members = [
    "src/talker_pkg",
    "src/native_entry",
]
# `demo_bringup` is declarative (no Cargo.toml) and is NOT a member.

[workspace.metadata.nros]
default_system = "demo_bringup"
