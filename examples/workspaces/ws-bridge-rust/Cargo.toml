# phase-263 B3 — cross-RMW bridge (RFC-0009) showcase workspace.
#
# A declarative `[[bridge]]` in `src/demo_bringup/system.toml` forwards /chatter
# from the zenoh session to a cyclonedds session, in ONE process. Unlike the
# macro-shaped Track-B siblings, the bridge entry is BAKED: `nros codegen system`
# reads the `[[bridge]]`/`[[domain]]` blocks, the planner (issue #99) emits the
# build.transports + plan.bridges, and the orchestration generator emits the
# `register_bridges` relay + multi-session `Executor::open_multi`.
#
# `talker_pkg` is the only hand-written component (the bridge's source); the
# bridge entry is generated, not a workspace member.

[workspace]
resolver = "2"
members = [
    "src/talker_pkg",
]
# `demo_bringup` is declarative (no Cargo.toml) and is NOT a member.

[workspace.metadata.nros]
default_system = "demo_bringup"
