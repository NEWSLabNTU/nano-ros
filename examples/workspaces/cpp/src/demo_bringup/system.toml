# Bringup pkg system descriptor — declarative topology + per-target
# deploy config. No Cargo.toml / CMakeLists.txt / src/ lives here.
#
# `default_launch` is the launch file `nros::main!(launch = "demo_bringup")`
# (or `nros plan demo_bringup` with no explicit file) picks by default.

[system]
name = "demo"
rmw = "zenoh"
domain_id = 0
default_launch = "system.launch.xml"

[[component]]
pkg = "talker_pkg"
class = "talker_pkg::Talker"
name = "talker"

[[component]]
pkg = "listener_pkg"
class = "listener_pkg::Listener"
name = "listener"

# phase-263 A1 (services, C++) — AddTwoInts round-trip components (catalog only; run as the two
# native_service_{server,client}_entry processes — issue 0096).
[[component]]
pkg = "cpp_add_server_pkg"
class = "cpp_add_server_pkg::AddServer"
name = "add_server"

[[component]]
pkg = "cpp_add_client_pkg"
class = "cpp_add_client_pkg::AddClient"
name = "add_client"

[deploy.native]
kind = "self"
target = "x86_64-unknown-linux-gnu"

# phase-263 Track C — per-host deploy targets for the multi-host launch
# (`launch/multihost.launch.xml`: talker on robot1, listener on robot2).
# `native_entry_robot{1,2}` bake each host's node via the `nano_ros_entry(HOST <id> …)`
# codegen partition.
[deploy.robot1]
kind = "self"
target = "x86_64-unknown-linux-gnu"
launch = "multihost.launch.xml"

[deploy.robot2]
kind = "self"
target = "x86_64-unknown-linux-gnu"
launch = "multihost.launch.xml"
