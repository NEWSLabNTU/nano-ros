# ThreadX Linux DDS listener — network configuration
# Distinct IP + MAC + TAP device from talker.

[network]
# See talker/config.toml — 127.x.y.z loopback IPs for cross-process
# unicast on bare host (no netns).
ip = "127.0.10.11"
mac = "02:00:00:00:00:01"
gateway = "127.0.0.1"
netmask = "255.255.255.0"

[platform]
interface = "tap-tx1"

[zenoh]
domain_id = 42
