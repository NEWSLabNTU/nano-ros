[package]
name = "threadx-linux-dds-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "DDS listener example on Linux with ThreadX + NetX Duo (Phase 97.4.threadx-linux)"

[[bin]]
name = "threadx-linux-dds-listener"
test = false
bench = false

[features]
default = []

[dependencies]
nros-board-threadx-linux = { path = "../../../../../packages/boards/nros-board-threadx-linux" }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-dds-cffi", "platform-threadx", "ros-humble"] }
std_msgs = { version = "*", default-features = false }
# Phase 115.L.5 — cffi shim exposes dust-dds via `nros_rmw_vtable_t`.
nros-rmw-dds-cffi = { path = "../../../../../packages/dds/nros-rmw-dds-cffi", features = ["platform-threadx"] }
critical-section = { version = "1.2", default-features = false, features = ["std"] }
