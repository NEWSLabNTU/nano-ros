# Phase 97.4.threadx-linux — advertise this guest's interface IPv4 in
# SPDP unicast locators *and* seed the dust-dds GUID prefix so peers
# don't self-filter each other.
[env]
NROS_LOCAL_IPV4 = "192.0.3.10"
