[package]
name = "threadx_linux_rs_action_server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "ThreadX Linux action server — Phase 212.L Component pkg"

[lib]
crate-type = ["rlib", "staticlib"]

[features]
# Phase 248 C6e — RMW is selected by config (`[package.metadata.nros.deploy.*].rmw`)
# and the concrete backend is linked by the board's C port (NetX-Duo BSD / zpico-sys
# C TU), NOT a Rust `nros/rmw-*` dep. These rows are now inert build-target markers
# (same pattern as `nros-board-{mps2-an385,stm32f4,esp32s3}`), kept so existing
# `cargo build --no-default-features --features rmw-zenoh` invocations
# (examples/fixtures.toml) still resolve; they no longer forward `nros/rmw-*`. (#60 T5)
rmw-zenoh = []
rmw-xrce = []
rmw-cyclonedds = []

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
# Phase 212.N.7 step-2 — Entry-pkg-callable `pub fn register(runtime: &mut RuntimeCtx)` wrapper.
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-threadx"] }
example_interfaces = { version = "*", default-features = false }
heapless = { version = "0.8", default-features = false }

[package.metadata.nros.node]
class = "threadx_linux_rs_action_server::ActionServer"
name = "action_server"
default_namespace = "/"

[package.metadata.nros.deploy.threadx-linux]
board = "threadx-linux"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["example_interfaces"]
exec_depend = ["example_interfaces"]

[profile.release]
opt-level = "s"
lto = true

[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
action_msgs = { path = "generated/action_msgs" }
builtin_interfaces = { path = "generated/builtin_interfaces" }
example_interfaces = { path = "generated/example_interfaces" }
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
