[package]
name = "threadx_linux_rs_talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "ThreadX Linux talker — Phase 212.L Component pkg"

# Phase 212.L.1 Component pkg shape — lib only, no [[bin]], no main.rs.
# `nros::node!()` exports the register trampoline; the generated
# runtime (driven by `nros codegen-system` via the H.4 ThreadX adapter
# shim) owns `nros::init`, executor open, RMW registration, and the
# spin loop.
[lib]
crate-type = ["rlib", "staticlib"]

[features]
# Phase 248 C6e — RMW is selected by config (`[package.metadata.nros.deploy.*].rmw`)
# and the concrete backend is linked by the board's C port (NetX-Duo BSD / zpico-sys
# C TU), NOT a Rust `nros/rmw-*` dep. These rows are now inert build-target markers
# (same pattern as `nros-board-{mps2-an385,stm32f4,esp32s3}`), kept so existing
# `cargo build --no-default-features --features rmw-zenoh` invocations
# (examples/fixtures.toml) still resolve; they no longer forward `nros/rmw-*`. (#60 T5)
rmw-zenoh = []
rmw-xrce = []
rmw-cyclonedds = []

[dependencies]
nros = { version = "*", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
# Phase 212.N.7 step-2 — Entry-pkg-callable `pub fn register(runtime: &mut RuntimeCtx)` wrapper.
nros-platform = { version = "*", default-features = false, features = ["platform-threadx"] }
std_msgs = { version = "*", default-features = false }
# phase-277 W4 — chatter log lines (`Publishing:` / `I heard:`) route through
# the `log` facade; the platform entry runtime owns the sink.
log = "0.4"

[package.metadata.nros.node]
class = "threadx_linux_rs_talker::Talker"
name = "talker"
default_namespace = "/"

[package.metadata.nros.deploy.threadx-linux]
board = "threadx-linux"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
build_depend = ["std_msgs"]
exec_depend = ["std_msgs"]

[profile.release]
opt-level = "s"
lto = true

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root (copy-out template promise + outer-workspace adoption guard).
[workspace]
