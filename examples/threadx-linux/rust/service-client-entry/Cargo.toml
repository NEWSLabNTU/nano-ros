[package]
name = "threadx_linux_rs_service_client_entry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-2 — Entry pkg for ThreadX-Linux Rust service-client Component pkg."

[[bin]]
name = "threadx_linux_rs_service_client_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "threadx-linux"


# Phase 212.L.2 — deploy-target overlay. Per the L.2 spec
# (`Cargo.toml` carries `[package.metadata.nros.deploy.<board>]`
# with board / rmw / domain_id / locator), populated from the
# `nros-board-*` shim's config-default values.
[package.metadata.nros.deploy.threadx-linux]
rmw = "zenoh"
domain_id = 0
locator = "tcp/127.0.0.1:9010"
[dependencies]
# Phase 213.C.3 — `nros::main!()` proc-macro lives here.
nros = { version = "*", default-features = false }
# #131 / #194 — forward the family board's zenoh-backend link + boot-path register().
nros-board-threadx-linux = { version = "*", features = ["rmw-zenoh"] }
nros-platform = { version = "*", default-features = false, features = ["platform-threadx"] }
threadx_linux_rs_service_client = { path = "../service-client" }

# Phase 208.F1 — standalone workspace root.
[workspace]
