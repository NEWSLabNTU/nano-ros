[package]
name = "threadx-linux-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Listener example on Linux with ThreadX + NetX Duo"

[[bin]]
name = "threadx-linux-listener"
test = false
bench = false

[features]
default = []

[dependencies]
nros-threadx-linux = { path = "../../../../../packages/boards/nros-threadx-linux" }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["rmw-zenoh", "platform-threadx", "link-tcp", "link-udp-unicast", "ros-humble"] }
std_msgs = { version = "*", default-features = false }
