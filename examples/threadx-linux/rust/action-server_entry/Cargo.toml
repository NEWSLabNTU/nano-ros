[package]
name = "threadx_linux_rs_action_server_entry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-2 — Entry pkg for ThreadX-Linux Rust action-server Component pkg."

[[bin]]
name = "threadx_linux_rs_action_server_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "threadx-linux"


# Phase 212.L.2 — deploy-target overlay. Per the L.2 spec
# (`Cargo.toml` carries `[package.metadata.nros.deploy.<board>]`
# with board / rmw / domain_id / locator), populated from the
# `nros-board-*` shim's config-default values.
[package.metadata.nros.deploy.threadx-linux]
rmw = "zenoh"
domain_id = 0
locator = "tcp/127.0.0.1:7455"
[dependencies]
# Phase 213.C.3 — `nros::main!()` proc-macro lives here.
nros = { path = "../../../../packages/core/nros", default-features = false }
nros-board-threadx-linux = { path = "../../../../packages/boards/nros-board-threadx-linux" }
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-threadx"] }
threadx_linux_rs_action_server = { path = "../action-server" }

# Phase 208.F1 — standalone workspace root.
[workspace]
