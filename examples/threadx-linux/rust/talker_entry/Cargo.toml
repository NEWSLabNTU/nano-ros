[package]
name = "threadx_linux_rs_talker_entry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-2 — Entry pkg for ThreadX-Linux Rust talker Component pkg."

[[bin]]
name = "threadx_linux_rs_talker_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "threadx-linux"

[dependencies]
# Phase 213.C.3 — `nros::main!()` proc-macro lives here.
nros = { path = "../../../../packages/core/nros" }
# Phase 212.N.3 tier-1 per-board shim. `<ThreadxLinux as BoardEntry>::run`
# owns the legacy `node::run` lifecycle (init → tx_kernel_enter → app
# thread → executor → spin). The `nros::main!()` macro emits the
# `<ThreadxLinux as BoardEntry>::run(...)` call.
nros-board-threadx-linux = { path = "../../../../packages/boards/nros-board-threadx-linux" }
# Phase 212.N.1 trait surface — `BoardEntry`, `RuntimeCtx`, …
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-threadx"] }

# Component pkg this Entry pkg wraps. Keeps the Component pkg's
# `register` symbol linkable from `main.rs`.
threadx_linux_rs_talker = { path = "../talker" }

# Phase 208.F1 — standalone workspace root.
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
