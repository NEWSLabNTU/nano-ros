[package]
name = "threadx-linux-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "listener on Linux with ThreadX + NetX Duo (Phase 118 collapsed)"

[[bin]]
name = "threadx-linux-listener"
test = false
bench = false

[features]
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-dds   = ["dep:nros-rmw-dds", "dep:critical-section", "nros/alloc"]

[dependencies]
nros-board-threadx-linux = { path = "../../../../packages/boards/nros-board-threadx-linux" }
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["rmw-cffi", "platform-threadx", "ros-humble"] }
std_msgs = { version = "*", default-features = false }

nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-threadx", "ros-humble"], optional = true }
nros-rmw-dds = { path = "../../../../packages/dds/nros-rmw-dds", features = ["platform-threadx"], optional = true }
critical-section = { version = "1.2", default-features = false, features = ["std"], optional = true }
