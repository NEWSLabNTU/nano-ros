[package]
name = "threadx_linux_rs_listener_entry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-2 — Entry pkg for ThreadX-Linux Rust listener Component pkg."

[[bin]]
name = "threadx_linux_rs_listener_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "threadx-linux"

[dependencies]
# Phase 212.N.3 tier-1 per-board shim. `<ThreadxLinux as BoardEntry>::run`
# owns the legacy `node::run` lifecycle (init → tx_kernel_enter → app
# thread → executor → spin). Selected at the `main.rs` Board::run call;
# the codegen-emitted `run_plan` stays board-agnostic.
nros-board-threadx-linux = { path = "../../../../packages/boards/nros-board-threadx-linux" }
# Phase 212.N.1 trait surface — `BoardEntry`, `RuntimeCtx`, …
nros-platform = { path = "../../../../packages/core/nros-platform", default-features = false, features = ["platform-threadx"] }

# Component pkg this Entry pkg wraps. The codegen-emitted `run_plan`
# dispatches `threadx_linux_rs_listener::register(runtime)?` per launch
# `<node>` entry; the dep keeps the Component pkg's `register` symbol
# linkable from `main.rs` even when `run_plan` is empty (no launch
# file shipped at step-2).
threadx_linux_rs_listener = { path = "../listener" }

[build-dependencies]
# Phase 212.N.4 codegen library — emits `$OUT_DIR/run_plan.rs` from
# the launch file + workspace cargo-metadata. Step-2 ships an empty
# launch file (build.rs falls through to a stub `Ok(())` body).
nros-build = { git = "https://github.com/NEWSLabNTU/nros-cli.git", branch = "main" }

# Phase 208.F1 — standalone workspace root.
[workspace]

# === BEGIN nros-managed [patch.crates-io] ===
# Mirrored from the sibling Component pkg `threadx_linux_rs_listener`.
# Resolves `std_msgs = "*"` (and the nros-* runtime crates) against
# the in-tree paths the Component pkg already uses; cargo applies
# patches from the CONSUMER's manifest when a path-dep crosses a
# workspace boundary.
[patch.crates-io]
builtin_interfaces = { path = "../listener/generated/builtin_interfaces" }
std_msgs = { path = "../listener/generated/std_msgs" }

# nros-* runtime crates
nros = { path = "../../../../packages/core/nros" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
nros-platform = { path = "../../../../packages/core/nros-platform" }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi" }
nros-node = { path = "../../../../packages/core/nros-node" }
nros-rmw = { path = "../../../../packages/core/nros-rmw" }
nros-rmw-cffi = { path = "../../../../packages/core/nros-rmw-cffi" }
nros-log = { path = "../../../../packages/core/nros-log" }
nros-macros = { path = "../../../../packages/core/nros-macros" }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }
# === END nros-managed [patch.crates-io] ===
