[package]
name = "qemu-rs-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "qemu-rs-talker"
test = false
bench = false

[features]
default = []
# Use Docker network configuration (different IPs for container-based testing)
docker = ["nano-ros-platform-qemu/docker"]

[dependencies]
# Platform crate - handles all bare-metal setup
nano-ros-platform-qemu = { path = "../../../packages/platform/nano-ros-platform-qemu" }

# Generated message types (from package.xml via cargo nano-ros generate)
std_msgs = { version = "*", default-features = false }

# Panic handler (required for no_std)
panic-semihosting = { version = "0.6", features = ["exit"] }
