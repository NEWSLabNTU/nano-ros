[package]
name = "qemu-rs-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "qemu-rs-listener"
test = false
bench = false

[features]
default = []
# Use Docker network configuration (different IPs for container-based testing)
docker = ["nano-ros-bsp-qemu/docker"]

[dependencies]
# Board Support Package - handles all bare-metal setup
nano-ros-bsp-qemu = { path = "../../../crates/nano-ros-bsp-qemu" }

# Panic handler (required for no_std)
panic-semihosting = { version = "0.6", features = ["exit"] }
