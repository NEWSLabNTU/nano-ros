[package]
name = "native-rs-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "talker"
path = "src/main.rs"

[features]
default = []
zenoh = ["nros/zenoh", "nros/param-services"]
safety-e2e = ["nros/safety-e2e"]

[dependencies]
nros = { path = "../../../packages/core/nros", default-features = false, features = ["std"] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"
