[package]
name = "native-rs-service-server"
version = "0.1.0"
edition = "2024"
description = "Example ROS 2 service server using nros"

[features]
default = ["zenoh"]
zenoh = [
    "nros/zenoh",
]

[dependencies]
nros = { path = "../../../packages/core/nros", default-features = false, features = ["std"] }
example_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.10"
