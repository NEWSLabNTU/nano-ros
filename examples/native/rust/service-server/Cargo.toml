[package]
name = "native-rs-service-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "service-server"
path = "src/main.rs"

# Phase 212.L.2 — Application pkg shape. Native-only deploy target.
[package.metadata.nros.application]
deploy = ["native"]

[features]
# Phase 118 — RMW selected at build time via mutually exclusive features.
default = ["rmw-zenoh"]
# Each `rmw-*` activates the app-owned optional backend dep and forwards to
# `nros-board-native`, whose `register_linked_rmw()` call in `main.rs`
# registers the selected backend before the executor opens.
rmw-zenoh = ["dep:nros-rmw-zenoh", "nros-board-native/rmw-zenoh"]
rmw-cyclonedds = ["nros/rmw-cyclonedds", "dep:nros-rmw-cyclonedds-sys", "nros-board-native/rmw-cyclonedds"]  # Phase 214.S.4.b — strict 1-entry parity
rmw-xrce = ["dep:nros-rmw-xrce-cffi", "nros-board-native/rmw-xrce"]

[dependencies]
nros = { version = "*", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-platform-cffi = { version = "*", features = ["posix-c-port"] }
# Native board shim: `nros_board_native::register_linked_rmw()` (called first
# thing in `main`) registers whichever backend the selected `rmw-*` feature
# linked. The app still owns its concrete backend dep below so the backend's
# feature set (std / ros edition / link options) is pinned here.
nros-board-native = { version = "*", default-features = false }
nros-rmw-zenoh = { version = "*", default-features = false, features = ["std", "platform-posix", "ros-humble"], optional = true }
nros-rmw-cyclonedds-sys = { version = "*", features = ["platform-posix"], optional = true }
nros-rmw-xrce-cffi = { version = "*", default-features = false, features = ["std"], optional = true }
example_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
