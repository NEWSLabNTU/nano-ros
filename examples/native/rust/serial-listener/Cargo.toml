[package]
name = "native-rs-xrce-serial-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

# Phase 212.L.2 — Application pkg shape. Native-only deploy target.
# `nros check` rejects any RTOS in this list.
[package.metadata.nros.application]
deploy = ["native"]

[[bin]]
name = "xrce-serial-listener"
path = "src/main.rs"

[dependencies]
# Phase 115.K.2.5.1.5-serial — XRCE serial via the C backend
# (nros-rmw-xrce) through the cffi-shim Rust crate. The `serial://`
# / `/dev/...` locator routes to `xrce_posix_serial_init` inside
# `session.c`; no separate `xrce-serial` Cargo feature needed.
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
# Phase 123.A.1.x.2 — POSIX `nros_platform_*` C symbols ship as a
# standalone C library inside `nros-platform-cffi[posix-c-port]`. Pure-
# cargo builds (no CMake glue) enable the feature so the library's
# `build.rs` compiles the C port into the binary.
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
# Native board shim: `nros_board_native::register_linked_rmw()` (called first
# thing in `main`) registers the linked backend. The app still owns its
# concrete backend dep so the backend's feature set is pinned here.
nros-board-native = { path = "../../../../packages/boards/nros-board-native", default-features = false, features = ["rmw-xrce"] }
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", default-features = false, features = ["std"] }
# Phase 88.16.B — diagnostics route through `nros-log`.
nros-log = { path = "../../../../packages/core/nros-log" }
std_msgs = { version = "*", default-features = false }

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
