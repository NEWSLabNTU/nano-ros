[workspace]

[package]
name = "entry-poc"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-1 — proof-of-concept Entry pkg consuming `nros-board-native` + the codegen-emitted `run_plan(runtime)`."

[[bin]]
name = "entry-poc"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "native"


# Phase 212.L.2 — deploy-target overlay. Per the L.2 spec
# (`Cargo.toml` carries `[package.metadata.nros.deploy.<board>]`
# with board / rmw / domain_id / locator), populated from the
# `nros-board-*` shim's config-default values.
[package.metadata.nros.deploy.native]
rmw = "zenoh"
domain_id = 0
locator = "tcp/127.0.0.1:7447"
[dependencies]
# Phase 212.N.9 — `nros::main!()` proc-macro lives here.
nros = { path = "../../../../packages/core/nros" }
# Phase 212.N.3 tier-1 per-board shim. `NativeBoard::run` provides the
# `BoardEntry` lifecycle the Entry pkg's `main.rs` invokes.
nros-board-native = { path = "../../../../packages/boards/nros-board-native" }
# Phase 212.N.1 trait surface — `BoardEntry`, `RuntimeCtx`, `RuntimeError`.
nros-platform = { path = "../../../../packages/core/nros-platform", features = ["std"] }
