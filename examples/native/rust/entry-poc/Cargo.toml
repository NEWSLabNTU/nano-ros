[workspace]

[package]
name = "entry-poc"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 212.N.7 step-1 — proof-of-concept Entry pkg consuming `nros-board-native` + the codegen-emitted `run_plan(runtime)`."

[[bin]]
name = "entry-poc"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "native"

[dependencies]
# Phase 212.N.3 tier-1 per-board shim. `NativeBoard::run` provides the
# `BoardEntry` lifecycle the Entry pkg's `main.rs` invokes.
nros-board-native = { path = "../../../../packages/boards/nros-board-native" }
# Phase 212.N.1 trait surface — `BoardEntry`, `RuntimeCtx`, `RuntimeError`.
nros-platform = { path = "../../../../packages/core/nros-platform", features = ["std"] }

[build-dependencies]
# Phase 212.N.4 codegen library — emits `$OUT_DIR/run_plan.rs` from the
# launch file + workspace cargo-metadata.
nros-build = { git = "https://github.com/NEWSLabNTU/nros-cli.git", branch = "main" }

# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
[patch.crates-io]
nros = { path = "../../../../packages/core/nros" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
nros-platform = { path = "../../../../packages/core/nros-platform" }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi" }
nros-node = { path = "../../../../packages/core/nros-node" }
nros-rmw = { path = "../../../../packages/core/nros-rmw" }
nros-rmw-cffi = { path = "../../../../packages/core/nros-rmw-cffi" }
nros-log = { path = "../../../../packages/core/nros-log" }
nros-macros = { path = "../../../../packages/core/nros-macros" }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }
cyclonedds-sys = { path = "../../../../packages/dds/cyclonedds-sys" }
# === END nros-managed [patch.crates-io] ===

