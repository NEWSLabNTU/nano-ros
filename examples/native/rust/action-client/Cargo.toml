[package]
name = "native-rs-action-client"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "action-client"
path = "src/main.rs"

# Phase 212.L.2 — Application pkg shape. Native-only deploy target.
[package.metadata.nros.application]
deploy = ["native"]

[features]
# Phase 118 — RMW selected at build time via mutually exclusive features.
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-cyclonedds = [
    # Phase 214.S.4 — collapsed from 3-entry form. `dep:` activator on
    # `-sys` stays for the `nros_rmw_cyclonedds_sys::register` symbol-drag
    # (see talker for the 214.S.4.b follow-up rationale).
    "dep:nros-rmw-cyclonedds-sys",
    "nros/rmw-cyclonedds",
    # Phase 212.K.7.4.c → 214.S.5.c follow-up — see action-server's
    # Cargo.toml. To be dropped when node.rs internalizes CancelGoal /
    # GoalStatusArray registration.
    "dep:nros-rmw-cyclonedds",
    "dep:action_msgs",
]
rmw-xrce  = ["dep:nros-rmw-xrce-cffi"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix"] }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
example_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

nros-rmw-zenoh    = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["std", "platform-posix", "ros-humble"], optional = true }
# Phase 214.S.4 — vendor default per S.1; `default-features = false` dropped.
nros-rmw-cyclonedds-sys = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys", optional = true }
# Phase 212.K.7.4.c → 214.S.5.c follow-up — see action-server's Cargo.toml.
nros-rmw-cyclonedds = { path = "../../../../packages/dds/nros-rmw-cyclonedds", optional = true }
action_msgs = { version = "*", default-features = false, optional = true }
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", optional = true }

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
action_msgs = { path = "generated/action_msgs" }
builtin_interfaces = { path = "generated/builtin_interfaces" }
example_interfaces = { path = "generated/example_interfaces" }
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
