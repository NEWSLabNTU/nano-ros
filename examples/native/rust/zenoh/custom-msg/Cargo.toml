[package]
name = "native-rs-custom-msg"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "custom_msg"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh", "platform-posix"] }
std_msgs = { version = "*", default-features = false }
heapless = "0.8"
log = "0.4"
env_logger = "0.11"
