[package]
name = "native-rs-async-service"
version = "0.1.0"
edition = "2024"
description = "Example async service client using nros with tokio background spin"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh", "platform-posix"] }
example_interfaces = { version = "*", default-features = false }
tokio = { version = "1", features = ["rt", "macros", "time"] }
log = "0.4"
env_logger = "0.10"
