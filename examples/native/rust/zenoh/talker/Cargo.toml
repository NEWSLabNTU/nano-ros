[package]
name = "native-rs-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "talker"
path = "src/main.rs"

[features]
default = []
safety-e2e = ["nros/safety-e2e", "nros-rmw-zenoh/safety-e2e"]
param-services = ["nros/param-services"]
link-tls = ["nros/link-tls", "nros-rmw-zenoh/link-tls"]

[dependencies]
# Phase 115.L.5 — routes through `nros_rmw_vtable_t` via
# `nros-rmw-zenoh`. The shim crate exposes
# `nros_rmw_zenoh_register()` which `src/main.rs` calls before
# `Executor::open`. Legacy `rmw-zenoh` (direct Rust trait) path
# still selectable but slated for L.8 removal.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix"] }
nros-rmw-zenoh = { path = "../../../../../packages/zpico/nros-rmw-zenoh", features = ["std", "platform-posix", "ros-humble"] }
# Phase 123.A.1.x.2 — POSIX `nros_platform_*` C symbols now ship as a
# standalone C library inside `nros-platform-cffi[posix-c-port]`. Pure-
# cargo builds (no CMake glue) enable the feature so the library's
# `build.rs` compiles the C port into the binary.
nros-platform-cffi = { path = "../../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
# Phase 88.16.B — diagnostics route through `nros-log` instead of
# `log`/`env_logger`. Default writers render
# `[<LEVEL>] <name>: <message>\n` on stderr.
nros-log = { path = "../../../../../packages/core/nros-log" }
std_msgs = { version = "*", default-features = false }
