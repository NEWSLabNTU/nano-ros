[package]
name = "native-rs-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "talker"
path = "src/main.rs"

[features]
default = []
safety-e2e = ["nros/safety-e2e"]
param-services = ["nros/param-services"]

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh", "platform-posix"] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"
