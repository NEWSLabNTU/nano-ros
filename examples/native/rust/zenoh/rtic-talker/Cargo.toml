[package]
name = "native-rtic-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Native talker using RTIC-pattern API (zero callbacks, spin_once(0), manual publish)"

[[bin]]
name = "rtic-talker"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh", "platform-posix"] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"
