[package]
name = "native-rtic-action-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Native action server using RTIC-pattern API (zero callbacks, spin_once(0), manual polling)"

[[bin]]
name = "rtic-action-server"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh", "platform-posix"] }
example_interfaces = { version = "*", default-features = false }
heapless = "0.8"
log = "0.4"
env_logger = "0.11"
