[package]
name = "native-rtic-service-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Native service server using RTIC-pattern API (zero callbacks, spin_once(0), handle_request())"

[[bin]]
name = "rtic-service-server"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh-cffi", "platform-posix"] }
# Phase 115.L.5 — pull the cffi shim that exposes the zenoh-pico backend
# via `nros_rmw_vtable_t`. `src/main.rs` calls `register()` before
# `Executor::open`.
nros-rmw-zenoh-cffi = { path = "../../../../../packages/zpico/nros-rmw-zenoh-cffi", features = ["platform-posix", "link-tcp", "ros-humble"] }
example_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"
