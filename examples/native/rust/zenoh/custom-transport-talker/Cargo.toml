[package]
name = "native-rs-custom-transport-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "talker"
path = "src/main.rs"

[features]
default = []

[dependencies]
# Phase 115.L.5-custom-transport — route through `nros_rmw_vtable_t`
# via the zenoh-cffi shim. `link-custom` forwarded by the shim's
# matching feature.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh-cffi", "platform-posix", "link-tcp", "link-custom"] }
nros-rmw-zenoh-cffi = { path = "../../../../../packages/zpico/nros-rmw-zenoh-cffi", features = ["platform-posix", "link-tcp", "link-custom", "ros-humble"] }
nros-rmw = { path = "../../../../../packages/core/nros-rmw", default-features = false, features = ["std"] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"
