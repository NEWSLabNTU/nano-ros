[package]
name = "native-rs-lifecycle-node"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "lifecycle-node"
path = "src/main.rs"

[features]
default = ["lifecycle-services"]
lifecycle-services = ["nros/lifecycle-services"]

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh-cffi", "platform-posix", "lifecycle-services"] }
# Phase 115.L.5 — pull the cffi shim that exposes the zenoh-pico backend
# via `nros_rmw_vtable_t`. `src/main.rs` calls `register()` before
# `Executor::open`.
nros-rmw-zenoh-cffi = { path = "../../../../../packages/zpico/nros-rmw-zenoh-cffi", features = ["platform-posix", "link-tcp", "ros-humble"] }
log = "0.4"
env_logger = "0.11"
