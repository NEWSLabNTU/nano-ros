[package]
name = "native-rs-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "listener"
path = "src/main.rs"

[features]
default = []
safety-e2e = ["nros/safety-e2e"]
unstable-zenoh-api = ["nros/unstable-zenoh-api"]
link-tls = ["nros/link-tls"]

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-zenoh-cffi", "platform-posix"] }
# Phase 115.L.5 — pull the cffi shim that exposes the zenoh-pico backend
# via `nros_rmw_vtable_t`. `src/main.rs` calls `register()` before
# `Executor::open`.
nros-rmw-zenoh = { path = "../../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-posix", "link-tcp", "ros-humble"] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"
