[workspace]

[package]
name = "native-rs-cyclonedds-service-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

# Phase 171.C.1.rust — cmake-driven: corrosion imports this as a
# `staticlib` named `rustapp`; the per-example CMakeLists links it
# with the C++ Cyclone DDS backend + libddsc + stdc++ + the idlc
# typesupport from `nros_generate_interfaces`.
[lib]
name = "rustapp"
crate-type = ["staticlib"]
path = "src/lib.rs"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix"] }
# C-linkage register shim for the C++ Cyclone DDS backend.
nros-rmw-cyclonedds-sys = { path = "../../../../../packages/dds/nros-rmw-cyclonedds-sys", default-features = false }
# POSIX `nros_platform_*` C symbols (compiled by the cffi build.rs).
nros-platform-cffi = { path = "../../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
nros-log = { path = "../../../../../packages/core/nros-log" }
example_interfaces = { version = "*", default-features = false }
