[package]
name = "native-rs-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "listener"
path = "src/main.rs"

# Phase 170.A — listener logic lives in `lib.rs::run()`. The `rlib` lets
# `src/main.rs` (the pure-cargo zenoh/xrce bin) call it; the `staticlib`
# lets this dir's `CMakeLists.txt` link the Cyclone DDS variant
# (`rust_main`) into a C `main`.
[lib]
name = "native_rs_listener"
crate-type = ["staticlib", "rlib"]
path = "src/lib.rs"

[features]
# Phase 118 — RMW selected at build time. Default is `rmw-zenoh`
# so `cargo run -p native-rs-listener` Just Works.
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-cyclonedds   = ["dep:nros-rmw-cyclonedds-sys"]
rmw-xrce  = ["dep:nros-rmw-xrce-cffi"]

# Zenoh-specific feature carry-overs (silently no-op under
# rmw-cyclonedds / rmw-xrce — the matrix lint only exposes `rmw-*`).
safety-e2e         = ["nros/safety-e2e", "nros-rmw-zenoh?/safety-e2e"]
unstable-zenoh-api = ["nros/unstable-zenoh-api"]
link-tls           = ["nros/link-tls", "nros-rmw-zenoh?/link-tls"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix"] }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

nros-rmw-zenoh    = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["std", "platform-posix", "ros-humble"], optional = true }
nros-rmw-cyclonedds-sys      = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys", default-features = false, optional = true }
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", optional = true }

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
[patch.crates-io]
builtin_interfaces = { path = "build/nros_generator_rs/builtin_interfaces" }
std_msgs = { path = "build/nros_generator_rs/std_msgs" }

# nros-* runtime crates
nros = { path = "../../../../packages/core/nros" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
nros-platform = { path = "../../../../packages/core/nros-platform" }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi" }
nros-node = { path = "../../../../packages/core/nros-node" }
nros-rmw = { path = "../../../../packages/core/nros-rmw" }
nros-rmw-cffi = { path = "../../../../packages/core/nros-rmw-cffi" }
nros-log = { path = "../../../../packages/core/nros-log" }
nros-macros = { path = "../../../../packages/core/nros-macros" }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }
# === END nros-managed [patch.crates-io] ===













