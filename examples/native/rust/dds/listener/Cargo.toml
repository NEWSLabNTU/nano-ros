[package]
name = "native-dds-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "listener"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-dds", "platform-posix"] }
