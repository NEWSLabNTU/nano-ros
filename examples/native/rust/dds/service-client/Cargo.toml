[package]
name = "native-dds-service-client"
version = "0.1.0"
edition = "2024"
description = "Example ROS 2 service client using nros + DDS RMW"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "service-client"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-dds-cffi", "platform-posix"] }
# Phase 115.L.5 — pull cffi shim that exposes dust-dds via
# `nros_rmw_vtable_t`. main.rs calls register() before Executor::open.
nros-rmw-dds-cffi = { path = "../../../../../packages/dds/nros-rmw-dds-cffi", features = ["platform-posix"] }
example_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"
