[package]
name = "native-rs-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "talker"
path = "src/main.rs"

# Phase 212.L.2 — Application pkg shape. Native-only deploy target.
# `nros check` rejects any RTOS in this list.
[package.metadata.nros.application]
deploy = ["native"]

[features]
# Phase 118 — single source-of-truth talker. RMW selected at build
# time via mutually exclusive features. `cargo build` with no
# `--features` flag falls into the canonical `rmw-zenoh` path so
# `cargo run -p native-rs-talker` Just Works for the docs-first
# experience.
default = ["rmw-zenoh"]
# Phase 248 C6d — each `rmw-*` activates the app-owned optional backend
# dep (board-LESS app owns its backend); drops the `nros/rmw-*` umbrella
# edge that blocked C5c. Backend self-registers on POSIX via its `.init_array`
# ctor (loader-fired before main), kept live by the `#[used]` force-link static in `main.rs`.
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-cyclonedds = ["nros/rmw-cyclonedds", "dep:nros-rmw-cyclonedds-sys"]
rmw-xrce = ["dep:nros-rmw-xrce-cffi"]

# Carry-over feature gates that previously lived in
# `native/rust/talker/`. These are zenoh-specific and silently
# no-op (or fail to compile) under the other RMWs — the matrix lint
# advertises only `rmw-*` for each example; downstream tooling
# should not combine zenoh-specific gates with `rmw-cyclonedds` /
# `rmw-xrce`.
safety-e2e     = ["nros/safety-e2e"]
param-services = ["nros/param-services"]
link-tls       = ["nros-rmw-zenoh?/link-tls"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
# Phase 123.A.1.x.2 — POSIX `nros_platform_*` C symbols ship as a
# standalone C library inside `nros-platform-cffi[posix-c-port]`. Pure-
# cargo builds (no CMake glue) enable the feature so the library's
# `build.rs` compiles the C port into the binary.
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
# Phase 248 C6d — board-LESS APP owns its backend dep directly. The `nros`
# umbrella no longer carries `rmw-*` (that edge blocked C5c), so the app links
# the concrete backend + force-links its rlib in `main.rs` for POSIX
# self-registration (`.init_array` ctor, loader-fired before main).
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", default-features = false, features = ["std", "platform-posix", "ros-humble"], optional = true }
nros-rmw-cyclonedds-sys = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys", features = ["platform-posix"], optional = true }
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", default-features = false, features = ["std"], optional = true }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

# Phase 118 — RMW shim crates as optional deps. Each `rmw-*`
# feature toggles the matching dep on. Exactly one of the three
# is enabled per build; the cfg-chain in `src/main.rs` calls the
# corresponding `register()` entry.
# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
