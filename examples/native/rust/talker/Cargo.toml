[package]
name = "native-rs-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "talker"
path = "src/main.rs"

# Phase 170.A — talker logic lives in `lib.rs::run()`. The `rlib` lets
# `src/main.rs` (the pure-cargo zenoh/xrce bin) call it; the `staticlib`
# lets this dir's `CMakeLists.txt` link the Cyclone DDS variant
# (`rust_main`) into a C `main`, since `cargo build --features
# rmw-cyclonedds` cannot link Cyclone DDS on its own.
[lib]
name = "native_rs_talker"
crate-type = ["staticlib", "rlib"]
path = "src/lib.rs"

[features]
# Phase 118 — single source-of-truth talker. RMW selected at build
# time via mutually exclusive features. `cargo build` with no
# `--features` flag falls into the canonical `rmw-zenoh` path so
# `cargo run -p native-rs-talker` Just Works for the docs-first
# experience.
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-cyclonedds   = ["dep:nros-rmw-cyclonedds-sys"]
rmw-xrce  = ["dep:nros-rmw-xrce-cffi"]

# Carry-over feature gates that previously lived in
# `native/rust/talker/`. These are zenoh-specific and silently
# no-op (or fail to compile) under the other RMWs — the matrix lint
# advertises only `rmw-*` for each example; downstream tooling
# should not combine zenoh-specific gates with `rmw-cyclonedds` /
# `rmw-xrce`.
safety-e2e     = ["nros/safety-e2e", "nros-rmw-zenoh?/safety-e2e"]
param-services = ["nros/param-services"]
link-tls       = ["nros/link-tls", "nros-rmw-zenoh?/link-tls"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix"] }
# Phase 123.A.1.x.2 — POSIX `nros_platform_*` C symbols ship as a
# standalone C library inside `nros-platform-cffi[posix-c-port]`. Pure-
# cargo builds (no CMake glue) enable the feature so the library's
# `build.rs` compiles the C port into the binary.
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

# Phase 118 — RMW shim crates as optional deps. Each `rmw-*`
# feature toggles the matching dep on. Exactly one of the three
# is enabled per build; the cfg-chain in `src/main.rs` calls the
# corresponding `register()` entry.
nros-rmw-zenoh    = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["std", "platform-posix", "ros-humble"], optional = true }
nros-rmw-cyclonedds-sys      = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys", default-features = false, optional = true }
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", optional = true }

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
