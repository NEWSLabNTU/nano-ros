[package]
name = "native-rs-service-client-callback"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "service-client-callback"
path = "src/main.rs"

# Phase 212.L.2 — Application pkg shape. Native-only deploy target.
[package.metadata.nros.application]
deploy = ["native"]

[features]
# RMW selected at build time via mutually exclusive features.
default = ["rmw-zenoh"]
# Each `rmw-*` activates the app-owned optional backend dep and forwards to
# `nros-board-native`, whose `register_linked_rmw()` call in `main.rs`
# registers the selected backend before the executor opens.
rmw-zenoh = ["dep:nros-rmw-zenoh", "nros-board-native/rmw-zenoh"]
rmw-cyclonedds = ["nros/rmw-cyclonedds", "dep:nros-rmw-cyclonedds-sys", "nros-board-native/rmw-cyclonedds"]
rmw-xrce = ["dep:nros-rmw-xrce-cffi", "nros-board-native/rmw-xrce"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
# Native board shim: `nros_board_native::register_linked_rmw()` (called first
# thing in `main`) registers whichever backend the selected `rmw-*` feature
# linked. The app still owns its concrete backend dep below so the backend's
# feature set (std / ros edition / link options) is pinned here.
nros-board-native = { path = "../../../../packages/boards/nros-board-native", default-features = false }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", default-features = false, features = ["std", "platform-posix", "ros-humble"], optional = true }
nros-rmw-cyclonedds-sys = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys", features = ["platform-posix"], optional = true }
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", default-features = false, features = ["std"], optional = true }
example_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

# Standalone-workspace marker (see service-client/Cargo.toml for rationale).
[workspace]
