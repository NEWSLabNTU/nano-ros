[package]
name = "native-rs-action-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "action-server"
path = "src/main.rs"

# Phase 212.L.2 — Application pkg shape. Native-only deploy target.
[package.metadata.nros.application]
deploy = ["native"]

[features]
# Phase 118 — RMW selected at build time via mutually exclusive features.
default = ["rmw-zenoh"]
# Phase 227.3 (unified RMW) — zenoh/xrce route through the `nros` umbrella
# feature; `nros` forwards the backend features + force-links it, so no
# project-level backend dep and no `register()` call in `main.rs`.
rmw-zenoh = ["nros/rmw-zenoh"]
rmw-cyclonedds = [
    # Phase 214.S.4.b — collapsed `dep:nros-rmw-cyclonedds-sys` out (the
    # umbrella + `nros-node::__FORCE_LINK_CYCLONEDDS_SYS` keep the `-sys`
    # rlib alive for us now).
    "nros/rmw-cyclonedds",
    # Phase 212.K.7.4.c → 214.S.5.c follow-up: the per-action envelopes
    # auto-register via K.7.6.b, but `action_msgs::srv::CancelGoal_{Request,
    # Response}` + `action_msgs::msg::GoalStatusArray` do NOT (the
    # `RosAction` trait does not surface them yet). The example registers
    # them explicitly; remove these two entries once node.rs internalizes
    # the cancel/status registration.
    "dep:nros-rmw-cyclonedds",
    "dep:action_msgs",
]
rmw-xrce = ["nros/rmw-xrce"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix", "ros-humble"] }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
example_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"
heapless = "0.8"

# Phase 212.K.7.4.c — direct access to the cyclonedds type registry so
# the example can explicitly register `action_msgs::srv::CancelGoal_{Request,Response}`
# descriptors before `create_action_server` (the trait `RosAction` does
# not yet expose those types). To be removed under 214.S.5.c when node.rs
# internalizes the registration.
nros-rmw-cyclonedds = { path = "../../../../packages/dds/nros-rmw-cyclonedds", optional = true }
action_msgs = { version = "*", default-features = false, optional = true }

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
action_msgs = { path = "generated/action_msgs" }
builtin_interfaces = { path = "generated/builtin_interfaces" }
example_interfaces = { path = "generated/example_interfaces" }
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
