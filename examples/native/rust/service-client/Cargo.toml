[package]
name = "native-rs-service-client"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "service-client"
path = "src/main.rs"

# Phase 212.L.2 — Application pkg shape. Native-only deploy target.
[package.metadata.nros.application]
deploy = ["native"]

[features]
# Phase 118 — RMW selected at build time via mutually exclusive features.
default = ["rmw-zenoh"]
# Phase 248 C6d — each `rmw-*` activates the app-owned optional backend
# dep (board-LESS app owns its backend); drops the `nros/rmw-*` umbrella
# edge that blocked C5c. Backend self-registers on POSIX via its linkme
# section, kept live by the `#[used]` force-link static in `main.rs`.
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-cyclonedds = ["dep:nros-rmw-cyclonedds-sys"]  # Phase 214.S.4.b — strict 1-entry parity
rmw-xrce = ["dep:nros-rmw-xrce-cffi"]

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "ros-humble"] }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
# Phase 248 C6d — board-LESS APP owns its backend dep directly. The `nros`
# umbrella no longer carries `rmw-*` (that edge blocked C5c), so the app links
# the concrete backend + force-links its rlib in `main.rs` for POSIX
# self-registration (linkme `RMW_INIT_ENTRIES`).
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", default-features = false, features = ["std", "platform-posix", "ros-humble", "linkme-register"], optional = true }
nros-rmw-cyclonedds-sys = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys", features = ["platform-posix"], optional = true }
nros-rmw-xrce-cffi = { path = "../../../../packages/xrce/nros-rmw-xrce-cffi", default-features = false, features = ["std", "linkme-register"], optional = true }
example_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
action_msgs = { path = "generated/action_msgs" }
builtin_interfaces = { path = "generated/builtin_interfaces" }
example_interfaces = { path = "generated/example_interfaces" }
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
