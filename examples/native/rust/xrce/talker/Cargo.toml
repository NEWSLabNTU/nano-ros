[package]
name = "native-rs-xrce-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "xrce-talker"
path = "src/main.rs"

[dependencies]
# Phase 115.K.2.5.1.2 — XRCE via the C backend (nros-rmw-xrce)
# through the cffi-shim Rust crate. Replaces the legacy Rust
# direct impl `nros-rmw-xrce`.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix", "ros-humble"] }
nros-rmw-xrce-cffi = { path = "../../../../../packages/xrce/nros-rmw-xrce-cffi" }
std_msgs = { version = "*", default-features = false }
