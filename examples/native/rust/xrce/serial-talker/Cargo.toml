[package]
name = "native-rs-xrce-serial-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "xrce-serial-talker"
path = "src/main.rs"

[dependencies]
# Phase 115.K.2.5.1.5-serial — XRCE serial via the C backend
# (nros-rmw-xrce-c) through the cffi-shim Rust crate. The `serial://`
# / `/dev/...` locator routes to `xrce_posix_serial_init` inside
# `session.c`; no separate `xrce-serial` Cargo feature needed.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-xrce-cffi", "platform-posix", "ros-humble"] }
nros-rmw-xrce-cffi = { path = "../../../../../packages/xrce/nros-rmw-xrce-cffi" }
std_msgs = { version = "*", default-features = false }
