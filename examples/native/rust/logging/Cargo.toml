[package]
name = "native-rs-logging"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "logging"
path = "src/main.rs"

# Phase 212.L.2 — Application pkg shape. Native-only deploy target.
[package.metadata.nros.application]
deploy = ["native"]

[dependencies]
# Phase 88 — `nros-log` facade + `PlatformSink` + the `nros_*!` macros.
nros-log = { path = "../../../../packages/core/nros-log" }
# POSIX `nros_platform_log_*` impl. `PlatformSink` forwards into
# this. The `nros_platform_*` clock / alloc / etc. symbols are
# also pulled in here so the example links standalone.
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]

# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
[patch.crates-io]
nros = { path = "../../../../packages/core/nros" }
nros-core = { path = "../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../packages/core/nros-serdes" }
nros-platform = { path = "../../../../packages/core/nros-platform" }
nros-platform-cffi = { path = "../../../../packages/core/nros-platform-cffi" }
nros-node = { path = "../../../../packages/core/nros-node" }
nros-rmw = { path = "../../../../packages/core/nros-rmw" }
nros-rmw-cffi = { path = "../../../../packages/core/nros-rmw-cffi" }
nros-log = { path = "../../../../packages/core/nros-log" }
nros-macros = { path = "../../../../packages/core/nros-macros" }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }
cyclonedds-sys = { path = "../../../../packages/dds/cyclonedds-sys" }
# === END nros-managed [patch.crates-io] ===

