[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=-Tlink.lds",
    "-C", "link-arg=--nmagic",
]

[patch.crates-io.builtin_interfaces]
path = "generated/builtin_interfaces"

[patch.crates-io.nros-core]
path = "../../../../../packages/core/nros-core"

[patch.crates-io.nros-serdes]
path = "../../../../../packages/core/nros-serdes"

[patch.crates-io.std_msgs]
path = "generated/std_msgs"

# Phase 127.B.5 — pin NetX/ThreadX user-config dirs to the RV64
# board crate (default .envrc points at threadx-linux which has no
# nx_port.h, breaking the zpico.c → nxd_bsd.h chain).
[env]
NETX_CONFIG_DIR = { value = "../../../../../packages/boards/nros-board-threadx-qemu-riscv64/config", relative = true, force = true }
THREADX_CONFIG_DIR = { value = "../../../../../packages/boards/nros-board-threadx-qemu-riscv64/config", relative = true, force = true }
