[package]
name = "qemu-riscv64-threadx-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Listener example on QEMU RISC-V with ThreadX + NetX Duo + virtio-net"

[[bin]]
name = "qemu-riscv64-threadx-listener"
test = false
bench = false

[features]
default = []

[dependencies]
nros-board-threadx-qemu-riscv64 = { path = "../../../../../packages/boards/nros-board-threadx-qemu-riscv64" }
# Phase 88.16.D — user diagnostics route through `nros-log`.
nros-log = { path = "../../../../../packages/core/nros-log", default-features = false }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["rmw-cffi", "platform-threadx", "ros-humble"] }
nros-rmw-zenoh = { path = "../../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-threadx", "ros-humble"] }
std_msgs = { version = "*", default-features = false }
