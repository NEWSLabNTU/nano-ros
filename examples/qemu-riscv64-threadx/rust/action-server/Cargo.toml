[package]
name = "qemu-riscv64-threadx-action-server"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "action-server on QEMU RISC-V ThreadX (Phase 118 collapsed)"

[[bin]]
name = "qemu-riscv64-threadx-action-server"
test = false
bench = false

# Phase 175.B — the CycloneDDS ThreadX path is CMake-driven because
# the backend is C++ plus cmake-time idlc descriptors. The `rlib`
# keeps the existing pure-cargo binary path intact; the `staticlib`
# exposes `app_main` for the C startup used by CMake.
[lib]
name = "qemu_riscv64_threadx_action_server"
crate-type = ["staticlib", "rlib"]
path = "src/lib.rs"

[features]
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-cyclonedds   = ["dep:nros-rmw-cyclonedds-sys", "nros/alloc"]

# Phase 245 — app-node shape. `nros::main!()` (src/main.rs) reads
# `[package.metadata.nros.entry] deploy = "threadx-qemu-riscv64"` (the macro maps
# it to `nros_board_threadx_qemu_riscv64::ThreadxQemuRiscv64`) and runs this
# crate's `register` (from `src/lib.rs`'s `nros::node!()`).
[package.metadata.nros.entry]
deploy = "threadx-qemu-riscv64"

# Deploy overlay (Phase 245 B0) — locator / domain thread into the board `Config`
# via `BoardEntry::run_with_deploy`. CycloneDDS ignores the locator (no router).
[package.metadata.nros.deploy.threadx-qemu-riscv64]
board = "threadx-qemu-riscv64"
rmw = "zenoh"
domain_id = 0
locator = "tcp/10.0.2.2:7473"
ip = "10.0.2.15"
netmask = "255.255.255.0"
gateway = "10.0.2.2"

[dependencies]
nros-board-threadx-qemu-riscv64 = { version = "*" }
nros = { version = "*", default-features = false, features = ["rmw-cffi", "ros-humble"] }
nros-platform = { version = "*", default-features = false, features = ["platform-threadx", "global-allocator", "critical-section"] }
example_interfaces = { version = "*", default-features = false }
# Demo-parity log lines route through the `log` facade; the platform entry
# runtime owns the sink.
log = "0.4"

nros-rmw-zenoh = { version = "*", features = ["platform-threadx", "ros-humble"], optional = true }
nros-rmw-cyclonedds-sys = { version = "*", default-features = false, optional = true }
nros-platform-critical-section = { version = "*" }

heapless = "0.8"

# Phase 208.F1 — empty `[workspace]` table makes this example a standalone
# workspace root. Without it, cargo walks up + adopts the example into the
# outer nano-ros workspace (in nested checkouts) or gets adopted by a user's
# workspace `members` glob when they copy this example out, breaking the
# README's "standalone copy-out template" promise. Canonical in-tree builds
# also pass via the root `exclude = [...]` list (belt-and-braces).
[workspace]
