[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C", "link-arg=-Tlink.lds",
    "-C", "link-arg=--nmagic",
]

[env]
NETX_CONFIG_DIR = { value = "../../../../packages/boards/nros-board-threadx-qemu-riscv64/config", relative = true, force = true }
THREADX_CONFIG_DIR = { value = "../../../../packages/boards/nros-board-threadx-qemu-riscv64/config", relative = true, force = true }
THREADX_PORT = { value = "risc-v64/gnu", force = true }
THREADX_EXTRA_INCLUDES = { value = "../../../../third-party/threadx/kernel/ports/risc-v64/gnu/example_build/qemu_virt", relative = true, force = true }

[patch.crates-io]
action_msgs = { path = "generated/action_msgs" }  # nros-managed
builtin_interfaces = { path = "generated/builtin_interfaces" }  # nros-managed
example_interfaces = { path = "generated/example_interfaces" }  # nros-managed
nros = { path = "../../../../packages/core/nros" }  # nros-managed
nros-board-threadx-qemu-riscv64 = { path = "../../../../packages/boards/nros-board-threadx-qemu-riscv64" }  # nros-managed
nros-core = { path = "../../../../packages/core/nros-core" }  # nros-managed
nros-platform = { path = "../../../../packages/core/nros-platform" }  # nros-managed
nros-platform-critical-section = { path = "../../../../packages/core/nros-platform-critical-section" }  # nros-managed
nros-rmw-cyclonedds = { path = "../../../../packages/dds/nros-rmw-cyclonedds" }  # nros-managed
nros-rmw-cyclonedds-sys = { path = "../../../../packages/dds/nros-rmw-cyclonedds-sys" }  # nros-managed
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh" }  # nros-managed
nros-serdes = { path = "../../../../packages/core/nros-serdes" }  # nros-managed
unique_identifier_msgs = { path = "generated/unique_identifier_msgs" }  # nros-managed

