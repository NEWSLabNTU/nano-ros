[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=-Tlink.lds",
    "-C", "link-arg=--nmagic",
]

# Phase 97.4.threadx-riscv64 — advertise this guest's iface IPv4 in
# SPDP unicast locators *and* seed the dust-dds GUID-prefix host_id
# so peers don't self-filter each other. Must match `[network] ip`
# in config.toml.
[env]
NROS_LOCAL_IPV4 = "10.0.2.40"
# threadx-netx-sys bindgen needs board-side `nx_port.h` /
# `tx_port.h` headers — same dir for both. Match the
# `just threadx_riscv64` recipes' `THREADX_CONFIG_DIR=$board/config`
# default so a plain `cargo build` works without `just`.
THREADX_CONFIG_DIR = { value = "../../../../../packages/boards/nros-board-threadx-qemu-riscv64/config", relative = true }
NETX_CONFIG_DIR = { value = "../../../../../packages/boards/nros-board-threadx-qemu-riscv64/config", relative = true }

[patch.crates-io.builtin_interfaces]
path = "generated/builtin_interfaces"

[patch.crates-io.nros-core]
path = "../../../../../packages/core/nros-core"

[patch.crates-io.nros-serdes]
path = "../../../../../packages/core/nros-serdes"

[patch.crates-io.std_msgs]
path = "generated/std_msgs"
