[package]
name = "qemu-riscv64-threadx-dds-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "DDS listener example on QEMU RISC-V with ThreadX + NetX Duo (Phase 97.4.threadx-riscv64)"

[[bin]]
name = "qemu-riscv64-threadx-dds-listener"
test = false
bench = false

[features]
default = []

[dependencies]
nros-board-threadx-qemu-riscv64 = { path = "../../../../../packages/boards/nros-board-threadx-qemu-riscv64" }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-dds-cffi", "platform-threadx", "ros-humble"] }
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-threadx", "global-allocator", "critical-section"] }
std_msgs = { version = "*", default-features = false }
# Phase 115.L.5 — cffi shim exposes dust-dds via `nros_rmw_vtable_t`.
nros-rmw-dds = { path = "../../../../../packages/dds/nros-rmw-dds", features = ["platform-threadx"] }
