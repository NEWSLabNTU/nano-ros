# nano-ros Zephyr starter — zenoh RMW, C API (Phase 205.A).
# For xrce/cyclonedds see modules/nano-ros/examples/zephyr/c/talker (the full
# multi-RMW example with the per-RMW prj-<rmw>.conf overlays).

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# Networking (any networked RMW on QEMU / native_sim)
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_DNS_RESOLVER=n
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# nano-ros: enable the module + the C API + the zenoh RMW.
# (ROS edition is a build-time Cargo feature, NOT a Kconfig symbol — do not set
# CONFIG_NROS_ROS_EDITION; Zephyr aborts on the undefined symbol.)
CONFIG_NROS=y
CONFIG_NROS_C_API=y
# Phase 244.C4 — the TYPED Zephyr carrier entry is C++ (drives the C component's
# factory/configure seam via ZephyrBoard::run_components), so the nros-cpp header
# surface must be on the app include path, and the carrier compiles as C++14
# (nros-cpp qos.hpp uses mutating constexpr members).
CONFIG_NROS_CPP_API=y
CONFIG_STD_CPP14=y
CONFIG_NROS_RMW_ZENOH=y

# zenoh-pico needs POSIX threads + a roomy heap/stack
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
