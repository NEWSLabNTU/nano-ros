[package]
name = "listener_pkg"
version = "0.1.0"
edition = "2024"
publish = false
description = "Node pkg — subscribes to std_msgs/Int32 on /chatter."

# Node pkg shape — lib only. `nros::node!()` exports the register /
# init / dispatch trampolines; the sibling Entry pkg (`robot_entry`)
# owns the executor + spin loop via `nros::main!()`.
[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "listener_pkg::Listener"
name = "listener"
default_namespace = "/"

[dependencies]
nros = { path = "../../../../../packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "platform-posix",
    "ros-humble",
] }

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
nros-core = { path = "../../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
