# Escape the in-repo nano-ros workspace — this example deliberately
# behaves like a downstream Pattern-A consumer: standalone Cargo
# project that path-depends on the nano-ros checkout under
# src/nano-ros/.
[workspace]

[package]
name = "pkg_rust_publisher"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

# Phase 123.A.10 — multi-package workspace demo (Rust publisher).
#
# Path-relative dependency on the in-workspace nano-ros checkout
# at ../../../../.., matching Pattern A (one src/nano-ros/ source tree
# per workspace). Crates.io publishing isn't available for `nros`
# because the package depends transitively on C/C++ submodules
# (zenoh-pico, mbedtls); see the "Open question" in
# docs/roadmap/phase-123-build-and-api-revision.md about
# publishing only nros-core.

# Phase 244.C4 — single-pkg clean shape. `src/lib.rs` is the agnostic Node
# (`nros::node!(Talker)` emits `register`); `src/main.rs` is the Entry
# (`nros::main!()` Form-1 self-bringup links the sibling lib's `register`).
# The native board's `BoardEntry` owns executor / RMW / spin.
[lib]
name = "pkg_rust_publisher"
path = "src/lib.rs"

[[bin]]
name = "pkg_rust_publisher"
path = "src/main.rs"

# Entry pkg deploy key — `nros::main!()` maps "native" →
# `nros_board_native::NativeBoard` + the host emit shape.
[package.metadata.nros.entry]
deploy = "native"

[package.metadata.nros.node]
class = "pkg_rust_publisher::Talker"
name = "talker"
default_namespace = "/"

# Deploy-target overlay (network endpoint + domain). The native board's
# force-linked zenoh backend connects to this locator.
[package.metadata.nros.deploy.native]
rmw = "zenoh"
domain_id = 0
locator = "tcp/127.0.0.1:7447"

[dependencies]
# Board crate — hosted Linux/macOS native board. Supplies the
# `NativeBoard` ZST the macro resolves; force-links the zenoh RMW.
nros-board-native = { path = "../../../../../packages/boards/nros-board-native" }
# nros — `nros::node!` (lib) + `nros::main!` (bin) macros + Node API.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Phase 248 C5c — posix platform symbols via a direct `nros-platform` dep
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-posix"] }
std_msgs = { path = "generated/std_msgs" }
builtin_interfaces = { path = "generated/builtin_interfaces" }
