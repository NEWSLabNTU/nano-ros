[package]
name = "rust_consumer"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[[bin]]
name = "rust_consumer"
path = "src/main.rs"

# Phase 210.D.3 fixture — standalone Cargo pkg. Empty [workspace] marker
# (cargo-ros2 pattern) so cargo treats this Cargo.toml as the patch
# authority for the auto-managed [patch.crates-io] block written by
# `nros ws sync` (block lives at the bottom of this file).
[workspace]

[features]
default = ["rmw-zenoh"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]

[dependencies]
# Phase 212 canonical shape — nros-* runtime crates as direct path-deps.
# `nros ws sync`'s patch block (below) only patches msg crates.
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix"] }
nros-platform-cffi = { path = "../../../../../packages/core/nros-platform-cffi", features = ["posix-c-port"] }
nros-rmw-zenoh = { path = "../../../../../packages/zpico/nros-rmw-zenoh", features = ["std", "platform-posix", "ros-humble"], optional = true }
log = "0.4"
env_logger = "0.11"

# Msg deps — workspace + AMENT, all resolved through the auto-managed
# [patch.crates-io] block below.
local_msgs = "*"
extra_msgs = "*"
std_msgs = "*"
geometry_msgs = "*"
sensor_msgs = "*"

[patch.crates-io]
# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
builtin_interfaces = { path = "generated/builtin_interfaces" }
geometry_msgs = { path = "generated/geometry_msgs" }
sensor_msgs = { path = "generated/sensor_msgs" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../../packages/core/nros-core" }
nros-serdes = { path = "../../../../../packages/core/nros-serdes" }
# === END nros-managed [patch.crates-io] ===
