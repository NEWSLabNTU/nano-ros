[package]
name = "rust_consumer"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

# Phase 244.C4 — single-pkg clean shape. `src/lib.rs` is the agnostic Node
# (`nros::node!(Consumer)` emits `register`); `src/main.rs` is the Entry
# (`nros::main!()` Form-1 self-bringup links the sibling lib's `register`).
# The native board's `BoardEntry` owns executor / RMW / spin.
[lib]
name = "rust_consumer"
path = "src/lib.rs"

[[bin]]
name = "rust_consumer"
path = "src/main.rs"

# Phase 210.D.3 fixture — standalone Cargo pkg. Empty [workspace] marker
# (cargo-ros2 pattern) so cargo treats this Cargo.toml as the patch
# authority for the auto-managed [patch.crates-io] block written by
# `nros ws sync` (block lives at the bottom of this file).
[workspace]

# Entry pkg deploy key — `nros::main!()` maps "native" →
# `nros_board_native::NativeBoard` + the host emit shape.
[package.metadata.nros.entry]
deploy = "native"

[package.metadata.nros.node]
class = "rust_consumer::Consumer"
name = "rust_consumer"
default_namespace = "/"

# Deploy-target overlay (network endpoint + domain). The native board's
# force-linked zenoh backend connects to this locator.
[package.metadata.nros.deploy.native]
rmw = "zenoh"
domain_id = 0
locator = "tcp/127.0.0.1:7447"

[dependencies]
# Board crate — hosted Linux/macOS native board. Supplies the
# `NativeBoard` ZST the macro resolves; force-links the zenoh RMW.
nros-board-native = { version = "*" }
# nros — `nros::node!` (lib) + `nros::main!` (bin) macros + Node API.
nros = { version = "*", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
# Phase 248 C5c — posix platform symbols via a direct `nros-platform` dep
nros-platform = { version = "*", default-features = false, features = ["platform-posix"] }

# Msg deps — workspace + AMENT, all resolved through the auto-managed
# [patch.crates-io] block below.
local_msgs = "*"
extra_msgs = "*"
std_msgs = "*"
geometry_msgs = "*"
sensor_msgs = "*"
