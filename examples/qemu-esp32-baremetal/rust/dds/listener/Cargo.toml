[package]
name = "esp32-qemu-dds-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "DDS listener example on ESP32-C3 QEMU + OpenETH + smoltcp (Phase 97.3.esp32-qemu)"

[[bin]]
name = "esp32-qemu-dds-listener"
test = false
bench = false

[dependencies]
nros-board-esp32-qemu = { path = "../../../../../packages/boards/nros-board-esp32-qemu", default-features = false, features = ["ethernet", "dds-heap"] }
nros = { path = "../../../../../packages/core/nros", default-features = false, features = ["alloc", "rmw-dds", "platform-bare-metal", "ros-humble", "rmw-dds-portable-atomic"] }
nros-platform = { path = "../../../../../packages/core/nros-platform", default-features = false, features = ["platform-esp32-qemu"] }
std_msgs = { version = "*", default-features = false }
esp-hal = { version = "~1.0.0", features = ["esp32c3", "unstable"] }
esp-backtrace = { version = "~0.18.0", features = ["esp32c3", "panic-handler", "println"] }

[profile.release]
debug = true
debug-assertions = true
lto = "fat"
codegen-units = 1
