[build]
target = "riscv32imc-unknown-none-elf"

[target.riscv32imc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=--gc-sections",
  "-C", "link-arg=-Tlinkall.x",
  "-C", "force-frame-pointers",
]

[env]
ESP_LOG = "info"
NROS_EXECUTOR_ARENA_SIZE = "16384"
NROS_SMOLTCP_MAX_UDP_SOCKETS = "2"
# issue 0024: shrink the Phase 231 (RFC-0038) size-class large receive buffer
# from the 16 KiB default to 4 KiB. The static large-payload blocks are
# MAX_LARGE_SUBSCRIBERS(2) × RING_DEPTH(4) × LARGE_SIZE = 128 KiB at the
# default, overflowing esp32-c3 DRAM `.bss` by ~54 KiB. 4 KiB cuts the block to
# 32 KiB; 4096 > the 2048 small/large threshold so the split holds, and esp32
# cannot buffer 16 KiB messages anyway. Mirrors the esp32 workspace fixture env.
ZPICO_SUBSCRIBER_LARGE_SIZE = "4096"

[unstable]
build-std = ["core", "alloc"]

