# nano-ros SDK package index (Phase 187).
#
# `nros setup <board>` reads this to fetch prebuilt host toolchains/tools, or
# build them from the `[tool.*.source]` recipe into the same prefix. Prebuilt
# `dist` assets are hosted on NEWSLabNTU/nano-ros-sdk Releases:
#   tag = <tool>-<version>,  asset = <tool>-<host>.tar.zst  (+ .sha256)
#
# Version is the SSOT. `dist.<host>.{url,sha256}` are filled by seeding the
# nano-ros-sdk build workflow (workflow_dispatch) + verified by the
# `sdk-index-gate` CI on any change here. Until an asset is seeded, leave its
# `dist.<host>` out — `nros setup` falls back to the `[tool.*.source]` recipe.
#
# host keys: linux-x86_64 · linux-arm64 · macos-arm64  (matches sdk_index::host_key)

# --- prebuilt host tools (target-agnostic) ---

# nros2: rebuilt with --enable-slirp (nano-ros QEMU tests use -netdev user;
# nros1 lacked slirp and couldn't network).
[tool.qemu]
version = "11.0.0-nros2"
dist.linux-x86_64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/qemu-11.0.0-nros2/qemu-linux-x86_64.tar.zst", sha256 = "a1cb9df6f41070d43042c2455e23823431226e9274c67435eafcbc9cddb1166e" }
dist.linux-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/qemu-11.0.0-nros2/qemu-linux-arm64.tar.zst", sha256 = "33d243e541d2415ceccae65a5e7d7c0aa22c85eeff00c516462f90e4edb4b181" }
dist.macos-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/qemu-11.0.0-nros2/qemu-macos-arm64.tar.zst", sha256 = "daedfbe7af61a91bb746cb911dcc5b88a486fd255b23a3e1e00e58523994fb2d" }
[tool.qemu.source]
git = "https://github.com/NEWSLabNTU/qemu"
ref = "nano-ros-v11.0.0-patches" # patched fork branch (no tags upstream)
configure = "./configure --prefix={prefix} --target-list=arm-softmmu,riscv64-softmmu --enable-slirp --disable-docs --disable-tools --disable-gtk --disable-vnc --disable-sdl --disable-spice"
install = "make -j$(nproc) && make install"

