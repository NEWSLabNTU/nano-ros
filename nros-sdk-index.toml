# px4-rs Rust bindings fork. The px4 examples path-dep its crates, AND the root
# workspace lists `packages/testing/nros-tests` which path-deps px4-sitl-tests
# here — so cargo can't even *load* the workspace without it. Provisioned by
# `nros setup --source px4-rs`, never hand-checked-out. Non-recursive: this is
# the bindings tree only, not the giant PX4-Autopilot submodule.
[source.px4-rs]
version = "0.1.0"
git = "https://github.com/jerry73204/px4-rs.git"
ref = "b17ce297a456c891445a575ce7250573cff96938"
dest = "third-party/px4/px4-rs"
submodule = "third-party/px4/px4-rs"

# CycloneDDS fork as an in-tree *source* (the submodule the Zephyr build patches
# in place) — distinct from `[tool.cyclonedds]` (the prebuilt/host-built ddsc the
# native+host RMW links). Same fork pin. Named `cyclonedds-src` so board/rmw
# package refs to `cyclonedds` keep resolving unambiguously to the tool.
# Provisioned by `nros setup --source cyclonedds-src`.
[source.cyclonedds-src]
version = "0.10.5-nros1"
git = "https://github.com/NEWSLabNTU/cyclonedds.git"
ref = "12b4af2c5ac98657d42df84a5a45006ceede503b"
dest = "third-party/dds/cyclonedds"
submodule = "third-party/dds/cyclonedds"

# Phase 197.2/197.4 — build-time source submodules, folded into the relevant
# board/rmw `packages` (approach A) so `nros setup <board>` provisions them and a
# bare-machine `nros setup <board> → build` works. The SDK index is the single
# home for every source ref (retired config/submodule-deps.toml).

# zenoh-pico TLS dep (zpico-sys C build gates on its presence).
[source.mbedtls]
version = "3.x"
git = "https://github.com/Mbed-TLS/mbedtls.git"
ref = "5e146adef63b326b04282252639bebc2730939c6"
dest = "packages/zpico/zpico-sys/mbedtls"
submodule = "packages/zpico/zpico-sys/mbedtls"

# Micro-XRCE-DDS Client + Micro-CDR — the vendored C sources nros-rmw-xrce-cffi's
# build.rs compiles (its presence gate prints `git submodule update --init …`).
[source.micro-xrce-dds-client]
version = "2.4.3-nros1"
git = "https://github.com/eProsima/Micro-XRCE-DDS-Client.git"
ref = "bdfa28090efc8c0e89aa5c95cdf0878c8289a18b"
dest = "packages/xrce/xrce-sys/micro-xrce-dds-client"
submodule = "packages/xrce/xrce-sys/micro-xrce-dds-client"

[source.micro-cdr]
version = "2.0.x"
git = "https://github.com/eProsima/Micro-CDR.git"
ref = "99672492c5ef9fc378a8835b0bce9b2f7fa41306"
dest = "packages/xrce/xrce-sys/micro-cdr"
submodule = "packages/xrce/xrce-sys/micro-cdr"

# NetX Duo network stack (ThreadX boards link it; virtio-net-netx CMake + the
# threadx board build.rs expect it checked out).
[source.threadx-netxduo]
version = "6.4.x"
git = "https://github.com/NEWSLabNTU/netxduo.git"
ref = "d0c2e80e2da61e274f8f53505b1974fcad7d1071"
dest = "third-party/threadx/netxduo"
submodule = "third-party/threadx/netxduo"

# NuttX kernel + apps — the qemu-arm-nuttx board build.rs / build-nuttx.sh expect
# them present (the export is built with the app, per Phase 194). The Rust libc
# fork is the separate `[source.nuttx-libc]` (it's a board package).
[source.nuttx-kernel]
version = "12.13.0"
git = "https://github.com/jerry73204/nuttx.git"
ref = "d230b7d38380b65351fd5acc8d8c9d25473ec967"
dest = "third-party/nuttx/nuttx"
submodule = "third-party/nuttx/nuttx"

[source.nuttx-apps]
version = "12.13.0"
git = "https://github.com/apache/nuttx-apps.git"
ref = "e4b84b29d47b98a666df524d6f2d38904c972de5"
dest = "third-party/nuttx/nuttx-apps"
submodule = "third-party/nuttx/nuttx-apps"

# PX4-Autopilot — the heavy (>1 GB) reference tree (extended/opt-in). px4-rs (the
# bindings) is the separate `[source.px4-rs]`.
[source.px4-autopilot]
version = "1.17.0"
git = "https://github.com/PX4/PX4-Autopilot.git"
ref = "d6f12ad1c4f70ad3230afd7d86e971421e02fef4"
dest = "third-party/px4/PX4-Autopilot"
submodule = "third-party/px4/PX4-Autopilot"
# Phase 232.5 — pin the stable release tag `v1.17.0` (SHA `d6f12ad`) instead of
# the previous dev commit (`ecfe44a`, mislabeled 1.15.x, post-1.17.0-alpha1),
# which risked a silent uORB ABI drift. `v1.17.0` carries `msg/versioned/` (the
# 37 versioned core topics 232.1 enumerates) + the 6-field `orb_metadata` (232.4).
# The pin is now an advertised tag, so a shallow `git submodule update --depth 1`
# can reach it directly; nros ≥ 0.3.7 still falls back to an explicit depth-1
# fetch-by-SHA if needed. `recursive = false`: PX4's ~50 OWN sub-submodules are
# PX4's concern, pulled shallow by `just px4 setup` (`--depth 1 --recommend-shallow
# --recursive`), not nano-ros source provisioning.
shallow = true
recursive = false

# NOTE (197.4): opt-in dev/interop source repos (zenoh / rmw_zenoh / XRCE-agent
# upstreams, Tonbandgeraet tracing) are intentionally NOT modeled here yet — the
# released `nros` rejects unknown index fields/sections, so wiring opt-in
# `dev_sources` / `[reference.*]` needs an nros-cli schema change first (tracked
# in the Phase 197 workflow review). They remain plain `.gitmodules` submodules.

# --- license-gated (never hosted; instruct + nros doctor checks the env var) ---

[gated.nv-spe-fsp]
version = "36.3"
env = "NV_SPE_FSP_DIR"
installer = "nvidia-sdk-manager"

[gated.arm-fvp]
version = "11.24"
env = "ARM_FVP_DIR"
installer = "arm-fvp-installer"

# --- RMW host packages (Phase 191.6.a): the RMW axis, orthogonal to the board.
# `nros setup <board> --rmw <name>` resolves `board.packages ∪ rmw.packages`
# (default `--rmw zenoh`). Boards list only platform/toolchain packages; the RMW
# daemon/tool lives here — no board×rmw pair enumeration. ---

[rmw.zenoh]
# Phase 197.4 (approach A) — the build-time source submodules are folded into
# `packages` so `nros setup <board>` is the complete provisioner (a bare-machine
# `nros setup <board> → build` works; build.rs gates on these). The released
# `nros` parses [rmw.*]/[board.*] with a strict schema (only `packages` +
# board descriptors), so no extra fields here.
packages = ["zenohd", "zenoh-pico", "mbedtls"]

[rmw.xrce]
packages = ["xrce-agent", "micro-xrce-dds-client", "micro-cdr"]

[rmw.cyclonedds]
packages = ["cyclonedds", "cyclonedds-src"]

# --- boards (Phase 191.1): board → required package set, the board→toolchain
# SSOT. `nros setup <board>` looks the board up here (no name guessing); an
# unknown board errors. `packages` lists [tool]/[source]/[gated] names; empty is
# valid (e.g. ESP32-C3's riscv32 toolchain is rustup-managed). `arch`/`platform`
# are descriptive. Keyed by the canonical board id (examples/<board>/ dir name
# or the board-crate name). ---

[board.native]
arch = "x86_64"
platform = "posix"
packages = [] # host daemon comes from the RMW axis (default rmw.zenoh)

[board.posix]
arch = "x86_64"
platform = "posix"
packages = [] # host daemon comes from the RMW axis (default rmw.zenoh)

[board.qemu-arm-baremetal]
arch = "cortex-m3"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "qemu"]

[board.mps2-an385]
arch = "cortex-m3"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "qemu"]

[board.stm32f4]
arch = "cortex-m4"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "openocd"] # real hw: openocd to flash, no qemu

[board.qemu-arm-freertos]
arch = "cortex-m3"
platform = "freertos"
packages = ["arm-none-eabi-gcc", "qemu", "freertos-kernel", "lwip"]

[board.qemu-arm-nuttx]
arch = "cortex-m3"
platform = "nuttx" # NuttX kernel/apps are submodule SDKs (built with the app)
# nuttx-libc is the one source the Rust example path-deps, so `nros setup` must
# provision it. (Kernel/apps are pulled by the full west/make build, not here.)
packages = ["arm-none-eabi-gcc", "qemu", "nuttx-libc", "nuttx-kernel", "nuttx-apps"]

# 194.3c — the riscv (rv-virt) NuttX board: the 2nd-arch proof that the NuttX
# provisioning path is arch-agnostic. Same source set as qemu-arm-nuttx but the
# riscv cross-gcc; qemu already builds riscv64-softmmu (see [tool.qemu] configure
# --target-list). The nano-ros riscv defconfig drops the board etc-ROMFS, so no
# genromfs host tool is needed (the stock rv-virt board would require it).
[board.qemu-riscv-nuttx]
arch = "riscv32" # rv-virt (rv32imac); riscv32imac-unknown-nuttx-elf
platform = "nuttx"
# genromfs: the rv-virt board bakes an etc/ ROMFS at export time (arm doesn't).
packages = ["riscv-none-elf-gcc", "qemu", "genromfs", "nuttx-libc", "nuttx-kernel", "nuttx-apps"]

[board.qemu-riscv64-threadx]
arch = "riscv64"
platform = "threadx"
packages = ["riscv-none-elf-gcc", "qemu", "threadx", "threadx-netxduo"]

[board.threadx-linux]
arch = "x86_64"
platform = "threadx"
# runs on the host; the zenoh daemon comes from rmw.zenoh
packages = ["threadx", "threadx-netxduo"]

[board.qemu-esp32-baremetal]
arch = "riscv32"
platform = "bare-metal"
packages = []

[board.orin-spe]
arch = "cortex-r5"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "nv-spe-fsp"]

[board.fvp-aemv8r-smp]
arch = "aarch64"
platform = "bare-metal"
packages = ["arm-fvp"]

[board.zephyr]
platform = "zephyr" # west + zephyr-sdk toolchain, provisioned outside the index
packages = []

# NOTE (197.4): a `[reference.*]` grouping for heavy opt-in source sets (px4,
# tracing) was removed — the released `nros` rejects unknown index sections.
# `just px4 setup` provisions px4-rs + px4-autopilot directly via
# `nros setup --source …`. Re-introducing index-level references needs an
# nros-cli schema change (Phase 197 workflow review).
