# nano-ros SDK package index (Phase 187).
#
# `nros setup <board>` reads this to fetch prebuilt host toolchains/tools, or
# build them from the `[tool.*.source]` recipe into the same prefix. Prebuilt
# `dist` assets are hosted on NEWSLabNTU/nano-ros-sdk Releases:
#   tag = <tool>-<version>,  asset = <tool>-<host>.tar.zst  (+ .sha256)
#
# Version is the SSOT. `dist.<host>.{url,sha256}` are filled by seeding the
# nano-ros-sdk build workflow (workflow_dispatch) + verified by the
# `sdk-index-gate` CI on any change here. Until an asset is seeded, leave its
# `dist.<host>` out — `nros setup` falls back to the `[tool.*.source]` recipe.
#
# host keys: linux-x86_64 · linux-arm64 · macos-arm64  (matches sdk_index::host_key)

# --- prebuilt host tools (target-agnostic) ---

# nros2: rebuilt with --enable-slirp (nano-ros QEMU tests use -netdev user;
# nros1 lacked slirp and couldn't network).
[tool.qemu]
version = "11.0.0-nros2"
upstream = "nano-ros-v11.0.0-patches" # exact upstream rev/branch (SSOT for build-tool.yml)
dist.linux-x86_64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/qemu-11.0.0-nros2/qemu-linux-x86_64.tar.zst", sha256 = "a1cb9df6f41070d43042c2455e23823431226e9274c67435eafcbc9cddb1166e" }
dist.linux-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/qemu-11.0.0-nros2/qemu-linux-arm64.tar.zst", sha256 = "33d243e541d2415ceccae65a5e7d7c0aa22c85eeff00c516462f90e4edb4b181" }
dist.macos-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/qemu-11.0.0-nros2/qemu-macos-arm64.tar.zst", sha256 = "daedfbe7af61a91bb746cb911dcc5b88a486fd255b23a3e1e00e58523994fb2d" }
[tool.qemu.source]
git = "https://github.com/NEWSLabNTU/qemu"
ref = "nano-ros-v11.0.0-patches" # patched fork branch (no tags upstream)
configure = "./configure --prefix={prefix} --target-list=arm-softmmu,riscv64-softmmu --enable-slirp --disable-docs --disable-tools --disable-gtk --disable-vnc --disable-sdl --disable-spice"
install = "make -j$(nproc) && make install"

[tool.arm-none-eabi-gcc]
version = "13.2-nros1"
upstream = "13.2.rel1" # ARM release id (SSOT — build script no longer hand-derives)
# Repackaged from ARM's release; no in-repo source build (binary toolchain).
dist.linux-x86_64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/arm-none-eabi-gcc-13.2-nros1/arm-none-eabi-gcc-linux-x86_64.tar.zst", sha256 = "2d913ea50094cefc29a85bf18dddcbf8854b7a2ec9ca892e89f2f25ba06b32da" }
dist.linux-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/arm-none-eabi-gcc-13.2-nros1/arm-none-eabi-gcc-linux-arm64.tar.zst", sha256 = "93da429c4a93d0c99a8a16b8cdbb979ef8717c1f8b39fcf3cae4a601d426db6e" }
dist.macos-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/arm-none-eabi-gcc-13.2-nros1/arm-none-eabi-gcc-macos-arm64.tar.zst", sha256 = "d1a2311ff7590e6370be8df34e6dea3d572df83aa95672eb484026f2fd4b6748" }

[tool.riscv-none-elf-gcc]
version = "14.2-nros1"
upstream = "14.2.0-3" # xPack build (SSOT — was hardcoded only in the build script)
dist.linux-x86_64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/riscv-none-elf-gcc-14.2-nros1/riscv-none-elf-gcc-linux-x86_64.tar.zst", sha256 = "0f7a938cf5724c6c4ac48af140ede038015d63df1a6460f671d1215fff5ba622" }
dist.linux-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/riscv-none-elf-gcc-14.2-nros1/riscv-none-elf-gcc-linux-arm64.tar.zst", sha256 = "8eba3c6e8e9dd51ae0583146209100a5e09a670649f1ed0840c26608caa32095" }
dist.macos-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/riscv-none-elf-gcc-14.2-nros1/riscv-none-elf-gcc-macos-arm64.tar.zst", sha256 = "eb9cd46e48e2196fb13d09112a655b3b926ff18a2350eb7ae79336205165b954" }

[tool.zenohd]
version = "1.7.2-nros1"
upstream = "1.7.2" # = source.ref
dist.linux-x86_64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/zenohd-1.7.2-nros1/zenohd-linux-x86_64.tar.zst", sha256 = "9f90cb3b83d11c9213e25f0fc1fc9826600a215abf0526cfa361f2a1f5fa9698" }
dist.linux-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/zenohd-1.7.2-nros1/zenohd-linux-arm64.tar.zst", sha256 = "c92508860fa1efd0262ff797da478e1c5db1547a63c05f536a32ca136000d9ce" }
dist.macos-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/zenohd-1.7.2-nros1/zenohd-macos-arm64.tar.zst", sha256 = "5f0491a24ceb7364e7ae1d3475a421eaa78369b14acee488337ffe17ebab1af5" }
[tool.zenohd.source]
git = "https://github.com/eclipse-zenoh/zenoh"
ref = "1.7.2"
install = "cargo install --path zenohd --root {prefix} --locked"

[tool.openocd]
version = "0.12.0-nros1"
upstream = "v0.12.0" # upstream tag (SSOT — build script no longer hand-derives)
dist.linux-x86_64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/openocd-0.12.0-nros1/openocd-linux-x86_64.tar.zst", sha256 = "f21e7be90a71c354251956ce43b30520e116de9ceab57ac70d521eccd99809ca" }
dist.linux-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/openocd-0.12.0-nros1/openocd-linux-arm64.tar.zst", sha256 = "39ed5882df9f20ca2dda18a850418441dcbb17a2f39071dae587d40f0a590987" }
dist.macos-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/openocd-0.12.0-nros1/openocd-macos-arm64.tar.zst", sha256 = "1777ad02eeb1b7702d61a53b72496a00bea4aad18d3415f1e4cf82172f974909" }

# Micro-XRCE-DDS Agent — the host daemon the XRCE-DDS RMW connects to (the
# counterpart to zenohd for the rmw-xrce path). Source build is a CMake
# superbuild (pulls Fast-DDS/Fast-CDR), so prefer the prebuilt once seeded.
[tool.xrce-agent]
version = "2.4.3-nros1"
upstream = "v2.4.3" # = source.ref (eProsima release tag)
[tool.xrce-agent.source]
git = "https://github.com/eProsima/Micro-XRCE-DDS-Agent"
ref = "v2.4.3"
configure = "cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DUAGENT_BUILD_EXECUTABLE=ON -DUAGENT_P2P_PROFILE=OFF -DUAGENT_LOGGER_PROFILE=OFF"
# Superbuild: no top-level `install` target + the binary's RUNPATH is absolute,
# so build then assemble a relocatable prefix (real binary + bundled libs + a
# wrapper that points LD/DYLD_LIBRARY_PATH at ../lib). Mirrors
# nano-ros-sdk/scripts/build-xrce-agent.sh.
install = '''cmake --build build --parallel $(nproc) && mkdir -p {prefix}/bin {prefix}/lib && cp -a build/MicroXRCEAgent {prefix}/lib/MicroXRCEAgent.real && cp -a build/libmicroxrcedds_agent.so* {prefix}/lib/ && cp -a build/temp_install/fastrtps-*/lib/libfastrtps.so* {prefix}/lib/ && cp -a build/temp_install/fastcdr-*/lib/libfastcdr.so* {prefix}/lib/ && printf '#!/bin/sh\nh="$(cd "$(dirname "$0")" && pwd)"\nLD_LIBRARY_PATH="$h/../lib:$LD_LIBRARY_PATH" DYLD_LIBRARY_PATH="$h/../lib:$DYLD_LIBRARY_PATH" exec "$h/../lib/MicroXRCEAgent.real" "$@"\n' > {prefix}/bin/MicroXRCEAgent && chmod +x {prefix}/bin/MicroXRCEAgent'''

# Cyclone DDS host tools — `idlc` (descriptor codegen) + `libddsc` for the
# rmw-cyclonedds path (native + the embedded cross-ddsc base). Built from the
# NEWSLabNTU fork's `nano-ros` integration branch, pinned to the submodule sha.
[tool.cyclonedds]
version = "0.10.5-nros1"
upstream = "12b4af2c5ac98657d42df84a5a45006ceede503b" # fork sha = submodule pointer
[tool.cyclonedds.source]
git = "https://github.com/NEWSLabNTU/cyclonedds"
ref = "12b4af2c5ac98657d42df84a5a45006ceede503b"
configure = "cmake -S . -B build -DCMAKE_INSTALL_PREFIX={prefix} -DCMAKE_BUILD_TYPE=Release -DBUILD_IDLC=ON -DBUILD_TESTING=OFF -DBUILD_DDSPERF=OFF"
install = "cmake --build build --parallel $(nproc) --target install"

# --- source packages (built with the app for the user's target) ---

[source.freertos-kernel]
version = "10.6.2"

[source.lwip]
version = "2.2.0"

[source.threadx]
version = "6.4.1"

[source.zenoh-pico]
version = "1.7.2"

# --- license-gated (never hosted; instruct + nros doctor checks the env var) ---

[gated.nv-spe-fsp]
version = "36.3"
env = "NV_SPE_FSP_DIR"
installer = "nvidia-sdk-manager"

[gated.arm-fvp]
version = "11.24"
env = "ARM_FVP_DIR"
installer = "arm-fvp-installer"

# --- RMW host packages (Phase 191.6.a): the RMW axis, orthogonal to the board.
# `nros setup <board> --rmw <name>` resolves `board.packages ∪ rmw.packages`
# (default `--rmw zenoh`). Boards list only platform/toolchain packages; the RMW
# daemon/tool lives here — no board×rmw pair enumeration. ---

[rmw.zenoh]
packages = ["zenohd"]

[rmw.xrce]
packages = ["xrce-agent"]

[rmw.cyclonedds]
packages = ["cyclonedds"]

# --- boards (Phase 191.1): board → required package set, the board→toolchain
# SSOT. `nros setup <board>` looks the board up here (no name guessing); an
# unknown board errors. `packages` lists [tool]/[source]/[gated] names; empty is
# valid (e.g. ESP32-C3's riscv32 toolchain is rustup-managed). `arch`/`platform`
# are descriptive. Keyed by the canonical board id (examples/<board>/ dir name
# or the board-crate name). ---

[board.native]
arch = "x86_64"
platform = "posix"
packages = [] # host daemon comes from the RMW axis (default rmw.zenoh)

[board.posix]
arch = "x86_64"
platform = "posix"
packages = [] # host daemon comes from the RMW axis (default rmw.zenoh)

[board.qemu-arm-baremetal]
arch = "cortex-m3"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "qemu"]

[board.mps2-an385]
arch = "cortex-m3"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "qemu"]

[board.stm32f4]
arch = "cortex-m4"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "openocd"] # real hw: openocd to flash, no qemu

[board.qemu-arm-freertos]
arch = "cortex-m3"
platform = "freertos"
packages = ["arm-none-eabi-gcc", "qemu", "freertos-kernel", "lwip"]

[board.qemu-arm-nuttx]
arch = "cortex-m3"
platform = "nuttx" # NuttX itself is a submodule SDK, not an index package
packages = ["arm-none-eabi-gcc", "qemu"]

[board.qemu-riscv64-threadx]
arch = "riscv64"
platform = "threadx"
packages = ["riscv-none-elf-gcc", "qemu", "threadx"]

[board.threadx-linux]
arch = "x86_64"
platform = "threadx"
packages = ["threadx"] # runs on the host; the zenoh daemon comes from rmw.zenoh

[board.esp32]
arch = "riscv32" # ESP32-C3; riscv32imc rustup target + build-std (no external gcc)
platform = "bare-metal"
packages = [] # esp qemu fork not indexed; Rust target via `just workspace rust-targets`

[board.qemu-esp32-baremetal]
arch = "riscv32"
platform = "bare-metal"
packages = []

[board.orin-spe]
arch = "cortex-r5"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "nv-spe-fsp"]

[board.fvp-aemv8r-smp]
arch = "aarch64"
platform = "bare-metal"
packages = ["arm-fvp"]

[board.zephyr]
platform = "zephyr" # west + zephyr-sdk toolchain, provisioned outside the index
packages = []
