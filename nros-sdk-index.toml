# play_launch_parser — the launch-graph parser the `nros plan` /
# `nros codegen-system` resolver shells out to when synthesising or
# multi-resolving `<pkg>/launch/*.launch.xml` (Phase 212.L.6). The
# resolver builds the XML body (synth-from-Component-pkg OR pkg-named
# vs system.launch.xml precedence) in-memory and pipes it through this
# binary to get the `record.json` the planner consumes. Without it the
# Phase 212 L.6 gate tests (`phase212_l6_launch_synth::*`) skip clean;
# with it they transition SKIP -> PASS, closing the §Acceptance
# "Launch file synthesis works" + "Multi-launch resolution works"
# bullets.
#
# Source-build only — the upstream `jerry73204/play_launch_parser` repo
# is a Rust workspace (no PyPI package, no prebuilt release tags), so
# install via `cargo install --path crates/play_launch_parser` (same
# shape as `[tool.nros]` / `[tool.zenohd]`). Pinned to a SHA on `main`
# (no upstream tags yet) — same convention the `[tool.cyclonedds]` row
# uses to pin a SHA on the NEWSLabNTU fork's `nano-ros` branch. The
# cmd-line surface the L.6 resolver requires (`play_launch_parser --help`,
# the `launch <pkg> <file>` subcommand) has been stable across the
# pinned `main` window, but bumping the SHA is the explicit signal to
# re-run the L.6 gate tests.
#
# Build-time prereq: a Python dev install (pyo3 `auto-initialize` links
# libpythonX.Y at build time). On the default-tier host that's already
# present (apt `python3`/`python3-dev` covered by `just workspace
# apt-packages`); on bare-bones CI it would be the one extra apt
# package, but neither tier moves a module without docs + orchestrator
# updates so this stays implicit (the `workspace` module is the
# umbrella). Header/binary-only install at well under the 500 MB /
# 5 min `default` tier policy in `docs/development/sdk-tiers.md`,
# idempotent (the `just workspace install-play-launch-parser` recipe
# gates on a `.installed-version` stamp).
[tool.play_launch_parser]
version = "0.1.0-nros1"
upstream = "098ccb43328bca3c35320bb3adac27a11035b15d" # = source.ref (main SHA, no upstream tags)
[tool.play_launch_parser.source]
git = "https://github.com/jerry73204/play_launch_parser"
ref = "098ccb43328bca3c35320bb3adac27a11035b15d"
install = "cargo install --path crates/play_launch_parser --root {prefix} --locked"

# Corrosion — the CMake ↔ Rust/Cargo bridge that `corrosion_import_crate()`
# in mixed-language workspaces (Phase 212 — `cmake/NanoRosThreadxSystemCodegen.cmake`,
# `multi_pkg_workspace_mixed` fixture, examples/native/rust talker/listener
# CycloneDDS path) depends on. Header/config-only at install time: a small
# CMake superproject staged into `~/.nros/sdk/corrosion/share/corrosion/`
# (well under the 500 MB / 5 min `default` tier policy in
# `docs/development/sdk-tiers.md`, idempotent — `just workspace install-corrosion`
# already gates on a `.installed-version` stamp). Source-built only — upstream
# `corrosion-rs/corrosion` releases ship source tarballs, not prebuilt binaries
# we mirror, so no `dist.<host>` rows. Pinned to the same `v0.5.1` tag the
# `just workspace install-corrosion` recipe uses, so a `nros setup --tool corrosion`
# and a `just workspace install-corrosion` land the same Corrosion version at the
# same prefix. The Phase 212 `cmake_mixed_corrosion_bridge_builds` test (and the
# `just workspace doctor` check) both expect `~/.nros/sdk/corrosion/`.
[tool.corrosion]
version = "0.5.1-nros1"
upstream = "v0.5.1" # = source.ref (corrosion-rs/corrosion release tag)
[tool.corrosion.source]
git = "https://github.com/corrosion-rs/corrosion"
ref = "v0.5.1"
configure = "cmake -S . -B build -DCMAKE_INSTALL_PREFIX={prefix} -DCMAKE_BUILD_TYPE=Release -DCORROSION_BUILD_TESTS=OFF"
install = "cmake --build build --parallel $(nproc) --target install"

# Phase 197.3 — Espressif's QEMU fork (provides the `esp32c3` machine the ESP32
# emulator tests need; stock qemu-system-riscv32 only knows `virt`). Source-built
# only (not hosted) — `just esp32 setup` → `nros setup --tool esp32-qemu`.
[tool.esp32-qemu]
version = "esp-develop-nros1"
upstream = "esp-develop"
[tool.esp32-qemu.source]
git = "https://github.com/espressif/qemu"
# A tag, not a bare SHA: nros's source-build clones by ref (git clone --branch),
# which needs a branch/tag. esp-develop line provides the `esp32c3` machine.
ref = "esp-develop-9.2.2-20260417"
configure = "./configure --target-list=riscv32-softmmu --prefix={prefix} --enable-gcrypt --enable-slirp --disable-strip --disable-user --disable-capstone --disable-vnc --disable-gtk --disable-sdl --disable-docs"
install = "ninja -C build -j$(nproc) && ninja -C build install"

# 194.3c — genromfs: the NuttX rv-virt board's src/Makefile unconditionally bakes
# an etc/ ROMFS (RCSRCS = etc/init.d/{rc.sysinit,rcS}) via `genromfs`, so any
# rv-virt `make export` needs it on PATH. The qemu-armv7a board has no RCSRCS, so
# arm doesn't. Source-built (tiny single-file C tool; not apt — keeps "everything
# via nros setup"). Installs to {prefix}/bin/genromfs; activate puts the SDK-store
# bins on PATH. Only the qemu-riscv-nuttx board lists it.
[tool.genromfs]
version = "0.5.7-nros1"
upstream = "0.5.7"
[tool.genromfs.source]
git = "https://github.com/chexum/genromfs"
ref = "0.5.7"
configure = "make genromfs"
install = "install -D -m 0755 genromfs {prefix}/bin/genromfs"

# --- source packages (built with the app for the user's target) ---
#
# Phase 195.B — data-driven provisioning. Each source is a committed submodule,
# so `nros setup` runs `git submodule update --init <submodule>` into `dest`;
# `git`/`ref` record the canonical pin (SSOT — kept in lockstep with
# `.gitmodules` + the recorded gitlink, so the two can't drift). `dest` is
# workspace-relative — never a path baked into the `nros` binary.

[source.freertos-kernel]
version = "10.6.2"
git = "https://github.com/FreeRTOS/FreeRTOS-Kernel.git"
ref = "0adc196d4bd52a2d91102b525b0aafc1e14a2386"
dest = "third-party/freertos/kernel"
submodule = "third-party/freertos/kernel"

[source.lwip]
version = "2.2.0"
git = "https://github.com/jerry73204/lwip.git"
ref = "6233eb61c89b531fd5aaa16acdd6bc5c6368dfdd"
dest = "third-party/freertos/lwip"
submodule = "third-party/freertos/lwip"

[source.threadx]
