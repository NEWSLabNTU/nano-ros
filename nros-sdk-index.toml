# Micro-XRCE-DDS Agent — the host daemon the XRCE-DDS RMW connects to (the
# counterpart to zenohd for the rmw-xrce path). Source build is a CMake
# superbuild (pulls Fast-DDS/Fast-CDR), so prefer the prebuilt once seeded.
[tool.xrce-agent]
version = "2.4.3-nros1"
upstream = "v2.4.3" # = source.ref (eProsima release tag)
dist.linux-x86_64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/xrce-agent-2.4.3-nros1/xrce-agent-linux-x86_64.tar.zst", sha256 = "61c2e7786ffdbc3ea7f19882f12fb9dd3c28756c6dafd6ec459c9fa86de9438f" }
dist.linux-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/xrce-agent-2.4.3-nros1/xrce-agent-linux-arm64.tar.zst", sha256 = "29c6d7db3147bd9b0fac7d76ece23d90fa22907a7a556b88c3c2f9d6b8ba0344" }
dist.macos-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/xrce-agent-2.4.3-nros1/xrce-agent-macos-arm64.tar.zst", sha256 = "08133ec56db8fb5c0d80cfb5c99b5dea52e8b1af5932a5057fd153c1cb896e96" }
[tool.xrce-agent.source]
git = "https://github.com/eProsima/Micro-XRCE-DDS-Agent"
ref = "v2.4.3"
configure = "cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DUAGENT_BUILD_EXECUTABLE=ON -DUAGENT_P2P_PROFILE=OFF -DUAGENT_LOGGER_PROFILE=OFF -DUAGENT_SOCKETCAN_PROFILE=OFF"
# Superbuild: no top-level `install` target + the binary's RUNPATH is absolute,
# so build then assemble a relocatable prefix (real binary + bundled libs + a
# wrapper that points LD/DYLD_LIBRARY_PATH at ../lib). Mirrors
# nano-ros-sdk/scripts/build-xrce-agent.sh.
install = '''cmake --build build --parallel $(nproc) && mkdir -p {prefix}/bin {prefix}/lib && cp -a build/MicroXRCEAgent {prefix}/lib/MicroXRCEAgent.real && find build -maxdepth 1 \( -name 'libmicroxrcedds_agent.so*' -o -name 'libmicroxrcedds_agent*.dylib' \) -exec cp -a {} {prefix}/lib/ \; && find build/temp_install \( -name 'libfastrtps*.so*' -o -name 'libfastrtps*.dylib' -o -name 'libfastcdr*.so*' -o -name 'libfastcdr*.dylib' \) -exec cp -a {} {prefix}/lib/ \; && printf '#!/bin/sh\nh="$(cd "$(dirname "$0")" && pwd)"\nLD_LIBRARY_PATH="$h/../lib:$LD_LIBRARY_PATH" DYLD_LIBRARY_PATH="$h/../lib:$DYLD_LIBRARY_PATH" exec "$h/../lib/MicroXRCEAgent.real" "$@"\n' > {prefix}/bin/MicroXRCEAgent && chmod +x {prefix}/bin/MicroXRCEAgent'''

# Cyclone DDS host tools — `idlc` (descriptor codegen) + `libddsc` for the
# rmw-cyclonedds path (native + the embedded cross-ddsc base). Built from the
# NEWSLabNTU fork's `nano-ros` integration branch, pinned to the submodule sha.
[tool.cyclonedds]
version = "0.10.5-nros1"
upstream = "12b4af2c5ac98657d42df84a5a45006ceede503b" # fork sha = submodule pointer
dist.linux-x86_64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/cyclonedds-0.10.5-nros1/cyclonedds-linux-x86_64.tar.zst", sha256 = "ed8a51eac91a884f39bfff4fe824923e5edf1f9dadb4a941c99a9f080c7217d3" }
dist.linux-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/cyclonedds-0.10.5-nros1/cyclonedds-linux-arm64.tar.zst", sha256 = "4c224398115bd45e14b37d6c8de7e94f4aed6f46da762f517654221327c51d5e" }
dist.macos-arm64 = { url = "https://github.com/NEWSLabNTU/nano-ros-sdk/releases/download/cyclonedds-0.10.5-nros1/cyclonedds-macos-arm64.tar.zst", sha256 = "f13c0dab71aa953c72aa5e5b4d7d8022a48de1670ccf28b103920ec06f1c3715" }
[tool.cyclonedds.source]
git = "https://github.com/NEWSLabNTU/cyclonedds"
ref = "12b4af2c5ac98657d42df84a5a45006ceede503b"
configure = "cmake -S . -B build -DCMAKE_INSTALL_PREFIX={prefix} -DCMAKE_BUILD_TYPE=Release -DBUILD_IDLC=ON -DBUILD_TESTING=OFF -DBUILD_DDSPERF=OFF"
install = "cmake --build build --parallel $(nproc) --target install"

# --- source packages (built with the app for the user's target) ---
#
# Phase 195.B — data-driven provisioning. Each source is a committed submodule,
# so `nros setup` runs `git submodule update --init <submodule>` into `dest`;
# `git`/`ref` record the canonical pin (SSOT — kept in lockstep with
# `.gitmodules` + the recorded gitlink, so the two can't drift). `dest` is
# workspace-relative — never a path baked into the `nros` binary.

[source.freertos-kernel]
version = "10.6.2"
git = "https://github.com/FreeRTOS/FreeRTOS-Kernel.git"
ref = "0adc196d4bd52a2d91102b525b0aafc1e14a2386"
dest = "third-party/freertos/kernel"
submodule = "third-party/freertos/kernel"

[source.lwip]
version = "2.2.0"
git = "https://github.com/jerry73204/lwip.git"
ref = "6233eb61c89b531fd5aaa16acdd6bc5c6368dfdd"
dest = "third-party/freertos/lwip"
submodule = "third-party/freertos/lwip"

[source.threadx]
version = "6.4.1"
git = "https://github.com/eclipse-threadx/threadx.git"
ref = "4b6e8100d932a3a67b34c6eb17f84f3bffb9e2ae"
dest = "third-party/threadx/kernel"
submodule = "third-party/threadx/kernel"

[source.zenoh-pico]
version = "1.7.2"
git = "https://github.com/jerry73204/zenoh-pico.git"
ref = "f68feb77fbe48c2443957fd18639705808a31848"
dest = "packages/zpico/zpico-sys/zenoh-pico"
submodule = "packages/zpico/zpico-sys/zenoh-pico"

# --- license-gated (never hosted; instruct + nros doctor checks the env var) ---

[gated.nv-spe-fsp]
version = "36.3"
env = "NV_SPE_FSP_DIR"
installer = "nvidia-sdk-manager"

[gated.arm-fvp]
version = "11.24"
env = "ARM_FVP_DIR"
installer = "arm-fvp-installer"

# --- RMW host packages (Phase 191.6.a): the RMW axis, orthogonal to the board.
# `nros setup <board> --rmw <name>` resolves `board.packages ∪ rmw.packages`
# (default `--rmw zenoh`). Boards list only platform/toolchain packages; the RMW
# daemon/tool lives here — no board×rmw pair enumeration. ---

[rmw.zenoh]
packages = ["zenohd"]

[rmw.xrce]
packages = ["xrce-agent"]

[rmw.cyclonedds]
packages = ["cyclonedds"]

# --- boards (Phase 191.1): board → required package set, the board→toolchain
# SSOT. `nros setup <board>` looks the board up here (no name guessing); an
# unknown board errors. `packages` lists [tool]/[source]/[gated] names; empty is
# valid (e.g. ESP32-C3's riscv32 toolchain is rustup-managed). `arch`/`platform`
# are descriptive. Keyed by the canonical board id (examples/<board>/ dir name
# or the board-crate name). ---

[board.native]
arch = "x86_64"
platform = "posix"
packages = [] # host daemon comes from the RMW axis (default rmw.zenoh)

[board.posix]
arch = "x86_64"
platform = "posix"
packages = [] # host daemon comes from the RMW axis (default rmw.zenoh)

[board.qemu-arm-baremetal]
arch = "cortex-m3"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "qemu"]

[board.mps2-an385]
arch = "cortex-m3"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "qemu"]

[board.stm32f4]
arch = "cortex-m4"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "openocd"] # real hw: openocd to flash, no qemu

[board.qemu-arm-freertos]
arch = "cortex-m3"
platform = "freertos"
packages = ["arm-none-eabi-gcc", "qemu", "freertos-kernel", "lwip"]

[board.qemu-arm-nuttx]
arch = "cortex-m3"
platform = "nuttx" # NuttX itself is a submodule SDK, not an index package
packages = ["arm-none-eabi-gcc", "qemu"]

[board.qemu-riscv64-threadx]
arch = "riscv64"
platform = "threadx"
packages = ["riscv-none-elf-gcc", "qemu", "threadx"]

[board.threadx-linux]
arch = "x86_64"
platform = "threadx"
packages = ["threadx"] # runs on the host; the zenoh daemon comes from rmw.zenoh

[board.esp32]
arch = "riscv32" # ESP32-C3; riscv32imc rustup target + build-std (no external gcc)
platform = "bare-metal"
packages = [] # esp qemu fork not indexed; Rust target via `just workspace rust-targets`

[board.qemu-esp32-baremetal]
arch = "riscv32"
platform = "bare-metal"
packages = []

[board.orin-spe]
arch = "cortex-r5"
platform = "bare-metal"
packages = ["arm-none-eabi-gcc", "nv-spe-fsp"]

[board.fvp-aemv8r-smp]
arch = "aarch64"
platform = "bare-metal"
packages = ["arm-fvp"]

[board.zephyr]
platform = "zephyr" # west + zephyr-sdk toolchain, provisioned outside the index
packages = []
