ref = "f68feb77fbe48c2443957fd18639705808a31848"
dest = "packages/zpico/zpico-sys/zenoh-pico"
submodule = "packages/zpico/zpico-sys/zenoh-pico"

# NuttX Rust libc fork — the qemu-arm-nuttx examples path-dep it via their
# .cargo/config (`libc = { path = third-party/nuttx/libc }`), so it must be
# provisioned by `nros setup qemu-arm-nuttx`, not hand-checked-out by the user.
[source.nuttx-libc]
version = "0.2-nuttx"
