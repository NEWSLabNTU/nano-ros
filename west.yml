# nros West Manifest
#
# This manifest defines the nros Zephyr workspace.
# Users initialize a workspace with:
#
#   west init -m https://github.com/user/nano-ros ~/nano-ros-workspace
#   cd ~/nano-ros-workspace
#   west update
#
# Or for local development:
#
#   west init -l /path/to/nros ~/nano-ros-workspace
#   cd ~/nano-ros-workspace
#   west update

manifest:
  version: "1.0"

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    # Zephyr RTOS
    - name: zephyr
      remote: zephyrproject-rtos
      revision: v3.7.0
      import:
        # Import Zephyr's modules, filtered to essentials
        name-allowlist:
          # Core
          - cmsis
          - picolibc
          # Crypto
          - mbedtls
          - tinycrypt
          # HALs (add more as needed for your boards)
          - hal_stm32
          - hal_nordic
          - hal_espressif
          - hal_nxp
          # Bootloader
          - mcuboot
          # Tools
          - net-tools

    # Rust language support for Zephyr. Phase 199.2 — pin a specific SHA (not
    # `main`, which drifts): the support unit is the (zephyr × zephyr-lang-rust)
    # pair, so the 3.7 LTS line freezes the zephyr-lang-rust rev `main` resolved
    # to (zephyr-lang-rust is untagged — no Zephyr-version release to pin). Bump
    # deliberately; see docs/development/zephyr-version-support.md.
    - name: zephyr-lang-rust
      remote: zephyrproject-rtos
      revision: 404fcefdbab0f2711cd342a1fab9d2eda52a1ba9
      path: modules/lang/rust

  self:
    # nros is the manifest repository
    path: nros
    # phase-298 W2 (issue 0232) — register the nano-ros west extension
    # commands (`west fvp`: resolve the license-gated Arm FVP via
    # resolve-fvp-bin.sh, then delegate to `west build -t run`). Without
    # this line the extension never loads and `west fvp` fails
    # "unknown command".
    west-commands: scripts/west-commands.yml
