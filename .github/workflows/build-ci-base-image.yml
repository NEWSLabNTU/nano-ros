# Build + publish the nano-ros CI base image (Phase 196.9).
#
# ROS 2 Humble + host tools (cmake/ninja/dtc/gperf, uv, just, rustup + cross
# targets, arm-none-eabi-gcc), baked once so the per-platform + host CI lanes run
# `container:` against it instead of re-installing every run (and so
# `nros generate-rust` finds ROS/AMENT). The Zephyr CI image is `FROM` this +
# its SDK layer. See ci/docker/ci-base/Dockerfile.
name: build-ci-base-image

on:
  push:
    branches: [main]
    paths:
      - "ci/docker/ci-base/**"
      - ".github/workflows/build-ci-base-image.yml"
  workflow_dispatch:

concurrency:
  group: build-ci-base-image
  cancel-in-progress: false

env:
  # Tag = ROS distro (bump when the baked toolset changes, in lockstep with the
  # consuming lanes' `container:`). GHCR repo names must be lowercase.
  IMAGE: ghcr.io/newslabntu/nano-ros-ci
  TAG: humble

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ci/docker/ci-base
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
