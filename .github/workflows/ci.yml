# Core-libraries lane (Phase 196.3).
#
# One of the split CI parts: the portable `no_std` core crates, cross-checked on
# bare embedded targets. Fresh-runner-safe by design — these crates have NO SDK
# or submodule deps, so the job needs no toolchain provisioning beyond a rustup
# target. The per-platform build lanes (zephyr-dual-line.yml, …) and the
# cross-platform resolution lane (dep-chain.yml) cover everything that does.
#
# Split by target (not one job per crate): each target is one job running a
# single `cargo check` over all crates compatible with it — isolates target
# regressions, parallel, minimal per-job overhead.
name: core-libs

on:
  push:
    branches: [main]
    paths:
      - "packages/core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-libs:
    name: core no_std / ${{ matrix.target }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    # nano-ros-ci bakes rustup + every cross target this lane checks (thumbv7m,
    # riscv32imc), so no per-run `rustup target add`. See ci/docker/ci-base.
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        # thumbv7m has atomic CAS; riscv32imc does not (drops nros-rmw-cffi).
        target:
          - thumbv7m-none-eabi
          - riscv32imc-unknown-none-elf
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 — build the nros CLI from packages/cli/ in-tree. Cached so
      # PRs that don't touch the CLI tree pay sub-30s restore-then-relink.
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      # cargo must read *every* root-workspace member's Cargo.toml to load the
      # workspace — including packages/testing/nros-tests, which path-deps
      # px4-sitl-tests under third-party/px4/px4-rs. Provision it the way a user
      # does — `nros setup --source px4-rs` (index-driven), not a hand
      # `git submodule update`.
      - name: Provision workspace sources via nros
        run: nros setup --source px4-rs

      - name: Cross-check core no_std crates
        run: |
          # Portable core: no SDK/submodule deps, builds with --no-default-features
          # on bare targets. nros-rmw-cffi needs atomic CAS (CAS-capable targets
          # only). Keep this list in sync as core crates gain/lose no_std support.
          PKGS=(
            nros-core
            nros-log
            nros-serdes
            nros-params
            nros-platform-api
            nros-platform-cffi
            nros-platform-critical-section
            nros-rmw
          )
          if [ "${{ matrix.target }}" = "thumbv7m-none-eabi" ]; then
            PKGS+=(nros-rmw-cffi) # needs atomic CAS
          fi
          args=()
          for p in "${PKGS[@]}"; do args+=(-p "$p"); done
          set -x
          cargo check "${args[@]}" --no-default-features --target "${{ matrix.target }}"
