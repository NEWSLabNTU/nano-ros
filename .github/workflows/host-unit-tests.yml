# Host unit-test lane (Phase 196 — CI coverage gap).
#
# Runs `just test-unit` — the workspace unit tests (`cargo nextest --workspace
# --exclude nros-tests`), the cheap host tier (no QEMU / ROS / SDKs). A
# prebuilt zenohd IS provisioned (the workspace suite includes
# nros-rmw-zenoh's router-backed `status_events_matrix`).
# Closes the gap where no GitHub Actions lane ran the host test suite: core-libs
# only `cargo check`s the no_std crates, dep-chain only resolves, and the
# per-platform lanes build/boot fixtures — none execute the workspace unit tests,
# so a unit-level regression could land green. Fresh-runner-safe: only `nros`
# (prebuilt) + the workspace's pinned toolchain + cargo-nextest; px4-rs is the
# one source the root workspace path-deps (load gate), provisioned via nros.
name: host unit-tests

# CI reorg: medium lane (~15-30 min, `just test-unit`). PR (path-scoped) + nightly
# + on-demand — not every direct push to main, so a push triggers only the fast
# `check` lane. cancel-in-progress only on PR (a started nightly completes).
on:
  pull_request:
    branches: [main]
    paths:
      - "packages/**"  # incl. packages/cli/** — Phase 218 CLI is built in-tree
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - ".github/workflows/host-unit-tests.yml"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: host-unit-tests-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-unit:
    name: workspace unit tests
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    # nano-ros-ci bakes ROS 2 Humble + the pinned rustup toolchain + just +
    # cargo-nextest + host build deps, so no per-run rustup/taiki-e installs.
    # Sources stay nros-provisioned. See ci/docker/ci-base/Dockerfile.
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 — build the nros CLI from the in-tree packages/cli/
      # sub-workspace instead of pulling a tagged release. The cache step
      # amortizes builds across PRs that don't touch the CLI tree (key includes
      # Cargo.lock + every manifest + every .rs file under packages/cli/, so an
      # unrelated PR pays sub-30s restore-then-relink).
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      # Sources the workspace *build* needs, provisioned via nros (index-driven),
      # the way a user does — not a hand `git submodule update`:
      #   - px4-rs: the root workspace path-deps px4-sitl-tests (cargo can't load
      #     the workspace without it).
      #   - zenoh-pico + mbedtls: zpico-sys/build.rs compiles the zenoh-pico (+ TLS
      #     mbedtls) C sources.
      #   - micro-cdr + micro-xrce-dds-client: xrce-sys/build.rs compiles those
      #     vendored C sources. (Just the sources — NOT the heavy xrce-agent tool.)
      #   - cyclonedds-src: cyclonedds-sys/build.rs CMake-builds the Cyclone DDS
      #     vendor tree (panics with "source dir … has no CMakeLists.txt —
      #     submodule not initialised?" otherwise).
      # All are compiled by `test-unit`'s workspace build (the `-cffi` shims that
      # need the same sources are excluded, but `*-sys` are not).
      - name: Provision workspace sources via nros
        run: |
          nros setup --source px4-rs --source zenoh-pico --source mbedtls \
                     --source micro-cdr --source micro-xrce-dds-client \
                     --source cyclonedds-src

      # The workspace unit suite includes nros-rmw-zenoh's
      # `status_events_matrix`, which opens a client-mode session against a
      # local zenohd (build/zenohd/zenohd). Provision the prebuilt router so
      # the test runs here instead of panicking on a missing binary.
      - name: Provision zenohd
        run: just zenohd setup

      - name: just test-unit
        run: just test-unit
