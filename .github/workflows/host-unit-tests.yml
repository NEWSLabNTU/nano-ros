# Host unit-test lane (Phase 196 — CI coverage gap).
#
# Runs `just test-unit` — the workspace unit tests (`cargo nextest --workspace
# --exclude nros-tests`), the cheap host tier (no QEMU / zenohd / ROS / SDKs).
# Closes the gap where no GitHub Actions lane ran the host test suite: core-libs
# only `cargo check`s the no_std crates, dep-chain only resolves, and the
# per-platform lanes build/boot fixtures — none execute the workspace unit tests,
# so a unit-level regression could land green. Fresh-runner-safe: only `nros`
# (prebuilt) + the workspace's pinned toolchain + cargo-nextest; px4-rs is the
# one source the root workspace path-deps (load gate), provisioned via nros.
name: host unit-tests

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - ".github/workflows/host-unit-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - ".github/workflows/host-unit-tests.yml"
  workflow_dispatch:

concurrency:
  group: host-unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    name: workspace unit tests
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    # nano-ros-ci bakes ROS 2 Humble + the pinned rustup toolchain + just +
    # cargo-nextest + host build deps, so no per-run rustup/taiki-e installs.
    # Sources stay nros-provisioned. See ci/docker/ci-base/Dockerfile.
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # `nros` the way a user does — the prebuilt release (no source build).
      - name: Install the nros CLI (released binary)
        run: |
          curl -fsSL https://raw.githubusercontent.com/NEWSLabNTU/nros-cli/main/install.sh \
            | NROS_VERSION=0.3.6 sh
          echo "$HOME/.nros/bin" >> "$GITHUB_PATH"

      # Sources the workspace *build* needs, provisioned via nros (index-driven),
      # the way a user does — not a hand `git submodule update`:
      #   - px4-rs: the root workspace path-deps px4-sitl-tests (cargo can't load
      #     the workspace without it).
      #   - zenoh-pico + mbedtls: zpico-sys/build.rs compiles the zenoh-pico (+ TLS
      #     mbedtls) C sources.
      #   - micro-cdr + micro-xrce-dds-client: xrce-sys/build.rs compiles those
      #     vendored C sources. (Just the sources — NOT the heavy xrce-agent tool.)
      # All are compiled by `test-unit`'s workspace build (the `-cffi` shims that
      # need the same sources are excluded, but `*-sys` are not).
      - name: Provision workspace sources via nros
        run: |
          nros setup --source px4-rs --source zenoh-pico --source mbedtls \
                     --source micro-cdr --source micro-xrce-dds-client

      - name: just test-unit
        run: just test-unit
