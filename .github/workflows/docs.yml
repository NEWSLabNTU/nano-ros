name: docs

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "packages/core/nros/**"
      - "packages/core/nros-rmw/**"
      - "packages/core/nros-rmw-cffi/**"
      - "packages/core/nros-platform-api/**"
      - "packages/core/nros-platform-cffi/**"
      - "packages/core/nros-platform-posix/**"
      - "packages/core/nros-c/include/**"
      - "packages/core/nros-c/Doxyfile"
      - "packages/core/nros-c/docs/**"
      - "packages/core/nros-cpp/include/**"
      - "packages/core/nros-cpp/Doxyfile"
      - "book/rustdoc-driver/**"
      - "packages/zpico/nros-rmw-zenoh/src/**"
      - "packages/xrce/nros-rmw-xrce/src/**"
      - ".github/workflows/docs.yml"

  workflow_dispatch:

# Pages deploys must not be interrupted mid-flight — don't cancel an in-progress
# deploy (unlike the check lanes); just serialize.
concurrency:
  group: deploy-book
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4
        # The book deploy only needs the repository sources used by mdBook,
        # rustdoc, and Doxygen. Do not fetch every submodule here: several
        # platform/runtime submodules are large, target-specific, and may
        # temporarily point at fork-only commits while development branches are
        # being synchronized. Recursive checkout makes an otherwise unrelated
        # book deploy fail before docs build starts.

      # The book rustdoc-driver path-deps `nros`, which (post-218 cli-in-tree)
      # pulls `nros-cli-core` → the nested `ros-launch-manifest-types` submodule.
      # The selective checkout above skips submodules, so `cargo doc` fails to
      # load that source. Init only this one CLI-side submodule (cheap; ~50KB) —
      # same as every CLI-building lane.
      - name: Init CLI launch-manifest submodule
        run: git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest

      - name: Install mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Install mdbook-mermaid
        run: |
          curl -sSL https://github.com/badboy/mdbook-mermaid/releases/download/v0.17.0/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Install Doxygen + Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install Rust toolchain
        # tools/rust-toolchain.toml pins the workspace channel; reuse it so
        # rustdoc output matches the in-repo `cargo doc` invocation.
        run: |
          rustup show
          rustup component add rust-docs --toolchain $(awk '/^channel/ {gsub(/"/,"",$3); print $3; exit}' tools/rust-toolchain.toml) || true

      - name: Build mdBook
        env:
          MDBOOK_OUTPUT__HTML__SITE_URL: /nano-ros-book/
        run: mdbook build book

      - name: Build rustdoc
        # User-facing crates only — internal platform/board/driver crates
        # are not part of the public API surface and would just bloat the
        # deploy. Wipe target/doc/ first so prior workspace cargo-doc
        # artefacts (if any cache hit) don't leak into the deployed tree.
        # Pass an rmw + platform feature combo so the rmw-gated re-exports
        # (`nros::Executor`, `nros::Promise`, etc.) actually appear in the
        # rendered output — the reference stubs deep-link into them.
        env:
          # The driver builds dependency docs, so allow existing internal
          # intra-doc links that were not checked by the old `--no-deps`
          # workflow path.
          RUSTDOCFLAGS: "-A rustdoc::broken-intra-doc-links -A rustdoc::private-intra-doc-links"
        run: |
          rm -rf target/doc target/doxygen
          # Phase 104.A: `rmw-zenoh` feature on `nros` is now
          # `rmw-zenoh-cffi`. The Rust `nros-platform-posix` crate
          # was deleted (123.A.1.x.2); POSIX C symbols ship from
          # `packages/core/nros-platform-posix/src/*.c`, compiled
          # by `nros-platform-cffi`'s `posix-c-port` feature.
          # The book rustdoc driver is its own tiny workspace so Cargo
          # does not resolve root workspace members backed by target/runtime
          # submodules. The driver depends on the public crates and activates
          # the same doc-facing feature set.
          CARGO_TARGET_DIR=target cargo doc \
            --manifest-path book/rustdoc-driver/Cargo.toml

      - name: Build Doxygen — C
        run: |
          mkdir -p target/doxygen/c
          cd packages/core/nros-c
          doxygen Doxyfile

      - name: Build Doxygen — C++
        run: |
          mkdir -p target/doxygen/cpp
          cd packages/core/nros-cpp
          doxygen Doxyfile

      - name: Build Doxygen — RMW vtable (porter-facing)
        run: |
          mkdir -p target/doxygen/rmw-cffi
          cd packages/core/nros-rmw-cffi
          doxygen Doxyfile

      - name: Build Doxygen — Platform vtable (porter-facing)
        # cargo doc above already built nros-platform-cffi, which runs
        # cbindgen and emits include/nros/platform_vtable.h. Doxygen
        # consumes that header here.
        run: |
          mkdir -p target/doxygen/platform-cffi
          cd packages/core/nros-platform-cffi
          doxygen Doxyfile

      - name: Stage API docs into book output
        # Lay native API docs alongside the mdBook so all the
        # `../api/<lang>/...` links from book/src/reference/*.md resolve.
        # rustdoc has no top-level `index.html` for multi-`-p` invocations,
        # so stage a tiny redirect to the umbrella crate.
        run: |
          mkdir -p book/book/api
          cp -r target/doc                          book/book/api/rust
          cp -r target/doxygen/c/html               book/book/api/c
          cp -r target/doxygen/cpp/html             book/book/api/cpp
          cp -r target/doxygen/rmw-cffi/html        book/book/api/rmw-cffi
          cp -r target/doxygen/platform-cffi/html   book/book/api/platform-cffi
          cat > book/book/api/rust/index.html <<'HTML'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=nros/index.html">
          <link rel="canonical" href="nros/index.html">
          <p>Redirecting to <a href="nros/index.html">nros</a>…</p>
          HTML

      - name: Setup deploy key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PAGES_DEPLOY_KEY }}

      - name: Deploy to NEWSLabNTU.github.io
        run: |
          git clone git@github.com:NEWSLabNTU/NEWSLabNTU.github.io.git _pages
          rm -rf _pages/nano-ros-book
          cp -r book/book _pages/nano-ros-book
          cd _pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nano-ros-book
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Update nano-ros book

          Source: ${{ github.server_url }}/${{ github.repository }}/tree/main/book
          Commit: ${{ github.sha }}"
            git push
          fi
