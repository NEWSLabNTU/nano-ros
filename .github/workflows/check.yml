# Fast gate — fmt + clippy + every structural/source gate + the no_std core check.
#
# Thin wrapper (CI reorg): the gate set is the `just check` aggregate (single
# source of truth — see docs/development/ci-workflow-reorg.md and the recipe-org
# block in the justfile). Adding a gate = add a `check-*` recipe to `just check`;
# this workflow does not enumerate gates. Folds the former `ci.yml` (no_std core)
# in as `just check-no-std`.
#
# NOT folded here: the heavy test/build lanes (host-unit-tests, host-integration-
# tests, platform-ci, zephyr-dual-line — see nightly.yml), the small env-specific
# lanes (sdk-index-gate, scaffold-journey, colcon-parity), image builds, and
# deploy/release.
name: check

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "just/**"
      - "scripts/**"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.just"
      - ".clang-format"
      - "rustfmt.toml"
      - "nros-sdk-index.toml"
      - ".github/workflows/check.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "just/**"
      - "scripts/**"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.just"
      - ".clang-format"
      - "rustfmt.toml"
      - "nros-sdk-index.toml"
      - ".github/workflows/check.yml"
  # Nightly runs the FULL gate (fast + build tier) even on a direct-push-to-main
  # workflow where PRs are rare — so the compile gates get a daily signal.
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  check:
    name: check (fast on push; full on PR/nightly)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # ----- shared setup -----
      - name: Cache CLI build
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/
        run: |
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      - name: Install clang-format (pinned via pypi wheel)
        run: pip install --no-cache-dir "clang-format==17.0.5"

      # The build tier's host clippy exercises every build.rs (zenoh-pico / mbedtls
      # / micro-{cdr,xrce} / cyclonedds), so those sources must be present — only
      # for the full (non-push) run; the fast tier is buildless.
      - name: Provision workspace sources via nros (build tier only)
        if: ${{ github.event_name != 'push' }}
        run: |
          nros setup --source px4-rs --source zenoh-pico --source mbedtls \
                     --source micro-cdr --source micro-xrce-dds-client \
                     --source cyclonedds-src

      # ----- fast tier (every event) -----
      # `just check-fast` is the BUILDLESS gate set (fmt/clang-format/ABI/manifest/
      # convention/cargo-tree). Finishes in seconds, so a direct push to main gets a
      # gate that completes under the rapid multi-agent push cadence.
      - name: just check-fast
        run: just check-fast

      # ----- build tier (PR + nightly + dispatch, NOT per-push) -----
      # The compile gates (workspace/example clippy, feature combos, riscv32 no_std,
      # nros-tests source gates, staticlib link-proof, dep-chain) take minutes and
      # would be cancelled on every push. `just check` = check-fast + check-build.
      - name: just check-build + no_std
        if: ${{ github.event_name != 'push' && !cancelled() }}
        run: |
          just check-build
          just check-no-std

      # Aspirational umbrella-decoupling guard — EXPECTED TO FAIL until the
      # Phase 104.A migration completes. Advisory only. (Build tier, non-push.)
      - name: just check-decoupling (advisory until Phase 104.A)
        if: ${{ github.event_name != 'push' && !cancelled() }}
        continue-on-error: true
        run: just check-decoupling
