# Fast gate — fmt + clippy + every structural/source gate + the no_std core check.
#
# Thin wrapper (CI reorg): the gate set is the `just check` aggregate (single
# source of truth — see docs/development/ci-workflow-reorg.md and the recipe-org
# block in the justfile). Adding a gate = add a `check-*` recipe to `just check`;
# this workflow does not enumerate gates. Folds the former `ci.yml` (no_std core)
# in as `just check-no-std`.
#
# NOT folded here: the heavy test/build lanes (host-unit-tests, host-integration-
# tests, platform-ci, zephyr-dual-line — see nightly.yml), the small env-specific
# lanes (sdk-index-gate, scaffold-journey, colcon-parity), image builds, and
# deploy/release.
name: check

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "just/**"
      - "scripts/**"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.just"
      - ".clang-format"
      - "rustfmt.toml"
      - "nros-sdk-index.toml"
      - ".github/workflows/check.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "just/**"
      - "scripts/**"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.just"
      - ".clang-format"
      - "rustfmt.toml"
      - "nros-sdk-index.toml"
      - ".github/workflows/check.yml"
  # Nightly runs the FULL gate (fast + build tier) even on a direct-push-to-main
  # workflow where PRs are rare — so the compile gates get a daily signal.
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  check:
    name: check (fast on push; full on PR/nightly)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # ----- shared setup -----
      - name: Install clang-format (pinned via pypi wheel)
        run: pip install --no-cache-dir "clang-format==17.0.5"

      # ----- CLI + sources: build tier (non-push) only -----
      # check-fast is BUILDLESS *and* SOURCE-FREE (no cargo build/clippy/test, no
      # `cargo tree`/metadata) — its only CLI-touching gates (board-manifest-drift,
      # profile-board-mirror) skip gracefully when the CLI is absent. So the push
      # lane needs neither the nros CLI nor any provisioned source: ~1 min, survives
      # the rapid push cadence. The build tier (PR/nightly) needs the CLI (codegen
      # for clippy) + every `-sys` source submodule (zenoh-pico/mbedtls/micro/
      # cyclonedds + px4-rs) so its clippy/cargo-tree gates resolve + compile.
      - name: Cache CLI build (build tier)
        if: ${{ github.event_name != 'push' }}
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      # Cache the build-tier sources keyed on the recorded submodule SHAs
      # (`git ls-tree HEAD`) → auto-invalidates on a pin bump, no manual rebuild
      # (the image-baking hazard the reorg rejected). EXACT KEY ONLY: `nros setup`
      # skips a present dest (idempotent), so a stale restore would not be
      # refreshed → a pin bump must MISS + refetch. Shares the `nros-src-` key
      # space with host-unit-tests (identical 6-source set → identical key).
      - name: Compute source-pin cache key (build tier)
        if: ${{ github.event_name != 'push' }}
        run: |
          git ls-tree HEAD \
            third-party/px4/px4-rs \
            packages/zpico/zpico-sys/zenoh-pico \
            packages/zpico/zpico-sys/mbedtls \
            packages/xrce/xrce-sys/micro-cdr \
            packages/xrce/xrce-sys/micro-xrce-dds-client \
            third-party/dds/cyclonedds \
            | tee .ci-source-pins

      - name: Cache provisioned sources (build tier, auto-invalidate on pin bump)
        if: ${{ github.event_name != 'push' }}
        uses: actions/cache@v4
        with:
          path: |
            third-party/px4/px4-rs
            packages/zpico/zpico-sys/zenoh-pico
            packages/zpico/zpico-sys/mbedtls
            packages/xrce/xrce-sys/micro-cdr
            packages/xrce/xrce-sys/micro-xrce-dds-client
            third-party/dds/cyclonedds
          key: nros-src-${{ runner.os }}-${{ hashFiles('.ci-source-pins') }}

      - name: Build nros CLI + provision build-tier sources (non-push)
        if: ${{ github.event_name != 'push' }}
        run: |
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"
          "$GITHUB_WORKSPACE/packages/cli/target/release/nros" setup \
            --source px4-rs --source zenoh-pico --source mbedtls --source micro-cdr \
            --source micro-xrce-dds-client --source cyclonedds-src

      # ----- fast tier (every event) -----
      # `just check-fast` is the buildless + source-free gate set
      # (fmt/clang-format/ABI/manifest/convention). Finishes in ~1 min, so a direct
      # push to main gets a gate that completes under the rapid multi-agent cadence.
      - name: just check-fast
        run: just check-fast

      # ----- build tier (PR + nightly + dispatch, NOT per-push) -----
      # The compile gates (workspace/example clippy, feature combos, riscv32 no_std,
      # nros-tests source gates, staticlib link-proof, dep-chain) take minutes and
      # would be cancelled on every push. `just check` = check-fast + check-build.
      - name: just check-build + no_std
        if: ${{ github.event_name != 'push' && !cancelled() }}
        run: |
          just check-build
          just check-no-std

      # Aspirational umbrella-decoupling guard — EXPECTED TO FAIL until the
      # Phase 104.A migration completes. Advisory only. (Build tier, non-push.)
      - name: just check-decoupling (advisory until Phase 104.A)
        if: ${{ github.event_name != 'push' && !cancelled() }}
        continue-on-error: true
        run: just check-decoupling
