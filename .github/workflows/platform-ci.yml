# Per-platform CI (Phase 196 follow-up — consolidate setup/build/test by platform).
#
# One template, matrixed over platforms (matrix values = root justfile `mod`
# names: qemu, freertos, nuttx, threadx_linux, threadx_riscv64, esp32). Each cell
# does the user procedure —
#   install prebuilt nros → `just <plat> setup` (nros-provisioned) → build → test.
# (native has no `setup` recipe — host platform; covered by host-unit-tests; see 196.9.)
# This is the per-platform setup/build/test coverage that was missing (only zephyr
# had a build lane). It ADDS to — does not replace — the cheap distinct gates:
#   - host-unit-tests: `just test-unit` (workspace *unit* tests; not per-platform)
#   - core-libs:       no_std core crates cross-`check`ed on bare targets
#   - dep-chain:       cheap all-board *resolution* (incl. boards without a full
#                      lane: stm32f4, orin-spe, fvp); the fast PR pre-gate
#   - zephyr-dual-line: bespoke (3.7+4.4 lines + Docker image + copy-out)
# As these per-platform lanes prove out, dep-chain can be slimmed (its resolution
# is subsumed for covered platforms) — deferred until they're trusted.
#
# Cost management (the 196.3 "keep minutes low" concern):
#   - a `changes` pre-job path-filters per platform: on a PR, only the platforms
#     whose code (or the shared core) changed run; on `main`/dispatch, all run.
#   - build runs whenever a cell runs (filtered); the heavier QEMU **test/e2e**
#     runs only on `main` + manual dispatch (run_e2e), so a PR gets fast
#     build-coverage and main confirms runtime.
name: platform-ci

# CI reorg: heavy per-platform matrix. PR (path-scoped, changed-platforms only via
# the `changes` job) + nightly (all platforms, e2e) + on-demand. NOT on every direct
# push to main — a 6-platform matrix per push is the load explosion the reorg
# removes; nightly exercises the full sweep, PRs cover the platforms they touch.
on:
  pull_request:
    branches: [main]
    paths: ["packages/**", "examples/**", "just/**", "justfile", "cmake/**", "nros-sdk-index.toml", ".github/workflows/platform-ci.yml"]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run the QEMU test/e2e step (not just build)"
        type: boolean
        default: true
  # Nightly QEMU e2e across all platforms (Phase 196.9). Residual e2e failures are
  # triaged in Phase 203; the nightly surfaces drift without blocking pushes.
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily

concurrency:
  # Separate PR / dispatch / schedule so they don't cancel each other; within each
  # (ref, event) a newer run supersedes the older on PR, but nightly/dispatch runs
  # complete (cancel-in-progress: false) so the long e2e sweep isn't truncated.
  group: platform-ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Per-platform path filter → a JSON list of platforms to run. On a PR, only the
  # platforms whose code (or the shared core) changed; on main/dispatch, all.
  # (Dynamic matrix: GitHub job-level `if` can't read `matrix`, so we select the
  # matrix entries here instead.)
  changes:
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.set.outputs.platforms }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            core: &core
              - 'packages/core/**'
              - 'packages/zpico/**'
              - 'just/**'
              - 'justfile'
              - 'cmake/**'
              - 'nros-sdk-index.toml'
            # keys = root justfile `mod` names (so `just <plat> setup` resolves).
            qemu: [ *core, 'examples/qemu-arm-baremetal/**', 'packages/boards/nros-board-mps2-an385*/**' ]
            freertos: [ *core, 'examples/qemu-arm-freertos/**', 'packages/boards/nros-board-freertos/**', 'packages/boards/nros-board-mps2-an385-freertos/**' ]
            nuttx: [ *core, 'examples/qemu-arm-nuttx/**', 'packages/boards/nros-board-nuttx*/**' ]
            threadx_linux: [ *core, 'examples/threadx-linux/**', 'packages/boards/nros-board-threadx-linux/**' ]
            threadx_riscv64: [ *core, 'examples/qemu-riscv64-threadx/**', 'packages/boards/nros-board-threadx-qemu-riscv64/**' ]
            esp32: [ *core, 'examples/qemu-esp32-baremetal/**', 'packages/boards/nros-board-esp32-qemu/**', 'packages/platforms/nros-platform-esp32-qemu/**' ]
      - id: set
        env:
          QEMU: ${{ steps.f.outputs.qemu }}
          FREERTOS: ${{ steps.f.outputs.freertos }}
          NUTTX: ${{ steps.f.outputs.nuttx }}
          THREADX_LINUX: ${{ steps.f.outputs.threadx_linux }}
          THREADX_RISCV64: ${{ steps.f.outputs.threadx_riscv64 }}
          ESP32: ${{ steps.f.outputs.esp32 }}
        run: |
          set -euo pipefail
          # values = `just` module names. (native has no `setup` recipe → 196.9.)
          all="qemu freertos nuttx threadx_linux threadx_riscv64 esp32"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            sel="$all"
          else
            sel=""
            [ "$QEMU" = "true" ]            && sel="$sel qemu";            true
            [ "$FREERTOS" = "true" ]        && sel="$sel freertos";        true
            [ "$NUTTX" = "true" ]           && sel="$sel nuttx";           true
            [ "$THREADX_LINUX" = "true" ]   && sel="$sel threadx_linux";   true
            [ "$THREADX_RISCV64" = "true" ] && sel="$sel threadx_riscv64"; true
            [ "$ESP32" = "true" ]           && sel="$sel esp32";           true
          fi
          json=$(printf '%s\n' $sel | jq -R . | jq -cs .)
          echo "platforms=$json" >> "$GITHUB_OUTPUT"
          echo "selected: $json"

  platform:
    needs: changes
    if: ${{ needs.changes.outputs.platforms != '[]' }}
    name: ${{ matrix.plat }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read       # pull the GHCR base image (org-private by default)
    # Phase 196.9 — run in the nano-ros-ci base image: ROS 2 Humble (AMENT for
    # `nros generate-rust`) + host tools (cmake/ninja/dtc/gperf, uv, just, rustup
    # + cross targets, arm-none-eabi-gcc, cargo-nextest) baked. No per-cell
    # setup-ros / apt / tool installs; the AMENT + setup-time-gcc gaps are gone.
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        plat: ${{ fromJSON(needs.changes.outputs.platforms) }}
    steps:
      - uses: actions/checkout@v4

      # Phase 218 — build the nros CLI from packages/cli/ in-tree (no per-run
      # release pin). Cached: PRs that don't touch the CLI tree hit the cache
      # and pay sub-30s restore-then-relink.
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      # Cache the two `nros setup --source` working trees this lane provisions
      # (px4-rs + nuttx-libc — the workspace-load + Entry-libc-patch sources).
      # Keyed on the recorded submodule SHAs (`git ls-tree HEAD`) → auto-invalidates
      # on a pin bump. EXACT KEY ONLY: `nros setup` skips a present dest, so a stale
      # restore would not be refreshed → a pin bump must MISS + refetch. (The heavy
      # per-platform `just <plat> setup` kernels/SDKs are not cached here — only the
      # explicit shared `nros setup --source` set.) See host-unit-tests.yml.
      - name: Compute source-pin cache key
        run: |
          git ls-tree HEAD third-party/px4/px4-rs third-party/nuttx/libc \
            | tee .ci-source-pins

      - name: Cache provisioned sources (auto-invalidate on pin bump)
        uses: actions/cache@v4
        with:
          path: |
            third-party/px4/px4-rs
            third-party/nuttx/libc
          key: nros-src-${{ runner.os }}-${{ hashFiles('.ci-source-pins') }}

      # The user procedure: `just <plat> setup` provisions the platform's
      # toolchain + sources via nros (Phase 197.4 — nros setup <board> is the
      # complete provisioner). source setup.bash to PATH the provisioned tools.
      - name: just ${{ matrix.plat }} setup
        run: just ${{ matrix.plat }} setup

      # issue-0037 — the e2e fixture build (`nros plan` → `build-fixture-extras`)
      # shells out to `play_launch_parser`, a separate binary the in-tree CLI
      # build does NOT produce (`cargo build --bin nros` only). Provision it
      # (idempotent; version-stamped) and point nros at it via the designed
      # `NROS_PLAY_LAUNCH_PARSER` override (GITHUB_ENV → an env var, not PATH).
      # Why not PATH: the later steps `source ./setup.bash`, which *strips*
      # `~/.nros/sdk/*` from PATH (its re-add glob only matches the `*/*/bin`
      # SDK layout, not play_launch_parser's `*/bin`) — so a `$GITHUB_PATH`
      # entry would be wiped. The env override is immune to that. e2e-only:
      # push/PR build the `build-examples` smoke, which never hits `nros plan`.
      - name: Provision play_launch_parser (launch-manifest fixtures, #37)
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_e2e) }}
        run: |
          just workspace install-play-launch-parser
          echo "NROS_PLAY_LAUNCH_PARSER=$HOME/.nros/sdk/play_launch_parser/bin/play_launch_parser" >> "$GITHUB_ENV"

      # Container-job host-disk headroom before the heavy SDK+cargo build. The
      # freertos/zephyr cells exhaust the ~14 GB runner (`No space left on
      # device`). Reclaim the image's static bloat (doc/man, apt lists). Mirrors
      # the host-integration-tests reclaim pattern; cargo/SDK caches are left
      # intact (the build needs them) — they get re-derived if absent.
      - name: Reclaim disk before build (container headroom)
        run: |
          echo "before:"; df -h / | tail -1
          apt-get clean 2>/dev/null || true
          rm -rf /var/lib/apt/lists/* /usr/share/doc /usr/share/man /usr/share/locale 2>/dev/null || true
          echo "after:";  df -h / | tail -1

      - name: Build (${{ matrix.plat }})
        run: |
          source ./setup.bash
          source /opt/ros/humble/setup.bash
          # `examples/workspaces/rust/.cargo/config.toml` patches `libc` to the
          # NuttX fork (Phase 225.O / issue #18 — `_SC_HOST_NAME_MAX`) at the
          # *workspace* level, so the per-platform Entry build (qemu_<plat>_entry)
          # cannot resolve its deps without `third-party/nuttx/libc` — on EVERY
          # cell, not just nuttx. Provision it (the SDK index `[source.nuttx-libc]`
          # is the canonical provisioner; never hand-checked-out). px4-rs too,
          # for the same workspace-load reason the Test step documents below.
          nros setup --source px4-rs --source nuttx-libc
          # Disk lever (directive 1 — pull/build only what the run needs): push/PR
          # get the lighter `build-examples` smoke ("does the core link clean?").
          # The heavy `build-fixtures` matrix (full lang×rmw + cyclone cross builds)
          # is what the QEMU e2e consumes, and e2e is on-demand only (the Test step
          # below) — so build it only on schedule / dispatch-with-run_e2e. This
          # keeps the per-push freertos/zephyr cells off the `No space left on
          # device` edge.
          if [ "${{ github.event_name }}" = "schedule" ] || \
             { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_e2e }}" = "true" ]; }; then
            # e2e: prefer the full fixtures matrix, but fall through for platforms
            # without a `build-all` recipe (e.g. qemu) — same chain as before.
            just ${{ matrix.plat }} build-all || just ${{ matrix.plat }} build-examples || just ${{ matrix.plat }} build
          else
            just ${{ matrix.plat }} build-examples || just ${{ matrix.plat }} build
          fi

      # Heavier QEMU test/e2e: on-demand only (`workflow_dispatch` with run_e2e).
      # push/PR get fast build-coverage; e2e is run deliberately (and a nightly
      # `schedule:` is the natural place to wire it on once the cells are trusted)
      # — keeps QEMU-runtime flakiness off every push × N platforms.
      - name: Test / e2e (${{ matrix.plat }})
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_e2e) }}
        run: |
          source ./setup.bash
          source /opt/ros/humble/setup.bash
          # `_nextest-platform` runs `cargo metadata` on the whole nros-tests
          # workspace, which parses the (optional) px4-sitl-tests path dep — its
          # Cargo.toml must exist or metadata fails. Provision the px4-rs source
          # (same as host-unit-tests); it's gitignored/extended-tier otherwise.
          # nuttx-libc: the workspace Entry builds path-dep the patched libc.
          nros setup --source px4-rs --source nuttx-libc
          just ${{ matrix.plat }} test
