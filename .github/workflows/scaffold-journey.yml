# Phase 196.7 — user-journey check for the source-release dependency convention.
#
# Proves a `nros new` project resolves end-to-end via RFC-0040 (scaffold emits
# `version = "*"`; `nros ws sync` writes the `[patch.crates-io]` path block; plain
# `cargo` resolves), not crates.io. Resolution-only (no compile) — like
# dep-chain.yml. Catches the regression this convention fixes: a scaffolded
# crates.io `version = "0.1"` dep that cannot resolve because nano-ros publishes
# nothing.
name: scaffold-journey

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - "nros-sdk-index.toml"
      - "scripts/ci/scaffold-journey-check.sh"
      - ".github/workflows/scaffold-journey.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/cli/**"
      - "nros-sdk-index.toml"
      - "scripts/ci/scaffold-journey-check.sh"
      - ".github/workflows/scaffold-journey.yml"
  workflow_dispatch:

concurrency:
  group: scaffold-journey-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold-journey:
    name: nros new -> ws sync -> resolve
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    # ROS 2 Humble (AMENT for the std_msgs codegen `nros ws sync` runs) + host
    # tools baked into the nano-ros CI base image. See ci/docker/ci-base/.
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      # `just scaffold-journey`'s `setup-cli` prereq does the `cargo build`, but
      # not this nested submodule init — the CLI sub-workspace path-deps
      # ros-launch-manifest-types from it. Init it before the recipe (cheap; ~50KB).
      - name: Init CLI launch-manifest submodule
        run: git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest

      # CI = thin `just` caller (SSoT — phase-253). `setup-cli` reuses the cached
      # packages/cli/target (sub-30s relink on a warm hit); the recipe resolves the
      # per-checkout `nros` via nros_cli_bin() + runs scaffold-journey-check.sh.
      - name: just scaffold-journey
        run: |
          source /opt/ros/humble/setup.bash
          just scaffold-journey
