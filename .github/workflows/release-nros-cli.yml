# Phase 218.G — Release artifact job for the nros CLI.
#
# Triggered on tag pushes (`nros-v*` matching the CLI's workspace version).
# Cross-compiles `packages/cli/Cargo.toml --bin nros` for four target triples,
# bundles each binary with LICENSE + README into a tarball + sha256 sidecar,
# and attaches them to the GitHub release.
#
# Distribution model (post-218):
#   - source tree: `cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros`
#                  (every CI lane builds this way after Phase 218.F)
#   - prebuilt:    `scripts/install-nros-prebuilt.sh` fetches the artifact this
#                  workflow produces, verifies sha256, drops the binary at
#                  `packages/cli/target/release/nros` (same path as a source
#                  build, so downstream consumers see the same surface)
#
# Why four triples: linux/macos × x86_64/aarch64 covers every developer machine
# the nano-ros maintainers see today. Adding triples = add a matrix row + cover
# the host detection in `install-nros-prebuilt.sh`.
name: release nros CLI

on:
  push:
    tags:
      - "nros-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach assets to (e.g. nros-v0.4.0)"
        required: true
        type: string

permissions:
  contents: write  # softprops/action-gh-release needs write to upload assets

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — native build on ubuntu-22.04 (matches the other lanes'
          # runner, no cross-compile machinery needed).
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: false
          # Linux aarch64 — cross-compile from ubuntu-22.04. `cross` (docker-backed)
          # avoids dragging in an apt-installed gcc-aarch64 toolchain (which can
          # have ABI quirks vs. cross's pinned image).
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: true
          # macOS x86_64 — native on macos-13 (intel runners; macos-latest is now
          # arm64). macOS-13 is the last available x86_64 runner image.
          - target: x86_64-apple-darwin
            runner: macos-13
            cross: false
          # macOS aarch64 — native on the arm64 runner image.
          - target: aarch64-apple-darwin
            runner: macos-14
            cross: false
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
      # from the nested submodule. actions/checkout default-skips
      # submodules; init only the CLI-side one (cheap; ~50KB).
      - name: Init CLI sub-workspace submodule
        run: git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux aarch64 only)
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      - name: Build nros (cargo)
        if: ${{ !matrix.cross }}
        working-directory: packages/cli
        run: cargo build --release --target ${{ matrix.target }} --bin nros

      - name: Build nros (cross)
        if: ${{ matrix.cross }}
        working-directory: packages/cli
        run: cross build --release --target ${{ matrix.target }} --bin nros

      - name: Package artifact
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.target }}"
          stage="$(mktemp -d)"
          binsrc="packages/cli/target/${triple}/release/nros"
          test -x "$binsrc" || { echo "::error::expected binary not found at $binsrc"; exit 1; }
          cp "$binsrc" "$stage/nros"
          # LICENSE: nano-ros is dual-licensed Apache-2.0 / MIT; ship the Apache
          # text (the more-permissive of the two — matches the convention every
          # other Rust binary uses) and the MIT text side-by-side.
          cp LICENSE-APACHE "$stage/LICENSE-APACHE"
          cp LICENSE-MIT "$stage/LICENSE-MIT"
          # README: the CLI's own README (not the top-level nano-ros one — the
          # bundle's audience is users running `nros`, not nano-ros contributors).
          cp packages/cli/README.md "$stage/README.md"

          out_dir="$PWD/dist"
          mkdir -p "$out_dir"
          tar -C "$stage" -czf "$out_dir/nros-${triple}.tar.gz" nros LICENSE-APACHE LICENSE-MIT README.md

          # Portable sha256: macOS shasum vs. Linux sha256sum.
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$out_dir" && sha256sum "nros-${triple}.tar.gz" > "nros-${triple}.tar.gz.sha256")
          else
            (cd "$out_dir" && shasum -a 256 "nros-${triple}.tar.gz" > "nros-${triple}.tar.gz.sha256")
          fi

          echo "artifact=$out_dir/nros-${triple}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=$out_dir/nros-${triple}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (job-scoped — collected by `release` job)
        uses: actions/upload-artifact@v4
        with:
          name: nros-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.artifact }}
            ${{ steps.pkg.outputs.sha256 }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: attach assets to release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          # Collapse the per-matrix `nros-<triple>/` subdirs into a flat
          # `dist/nros-<triple>.tar.gz` + `.sha256` layout the release uploader
          # expects.
          merge-multiple: true

      - name: List collected assets
        run: ls -la dist/

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          # Don't overwrite an existing release's title/body; just attach assets.
          # The release itself is created at tag-push time by maintainers (or by
          # this same step if no release exists yet).
          fail_on_unmatched_files: true
          files: |
            dist/nros-*.tar.gz
            dist/nros-*.tar.gz.sha256
