# Phase 214.F.3 — embedded feature-unification guard (Phase 214 Track F).
#
# Catches regressions where a workspace member's `[dependencies]` or
# `[dev-dependencies]` reintroduces a `std` / `platform-posix` activation
# path under an embedded target's feature-unification view. F.1 target-
# gated host-only crate deps via
# `[target.'cfg(not(target_os = "none"))'.dependencies]`; F.2 applied
# the same gate to leaky dev-deps in `nros-log` + `nros-node`. F.3 is
# the CI guard that holds the line: a future contributor adds a new
# `[dependencies] nros-platform-cffi = { features = ["posix-c-port"] }`
# row to a leaf crate without target-gating → this lane goes red at
# PR time.
#
# Gate: `cargo tree -p nros-serdes --edges=normal,build --target
# thumbv7em-none-eabihf --no-default-features --workspace` must contain
# ZERO `feature "std"` paths. The `--edges=normal,build` filter ignores
# dev-deps (cargo tree's `features` edge mode shows every edge including
# dev-deps which is too noisy for this assertion; `normal,build` is the
# production-link view that matters for what code reaches the embedded
# binary).
#
# An earlier revision of this workflow also ran
# `cargo check --workspace --no-default-features --target
# thumbv7em-none-eabihf` as a second gate, but `--workspace` legitimately
# pulls in workspace members with build-deps that need std (e.g. askama
# / memchr via the codegen-convention book builder); that gate isn't a
# clean fit for the regression contract the F.3 spec actually targets.
# Per-crate embedded compile-checks live in `just check-workspace-
# embedded`, which carries the canonical exclude list for the no_std
# subset; reuse that recipe when a per-crate compile gate is wanted.
#
# Fresh-runner-safe: only the workspace's pinned toolchain + a thumb
# `rustup target add`. No QEMU, no SDKs, no nros CLI install. Fast lane
# (a few minutes); designed as a required check on PR.
name: embedded feature-unification

on:
  push:
    branches: [main]
    paths:
      - "packages/**/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/embedded-feature-unification.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/embedded-feature-unification.yml"
  workflow_dispatch:

concurrency:
  group: embedded-feature-unification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  feature-unification-guard:
    name: embedded feature-unification guard
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      - name: Add thumbv7em-none-eabihf rustup target
        run: |
          rustup target add thumbv7em-none-eabihf

      # Feature-unification audit. The grep returns 0 (a match) on
      # regression; we flip that to a failure exit. We print the
      # offending paths first (with `grep -B 2`) so the failure log
      # shows the regression source line(s) before the failure exit.
      - name: Assert no `feature "std"` paths under embedded target
        run: |
          set -euo pipefail
          tree=$(cargo tree -p nros-serdes --edges=normal,build \
            --target thumbv7em-none-eabihf --no-default-features \
            --workspace 2>&1)
          if echo "$tree" | grep -q 'feature "std"'; then
            echo "Phase 214.F.3 — feature std activation paths under embedded target:"
            echo "$tree" | grep -B 2 'feature "std"' | head -50
            echo ""
            echo "A workspace member added a [dependencies] or [dev-dependencies]"
            echo "row that pulls a std-activating crate without target-gating."
            echo "Move it under [target.'cfg(not(target_os = \"none\"))'.dependencies]"
            echo "(or .dev-dependencies). See Phase 214.F.1 + F.2 for examples:"
            echo "  packages/boards/nros-board-{posix,native,nuttx}/Cargo.toml"
            echo "  packages/core/nros-{log,node}/Cargo.toml"
            exit 1
          fi
          echo "Phase 214.F.3 — no feature std paths under embedded target."
