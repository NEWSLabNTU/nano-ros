# Phase 195 — fresh-machine acceptance gate (195 Acceptance #1).
#
# Proves the user procedure on a BARE runner: no nano-ros checkout, no `just`,
# no source build of `nros`. A prebuilt `nros` (the published release) drives the
# whole chain — install → scaffold → build → run a first image.
#
#   fetch nros-<triple>.tar.gz from nano-ros release  →
#     nros new  →  nros build  →  run the binary
#
# Deliberately NO `actions/checkout`: the only thing that touches the machine is
# the released `nros` binary + whatever it provisions from the SDK index. If a
# step here needs the nano-ros source tree, that is a real gate-1 regression.
#
# Phase 218.F re-target: pre-218 this lane installed from the standalone
# `nros-cli` repo's `install.sh` curl path. That repo is archived (Phase 218.H);
# the prebuilt artifacts now ship as `nros-<triple>.tar.gz` GitHub release assets
# attached by `.github/workflows/release-nros-cli.yml` (Phase 218.G). The
# fetch step below queries the GitHub API for the latest `nros-v*` release,
# downloads + sha256-verifies the matching tarball, and installs to
# `$HOME/.nros/bin/nros` — same location post-Phase-218.C's activate.sh chain
# accepts as the transitional fallback.
#
# Skip-safe: until the first `nros-v0.4.0` tag exists, the lane gracefully
# reports `[SKIPPED] no nros-v* release yet` instead of failing.
name: nros acceptance (fresh machine)

on:
  workflow_dispatch:
  # CI reorg: this validates a FIXED prebuilt release artifact, which a main-branch
  # push does not change — so it runs on RELEASE TAGS (the thing it tests) + nightly
  # (catches release-binary rot vs a moving toolchain) + on-demand. It no longer
  # fires on every main push: those re-tested the same binary and, with
  # `cancel-in-progress` off, queued up runner time for no new signal.
  push:
    tags: ["nros-v*"]
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: nros-acceptance-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  fresh-machine:
    name: install → new → build → run (no checkout)
    runs-on: ubuntu-22.04
    steps:
      # 1a. Resolve the latest `nros-v*` release via GitHub API. On a repo
      #     that hasn't tagged 0.4.0 yet, this returns 404; the step records
      #     `has_release=false` and downstream steps skip.
      - name: Resolve latest nros-v* release
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
          # /latest filters out prereleases; here we want the topmost
          # nros-v* tag whether prerelease or not.
          tag="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/vnd.github+json" "$api" \
                 | jq -r '[.[] | select(.tag_name | startswith("nros-v"))] | sort_by(.published_at) | last | .tag_name // empty')"
          if [ -z "$tag" ]; then
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no nros-v* release reachable yet — lane skips. First tag ships via release-nros-cli.yml; see Phase 218.G."
          else
            echo "has_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "::notice::acceptance lane using release $tag"
          fi

      # 1b. Fetch + verify + install. Host triple is fixed to
      #     `x86_64-unknown-linux-gnu` since the runner is ubuntu-22.04 amd64;
      #     extending to a matrix lives outside Phase 218.G's initial slice.
      - name: Install nros (prebuilt release ${{ steps.rel.outputs.tag }})
        if: steps.rel.outputs.has_release == 'true'
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          set -euo pipefail
          triple="x86_64-unknown-linux-gnu"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          tmp="$(mktemp -d)"
          curl -fsSL "${base}/nros-${triple}.tar.gz"        -o "${tmp}/nros.tar.gz"
          curl -fsSL "${base}/nros-${triple}.tar.gz.sha256" -o "${tmp}/nros.tar.gz.sha256"
          # The .sha256 sidecar is the GNU-format `<hash>  <filename>` line.
          ( cd "$tmp" && sha256sum -c nros.tar.gz.sha256 )
          mkdir -p "$HOME/.nros/bin"
          tar -xzf "${tmp}/nros.tar.gz" -C "$tmp"
          install -m 0755 "${tmp}/nros" "$HOME/.nros/bin/nros"
          echo "$HOME/.nros/bin" >> "$GITHUB_PATH"

      - name: Show nros version
        if: steps.rel.outputs.has_release == 'true'
        run: nros --version

      # The scaffolded project is a normal Rust crate, so the *project* toolchain
      # (rust) is needed to build it — distinct from the nros bootstrap above.
      - name: Install Rust (project toolchain)
        if: steps.rel.outputs.has_release == 'true'
        uses: dtolnay/rust-toolchain@stable

      # 2. Scaffold a project with the prebuilt nros.
      - name: nros new (scaffold native talker)
        if: steps.rel.outputs.has_release == 'true'
        run: nros new accept_app --platform native --lang rust --use-case talker

      # 3. Build it (auto-detects Cargo; auto-provisions index tools like zenohd).
      - name: nros build
        if: steps.rel.outputs.has_release == 'true'
        working-directory: accept_app
        run: nros build

      # 4. Run the first image and assert it boots.
      - name: Run the first image
        if: steps.rel.outputs.has_release == 'true'
        working-directory: accept_app
        run: |
          bin="target/debug/accept_app"
          test -x "$bin" || { echo "::error::nros build produced no binary at $bin"; exit 1; }
          out="$(timeout 10 "$bin" 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q "accept_app" \
            || { echo "::error::first image did not run as expected"; exit 1; }
          echo "acceptance: prebuilt nros → new → build → run OK (no checkout, no nros source build)"

      # 5. Skip summary — surface why the lane no-op'd when no release exists.
      - name: Acceptance skipped (no release)
        if: steps.rel.outputs.has_release != 'true'
        run: |
          echo "::warning::acceptance lane skipped — no nros-v* release reachable. Ship a tag via release-nros-cli.yml to enable."
