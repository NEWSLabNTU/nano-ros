# Build + publish the nano-ros Zephyr CI toolchain image (Phase 196.3).
#
# ROS 2 Humble + Zephyr SDK (registered) + host tools (cmake/ninja/dtc/gperf,
# uv, just, rustup + cross targets), baked once so zephyr-dual-line stops
# re-installing them every run. Pushed to GHCR; the dual-line jobs run
# `container:` against this image. See ci/docker/zephyr-ros/Dockerfile.
name: build-zephyr-ci-image

on:
  push:
    branches: [main]
    paths:
      - "ci/docker/zephyr-ros/**"
      - ".github/workflows/build-zephyr-ci-image.yml"
  workflow_dispatch:

concurrency:
  group: build-zephyr-ci-image
  cancel-in-progress: false

env:
  # The tag encodes the inputs (ROS distro + SDK version) plus a `-rN` content
  # revision — bump the SDK/distro part when either changes, bump `-rN` when the
  # Dockerfile content changes without an SDK/distro bump (e.g. an added apt
  # pkg). Keep in lockstep with the Dockerfile ARG + the dual-line `container:`.
  # GHCR repo names must be lowercase; the owner (NEWSLabNTU) is mixed-case.
  # r2 (#59): added ros-humble-example-interfaces to the apt set.
  IMAGE: ghcr.io/newslabntu/nano-ros-zephyr-ci
  TAG: humble-sdk0.17.4-r2

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ci/docker/zephyr-ros
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          # GHA layer cache so SDK/tool layers don't rebuild when only the
          # ARGs/comments change.
          cache-from: type=gha
          cache-to: type=gha,mode=max
