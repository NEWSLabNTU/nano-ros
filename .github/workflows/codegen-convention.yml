# Phase 196.2 — guard the canonical `nros codegen` invocation shape.
#
# Pure static lint (git ls-files + grep): no toolchain, no submodules, no ROS,
# seconds to run. Catches the 196.1 regression class — a codegen-tool call that
# drops the `codegen` subcommand before `--args-file` (the legacy top-level form
# Phase 195 removed). See scripts/ci/codegen-invocation-check.sh.
name: codegen-convention

on:
  push:
    branches: [main]
    paths:
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.just"
      - "justfile"
      - "scripts/**"
      - ".github/workflows/codegen-convention.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.just"
      - "justfile"
      - "scripts/**"
      - ".github/workflows/codegen-convention.yml"
  workflow_dispatch:

concurrency:
  group: codegen-convention-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codegen-convention:
    name: canonical nros codegen invocation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check codegen invocation shape
        run: scripts/ci/codegen-invocation-check.sh
