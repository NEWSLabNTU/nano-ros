# Phase 196.6 — per-platform dependency-chain validation.
#
# Light, fast: proves the dep chain *resolves* for every (board, rmw) cell —
# the prebuilt-toolchain side (`nros setup --dry-run`) + the crate/feature/target
# side (codegen + `cargo tree`, resolution only, NO compile). It does NOT build
# every platform; full builds live in `zephyr-dual-line.yml` + `just build-all`.
#
# Mirrors the real distribution model: source tree + prebuilt host toolchains,
# the `nros` CLI driving setup/codegen. The whole matrix runs in one cheap job.
name: dep-chain

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "packages/**"
      - "nros-sdk-index.toml"
      - "scripts/ci/dep-chain-check.sh"
      - ".github/workflows/dep-chain.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "packages/**"
      - "nros-sdk-index.toml"
      - "scripts/ci/dep-chain-check.sh"
      - ".github/workflows/dep-chain.yml"
  workflow_dispatch:

concurrency:
  group: dep-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dep-chain:
    name: per-platform dep chain
    # jammy = the ROS 2 Humble baseline (codegen resolves std_msgs via AMENT).
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Get the `nros` CLI the way a user does — the released prebuilt binary
      # (no checkout, no cargo). Everything a board needs (incl. source
      # submodules like nuttx-libc) is then provisioned by `nros setup <board>`
      # in the check, exactly as a user would — CI must NOT hand-checkout
      # submodules a user wouldn't.
      - name: Install the nros CLI (released binary)
        run: |
          curl -fsSL https://raw.githubusercontent.com/NEWSLabNTU/nros-cli/main/install.sh \
            | NROS_VERSION=0.3.0 sh
          echo "$HOME/.nros/bin" >> "$GITHUB_PATH"

      - name: Set up Rust toolchain
        run: rustup show

      # The interface codegen (nros generate-rust) resolves std_msgs's msg/*.msg
      # via AMENT_PREFIX_PATH from a sourced ROS 2.
      - name: Install ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Per-platform dep-chain check
        run: |
          source /opt/ros/humble/setup.bash
          NROS="$HOME/.nros/bin/nros" scripts/ci/dep-chain-check.sh
