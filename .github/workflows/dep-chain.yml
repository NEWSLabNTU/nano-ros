# Phase 196.6 — per-platform dependency-chain validation.
#
# Light, fast: proves the dep chain *resolves* for every (board, rmw) cell —
# the prebuilt-toolchain side (`nros setup --dry-run`) + the crate/feature/target
# side (codegen + `cargo tree`, resolution only, NO compile). It does NOT build
# every platform; full builds live in `zephyr-dual-line.yml` + `just build-all`.
#
# Mirrors the real distribution model: source tree + prebuilt host toolchains,
# the `nros` CLI driving setup/codegen. The whole matrix runs in one cheap job.
name: dep-chain

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "packages/**"
      - "nros-sdk-index.toml"
      - "scripts/ci/dep-chain-check.sh"
      - ".github/workflows/dep-chain.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "packages/**"
      - "nros-sdk-index.toml"
      - "scripts/ci/dep-chain-check.sh"
      - ".github/workflows/dep-chain.yml"
  workflow_dispatch:

concurrency:
  group: dep-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dep-chain:
    name: per-platform dep chain
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    # Run inside the nano-ros-ci base image — ROS 2 Humble (AMENT for codegen) +
    # all host tools (curl/zstd/git/build-essential, rustup + cross targets, gcc)
    # baked. No per-run apt / rustup install; `git safe.directory '*'` is set in
    # the image. The board sources stay nros-provisioned (no hand submodule
    # checkout). See ci/docker/ci-base/Dockerfile.
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Container `run:` defaults to dash — force bash (the check `source`s ROS).
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 — build the nros CLI from packages/cli/ in-tree. The
      # dep-chain check resolves the `NROS` env-var binary (set below) for the
      # `nros setup --dry-run` step; everything a board needs is provisioned
      # by `nros setup <board>` exactly as a user would.
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      - name: Per-platform dep-chain check
        run: |
          source /opt/ros/humble/setup.bash
          NROS="$GITHUB_WORKSPACE/packages/cli/target/release/nros" scripts/ci/dep-chain-check.sh
