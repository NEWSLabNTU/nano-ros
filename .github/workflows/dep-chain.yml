# Phase 196.6 — per-platform dependency-chain validation.
#
# Light, fast: proves the dep chain *resolves* for every (board, rmw) cell —
# the prebuilt-toolchain side (`nros setup --dry-run`) + the crate/feature/target
# side (codegen + `cargo tree`, resolution only, NO compile). It does NOT build
# every platform; full builds live in `zephyr-dual-line.yml` + `just build-all`.
#
# Mirrors the real distribution model: source tree + prebuilt host toolchains,
# the `nros` CLI driving setup/codegen. The whole matrix runs in one cheap job.
name: dep-chain

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "packages/**"
      - "nros-sdk-index.toml"
      - "scripts/ci/dep-chain-check.sh"
      - ".github/workflows/dep-chain.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "packages/**"
      - "nros-sdk-index.toml"
      - "scripts/ci/dep-chain-check.sh"
      - ".github/workflows/dep-chain.yml"
  workflow_dispatch:

concurrency:
  group: dep-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dep-chain:
    name: per-platform dep chain
    runs-on: ubuntu-latest
    # Run inside the prebuilt ROS 2 Humble image — `/opt/ros/humble` is already
    # there (std_msgs etc. for AMENT-resolved codegen), so we skip the ~4.5-min
    # `setup-ros` apt install every run. ros-base carries the common interface
    # packages dep-chain needs; the image is jammy (Humble baseline).
    container: ros:humble-ros-base
    # Container `run:` defaults to dash — force bash (the check `source`s ROS).
    defaults:
      run:
        shell: bash
    # Pin cargo/rustup to a fixed root (the container's $HOME=/github/home vs
    # euid /root mismatch makes rustup's default home ambiguous).
    env:
      CARGO_HOME: /usr/local/cargo
      RUSTUP_HOME: /usr/local/rustup
    steps:
      # The ROS image is minimal — install the host tools a GH runner ships but
      # this container lacks (curl/zstd/tar for install.sh, git for nros setup's
      # submodule provisioning, gcc for cargo). Still far cheaper than setup-ros.
      - name: Install host tools
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            curl ca-certificates zstd git build-essential
          curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --no-modify-path
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
          # git runs as root in the container — avoid "dubious ownership" on the
          # checkout + the submodules `nros setup` provisions.
          git config --global --add safe.directory '*'

      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Get the `nros` CLI the way a user does — the released prebuilt binary
      # (no checkout, no cargo). Everything a board needs (incl. source
      # submodules like nuttx-libc) is then provisioned by `nros setup <board>`
      # in the check, exactly as a user would — CI must NOT hand-checkout
      # submodules a user wouldn't.
      - name: Install the nros CLI (released binary)
        run: |
          curl -fsSL https://raw.githubusercontent.com/NEWSLabNTU/nros-cli/main/install.sh \
            | NROS_VERSION=0.3.1 sh
          echo "$HOME/.nros/bin" >> "$GITHUB_PATH"

      - name: Per-platform dep-chain check
        run: |
          source /opt/ros/humble/setup.bash
          NROS="$HOME/.nros/bin/nros" scripts/ci/dep-chain-check.sh
