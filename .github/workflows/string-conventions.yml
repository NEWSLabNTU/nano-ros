# Phase 208.D.4 / 208.D.8 — string-convention CI guard.
#
# Catches forbidden strings (wrong GitHub org `aeon/nano-ros`, retired
# `PlatformIO` references) in user-facing surfaces. Pure static lint
# (git grep): no toolchain, no submodules, seconds to run.
name: string-conventions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: string-conventions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  string-conventions:
    name: string-convention guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check string conventions
        run: scripts/ci/string-conventions-check.sh
