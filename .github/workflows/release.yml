# Release tier (CI reorg / phase-253) — build + publish the nros CLI artifacts,
# then prove the published release on a fresh machine.
#
# Folds two tag-driven lanes into one tier file:
#   - build / release : cross-compile `packages/cli --bin nros` for four triples,
#                       bundle + sha256, attach to the GitHub release (Phase 218.G).
#   - fresh-machine   : the Phase-195 acceptance gate — a BARE runner installs the
#                       PUBLISHED release tarball and drives `new → build → run`
#                       (NO checkout, no `just`, no source build). Skip-safe until
#                       the first nros-v* release exists.
#
# Triggers: tag push `nros-v*` (build+release+acceptance), nightly cron
# (acceptance only — catches release-binary rot vs a moving toolchain), and
# on-demand. build/release skip on the cron (no tag to build).
name: release

on:
  push:
    tags:
      - "nros-v*"
  schedule:
    - cron: "0 6 * * *"   # acceptance: re-test the published binary nightly
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach assets to (e.g. nros-v0.4.0)"
        required: false
        type: string

permissions:
  contents: write  # softprops/action-gh-release needs write to upload assets

jobs:
  # ----- cross-compile the four release triples (tag / dispatch only) -----
  build:
    name: build ${{ matrix.target }}
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            cross: false
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types` from the
      # nested submodule. actions/checkout default-skips submodules; init the
      # CLI-side one (cheap; ~50KB).
      - name: Init CLI sub-workspace submodule
        run: git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux aarch64 only)
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      - name: Build nros (cargo)
        if: ${{ !matrix.cross }}
        working-directory: packages/cli
        run: cargo build --release --target ${{ matrix.target }} --bin nros

      - name: Build nros (cross)
        if: ${{ matrix.cross }}
        working-directory: packages/cli
        run: cross build --release --target ${{ matrix.target }} --bin nros

      - name: Package artifact
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.target }}"
          stage="$(mktemp -d)"
          binsrc="packages/cli/target/${triple}/release/nros"
          test -x "$binsrc" || { echo "::error::expected binary not found at $binsrc"; exit 1; }
          cp "$binsrc" "$stage/nros"
          cp LICENSE-APACHE "$stage/LICENSE-APACHE"
          cp LICENSE-MIT "$stage/LICENSE-MIT"
          cp packages/cli/README.md "$stage/README.md"

          out_dir="$PWD/dist"
          mkdir -p "$out_dir"
          tar -C "$stage" -czf "$out_dir/nros-${triple}.tar.gz" nros LICENSE-APACHE LICENSE-MIT README.md

          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$out_dir" && sha256sum "nros-${triple}.tar.gz" > "nros-${triple}.tar.gz.sha256")
          else
            (cd "$out_dir" && shasum -a 256 "nros-${triple}.tar.gz" > "nros-${triple}.tar.gz.sha256")
          fi

          echo "artifact=$out_dir/nros-${triple}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=$out_dir/nros-${triple}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (job-scoped — collected by `release` job)
        uses: actions/upload-artifact@v4
        with:
          name: nros-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.artifact }}
            ${{ steps.pkg.outputs.sha256 }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: attach assets to release
    if: ${{ github.event_name != 'schedule' }}
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected assets
        run: ls -la dist/

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            dist/nros-*.tar.gz
            dist/nros-*.tar.gz.sha256

  # ----- fresh-machine acceptance (tag + nightly + dispatch) -----
  # Deliberately NO actions/checkout: only the released `nros` binary +
  # whatever it provisions touches the machine. On a tag push it runs AFTER
  # `release` so the assets exist; on the cron it runs standalone (skip-safe).
  fresh-machine:
    name: install -> new -> build -> run (no checkout)
    needs: release
    # `needs: release` is skipped on the cron (release has the schedule-guard);
    # `always()` lets fresh-machine run anyway, and only blocks if release ran
    # AND failed.
    if: ${{ always() && needs.release.result != 'failure' && needs.release.result != 'cancelled' }}
    runs-on: ubuntu-22.04
    concurrency:
      group: release-acceptance-${{ github.ref }}-${{ github.event_name }}
      cancel-in-progress: false
    steps:
      - name: Resolve latest nros-v* release
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
          tag="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/vnd.github+json" "$api" \
                 | jq -r '[.[] | select(.tag_name | startswith("nros-v"))] | sort_by(.published_at) | last | .tag_name // empty')"
          if [ -z "$tag" ]; then
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no nros-v* release reachable yet — lane skips."
          else
            echo "has_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "::notice::acceptance lane using release $tag"
          fi

      - name: Install nros (prebuilt release ${{ steps.rel.outputs.tag }})
        if: steps.rel.outputs.has_release == 'true'
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          set -euo pipefail
          triple="x86_64-unknown-linux-gnu"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          tmp="$(mktemp -d)"
          curl -fsSL "${base}/nros-${triple}.tar.gz"        -o "${tmp}/nros.tar.gz"
          curl -fsSL "${base}/nros-${triple}.tar.gz.sha256" -o "${tmp}/nros.tar.gz.sha256"
          ( cd "$tmp" && sha256sum -c nros.tar.gz.sha256 )
          mkdir -p "$HOME/.nros/bin"
          tar -xzf "${tmp}/nros.tar.gz" -C "$tmp"
          install -m 0755 "${tmp}/nros" "$HOME/.nros/bin/nros"
          echo "$HOME/.nros/bin" >> "$GITHUB_PATH"

      - name: Show nros version
        if: steps.rel.outputs.has_release == 'true'
        run: nros --version

      - name: Install Rust (project toolchain)
        if: steps.rel.outputs.has_release == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: nros new (scaffold native talker)
        if: steps.rel.outputs.has_release == 'true'
        run: nros new accept_app --platform native --lang rust --use-case talker

      - name: nros build
        if: steps.rel.outputs.has_release == 'true'
        working-directory: accept_app
        run: nros build

      - name: Run the first image
        if: steps.rel.outputs.has_release == 'true'
        working-directory: accept_app
        run: |
          bin="target/debug/accept_app"
          test -x "$bin" || { echo "::error::nros build produced no binary at $bin"; exit 1; }
          out="$(timeout 10 "$bin" 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q "accept_app" \
            || { echo "::error::first image did not run as expected"; exit 1; }
          echo "acceptance: prebuilt nros → new → build → run OK (no checkout, no nros source build)"

      - name: Acceptance skipped (no release)
        if: steps.rel.outputs.has_release != 'true'
        run: |
          echo "::warning::acceptance lane skipped — no nros-v* release reachable. Ship a tag via the build/release jobs to enable."
