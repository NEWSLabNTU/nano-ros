# Host integration-test lane ‚Äî covers `just test-integration` (the
# `nros-tests` crate, with the heavy QEMU/Zephyr/ROS-2-interop groups
# excluded). This is the host-side regression net for everything that
# scaffolds + consumes workspaces, but doesn't itself need a Zephyr SDK
# or a QEMU runtime:
#
#   - Phase 212.N ‚Äî Node + Entry pkg workspaces. `nros::main!()` proc-macro
#     forms (n9_workspace), single-Entry-pkg run-plan (n_entry_poc_runs),
#     board-agnostic run-plan (o3), pkg-index workspace walk (o4),
#     nav2-shape compat smoke (o5).
#   - Phase 212.M-F ‚Äî `nros codegen-system` adapter shim self-pkg shape,
#     bringup scaffolding, check-lints.
#   - Phase 212 orchestration suite ‚Äî composable, conditionals, e2e,
#     includes, set/remap/env. The `nros launch` parser surface
#     (Phase 212.N.11) lives here.
#   - Phase 215.E ‚Äî minimal ASI-shaped board-import fixture (skips
#     cleanly without a Zephyr SDK on PATH).
#   - Phase 217 ‚Äî FVP runtime smokes (skip without Arm FVP installed).
#   - Loan / orin-spe-mock-ivc / etc. ‚Äî host fixture suites.
#
# What's intentionally NOT here:
#   - per-platform builds + emulator runs (platform-ci.yml, scheduled).
#   - Zephyr dual-line example builds (zephyr-dual-line.yml).
#   - workspace unit tests (host-unit-tests.yml ‚Äî `just test-unit`,
#     EXCLUDES `nros-tests`).
#   - heavy QEMU/Zephyr E2E (test-all tier; needs SDK + emulator).
#
# Why this lane exists: every Phase 212.N/O fixture lives under
# `nros-tests`, which `test-unit` explicitly excludes. Before this
# lane, the entire Node+Entry workspace shape was untested on CI
# ‚Äî a regression to the `nros::main!()` macro, the H.1 adapter
# shim's self-pkg case, the workspace pkg-index walker (Phase
# 212.N.10), or the launch parser would all land green.
name: host integration-tests

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "just/**"
      - "cmake/**"
      - "zephyr/cmake/**"
      - "nros-sdk-index.toml"
      - ".github/workflows/host-integration-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "just/**"
      - "cmake/**"
      - "zephyr/cmake/**"
      - "nros-sdk-index.toml"
      - ".github/workflows/host-integration-tests.yml"
  workflow_dispatch:

concurrency:
  group: host-integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-integration:
    name: nros-tests integration (host)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    # nano-ros-ci bakes ROS 2 Humble + pinned rustup + just + cargo-nextest
    # + host build deps + the build tooling cargo / cmake need. Same image
    # as `host-unit-tests` so an integration regression surfaces under the
    # same fresh-runner contract.
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 ‚Äî build the nros CLI from packages/cli/ in-tree. Required by
      # every Phase 212 self-pkg / launch / pkg-index test (they shell out to
      # `nros plan`, `nros codegen-system`, `nros check`, `nros launch`). The
      # cache step amortizes the build across PRs that don't touch the CLI tree.
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      # Same source set as host-unit-tests: the root workspace path-deps
      # px4-sitl-tests (load gate) + the *-sys crates compile zenoh-pico /
      # mbedtls / micro-{cdr,xrce-dds-client} / cyclonedds-src into the
      # workspace. Without these the `cargo metadata` step the
      # `test-integration` recipe drives panics out.
      - name: Provision workspace sources via nros
        run: |
          nros setup --source px4-rs --source zenoh-pico --source mbedtls \
                     --source micro-cdr --source micro-xrce-dds-client \
                     --source cyclonedds-src --source nuttx-libc

      # `test-integration` has `build-zenohd` as a prereq ‚Äî it spawns
      # zenohd to back the Phase 211 / Phase 212 host integration tests.
      # Provision the prebuilt router from the SDK index up front (the
      # source-build path in `build-zenohd` needs the zenoh submodule, which
      # this lane does not check out). `build.sh` then short-circuits on the
      # present binary, so the recipe prereq is satisfied. Keeping the
      # explicit step makes a provisioning failure surface obviously (vs. a
      # confusing "test-integration" red).
      - name: Provision zenohd
        run: just zenohd setup

      # Provision the test prerequisites the way a user does ‚Äî via `nros setup`
      # (#25). The patched qemu-system-arm (build/qemu/, where `qemu.rs` looks)
      # backs the `platform` / `qemu_patched_binary` tests; the prebuilt
      # Micro-XRCE-DDS Agent (nros store, where `xrce_agent.rs` looks) backs the
      # `xrce` / `c_xrce` / `bridge` tests. Both are prebuilt tool packages in
      # the SDK index.
      - name: Provision QEMU + XRCE agent (nros setup --tool)
        run: |
          nros setup --tool qemu --prefix "$GITHUB_WORKSPACE/build/qemu" --index nros-sdk-index.toml
          nros setup --tool xrce-agent --index nros-sdk-index.toml

      # The native integration tests (actions / services / qos / multi_node /
      # native_api / executor / ...) spawn PREBUILT example binaries via
      # `require_prebuilt_binary` ("Run `just build-test-fixtures` first") ‚Äî the
      # lane never staged them, so ~300 tests failed (issue #25). Build the
      # native fixtures the way a user does (unblocked now that the issue-0022
      # fixture-build deadlock is fixed); toolchains/sources come from the
      # `nros setup` above. The XRCE agent is best-effort ‚Äî if its source build
      # hiccups, the `xrce` / `c_xrce` / `bridge` tests `skip!` cleanly (the
      # test-integration recipe now tolerates `[SKIPPED]`), as do the Zephyr
      # tests when no SDK is present.
      # Build the native fixtures best-effort. The rust per-example fixtures
      # (the bulk of the integration tests) build from the `nros setup` sources
      # above; the other variants need extra deps/tools the light host lane does
      # not carry ‚Äî C/C++ extras (nros-c posix.h compile clash, issue #27), the
      # workspace entry (`play_launch_parser`), the XRCE agent. Those stay
      # best-effort: with `NROS_FIXTURES_OPTIONAL=1` on the test step, any
      # fixture that did not build makes its test `skip!` ([SKIPPED]-tolerated)
      # instead of failing ‚Äî while `test-all` (var unset) still hard-fails.
      - name: Build native fixtures + XRCE agent (best-effort)
        run: |
          source /opt/ros/humble/setup.bash
          just native build-fixture-rust       || echo "rust fixtures partial ‚Äî affected tests [SKIPPED]"
          just native build-workspace-fixtures || echo "workspace fixtures unavailable ‚Äî affected tests [SKIPPED]"
          just native build-fixture-extras     || echo "C/C++ extras unavailable (issue #27) ‚Äî affected tests [SKIPPED]"

      - name: just test-integration
        # Source the AMENT prefix so `nros generate-rust` (used by some
        # Phase 212 fixtures' build.rs steps) finds the ROS 2 Humble
        # rosidl pipeline. Same as platform-ci's e2e step. NROS_FIXTURES_OPTIONAL
        # makes an unstaged fixture a [SKIPPED], not a failure (light tier).
        env:
          NROS_FIXTURES_OPTIONAL: "1"
        run: source /opt/ros/humble/setup.bash && just test-integration

      # Phase 214.R.1 ‚Äî surface the per-fixture skip/fail tally even on
      # success runs so the CI log shows which gated fixtures (Zephyr
      # SDK / Arm FVP / vendor SDKs) were skipped this turn. Cheap; no
      # impact on green runs.
      - name: Report skipped fixtures (post-run)
        if: always()
        run: |
          if [ -f target/nextest/default/junit.xml ]; then
            echo "::group::skipped fixtures"
            grep -E '<skipped|\[SKIPPED\]' target/nextest/default/junit.xml \
              | head -100 || echo "(no skips recorded)"
            echo "::endgroup::"
          else
            echo "(no junit.xml ‚Äî `test-integration` may have failed before any test ran)"
          fi

      - name: Upload nextest JUnit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-integration-tests-junit
          path: target/nextest/default/junit.xml
          if-no-files-found: ignore
          retention-days: 7
