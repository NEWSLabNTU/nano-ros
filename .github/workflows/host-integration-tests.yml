# Host integration-test lane — covers `just test-integration` (the
# `nros-tests` crate, with the heavy QEMU/Zephyr/ROS-2-interop groups
# excluded). This is the host-side regression net for everything that
# scaffolds + consumes workspaces, but doesn't itself need a Zephyr SDK
# or a QEMU runtime:
#
#   - Phase 212.N — Node + Entry pkg workspaces. `nros::main!()` proc-macro
#     forms (n9_workspace), single-Entry-pkg run-plan (n_entry_poc_runs),
#     board-agnostic run-plan (o3), pkg-index workspace walk (o4),
#     nav2-shape compat smoke (o5).
#   - Phase 212.M-F — `nros codegen-system` adapter shim self-pkg shape,
#     bringup scaffolding, check-lints.
#   - Phase 212 orchestration suite — composable, conditionals, e2e,
#     includes, set/remap/env. The `nros launch` parser surface
#     (Phase 212.N.11) lives here.
#   - Phase 215.E — minimal ASI-shaped board-import fixture (skips
#     cleanly without a Zephyr SDK on PATH).
#   - Phase 217 — FVP runtime smokes (skip without Arm FVP installed).
#   - Loan / orin-spe-mock-ivc / etc. — host fixture suites.
#
# What's intentionally NOT here:
#   - per-platform builds + emulator runs (platform-ci.yml, scheduled).
#   - Zephyr dual-line example builds (zephyr-dual-line.yml).
#   - workspace unit tests (host-unit-tests.yml — `just test-unit`,
#     EXCLUDES `nros-tests`).
#   - heavy QEMU/Zephyr E2E (test-all tier; needs SDK + emulator).
#
# Why this lane exists: every Phase 212.N/O fixture lives under
# `nros-tests`, which `test-unit` explicitly excludes. Before this
# lane, the entire Node+Entry workspace shape was untested on CI
# — a regression to the `nros::main!()` macro, the H.1 adapter
# shim's self-pkg case, the workspace pkg-index walker (Phase
# 212.N.10), or the launch parser would all land green.
name: host integration-tests

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "just/**"
      - "cmake/**"
      - "zephyr/cmake/**"
      - "nros-sdk-index.toml"
      - ".github/workflows/host-integration-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "just/**"
      - "cmake/**"
      - "zephyr/cmake/**"
      - "nros-sdk-index.toml"
      - ".github/workflows/host-integration-tests.yml"
  workflow_dispatch:

concurrency:
  group: host-integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-integration:
    name: nros-tests integration (host)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    # nano-ros-ci bakes ROS 2 Humble + pinned rustup + just + cargo-nextest
    # + host build deps + the build tooling cargo / cmake need. Same image
    # as `host-unit-tests` so an integration regression surfaces under the
    # same fresh-runner contract.
    container:
      image: ghcr.io/newslabntu/nano-ros-ci:humble
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    # CI-build tuning (issue #29) — applies to this lane's cargo builds ONLY,
    # never to local/release/embedded builds (those keep the workspace
    # `[profile.release]` `lto = "fat"` + full debuginfo untouched). The native
    # test fixtures are spawned and asserted on *behaviour*, so optimisation and
    # symbols are irrelevant to pass/fail — and fat LTO across ~30 standalone
    # per-fixture target dirs writes giant transient `lto1` objects that exhaust
    # the runner disk. Standalone fixtures (empty `[workspace]`, no custom
    # `[profile.*]`) can't inherit a workspace CI profile, so the cross-project
    # knob is the cargo env override, set once here rather than per step:
    #   - CARGO_PROFILE_RELEASE_LTO=off — overrides the workspace profile AND the
    #     C++ FFI fixture manifest (`cmake/cpp_ffi_Cargo.toml.in` `lto = true`).
    #   - RUSTFLAGS=-C debuginfo=0 — drops debug symbols (smaller artifacts).
    env:
      CARGO_PROFILE_RELEASE_LTO: "off"
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 — build the nros CLI from packages/cli/ in-tree. Required by
      # every Phase 212 self-pkg / launch / pkg-index test (they shell out to
      # `nros plan`, `nros codegen-system`, `nros check`, `nros launch`). The
      # cache step amortizes the build across PRs that don't touch the CLI tree.
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      # Same source set as host-unit-tests: the root workspace path-deps
      # px4-sitl-tests (load gate) + the *-sys crates compile zenoh-pico /
      # mbedtls / micro-{cdr,xrce-dds-client} / cyclonedds-src into the
      # workspace. Without these the `cargo metadata` step the
      # `test-integration` recipe drives panics out.
      - name: Provision workspace sources via nros
        run: |
          nros setup --source px4-rs --source zenoh-pico --source mbedtls \
                     --source micro-cdr --source micro-xrce-dds-client \
                     --source cyclonedds-src --source nuttx-libc

      # `test-integration` has `build-zenohd` as a prereq — it spawns
      # zenohd to back the Phase 211 / Phase 212 host integration tests.
      # Provision the prebuilt router from the SDK index up front (the
      # source-build path in `build-zenohd` needs the zenoh submodule, which
      # this lane does not check out). `build.sh` then short-circuits on the
      # present binary, so the recipe prereq is satisfied. Keeping the
      # explicit step makes a provisioning failure surface obviously (vs. a
      # confusing "test-integration" red).
      - name: Provision zenohd
        run: just zenohd setup

      # Provision the test prerequisites the way a user does — via `nros setup`
      # (#25). The patched qemu-system-arm (build/qemu/, where `qemu.rs` looks)
      # backs the `platform` / `qemu_patched_binary` tests; the prebuilt
      # Micro-XRCE-DDS Agent (nros store, where `xrce_agent.rs` looks) backs the
      # `xrce` / `c_xrce` / `bridge` tests. Both are prebuilt tool packages in
      # the SDK index.
      # Every test prerequisite is an `nros setup` package (RFC-0014) — a user
      # gets them all the same way: the patched qemu-system-arm (build/qemu/,
      # where `qemu.rs` looks), the prebuilt Micro-XRCE-DDS Agent (nros store,
      # where `xrce_agent.rs` looks), and play_launch_parser (the launch-graph
      # tool the workspace-entry fixtures need; flat store bin on PATH).
      - name: Provision QEMU + XRCE agent + play_launch_parser (nros setup --tool)
        run: |
          nros setup --tool qemu --prefix "$GITHUB_WORKSPACE/build/qemu" --index nros-sdk-index.toml
          nros setup --tool xrce-agent --index nros-sdk-index.toml
          # play_launch_parser source-builds (cargo install); if it hiccups the
          # workspace-entry fixtures `skip!` cleanly under NROS_FIXTURES_OPTIONAL,
          # so keep it best-effort (qemu + agent above stay hard — their tests
          # can't skip the binary lookup the same way).
          nros setup --tool play_launch_parser --index nros-sdk-index.toml \
            || echo "play_launch_parser unavailable — workspace-entry fixtures [SKIPPED]"
          # The store installs to a versioned prefix (~/.nros/sdk/<tool>/<ver>/bin),
          # not a flat bin/. Resolve the actual bin dir so PATH points at it.
          plp_bin="$(dirname "$(find "$HOME/.nros/sdk/play_launch_parser" -type f -name play_launch_parser -path '*/bin/*' 2>/dev/null | head -1)")"
          [ -n "$plp_bin" ] && echo "$plp_bin" >> "$GITHUB_PATH" || true

      # The native integration tests (actions / services / qos / multi_node /
      # native_api / executor / ...) spawn PREBUILT example binaries via
      # `require_prebuilt_binary` ("Run `just build-test-fixtures` first") — the
      # lane never staged them, so ~300 tests failed (issue #25). Build the
      # native fixtures the way a user does (unblocked now that the issue-0022
      # fixture-build deadlock is fixed); toolchains/sources come from the
      # `nros setup` above. The XRCE agent is best-effort — if its source build
      # hiccups, the `xrce` / `c_xrce` / `bridge` tests `skip!` cleanly (the
      # test-integration recipe now tolerates `[SKIPPED]`), as do the Zephyr
      # tests when no SDK is present.
      # Build the native fixtures best-effort. The rust per-example fixtures
      # (the bulk of the integration tests) build from the `nros setup` sources
      # above; the other variants need extra deps/tools the light host lane does
      # not carry — C/C++ extras (nros-c posix.h compile clash, issue #27), the
      # workspace entry (`play_launch_parser`), the XRCE agent. Those stay
      # best-effort: with `NROS_FIXTURES_OPTIONAL=1` on the test step, any
      # fixture that did not build makes its test `skip!` ([SKIPPED]-tolerated)
      # instead of failing — while `test-all` (var unset) still hard-fails.
      # Issue #29 — the ENOSPC that crashed the runner agent mid-build is NOT
      # the container disk (the overlay `/` has ~88 GB free). It is the runner
      # *host's* small OS disk: GitHub streams every step's stdout/stderr to the
      # agent log under `/home/runner/actions-runner/.../_diag`, and the ~100-min
      # verbose cargo+cmake fixture/test build emits GIGABYTES of `Compiling …`
      # lines that overflow that host log volume. The fix is to keep the noisy
      # build/test output OFF the streamed agent log: redirect it to a file on
      # the big overlay disk and surface only a tail (on failure / at the end).
      # `RUSTFLAGS=-C debuginfo=0` is kept as a cheap artifact/link-time trim
      # (tests spawn the binaries; no symbols needed) — not a disk fix.
      # LTO-off + debuginfo=0 come from the job-level CI-build tuning env (#29):
      # without them the fat-LTO `lto1` transients across the duplicated
      # per-fixture target dirs exhaust the overlay disk mid-build.
      - name: Build native fixtures + XRCE agent (best-effort)
        run: |
          source /opt/ros/humble/setup.bash
          mkdir -p build/ci-logs
          build_quiet() {
            local name="$1"; shift
            local log="build/ci-logs/$name.log"
            if "$@" > "$log" 2>&1; then
              echo "$name: ok ($(wc -l < "$log") lines, suppressed)"
            else
              echo "::group::$name FAILED — tail"; tail -120 "$log"; echo "::endgroup::"
              echo "$name partial — affected tests [SKIPPED]"
            fi
          }
          build_quiet build-fixture-rust       just native build-fixture-rust
          build_quiet build-workspace-fixtures just native build-workspace-fixtures
          build_quiet build-fixture-extras     just native build-fixture-extras

      # Issue #29 — the C/C++ CycloneDDS extras build is the dominant disk
      # consumer: it rebuilds nros-cpp + Cyclone into a SEPARATE
      # `build-cyclonedds/` tree PER example (native/c/{talker,listener},
      # native/cpp/{talker,listener}, …), and even with LTO off that
      # duplication overruns the 146 GB overlay mid-build — leaving no room for
      # test-integration's own compile (the failure was non-deterministic: the
      # lane sat right at the disk limit). Those extras are best-effort: their
      # C/C++/Cyclone tests `skip!` when the binary is absent. So drop the extras
      # build trees (+ re-derivable cargo caches + the suppressed build logs)
      # here to give test-integration headroom. The rust per-example fixtures
      # (`target-fixtures/`) and workspace fixtures the bulk of tests need are
      # NOT touched.
      - name: Reclaim extras build trees before test (best-effort fixtures)
        run: |
          echo "before:"; df -h / | tail -1
          find examples -type d -name 'build-cyclonedds' -prune -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.cargo/registry/src" "$HOME/.cargo/git/checkouts" build/ci-logs 2>/dev/null || true
          echo "after:";  df -h / | tail -1

      - name: just test-integration
        # Source the AMENT prefix so `nros generate-rust` (used by some
        # Phase 212 fixtures' build.rs steps) finds the ROS 2 Humble
        # rosidl pipeline. Same as platform-ci's e2e step. NROS_FIXTURES_OPTIONAL
        # makes an unstaged fixture a [SKIPPED], not a failure (light tier).
        # Issue #29 — `cargo nextest` compiles the nros-tests crate + all its
        # integration test binaries, emitting thousands more `Compiling …` lines.
        # Redirect that to a file on the overlay disk (not the host agent log)
        # and tail it, so the verbose compile can't overflow the runner's small
        # host log volume. The recipe's own per-test summary + real-failure
        # verdict print near the end, so a tail still surfaces them; the captured
        # recipe exit code still gates the step. NROS_FIXTURES_OPTIONAL makes an
        # unstaged fixture a [SKIPPED], not a failure (light tier); LTO-off +
        # debuginfo=0 come from the job-level CI-build env.
        env:
          NROS_FIXTURES_OPTIONAL: "1"
        run: |
          source /opt/ros/humble/setup.bash
          mkdir -p build/ci-logs
          set +e
          just test-integration > build/ci-logs/test-integration.log 2>&1
          rc=$?
          set -e
          echo "::group::test-integration output (tail)"; tail -200 build/ci-logs/test-integration.log; echo "::endgroup::"
          exit $rc

      # Phase 214.R.1 — surface the per-fixture skip/fail tally even on
      # success runs so the CI log shows which gated fixtures (Zephyr
      # SDK / Arm FVP / vendor SDKs) were skipped this turn. Cheap; no
      # impact on green runs.
      - name: Report skipped fixtures (post-run)
        if: always()
        run: |
          if [ -f target/nextest/default/junit.xml ]; then
            echo "::group::skipped fixtures"
            grep -E '<skipped|\[SKIPPED\]' target/nextest/default/junit.xml \
              | head -100 || echo "(no skips recorded)"
            echo "::endgroup::"
          else
            echo "(no junit.xml — `test-integration` may have failed before any test ran)"
          fi

      - name: Upload nextest JUnit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-integration-tests-junit
          path: target/nextest/default/junit.xml
          if-no-files-found: ignore
          retention-days: 7
