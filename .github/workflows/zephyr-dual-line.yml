# Phase 180.A Task 10 — dual-line Zephyr CI.
#
# Builds the representative nano-ros Zephyr examples on BOTH Zephyr lines
# (3.7 LTS via west.yml, 4.4 rolling via west-4.4.yml) and runs the
# Phase 180.B copy-out check. Selection mirrors the local recipes:
#   - per-line example builds : `NROS_ZEPHYR_VERSION=<line> just zephyr build-one`
#   - dual-line one-shot       : `just zephyr ci-both`
#   - copy-out promise         : `just zephyr check-copy-out`
#
# Validated by live workflow_dispatch runs (2026-05-28). Bring-up needed:
# absolute Zephyr workspace path (was created inside the SDK dir), gating the
# Cortex-A9/Zynq patch to the 3.7 line, untracking a stray zephyr-workspace
# symlink, `uv` for the 4.4 Python 3.12 venv, initing the cyclonedds/zenoh-pico/
# codegen submodules, skipping the unused XRCE-agent build, and a jammy runner +
# ROS 2 Humble (the interface codegen resolves std_msgs via AMENT_PREFIX_PATH).
name: Zephyr dual-line

on:
  push:
    branches: [main]
    paths:
      - "examples/zephyr/**"
      - "packages/**"
      - "cmake/**"
      - "zephyr/**"
      - "scripts/zephyr/**"
      - "just/zephyr.just"
      - ".github/workflows/zephyr-dual-line.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/zephyr/**"
      - "packages/**"
      - "cmake/**"
      - "zephyr/**"
      - "scripts/zephyr/**"
      - "just/zephyr.just"
      - ".github/workflows/zephyr-dual-line.yml"
  workflow_dispatch:

concurrency:
  group: zephyr-dual-line-${{ github.ref }}
  cancel-in-progress: true

# This workflow builds only the zenoh examples, so skip the heavy Micro-XRCE-DDS
# Agent (Fast-DDS superbuild) that `just zephyr setup` builds for XRCE runtime
# tests — it is unused here and would run on every matrix job.
env:
  NROS_ZEPHYR_SKIP_XRCE_AGENT: "1"

jobs:
  # --- Per-line example matrix -------------------------------------------
  # Builds the c/cpp/rust talker+listener (zenoh) on each line via
  # `just zephyr build-one`. The 4.4 line provisions a Python 3.12 venv
  # (Zephyr 4.4 requires >=3.12) during `just zephyr setup`.
  example-matrix:
    name: ${{ matrix.line }} / ${{ matrix.example }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        line: ["3.7", "4.4"]
        example:
          - c/talker
          - c/listener
          - cpp/talker
          - cpp/listener
          - rust/talker
          - rust/listener
    env:
      NROS_ZEPHYR_VERSION: ${{ matrix.line }}
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # actions/checkout doesn't init submodules. Only the codegen submodule is
      # hand-initialized — it's the bootstrap needed to build the nros CLI
      # (chicken/egg; can't be nros-provisioned). recursive: codegen has nested
      # submodules. Everything else is provisioned by `nros setup` below, the way
      # a user does — never a hand `git submodule update`.
      - name: Init codegen submodule (bootstrap for the nros CLI)
        run: git submodule update --init --recursive packages/codegen

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Rust toolchain
        run: rustup show && rustup target add armv7a-none-eabi

      # Provision the in-tree sources the Zephyr build needs via nros (index-
      # driven): zenoh-pico (zenoh examples) + the cyclonedds fork the setup
      # patches in place + px4-rs (the libnros_c.a cargo build loads the whole
      # root workspace, which path-deps px4-sitl-tests — same workspace-load dep
      # as the core-libs lane). Build the CLI first (the published bin is stale).
      - name: Build the nros CLI
        run: cargo build --manifest-path packages/codegen/packages/Cargo.toml -p nros-cli --bin nros

      - name: Provision Zephyr sources via nros
        run: packages/codegen/packages/target/debug/nros setup --source zenoh-pico --source cyclonedds-src --source px4-rs

      # The Zephyr 4.4 line needs Python >=3.12; provision-py312-venv.sh uses
      # `uv` to fetch a standalone 3.12 without sudo. Harmless on the 3.7 line.
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # The interface codegen (nros_generate_interfaces) resolves std_msgs's
      # msg/*.msg via AMENT_PREFIX_PATH from a sourced ROS 2; the build steps
      # `source /opt/ros/humble/setup.bash`. (Humble ⇒ the jammy runner.)
      - name: Install ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      # Cache the ~1 GB Zephyr SDK (line-independent; setup.sh skips the
      # download/extract when scripts/zephyr/sdk is already populated). Key on
      # setup.sh so a SDK-version bump busts the cache.
      - name: Cache Zephyr SDK
        uses: actions/cache@v4
        with:
          path: scripts/zephyr/sdk
          key: zephyr-sdk-${{ runner.os }}-${{ hashFiles('scripts/zephyr/setup.sh') }}

      # Provisions the Zephyr workspace for the selected line, including
      # the 4.4 Python 3.12 venv + NSOS patches (see just/zephyr.just
      # setup recipe). Heavy step; the SDK download is cached above.
      - name: Set up Zephyr ${{ matrix.line }} workspace
        run: just zephyr setup

      - name: Build zephyr/${{ matrix.example }} (zenoh) on ${{ matrix.line }}
        run: source /opt/ros/humble/setup.bash && just zephyr build-one "${{ matrix.example }}" zenoh

  # --- Dual-line one-shot ------------------------------------------------
  # Runs the `ci-both` recipe directly so the per-line summary table
  # (PASS / FAIL / SKIP) lands in one job's log. Requires both
  # workspaces; if a line is absent it SKIPS (never silently passes).
  dual-line-summary:
    name: ci-both (3.7 + 4.4)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # actions/checkout doesn't init submodules. Only the codegen submodule is
      # hand-initialized — it's the bootstrap needed to build the nros CLI
      # (chicken/egg; can't be nros-provisioned). recursive: codegen has nested
      # submodules. Everything else is provisioned by `nros setup` below, the way
      # a user does — never a hand `git submodule update`.
      - name: Init codegen submodule (bootstrap for the nros CLI)
        run: git submodule update --init --recursive packages/codegen

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Rust toolchain
        run: rustup show && rustup target add armv7a-none-eabi

      # Provision the in-tree sources the Zephyr build needs via nros (index-
      # driven): zenoh-pico (zenoh examples) + the cyclonedds fork the setup
      # patches in place + px4-rs (the libnros_c.a cargo build loads the whole
      # root workspace, which path-deps px4-sitl-tests — same workspace-load dep
      # as the core-libs lane). Build the CLI first (the published bin is stale).
      - name: Build the nros CLI
        run: cargo build --manifest-path packages/codegen/packages/Cargo.toml -p nros-cli --bin nros

      - name: Provision Zephyr sources via nros
        run: packages/codegen/packages/target/debug/nros setup --source zenoh-pico --source cyclonedds-src --source px4-rs

      # The Zephyr 4.4 line needs Python >=3.12; provision-py312-venv.sh uses
      # `uv` to fetch a standalone 3.12 without sudo. Harmless on the 3.7 line.
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # The interface codegen (nros_generate_interfaces) resolves std_msgs's
      # msg/*.msg via AMENT_PREFIX_PATH from a sourced ROS 2; the build steps
      # `source /opt/ros/humble/setup.bash`. (Humble ⇒ the jammy runner.)
      - name: Install ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      # Cache the ~1 GB Zephyr SDK (line-independent; see example-matrix).
      - name: Cache Zephyr SDK
        uses: actions/cache@v4
        with:
          path: scripts/zephyr/sdk
          key: zephyr-sdk-${{ runner.os }}-${{ hashFiles('scripts/zephyr/setup.sh') }}

      - name: Set up Zephyr 3.7 workspace
        run: NROS_ZEPHYR_VERSION=3.7 just zephyr setup

      - name: Set up Zephyr 4.4 workspace
        run: NROS_ZEPHYR_VERSION=4.4 just zephyr setup

      - name: Dual-line build (c/talker zenoh)
        run: source /opt/ros/humble/setup.bash && just zephyr ci-both c/talker zenoh

  # --- Copy-out promise --------------------------------------------------
  # Proves a copied-out example builds from OUTSIDE the repo tree against
  # the nano-ros Zephyr module (Phase 180.B item 5). Runs on the 4.4 line.
  copy-out:
    name: copy-out check (4.4)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # actions/checkout doesn't init submodules. Only the codegen submodule is
      # hand-initialized — it's the bootstrap needed to build the nros CLI
      # (chicken/egg; can't be nros-provisioned). recursive: codegen has nested
      # submodules. Everything else is provisioned by `nros setup` below, the way
      # a user does — never a hand `git submodule update`.
      - name: Init codegen submodule (bootstrap for the nros CLI)
        run: git submodule update --init --recursive packages/codegen

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Rust toolchain
        run: rustup show && rustup target add armv7a-none-eabi

      # Provision the in-tree sources the Zephyr build needs via nros (index-
      # driven): zenoh-pico (zenoh examples) + the cyclonedds fork the setup
      # patches in place + px4-rs (the libnros_c.a cargo build loads the whole
      # root workspace, which path-deps px4-sitl-tests — same workspace-load dep
      # as the core-libs lane). Build the CLI first (the published bin is stale).
      - name: Build the nros CLI
        run: cargo build --manifest-path packages/codegen/packages/Cargo.toml -p nros-cli --bin nros

      - name: Provision Zephyr sources via nros
        run: packages/codegen/packages/target/debug/nros setup --source zenoh-pico --source cyclonedds-src --source px4-rs

      # The Zephyr 4.4 line needs Python >=3.12; provision-py312-venv.sh uses
      # `uv` to fetch a standalone 3.12 without sudo. Harmless on the 3.7 line.
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # The interface codegen (nros_generate_interfaces) resolves std_msgs's
      # msg/*.msg via AMENT_PREFIX_PATH from a sourced ROS 2; the build steps
      # `source /opt/ros/humble/setup.bash`. (Humble ⇒ the jammy runner.)
      - name: Install ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Set up Zephyr 4.4 workspace
        run: NROS_ZEPHYR_VERSION=4.4 just zephyr setup

      - name: Copy-out build check
        run: source /opt/ros/humble/setup.bash && just zephyr check-copy-out c/talker zenoh
