# Phase 180.A Task 10 — dual-line Zephyr CI.
#
# Builds the representative nano-ros Zephyr examples on BOTH Zephyr lines
# (3.7 LTS via west.yml, 4.4 rolling via west-4.4.yml) and runs the
# Phase 180.B copy-out check. Selection mirrors the local recipes:
#   - per-line example builds : `NROS_ZEPHYR_VERSION=<line> just zephyr build-one`
#   - dual-line one-shot       : `just zephyr ci-both`
#   - copy-out promise         : `just zephyr check-copy-out`
#
# Runs in the prebuilt Zephyr CI image (Phase 196.3,
# ci/docker/zephyr-ros/Dockerfile → ghcr.io): ROS 2 Humble + the Zephyr SDK
# (registered) + host tools (cmake/ninja/dtc/gperf, uv, just, rustup + cross
# targets) are baked, so each job skips the ~6-8 min of setup-ros/SDK/uv/just/
# rustup it used to run. Dynamic per-run: the `nros` CLI (released binary), the
# index-driven source submodules, and the manifest-pinned `west update`.
name: Zephyr dual-line

# CI reorg: heavy lane (10 examples x 2 Zephyr lines). PR (path-scoped) + nightly
# + on-demand, NOT every direct push to main (same cadence-cancellation reasoning
# as host-integration-tests). `cancel-in-progress: false` so a started run finishes.
on:
  pull_request:
    branches: [main]
    paths:
      - "examples/zephyr/**"
      - "packages/**"
      - "cmake/**"
      - "zephyr/**"
      - "scripts/zephyr/**"
      - "just/zephyr.just"
      - "ci/docker/zephyr-ros/**"
      - ".github/workflows/zephyr-dual-line.yml"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: zephyr-dual-line-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

# packages: read — pull the GHCR CI image (private to the org by default).
permissions:
  contents: read
  packages: read

env:
  # This workflow builds only the zenoh examples, so skip the heavy Micro-XRCE-DDS
  # Agent (Fast-DDS superbuild) `just zephyr setup` builds for XRCE runtime tests.
  NROS_ZEPHYR_SKIP_XRCE_AGENT: "1"

jobs:
  # --- Per-line example matrix -------------------------------------------
  example-matrix:
    name: ${{ matrix.line }} / ${{ matrix.example }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/newslabntu/nano-ros-zephyr-ci:humble-sdk0.17.4-r2
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        line: ["3.7", "4.4"]
        # Phase 217 follow-up: every Zephyr Rust example now invokes
        # `nros_system_generate(${CMAKE_CURRENT_SOURCE_DIR})` so its
        # CMakeLists shells `nros codegen-system` at configure time
        # (H.1 adapter shim, self-pkg case). The matrix covers all 6
        # board-agnostic Rust examples + the c/cpp pubsub pair —
        # gates regressions of the shim's per-pkg invocation across
        # node / publisher / subscriber / service / action surfaces.
        example:
          - c/talker
          - c/listener
          - cpp/talker
          - cpp/listener
          - rust/talker
          - rust/listener
          - rust/service-client
          - rust/service-server
          - rust/action-client
          - rust/action-server
    env:
      NROS_ZEPHYR_VERSION: ${{ matrix.line }}
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 — build the nros CLI from packages/cli/ in-tree. The build's
      # interface codegen resolves the same binary via PATH (Phase 195.D). The
      # cache amortizes the build across PRs that don't touch the CLI tree.
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      # Index-driven source submodules (never a hand `git submodule update`):
      # zenoh-pico + the cyclonedds fork the setup patches + px4-rs (root-workspace
      # cargo-load dep). `just zephyr setup` also provisions these (197.1); kept
      # explicit as idempotent belt-and-suspenders.
      - name: Provision Zephyr sources via nros
        run: nros setup --source zenoh-pico --source cyclonedds-src --source px4-rs

      # The image registered the SDK's CMake package as root (~/.cmake under
      # /root); the container runs with HOME=/github/home, so re-register for this
      # HOME. Zephyr 3.7's FindZephyr-sdk falls back to ZEPHYR_SDK_INSTALL_DIR (set
      # in the image), but 4.4's needs the user CMake-package registry.
      - name: Register the baked Zephyr SDK for this HOME
        run: /opt/zephyr-sdk/setup.sh -c

      # The image bakes `bin/cargo-clippy` from a layer that's not the rustup
      # owner — `rustup target add` (inside `just zephyr setup`) trips on a
      # `clippy-preview-x86_64-unknown-linux-gnu, detected conflict:
      # bin/cargo-clippy`. Workaround:
      #   1. Delete the orphan `cargo-clippy`/`clippy-driver` files so rustup
      #      doesn't see the conflict.
      #   2. Re-install clippy explicitly for *every* installed toolchain
      #      (\`--force\` so the just-deleted slots get repopulated cleanly).
      # The zephyr-sys build then finds `cargo-clippy` on the pinned nightly
      # the example's rust-toolchain.toml selects.
      - name: Unblock rustup clippy-preview conflict
        run: |
          rustup_home="$(rustup show home 2>/dev/null || echo "$HOME/.rustup")"
          find "$rustup_home/toolchains" -maxdepth 3 -type f \
              \( -name cargo-clippy -o -name clippy-driver \) -delete 2>/dev/null || true
          # Repopulate clippy on every toolchain rustup knows about.
          rustup toolchain list 2>/dev/null | awk '{print $1}' | while read -r tc; do
              [ -z "$tc" ] && continue
              echo "  installing clippy on $tc"
              rustup component add clippy --toolchain "$tc" \
                  || echo "  (clippy add failed for $tc — non-fatal)"
          done

      # `west update` (manifest-pinned) + the line's NSOS/cyclone patches. The
      # Zephyr SDK is baked into the image (registered), so --skip-sdk: setup.sh
      # does not re-download the ~1 GB SDK. rustup targets + uv are baked too.
      - name: Set up Zephyr ${{ matrix.line }} workspace
        run: just zephyr setup --skip-sdk

      # The Rust Zephyr examples pull `zephyr-sys`, whose build.rs runs
      # `bindgen` over Zephyr's headers — bindgen needs both libclang.so AND
      # clang's resource-dir headers (`stddef.h` etc.). `libclang-dev` ships
      # only the shared library; `clang` brings the resource-dir headers
      # too. Install both for the Rust matrix cells (C/C++ cells skip).
      - name: Install clang + libclang for bindgen
        if: startsWith(matrix.example, 'rust/')
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends clang libclang-dev

      - name: Build zephyr/${{ matrix.example }} (zenoh) on ${{ matrix.line }}
        run: source /opt/ros/humble/setup.bash && just zephyr build-one "${{ matrix.example }}" zenoh

  # --- Dual-line one-shot ------------------------------------------------
  dual-line-summary:
    name: ci-both (3.7 + 4.4)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/newslabntu/nano-ros-zephyr-ci:humble-sdk0.17.4-r2
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 — build the nros CLI from packages/cli/ in-tree.
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      - name: Provision Zephyr sources via nros
        run: nros setup --source zenoh-pico --source cyclonedds-src --source px4-rs

      # The image registered the SDK's CMake package as root (~/.cmake under
      # /root); the container runs with HOME=/github/home, so re-register for this
      # HOME. Zephyr 3.7's FindZephyr-sdk falls back to ZEPHYR_SDK_INSTALL_DIR (set
      # in the image), but 4.4's needs the user CMake-package registry.
      - name: Register the baked Zephyr SDK for this HOME
        run: /opt/zephyr-sdk/setup.sh -c

      # See the same comment in the example-matrix job — `rustup set profile
      # minimal` avoids `clippy-preview ... bin/cargo-clippy` conflict when
      # `rustup target add` triggers a channel sync.
      - name: rustup set profile minimal (avoid clippy-preview conflict)
        run: rustup set profile minimal

      - name: Set up Zephyr 3.7 workspace
        run: NROS_ZEPHYR_VERSION=3.7 just zephyr setup --skip-sdk

      - name: Set up Zephyr 4.4 workspace
        run: NROS_ZEPHYR_VERSION=4.4 just zephyr setup --skip-sdk

      - name: Dual-line build (c/talker zenoh)
        run: source /opt/ros/humble/setup.bash && just zephyr ci-both c/talker zenoh

  # --- Copy-out promise --------------------------------------------------
  copy-out:
    name: copy-out check (4.4)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/newslabntu/nano-ros-zephyr-ci:humble-sdk0.17.4-r2
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nano-ros
        uses: actions/checkout@v4

      # Phase 218 — build the nros CLI from packages/cli/ in-tree.
      - name: Cache CLI build (Phase 218)
        uses: actions/cache@v4
        with:
          path: packages/cli/target
          key: nros-cli-${{ runner.os }}-${{ hashFiles('packages/cli/Cargo.lock', 'packages/cli/**/Cargo.toml', 'packages/cli/**/*.rs') }}
          restore-keys: |
            nros-cli-${{ runner.os }}-

      - name: Build nros CLI from packages/cli/ (Phase 218)
        run: |
          # Phase 218 CLI sub-workspace path-deps `ros-launch-manifest-types`
          # from the nested submodule. actions/checkout default-skips
          # submodules; init only the CLI-side one (cheap; ~50KB).
          git submodule update --init --recursive --depth 1 packages/cli/third-party/ros-launch-manifest
          cargo build --release --manifest-path packages/cli/Cargo.toml --bin nros
          echo "$GITHUB_WORKSPACE/packages/cli/target/release" >> "$GITHUB_PATH"

      - name: Provision Zephyr sources via nros
        run: nros setup --source zenoh-pico --source cyclonedds-src --source px4-rs

      # The image registered the SDK's CMake package as root (~/.cmake under
      # /root); the container runs with HOME=/github/home, so re-register for this
      # HOME. Zephyr 3.7's FindZephyr-sdk falls back to ZEPHYR_SDK_INSTALL_DIR (set
      # in the image), but 4.4's needs the user CMake-package registry.
      - name: Register the baked Zephyr SDK for this HOME
        run: /opt/zephyr-sdk/setup.sh -c

      # Same clippy-preview workaround as the example-matrix job.
      - name: rustup set profile minimal (avoid clippy-preview conflict)
        run: rustup set profile minimal

      - name: Set up Zephyr 4.4 workspace
        run: NROS_ZEPHYR_VERSION=4.4 just zephyr setup --skip-sdk

      - name: Copy-out build check
        run: source /opt/ros/humble/setup.bash && just zephyr check-copy-out c/talker zenoh
