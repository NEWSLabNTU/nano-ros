# Phase 139.3 — minimal PlatformIO consumer example.
#
# Copy this directory into a PlatformIO project, set the env's `board`
# + `framework`, and run `pio run`. The `lib_deps` line tells the
# PlatformIO Library Manager to pull nano-ros from its registry once
# published, or point at a local checkout during development:
#
#   lib_deps = file:///path/to/nano-ros/integrations/platformio

[env:native]
platform = native
lib_deps = nano-ros@*
build_flags =
    -I../../../../packages/core/nros-c/include
    -DNROS_PLATFORM_POSIX

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
lib_deps = nano-ros@*
