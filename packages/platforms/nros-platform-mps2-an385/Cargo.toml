[package]
name = "nros-platform-mps2-an385"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "nros platform implementation for QEMU MPS2-AN385 bare-metal"
publish = false

[lib]
name = "nros_platform_mps2_an385"

[features]
default = []
# TLS support (larger heap: 128 KB instead of 64 KB)
link-tls = []
# Phase 97.3.mps2-an385 — DDS / dust-dds DcpsDomainParticipant + builtin
# topics / readers / writers consume far more heap than zenoh-pico (the
# threadx-rv64 slice needed 2 MB; same budget here). Off by default so
# zenoh / xrce builds keep their 64 KB footprint.
dds-heap = []
# Cortex-M PRIMASK → `critical_section::Impl`. Activated by
# `nros-platform/critical-section` when the bare-metal platform feature
# is on. Same flag the FreeRTOS / ThreadX paths use.
critical-section = ["cortex-m/critical-section-single-core"]

[dependencies]
# Platform trait definitions (trait impls live in lib.rs)
nros-platform-api = { path = "../../core/nros-platform-api" }
# Free-list allocator for heap
zpico-alloc = { path = "../../zpico/zpico-alloc" }
# Cortex-M register access
cortex-m = "0.7"
# smoltcp network provider (TCP/UDP via SmoltcpBridge)
nros-smoltcp = { path = "../../drivers/nros-smoltcp" }
# Shared bare-metal helpers (PRNG, sleep, libc stubs)
nros-baremetal-common = { path = "../../drivers/nros-baremetal-common", features = ["libc-stubs"] }
