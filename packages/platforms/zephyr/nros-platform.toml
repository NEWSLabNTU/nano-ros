# RFC-0049 / phase-290 — per-platform-package configuration.
#
# Sections: `[capabilities]` (software-stack facts), `[knobs.*]` (typed
# policy defaults; deny_unknown_fields), `[build.zenoh]` (the zenoh-pico /
# zpico shim build block — keys documented in
# nros-board-common/src/manifest.rs), `[arch.*]` (reusable compiler-flag
# profiles; may be duplicated across platform files only byte-identically).
# Resolution ladder: builtin < platform (inherits chain) < board < env.
# Schema + loader: nros-board-common/src/platform_config.rs.

[capabilities]
# Zephyr's zsock serializes send/recv on a per-fd mutex, so total tx
# throughput without batching is capped at ~one send per recv window —
# the fact that justifies the batch/split defaults below (phase-279/282).
threads = true
per_fd_tx_ceiling = true

# phase-290 W5 — the phase-282 promotion (option C, scoped to zephyr):
# batching + split locking DEFAULT ON — measured 15-20x streaming
# (~8.9 -> ~181 msg/s) on the only platform with the per-fd ceiling.
# Cost: up to flush_ms publish latency on non-express topics (declare
# publishers tx_express for low-rate latency-critical topics) + one
# extra wbuf (Z_BATCH_UNICAST_SIZE) of RAM per session. Requires the
# issue-0213 fork fix (declarations bypass the batch) — without it, a
# server's readiness banner outruns its still-batched queryable declares
# and immediately-fired queries miss. zephyr/Kconfig's NROS_ZENOH_TX_*
# defaults MUST mirror these values — asserted by
# nros-tests kconfig_platform_default_drift.
[knobs.zenoh.tx]
batch = true
split_lock = true
flush_ms = 50

[build.zenoh]
# Zephyr's build system compiles zenoh-pico itself; this block
# exists so the drift gate has a manifest entry but no cc-rs
# consumer hits it.
defines = ["ZENOH_GENERIC", "ZENOH_ZEPHYR"]
include = ["system/common", "system/zephyr"]

