[package]
name = "nros-rmw-uorb"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "PX4 uORB RMW backend for nano-ros"

[lib]
doctest = false

[features]
default = []
# Host-mock target (requires px4-rs std mock for testing without SITL).
# Forwards to critical-section/std so its global impl is available
# without the user wiring one up.
std = ["px4-uorb/std", "px4-workqueue/std", "px4-log/std", "critical-section/std"]
# Kept as a no-op for backwards compatibility — registry needs alloc
# unconditionally now (Phase 90.2b), so it's always pulled in via
# `extern crate alloc` regardless of this flag.
alloc = []
# log forwarding via px4-log
log = ["px4-log/log"]
# Expose `_reset()` for downstream integration tests.
test-helpers = []

[dependencies]
nros-rmw = { workspace = true }
nros-core = { workspace = true }
heapless = { workspace = true }
phf = { version = "0.11", default-features = false }
# Critical-section primitives for the no_std registry (Phase 90.2b).
# Real PX4 modules supply a critical_section impl via px4-sys; on host
# tests cargo selects the `std` impl through px4-workqueue/std.
critical-section = "1"

# px4-rs crates — vendored as a submodule under third-party/px4/px4-rs.
# Run `just px4 setup` to populate.
px4-sys = { path = "../../../third-party/px4/px4-rs/crates/px4-sys" }
px4-uorb = { path = "../../../third-party/px4/px4-rs/crates/px4-uorb" }
px4-workqueue = { path = "../../../third-party/px4/px4-rs/crates/px4-workqueue" }
px4-log = { path = "../../../third-party/px4/px4-rs/crates/px4-log" }

[build-dependencies]
phf_codegen = "0.11"
toml = "0.8"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
# Used by the typeless_api integration test to exercise the
# create_publisher_raw / create_subscription_raw flow end-to-end through
# Executor::open. Requires the rmw-uorb feature on nros-node so its
# session::ConcreteSession resolves to UorbSession.
nros-node = { workspace = true, default-features = false, features = ["std", "rmw-uorb"] }
