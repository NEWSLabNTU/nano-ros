[package]
name = "nros-rmw-uorb"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "PX4 uORB RMW backend for nano-ros"

[lib]
doctest = false

[features]
default = []
# Host-mock target. Forwards to px4-* std features so the std mock
# broker (in px4-uorb) and the std HRT worker (in px4-workqueue) are
# available without setting up a real PX4 build.
std = ["px4-uorb/std", "px4-workqueue/std", "px4-log/std"]
# log forwarding via px4-log
log = ["px4-log/log"]
# Expose test helpers (currently only used by px4-uorb's std mock).
test-helpers = []

[dependencies]
nros-rmw = { workspace = true, default-features = false }
nros-core = { workspace = true, default-features = false }
heapless = { workspace = true }
# 64-bit atomics for any future seq counters on 32-bit targets without
# native AtomicU64 (Cortex-M3 etc).
portable-atomic = { version = "1", default-features = false, features = ["fallback"] }

# px4-rs crates — vendored as a submodule under third-party/px4/px4-rs.
# Run `just px4 setup` to populate.
px4-sys = { path = "../../../third-party/px4/px4-rs/crates/px4-sys" }
px4-uorb = { path = "../../../third-party/px4/px4-rs/crates/px4-uorb" }
px4-workqueue = { path = "../../../third-party/px4/px4-rs/crates/px4-workqueue" }
px4-log = { path = "../../../third-party/px4/px4-rs/crates/px4-log" }

[dev-dependencies]
nros-node = { workspace = true, default-features = false, features = ["std", "rmw-uorb"] }

[lints]
workspace = true
