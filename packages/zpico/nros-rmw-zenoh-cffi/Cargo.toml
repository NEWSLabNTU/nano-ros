[package]
name = "nros-rmw-zenoh-cffi"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "C-vtable shim for the zenoh-pico RMW backend — exposes nros_rmw_zenoh_register()"
publish = false

[lib]
path = "src/lib.rs"

[features]
default = []

# Platform forwarding — mirrors nros-rmw-zenoh's platform-* features.
# Exactly one must be enabled. `nros-platform/platform-*` is also
# turned on so `zpico-platform-shim` can resolve `ConcretePlatform`
# when this shim is built standalone (nros-rmw-zenoh's own
# `platform-*` features deliberately leave that to the consumer board
# crate; we are that consumer here).
platform-posix = ["nros-rmw-zenoh/platform-posix", "nros-platform/platform-posix"]
platform-zephyr = ["nros-rmw-zenoh/platform-zephyr", "nros-platform/platform-zephyr"]
platform-bare-metal = ["nros-rmw-zenoh/platform-bare-metal"]
platform-freertos = ["nros-rmw-zenoh/platform-freertos", "nros-platform/platform-freertos"]
platform-nuttx = ["nros-rmw-zenoh/platform-nuttx", "nros-platform/platform-nuttx"]
platform-threadx = ["nros-rmw-zenoh/platform-threadx", "nros-platform/platform-threadx"]

# Link-transport forwarding (zenoh's are layered orthogonally on top
# of platform-*).
link-tcp = ["nros-rmw-zenoh/link-tcp"]
link-udp-unicast = ["nros-rmw-zenoh/link-udp-unicast"]
link-tls = ["nros-rmw-zenoh/link-tls"]

# ROS edition pass-through.
ros-humble = ["nros-rmw-zenoh/ros-humble"]
ros-iron = ["nros-rmw-zenoh/ros-iron"]

[dependencies]
# `RustBackendAdapter` lives behind nros-rmw-cffi's `alloc` feature
# (it boxes every entity handle). Force-enable unconditionally.
nros-rmw-cffi = { workspace = true, default-features = false, features = ["alloc"] }
nros-rmw-zenoh = { workspace = true, default-features = false }
nros-rmw = { workspace = true, default-features = false }
# Direct dep so the `platform-*` features above can pin
# `ConcretePlatform` for `zpico-platform-shim`. nros-rmw-zenoh
# intentionally leaves the platform-pick to the consumer.
nros-platform = { version = "0.1.0", path = "../../core/nros-platform", default-features = false }

[lints]
workspace = true
