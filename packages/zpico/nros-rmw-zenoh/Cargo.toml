[package]
name = "nros-rmw-zenoh"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Zenoh-pico RMW backend for nros"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "zenoh", "rmw", "embedded", "no-std"]
categories = ["embedded", "no-std", "network-programming"]

[features]
default = ["linkme-register"]
# Phase 134.fix — forwards to `nros-rmw-cffi/linkme-register`. Gates
# the `nros_rmw_register_backend!` macro's linkme expansion inside
# this crate (cfg evaluates in the calling crate's feature set, so
# the bit must live here too). Default-on for normal Rust-binary
# auto-register. Off when the consuming staticlib opts out to avoid
# duplicating linkme's DUPCHECK static in a multi-archive C-binary
# link (the canonical `libnros_rmw_zenoh.a` + `libnros_c.a` case).
linkme-register = ["nros-rmw-cffi/linkme-register"]
# RFC-0042 D3 / phase-241.D slice 4 — forwards to `nros-rmw-cffi/external-registry`
# so this backend's copy of the cffi rlib references `REGISTRY` as an undefined
# external instead of defining a duplicate. Threaded up from
# `nros-rmw-zenoh-staticlib` by the cmake link; off in the pure-Rust path.
external-registry = ["nros-rmw-cffi/external-registry"]
# Phase 129.C.3.a — `nros-platform/platform-<rtos>` forwards
# dropped. Phase 129.D retired `zpico-platform-shim`, which was
# the only consumer that needed `ConcretePlatform`. The two
# `now_ms()` callsites in `shim/{publisher,subscriber}.rs` now
# call the canonical `nros_platform_time_now_ms` C symbol
# directly; no Rust trait dispatch, no platform pin.
#
# Phase 214.G — forwards RESTORED for the canonical symbol-provider
# crate (`nros-platform/platform-<rtos>`). The retirement above only
# applied to `ConcretePlatform`; the alias TU compiled inside
# `zpico-sys` (`c/zpico/platform_aliases.c`, default-on via
# `zpico-sys/platform-aliases`) forwards every `_z_*` zenoh-pico
# symbol to the canonical `nros_platform_*` ABI, which means
# selecting `nros-rmw-zenoh/platform-posix` MUST also bring the C
# provider on the link line. Without the forward, the workspace test
# build links zpico-sys + the alias TU but no `nros_platform_*`
# definitions, surfacing as a wall of `undefined symbol:
# nros_platform_mutex_*` from rust-lld. See Track G in
# `docs/roadmap/phase-214-antipattern-audit-findings.md`.
platform-posix = ["zpico-sys/posix", "nros-platform/platform-posix"]
# Embedded targets keep `nros-platform/platform-<rtos>` opt-in —
# their providers live in C ports linked at the consumer's
# board / west / ninja site (Zephyr module, NuttX build system,
# FreeRTOS / ThreadX board build.rs), not in `nros-platform-cffi`.
platform-zephyr = ["zpico-sys/zephyr"]
platform-bare-metal = ["zpico-sys/bare-metal"]
platform-freertos = ["zpico-sys/freertos"]
platform-nuttx = ["zpico-sys/nuttx"]
platform-threadx = ["zpico-sys/threadx"]
# Phase 11 — AGX Orin SPE (Cortex-R5F). IVC link only, no TCP/UDP.
platform-orin-spe = ["zpico-sys/orin-spe", "zpico-sys/link-ivc"]
# Phase 128.E.1 — `link-tcp` / `link-udp-unicast` deleted (were
# no-op aliases pointing at `zpico-sys`'s always-on TCP / UDP
# compile). Consumers that still flipped them just stop. Real
# `link-*` features (`link-tls`, `link-custom`) keep their
# build-host gates.
link-tls = ["zpico-sys/link-tls"]
# Phase 115.B — runtime-pluggable user transport. Enables the
# `custom://` locator scheme; users register a `NrosTransportOps`
# vtable via `nros_rmw::set_custom_transport(...)` BEFORE opening
# the session.
link-custom = ["zpico-sys/link-custom"]
std = ["alloc", "zpico-sys/std", "nros-rmw/std", "log"]
alloc = ["nros-rmw/alloc"]
rtic = []
polling = []
sync-spin = ["nros-rmw/sync-spin"]
sync-critical-section = ["nros-rmw/sync-critical-section"]
ffi-sync = ["dep:critical-section"]
log = ["dep:log"]

# E2E safety protocol (CRC-32 + sequence tracking)
safety-e2e = ["nros-rmw/safety-e2e", "nros-rmw-cffi/safety-e2e"]

# Zero-copy receive via z_bytes_get_contiguous_view (unstable zenoh-pico API)
unstable-zenoh-api = ["zpico-sys/unstable-zenoh-api"]

# Phase 99.F — native slot lending for zero-copy publish.
# ZenohPublisher impls SlotLending; uses zpico_publish_with_attachment_aliased
# which calls z_bytes_from_static_buf (stable zenoh-pico API) instead of
# z_bytes_copy_from_buf, eliminating the user→backend memcpy. Attachment
# is still copied (small, fixed size). Forwards to nros-rmw/lending.
lending = ["nros-rmw/lending"]

# ROS edition (controls data keyexpr type hash format)
ros-humble = []
ros-iron = []

[dependencies]
nros-rmw = { version = "0.5.0", path = "../../core/nros-rmw", default-features = false }
# Phase 115.M.3 — vtable register entry (previously shipped from
# the retired `nros-rmw-zenoh-cffi` shim) now lives in this crate.
# `RustBackendAdapter` requires `nros-rmw-cffi`'s `alloc` feature
# unconditionally (it boxes every entity handle).
nros-rmw-cffi = { version = "0.5.0", path = "../../core/nros-rmw-cffi", default-features = false, features = ["alloc"] }
# Phase 128.B.1 — `#[distributed_slice]` for the RMW init section.
linkme = { version = "0.3", default-features = false }
nros-core = { workspace = true, default-features = false }
# Phase 108.C.zenoh.{2,3} — needs `<P as PlatformClock>::clock_ms()`
# for deadline / lifespan emulation. The façade crate gates the
# ConcretePlatform pick on the same feature flags as the rest of
# nros, so adding it here doesn't constrain platform selection.
nros-platform = { version = "0.5.0", path = "../../core/nros-platform", default-features = false }
zpico-sys = { version = "0.5.0", path = "../zpico-sys" }
heapless = { workspace = true }
portable-atomic = { version = "1", default-features = false }
atomic-waker = { version = "1.1", default-features = false, features = ["portable-atomic"] }
log = { workspace = true, optional = true }
critical-section = { version = "1.2", optional = true }

[dev-dependencies]
nros-ghost-types = { version = "0.5.0", path = "../../verification/nros-ghost-types" }
# Force `ConcretePlatform` resolution for tests under `platform-posix`.
# Workspace-context builds get this via feature unification from a board
# crate; standalone `cargo test` here doesn't.
nros-platform = { version = "0.5.0", path = "../../core/nros-platform", features = ["platform-posix"] }
# Phase 227.3(B) — the Rust shim is now platform-agnostic and the
# `--lib` unit-test binary references the zpico C-port symbols
# unconditionally. Pin the posix C port (threading / mutex / task
# symbols) for the standalone `cargo test` link, so a plain
# `cargo test -p nros-rmw-zenoh` (no `--features platform-posix`)
# links and runs the full unit suite. Workspace-context builds get
# this via feature unification from a board crate.
zpico-sys = { version = "0.5.0", path = "../zpico-sys", features = ["posix"] }

[lints]
workspace = true
