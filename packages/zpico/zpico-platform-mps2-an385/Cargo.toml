[package]
name = "zpico-platform-mps2-an385"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Zenoh-pico system primitives for QEMU MPS2-AN385 (no nros dependency)"

[lib]
name = "zpico_platform_mps2_an385"

[dependencies]
# Zenoh FFI bindings — bare-metal only, no C shims (Rust provides all symbols)
zpico-sys = { path = "../zpico-sys", features = ["bare-metal", "link-tcp"] }
# TCP link layer via smoltcp
zpico-smoltcp = { path = "../zpico-smoltcp" }
# LAN9118 Ethernet driver for QEMU MPS2-AN385
lan9118-smoltcp = { path = "../../drivers/lan9118-smoltcp" }

# Embedded dependencies
cortex-m = "0.7"
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }
