[package]
name = "zpico-sys"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "C shim library for zenoh-pico with FFI bindings"
links = "zpico"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["zenoh", "ffi", "embedded", "no-std", "sys"]
categories = ["embedded", "no-std", "external-ffi-bindings", "network-programming"]

[lib]
name = "zpico_sys"

[features]
# Phase 129.A.4 / 129.D — `platform-aliases` flipped default-on.
# The C alias TU (`platform_aliases.c`) now covers the full
# `z_*` / `_z_*` surface — memory, sleep, random, time, yield,
# threading, condvar, clock, network — that `zpico-platform-shim`
# used to provide. Enabling `platform-aliases` also enables
# `zpico-platform-shim?/provided-by-aliases`, which gates the
# entire shim module off so there are no duplicate-symbol
# collisions between the two emitters. Consumers that still
# want the Rust shim can pass `default-features = false`.
default = ["platform-aliases"]
# Platform backends (mutually exclusive)
#
# Phase 129.D — the C alias TU (`platform-aliases`, default-on)
# now provides every `z_*` / `_z_*` symbol that
# `zpico-platform-shim` used to emit. The per-platform features
# below are pure ABI markers — they no longer pull in the shim.
# Vendor zenoh-pico `system/<rtos>/system.c` is still
# stripped on the relevant platforms by `build.rs`; the alias
# TU + the consumer's `nros-platform-<rtos>` library satisfy
# every symbol.
posix = []
zephyr = []
bare-metal = []
freertos = []
nuttx = []
threadx = []
# Phase 100.6 — AGX Orin SPE (Cortex-R5F + FreeRTOS FSP). IVC-only:
# orin-spe pulls `zpico-link-ivc` (the carved-out IVC link-layer
# forwarders that used to live inside `zpico-platform-shim`).
# zenoh-pico's `src/system/freertos/system.c` provides clock /
# mutex / condvar / task / sleep / random / time / alloc
# natively via the FSP V10.4.3 FreeRTOS API, so `platform-aliases`
# is OFF for orin-spe to avoid double-define.
orin-spe = ["dep:zpico-link-ivc"]
# Phase 128.E.1 — `link-tcp`, `link-udp-unicast`, `link-udp-multicast`,
# `link-serial` features deleted. Vendor C sources for those four
# always compile in (`Z_FEATURE_LINK_TCP=1` etc.). The locator string
# at session-open picks at runtime which one runs. No external build
# dep involved, so always-on is safe on every target.
#
# `link-raweth`, `link-tls`, `link-ivc`, `link-custom` remain
# explicit because they pull in real build-host requirements
# (raw-socket cap, mbedTLS/OpenSSL, NVIDIA IVC headers, the custom
# transport crate).
link-raweth = []
link-tls = []
# Phase 128.D.3 — opt-in C aliasing TU that maps z_*/_z_get_time_*
# symbols to the canonical nros_platform_* ABI. Off by default;
# consumers that have linked nros-platform-cffi can drop the
# `zpico-platform-shim` rlib for these basic symbols by enabling
# `platform-aliases` here (then turning off
# `zpico-platform-shim`'s `active` feature for the alias subset).
# Threading + smoltcp + serial bridge symbols stay in the shim.
platform-aliases = []
# Phase 100.4 — NVIDIA Tegra IVC link transport (Orin SPE). Adds
# the carved-out `zpico-link-ivc` forwarders crate.
link-ivc = ["dep:zpico-link-ivc"]
# Phase 115.B — runtime-pluggable user transport via the
# `custom://` locator scheme. Compiles in `src/link/{config,unicast}/custom.c`
# from the zenoh-pico fork + force-links `zpico-platform-custom`'s
# `nros_zpico_custom_take` symbol.
link-custom = ["dep:zpico-platform-custom", "zpico-platform-custom?/active"]
# Use a pre-built zenoh-pico instead of building from the submodule.
# Set ZENOH_PICO_DIR to the CMake install prefix (must contain lib/libzenohpico.a
# and include/zenoh-pico.h). Only supported for native targets.
system-zenohpico = []
# Standard library support
std = []
# Enable Z_FEATURE_UNSTABLE_API in zenoh-pico (for z_bytes_get_contiguous_view)
unstable-zenoh-api = []

[dependencies]
# Phase 129.D — `zpico-platform-shim` dep removed. Symbols come
# from the C alias TU (`platform-aliases`, default-on).
# IVC link-layer forwarders moved into the carved-out
# `zpico-link-ivc` crate, pulled by the `link-ivc` feature.
zpico-link-ivc = { workspace = true, optional = true }
# Phase 115.B — Rust-side `nros_zpico_custom_take` extern that the
# C custom-link factory calls. Optional; only pulled in when
# `link-custom` is enabled.
zpico-platform-custom = { workspace = true, optional = true }

[build-dependencies]
cbindgen = "0.29"
cc = "1.0"
# Phase 136.5 — mbedTLS discovery moved off cmake's
# `pkg_check_modules` onto the `pkg-config` build crate. The
# `.pc`-file synthesizer fallback (Ubuntu's `libmbedtls-dev` ships
# no `.pc`) stays in build.rs.
pkg-config = "0.3"
# Phase 149.5 — manifest parser + link-feature policy lifted out of
# `zpico-sys/build/{manifest,policy}.rs` into the
# `nros-board-common` library so per-kernel generic board crates
# can share it. `nros-board-common` pulls in `serde` + `toml`
# transitively; no need to declare them here separately.
nros-board-common = { path = "../../boards/nros-board-common" }

[lints]
workspace = true
