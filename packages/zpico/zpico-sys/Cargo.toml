[package]
name = "zpico-sys"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "C shim library for zenoh-pico with FFI bindings"
links = "zpico"

[lints.rust]
# cbindgen sets cfg(cbindgen) when parsing - allow it without warnings
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(cbindgen)', 'cfg(zpico_backend, values("posix", "zephyr", "bare-metal", "freertos", "nuttx", "threadx"))'] }

[lib]
name = "zpico_sys"

[features]
default = []
# Platform backends (mutually exclusive)
# All platforms (except Zephyr) activate the shim to provide z_* symbols
# via nros-platform. The C library's system.c is excluded — only network.c is kept.
# Zephyr's platform code is compiled by Zephyr's CMake build system.
posix = ["dep:zpico-platform-shim", "zpico-platform-shim?/active"]
zephyr = []
bare-metal = ["dep:zpico-platform-shim", "zpico-platform-shim?/active", "zpico-platform-shim?/socket-stubs"]
freertos = []
nuttx = ["dep:zpico-platform-shim", "zpico-platform-shim?/active"]
threadx = ["dep:zpico-platform-shim", "zpico-platform-shim?/active", "zpico-platform-shim?/skip-task-symbols"]
# Protocol link features (bare-metal only — controls Z_FEATURE_LINK_* flags)
# Each feature enables the corresponding protocol code in zenoh-pico at compile time.
# Transport crates activate the features they implement; Cargo unifies them.
link-tcp = []
link-udp-unicast = []
link-udp-multicast = []
link-serial = []
link-raweth = []
link-tls = []
# Use a pre-built zenoh-pico instead of building from the submodule.
# Set ZENOH_PICO_DIR to the CMake install prefix (must contain lib/libzenohpico.a
# and include/zenoh-pico.h). Only supported for native targets.
system-zenohpico = []
# Standard library support
std = []
# Enable Z_FEATURE_UNSTABLE_API in zenoh-pico (for z_bytes_get_contiguous_view)
unstable-zenoh-api = []

[dependencies]
# Platform symbol forwarders (z_clock_now, z_malloc, etc.)
# Activated by any platform feature; actual ConcretePlatform resolved by
# the board crate's nros-platform-<board> dependency via Cargo feature unification.
zpico-platform-shim = { path = "../zpico-platform-shim", default-features = false, optional = true }

[build-dependencies]
cbindgen = "0.29"
cc = "1.0"
cmake = "0.1"
