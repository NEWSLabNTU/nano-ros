[package]
name = "zpico-sys"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "C shim library for zenoh-pico with FFI bindings"
links = "zpico"

[lib]
name = "zpico_sys"

[features]
default = []
# Platform backends (mutually exclusive)
# All platforms activate the shim to provide z_* symbols via nros-platform.
# The C library's system.c is excluded — only network.c is kept.
# Zephyr's platform code is compiled by Zephyr's CMake build system, but the
# shim (Rust staticlib) still gets linked into nros-c / nros-cpp / rust apps.
posix = ["dep:zpico-platform-shim", "zpico-platform-shim?/active", "zpico-platform-shim?/network"]
zephyr = ["dep:zpico-platform-shim", "zpico-platform-shim?/active", "zpico-platform-shim?/network"]
bare-metal = ["dep:zpico-platform-shim", "zpico-platform-shim?/active", "zpico-platform-shim?/network", "zpico-platform-shim?/network-smoltcp-bridge"]
freertos = ["dep:zpico-platform-shim", "zpico-platform-shim?/active", "zpico-platform-shim?/network"]
nuttx = ["dep:zpico-platform-shim", "zpico-platform-shim?/active", "zpico-platform-shim?/skip-clock-symbols", "zpico-platform-shim?/network"]
threadx = ["dep:zpico-platform-shim", "zpico-platform-shim?/active", "zpico-platform-shim?/skip-task-symbols", "zpico-platform-shim?/network"]
# Phase 100.6 — AGX Orin SPE (Cortex-R5F + FreeRTOS FSP). IVC-only:
# `active` for the Rust→C symbol forwarders, `link-ivc` for the IVC
# link-transport forwarders (Phase 100.4). NO `network` because the
# SPE has no TCP/UDP. The board crate must also enable
# `zpico-sys/link-ivc` to flip `Z_FEATURE_LINK_IVC=1` in the C build.
# Phase 11.3.B — orin-spe activates ONLY `link-ivc` on the shim.
# zenoh-pico's `src/system/freertos/system.c` provides clock / mutex /
# condvar / task / sleep / random / time / alloc natively via the FSP
# V10.4.3 FreeRTOS API. Activating `active` would double-define those
# symbols.
orin-spe = ["dep:zpico-platform-shim", "zpico-platform-shim?/link-ivc"]
# Protocol link features (bare-metal only — controls Z_FEATURE_LINK_* flags)
# Each feature enables the corresponding protocol code in zenoh-pico at compile time.
# Transport crates activate the features they implement; Cargo unifies them.
link-tcp = []
link-udp-unicast = []
link-udp-multicast = []
link-serial = []
link-raweth = []
link-tls = []
# Phase 100.4 — NVIDIA Tegra IVC link transport (Orin SPE). Selecting
# this feature also propagates `cargo:rustc-cfg=feature="link_ivc"` so
# zpico-platform-shim's `mod ivc_helpers` block compiles in.
link-ivc = []
# Phase 115.B — runtime-pluggable user transport via the
# `custom://` locator scheme. Compiles in `src/link/{config,unicast}/custom.c`
# from the zenoh-pico fork + force-links `zpico-platform-custom`'s
# `nros_zpico_custom_take` symbol.
link-custom = ["dep:zpico-platform-custom", "zpico-platform-custom?/active"]
# Use a pre-built zenoh-pico instead of building from the submodule.
# Set ZENOH_PICO_DIR to the CMake install prefix (must contain lib/libzenohpico.a
# and include/zenoh-pico.h). Only supported for native targets.
system-zenohpico = []
# Standard library support
std = []
# Enable Z_FEATURE_UNSTABLE_API in zenoh-pico (for z_bytes_get_contiguous_view)
unstable-zenoh-api = []

[dependencies]
# Platform symbol forwarders (z_clock_now, z_malloc, etc.)
# Activated by any platform feature; actual ConcretePlatform resolved by
# the board crate's nros-platform-<board> dependency via Cargo feature unification.
zpico-platform-shim = { version = "0.1.0", path = "../zpico-platform-shim", default-features = false, optional = true }
# Phase 115.B — Rust-side `nros_zpico_custom_take` extern that the
# C custom-link factory calls. Optional; only pulled in when
# `link-custom` is enabled.
zpico-platform-custom = { workspace = true, optional = true }

[build-dependencies]
cbindgen = "0.29"
cc = "1.0"
cmake = "0.1"

[lints]
workspace = true
