# cbindgen configuration for zpico-sys
# Generates c/include/zpico.h from src/ffi.rs

language = "C"
header = """/**
 * zpico-sys Public C API
 *
 * AUTO-GENERATED by cbindgen - DO NOT EDIT MANUALLY
 *
 * This header defines the high-level C API for zenoh-pico that can be
 * called from Rust FFI. It provides session management, publishers, and
 * subscribers with static storage.
 *
 * Platform-specific behavior (threading vs polling) is handled by the
 * backend interface in bare-metal/platform.h
 */
"""
include_guard = "ZPICO_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = false
no_includes = false

[defines]
# Note: We intentionally do NOT define "cbindgen" here.
# cbindgen automatically sets cfg(cbindgen)=true when parsing.
# By not mapping it to a C define, cbindgen filters items based on cfg
# rather than emitting C preprocessor guards.

[export.rename]
# Rename types if needed

[fn]
# Function configuration
rename_args = "None"

[struct]
rename_fields = "None"

[enum]
rename_variants = "None"

[parse]
parse_deps = false
# Don't emit extern "C" block declarations - we only want the stub functions
clean = true
# Only parse ffi.rs (not lib.rs which has the extern block imports)
include = ["ffi"]
# Exclude platform implementation modules
exclude = ["platform"]

[export]
# Exclude smoltcp platform FFI (provided by BSP bridge.rs or platform crates, not part of public API)
exclude = [
    "PollCallbackFn",
    "smoltcp_alloc",
    "smoltcp_realloc",
    "smoltcp_free",
    "smoltcp_random_u32",
    "smoltcp_set_clock_ms",
    "smoltcp_clock_now_ms",
    "smoltcp_set_poll_callback",
    "smoltcp_poll",
    "smoltcp_init",
    "smoltcp_cleanup",
    "smoltcp_socket_open",
    "smoltcp_socket_connect",
    "smoltcp_socket_is_connected",
    "smoltcp_socket_close",
    "smoltcp_socket_can_recv",
    "smoltcp_socket_can_send",
    "smoltcp_socket_recv",
    "smoltcp_socket_send",
    "smoltcp_socket_push_rx",
    "smoltcp_socket_pop_tx",
    "smoltcp_socket_get_remote",
    "smoltcp_socket_set_connected",
    "POLL_CALLBACK",
    "HEAP",
    "HEAP_POS",
    "RANDOM_STATE",
]
include = [
    # zpico API - Session lifecycle
    "zpico_init",
    "zpico_init_with_config",
    "zpico_property_t",
    "zpico_open",
    "zpico_is_open",
    "zpico_close",
    # zpico API - Publishers
    "zpico_declare_publisher",
    "zpico_publish",
    "zpico_publish_with_attachment",
    "zpico_undeclare_publisher",
    # zpico API - Subscribers
    "zpico_declare_subscriber",
    "zpico_undeclare_subscriber",
    # zpico API - Polling
    "zpico_poll",
    "zpico_spin_once",
    "zpico_uses_polling",
    # zpico API - ZenohId
    "zpico_get_zid",
    # zpico API - Liveliness
    "zpico_declare_liveliness",
    "zpico_undeclare_liveliness",
    # zpico API - Queryables (Services)
    "zpico_declare_queryable",
    "zpico_undeclare_queryable",
    "zpico_query_reply",
    # Types
    "ZpicoCallback",
    "ZpicoZeroCopyCallback",
    "ZpicoQueryCallback",
    # Constants (ZPICO_MAX_* are now passed via -D compiler flags from build.rs)
    "ZPICO_ZID_SIZE",
    "ZPICO_RMW_GID_SIZE",
    "ZPICO_OK",
    "ZPICO_ERR_GENERIC",
    "ZPICO_ERR_CONFIG",
    "ZPICO_ERR_SESSION",
    "ZPICO_ERR_TASK",
    "ZPICO_ERR_KEYEXPR",
    "ZPICO_ERR_FULL",
    "ZPICO_ERR_INVALID",
    "ZPICO_ERR_PUBLISH",
]
