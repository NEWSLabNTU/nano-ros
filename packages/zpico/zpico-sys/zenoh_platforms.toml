# Phase 136.1 / 136.4 — canonical zenoh-pico build manifest.
#
# build.rs reads this once. Cargo features select the platform.
# Per-platform blocks declare every datum the unified
# `build_zenoh_pico(plat: &ResolvedPlatform, target: &str, …)`
# consumer needs:
#   - `defines` / `defines_kv` / `defines_env` — preprocessor flags
#   - `include` — glob roots under `zenoh-pico/src/` for core sources
#   - `extra_sources` — additional .c files outside `zenoh-pico/src/`
#     (interpolated via `{nros}` / `{src}` / `{out}` / `{env:VAR}`)
#   - `required_env` — SDK paths the build needs, with help text
#     and optional sub-dir validation
#   - `include_paths` / `include_paths_conditional` — header search
#     paths (interpolated; gated by `target_match` / `target_not` /
#     `if_env`)
#   - `arch` — name of `[arch.*]` block to apply for target-arch
#     compiler flags
#   - `compile` — opt_level / warnings / extra cflags
#   - `pic` — `cc::Build::pic` override (NuttX flat builds)
#   - `link.*` — per-link-feature policy mask (Phase 134)
#
# Adding a new platform = one new `[platform.<name>]` block; no
# `build.rs` edits.

# ----------------------------------------------------------------
# Arch profiles — reusable target-arch compiler flag tables.
# ----------------------------------------------------------------

[arch.cortex-m3]
target_match = "thumbv7m"
target_exclude = "thumbv7em"
cflags = ["-mcpu=cortex-m3", "-mthumb"]

[arch.cortex-m4f]
target_match = "thumbv7em"
cflags = ["-mcpu=cortex-m4", "-mthumb", "-mfpu=fpv4-sp-d16", "-mfloat-abi=hard"]

[arch.cortex-a7]
target_match = "armv7a"
cflags = ["-march=armv7-a"]

[arch.cortex-r5-softfp]
# AGX Orin SPE — softfp + vfpv3-d16 matches the FSP's CFLAGS.
target_match = "armv7r"
cflags = [
  "-mcpu=cortex-r5", "-marm", "-mthumb-interwork",
  "-mfloat-abi=softfp", "-mfpu=vfpv3-d16",
]

[arch.riscv32imc]
target_match = "riscv32imc"
cflags = ["-march=rv32imc", "-mabi=ilp32"]
needs_picolibc = true
needs_errno_override = true
needs_riscv_compiler = true

[arch.riscv32gc]
target_match = "riscv32gc"
cflags = ["-march=rv32gc", "-mabi=ilp32d"]

[arch.riscv64gc]
target_match = "riscv64"
cflags = ["-march=rv64gc", "-mabi=lp64d", "-mcmodel=medany"]
needs_picolibc = true
needs_errno_override = true

# ----------------------------------------------------------------
# Platforms.
# ----------------------------------------------------------------

[platform.posix]
defines = ["ZENOH_GENERIC", "ZENOH_LINUX"]
# Phase 156 — `Z_FEATURE_MULTI_THREAD = 1` so
# `zp_start_read_task` / `zp_start_lease_task` actually spawn
# pthreads via `_z_task_init` (rather than returning -1
# unconditionally). POSIX always has pthreads available; the
# missing flag was leftover from an era where the alias TU
# was assumed to handle threading singleton-style. Other
# platforms (freertos-lwip / nuttx / threadx) already set
# it; POSIX should too.
defines_kv = { ZENOH_DEBUG = "0", Z_FEATURE_MULTI_THREAD = "1" }
include = ["system/common"]
exclude = ["tests", "example"]
extra_sources = [
  # Phase 156 option B — compile zenoh-pico's upstream
  # `system/unix/network.c` so the by-value socket TCP/UDP
  # impls (using `unix.h`'s `_z_sys_net_socket_t = { int _fd; }`
  # 4-byte struct) match the call-site ABI in `tx.c` /
  # `link.c`. The alias TU's 32-byte opaque network
  # functions are skipped on POSIX via the
  # `NROS_ZENOH_PLATFORM_USES_UNIX` macro defined from
  # `build.rs`. `unix/tls.c` already in extra_sources +
  # calls `_z_open_tcp` etc. — now resolves against the
  # native unix impls instead of the wrong-shape aliases.
  { path = "{src}/system/unix/network.c" },
  { path = "{src}/system/unix/tls.c" },
]
system_libs = ["pthread", "rt"]
mbedtls = "pkg-config"
# Phase 204.9 — POSIX zenoh-pico had no `compile` line, so it built
# with no per-fn/data sections (every embedded platform sets them).
# Add `-ffunction-sections`/`-fdata-sections` so a `--gc-sections`
# link (204.8) can strip the unused zenoh-pico surface.
compile = { opt_level = 2, warnings = false, cflags = ["-ffunction-sections", "-fdata-sections"] }
# Phase 154 — `nros-platform-api/include` carries
# `<nros/platform_net.h>` which the zpico.c TU pulls in for
# the multicast / UDP shim glue. Bare-metal already carries
# this path; POSIX was missing it, so `cargo build` on
# anything that consumes zpico-sys via cc-rs (e.g. the
# bridge examples) failed with "platform_net.h: No such
# file or directory". Phase 104.D.3.
include_paths = [
  "{nros}/../../core/nros-platform-api/include",
]

[platform.zephyr]
# Zephyr's build system compiles zenoh-pico itself; this block
# exists so the drift gate has a manifest entry but no cc-rs
# consumer hits it.
defines = ["ZENOH_GENERIC", "ZENOH_ZEPHYR"]
include = ["system/common", "system/zephyr"]

[platform.freertos-lwip]
defines = ["ZENOH_GENERIC", "ZENOH_FREERTOS_LWIP"]
# Phase 154 — `Z_FEATURE_LINK_UDP_MULTICAST = 0` disables the
# vendor `_z_close_udp_multicast` codepath in
# `system/freertos/lwip/network.c`, which has a vendor
# `sockrecv->socket` typo (the struct field is `_socket`).
# nano-ros doesn't use UDP multicast over zenoh-pico on
# FreeRTOS (router is TCP-only on this slirp path), so the
# feature loss is harmless and the typo stops mattering.
defines_kv = { ZENOH_DEBUG = "0", Z_FEATURE_MULTI_THREAD = "1", Z_FEATURE_LINK_UDP_MULTICAST = "0" }
# Phase 154 — pull vendor's FreeRTOS+lwIP `system/freertos/lwip`
# subtree + the top-level `system/freertos/system.c` so vendor's
# native `_z_send_tcp` / `_z_read_tcp` / `_z_task_*` / `_z_mutex_*`
# impls are compiled. Vendor's `system/common/platform.h`
# dispatch picks `platform/freertos/freertos_plus_tcp.h`
# (`{int _socket;}` struct) — having the matching network /
# system impls in the same TU set keeps caller / callee ABI
# coherent without needing the alias TU's opaque socket
# (alias TU is gated off for FreeRTOS in build.rs).
include = ["system/common", "system/freertos/lwip"]
extra_sources = [
  # Phase 154 — vendor `system/freertos/system.c` +
  # `system/freertos/lwip/network.c` provide the matching
  # `_z_sys_net_socket_t = { int _socket; }` ABI that the vendor
  # `src/link/unicast/tcp.c` caller expects. The alias TU's 32-byte
  # opaque socket would mismatch; vendor impls are the working
  # path. build.rs skips the alias TU entirely on FreeRTOS via
  # `if !use_freertos { ... alias_build.compile(...) }`.
  { path = "{src}/system/freertos/system.c" },
  { path = "{src}/system/freertos/lwip/network.c" },
  { path = "{nros}/c/zpico/zpico.c" },
]
arch = "cortex-m3"
compile = { opt_level = "s", warnings = false, cflags = ["-ffunction-sections", "-fdata-sections"] }
required_env = [
  { name = "FREERTOS_DIR", help = "FreeRTOS kernel source. just setup-freertos; export FREERTOS_DIR=$PWD/third-party/freertos/kernel", validate_subdir = "include" },
  { name = "FREERTOS_PORT", help = "FreeRTOS portable layer. Example: export FREERTOS_PORT=GCC/ARM_CM3" },
  { name = "LWIP_DIR", help = "lwIP source. just setup-freertos; export LWIP_DIR=$PWD/third-party/freertos/lwip", validate_subdir = "src/include" },
  { name = "FREERTOS_CONFIG_DIR", help = "Directory containing FreeRTOSConfig.h + lwipopts.h. Example: packages/boards/nros-board-mps2-an385-freertos/config" },
]
include_paths = [
  "{nros}/c/include",
  "{env:FREERTOS_DIR}/include",
  "{env:FREERTOS_DIR}/portable/{env:FREERTOS_PORT}",
  "{env:FREERTOS_CONFIG_DIR}",
  "{env:LWIP_DIR}/src/include",
  "{env:LWIP_DIR}/contrib/ports/freertos/include",
  # Phase 154 — `nros-platform-api/include` carries
  # `<nros/platform_net.h>` (the canonical `nros_platform_*` ABI).
  # `zpico.c` includes it unconditionally.
  "{nros}/../../core/nros-platform-api/include",
]
rerun_if_env_changed = ["FREERTOS_DIR", "FREERTOS_PORT", "LWIP_DIR", "FREERTOS_CONFIG_DIR"]

[platform.nuttx]
defines = ["ZENOH_GENERIC", "ZENOH_NUTTX"]
defines_kv = { ZENOH_DEBUG = "0", Z_FEATURE_MULTI_THREAD = "1", Z_CONFIG_SOCKET_TIMEOUT = "5000" }
include = ["system/common"]
# Phase 156 Sub-bug B (NuttX) — `system/common/platform.h` routes
# `ZENOH_NUTTX` to `system/platform/unix.h` (BY-VALUE 4-byte socket
# struct). Pull `system/unix/network.c` so the upstream
# `_z_open_tcp` / `_z_send_tcp` / `_z_read_tcp` impls (matching
# unix.h's shape) compile in. Paired with the
# `NROS_ZENOH_PLATFORM_USES_UNIX` macro set in `build.rs` which
# `#ifndef`-elides the alias TU's wrong-shape network section.
# `unix/tls.c` is `#if Z_FEATURE_LINK_TLS == 1`-gated, so it
# compiles to an empty TU on NuttX (no TLS feature flag set).
extra_sources = [
  { path = "{nros}/c/zpico/nuttx_clock.c" },
  { path = "{nros}/c/zpico/zpico.c" },
  { path = "{src}/system/unix/network.c" },
]
arch = "cortex-a7"
compile = { opt_level = "s", warnings = false, cflags = ["-ffunction-sections", "-fdata-sections"] }
pic = false
required_env = [
  { name = "NUTTX_DIR", help = "NuttX OS source. just setup-nuttx; export NUTTX_DIR=$PWD/third-party/nuttx/nuttx", validate_subdir = "include" },
]
include_paths = [
  "{nros}/c/include",
  "{env:NUTTX_DIR}/include",
  # Phase 154 — `<nros/platform_net.h>` source; same need as posix/
  # bare-metal/freertos-lwip blocks above.
  "{nros}/../../core/nros-platform-api/include",
]
rerun_if_env_changed = ["NUTTX_DIR"]

[platform.threadx]
# `NROS_PLATFORM_ALIASES` selects the 32-byte opaque socket / endpoint
# / task layouts from `nros_zenoh_generic_platform.h`. Must match the
# layout the alias TU (`platform_aliases.c`) is compiled with — without
# this define on the vendor build, `c/platform/zenoh_generic_platform.h`
# falls through to `threadx/platform.h` (`{ int _fd; }`, 4 bytes), and
# every `_z_send_tcp(*socket, ...)` call passes 4 bytes by value while
# the alias TU's wrapper expects a 32-byte struct → caller passes fd as
# the a0 register value, callee dereferences fd as a pointer → load
# access fault at `mtval = fd`. Phase 154 doc claimed this was set; the
# build.rs hookup was missing, fixed in zenoh_platforms.toml directly.
defines = [
  "ZENOH_GENERIC", "ZENOH_THREADX", "NROS_PLATFORM_ALIASES",
  "NX_BSD_ENABLE_NATIVE_API",
  "TX_INCLUDE_USER_DEFINE_FILE", "NX_INCLUDE_USER_DEFINE_FILE",
]
defines_kv = { Z_FEATURE_MULTI_THREAD = "1" }
defines_env = { ZENOH_DEBUG = { env = "NROS_ZENOH_DEBUG", default = "0" } }
include = ["system/common"]
extra_sources = [
  { path = "{nros}/c/platform/threadx/task.c" },
  { path = "{nros}/c/platform/threadx/log_uart.c", if_env = "NROS_ZPICO_LOG_TO_UART", with_define = ["ZENOH_LOG_PRINT", "zpico_log_print"] },
  { path = "{nros}/c/zpico/zpico.c" },
]
arch = "riscv64gc"
compile = { opt_level = "s", warnings = false, cflags = ["-ffunction-sections", "-fdata-sections"] }
required_env = [
  { name = "THREADX_DIR", help = "ThreadX kernel source. just setup-threadx; export THREADX_DIR=$PWD/third-party/threadx/kernel", validate_subdir = "common/inc" },
  { name = "THREADX_CONFIG_DIR", help = "Directory containing tx_user.h. Example: packages/boards/nros-board-threadx-linux/config" },
  { name = "NETX_DIR", help = "NetX Duo source. just setup-threadx; export NETX_DIR=$PWD/third-party/threadx/netxduo", validate_subdir = "common/inc" },
  { name = "NETX_CONFIG_DIR", help = "Directory containing nx_user.h. Example: packages/boards/nros-board-threadx-linux/config" },
]
include_paths = [
  "{nros}/c/platform",
  # Phase 154 — `c/zpico/` exposes `nros_zenoh_generic_platform.h`
  # (32-byte opaque socket / endpoint / task layouts the alias
  # TU uses). `c/platform/zenoh_generic_platform.h` `#include`s
  # it when `NROS_PLATFORM_ALIASES` is defined (now set on the
  # vendor build; see build.rs). Without `c/zpico` on the
  # include path the chain fails to resolve and vendor src
  # falls back to the small `threadx/platform.h` socket struct,
  # ABI-misaligning every `_z_send_tcp` / `_z_read_tcp` call
  # into the alias TU.
  "{nros}/c/zpico",
  # Phase 154 — `nros-platform-api/include` carries
  # `<nros/platform_net.h>` (the canonical `nros_platform_*`
  # ABI + the `nros_platform_socket_get_fd` accessor used by
  # `zpico.c::get_session_fd` to read peer fd without
  # depending on the per-RTOS socket-struct layout).
  "{nros}/../../core/nros-platform-api/include",
  "{nros}/c/include",
  "{env:THREADX_DIR}/common/inc",
  "{env:THREADX_CONFIG_DIR}",
  "{env:NETX_DIR}/common/inc",
  "{env:NETX_DIR}/addons/BSD",
  "{env:NETX_CONFIG_DIR}",
]
rerun_if_env_changed = [
  "THREADX_DIR", "THREADX_CONFIG_DIR",
  "NETX_DIR", "NETX_CONFIG_DIR",
  "NROS_ZPICO_LOG_TO_UART", "NROS_ZENOH_DEBUG",
]
[[platform.threadx.include_paths_conditional]]
path = "{env:THREADX_DIR}/ports/linux/gnu/inc"
when = { target_not = "embedded" }
[[platform.threadx.include_paths_conditional]]
path = "{env:THREADX_DIR}/ports/risc-v64/gnu/inc"
when = { target_match = "riscv64" }
[[platform.threadx.include_paths_conditional]]
path = "{env:NETX_DIR}/ports/linux/gnu/inc"
when = { target_not = "embedded" }

[platform.bare-metal]
# `ZPICO_SMOLTCP` activates the smoltcp branches inside `zpico.c`
# (clock via `smoltcp_clock_now_ms`, RX via `zp_read` single-read drain,
# init via `smoltcp_init`). Without it `zpico_spin_once` falls into the
# generic single-threaded `#else` that calls POSIX `select()` +
# `clock_gettime`, both unresolved at bare-metal link time. Phase 136.4
# (build_c_shim → build_zenoh_pico_unified manifest migration) dropped
# this define from the bare-metal path; the manifest had no opinion so
# `ZPICO_SMOLTCP` was simply not emitted. The legacy `ZPICO_NO_SMOLTCP`
# env-based opt-out (Phase 132) for hypothetical serial-only firmware
# is not wired through the manifest yet — restore here if such a board
# materialises.
defines = ["ZENOH_GENERIC", "ZPICO_SMOLTCP"]
defines_kv = { ZENOH_DEBUG = "0", Z_FEATURE_MULTI_THREAD = "0" }
include = ["system/common"]
extra_sources = [
  { path = "{nros}/c/zpico/zpico.c" },
]
# Phase 148: bare-metal spans cortex-m3 (qemu-arm-baremetal,
# stm32f4) AND riscv32imc (ESP32-C3). First arch whose `target_match`
# hits is applied — see build.rs::build_zenoh_pico_unified Step 3.
arch = ["cortex-m3", "riscv32imc"]
# Phase 204.9 — size build (`-Os`): zenoh-pico is the biggest vendor C blob
# on embedded; `-Os` saved ~8 KB .text on the bare-metal talker vs `-O2`.
compile = { opt_level = "s", warnings = false, cflags = ["-ffunction-sections", "-fdata-sections"] }
include_paths = [
  "{nros}/c/platform",
  "{nros}/c/include",
  # Phase 154 — `nros-platform-api/include` carries
  # `<nros/platform_net.h>` (the canonical `nros_platform_*` ABI +
  # `nros_platform_socket_get_fd` accessor). `zpico.c` includes it
  # unconditionally; without this on the bare-metal path
  # `cargo check` against any `examples/qemu-arm-baremetal/...`
  # example fails with `nros/platform_net.h: No such file or directory`.
  "{nros}/../../core/nros-platform-api/include",
]

[platform.generic]
defines = ["ZENOH_GENERIC"]
include = ["system/common"]

[platform.orin-spe]
inherits = "generic"
defines = ["ZENOH_GENERIC", "ZENOH_ORIN_SPE"]
defines_kv = { ZENOH_DEBUG = "0", Z_FEATURE_MULTI_THREAD = "1" }
extra_sources = [
  { path = "{src}/system/freertos/system.c" },
  { path = "{nros}/c/zpico/zpico.c" },
]
arch = "cortex-r5-softfp"
compile = { opt_level = "s", warnings = false, cflags = ["-ffunction-sections", "-fdata-sections"] }
link = { tcp = false, udp_unicast = false, udp_multicast = false, serial = false, tls = false, ws = false, bluetooth = false, raweth = false, ivc = "feature", custom = "feature" }
required_env = [
  { name = "NV_SPE_FSP_DIR", help = "Staged SPE FSP install. sentinel `just orin_spe-bsp-stage` produces this under external/spe-fsp/install/. Required for FreeRTOS.h, portmacro.h, FreeRTOSConfig.h", validate_subdir = "include/freertos" },
]
include_paths = [
  "{nros}/c/platform",
  "{nros}/c/include",
  "{env:NV_SPE_FSP_DIR}/include/freertos",
  "{env:NV_SPE_FSP_DIR}/include/freertos/portable/GCC/ARM_R5",
  "{env:NV_SPE_FSP_DIR}/include",
  # Phase 154 — `<nros/platform_net.h>` source.
  "{nros}/../../core/nros-platform-api/include",
]
rerun_if_env_changed = ["NV_SPE_FSP_DIR"]
