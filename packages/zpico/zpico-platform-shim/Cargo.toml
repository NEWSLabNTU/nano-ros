[package]
name = "zpico-platform-shim"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Thin forwarders from zenoh-pico C symbols to nros-platform traits"

[features]
default = ["std"]
std = ["nros-platform/std"]

# Platform backends (forwarded to nros-platform)
platform-posix = ["nros-platform/platform-posix"]
platform-cffi = ["nros-platform/platform-cffi"]

# Networking via smoltcp (bare-metal)
smoltcp = []

[dependencies]
nros-platform = { path = "../../core/nros-platform", default-features = false }
