[package]
name = "zpico-platform-shim"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Thin forwarders from zenoh-pico C symbols to nros-platform traits"

[features]
default = []

# Activates the shim symbols. Set by zpico-sys when a platform is selected.
# The actual ConcretePlatform resolution is handled by nros-platform's
# platform-* features, activated by the board crate via Cargo feature unification.
active = []

# Networking via smoltcp (bare-metal ethernet)
smoltcp = ["socket-stubs"]
# Provide _z_socket_* stubs (bare-metal only — RTOS network.c provides these)
socket-stubs = []
# Skip _z_task_* symbols (ThreadX provides them in C due to struct layout dependency)
skip-task-symbols = []
# Skip z_clock_* symbols (NuttX: zenoh-pico uses struct timespec clock type,
# which doesn't match the shim's usize-based signature; provide clock fns from
# a C file that operates on struct timespec directly).
skip-clock-symbols = []
# Provide network forwarders (_z_open_tcp etc. → PlatformTcp/PlatformUdp traits)
network = []

[dependencies]
nros-platform = { version = "0.1.0", path = "../../core/nros-platform", default-features = false }

[build-dependencies]
cc = "1"
