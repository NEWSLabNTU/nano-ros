[package]
name = "zpico-platform-shim"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Thin forwarders from zenoh-pico C symbols to nros-platform traits"

[features]
default = []

# Activates the shim symbols. Set by zpico-sys when a platform is selected.
# The actual ConcretePlatform resolution is handled by nros-platform's
# platform-* features, activated by the board crate via Cargo feature unification.
active = []

# Networking via smoltcp (bare-metal)
smoltcp = []

[dependencies]
nros-platform = { path = "../../core/nros-platform", default-features = false }
