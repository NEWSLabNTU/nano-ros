[package]
name = "zpico-platform-shim"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Thin forwarders from zenoh-pico C symbols to nros-platform traits"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["embedded", "zenoh", "platform", "no-std", "ffi"]
categories = ["embedded", "no-std"]

[features]
default = []

# Activates the shim symbols. Set by zpico-sys when a platform is selected.
# The actual ConcretePlatform resolution is handled by nros-platform's
# platform-* features, activated by the board crate via Cargo feature unification.
active = []
# Phase 129.D — set by `zpico-sys/platform-aliases` to suppress
# the shim's `z_*` / `_z_*` emitters when the C alias TU is
# providing the same symbols. Without the suppression the two
# collide at link time (`duplicate symbol: _z_open_tcp` etc).
provided-by-aliases = []

# Skip _z_task_* symbols (ThreadX provides them in C due to struct layout dependency)
skip-task-symbols = []
# Skip all _z_task_*, _z_mutex_*, and _z_condvar_* symbols when the platform C
# ABI uses concrete RTOS/POSIX layouts that the Rust shim must not model.
skip-threading-symbols = []
# Skip z_clock_* symbols (NuttX: zenoh-pico uses struct timespec clock type,
# which doesn't match the shim's usize-based signature; provide clock fns from
# a C file that operates on struct timespec directly).
skip-clock-symbols = []
# Skip z_time_* symbols for platforms whose wall-clock type is not a u64.
skip-time-symbols = []
# Provide network forwarders (_z_open_tcp etc. → PlatformTcp/PlatformUdp traits)
network = []
# Phase 100.4 / 121.10 — provide IVC forwarders (`_z_open_ivc` etc.)
# that call the `nvidia-ivc` driver crate directly. Activated
# automatically by zpico-sys's `cargo:rustc-cfg=feature="link_ivc"`
# when its own `link-ivc` feature is on; declared here so cargo
# recognises the cfg flag and the manifest can also activate the
# block directly.
link-ivc = ["dep:nvidia-ivc"]
# Provide smoltcp_init/cleanup/poll FFI (bare-metal only — calls nros-smoltcp)
network-smoltcp-bridge = ["network"]

[dependencies]
nros-platform = { version = "0.1.0", path = "../../core/nros-platform", default-features = false }
# Phase 121.10 — IVC forwarders call the driver crate directly. Optional
# so non-orin-spe builds don't pull the nvidia-ivc surface.
nvidia-ivc = { version = "0.1.0", path = "../../drivers/nvidia-ivc", default-features = false, optional = true }

[build-dependencies]
cc = "1"

[lints]
workspace = true
