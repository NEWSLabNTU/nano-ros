[package]
name = "zpico-platform-esp32-qemu"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Zenoh-pico system primitives for ESP32-C3 QEMU (no nros dependency)"

[lib]
name = "zpico_platform_esp32_qemu"

[dependencies]
# Zenoh FFI bindings — bare-metal only, no C shims (Rust provides all symbols)
zpico-sys = { path = "../zpico-sys", features = ["bare-metal", "link-tcp"] }
# Shared free-list allocator for z_malloc/z_free
zpico-alloc = { path = "../zpico-alloc" }
# TCP link layer via smoltcp
zpico-smoltcp = { path = "../zpico-smoltcp" }
# OpenCores Ethernet MAC driver (for QEMU open_eth NIC)
openeth-smoltcp = { path = "../../drivers/openeth-smoltcp" }

# ESP32-C3 HAL (for clock/timing)
esp-hal = { version = "~1.0.0", features = ["esp32c3", "unstable"] }

# Network stack
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }
