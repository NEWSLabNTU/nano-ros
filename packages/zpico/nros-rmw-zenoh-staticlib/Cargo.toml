[package]
name = "nros-rmw-zenoh-staticlib"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Standalone staticlib wrapper for nros-rmw-zenoh — emits libnros_rmw_zenoh_staticlib.a (Phase 123.A.1.x.4)"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
publish = false

# Phase 123.A.1.x.4.a — emit `libnros_rmw_zenoh_staticlib.a` containing
# the full `nros-rmw-zenoh` Rust dependency closure + zenoh-pico C
# sources + compiler_builtins. Lets the SDK ship the zenoh RMW
# backend as a separate archive that `NanoRos::NanoRos` links in
# alongside `libnros_c.a`, mirroring the existing
# `libnros_rmw_xrce.a` / `libnros_rmw_cyclonedds.a` split.
#
# A separate staticlib means a second copy of compiler_builtins is
# embedded. Downstream link uses `--allow-multiple-definition` (GNU
# ld / lld) to reconcile.
[lib]
crate-type = ["staticlib"]

[features]
default = []
# RFC-0042 D3 / phase-241.D slice 4 — forwards `external-registry` down to the cffi
# rlib so this staticlib references `REGISTRY` (the provider archive defines it once
# for the C/C++ link). Passed by the root `CMakeLists.txt` zenoh arm.
external-registry = ["nros-rmw-zenoh/external-registry"]
std = ["nros-rmw-zenoh/std"]
platform-posix = ["nros-rmw-zenoh/platform-posix", "nros-rmw-zenoh/std"]
platform-zephyr = ["nros-rmw-zenoh/platform-zephyr"]
alloc = ["nros-rmw-zenoh/alloc"]
platform-freertos = [
    "alloc",
    "nros-rmw-zenoh/platform-freertos",
    "dep:nros-platform",
    "nros-platform/platform-freertos",
    "nros-platform/global-allocator",
    "dep:panic-halt",
]
platform-nuttx = [
    "alloc",
    "nros-rmw-zenoh/platform-nuttx",
    "dep:nros-platform",
    "nros-platform/platform-nuttx",
    "nros-platform/global-allocator",
    "dep:panic-halt",
]
platform-threadx = [
    "alloc",
    "nros-rmw-zenoh/platform-threadx",
    "dep:nros-platform",
    "nros-platform/platform-threadx",
    "nros-platform/global-allocator",
    "dep:panic-halt",
]
platform-threadx-std = [
    "std",
    "nros-rmw-zenoh/platform-threadx",
    "dep:nros-platform",
    "nros-platform/platform-threadx",
    "nros-platform/global-allocator",
]
platform-bare-metal = ["nros-rmw-zenoh/platform-bare-metal"]
# Phase 128.E.1 — `link-tcp` / `link-udp-unicast` deleted on
# `nros-rmw-zenoh` (always-on in vendor build). Forwards
# stripped here too.
link-tls = ["nros-rmw-zenoh/link-tls"]
link-custom = ["nros-rmw-zenoh/link-custom"]
ros-humble = ["nros-rmw-zenoh/ros-humble"]
ros-iron = ["nros-rmw-zenoh/ros-iron"]

[dependencies]
nros-rmw-zenoh = { workspace = true, default-features = false }
nros-platform = { workspace = true, default-features = false, optional = true }
panic-halt = { workspace = true, optional = true }

[lints]
workspace = true
