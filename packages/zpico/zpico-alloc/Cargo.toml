[package]
name = "zpico-alloc"
version.workspace = true
publish = false
edition = "2024"
description = "Free-list allocator for zenoh-pico z_malloc/z_free on bare-metal"
license = "MIT OR Apache-2.0"
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["allocator", "bare-metal", "no-std", "embedded", "zenoh"]
categories = ["embedded", "no-std", "memory-management"]

[features]
default = []
## Track peak heap usage (adds two atomics per heap) and expose the reusable
## `HeapStats` counter for instrumenting the RTOS allocator wrappers.
stats = []
## Implement `GlobalAlloc` for `FreeListHeap` so a bare-metal board can opt in
## to using the free-list heap as the Rust `#[global_allocator]`, unifying the
## C (`z_malloc`) and Rust heaps. Off by default — never forces an allocator.
global-alloc = []

[lints]
workspace = true
