[package]
name = "zpico-serial"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Serial (UART) link layer for nros (bare-metal systems)"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["embedded", "uart", "serial", "zenoh", "no-std"]
categories = ["embedded", "no-std", "network-programming"]

[lib]
name = "zpico_serial"

[dependencies]
zpico-sys = { version = "0.1.0", path = "../zpico-sys", features = ["bare-metal", "link-serial"] }
