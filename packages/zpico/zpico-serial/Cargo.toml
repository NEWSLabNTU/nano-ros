[package]
name = "zpico-serial"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Serial (UART) link layer for nros (bare-metal systems)"
# Phase 121.7.f — literal authors/homepage/documentation instead
# of `workspace = true`. zpico-serial is consumed as a path-dep
# from example trees that live outside the nano-ros workspace
# (e.g. examples/qemu-arm-baremetal/...); cargo fails to resolve
# `workspace.package.X` inheritance when loading the manifest from
# the example's workspace context. Literal values match the
# workspace defaults; bump together if those ever change.
authors = ["Lin Hsiang-Jui <jerry73204@gmail.com>", "NEWSLabNTU"]
homepage = "https://github.com/NEWSLabNTU/nano-ros"
documentation = "https://docs.rs/zpico-serial"
readme = "README.md"
keywords = ["embedded", "uart", "serial", "zenoh", "no-std"]
categories = ["embedded", "no-std", "network-programming"]

[lib]
name = "zpico_serial"

[dependencies]
# Phase 128.E.1 — `link-serial` feature on zpico-sys was deleted
# (always-on now). Bare-metal platform feature alone is sufficient.
zpico-sys = { version = "0.5.0", path = "../zpico-sys", features = ["bare-metal"] }
