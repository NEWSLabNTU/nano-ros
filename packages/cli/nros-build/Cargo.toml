[package]
name = "nros-build"
version.workspace = true
publish = false
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Phase 212.N.4 — `build.rs`-friendly codegen library: launch XML + cargo-metadata → $OUT_DIR/run_plan.rs for nano-ros Entry pkgs."
homepage.workspace = true
documentation.workspace = true
keywords = ["ros2", "codegen", "build-script", "embedded"]
categories = ["development-tools::build-utils"]

[lib]
name = "nros_build"
path = "src/lib.rs"

[dependencies]
# nros-cli-core hosts the planner (orchestration::plan_system + the NrosPlan
# schema). `nros-build` re-uses it via library API rather than shelling out to
# `nros codegen-system` so the Entry pkg's `build.rs` does not need the
# binary on PATH at build time.
nros-cli-core = { path = "../nros-cli-core" }

eyre = "0.6"
serde.workspace = true
serde_json.workspace = true
# Phase 219.A — the `pkg_index` + `launch_parser` modules moved into
# `nros-cli-core`; this crate re-exports them (`lib.rs::pub use
# nros_cli_core::{pkg_index, launch_parser}`). The `walkdir`/`quick-xml`
# direct deps the modules used follow them to `nros-cli-core`.

[dev-dependencies]
tempfile = "3.10"
