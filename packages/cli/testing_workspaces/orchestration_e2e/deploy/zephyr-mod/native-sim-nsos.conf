# Native Sim Offloaded Sockets (NSOS) — uses the host kernel's BSD sockets
# instead of a TAP `zeth` device, so no bridge / net-setup.sh / root is needed
# and multiple instances coexist. Mirrors examples/zephyr/**/boards/
# native_sim_native_64.conf. Merged into the generated Zephyr app via the
# deploy's build[] `-DEXTRA_CONF_FILE={self}/native-sim-nsos.conf` (this is a
# board-specific overlay, kept out of the generated board-agnostic prj.conf).
CONFIG_ETH_NATIVE_POSIX=n
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y
