# Build + publish prebuilt `nros` host binaries (Phase 195.A).
#
# Triggered by an `nros-v*` tag (e.g. `nros-v0.2.0`) or manual dispatch. Produces
# one `nros-<host>.tar.zst` (+ `.sha256`) per host; `<host>` matches the CLI's
# own `SdkIndex::host_key()` (`<os>-<arch>`, aarch64→arm64) so nano-ros's
# `nros-sdk-index.toml` `[tool.nros].dist.<host>` can point straight at these
# Release assets. The `nros` binary is libc-only (no libpython): launch parsing
# shells out to the separate `play_launch_parser` tool, so the prebuilt is
# portable. (The Python wheel publish in `release.yml` is a separate product and
# is guarded off for `nros-v*` tags.)
name: Release nros binary

on:
  push:
    tags: ['nros-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.host }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux built on ubuntu-22.04 (glibc 2.35) for a broad runtime floor —
          # building on a newer runner pins a newer GLIBC ("GLIBC_2.xx not found"
          # on older hosts). musl-static was ruled out: a transitive dep compiles
          # C (cc-rs) and musl-tools doesn't ship the target-prefixed gcc.
          - host: linux-x86_64
            runner: ubuntu-22.04
          - host: linux-arm64
            runner: ubuntu-22.04-arm
          - host: macos-x86_64
            runner: macos-13
          - host: macos-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Build nros (release)
        run: cargo build --release --manifest-path packages/Cargo.toml -p nros-cli --bin nros

      - name: Package nros-${{ matrix.host }}.tar.zst
        run: |
          set -euo pipefail
          command -v zstd >/dev/null 2>&1 || {
            if [ "$RUNNER_OS" = "macOS" ]; then brew install zstd; else sudo apt-get update && sudo apt-get install -y zstd; fi
          }
          bindir="packages/target/release"
          strip "$bindir/nros" || true
          mkdir -p dist
          asset="nros-${{ matrix.host }}.tar.zst"
          tar -C "$bindir" -caf "dist/$asset" nros
          if command -v sha256sum >/dev/null 2>&1; then
            ( cd dist && sha256sum "$asset" > "$asset.sha256" )
          else
            ( cd dist && shasum -a 256 "$asset" > "$asset.sha256" )
          fi
          ls -l dist

      - name: Upload to the release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nros-${{ matrix.host }}.tar.zst
            dist/nros-${{ matrix.host }}.tar.zst.sha256

      - name: Upload as artifact (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: nros-${{ matrix.host }}
          path: dist/
