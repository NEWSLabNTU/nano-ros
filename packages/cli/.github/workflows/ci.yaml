---
name: CI

on:
  push:
    branches: ['main']
  pull_request:

# Rust CI for the nros-cli workspace. (Phase 195.A: nros-cli dropped colcon
# build support — the former Python/colcon `python-test` job + wheel workflows
# were removed. The CLI is a pure-Rust tool now.)
jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    # The Cargo workspace lives in packages/ (no root Cargo.toml — the repo is a
    # multi-dir layout). Run every cargo step there.
    defaults:
      run:
        working-directory: packages
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # path deps live in third-party/* submodules

      - name: Install stable toolchain (clippy/test/build)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Pin the rustfmt nightly — rustfmt's nightly-only options aren't stable
      # across nightlies, so bleeding-edge `@nightly` drifts vs the formatted
      # code. Bump in lockstep when reformatting.
      - name: Install nightly toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-19
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages

      # rustfmt.toml enables nightly-only options (imports_granularity,
      # format_code_in_doc_comments) — must check with nightly rustfmt.
      # Scope to first-party members via -p: `--all` also formats path-dep crates
      # (the vendored third-party/ros-launch-manifest submodule, which has its
      # own stable-fmt standard) — don't churn/gate on those.
      - name: cargo fmt --check (first-party)
        run: >
          cargo +nightly-2026-04-19 fmt
          -p rosidl-parser -p rosidl-codegen -p rosidl-bindgen -p cargo-nano-ros
          -p nros-cli-core -p nros-cli -p colcon-nano-ros
          -- --check

      # +stable explicitly: the nightly toolchain (installed for rustfmt) becomes
      # the rustup default, and it has no clippy component.
      - name: cargo clippy
        run: cargo +stable clippy --workspace -- -D warnings

      # --lib: unit tests only. The integration tests (tests/orchestration_e2e.rs)
      # generate workspaces that path-dep the nano-ros superproject's `nros` crate
      # + toolchains — they run in nano-ros CI, not in this standalone repo.
      - name: cargo test
        run: cargo +stable test --workspace --lib
