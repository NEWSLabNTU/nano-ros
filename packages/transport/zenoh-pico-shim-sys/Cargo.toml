[package]
name = "zenoh-pico-shim-sys"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "C shim library for zenoh-pico with FFI bindings"
links = "zenoh_shim"

[lints.rust]
# cbindgen sets cfg(cbindgen) when parsing - allow it without warnings
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(cbindgen)', 'cfg(shim_backend, values("posix", "zephyr", "smoltcp", "bare-metal"))'] }

[lib]
name = "zenoh_pico_shim_sys"

[features]
default = []
# Platform backends (mutually exclusive)
posix = []
zephyr = []
bare-metal = []
# Backwards-compatible alias: smoltcp implies bare-metal + TCP
smoltcp = ["bare-metal", "link-tcp"]
# Protocol link features (bare-metal only — controls Z_FEATURE_LINK_* flags)
# Each feature enables the corresponding protocol code in zenoh-pico at compile time.
# Transport crates activate the features they implement; Cargo unifies them.
link-tcp = []
link-udp-unicast = []
link-udp-multicast = []
link-serial = []
link-raweth = []
# Use a pre-built zenoh-pico instead of building from the submodule.
# Set ZENOH_PICO_DIR to the CMake install prefix (must contain lib/libzenohpico.a
# and include/zenoh-pico.h). Only supported for native targets.
system-zenohpico = []
# Include the default Rust platform implementation for smoltcp.
# BSP crates that provide their own bridge.rs should NOT enable this
# (they only need "smoltcp" for the C platform files).
smoltcp-platform-rust = ["smoltcp"]
# Standard library support
std = []

[dependencies]
# (none - all C code, no Rust deps)

[build-dependencies]
cbindgen = "0.29"
cc = "1.0"
cmake = "0.1"
