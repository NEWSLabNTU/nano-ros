[package]
name = "nano-ros-transport-zenoh"
version = "0.1.0"
edition = "2024"
description = "High-level Rust API for zenoh-pico transport (nano-ros)"
license = "Apache-2.0"
readme = "README.md"

[features]
default = []
# Platform backends (mutually exclusive)
posix = ["nano-ros-transport-zenoh-sys/posix"]
zephyr = ["nano-ros-transport-zenoh-sys/zephyr"]
bare-metal = ["nano-ros-transport-zenoh-sys/bare-metal"]
# Standard library support
std = ["alloc", "nano-ros-transport-zenoh-sys/std"]
# Allocator support (for String in ZenohId)
alloc = []

[dependencies]
# FFI bindings + C shim library
nano-ros-transport-zenoh-sys = { path = "../nano-ros-transport-zenoh-sys" }

[dev-dependencies]

[lib]
# Only rlib - staticlib requires panic_handler which is platform-specific
# The C shim is compiled via cc and linked automatically
crate-type = ["rlib"]
