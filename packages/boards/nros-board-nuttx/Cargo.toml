[package]
name = "nros-board-nuttx"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Generic NuttX board scaffolding for nano-ros (Phase 152.4 — overlay foundation)"
authors = ["nano-ros contributors"]
repository = "https://github.com/NEWSLabNTU/nano-ros"
keywords = ["nano-ros", "ros2", "nuttx", "embedded"]
categories = ["embedded", "hardware-support"]

[lib]
name = "nros_board_nuttx"

# Phase 152.4.A scaffolding — thin façade. NuttX owns the kernel
# build (the user's NuttX tree compiles ThreadX-equivalent task /
# socket / clock primitives via `apps/external/nano-ros/` + the
# Phase 152.7 `Make.defs` / `Makefile` / `Kconfig` shell). The
# Cargo side ships `Config` + `run` shape only; no `build.rs`
# bundles the kernel here.
[dependencies]
# 152.4.B — `BoardInit` trait used by the `run<B: BoardInit>`
# generic entry point.
nros-board-common = { path = "../nros-board-common" }
# Phase 212.N.2 — `run_entry::<B, _, _>` consumes the 212.N.1
# `BoardInit` / `RuntimeCtx` re-exports from the `nros-platform`
# crate root (the trait family lives at
# `packages/core/nros-platform/src/board/`). NuttX ships `std`, so
# `default-features = false` + explicit `["std"]` keeps the family
# driver from inheriting a `platform-*` selection — the Entry pkg
# pins the concrete platform.
nros-platform = { version = "0.1.0", path = "../../core/nros-platform", default-features = false, features = ["std"] }
# Phase 212.N.7 step-3.5 — Executor + ExecutorComponentRuntime so
# `run_entry` installs a live component runtime sink on `RuntimeCtx`
# before invoking the user `setup` closure + spins forever
# afterwards. NuttX ships `std`; the actual RMW backend
# (`nros-rmw-zenoh`, ...) must be linked by the per-board overlay
# (`nros-board-nuttx-qemu-arm`, ...) so `Executor::open` resolves a
# backend at boot.
nros = { path = "../../core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-nuttx"] }
nros-board-nuttx-qemu-arm = { path = "../nros-board-nuttx-qemu-arm", optional = true }

[features]
default = []
# Reference QEMU ARM virt (Cortex-A7 + virtio-net) configuration.
reference-qemu-arm = ["dep:nros-board-nuttx-qemu-arm"]
