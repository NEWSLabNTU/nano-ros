[package]
name = "nros-board-native"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Phase 212.N.3 — tier-1 per-board shim for hosted Linux/macOS, delegating to `nros-board-posix`."
publish = false

# Host-only shim. POSIX (Linux / macOS / BSD) hosts go through libstd,
# so no `no_std` attribute and no per-target gating — this crate's
# whole purpose is to expose a `NativeBoard` ZST that delegates every
# `Board*` trait method to the `nros-board-posix` family driver.

[dependencies]
# Phase 214.F.1 (Path B) — host-only shim. Every dep below activates
# `nros/std`, `nros/platform-posix`, or `nros-rmw-zenoh/platform-posix`
# on shared workspace crates. Workspace feature unification
# (resolver=2) leaks those activations into embedded targets unless
# we target-gate the whole `[dependencies]` block on
# `cfg(not(target_os = "none"))`. Under thumb/riscv-none cargo sees
# this crate as dep-less and skips it, so its feature flags drop out
# of the unified set.
[target.'cfg(not(target_os = "none"))'.dependencies]
# Trait surface (BoardEntry, BoardInit, BoardPrint, BoardExit, RuntimeCtx).
nros-platform = { version = "0.5.0", path = "../../core/nros-platform", default-features = false, features = ["std"] }
# Family driver this shim plugs.
nros-board-posix = { version = "0.5.0", path = "../nros-board-posix" }
# Phase 212.N.7 step-3.5 — link an RMW backend so the family-driver
# `Executor::open` call inside `PosixBoard::run` resolves a backend.
# Zenoh is the default native RMW; Entry pkgs that want a different
# backend can depend on `nros-board-posix` directly + pull their own
# `nros-rmw-*` crate.
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", features = ["platform-posix"] }
