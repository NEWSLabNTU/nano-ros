[workspace]

[package]
name = "nros-nuttx-ffi"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX kernel + nros C/C++ FFI bundle for CMake-built examples"

[dependencies]
# Phase 144.6 — relocated under packages/boards/nros-board-nuttx-qemu-arm/.
# Path deps go up 3 levels to the repo root (was 4 under
# examples/qemu-arm-nuttx/cmake/).
nros-board-nuttx-qemu-arm = { path = ".." }
nros-c = { path = "../../../core/nros-c", features = [
    "std", "cffi-zenoh-cffi", "platform-nuttx", "ros-humble"
] }
nros-cpp = { path = "../../../core/nros-cpp", features = [
    "std", "rmw-zenoh-cffi", "platform-nuttx", "ros-humble"
] }
# Phase 115.L.x — link cffi shim directly so `register()` is callable
# from main.rs before app_main() jumps into C/C++ code.
nros-rmw-zenoh = { path = "../../../zpico/nros-rmw-zenoh", features = ["platform-nuttx", "ros-humble"] }

[build-dependencies]
# Phase 221.A.3 — NuttX FFI build helper; pulls repo path
# resolution through nros-board-common's build-helper feature.
nros-board-common = { path = "../../nros-board-common", features = ["build-helpers"] }

[profile.release]
opt-level = "s"
lto = true
