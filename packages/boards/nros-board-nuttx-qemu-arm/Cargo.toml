# Phase 212.N.3 — empty `[workspace]` marker. The outer workspace's
# `exclude = [...]` already lists this package so it builds
# standalone (cf. `nros-board-zephyr`); the empty marker makes
# `cargo check --offline` from this dir resolve to this package as
# its own workspace root, which matters when the workspace `Cargo.toml`
# isn't an ancestor (e.g. cargo invoked from a git worktree nested
# under `.claude/worktrees/`).
[workspace]

[package]
name = "nros-board-nuttx-qemu-arm"
version = "0.4.0"
publish = false
edition = "2024"
license = "MIT OR Apache-2.0"
description = "NuttX QEMU ARM virt board crate for nros (Cortex-A7 + virtio-net)"

[lib]
name = "nros_board_nuttx_qemu_arm"

[dependencies]
# No platform crate needed — NuttX is POSIX-compatible, zenoh-pico reuses unix/ platform.
# No smoltcp/lwIP needed — NuttX has built-in BSD sockets.
# No custom Ethernet driver — NuttX has virtio-net built into the kernel.
# Phase 152.4.B — implements `nros_board_common::BoardInit` so the
# `nros_board_nuttx` generic crate can drive boot via the
# `run_generic<B: BoardInit>` shim.
nros-board-common = { path = "../nros-board-common" }
# Phase 212.N.3 — implements the new platform-level board trait
# family (`nros_platform::{BoardInit, BoardPrint, BoardExit,
# BoardEntry}`) so the per-board ZST can plug directly into
# `nros_board_nuttx::run_entry::<Self, _, _>` from a codegen-emitted
# Entry pkg `main.rs`.
nros-platform = { path = "../../core/nros-platform", default-features = false }
# Phase 212.N.3 — `BoardEntry::run` delegates to the NuttX family
# driver's `run_entry`. We do NOT enable `reference-qemu-arm` here:
# that feature flag pulls `nros-board-nuttx-qemu-arm` as an optional
# dep of `nros-board-nuttx`, which IS this crate — cargo flags it as
# a cyclic package dependency. The `run_entry` symbol is also gated
# `target_os = "nuttx"`, which is the gate we rely on (matched by the
# `BoardEntry` impl below).
nros-board-nuttx = { path = "../nros-board-nuttx" }

[features]
# Forward to the generic NuttX board's explicit zenoh-backend registration
# (its `run_entry` calls `nros_rmw_zenoh::register()` under this feature).
rmw-zenoh = ["nros-board-nuttx/rmw-zenoh"]

[build-dependencies]
# 194.3c.2 — the NuttX platform-port compile moved to the shared
# nros-board-common build helper (pulls cc + repo-path resolution via its
# build-helpers feature); the board no longer drives cc-rs directly.
nros-board-common = { path = "../nros-board-common" }
