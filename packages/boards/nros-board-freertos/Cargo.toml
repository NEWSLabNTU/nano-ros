[package]
name = "nros-board-freertos"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Generic FreeRTOS + lwIP board scaffolding for nano-ros (Phase 152.1 ‚Äî overlay foundation)"
authors = ["nano-ros contributors"]
repository = "https://github.com/NEWSLabNTU/nano-ros"
keywords = ["nano-ros", "ros2", "freertos", "lwip", "embedded"]
categories = ["embedded", "no-std", "hardware-support"]

[lib]
name = "nros_board_freertos"

# Phase 152.1.A scaffolding ‚Äî re-exports the existing
# `nros-board-mps2-an385-freertos` `Config` + `run` shape until
# 152.1.B carves the kernel + lwIP build glue out of the per-board
# build.rs into this crate's own build.rs. Overlay crates depend on
# this crate today and get the same surface; the build-glue
# refactor happens transparently.
[dependencies]
# #191 ‚Äî `log` sink for the entry runtime: node components emit their e2e
# markers (`Publishing:` / `I heard:`) via `log::info!`; without a board
# `log::Log` backend every record is dropped and the harness counts zero
# delivery on lanes that actually work. Mirrors the threadx board's
# `install_uart_logger` wiring.
log = { version = "0.4", default-features = false }
# 152.1.B.5 ‚Äî `BoardInit` / `BoardPrint` / `BoardExit` traits the
# generic `run<B>` is generic over. Trait-only surface; no
# build-script transitive deps pulled.
nros-board-common = { path = "../nros-board-common", default-features = false }
nros-board-mps2-an385-freertos = { path = "../nros-board-mps2-an385-freertos", default-features = false, optional = true }
# Phase 173.5 ‚Äî `TransportConfig` trait the generator writes nros.toml
# `[[transport]]` IP into. Trait-only; no_std, default-features off.
# Phase 248 C5c-platform (#60 T3, RFC-0031 platform amendment) ‚Äî the FreeRTOS
# family driver brings the `platform-freertos` impl DIRECTLY (pulls
# `nros-platform-cffi`; the canonical `nros_platform_*` C symbols come from the
# FreeRTOS C port compiled by the per-board overlay's `build.rs`). Board-driven
# platform selection: the umbrella `nros` dep below stays platform-agnostic.
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-freertos"] }
# Phase 212.N.7 step-3.5 ‚Äî Executor + ExecutorComponentRuntime so
# the app task inside `run_entry` installs a live component runtime
# sink on `RuntimeCtx` before invoking the user `setup` closure +
# drops into a spin loop afterwards. `rmw-cffi` pulls the backend
# registry; the actual RMW backend (`nros-rmw-zenoh`, ...) must be
# linked by the per-board crate (`nros-board-mps2-an385-freertos`,
# etc.) so `Executor::open` resolves a backend at boot.
# Phase 248 C5c-platform ‚Äî `nros` stays platform-agnostic; `platform-freertos`
# comes from this crate's direct `nros-platform` dep.
nros = { path = "../../core/nros", default-features = false, features = ["alloc", "rmw-cffi"] }
# Phase 248 C5a (#60 T4) ‚Äî the BOARD is the RMW selection point. Depend on the
# concrete zenoh backend directly (optional, behind `rmw-zenoh`) instead of
# forwarding `nros/rmw-zenoh`, and register it explicitly in the boot path
# (`freertos_boot_bringup` / `app_task_entry`). FreeRTOS is `target_os = "none"`
# (linkme-blind + no `.init_array` walk), so the gated `register()` call ‚Äî not a
# `#[used]` static ‚Äî is the correct mechanism (mirrors `nros-board-nuttx`).
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "platform-freertos",
    "ros-humble",
], optional = true }

[build-dependencies]
# 152.1.B.4 ‚Äî generic build.rs compiles FreeRTOS kernel + lwIP +
# nros-platform-freertos + the board-agnostic glue (freertos_hooks +
# network_glue). Overlays' build.rs only need to handle their own
# driver + linker script + libc discovery.
cc = "1.0"

[features]
default = []
# Convenience feature for downstream overlays that want the
# existing reference-board glue without naming the underlying
# crate. Will become unnecessary once 152.1.B finishes.
reference-mps2 = ["dep:nros-board-mps2-an385-freertos"]

# 152.1.B.5 ‚Äî when an overlay forwards its own `rmw-zenoh`
# feature here, the generic `run<B>`'s `app_task_entry` calls
# `zpico_set_task_config` to tune zenoh-pico's read/lease
# task priorities from `Config`. DDS-only builds leave it
# off and reach the linker without the FFI call.
#
# Issue #48 (historical) ‚Äî the Rust CFFI backend crate `nros-rmw-zenoh`
# (the bridge that registers the zenoh-pico vtable into `nros-rmw-cffi`)
# must be linked. Without it the firmware links only the generic vtable
# shim + the zenoh-pico C transport (`zpico-sys`), no backend registers,
# and `Executor::open` fails with `Transport(ConnectionFailed)`
# (resolve_backend ‚Üí NoBackend). It used to be pulled via `nros/rmw-zenoh`;
# Phase 248 C5a links it directly (see below).
#
# Phase 248 C5a (#60 T4) ‚Äî board-owned RMW selection: link the concrete
# `nros-rmw-zenoh` backend directly (was `nros/rmw-zenoh`) and register it in
# the boot path (`freertos_boot_bringup` / `app_task_entry`) so the board no
# longer relies on `nros::__register_linked_rmw()` (`nros/rmw-zenoh`). Lets the
# board link+register zenoh WITHOUT forwarding the umbrella feature.
rmw-zenoh = ["dep:nros-rmw-zenoh"]
# Phase 252 (issue 0072) ‚Äî forward a declared [safety] axis to the zenoh backend's
# safety-e2e (CRC attach/validate); `?` keeps it inert without rmw-zenoh. Re-exported
# by the per-board overlay (nros-board-mps2-an385-freertos) the descriptor names.
safety-e2e = ["nros-rmw-zenoh?/safety-e2e"]
