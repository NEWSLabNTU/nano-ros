[package]
name = "nros-esp32"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ESP32-C3 WiFi board crate for nros (simplified node API)"

[lib]
name = "nros_esp32"

[dependencies]
# Platform primitives (zenoh-pico FFI symbols, network poll callback)
zpico-platform-esp32 = { path = "../../zpico/zpico-platform-esp32" }

# Zenoh FFI bindings
zpico-sys = { path = "../../zpico/zpico-sys", features = ["bare-metal", "link-tcp"] }
# TCP link layer via smoltcp
zpico-smoltcp = { path = "../../zpico/zpico-smoltcp" }

# ESP32-C3 HAL and support crates
esp-hal = { version = "~1.0.0", features = ["esp32c3", "unstable"] }
esp-backtrace = { version = "~0.18.0", features = ["esp32c3", "panic-handler", "println"] }
esp-bootloader-esp-idf = { version = "~0.4.0", features = ["esp32c3"] }
esp-println = { version = "~0.16.0", features = ["esp32c3"] }
esp-alloc = { version = "~0.9.0" }

# WiFi support (esp-wifi split into esp-radio + esp-rtos in 1.0 ecosystem)
esp-rtos = { version = "~0.2.0", features = ["esp32c3", "esp-radio"] }
esp-radio = { version = "~0.17.0", features = ["esp32c3", "wifi", "smoltcp", "unstable"] }

# Network stack (version must match esp-radio's smoltcp dependency)
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-dhcpv4",
    "proto-dhcpv4",
] }

# Core types (RosMessage, CDR serialization)
nros-core = { path = "../../core/nros-core", default-features = false }

# Heapless collections (for keyexpr formatting)
heapless = "0.8"

# Atomics for riscv32imc (no hardware atomic support)
# unsafe-assume-single-core is safe because ESP32-C3 is single-core
portable-atomic = { version = "1", default-features = false, features = ["unsafe-assume-single-core"] }

# Critical section for safe interior mutability in statics
critical-section = "1"

[features]
default = []
