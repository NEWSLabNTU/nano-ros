[package]
name = "nros-board-esp32-qemu"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ESP32-C3 QEMU board crate for nros (platform init + run() entry point)"

[lib]
name = "nros_board_esp32_qemu"

[dependencies]
# Phase 173.1 — Board super-trait + the generic direct-exec `run`.
nros-board-common = { path = "../nros-board-common", default-features = false }
# Unified platform primitives (clock, memory, random, sleep, libc stubs)
nros-platform-esp32-qemu = { path = "../../platforms/nros-platform-esp32-qemu" }
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-esp32-qemu"] }
# Phase 97.3.esp32-qemu — `smoltcp_clock_now_ms` extern shim needs the
# trait import. Only used inside the cfg-gated forwarder in lib.rs.
nros-platform-api = { path = "../../core/nros-platform-api" }
# Phase 129.D — `zpico-platform-shim` retired. zenoh-pico `z_*`
# symbols come from `zpico-sys`'s default-on `platform-aliases`
# alias TU when `rmw-zenoh` is active.

# Phase 225.O — real-runtime `BoardEntry` shim (`board_entry.rs`) opens an
# `Executor` + `ExecutorNodeRuntime` so `nros::main!(launch = …)` can
# register the launch node set against a live RMW session. Mirrors the
# single-node esp32 example's `nros` + `nros-rmw-zenoh` deps; both are
# gated behind the default `rmw-zenoh` feature so a serial-only / no-RMW
# build of this board crate stays lean.
nros = { path = "../../core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "platform-bare-metal",
    "ros-humble",
], optional = true }
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "linkme-register",
    "platform-bare-metal",
    "ros-humble",
], optional = true }

# smoltcp network provider (ethernet only)
nros-smoltcp = { path = "../../drivers/nros-smoltcp", optional = true }
# OpenCores Ethernet MAC driver (for QEMU open_eth NIC, ethernet only)
openeth-smoltcp = { path = "../../drivers/openeth-smoltcp", optional = true }
# Network stack (ethernet only)
smoltcp = { version = "0.12", default-features = false, optional = true, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-udp",
    # Phase 97.3.esp32-qemu — IGMP / multicast group join for RTPS
    # SPDP `239.255.0.1:7400+`. Same as the MPS2-AN385 slice.
    "multicast",
] }

# ESP32-C3 HAL and support crates
esp-hal = { version = "~1.0.0", features = ["esp32c3", "unstable"] }
esp-backtrace = { version = "~0.18.0", features = ["esp32c3", "panic-handler", "println"] }
esp-bootloader-esp-idf = { version = "~0.4.0", features = ["esp32c3"] }
esp-println = { version = "~0.16.0", features = ["esp32c3"] }
esp-alloc = { version = "~0.9.0" }

# Atomics for riscv32imc (no hardware atomic support)
portable-atomic = { version = "1", default-features = false, features = ["unsafe-assume-single-core"] }

[features]
default = ["ethernet", "rmw-zenoh"]
# Phase 129.D — `rmw-zenoh` is now a pure marker. Symbols come
# from `zpico-sys`'s default-on `platform-aliases` C TU, which
# the consumer pulls in transitively via `nros-rmw-zenoh`.
# Phase 225.O — additionally pulls the real-runtime `BoardEntry`
# shim deps (`nros` + `nros-rmw-zenoh`) so the workspace Entry macro
# can open an executor and register the launch node set.
rmw-zenoh = ["dep:nros", "dep:nros-rmw-zenoh"]
# Ethernet transport via OpenETH + smoltcp
ethernet = ["dep:nros-smoltcp", "dep:openeth-smoltcp", "dep:smoltcp"]
# Serial transport via zenoh-pico built-in serial (no additional deps)
serial = []
# Phase 97.3.esp32-qemu — DDS / DDS heap budget (256 KB). Off
# by default; DDS example crates pull in via `features = ["dds-heap"]`.
dds-heap = ["nros-platform-esp32-qemu/dds-heap"]
