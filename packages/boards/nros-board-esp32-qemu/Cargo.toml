[package]
name = "nros-board-esp32-qemu"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ESP32-C3 QEMU board crate for nros (platform init + run() entry point)"

[lib]
name = "nros_board_esp32_qemu"

[dependencies]
# Unified platform primitives (clock, memory, random, sleep, libc stubs)
nros-platform-esp32-qemu = { path = "../../platforms/nros-platform-esp32-qemu" }
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-esp32-qemu"] }
zpico-platform-shim = { path = "../../zpico/zpico-platform-shim", default-features = false, features = ["active"] }

# smoltcp network provider (ethernet only)
nros-smoltcp = { path = "../../drivers/nros-smoltcp", optional = true }
# OpenCores Ethernet MAC driver (for QEMU open_eth NIC, ethernet only)
openeth-smoltcp = { path = "../../drivers/openeth-smoltcp", optional = true }
# Network stack (ethernet only)
smoltcp = { version = "0.12", default-features = false, optional = true, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-udp",
] }

# ESP32-C3 HAL and support crates
esp-hal = { version = "~1.0.0", features = ["esp32c3", "unstable"] }
esp-backtrace = { version = "~0.18.0", features = ["esp32c3", "panic-handler", "println"] }
esp-bootloader-esp-idf = { version = "~0.4.0", features = ["esp32c3"] }
esp-println = { version = "~0.16.0", features = ["esp32c3"] }
esp-alloc = { version = "~0.9.0" }

# Atomics for riscv32imc (no hardware atomic support)
portable-atomic = { version = "1", default-features = false, features = ["unsafe-assume-single-core"] }

[features]
default = ["ethernet"]
# Ethernet transport via OpenETH + smoltcp
ethernet = ["dep:nros-smoltcp", "dep:openeth-smoltcp", "dep:smoltcp"]
# Serial transport via zenoh-pico built-in serial (no additional deps)
serial = []
