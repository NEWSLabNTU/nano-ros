# Phase 195.C — board profile descriptor for Zephyr (zephyr-lang-rust staticlib).
# Crate-less: the generated package depends on the `zephyr` crate (emitted by the
# CLI's per-platform extra-deps path); kernel / RMW / nros C runtime link at the
# CMake layer via `rust_cargo_application()`.

[[board]]
names = ["zephyr"]
platform = "zephyr"
toolchain = "stable"
platform_feature = "platform-zephyr"
local_aliases = ["platform-zephyr"]
link_kind = "none"
entry_kind = "zephyr-staticlib"
net_stack = "rtos-owned"

# RFC-0042 D2 / phase-241 wave C — declared capabilities (SSoT). Zephyr heap +
# mutex are Kconfig-gated (CONFIG_HEAP_MEM_POOL_SIZE / CONFIG_MULTITHREADING);
# declared true, lowered to prj.conf (not -D) by C.2.
[board.capabilities]
heap = true
atomics = true
threads = true
