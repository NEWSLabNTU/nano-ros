[package]
name = "nros-board-common"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Shared build-script helpers for nano-ros board crates (manifest parser + link-feature policy)"
authors = ["nano-ros contributors"]
repository = "https://github.com/NEWSLabNTU/peripherals"
keywords = ["nano-ros", "build", "manifest", "policy", "no-std"]
categories = ["development-tools::build-utils"]

[lib]
name = "nros_board_common"

# Phase 152.5 — common build-script library shared between
# `zpico-sys` (Phase 136) and the per-kernel generic board crates
# (`nros-board-{freertos, threadx, nuttx}`). Consumers add this as
# a `[build-dependencies]` path dep + import the `manifest` /
# `policy` modules from their own `build.rs`. Not a runtime
# dependency — never reaches the final binary.

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
# 152.2.B — `threadx_sources::add_threadx_kernel_sources` /
# `_add_threadx_port_sources` take `&mut cc::Build`. The cc crate
# is also a build-time-only dep but a regular `[dependencies]`
# entry is fine since `nros-board-common` itself is only ever
# pulled by other crates' `[build-dependencies]` (never reaches a
# runtime binary).
cc = "1.0"
