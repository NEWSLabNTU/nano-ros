[package]
name = "nros-board-common"
version.workspace = true
publish = false
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Shared helpers for nano-ros board crates (BoardInit trait + manifest parser + link-feature policy)"
authors = ["nano-ros contributors"]
repository = "https://github.com/NEWSLabNTU/peripherals"
keywords = ["nano-ros", "build", "manifest", "policy", "no-std"]
categories = ["development-tools::build-utils", "no-std"]

[lib]
name = "nros_board_common"

# Phase 152.5 — common library shared between `zpico-sys`
# (Phase 136) and the per-kernel generic board crates
# (`nros-board-{freertos, threadx, nuttx}`). Most consumers pull
# this from `[build-dependencies]` for the `manifest` / `policy`
# modules. The `BoardInit` trait (Phase 152.4.B) is no_std + zero-
# dep, suitable for runtime use under `default-features = false`.

[dependencies]
serde = { version = "1", features = ["derive"], optional = true }
toml = { version = "0.8", optional = true }
# 152.2.B — `threadx_sources::add_threadx_kernel_sources` /
# `_add_threadx_port_sources` take `&mut cc::Build`. cc-rs is
# build-host only; gating it behind a feature lets runtime
# consumers (e.g. `nros-board-orin-spe`'s `BoardInit` impl
# linked into bare-metal armv7r firmware) drop it cleanly via
# `default-features = false`.
cc = { version = "1.0", optional = true }
# Phase 208.B Track A — repo-relative path resolver consumed by
# `threadx_sources` (replaces the `direnv allow`-only env vars).
nros-build-paths = { path = "../../core/nros-build-paths", optional = true }

[features]
# `BoardInit` trait is always available (no deps) and no_std. This crate is
# `categories = ["no-std"]`, so the DEFAULT is no_std: NO build-helpers, no
# serde/toml/cc. Consumers that need the manifest parser / policy / source
# helpers from a `build.rs` opt in explicitly with `features = ["build-helpers"]`
# on their `[build-dependencies]` edge — so a forgotten flag fails toward no_std
# instead of silently pulling `std` into an embedded build (issue 0077).
default = []

# Pull the manifest parser + link-feature policy + ThreadX
# source helpers. Pulls serde + toml + cc transitively. Required
# for crates that use these from a `build.rs`.
build-helpers = ["dep:serde", "dep:toml", "dep:cc", "dep:nros-build-paths"]
