[package]
name = "nros-board-mps2-an385-freertos"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 board crate for nros on FreeRTOS + lwIP"

[lib]
name = "nros_board_mps2_an385_freertos"

[dependencies]
# Phase 152.1.B.4 â€” generic FreeRTOS+lwIP+nros-platform-freertos
# build glue lives in nros-board-freertos. Depending on it ensures
# its `build.rs` runs first + its `cargo:rustc-link-lib=static=...`
# lines propagate to the final binary.
nros-board-freertos = { path = "../nros-board-freertos" }
# Phase 129.D â€” `zpico-platform-shim` retired. `zpico-sys`'s
# default-on `platform-aliases` C TU emits every `z_*` / `_z_*`
# symbol zenoh-pico needs; DDS-only builds drop `zpico-sys`
# entirely.
# Phase 212.M-F.15 â€” enable the `freertos` platform-backend feature so
# `zpico-sys/build.rs` compiles the `freertos-lwip` platform manifest
# (which pulls `zpico.c` providing `zpico_set_task_config` +
# `system/freertos/system.c` + `system/freertos/lwip/network.c`). Without
# the explicit feature the build script falls through to the minimal
# header-only path and the binary's link fails with `undefined symbol:
# zpico_set_task_config` (called from `nros_board_freertos::entry`
# when `rmw-zenoh` is on).
zpico-sys = { path = "../../zpico/zpico-sys", default-features = false, features = ["freertos"], optional = true }
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-freertos", "global-allocator"] }
# Phase 88 â€” Rust binding for `nros_platform_register_log_writer`.
# The board crate hands a semihosting writer to the platform's
# FreeRTOS log slot at `run()` time.
nros-platform-cffi = { path = "../../core/nros-platform-cffi", default-features = false }
# Phase 121.3 â€” the FreeRTOS Rust kernel crate is gone. The C port's
# canonical `nros_platform_*` symbols are compiled in-tree by this
# crate's `build.rs` and linked statically. DDS's
# `critical_section::Impl` now comes from the `nros-platform-critical-section`
# shim crate (Phase 121.9) â€” opt in by adding it to the example's deps.

# Semihosting for QEMU output
cortex-m-semihosting = "0.5"
panic-semihosting = "0.6"

[build-dependencies]
cc = "1"
# Phase 208.B Track A â€” repo-relative path resolver.
nros-build-paths = { path = "../../core/nros-build-paths" }

[features]
# Default keeps the historic zenoh-pico wiring active so existing
# `examples/qemu-arm-freertos/rust/zenoh/*` and downstream crates
# using `nros-mps2-an385-freertos` without a feature override link
# unchanged.
default = ["rmw-zenoh"]

# Pull in the zenoh-pico C transport plus the boot-time
# `zpico_set_task_config` call that tunes its read/lease task
# priorities. DDS-only examples can `default-features = false` to
# drop both the optional deps and the FFI call.
rmw-zenoh = ["dep:zpico-sys", "nros-board-freertos/rmw-zenoh"]
