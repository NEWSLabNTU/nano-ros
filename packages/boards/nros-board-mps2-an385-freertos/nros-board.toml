# Phase 195.C — board profile descriptor. FreeRTOS on MPS2-AN385.

[[board]]
names = ["freertos", "freeRTOS", "FreeRTOS"]
platform = "freertos"
toolchain = "stable"
platform_feature = "platform-freertos"
local_aliases = ["platform-freertos"]
link_kind = "none"
entry_kind = "board-run"
net_stack = "nanoros-owned"
board_crate = "nros-board-mps2-an385-freertos"
# Phase 252 (issue 0072) — forwards [safety] through the freertos family to zenoh.
capability_features = ["safety-e2e"]
cargo_config = '''
[target.thumbv7m-none-eabi]
runner = "qemu-system-arm -cpu cortex-m3 -machine mps2-an385 -nographic -semihosting-config enable=on,target=native -kernel"
rustflags = [
    "-C", "link-arg=-Tmps2_an385.ld",
    "-C", "link-arg=--nmagic",
]
'''

[board.entry]
crate_name = "nros_board_mps2_an385_freertos"
signature = "#[unsafe(no_mangle)]\nextern \"C\" fn _start() -> !"
crate_root_extra = "use panic_semihosting as _;"

# RFC-0042 D2 / phase-241 wave C — declared capabilities (SSoT). FreeRTOS heap is
# gated by `configSUPPORT_DYNAMIC_ALLOCATION` (FreeRTOSConfig.h); declared true.
[board.capabilities]
heap = true
atomics = true
threads = true

# RFC-0048 §6 / phase-287 W5 — CMake toolchain file for `nros setup`'s preset.
[board.cmake]
toolchain_file = "cmake/toolchain/arm-freertos-armcm3.cmake"
