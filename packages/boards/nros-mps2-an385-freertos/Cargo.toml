[package]
name = "nros-mps2-an385-freertos"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 board crate for nros on FreeRTOS + lwIP"

[lib]
name = "nros_mps2_an385_freertos"

[dependencies]
# Platform shim (force-link for embedded linker)
zpico-platform-shim = { path = "../../zpico/zpico-platform-shim", default-features = false, features = ["active"] }
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-freertos"] }

# Semihosting for QEMU output
cortex-m-semihosting = "0.5"
panic-semihosting = "0.6"

[build-dependencies]
cc = "1"

[features]
default = []
