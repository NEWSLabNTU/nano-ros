[package]
name = "nros-board-threadx-qemu-riscv64"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ThreadX QEMU RISC-V 64-bit virt board crate for nros (NetX Duo + virtio-net)"

[lib]
name = "nros_board_threadx_qemu_riscv64"

[dependencies]
# Phase 121.3 — canonical symbols from ThreadX C port; see sibling
# nros-board-threadx-linux for full rationale.
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-threadx"] }

[build-dependencies]
cc = "1"

[features]
default = []
