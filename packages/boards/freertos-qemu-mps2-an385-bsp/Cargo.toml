# Phase 212.H.3 — FreeRTOS BSP crate (cargo-native adapter).
#
# Per `docs/design/rtos-integration-pattern.md` §6, FreeRTOS is the ONE
# RTOS that does NOT get a separate `integrations/freertos/` shim
# directory: the cargo path itself is the adapter. This crate's
# `build.rs` runs `nros codegen system` (or bakes the equivalent
# `nros_config_generated.h` directly when the codegen subcommand
# isn't yet available) and compiles the per-system `system_main.c`
# via `cc::Build`. The heavyweight FreeRTOS-Kernel + lwIP compile is
# inherited from the existing `nros-board-mps2-an385-freertos` dep
# (transitive `cargo:rustc-link-lib=static=…` lines propagate).
[package]
name = "freertos-qemu-mps2-an385-bsp"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Phase 212.H.3 — cargo-native FreeRTOS BSP for QEMU MPS2-AN385 (re-exports nros-board-mps2-an385-freertos, layers nros codegen system on top)"

[lib]
name = "freertos_qemu_mps2_an385_bsp"

[dependencies]
# Re-export the existing per-board crate. This crate is a Phase 212.H.3
# audit shim: it adds the system-codegen layer without duplicating the
# FreeRTOS / lwIP / LAN9118 / zenoh-pico compile that
# `nros-board-mps2-an385-freertos` (and its `nros-board-freertos`
# generic dep) already owns.
nros-board-mps2-an385-freertos = { path = "../nros-board-mps2-an385-freertos", default-features = false }

[build-dependencies]
cc = "1"

[features]
# Match the underlying board crate's RMW selection surface.
default = ["rmw-zenoh"]
rmw-zenoh = ["nros-board-mps2-an385-freertos/rmw-zenoh"]
