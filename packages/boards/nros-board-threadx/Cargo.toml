[package]
name = "nros-board-threadx"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Generic ThreadX + NetX-Duo board scaffolding for nano-ros (Phase 152.2 — overlay foundation)"
authors = ["nano-ros contributors"]
repository = "https://github.com/NEWSLabNTU/peripherals"
keywords = ["nano-ros", "ros2", "threadx", "netx-duo", "embedded"]
categories = ["embedded", "no-std", "hardware-support"]

[lib]
name = "nros_board_threadx"

# Phase 152.2.A scaffolding — re-exports `Config` + `run` from the
# existing per-board ThreadX crates behind opt-in features. Once
# 152.2.B carves the kernel + NetX-Duo + nros-platform-threadx
# build glue out of the per-board build.rs into this crate's own
# build.rs, overlays depend on this name + the wiring switches
# transparently.
[dependencies]
# 152.2.B.4 — `BoardInit` / `BoardPrint` / `BoardExit` /
# `ThreadxConfig` traits the generic `run<B>` is generic over.
nros-board-common = { path = "../nros-board-common", default-features = false }
nros-board-threadx-linux = { path = "../nros-board-threadx-linux", optional = true }
nros-board-threadx-qemu-riscv64 = { path = "../nros-board-threadx-qemu-riscv64", optional = true }

[build-dependencies]
# 152.2.B.3 — generic `build.rs` lifts the ThreadX kernel +
# `nros-platform-threadx` C-port compile into this crate (Option
# C from the analysis). NetX-Duo / NSOS, port `.S` asm, and
# board-specific glue stay per-overlay because the NetX
# variant choice diverges meaningfully (Linux=NSOS shim,
# RISC-V=full NetX-Duo + virtio-net).
nros-board-common = { path = "../nros-board-common" }
cc = "1.0"

[features]
default = []
# Linux simulation port (ThreadX over pthreads + NSOS shim).
reference-linux = ["dep:nros-board-threadx-linux"]
# Bare-metal RISC-V64 QEMU port (full NetX-Duo + virtio-net).
reference-qemu-riscv64 = ["dep:nros-board-threadx-qemu-riscv64"]
