[package]
name = "nros-board-threadx"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Generic ThreadX + NetX-Duo board scaffolding for nano-ros (Phase 152.2 — overlay foundation)"
authors = ["nano-ros contributors"]
repository = "https://github.com/NEWSLabNTU/peripherals"
keywords = ["nano-ros", "ros2", "threadx", "netx-duo", "embedded"]
categories = ["embedded", "no-std", "hardware-support"]

[lib]
name = "nros_board_threadx"

# Phase 152.2.A scaffolding — re-exports `Config` + `run` from the
# existing per-board ThreadX crates behind opt-in features. Once
# 152.2.B carves the kernel + NetX-Duo + nros-platform-threadx
# build glue out of the per-board build.rs into this crate's own
# build.rs, overlays depend on this name + the wiring switches
# transparently.
[dependencies]
# 152.2.B.4 — `BoardInit` / `BoardPrint` / `BoardExit` /
# `ThreadxConfig` traits the generic `run<B>` is generic over.
nros-board-common = { path = "../nros-board-common", default-features = false }
# 212.N.2 — new `BoardInit` / `BoardPrint` / `BoardExit` / `RuntimeCtx`
# trait set in `nros_platform::board` the additive `run_entry` is
# generic over.
# Phase 248 C5c-platform (#60 T3, RFC-0031 platform amendment) — the ThreadX
# family driver brings the `platform-threadx` impl DIRECTLY (pulls
# `nros-platform-cffi`; the canonical `nros_platform_*` C symbols come from the
# ThreadX C port compiled by this crate's `build.rs`). Board-driven platform
# selection: the umbrella `nros` dep below stays platform-agnostic.
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-threadx"] }
# Phase 212.N.7 step-3.5 — Executor + ExecutorComponentRuntime so
# the app thread inside `run_entry` installs a live component runtime
# sink on `RuntimeCtx` before invoking the user `setup` closure +
# drops into a spin loop afterwards. `rmw-cffi` pulls the backend
# registry; the actual RMW backend (`nros-rmw-zenoh`, ...) must be
# linked by the per-board overlay so `Executor::open` resolves a
# backend at boot.
nros = { path = "../../core/nros", default-features = false, features = ["alloc", "rmw-cffi"] }
# #131 — `log` facade so `run_app_thread` can install a UART sink; the rust
# examples emit their human lines (`Publishing: '...'` / `I heard: [...]`) via
# `log::info!`, which is dropped without a registered logger (no std stdout on
# this bare-metal target). Mirrors the nuttx board's stdout logger.
log = { version = "0.4", default-features = false }
nros-board-threadx-linux = { path = "../nros-board-threadx-linux", optional = true }
nros-board-threadx-qemu-riscv64 = { path = "../nros-board-threadx-qemu-riscv64", optional = true }
# #131 — concrete Rust CFFI backend, registered explicitly in the boot path.
# ThreadX is `target_os = "none"`: the `nros_rmw_register_backend!` `.init_array`
# ctor is a no-op + the flat image runs no static ctors, so nothing registers the
# zenoh vtable → `resolve_backend` → NoBackend → `Executor::open` fails with
# `Transport(ConnectionFailed)` before any wire I/O. Linked + registered only when
# the overlay forwards `rmw-zenoh`; cyclonedds builds leave it off.
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "platform-threadx",
    "ros-humble",
], optional = true }

[build-dependencies]
# 152.2.B.3 — generic `build.rs` lifts the ThreadX kernel +
# `nros-platform-threadx` C-port compile into this crate (Option
# C from the analysis). NetX-Duo / NSOS, port `.S` asm, and
# board-specific glue stay per-overlay because the NetX
# variant choice diverges meaningfully (Linux=NSOS shim,
# RISC-V=full NetX-Duo + virtio-net).
nros-board-common = { path = "../nros-board-common", features = ["build-helpers"] }
cc = "1.0"

[features]
default = []
# Linux simulation port (ThreadX over pthreads + NSOS shim).
reference-linux = ["dep:nros-board-threadx-linux"]
# Bare-metal RISC-V64 QEMU port (full NetX-Duo + virtio-net).
reference-qemu-riscv64 = ["dep:nros-board-threadx-qemu-riscv64"]
# #131 — link + register the zenoh CFFI backend in the boot path. Forwarded by the
# per-board overlay (which the example forwards to from its own `rmw-zenoh`), so a
# zenoh build registers a backend and a cyclonedds build (feature off) does not.
rmw-zenoh = ["dep:nros-rmw-zenoh"]
