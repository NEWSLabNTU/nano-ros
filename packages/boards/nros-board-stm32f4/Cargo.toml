[package]
name = "nros-board-stm32f4"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "STM32F4 board crate for nros (hardware + network init)"

[lib]
name = "nros_board_stm32f4"

[dependencies]
# Phase 173.1 — Board super-trait + the generic direct-exec `run`.
nros-board-common = { path = "../nros-board-common", default-features = false }
# Unified platform primitives (clock, memory, random, sleep, threading, libc stubs)
nros-platform-stm32f4 = { path = "../../platforms/nros-platform-stm32f4" }
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-stm32f4", "global-allocator", "critical-section"] }
# Phase 244.C5 enabler — `nros_platform::BoardEntry` (src/entry.rs) needs the
# executor + node-runtime stack. Optional: only the `board-entry` feature
# (new-style `nros::main!()` Entry pkgs) pulls the `nros` umbrella; legacy
# `run(Config, closure)` examples keep their lean dep set. RMW-agnostic — the
# linked backend self-registers via the macro's `__register_linked_rmw()`.
nros = { path = "../../core/nros", default-features = false, features = ["alloc", "rmw-cffi"], optional = true }
nros-log = { path = "../../core/nros-log", default-features = false, optional = true }
# Phase 129.D — `zpico-platform-shim` retired. zenoh-pico `z_*`
# symbols come from `zpico-sys`'s default-on `platform-aliases`
# C TU when `rmw-zenoh` is active.
# Phase 248 C5a (#60 T4) — the BOARD is the RMW selection point: depend on the
# concrete zenoh backend directly (optional, behind `rmw-zenoh`) so the board
# OWNS linking + registering it. Bare-metal (`target_os = "none"`) is linkme-blind,
# so the board registers it explicitly in `entry::boot` (mirrors `nros-board-rtic-stm32f4`).
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "platform-bare-metal",
    "ros-humble",
], optional = true }

# smoltcp network provider (ethernet only)
nros-smoltcp = { path = "../../drivers/nros-smoltcp", optional = true }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"

# STM32F4 HAL (feature-gated for different chips)
stm32f4xx-hal = { version = "0.21" }

# STM32 Ethernet (ethernet only)
stm32-eth = { version = "0.8", features = ["smoltcp-phy"], optional = true }

# TCP/IP stack (ethernet only)
smoltcp = { version = "0.12", default-features = false, optional = true, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-udp",
] }

# Serial link layer (serial only)
zpico-serial = { path = "../../zpico/zpico-serial", optional = true }

# STM32F4 USART driver (serial only)
stm32f4-usart = { path = "../../drivers/stm32f4-usart", optional = true }

# Logging
defmt = "0.3"

[features]
default = ["stm32f429", "ethernet", "rmw-zenoh"]
# Phase 248 C5a (#60 T4) — board-owned RMW selection: link the concrete
# `nros-rmw-zenoh` backend directly (was a pure marker `[]`). The board registers
# it in `entry::boot` before `Executor::open` (bare-metal is linkme-blind). The
# zenoh-pico `z_*` symbols still come from `zpico-sys`'s `platform-aliases` C TU,
# now pulled via the board's own `nros-rmw-zenoh` dep.
rmw-zenoh = ["dep:nros-rmw-zenoh"]
# Phase 244.C5 enabler — opt into the `nros_platform::BoardEntry` impl so
# `nros::main!(deploy = "stm32f4")` can drive this board. Pulls the `nros`
# umbrella (executor + node-runtime). Off by default: legacy
# `run(Config, closure)` examples don't need it.
board-entry = ["dep:nros", "dep:nros-log"]
# Ethernet transport via STM32 MAC + smoltcp
ethernet = ["dep:nros-smoltcp", "dep:stm32-eth", "dep:smoltcp"]
# Serial transport via USART
serial = ["dep:zpico-serial", "dep:stm32f4-usart"]

# STM32F4 chip variants (forwarded to HAL and zpico-platform)
# stm32-eth features are only needed when ethernet is enabled, but Cargo
# ignores unknown features on optional deps, so this is safe.
stm32f407 = ["stm32f4xx-hal/stm32f407", "stm32-eth?/stm32f407"]
stm32f417 = ["stm32f4xx-hal/stm32f417", "stm32-eth?/stm32f417"]
stm32f427 = ["stm32f4xx-hal/stm32f427", "stm32-eth?/stm32f427"]
stm32f429 = ["stm32f4xx-hal/stm32f429", "stm32-eth?/stm32f429"]
stm32f437 = ["stm32f4xx-hal/stm32f437", "stm32-eth?/stm32f437"]
stm32f439 = ["stm32f4xx-hal/stm32f439", "stm32-eth?/stm32f439"]
stm32f469 = ["stm32f4xx-hal/stm32f469", "stm32-eth?/stm32f469"]
stm32f479 = ["stm32f4xx-hal/stm32f479", "stm32-eth?/stm32f479"]
