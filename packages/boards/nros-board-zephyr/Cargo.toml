# Phase 212.N.2 — Zephyr family driver crate.
#
# Empty `[workspace]` stub: this crate sits OUTSIDE the nano-ros
# Cargo workspace (mirrors the other wave-2 family driver crates).
# Built standalone via `cd packages/boards/nros-board-zephyr && cargo check`.
[workspace]

[package]
name = "nros-board-zephyr"
version = "0.4.0"
edition = "2024"
license = "Apache-2.0"
description = "Zephyr family driver crate for nros — NetworkWait-only impl (Zephyr owns main / BSP)."
repository = "https://github.com/NEWSLabNTU/nano-ros"
publish = false

[lib]
name = "nros_board_zephyr"

[features]
# issue #128 (half 2) — `ZephyrBoard::run_tiers` (per-tier k_thread entry).
# Off by default: NetworkWait-only consumers keep the tiny dep graph; the
# `nros::main!` Zephyr arm's multi-tier emit needs an entry crate that
# enables this on its `nros-board-zephyr` dep.
tiers = ["dep:nros", "dep:log"]

[dependencies]
nros-platform = { path = "../../core/nros-platform", default-features = false }
nros = { path = "../../core/nros", default-features = false, features = ["alloc", "rmw-cffi"], optional = true }
log = { version = "0.4", optional = true }
