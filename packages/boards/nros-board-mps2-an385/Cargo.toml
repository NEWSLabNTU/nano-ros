[package]
name = "nros-board-mps2-an385"
version = "0.5.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 board crate for nros (hardware + network init)"

[lib]
name = "nros_board_mps2_an385"

[dependencies]
# Phase 173.1 — Board super-trait + the generic direct-exec `run`.
# no_std, zero-dep (default-features = false drops the build-helper
# serde/toml/cc closure).
nros-board-common = { path = "../nros-board-common", default-features = false }
# Unified platform primitives (clock, memory, random, sleep, threading, libc stubs)
nros-platform-mps2-an385 = { path = "../../platforms/nros-platform-mps2-an385" }
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-mps2-an385", "global-allocator", "critical-section"] }
# Phase 97.3.mps2-an385 — `smoltcp_clock_now_ms` extern shim needs the
# trait import. Only used inside the cfg-gated forwarder in lib.rs.
nros-platform-api = { path = "../../core/nros-platform-api" }
# Phase 129.D — `zpico-platform-shim` retired. zenoh-pico `z_*`
# symbols come from `zpico-sys`'s default-on `platform-aliases`
# alias TU when `rmw-zenoh` (or `serial`) is active.
# Phase 248 C5a (#60 T4) — the BOARD is the RMW selection point: depend on the
# concrete zenoh backend directly (optional, behind `rmw-zenoh`) so the board
# OWNS linking + registering it, instead of a pure marker that needs a consumer
# to bring the backend. Bare-metal (`target_os = "none"`) is linkme-blind, so the
# board registers it explicitly in `entry::boot` (mirrors `nros-board-rtic-mps2-an385`).
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "platform-bare-metal",
    "ros-humble",
], optional = true }

# smoltcp network provider (ethernet only)
nros-smoltcp = { path = "../../drivers/nros-smoltcp", optional = true }
# LAN9118 Ethernet driver for QEMU MPS2-AN385 (ethernet only)
lan9118-smoltcp = { path = "../../drivers/lan9118-smoltcp", optional = true }
# smoltcp network stack (ethernet only)
smoltcp = { version = "0.12", default-features = false, optional = true, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-udp",
    # Phase 97.3.mps2-an385 — IGMP / multicast group join for RTPS
    # SPDP `239.255.0.1:7400+`. Without this, smoltcp's IPv4 layer
    # drops mcast frames before they reach the UDP socket.
    "multicast",
] }

# Serial link layer (serial only)
zpico-serial = { path = "../../zpico/zpico-serial", optional = true }
# CMSDK UART driver (serial only)
cmsdk-uart = { path = "../../drivers/cmsdk-uart", optional = true }
# Phase 207.2 — XRCE custom-transport callbacks (UART). Gated via the
# `xrce-transport` feature so the type only enters the build when an XRCE
# example asks for it.
nros-rmw-xrce-cffi = { path = "../../xrce/nros-rmw-xrce-cffi", default-features = false, optional = true }
# Phase 132 — `mps2-an385-pac` exposes the `Interrupt` enum so
# `init_serial` can `NVIC::unmask(Interrupt::UARTTX0)` to enable
# the TX-empty IRQ that backs the cmsdk-uart driver's `wfi`-loop.
# Optional + only pulled in by `serial`.
mps2-an385-pac = { path = "../mps2-an385-pac", optional = true }

# Phase 244.D1 enabler — `nros_platform::BoardEntry` impl (src/entry.rs) needs
# the executor + node-runtime stack. Optional: only the `board-entry` feature
# (new-style `nros::main!()` Entry pkgs) pulls the `nros` umbrella; legacy
# `run(Config, closure)` examples keep their lean dep set. RMW-agnostic — the
# linked backend self-registers via the macro's `__register_linked_rmw()`.
nros = { path = "../../core/nros", default-features = false, features = ["alloc", "rmw-cffi", "platform-bare-metal"], optional = true }
# Phase 244.D1 — agnostic logging dispatcher installed by `BoardEntry::boot`
# so declarative nodes can `nros_info!` without a per-example boot closure.
nros-log = { path = "../../core/nros-log", default-features = false, optional = true }

# Embedded dependencies
cortex-m = "0.7"
cortex-m-rt = "0.7"

# Semihosting for QEMU output
cortex-m-semihosting = "0.5"
panic-semihosting = "0.6"

[features]
# Default keeps the historic zenoh-pico wiring active. DDS-only
# downstream crates use `default-features = false, features = ["ethernet"]`.
default = ["ethernet", "rmw-zenoh"]
# Phase 248 C5a (#60 T4) — board-owned RMW selection: link the concrete
# `nros-rmw-zenoh` backend directly (was a pure marker `[]`) so the board owns
# linking the zenoh-pico transport + the CFFI bridge. The board registers it in
# `entry::boot` before `Executor::open` (bare-metal is linkme-blind). The
# zenoh-pico `z_*` / `_z_*` symbols still come from `zpico-sys`'s default-on
# `platform-aliases` C TU, now pulled via the board's own `nros-rmw-zenoh` dep.
rmw-zenoh = ["dep:nros-rmw-zenoh"]
# Phase 244.D1 enabler — opt into the `nros_platform::BoardEntry` impl so
# `nros::main!(deploy = "qemu-mps2-an385")` can drive this board. Pulls the
# `nros` umbrella (executor + node-runtime). Off by default: legacy
# `run(Config, closure)` examples don't need it.
board-entry = ["dep:nros", "dep:nros-log"]
# Ethernet transport via LAN9118 + smoltcp
ethernet = ["dep:nros-smoltcp", "dep:lan9118-smoltcp", "dep:smoltcp"]
# Serial transport via CMSDK UART. The `_z_socket_*` symbols
# peer.c references at link time come from `zpico-sys`'s
# default-on `platform-aliases` C TU; no shim needed.
serial = ["dep:zpico-serial", "dep:cmsdk-uart", "dep:mps2-an385-pac"]
# Phase 207.2 — XRCE custom-transport callbacks bound to the CMSDK UART0.
# Exposes `xrce_transport_ops()` returning the four `open`/`close`/`write`/
# `read` fn pointers an XRCE bare-metal example installs via
# `nros_rmw_xrce_cffi::set_custom_transport_ops`. Requires `serial` (shares
# `UART_DEVICE` with the zenoh-pico serial path) + a depender on
# `nros-rmw-xrce-cffi` (the XRCE example).
xrce-transport = ["serial", "dep:nros-rmw-xrce-cffi"]
# Docker networking mode (container with NAT, ethernet only)
docker = []
# TLS support (requires mbedTLS, increases heap, ethernet only)
link-tls = ["nros-platform-mps2-an385/link-tls"]
# Phase 97.3.mps2-an385 — DDS / DDS heap budget (2 MB). Off by
# default; DDS example crates pull in via `features = ["dds-heap"]`.
dds-heap = ["nros-platform-mps2-an385/dds-heap"]
