[package]
name = "nros-board-mps2-an385"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 board crate for nros (hardware + network init)"

[lib]
name = "nros_board_mps2_an385"

[dependencies]
# Unified platform primitives (clock, memory, random, sleep, threading, libc stubs)
nros-platform-mps2-an385 = { path = "../../platforms/nros-platform-mps2-an385" }
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-mps2-an385", "global-allocator", "critical-section"] }
# Phase 97.3.mps2-an385 — `smoltcp_clock_now_ms` extern shim needs the
# trait import. Only used inside the cfg-gated forwarder in lib.rs.
nros-platform-api = { path = "../../core/nros-platform-api" }
# Phase 129.D — `zpico-platform-shim` retired. zenoh-pico `z_*`
# symbols come from `zpico-sys`'s default-on `platform-aliases`
# alias TU when `rmw-zenoh` (or `serial`) is active.

# smoltcp network provider (ethernet only)
nros-smoltcp = { path = "../../drivers/nros-smoltcp", optional = true }
# LAN9118 Ethernet driver for QEMU MPS2-AN385 (ethernet only)
lan9118-smoltcp = { path = "../../drivers/lan9118-smoltcp", optional = true }
# smoltcp network stack (ethernet only)
smoltcp = { version = "0.12", default-features = false, optional = true, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-udp",
    # Phase 97.3.mps2-an385 — IGMP / multicast group join for RTPS
    # SPDP `239.255.0.1:7400+`. Without this, smoltcp's IPv4 layer
    # drops mcast frames before they reach the UDP socket.
    "multicast",
] }

# Serial link layer (serial only)
zpico-serial = { path = "../../zpico/zpico-serial", optional = true }
# CMSDK UART driver (serial only)
cmsdk-uart = { path = "../../drivers/cmsdk-uart", optional = true }
# Phase 132 — `mps2-an385-pac` exposes the `Interrupt` enum so
# `init_serial` can `NVIC::unmask(Interrupt::UARTTX0)` to enable
# the TX-empty IRQ that backs the cmsdk-uart driver's `wfi`-loop.
# Optional + only pulled in by `serial`.
mps2-an385-pac = { path = "../mps2-an385-pac", optional = true }

# Embedded dependencies
cortex-m = "0.7"
cortex-m-rt = "0.7"

# Semihosting for QEMU output
cortex-m-semihosting = "0.5"
panic-semihosting = "0.6"

[features]
# Default keeps the historic zenoh-pico wiring active. DDS-only
# downstream crates use `default-features = false, features = ["ethernet"]`.
default = ["ethernet", "rmw-zenoh"]
# Phase 129.D — `rmw-zenoh` is a pure marker. The zenoh-pico
# `z_*` / `_z_*` symbols come from `zpico-sys`'s default-on
# `platform-aliases` C TU, which the consumer pulls in
# transitively via `nros-rmw-zenoh`.
rmw-zenoh = []
# Ethernet transport via LAN9118 + smoltcp
ethernet = ["dep:nros-smoltcp", "dep:lan9118-smoltcp", "dep:smoltcp"]
# Serial transport via CMSDK UART. The `_z_socket_*` symbols
# peer.c references at link time come from `zpico-sys`'s
# default-on `platform-aliases` C TU; no shim needed.
serial = ["dep:zpico-serial", "dep:cmsdk-uart", "dep:mps2-an385-pac"]
# Docker networking mode (container with NAT, ethernet only)
docker = []
# TLS support (requires mbedTLS, increases heap, ethernet only)
link-tls = ["nros-platform-mps2-an385/link-tls"]
# Phase 97.3.mps2-an385 — DDS / DDS heap budget (2 MB). Off by
# default; DDS example crates pull in via `features = ["dds-heap"]`.
dds-heap = ["nros-platform-mps2-an385/dds-heap"]
