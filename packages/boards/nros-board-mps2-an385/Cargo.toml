[package]
name = "nros-board-mps2-an385"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 board crate for nros (hardware + network init)"

[lib]
name = "nros_board_mps2_an385"

[dependencies]
# Unified platform primitives (clock, memory, random, sleep, threading, libc stubs)
nros-platform-mps2-an385 = { path = "../../platforms/nros-platform-mps2-an385" }
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-mps2-an385"] }
# Phase 97.1.board-decouple — only needed when `rmw-zenoh` is active.
zpico-platform-shim = { path = "../../zpico/zpico-platform-shim", default-features = false, features = ["active"], optional = true }

# smoltcp network provider (ethernet only)
nros-smoltcp = { path = "../../drivers/nros-smoltcp", optional = true }
# LAN9118 Ethernet driver for QEMU MPS2-AN385 (ethernet only)
lan9118-smoltcp = { path = "../../drivers/lan9118-smoltcp", optional = true }
# smoltcp network stack (ethernet only)
smoltcp = { version = "0.12", default-features = false, optional = true, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-udp",
] }

# Serial link layer (serial only)
zpico-serial = { path = "../../zpico/zpico-serial", optional = true }
# CMSDK UART driver (serial only)
cmsdk-uart = { path = "../../drivers/cmsdk-uart", optional = true }

# Embedded dependencies
cortex-m = "0.7"
cortex-m-rt = "0.7"

# Semihosting for QEMU output
cortex-m-semihosting = "0.5"
panic-semihosting = "0.6"

[features]
# Default keeps the historic zenoh-pico wiring active. DDS-only
# downstream crates use `default-features = false, features = ["ethernet"]`.
default = ["ethernet", "rmw-zenoh"]
# Phase 97.1.board-decouple — pull in the zenoh-pico C transport
# shim. Off for DDS-only builds (which drive their own UDP via
# `nros-platform-mps2-an385`'s `PlatformUdp` impl directly).
rmw-zenoh = ["dep:zpico-platform-shim"]
# Ethernet transport via LAN9118 + smoltcp
ethernet = ["dep:nros-smoltcp", "dep:lan9118-smoltcp", "dep:smoltcp"]
# Serial transport via CMSDK UART. Still needs zpico-platform-shim because
# zpico-sys's peer.c references the `_z_socket_*` symbols even when the
# transport is serial-only (the calls are no-ops at runtime via the
# `_owns_socket` flag, but the linker still needs the symbols).
serial = ["dep:zpico-serial", "dep:cmsdk-uart", "dep:zpico-platform-shim"]
# Docker networking mode (container with NAT, ethernet only)
docker = []
# TLS support (requires mbedTLS, increases heap, ethernet only)
link-tls = ["nros-platform-mps2-an385/link-tls"]
