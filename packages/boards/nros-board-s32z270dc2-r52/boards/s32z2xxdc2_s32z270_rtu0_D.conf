# Board overlay for s32z2xxdc2/s32z270/rtu0/D
#
# S32Z270-DC RTU0 D-rev silicon. Layered on top of the in-tree
# `prj.conf` for runs targeting the eval board.

# Cyclone DDS participant + endpoint metadata. 64 KiB is the floor
# for one participant + ~4 endpoints; the eval board has only 1 MiB
# SRAM (post-XIP=n) so growing past 64 KiB squeezes the kernel +
# net stack out of RAM. Production deployments with more topics
# either trim the kernel/net buffers below or move SRAM to LPDDR.
CONFIG_HEAP_MEM_POOL_SIZE=65536

# Net stack — shrink default RX/TX queues so the heap budget fits.
# Phase 117.13 build smoke needs the link step to succeed; runtime
# tuning lands when the eval board is plugged in.
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_MAX_CONTEXTS=8

# Tighter pthread / mutex pool — Cyclone DDS needs ~3 worker threads
# + per-endpoint mutexes; 12 / 24 covers a basic talker/listener
# workload without consuming all of SRAM.
CONFIG_MAX_PTHREAD_COUNT=12
CONFIG_POSIX_THREAD_THREADS_MAX=12
CONFIG_MAX_PTHREAD_MUTEX_COUNT=24
CONFIG_MAX_PTHREAD_COND_COUNT=12

# Disable IPv6 (Phase-117 wire is IPv4 only) — saves ~16 KiB net.
CONFIG_NET_IPV6=n

# Cap the system + main stack so the kernel image leaves room for
# heap + net buffers in the 1 MiB SRAM.
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=2048

# RNG — S32Z lacks an entropy peripheral with a Zephyr driver; fall
# back to the test PRNG. Production deployments should replace with
# the SoC's TRNG once a Zephyr driver lands.
CONFIG_TEST_RANDOM_GENERATOR=y

# ENETC mailbox driver and clock. The eval board's J22 RJ45 hangs
# off PSI0; the stock board defconfig already wires it.
CONFIG_NET_DRIVERS=y
