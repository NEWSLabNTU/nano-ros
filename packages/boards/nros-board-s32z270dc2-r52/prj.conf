# nros-board-s32z270dc2-r52 — base prj.conf
#
# Drop-in fragment for example apps targeting
# `s32z2xxdc2/s32z270/rtu0/D`. Either layered via
# `west build -- -DEXTRA_CONF_FILE=<this>` or copied into the app's
# own prj.conf.

# =============================================================================
# Kernel + threading
# =============================================================================
CONFIG_MAIN_STACK_SIZE=16384
# Phase 117.11 — Cyclone DDS heap budget. ≥64 KiB to host one
# participant + ~8 endpoints; 96 KiB leaves room for app message
# buffers without OOM. Tune downward (or upward) per deployment.
CONFIG_HEAP_MEM_POOL_SIZE=98304
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# Cyclone DDS / RMW workers + user executor.
CONFIG_POSIX_THREAD_THREADS_MAX=16
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16

# =============================================================================
# POSIX (Cyclone DDS pthreads + sockets)
# =============================================================================
CONFIG_POSIX_API=y

# =============================================================================
# Networking — IPv4 + UDP/TCP + ENETC L2 ethernet.
# =============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
# Zephyr's default tcp_work workqueue stack (1024 B) overflows on arm64 —
# corrupted context, wild ERET to __start at EL0, EC 0x18 fatal in tcp_work
# (ASI wall #3, phase-292 W2). Any conf enabling NET_TCP must raise it.
CONFIG_NET_TCP_WORKQ_STACK_SIZE=4096
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_MAX_CONTEXTS=16

# =============================================================================
# Logging / console
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# =============================================================================
# nros module
# =============================================================================
CONFIG_NROS=y
# Language API selection lives in the CONSUMER's fragment (phase-292 W1.a
# lesson: a board crate must not bake a language choice — the ASI consumer
# is C++, the in-tree talker smoke is Rust). Rust apps layer prj-rust.conf.
