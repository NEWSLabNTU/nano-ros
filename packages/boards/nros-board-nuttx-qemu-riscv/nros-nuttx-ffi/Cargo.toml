[workspace]

[package]
name = "nros-nuttx-riscv-ffi"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "NuttX rv-virt kernel + nros C/C++ FFI bundle for CMake-built examples"

[dependencies]
# Path deps go up 3 levels to the repo root.
nros-board-nuttx-qemu-riscv = { path = ".." }
nros-c = { path = "../../../core/nros-c", features = [
    "std", "cffi-zenoh-cffi", "platform-nuttx", "ros-humble"
] }
nros-cpp = { path = "../../../core/nros-cpp", features = [
    "std", "rmw-zenoh-cffi", "platform-nuttx", "ros-humble"
] }
# Link the cffi shim directly so register() is callable from main.rs before
# app_main() jumps into C/C++ code.
nros-rmw-zenoh = { path = "../../../zpico/nros-rmw-zenoh", features = ["platform-nuttx", "ros-humble"] }

[build-dependencies]
# NuttX FFI build helper (run_nuttx) + repo path resolution.
nros-board-common = { path = "../../nros-board-common", features = ["build-helpers"] }

# #134 follow-up: the cmake glue (packages/core/nros-c/cmake/nros-nuttx.cmake)
# copies `<triple>/release/nros-nuttx-ffi` — the ARM crate's bin name. Pin the
# same artifact name here so both NuttX families share one copy path.
[[bin]]
name = "nros-nuttx-ffi"
path = "src/main.rs"

[profile.release]
opt-level = "s"
lto = true
# #134 follow-up: unlike `armv7a-nuttx-eabihf`, the tier-3
# `riscv32imac-unknown-nuttx-elf` target spec does NOT bake
# `panic-strategy: abort`, so without this the build-std `std` is built
# with unwinding and nros-c fails "unwinding panics are not supported
# without std".
panic = "abort"
