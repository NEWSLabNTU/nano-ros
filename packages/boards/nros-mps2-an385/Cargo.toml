[package]
name = "nros-mps2-an385"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 board crate for nros (hardware + network init)"

[lib]
name = "nros_mps2_an385"

[dependencies]
# Platform primitives (zenoh-pico FFI symbols, network poll callback)
zpico-platform-mps2-an385 = { path = "../../zpico/zpico-platform-mps2-an385" }

# TCP link layer via smoltcp
zpico-smoltcp = { path = "../../zpico/zpico-smoltcp" }
# LAN9118 Ethernet driver for QEMU MPS2-AN385
lan9118-smoltcp = { path = "../../drivers/lan9118-smoltcp" }

# Embedded dependencies
cortex-m = "0.7"
cortex-m-rt = "0.7"
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-udp",
] }

# Semihosting for QEMU output
cortex-m-semihosting = "0.5"
panic-semihosting = "0.6"

[features]
default = []
# Docker networking mode (container with NAT)
docker = []
