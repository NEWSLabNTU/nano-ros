[package]
name = "nros-board-threadx-linux"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ThreadX Linux simulation board crate for nros (NetX Duo + BSD sockets)"

[lib]
name = "nros_board_threadx_linux"

[dependencies]
# Phase 121.3 — canonical `nros_platform_*` symbols come from the
# ThreadX C port linked via CMake. The Rust dep here exists only to
# pull `nros-platform`'s `platform-threadx` feature into the link map
# so `ConcretePlatform = CffiPlatform` resolves.
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-threadx"] }
# Phase 88 — Rust binding for `nros_platform_register_log_writer`.
nros-platform-cffi = { path = "../../core/nros-platform-cffi", default-features = false }
# Phase 152.2.B — `BoardInit` / `BoardPrint` / `BoardExit` trait
# impls so this overlay fits the canonical overlay shape (same
# pattern as `nros-board-orin-spe` 152.3, `nros-board-mps2-an385-freertos`
# 152.1.B.5). Generic-crate `run<B>` lift deferred to a follow-up
# session; the trait surface lands now so future consumers can
# already write `<ThreadxLinux as BoardInit>::init_hardware(&cfg)`.
nros-board-common = { path = "../nros-board-common", default-features = false }
# Phase 152.2.B.4 — generic `run<B>` lifted into the parent
# crate. The overlay's `pub fn run` is now a thin non-generic
# wrapper that calls `nros_board_threadx::run::<ThreadxLinux,
# _, _, _>(config, f)`.
nros-board-threadx = { path = "../nros-board-threadx", default-features = false }

[build-dependencies]
cc = "1"
# Phase 152.2.B — shared ThreadX kernel + port source helpers.
nros-board-common = { path = "../nros-board-common", features = ["build-helpers"] }

[features]
default = []
# #131 / #194 — forward the family board's zenoh-backend link + boot-path
# register() (same as the riscv64 sibling). Without this, a rust Entry image's
# `Executor::open` finds NoBackend and fails Transport(ConnectionFailed) with
# ZERO wire I/O (the observed threadx-linux rust rtos_e2e zero-delivery). The
# Entry pkg forwards its own `rmw-zenoh`; a cyclonedds build leaves it off.
rmw-zenoh = ["nros-board-threadx/rmw-zenoh"]
