[package]
name = "nros-board-threadx-linux"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ThreadX Linux simulation board crate for nros (NetX Duo + BSD sockets)"

[lib]
name = "nros_board_threadx_linux"

[dependencies]
# nros-platform-threadx symbols are linked via nros → nros-platform → nros-platform-threadx.
# Direct dependency ensures the FFI symbols (nros_platform_threadx_set_byte_pool etc.)
# are available even if the board crate is used without nros.
nros-platform-threadx = { path = "../../core/nros-platform-threadx" }

[build-dependencies]
cc = "1"

[features]
default = []
