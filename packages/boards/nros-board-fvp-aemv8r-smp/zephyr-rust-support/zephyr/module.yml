# nros-board-fvp-aemv8r-smp — Rust-support Kconfig overlay module (Phase 215.J.4)
#
# A tiny Zephyr module that extends `config RUST_SUPPORTED` (declared by the
# `zephyr-lang-rust` module) with a board-keyed `default y` for the FVP
# AEMv8-R board — WITHOUT mutating the consumer's `zephyr-lang-rust` tree
# (option B, "board Kconfig overlay module"). See `Kconfig` in this dir.
#
# A downstream consumer picks this up by putting the module root (the parent
# dir of this `zephyr/`) on `ZEPHYR_EXTRA_MODULES`; `nano_ros_use_board()`
# does that automatically (it appends `NROS_BOARD_RUST_SUPPORT_MODULE`).
#
# NOTE: this only handles the `RUST_SUPPORTED` *Kconfig* symbol. The
# `zephyr-lang-rust` CMake `_rust_map_target` → `aarch64-unknown-none` mapping
# is NOT a Kconfig symbol and is supplied by `scripts/zephyr/aarch64-rust-patch.sh`
# (run via `nros setup board … `'s patch-set step, Phase 215.J.2 step (b)).

name: nros_board_fvp_aemv8r_smp_rust_support

build:
  kconfig: Kconfig
