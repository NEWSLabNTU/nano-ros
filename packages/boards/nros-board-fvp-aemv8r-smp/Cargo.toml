[package]
name = "nros-board-fvp-aemv8r-smp"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ARM FVP Base_RevC AEMv8-R Cortex-A SMP (Zephyr) board crate for nano-ros"

[lib]
name = "nros_board_fvp_aemv8r_smp"
# `rlib` only — the example app crate (consumed by `rust_cargo_application()`
# in Zephyr's CMake glue) is responsible for the `staticlib` wrap-up plus
# its own `#[panic_handler]`. Same pattern as `nros-board-orin-spe` /
# `nros-board-mps2-an385-freertos`.

[features]
default = ["ethernet"]
# Transport
ethernet = []
# RMW backend selection. `rmw-cyclonedds` is the Phase-117 default
# for this board (Autoware safety-island stack); the actual backend
# wiring is done at the CMake level (`-DNANO_ROS_RMW=cyclonedds`),
# this feature only flips the matching `nros::*` cargo cfg.
rmw-cyclonedds = []
# Phase 128.C.3 — `nros/rmw-zenoh` was never a real feature on the
# umbrella; selection lives entirely in the manifest via a direct
# `nros-rmw-zenoh` dep (which contributes the `RMW_INIT_ENTRIES`
# entry). This feature stays as a no-op marker for consumers that
# still flip it.
rmw-zenoh      = []

[dependencies]
nros = { path = "../../core/nros", default-features = false, features = ["platform-zephyr"] }
# Phase 121.3 — the Rust `nros-platform-zephyr` crate is gone; the
# canonical `nros_platform_*` C symbols come from
# `nros-platform-zephyr` (the C port at `packages/core/nros-platform-zephyr/`,
# linked via Zephyr's CMake glue). The board crate pulls `nros-platform`
# (re-exported via `nros`) to reach `ConcretePlatform = CffiPlatform`.
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-zephyr"] }

# Phase 215.C.1 — Cargo-side mirror of the `board.cmake` sidecar.
# Same field set as `packages/boards/nros-board-fvp-aemv8r-smp/board.cmake`;
# Phase 215.F drift audit (CI gate) asserts byte-equal field-by-field
# against the cmake face. Paths are relative to this `Cargo.toml`.
# Schema: docs/reference/board-cmake-schema.md
[package.metadata.nros.board]
zephyr_board      = "fvp_baser_aemv8r/fvp_aemv8r_aarch64/smp"
toolchain         = "aarch64-zephyr-elf"
gated             = ["arm-fvp"]
default_rmw       = "cyclonedds"
default_transport = "ethernet"
runner            = "armfvp"
prj_conf          = "prj.conf"
board_conf        = "boards/fvp_baser_aemv8r_fvp_aemv8r_aarch64_smp.conf"
board_overlay     = "boards/fvp_baser_aemv8r_fvp_aemv8r_aarch64_smp.overlay"
# Phase 215.J.1 — downstream Zephyr consumer provisioning contract
# (mirrors NROS_BOARD_ZEPHYR_LINE / REQUIRES_RUST / RUST_TARGETS /
# RMW_SOURCE in board.cmake). Drives `nros setup board <name>
# --zephyr-workspace <dir>`.
zephyr_line       = "3.7"
requires_rust     = true
rust_targets      = ["aarch64-unknown-none"]
rmw_source        = "cyclonedds-src"
