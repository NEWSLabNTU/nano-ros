# Board overlay for fvp_baser_aemv8r/fvp_aemv8r_aarch64/smp
#
# Layered on top of the in-tree `prj.conf` for runs targeting the
# 64-bit Cortex-A SMP variant of the FVP. Picks up the Arm GICv3
# arch timer, enables 4-CPU SMP scheduling (matching the FVP's
# default cpu count), and wires the FVP's emulated ethernet to
# Zephyr's net stack.

CONFIG_SMP=y
CONFIG_MP_MAX_NUM_CPUS=4

# Zephyr's stock `fvp_baser_aemv8r_aarch64_smp_defconfig` already
# turns on `CONFIG_ARM_ARCH_TIMER`, `CONFIG_CACHE_MANAGEMENT`,
# `CONFIG_PM_CPU_OPS`, `CONFIG_ARM64_SET_VMPIDR_EL2`, and the
# UART/console plumbing — not repeated here.

# FVP's emulated ethernet — reachable via the `--network` CLI option
# on the FVP runner, which bridges to a tap device on the host.
CONFIG_ETH_DRIVER=y
# The SMSC 91C111 model + its MDIO bus. Without ETH_SMSC91X the DTS eth node
# has no driver; without MDIO (+ a late ETH_INIT_PRIORITY so the bus is ready
# first) the smsc driver's mdio path dereferences a null register base and
# faults at init. Matches the ASI reference image. phase-292 W2 / issue 0232.
CONFIG_ETH_SMSC91X=y
CONFIG_MDIO=y
# The SMSC 91C111 bank-switches ONE MMIO window between its ethernet and MDIO
# register banks, so the MDIO + PHY drivers must init AFTER the eth driver has
# set up that base — otherwise the mdio driver's smsc_select_bank writes to a
# null base and faults (Data Abort in smsc_select_bank at init). Order:
# eth(80) < mdio(81) < phy(82), matching the ASI reference image. Defaults
# (mdio=60, phy=70) put them BEFORE eth → crash.
CONFIG_ETH_INIT_PRIORITY=80
CONFIG_MDIO_INIT_PRIORITY=81
CONFIG_PHY_INIT_PRIORITY=82

# Heap budget — Cyclone DDS allocates ~64 KiB of static state per
# domain participant + per-topic descriptors. 192 KiB leaves room
# for app-side message buffers without OOM.
CONFIG_HEAP_MEM_POOL_SIZE=196608

# RNG — the FVP has no entropy peripheral, so Zephyr's test PRNG
# (xoroshiro128 seeded from k_uptime + boot-time markers) is the
# only sys_rand_get backend available. Phase-117 cyclonedds-on-FVP
# only uses RNG for participant-id generation; production hardware
# (S32Z R52 in 117.11) replaces with a real entropy driver.
CONFIG_TEST_RANDOM_GENERATOR=y

# The SMSC eth<->mdio<->phy ordering above (eth first, so it sets up the
# shared MMIO base before mdio/phy touch it) is runtime-correct but trips
# Zephyr's build-time init-priority checker (eth declares a phy-handle
# dependency, so the checker wants phy FIRST). Disable it for this board —
# the hardware constraint wins. Matches the ASI reference image.
CONFIG_CHECK_INIT_PRIORITIES=n
