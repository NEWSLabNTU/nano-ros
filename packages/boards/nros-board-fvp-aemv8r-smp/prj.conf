# nros-board-fvp-aemv8r-smp — base prj.conf
#
# Drop-in fragment that example apps targeting `fvp_baser_aemv8r/
# fvp_aemv8r_aarch64/smp` can `west build -- -DEXTRA_CONF_FILE=<this>`
# against, or copy verbatim into their own prj.conf.

# =============================================================================
# Kernel + threading
# =============================================================================
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# Cyclone DDS / RMW workers — typed Rust app + Cyclone's own RX
# threads + the user executor.
CONFIG_MAX_PTHREAD_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16

# =============================================================================
# Rust support (zephyr-lang-rust)
# =============================================================================
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# =============================================================================
# POSIX (Cyclone DDS uses POSIX threads + sockets)
# =============================================================================
CONFIG_POSIX_API=y

# =============================================================================
# Networking — IPv4 + UDP/TCP, ethernet L2.
# =============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_MAX_CONTEXTS=16

# =============================================================================
# Logging / console
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# =============================================================================
# nros module (zephyr/CMakeLists.txt)
# =============================================================================
CONFIG_NROS=y
CONFIG_NROS_RUST_API=y
