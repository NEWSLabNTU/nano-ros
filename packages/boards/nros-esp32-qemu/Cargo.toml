[package]
name = "nros-esp32-qemu"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ESP32-C3 QEMU board crate for nros (simplified node API)"

[lib]
name = "nros_esp32_qemu"

[dependencies]
# Platform primitives (zenoh-pico FFI symbols, network poll callback)
zpico-platform-esp32-qemu = { path = "../../zpico/zpico-platform-esp32-qemu" }

# RMW abstraction + zenoh backend
nros-rmw = { path = "../../core/nros-rmw", default-features = false }
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, features = ["platform-bare-metal", "link-tcp"] }
# TCP link layer via smoltcp
zpico-smoltcp = { path = "../../zpico/zpico-smoltcp" }
# OpenCores Ethernet MAC driver (for QEMU open_eth NIC)
openeth-smoltcp = { path = "../../drivers/openeth-smoltcp" }

# ESP32-C3 HAL and support crates
esp-hal = { version = "~1.0.0", features = ["esp32c3", "unstable"] }
esp-backtrace = { version = "~0.18.0", features = ["esp32c3", "panic-handler", "println"] }
esp-bootloader-esp-idf = { version = "~0.4.0", features = ["esp32c3"] }
esp-println = { version = "~0.16.0", features = ["esp32c3"] }
esp-alloc = { version = "~0.9.0" }

# Network stack
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

# Core types (RosMessage, CDR serialization)
nros-core = { path = "../../core/nros-core", default-features = false }

# Atomics for riscv32imc (no hardware atomic support)
portable-atomic = { version = "1", default-features = false, features = ["unsafe-assume-single-core"] }

[features]
default = []
