[package]
name = "nros-stm32f4"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "STM32F4 board crate for nros (simplified node API)"

[lib]
name = "nros_stm32f4"

[dependencies]
# Platform primitives (zenoh-pico FFI symbols, network poll callback)
zpico-platform-stm32f4 = { path = "../../zpico/zpico-platform-stm32f4" }

# RMW abstraction + zenoh backend
nros-rmw = { path = "../../core/nros-rmw", default-features = false }
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, features = ["platform-bare-metal", "link-tcp"] }
# TCP link layer via smoltcp
zpico-smoltcp = { path = "../../zpico/zpico-smoltcp" }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"

# STM32F4 HAL (feature-gated for different chips)
stm32f4xx-hal = { version = "0.21" }

# STM32 Ethernet
stm32-eth = { version = "0.8", features = ["smoltcp-phy"] }

# TCP/IP stack
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

# Logging
defmt = "0.3"

# Core types (RosMessage, CDR serialization)
nros-core = { path = "../../core/nros-core", default-features = false }

[features]
default = ["stm32f429"]

# STM32F4 chip variants (forwarded to HAL and zpico-platform)
stm32f407 = ["stm32f4xx-hal/stm32f407", "stm32-eth/stm32f407", "zpico-platform-stm32f4/stm32f407"]
stm32f417 = ["stm32f4xx-hal/stm32f417", "stm32-eth/stm32f417", "zpico-platform-stm32f4/stm32f417"]
stm32f427 = ["stm32f4xx-hal/stm32f427", "stm32-eth/stm32f427", "zpico-platform-stm32f4/stm32f427"]
stm32f429 = ["stm32f4xx-hal/stm32f429", "stm32-eth/stm32f429", "zpico-platform-stm32f4/stm32f429"]
stm32f437 = ["stm32f4xx-hal/stm32f437", "stm32-eth/stm32f437", "zpico-platform-stm32f4/stm32f437"]
stm32f439 = ["stm32f4xx-hal/stm32f439", "stm32-eth/stm32f439", "zpico-platform-stm32f4/stm32f439"]
stm32f469 = ["stm32f4xx-hal/stm32f469", "stm32-eth/stm32f469", "zpico-platform-stm32f4/stm32f469"]
stm32f479 = ["stm32f4xx-hal/stm32f479", "stm32-eth/stm32f479", "zpico-platform-stm32f4/stm32f479"]
