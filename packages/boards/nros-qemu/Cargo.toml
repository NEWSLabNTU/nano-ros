[package]
name = "nros-qemu"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 board crate for nros (simplified node API)"

[lib]
name = "nros_qemu"

[dependencies]
# Platform primitives (zenoh-pico FFI symbols, network poll callback)
zpico-platform-qemu = { path = "../../zpico/zpico-platform-qemu" }

# RMW abstraction + zenoh backend
nros-rmw = { path = "../../core/nros-rmw", default-features = false }
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, features = ["platform-bare-metal", "link-tcp"] }
# TCP link layer via smoltcp
zpico-smoltcp = { path = "../../zpico/zpico-smoltcp" }
# LAN9118 Ethernet driver for QEMU MPS2-AN385
lan9118-smoltcp = { path = "../../drivers/lan9118-smoltcp" }

# Embedded dependencies
cortex-m = "0.7"
cortex-m-rt = "0.7"
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

# Semihosting for QEMU output
cortex-m-semihosting = "0.5"
panic-semihosting = "0.6"

# Core types (RosMessage, CDR serialization)
nros-core = { path = "../../core/nros-core", default-features = false }

[features]
default = []
# Docker networking mode (container with NAT)
docker = []
