[package]
name = "nros-board-posix"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Phase 212.N.2 — POSIX family driver implementing the `Board` trait surface from `nros-platform`."
publish = false

# Host-only crate. POSIX (Linux / macOS / BSD) lives under `std`, so
# no `no_std` attribute and no per-target gating on `target_os` — the
# whole point of this crate is to be the family driver for hosted
# Unix targets.

[dependencies]
# Phase 214.F.1 (Path B) — every dep this crate needs activates
# `nros/std` or `nros/platform-posix` on a shared workspace crate
# (nros-serdes, nros-core, nros-platform). Under workspace feature
# unification (resolver=2) those activations leak into embedded
# targets, even though this crate is host-only and cargo skips
# compiling it under `target_os = "none"`. Gating the entire
# `[dependencies]` block on `cfg(not(target_os = "none"))` removes
# the leak: under thumb/riscv-none the crate appears dep-less,
# so its feature flags drop out of the unified set.
[target.'cfg(not(target_os = "none"))'.dependencies]
# Trait surface (BoardEntry, BoardInit, BoardPrint, BoardExit, RuntimeCtx).
nros-platform = { version = "0.5.0", path = "../../core/nros-platform", default-features = false, features = ["std"] }
# Phase 212.N.7 step-3.5 — Executor + ExecutorComponentRuntime so
# `BoardEntry::run` installs a live component runtime sink on the
# `RuntimeCtx` before invoking the user `setup` closure. `rmw-cffi`
# pulls the RMW backend registry; the actual RMW backend crate
# (`nros-rmw-zenoh`, `nros-rmw-cyclonedds`, ...) must be linked by
# the Entry pkg or a per-board shim crate so `Executor::open`
# resolves a backend at boot.
nros = { version = "0.5.0", path = "../../core/nros", default-features = false, features = ["std", "rmw-cffi", "platform-posix"] }
