[package]
name = "nros-std-msgs-diag"
version = "4.9.1"
edition = "2021"

[features]
default = []
std = ["nros-core/std", "nros-serdes/std", "nros-builtin-interfaces-diag/std"]

[dependencies]
# nros crates (patched to local via .cargo/config.toml during development)
nros-core = { version = "*", default-features = false }
nros-serdes = { version = "*", default-features = false }
heapless = "0.8"
nros-builtin-interfaces-diag = { path = "../nros-builtin-interfaces-diag", default-features = false }
