[package]
name = "nros-rcl-interfaces"
version = "1.2.2"
edition = "2021"

[features]
default = []
std = ["nros-core/std", "nros-serdes/std", "nros-builtin-interfaces/std"]

[dependencies]
# nros crates (patched to local via .cargo/config.toml during development)
nros-core = { version = "*", default-features = false }
nros-serdes = { version = "*", default-features = false }
heapless = "0.8"
nros-builtin-interfaces = { path = "../nros-builtin-interfaces", default-features = false }
