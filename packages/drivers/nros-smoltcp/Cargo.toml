[package]
name = "nros-smoltcp"
version = "0.5.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "smoltcp TCP/UDP network provider for nros (bare-metal systems)"

[lib]
name = "nros_smoltcp"

[features]
default = []
# Phase 204.2 — bump the smoltcp UDP socket-pool default to 4 (3 RTPS
# sockets/participant + 1 spare) for a bare-metal DDS/RTPS backend. Off by
# default: every shipped bare-metal board is brokered (zenoh/XRCE → 1 UDP),
# and bare-metal DDS over smoltcp is not built yet (Phase 175.B). A board that
# grows that path enables `nros-smoltcp/rtps` and the pool sizes itself — no
# per-example `NROS_SMOLTCP_MAX_UDP_SOCKETS` env.
rtps = []
# Phase 173.6 — expose the smoltcp socket layer through the
# `embedded-nal` `TcpClientStack` / `UdpClientStack` ecosystem traits
# (additive adapter over the existing C-ABI bridge ops).
embedded-nal = ["dep:embedded-nal", "dep:nb"]

[dependencies]
nros-platform-api = { version = "0.5.0", path = "../../core/nros-platform-api" }
# Phase 173.6 — optional `embedded-nal` adapter. `core::net`-based
# network-stack traits; `nb` for the non-blocking result type.
embedded-nal = { version = "0.9", optional = true }
nb = { version = "1", optional = true }
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet", "proto-ipv4", "socket-tcp", "socket-udp",
    # Phase 71.26 — IGMP for RTPS SPDP multicast (239.255.0.1:7400+).
    "multicast",
] }
# Phase 97.3.esp32-qemu — diagnostic counters use atomic fetch_add
# which `riscv32imc` (ESP32-C3) doesn't have natively. portable-atomic
# provides a polyfill via interrupt disable. Cortex-M targets get the
# native atomic instructions; both are safe.
#
# Phase 214.L.1 — `unsafe-assume-single-core` is only valid on single-core
# *bare-metal* targets without native CAS (riscv32imc, single-core
# Cortex-M). The host x86_64 target rejects it at compile time, which
# previously made `cargo test --lib` impossible. The split below keeps the
# feature on the bare-metal embedded targets the crate actually ships to
# and drops it everywhere else so unit tests run.
#
# Gate on `target_os = "none"` (bare-metal): hosted-OS ARM/RISC-V targets
# like `armv7a-nuttx-eabihf` (Cortex-A7 — native atomic CAS via LDREX/STREX
# AND an OS) are NOT single-core bare-metal MCUs, and portable-atomic
# rejects `unsafe-assume-single-core` there ("privileged instructions …
# obviously unavailable"). They use native atomics via the base dep below.
[target.'cfg(all(any(target_arch = "arm", target_arch = "riscv32"), target_os = "none"))'.dependencies]
portable-atomic = { version = "1", default-features = false, features = ["unsafe-assume-single-core"] }

[target.'cfg(not(all(any(target_arch = "arm", target_arch = "riscv32"), target_os = "none")))'.dependencies]
portable-atomic = { version = "1", default-features = false }
