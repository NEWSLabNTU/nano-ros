[package]
name = "nros-rmw-xrce-cffi"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Rust shim for nros-rmw-xrce — links the C XRCE backend + exposes the auto-register entry point"
publish = false
build = "build.rs"

[lib]
path = "src/lib.rs"
# Phase 154 (140 follow-up) — drop `staticlib` from the default crate-type
# list. Embedded Rust consumers (Zephyr xrce examples) depend on this
# crate as an rlib; cargo would otherwise also emit a `staticlib` variant
# on every build, and the staticlib emit needs a panic_handler resolved
# at compile time — which doesn't exist on no_std cross targets where
# the example's panic source (e.g. the `zephyr` crate) isn't visible to
# the xrce-cffi compile scope. The cmake/Corrosion path supplies
# `--crate-type=staticlib` (via `corrosion_import_crate(... CRATE_TYPES
# staticlib)`) on hosted builds and so still gets a `libnros_rmw_xrce_cffi.a`.
crate-type = ["rlib"]

[features]
default = []
# Phase 144.3 — enable when emitting this crate as a top-level
# `staticlib` against a hosted target (e.g. via
# `corrosion_import_crate(... CRATE_TYPES staticlib)` from the root
# CMake's xrce branch). The `staticlib` crate-type forces Cargo to
# resolve a panic strategy/handler at the cdylib boundary; toggling
# off `#![no_std]` pulls in libstd's unwinding handler so the build
# succeeds on POSIX hosts. Embedded consumers (RTOS) keep the
# default `no_std` build and supply their own panic handler at the
# top-level link step.
std = []

# Phase 129.C.1 — all `platform-<rtos>` features deleted. Build
# selection is `target_os`-driven; the platform-blind
# `transport_nros_udp.c` (added in 129.NET.3) covers every
# target. Consumers that used to pass `platform-posix` /
# `platform-zephyr` / etc. should simply drop the feature flag
# — the build script auto-detects from the cross-compile
# target.

[dependencies]
nros-rmw-cffi = { version = "0.5.0", path = "../../core/nros-rmw-cffi", default-features = false }

[build-dependencies]
cc = "1"

[lints]
workspace = true
