[package]
name = "nros-rmw-xrce-cffi"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Rust shim for nros-rmw-xrce — links the C XRCE backend + exposes the auto-register entry point"
publish = false
build = "build.rs"

[lib]
path = "src/lib.rs"

[features]
default = []

# Phase 115.K.2.5.1.0 — legacy single-axis selector. Equivalent to
# `platform-posix`; kept for backwards-compat with consumers that
# pulled the crate in via just `features = ["posix"]`.
posix = ["platform-posix"]

# Phase 115.K.2.5.1.3-zephyr — per-platform fanout for the
# `cc::Build` step. Exactly one must be enabled.
#
# `platform-posix` (linux / macos / *bsd hosts) compiles the
# vendored micro-XRCE-DDS-Client's POSIX transport TUs and emits
# `UCLIENT_PLATFORM_POSIX` in the generated config header. The
# generated header also keeps `UCLIENT_PROFILE_{UDP,TCP,SERIAL}` so
# the POSIX-side transport open functions resolve.
platform-posix = []

# Bare-metal / Zephyr / FreeRTOS / NuttX / ThreadX: skip every
# POSIX-specific TU and every `_POSIX_C_SOURCE` define. The
# generated `<uxr/client/config.h>` keeps
# `UCLIENT_PROFILE_{DISCOVERY,CUSTOM_TRANSPORT,STREAM_FRAMING}` (the
# core subset that compiles freestanding) and drops every
# `UCLIENT_PLATFORM_*` define. Embedded consumers MUST install a
# custom transport at runtime via
# `nros_rmw_cffi_set_custom_transport(...)` — the C backend's
# `udp` / `serial` / `tcp` openers all gate on POSIX headers.
platform-bare-metal = []
platform-freertos = []
platform-nuttx = []
platform-threadx = []

# `platform-zephyr` skips POSIX TUs, emits `UCLIENT_PLATFORM_ZEPHYR`,
# and compiles the Zephyr UDP custom-transport bridge over the
# canonical nros platform-net ABI.
platform-zephyr = []

[dependencies]
# Phase 128.B.3 — distributed-slice contribution for the RMW init section.
nros-rmw-cffi = { version = "0.1.0", path = "../../core/nros-rmw-cffi", default-features = false }
linkme = { version = "0.3", default-features = false }

[build-dependencies]
cc = "1"

[lints]
workspace = true
