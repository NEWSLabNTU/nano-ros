[package]
name = "xrce-sys"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "FFI bindings for Micro-XRCE-DDS-Client"
links = "xrce_client"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["xrce", "dds", "ros2", "ffi", "sys"]
categories = ["embedded", "no-std", "external-ffi-bindings", "network-programming"]

[features]
default = []
# Phase 129.D.2 — `xrce-platform-shim` retired. `uxr_millis` /
# `uxr_nanos` symbols come from
# `nros-rmw-xrce/src/platform_aliases.c` (compiled into
# `nros-rmw-xrce-cffi`). Per-platform features below are pure
# markers; no `dep:xrce-platform-shim` left.
posix = []
bare-metal = []
zephyr = []
freertos = []
nuttx = []
threadx = []
std = []

[dependencies]

[build-dependencies]
cc = "1.0"

[lints]
workspace = true
