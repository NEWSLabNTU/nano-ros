[package]
name = "nros-rmw-xrce"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "XRCE-DDS RMW backend for nros"

[features]
default = []
std = ["alloc", "nros-rmw/std", "xrce-sys/std"]
alloc = ["nros-rmw/alloc"]
# Platform-agnostic UDP transport via nros-platform
platform-udp = ["dep:nros-platform"]
# Platform features — each enables platform-udp automatically
platform-posix = ["xrce-sys/posix", "platform-udp", "nros-platform/platform-posix"]
platform-bare-metal = ["xrce-sys/bare-metal"]
platform-zephyr = ["xrce-sys/zephyr", "platform-udp", "nros-platform/platform-zephyr"]
platform-freertos = ["xrce-sys/freertos", "platform-udp", "nros-platform/platform-freertos"]
platform-nuttx = ["xrce-sys/nuttx", "platform-udp", "nros-platform/platform-nuttx"]
platform-threadx = ["xrce-sys/threadx", "platform-udp", "nros-platform/platform-threadx"]
# Backward compat alias (posix-udp → platform-posix)
posix-udp = ["platform-posix"]
posix-serial = ["platform-posix", "dep:libc"]
ffi-sync = ["dep:critical-section"]
# E2E safety protocol (CRC-32 + sequence tracking). Forwards to nros-rmw.
# When enabled, `Subscriber::try_recv_validated` is available; XRCE does
# not yet plumb per-sample info through the callback, so the validation
# result will always report `crc_valid: None` (see Phase 84.E1).
safety-e2e = ["nros-rmw/safety-e2e"]

[dependencies]
nros-rmw = { version = "0.1.0", path = "../../core/nros-rmw", default-features = false }
nros-platform = { version = "0.1.0", path = "../../core/nros-platform", default-features = false, optional = true }
xrce-sys = { version = "0.1.0", path = "../xrce-sys", default-features = false }
heapless = "0.8"
atomic-waker = { version = "1.1", default-features = false, features = ["portable-atomic"] }
libc = { version = "0.2", optional = true }
critical-section = { version = "1.2", optional = true }
