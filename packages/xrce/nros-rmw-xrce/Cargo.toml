[package]
name = "nros-rmw-xrce"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "XRCE-DDS RMW backend for nros"

[features]
default = []
platform-posix = ["xrce-sys/posix"]
platform-bare-metal = ["xrce-sys/bare-metal"]
platform-zephyr = ["xrce-sys/zephyr"]
platform-freertos = ["xrce-sys/freertos"]
platform-nuttx = ["xrce-sys/nuttx"]
platform-threadx = ["xrce-sys/threadx"]
posix-udp = ["platform-posix"]
posix-serial = ["platform-posix", "dep:libc"]

[dependencies]
nros-rmw = { path = "../../core/nros-rmw", default-features = false }
xrce-sys = { path = "../xrce-sys", default-features = false }
heapless = "0.8"
libc = { version = "0.2", optional = true }
