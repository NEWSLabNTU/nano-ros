[package]
name = "xrce-platform-shim"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Thin forwarders from XRCE-DDS C symbols to nros-platform traits"

[features]
default = []

# Activates the shim symbols. Set by xrce-sys when a platform is selected.
active = []

# Networking via smoltcp (bare-metal)
smoltcp = []

[dependencies]
nros-platform = { version = "0.1.0", path = "../../core/nros-platform", default-features = false }

[lints]
workspace = true
