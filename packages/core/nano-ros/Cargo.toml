[package]
name = "nano-ros"
version = "0.1.0"
edition = "2024"
description = "Unified ROS 2 client library for embedded systems"
license = "Apache-2.0"
keywords = ["ros", "ros2", "embedded", "no_std"]
categories = ["embedded", "no-std", "robotics"]

[features]
default = ["std", "zenoh", "ros-humble"]
std = [
    "alloc",  # std implies alloc
    "nano-ros-core/std",
    "nano-ros-node/std",
    "nano-ros-transport/std",
    "nano-ros-params/std",
]
alloc = [
    "nano-ros-core/alloc",
    "nano-ros-node/alloc",
    "nano-ros-transport/alloc",
    "nano-ros-params/alloc",
]
zenoh = [
    "nano-ros-node/zenoh",
    "nano-ros-transport/zenoh",
]

# ROS edition feature flags
ros-humble = ["nano-ros-node/ros-humble"]
ros-iron = ["nano-ros-node/ros-iron"]

# Platform backends (select one)
platform-posix = ["nano-ros-node/platform-posix", "nano-ros-transport/platform-posix"]
platform-zephyr = ["nano-ros-node/platform-zephyr", "nano-ros-transport/platform-zephyr"]
platform-bare-metal = ["nano-ros-node/platform-bare-metal", "nano-ros-transport/platform-bare-metal"]

# Executor modes
rtic = ["nano-ros-node/rtic"]
polling = ["nano-ros-node/polling"]

[dependencies]
# Core functionality (default-features = false for no_std support)
nano-ros-core = { path = "../nano-ros-core", default-features = false }
nano-ros-macros = { path = "../nano-ros-macros" }
nano-ros-node = { path = "../nano-ros-node", default-features = false }
nano-ros-transport = { path = "../nano-ros-transport", default-features = false }
nano-ros-params = { path = "../nano-ros-params", default-features = false }

[dev-dependencies]

[package.metadata.docs.rs]
all-features = true
