[package]
name = "nros-c"
version.workspace = true
publish = false
edition = "2024"
description = "C API for nros - rclc-compatible interface for embedded systems"
license = "Apache-2.0"
repository.workspace = true
keywords = ["ros", "ros2", "embedded", "c", "ffi"]
categories = ["embedded", "robotics", "api-bindings"]
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"

[lib]
crate-type = ["staticlib", "cdylib", "lib"]

[features]
default = ["std"]
std = ["alloc", "nros/std", "nros-node/std", "nros-rmw/std"]
alloc = ["nros/alloc", "nros-node/alloc", "nros-rmw/alloc"]

# RMW backend (cffi vtable dispatch) — every backend ships as a cffi
# shim that installs a C vtable into `nros-rmw-cffi`'s runtime
# registry. Each backend's standalone staticlib (`libnros_rmw_<x>.a`)
# carries a `.init_array` ctor (phase 104.A) that runs its register fn
# before `main()` on POSIX / macOS / Windows. `nros-c` does NOT pin a
# specific RMW.
rmw-cffi = ["nros/rmw-cffi"]

# Phase 124.A — opt in to the zero-copy publisher loan / subscriber
# borrow surface (`nros_publisher_loan` / `_commit` / `_discard` /
# `nros_subscription_borrow` / `_release`). Threads the
# `nros-rmw-cffi/lending` cargo bound through.
lending = ["rmw-cffi", "nros/lending"]

# Phase 248 (C3.2) — the concrete-RMW shim features (`cffi-xrce-c` /
# `cffi-zenoh-cffi` / `cffi-dds-cffi`) and the optional concrete-backend
# deps (`nros-rmw-zenoh`, `nros-rmw-xrce-cffi`) are RETIRED. nros-c is
# now RMW-agnostic at the Cargo level: it carries ONLY the generic
# `rmw-cffi` vtable. The concrete backend is brought into the link graph
# by the BOARD the C entry links (cmake `nano_ros_entry` + `NANO_ROS_RMW`
# → `nano_ros_link_rmw()` pulls the matching standalone
# `libnros_rmw_<x>.a`), or — for Zephyr's in-tree staticlib path — by a
# sibling `nros-rmw-<x>-cffi-staticlib` cargo build whose
# `nros_rmw_<x>_register` C symbol resolves at the final link step. One
# `libnros_c.a` per target triple covers every backend. See ARCHITECTURE
# §2 "Agnosticism contract" + issue #60.

# XRCE transport refinements (functional — select the XRCE transport
# build of the linked backend; not an RMW-backend selector).
xrce-udp = ["nros/xrce-udp"]
xrce-serial = ["nros/xrce-serial"]

# Functional capability — install the Rust `#[global_allocator]` routing
# through the platform vtable (`nros_platform_alloc`/`_dealloc`). Phase 248:
# replaces the per-platform `#[global_allocator]` cfg in lib.rs so the crate
# stays platform-agnostic. Enabled by RTOS ports whose kernel owns the
# unified heap and that don't bring an external allocator (zephyr-lang-rust
# etc.); the concrete allocator lives behind the vtable. Mirrors
# nros-platform's `global-allocator`.
global-allocator = ["alloc"]

# Functional capability — register the `critical_section::Impl` backed by
# the platform vtable (`nros_platform_critical_section_{acquire,release}`).
# Phase 248: replaces the `platform-zephyr` cfg on the critical-section
# block. Mirrors nros-platform's `critical-section`.
critical-section = ["dep:critical-section"]

# Phase 248 (C3.2) — the `platform-{posix,zephyr,freertos,nuttx,threadx}`
# feature DECLARATIONS are RETIRED. nros-c is platform-agnostic: its src
# reaches the platform exclusively through the `nros-platform-cffi` vtable
# (alloc / critical-section / wake), with NO `#[cfg(feature="platform-*")]`
# branches (C3.1). The concrete platform impl is brought into the link
# graph by the BOARD the C entry links (cmake), not a feature on nros-c.
# The capability features the legacy platform-* forwarded — `alloc`,
# `global-allocator`, `critical-section` — are now enabled DIRECTLY by
# whoever needs the no_std staticlib (the board/cmake link or Zephyr's
# in-tree build path). See ARCHITECTURE §2 "Agnosticism contract".

# ROS edition (orthogonal to RMW and platform)
ros-humble = ["nros/ros-humble"]
ros-iron = ["nros/ros-iron"]

# Bare-metal panic handler (enables building staticlib without std)
panic-halt = ["dep:panic-halt"]

# Opt-in instrumentation of the RTOS Rust global allocator (FreeRTOS
# pvPortMalloc / ThreadX z_malloc / Zephyr k_malloc). Tracks used/peak
# bytes routed through the Rust `#[global_allocator]` and exposes them via
# `nros_heap_used_bytes()` / `nros_heap_peak_bytes()`. Mirrors zpico-alloc's
# bare-metal `stats` feature. NOTE: counts only the Rust allocator's
# footprint — zenoh-pico's direct C-side z_malloc/pvPortMalloc traffic is not
# included (see issue #6).
alloc-stats = ["dep:zpico-alloc", "zpico-alloc/stats"]

# Expose ROS 2 parameter services (~/get_parameters, ~/set_parameters, etc.)
# via `nros_executor_register_parameter_services`. Requires alloc for boxed
# service responses.
param-services = ["alloc", "nros/param-services", "nros-node/param-services"]

# Expose ROS 2 lifecycle services (~/change_state, ~/get_state, etc. — REP-2002)
# via `nros_executor_register_lifecycle_services`. Requires alloc for boxed
# service responses.
lifecycle-services = ["alloc", "nros/lifecycle-services", "nros-node/lifecycle-services"]

[dependencies]
nros = { version = "0.5.0", path = "../nros", default-features = false }
nros-node.workspace = true
nros-rmw.workspace = true
nros-core.workspace = true
# Phase 88.12 — `nros_node_get_logger` returns a `&'static nros_log::Logger`
# resolved via the facade's intern table.
nros-log = { workspace = true }
# Phase 248 (C3.2) — `nros-rmw-zenoh` / `nros-rmw-xrce-cffi` concrete-backend
# deps removed. nros-c is RMW-agnostic; the concrete backend is linked by the
# board / Zephyr staticlib path, not pulled into `libnros_c.a`'s Rust graph.
# Opt-in RTOS heap-usage counter (HeapStats), gated by `alloc-stats`.
zpico-alloc = { path = "../../zpico/zpico-alloc", optional = true, default-features = false }
paste = "1"
panic-halt = { version = "1", optional = true }
# critical-section impl provided by the Zephyr alloc module on
# platform-zephyr. DDS + portable-atomic depend on it being set.
#
# Same gating as nros-cpp/Cargo.toml — restore-state-u32 is only safe
# on real Cortex-M Zephyr; native_sim x86 needs to fall back to
# DDS[std]'s restore-state-bool.
critical-section = { version = "1.1", optional = true }
# Phase 212.M.7 — riscv32imc (esp32c3 under ESP-IDF) has no hardware
# atomics. `core::sync::atomic::AtomicBool::compare_exchange` is gated
# behind `target_has_atomic = "ptr"` and unresolved on that target.
# `portable_atomic::AtomicBool` polyfills via the
# `portable_atomic_unsafe_assume_single_core` cfg (set by the ESP-IDF
# integration shell on single-core riscv targets) or a `critical-
# section` impl.
portable-atomic = { version = "1", default-features = false }

[target.'cfg(target_arch = "arm")'.dependencies]
critical-section = { version = "1.1", optional = true, features = ["restore-state-u32"] }

# AArch64 Zephyr (Phase 117.10/13) — DAIF mask used by
# `nros_zephyr_irq_{lock,unlock}` is a 32-bit value, same width as the
# armv7 path above.
[target.'cfg(target_arch = "aarch64")'.dependencies]
critical-section = { version = "1.1", optional = true, features = ["restore-state-u32"] }

[build-dependencies]
nros-build-helpers = { workspace = true }
# Phase 77.25: same reason as nros-cpp — force nros to compile before
# this build.rs runs so the size probe has a rlib to read.
nros = { version = "0.5.0", path = "../nros", default-features = false }

# Phase 248 (C3.2) — with `platform-*` retired, nros-c no longer self-pulls a
# platform backend, so its native unit tests (which drive the executor →
# `nros_platform_wake_*` / alloc vtable) have no `nros_platform_*` symbol
# provider. Link the POSIX C port (`nros-platform-posix/src/platform.c`) for
# host test binaries via `nros-platform-cffi[posix-c-port]`. Mirrors
# nros-node's host-gated test-dep pattern. Target-gated to
# `cfg(not(target_os = "none"))` so the `posix-c-port` (+ `cc`) closure never
# leaks into embedded (`target_os = "none"`) feature unification — keeping the
# production graph platform-agnostic.
[target.'cfg(not(target_os = "none"))'.dev-dependencies]
nros-platform-cffi = { version = "0.5.0", path = "../nros-platform-cffi", default-features = false, features = ["posix-c-port"] }
nros-platform = { workspace = true, default-features = false, features = ["platform-posix"] }

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true
