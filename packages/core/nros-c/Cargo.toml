[package]
name = "nros-c"
version = "0.1.0"
edition = "2024"
description = "C API for nros - rclc-compatible interface for embedded systems"
license = "Apache-2.0"
keywords = ["ros", "ros2", "embedded", "c", "ffi"]
categories = ["embedded", "robotics", "api-bindings"]

[lib]
crate-type = ["staticlib", "cdylib"]

[features]
default = ["std", "platform-posix"]
std = ["alloc", "nros/std", "nano-ros-transport/std"]
alloc = ["nros/alloc", "nano-ros-transport/alloc"]

# Platform backends (select one)
platform-posix = ["nros/platform-posix", "nano-ros-transport/platform-posix"]
platform-zephyr = ["nros/platform-zephyr", "nano-ros-transport/platform-zephyr"]

[dependencies]
nros = { path = "../nros", default-features = false }
nano-ros-transport = { path = "../nano-ros-transport", default-features = false }
nros-core = { path = "../nros-core", default-features = false }
paste = "1"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[package.metadata.docs.rs]
all-features = true
