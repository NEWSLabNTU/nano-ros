[package]
name = "nros-c"
version = "0.1.0"
edition = "2024"
description = "C API for nros - rclc-compatible interface for embedded systems"
license = "Apache-2.0"
keywords = ["ros", "ros2", "embedded", "c", "ffi"]
categories = ["embedded", "robotics", "api-bindings"]

[lib]
crate-type = ["staticlib", "cdylib"]

[features]
default = ["std"]
std = ["alloc", "nros/std", "nros-rmw/std", "nros-rmw-zenoh?/std"]
alloc = ["nros/alloc", "nros-rmw/alloc"]

# RMW backend (currently only zenoh is supported for the C API)
rmw-zenoh = ["nros/rmw-zenoh", "dep:nros-rmw-zenoh"]

# Platform backends (select one — orthogonal to RMW and ROS version)
platform-posix = ["nros/platform-posix", "nros-rmw-zenoh?/platform-posix"]
platform-zephyr = ["nros/platform-zephyr", "nros-rmw-zenoh?/platform-zephyr"]

# ROS edition (orthogonal to RMW and platform)
ros-humble = ["nros/ros-humble"]
ros-iron = ["nros/ros-iron"]

[dependencies]
nros = { path = "../nros", default-features = false }
nros-rmw = { path = "../nros-rmw", default-features = false }
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, optional = true }
nros-core = { path = "../nros-core", default-features = false }
paste = "1"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[package.metadata.docs.rs]
all-features = true
