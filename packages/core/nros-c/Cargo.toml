[package]
name = "nros-c"
version = "0.1.0"
edition = "2024"
description = "C API for nros - rclc-compatible interface for embedded systems"
license = "Apache-2.0"
repository.workspace = true
keywords = ["ros", "ros2", "embedded", "c", "ffi"]
categories = ["embedded", "robotics", "api-bindings"]
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"

[lib]
crate-type = ["staticlib", "cdylib", "lib"]

[features]
default = ["std"]
std = ["alloc", "nros/std", "nros-node/std", "nros-rmw/std"]
alloc = ["nros/alloc", "nros-node/alloc", "nros-rmw/alloc"]

# RMW backend (cffi vtable dispatch) — every backend ships as a cffi
# shim that installs a C vtable into `nros-rmw-cffi`'s runtime
# registry. Each backend's standalone staticlib (`libnros_rmw_<x>.a`)
# carries a `.init_array` ctor (phase 104.A) that runs its register fn
# before `main()` on POSIX / macOS / Windows. `nros-c` does NOT pin a
# specific RMW.
rmw-cffi = ["nros/rmw-cffi"]

# Phase 123.A.11 — `cffi-xrce-c` / `cffi-dds-cffi` / `cffi-zenoh-cffi`
# DELETED. They previously selected which `extern fn
# nros_rmw_<x>_register()` call site got compiled into
# `nros_support_init`. The auto-register pattern in each backend's
# wrapper staticlib makes nros-c truly RMW-agnostic — one
# `libnros_c.a` per target triple covers every backend.
#
# Compatibility shims: keep the feature names as no-op aliases of
# `rmw-cffi` so downstream CMake glue that still passes them doesn't
# error. To be deleted along with the CMake glue once external
# consumers migrate.
cffi-xrce-c = ["rmw-cffi"]
cffi-dds-cffi = ["rmw-cffi"]
cffi-zenoh-cffi = ["rmw-cffi"]

# Zenoh transport refinements (require rmw-zenoh-cffi)
link-tcp = ["nros/link-tcp"]
link-udp-unicast = ["nros/link-udp-unicast"]

# XRCE transport refinements (require rmw-xrce-cffi)
xrce-udp = ["nros/xrce-udp"]
xrce-serial = ["nros/xrce-serial"]

# Platform backends (select one — orthogonal to RMW and ROS version).
# Embedded platforms imply `alloc` so the per-platform
# `#[global_allocator]` modules in lib.rs compile without the build
# script having to remember to pass `,alloc` alongside
# `platform-<rtos>`.
platform-posix = ["nros/platform-posix"]
platform-zephyr = ["alloc", "nros/platform-zephyr", "dep:critical-section"]
platform-freertos = ["alloc", "nros/platform-freertos"]
platform-nuttx = ["alloc", "nros/platform-nuttx"]
platform-threadx = ["alloc", "nros/platform-threadx"]

# ROS edition (orthogonal to RMW and platform)
ros-humble = ["nros/ros-humble"]
ros-iron = ["nros/ros-iron"]

# Bare-metal panic handler (enables building staticlib without std)
panic-halt = ["dep:panic-halt"]

# Expose ROS 2 parameter services (~/get_parameters, ~/set_parameters, etc.)
# via `nros_executor_register_parameter_services`. Requires alloc for boxed
# service responses.
param-services = ["alloc", "nros/param-services", "nros-node/param-services"]

# Expose ROS 2 lifecycle services (~/change_state, ~/get_state, etc. — REP-2002)
# via `nros_executor_register_lifecycle_services`. Requires alloc for boxed
# service responses.
lifecycle-services = ["alloc", "nros/lifecycle-services", "nros-node/lifecycle-services"]

[dependencies]
nros = { version = "0.1.0", path = "../nros", default-features = false }
nros-node.workspace = true
nros-rmw.workspace = true
nros-core.workspace = true
paste = "1"
panic-halt = { version = "1", optional = true }
# critical-section impl provided by the Zephyr alloc module on
# platform-zephyr. dust-dds + portable-atomic depend on it being set.
#
# Same gating as nros-cpp/Cargo.toml — restore-state-u32 is only safe
# on real Cortex-M Zephyr; native_sim x86 needs to fall back to
# dust-dds[std]'s restore-state-bool.
critical-section = { version = "1.1", optional = true }

[target.'cfg(target_arch = "arm")'.dependencies]
critical-section = { version = "1.1", optional = true, features = ["restore-state-u32"] }

# AArch64 Zephyr (Phase 117.10/13) — DAIF mask used by
# `nros_zephyr_irq_{lock,unlock}` is a 32-bit value, same width as the
# armv7 path above.
[target.'cfg(target_arch = "aarch64")'.dependencies]
critical-section = { version = "1.1", optional = true, features = ["restore-state-u32"] }

[build-dependencies]
cbindgen = "0.29"
nros-sizes-build = { workspace = true }
# Phase 77.25: same reason as nros-cpp — force nros to compile before
# this build.rs runs so the size probe has a rlib to read.
nros = { version = "0.1.0", path = "../nros", default-features = false }

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true
