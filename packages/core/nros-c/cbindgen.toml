# cbindgen configuration for nros-c — generates include/nros/nros_generated.h.

language = "C"
header = """/**
 * nros C API — auto-generated type definitions and function declarations.
 *
 * AUTO-GENERATED — DO NOT EDIT MANUALLY.
 *
 * This header is the single source of truth for all nros C API types.
 * Individual headers (publisher.h, executor.h, etc.) include this file.
 *
 * Copyright 2024 nros contributors
 * Licensed under Apache-2.0
 */

#include <stdarg.h>
#include <stdbool.h>
#include <stdint.h>
#include <stddef.h>

#include "nros/visibility.h"
#include "nros/nros_config_generated.h"

/* Forward declarations for callback typedefs that reference these
 * structs before they appear in source-order output. Without these,
 * gcc treats `struct nros_timer_t *` inside a callback parameter list
 * as a parameter-local incomplete type that doesn't match the later
 * file-scope struct definition. */
#ifdef __cplusplus
extern "C" {
#endif
struct nros_executor_t;
struct nros_node_t;
struct nros_publisher_t;
struct nros_subscription_t;
struct nros_service_t;
struct nros_client_t;
struct nros_timer_t;
struct nros_guard_condition_t;
struct nros_action_server_t;
struct nros_action_client_t;
struct nros_lifecycle_state_machine_t;
struct nros_support_t;
struct nros_clock_t;
struct nros_parameter_t;
struct nros_param_server_t;
struct nros_goal_handle_t;
struct nros_goal_uuid_t;
#ifdef __cplusplus
}
#endif
"""
include_guard = "NROS_GENERATED_H"
autogen_warning = "/* Warning: this file is autogenerated. Don't modify this manually. */"
include_version = false
no_includes = true
cpp_compat = true

# Map usize to size_t (not uintptr_t)
usize_is_size_t = true

[defines]
# Don't map features to C #ifdef — we want all types unconditionally
# cbindgen includes items with unknown cfg values by default

[export]
# Prefix for exported item names (not needed — Rust names already have nros_ prefix)
#
# *_OPAQUE_U64S consts are excluded so that the real, feature-aware
# values from `nros_config_generated.h` (emitted by build.rs) win
# unambiguously. Letting cbindgen emit them would either #define them
# to placeholder values (when running without features) or skip them
# silently (when the value is a `u64s_for::<T>()` expression cbindgen
# can't evaluate) — both cases produced a header that referenced
# undefined or wrong-valued macros.
exclude = [
    "SESSION_OPAQUE_U64S",
    "PUBLISHER_OPAQUE_U64S",
    "GUARD_HANDLE_OPAQUE_U64S",
    "EXECUTOR_OPAQUE_U64S",
    "NROS_LIFECYCLE_CTX_OPAQUE_U64S",
]

[export.rename]
# Map Rust constant names (without prefix) to C names (with NROS_ prefix)
"MAX_LOCATOR_LEN" = "NROS_MAX_LOCATOR_LEN"
"MAX_NAME_LEN" = "NROS_MAX_NAME_LEN"
"MAX_NAMESPACE_LEN" = "NROS_MAX_NAMESPACE_LEN"
"MAX_TOPIC_LEN" = "NROS_MAX_TOPIC_LEN"
"MAX_SERVICE_NAME_LEN" = "NROS_MAX_SERVICE_NAME_LEN"
"MAX_ACTION_NAME_LEN" = "NROS_MAX_ACTION_NAME_LEN"
"MAX_TYPE_NAME_LEN" = "NROS_MAX_TYPE_NAME_LEN"
"MAX_TYPE_HASH_LEN" = "NROS_MAX_TYPE_HASH_LEN"

[fn]
rename_args = "None"
# Add NROS_PUBLIC visibility attribute to all function declarations
prefix = "NROS_PUBLIC"

[struct]
rename_fields = "None"

[enum]
rename_variants = "None"

[parse]
parse_deps = false
# Remove extern blocks from output (we only want type definitions and fn declarations)
clean = true

# NOTE: `[parse.expand]` would let cbindgen expand `paste!` macros so the
# `unsafe extern "C" fn` declarations they generate (e.g.
# nros_param_set_{bool,integer,double}) appear in the C header. It
# requires nightly Rust (`-Zunpretty=expanded`), so we leave it disabled
# and keep those specific function declarations hand-written in
# parameter.h. Re-enable here if the project ever moves to nightly.
# [parse.expand]
# crates = ["nros-c"]
