[package]
name = "nros-macros"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Proc macros for nros message type generation"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "macros", "embedded", "no-std"]
categories = ["embedded", "no-std", "development-tools"]

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }
# Phase 212.N.9 — `nros::main!()` proc-macro family. The macro needs:
#   * `toml` to parse the Entry pkg's `Cargo.toml`
#     (`[package.metadata.nros.entry] deploy = "<board>"`) and the
#     bringup pkg's `system.toml` (`[system] default_launch = "..."`).
#   * the workspace pkg-index walk (`nros-pkg-index`) + ROS 2 launch.xml parser
#     (`nros-launch-parser`) — the two leaf crates the macro needs. phase-262
#     (issue 0083): the macro used to dep `nros-build`, which pulls ALL of
#     nros-cli-core (planner/codegen/orchestration + the ros-launch-manifest
#     submodule) just for these two self-contained modules. Depending on the
#     leaves directly drops the whole CLI from every nros/nros-c/app build. The
#     paths cross into the `packages/cli/` sub-workspace — fine: a path dep groups
#     by lockfile, not visibility, and proc-macro deps are host-only at the
#     consumer's compile time.
toml = "0.8"
nros-pkg-index = { path = "../../cli/nros-pkg-index" }
nros-launch-parser = { path = "../../cli/nros-launch-parser" }
# Phase 228.G — shared per-tier schema + resolver. Same crate the CLI's
# codegen-system uses, so the macro's compile-time tier resolution can't drift
# from the bake path (RFC-0032 §6). Proc-macro deps are host-only.
nros-orchestration-ir = { workspace = true }
# RFC-0052 / phase-296 R2 — `model = "..."` arm: parse a play_launch-resolved
# SystemModel at compile time (the canonical bake input). Same vendored crate
# the CLI uses; path crosses into the cli sub-workspace (host-only proc-macro
# dep, same rationale as nros-pkg-index / nros-launch-parser above).
ros-launch-manifest-model = { path = "../../cli/third-party/ros-launch-manifest/model" }

[lints]
workspace = true
