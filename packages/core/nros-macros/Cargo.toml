[package]
name = "nros-macros"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Proc macros for nros message type generation"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "macros", "embedded", "no-std"]
categories = ["embedded", "no-std", "development-tools"]

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }
# Phase 212.N.9 — `nros::main!()` proc-macro family. The macro needs:
#   * `toml` to parse the Entry pkg's `Cargo.toml`
#     (`[package.metadata.nros.entry] deploy = "<board>"`) and the
#     bringup pkg's `system.toml` (`[system] default_launch = "..."`).
#   * `nros-build` for the shared workspace pkg-index walk + ROS 2
#     launch.xml parser landed in N.10 + N.11. The standalone nros-cli repo
#     was merged in-tree at `packages/cli/` (post-Phase-218); this is the
#     in-tree path dep (the archived git dep is retired — always use in-tree).
#     The path crosses into the `packages/cli/` sub-workspace, which is fine:
#     a path dep groups by lockfile, not dep visibility. Proc-macro crates can
#     carry arbitrary deps because they run at the consumer's compile time.
toml = "0.8"
nros-build = { path = "../../cli/nros-build" }
# Phase 228.G — shared per-tier schema + resolver. Same crate the CLI's
# codegen-system uses, so the macro's compile-time tier resolution can't drift
# from the bake path (RFC-0032 §6). Proc-macro deps are host-only.
nros-orchestration-ir = { workspace = true }

[lints]
workspace = true
