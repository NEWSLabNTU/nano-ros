[package]
name = "nros-macros"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Proc macros for nros message type generation"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "macros", "embedded", "no-std"]
categories = ["embedded", "no-std", "development-tools"]

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }
# Phase 212.N.9 — `nros::main!()` proc-macro family. The macro needs:
#   * `toml` to parse the Entry pkg's `Cargo.toml`
#     (`[package.metadata.nros.entry] deploy = "<board>"`) and the
#     bringup pkg's `system.toml` (`[system] default_launch = "..."`).
#   * `nros-build` for the shared workspace pkg-index walk + ROS 2
#     launch.xml parser landed in N.10 + N.11. Originally a git dep on
#     the standalone nros-cli repo; post-Phase-218 that repo is archived
#     (CLI merged in-tree at `packages/cli/`). The git dep below still
#     resolves (archived repos remain readable) but should migrate to a
#     `path = "../../cli/..."` once the workspace shape is sorted.
#     Proc-macro crates can carry arbitrary deps because they run at
#     the consumer's compile time on the host.
toml = "0.8"
nros-build = { git = "https://github.com/NEWSLabNTU/nros-cli.git", branch = "main" }
# Phase 228.G — shared per-tier schema + resolver. Same crate the CLI's
# codegen-system uses, so the macro's compile-time tier resolution can't drift
# from the bake path (RFC-0032 §6). Proc-macro deps are host-only.
nros-orchestration-ir = { workspace = true }

[lints]
workspace = true
