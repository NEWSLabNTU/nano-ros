[package]
name = "nros-platform-threadx"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "[deprecated] Rust FFI bridge to ThreadX — use `nros-platform-threadx-c` (native C port covering the canonical ABI)."
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["embedded", "threadx", "platform", "rtos", "no-std"]
categories = ["embedded", "no-std", "os"]

[features]
default = []
# Phase 97.4.threadx — register a `critical_section::Impl` against
# the active port's interrupt-disable primitive. dust-dds's
# `MpscReceiverFuture` / `OneshotReceiver` poll paths reference
# `_critical_section_1_0_*` symbols; on no_std ThreadX targets
# (qemu-riscv64) the example crate enables this feature so the
# symbols resolve at link time. ThreadX-Linux uses POSIX threads
# and gets the std impl from the `critical-section` crate's `std`
# feature instead, so this is opt-in.
critical-section = ["dep:critical-section"]

# Phase 110.D — opt in to ThreadX-SMP affinity wiring.
# `_tx_thread_smp_core_exclude` only exists in ThreadX builds with
# `TX_THREAD_SMP=y`. Single-core ThreadX (most QEMU + ThreadX-Linux)
# leaves the symbol unresolved, so leave the call out by default.
threadx-smp = []

# Phase 121.2 — emit the canonical `nros_platform_*` C ABI symbols.
cffi-export = ["dep:nros-platform-cffi"]

[dependencies]
nros-platform-api = { version = "0.1.0", path = "../nros-platform-api" }
nros-platform-cffi = { version = "0.1.0", path = "../nros-platform-cffi", optional = true }
# Bindgen-generated NetX Duo BSD socket FFI (struct nx_bsd_sockaddr_in, nx_bsd_* functions)
threadx-netx-sys = { path = "../../drivers/threadx-netx-sys" }
# Phase 97.4.threadx — `critical_section::Impl` for no_std ThreadX
# targets. Restore-state is a `u8`; nesting depth is encoded as the
# RISC-V `mstatus.MIE` bit so re-enabling only happens at the
# outermost release.
critical-section = { version = "1.2", optional = true, features = ["restore-state-u8"] }

[lints]
workspace = true
