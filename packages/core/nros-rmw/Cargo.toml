[package]
name = "nros-rmw"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "RMW abstraction layer for nros (middleware-agnostic traits)"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "rmw", "middleware", "embedded", "no-std"]
categories = ["embedded", "no-std", "network-programming"]

[features]
# Default: no-std. Depending crates that want `std` must opt in
# explicitly (matches nros-core). Previously `default = ["std"]`, which
# required `default-features = false` on every `no_std` downstream.
default = []
std = ["nros-core/std", "log"]
alloc = ["nros-core/alloc"]

# Synchronization backends (mutually exclusive for mutex implementation)
# Default: spin::Mutex (works everywhere, but not RTIC-compatible)
sync-spin = ["dep:spin"]
# Critical section: uses cortex_m::interrupt::free (RTIC-compatible)
sync-critical-section = ["dep:critical-section"]

# Logging
log = ["dep:log"]

# E2E safety protocol (CRC-32 + sequence tracking)
safety-e2e = []

# Marker for backends that support native slot lending (zero-copy publish
# / borrow). Backends that opt in expose SlotLending / SlotBorrowing trait
# impls; nros-node's EmbeddedRawPublisher / RawSubscription select between
# native lend and the arena fallback at compile time via this flag.
# Phase 95.
lending = []

[dependencies]
nros-core = { workspace = true, default-features = false }
# Phase 248 (C2) — `type_descriptor` seam passes the message's static
# field schema (`nros_serdes::schema::{Field, Message}`) across the
# generic descriptor-registration hook. no_std + alloc-free.
nros-serdes = { workspace = true, default-features = false }
heapless = { workspace = true }

# Synchronization backends (optional)
spin = { version = "0.9", optional = true, default-features = false, features = ["mutex", "spin_mutex"] }
critical-section = { version = "1.1", optional = true }

# Logging
log = { workspace = true, optional = true }

[dev-dependencies]
nros-ghost-types = { path = "../../verification/nros-ghost-types" }

[lints]
workspace = true
