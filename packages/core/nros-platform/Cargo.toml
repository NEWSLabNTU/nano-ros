[package]
name = "nros-platform"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Unified platform abstraction traits for nros"

[features]
default = ["std"]
std = []

# Platform backends (select one)
platform-posix = ["dep:nros-platform-posix"]
platform-cffi = ["dep:nros-platform-cffi"]
platform-mps2-an385 = ["dep:nros-platform-mps2-an385"]
platform-stm32f4 = ["dep:nros-platform-stm32f4"]
platform-esp32 = ["dep:nros-platform-esp32"]
platform-esp32-qemu = ["dep:nros-platform-esp32-qemu"]
platform-nuttx = ["dep:nros-platform-nuttx"]
platform-freertos = ["dep:nros-platform-freertos"]
platform-threadx = ["dep:nros-platform-threadx"]
platform-zephyr = ["dep:nros-platform-zephyr"]

# Capability features — enabled by RMW shims to declare requirements
alloc = []
threading = []

[dependencies]
# Trait definitions live in this standalone crate so platform crates can
# impl them without creating a cycle back through nros-platform.
nros-platform-api = { version = "0.1.0", path = "../nros-platform-api" }
nros-platform-posix = { version = "0.1.0", path = "../nros-platform-posix", optional = true }
nros-platform-cffi = { version = "0.1.0", path = "../nros-platform-cffi", optional = true }
nros-platform-mps2-an385 = { version = "0.1.0", path = "../../boards/nros-platform-mps2-an385", optional = true }
nros-platform-stm32f4 = { version = "0.1.0", path = "../../boards/nros-platform-stm32f4", optional = true }
nros-platform-esp32 = { version = "0.1.0", path = "../../boards/nros-platform-esp32", optional = true }
nros-platform-esp32-qemu = { version = "0.1.0", path = "../../boards/nros-platform-esp32-qemu", optional = true }
nros-platform-nuttx = { version = "0.1.0", path = "../nros-platform-nuttx", optional = true }
nros-platform-freertos = { version = "0.1.0", path = "../nros-platform-freertos", optional = true }
nros-platform-threadx = { version = "0.1.0", path = "../nros-platform-threadx", optional = true }
nros-platform-zephyr = { version = "0.1.0", path = "../nros-platform-zephyr", optional = true }
