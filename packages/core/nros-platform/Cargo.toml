[package]
name = "nros-platform"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Unified platform abstraction traits for nros"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["embedded", "no-std", "rtos", "platform-abstraction"]
categories = ["embedded", "no-std", "os"]

[features]
default = ["std"]
std = []

# Platform backends (select one)
platform-posix = ["dep:nros-platform-posix"]
# `platform-cffi` selects `CffiPlatform` as the `ConcretePlatform` —
# every Rust trait call dispatches through the canonical
# `nros_platform_*` C symbols, which something else in the binary
# must supply (a C platform port, or a separately-built Rust platform
# crate with `cffi-export` on).
platform-cffi = ["dep:nros-platform-cffi"]
# Phase 121.2 — `cffi-export` is *orthogonal* to platform selection:
# turn it on alongside any `platform-<rtos>` feature to publish the
# canonical `nros_platform_*` C symbols from that crate's trait impl
# via `nros-platform-cffi`'s `nros_platform_export!` macro. Optional
# deps that aren't pulled in are silently ignored by the `?` syntax.
cffi-export = [
    "nros-platform-posix?/cffi-export",
    "nros-platform-freertos?/cffi-export",
    "nros-platform-nuttx?/cffi-export",
    "nros-platform-threadx?/cffi-export",
    "nros-platform-zephyr?/cffi-export",
    "nros-platform-mps2-an385?/cffi-export",
    "nros-platform-stm32f4?/cffi-export",
    "nros-platform-esp32?/cffi-export",
    "nros-platform-esp32-qemu?/cffi-export",
    "nros-platform-orin-spe?/cffi-export",
]
platform-mps2-an385 = ["dep:nros-platform-mps2-an385"]
platform-stm32f4 = ["dep:nros-platform-stm32f4"]
platform-esp32 = ["dep:nros-platform-esp32"]
platform-esp32-qemu = ["dep:nros-platform-esp32-qemu"]
# Phase 121.3.deprecate-rust-migrate (in progress): the four RTOS
# platform features now resolve to `CffiPlatform` and rely on the
# deprecated Rust kernel crate's `cffi-export` feature to supply the
# canonical `nros_platform_*` C symbols. Same runtime behaviour, one
# extra indirection through `extern "C"`; consumers that switch off
# this dep + link a hand-written C port (or the corresponding
# `nros-platform-<rtos>-c` static lib) flip the symbol provider
# transparently. The Rust crate dep stays until consumers migrate.
platform-nuttx = [
    "dep:nros-platform-nuttx",
    "dep:nros-platform-cffi",
    "nros-platform-nuttx/cffi-export",
]
platform-freertos = [
    "dep:nros-platform-freertos",
    "dep:nros-platform-cffi",
    "nros-platform-freertos/cffi-export",
]
platform-threadx = [
    "dep:nros-platform-threadx",
    "dep:nros-platform-cffi",
    "nros-platform-threadx/cffi-export",
]
platform-zephyr = [
    "dep:nros-platform-zephyr",
    "dep:nros-platform-cffi",
    "nros-platform-zephyr/cffi-export",
]
# Phase 100 — AGX Orin SPE (Cortex-R5F + FreeRTOS FSP, IVC transport).
# IVC backend is selected by the consumer crate via
# `nros-platform-orin-spe?/{fsp,unix-mock}`; defaults to no backend
# (a build-time error on first use) so accidentally enabling
# `platform-orin-spe` without picking one fails fast.
platform-orin-spe = ["dep:nros-platform-orin-spe"]

# Capability features — enabled by RMW shims to declare requirements
alloc = []
threading = []

# Phase 71.27 — opt-in `#[global_allocator]` that routes Rust's
# `Box`, `Vec`, etc. through `<ConcretePlatform as PlatformAlloc>`.
# Off by default: host (`platform-posix`) builds use libstd's
# allocator and would conflict; bare-metal / RTOS examples enable
# this feature to wire dust-dds + heapless futures through the
# board's heap (`pvPortMalloc` on FreeRTOS, `tx_byte_allocate` on
# ThreadX, `kmm_malloc` on NuttX, etc.).
global-allocator = ["alloc"]

# Phase 97.1.cs — opt-in `critical_section::Impl` registered against
# the active platform's interrupt-disable primitive. dust-dds's
# oneshot channels reference `_critical_section_1_0_acquire` /
# `_release` symbols; without this feature, every bare-metal / RTOS
# DDS example fails to link.
#
# Forwards to the per-platform crate's matching feature. POSIX builds
# get a no-op impl (libstd has its own synchronization primitives;
# the symbols resolve via critical-section's `std` feature). Zephyr
# already ships its impl through `nros-c`; consumers that depend on
# both `nros-platform/critical-section` and `nros-c` need to set the
# feature on only one to avoid double-registration.
critical-section = [
    "nros-platform-freertos?/critical-section",
    "nros-platform-threadx?/critical-section",
    "nros-platform-mps2-an385?/critical-section",
]

# Phase 97.4.zephyr-native_sim — printk-traced mcast_read in
# `nros-platform-zephyr`. Off by default; flip on per-example to
# debug NSOS RX delivery on `native_sim`.
debug-mcast-read-zephyr = ["nros-platform-zephyr?/debug-mcast-read"]

# Phase 100.1 — Cortex-R5 CPSR I-bit critical-section (Orin SPE). Pulled
# in by the SPE board crate alongside `platform-orin-spe`. Distinct from
# the Cortex-M umbrella above so the two `set_impl!` registrations never
# collide; `nros-platform-freertos` itself raises a `compile_error!` if
# both are activated together.
cortex-r = [
    "nros-platform-orin-spe?/cortex-r",
]

[dependencies]
# Trait definitions live in this standalone crate so platform crates can
# impl them without creating a cycle back through nros-platform.
nros-platform-api = { version = "0.1.0", path = "../nros-platform-api" }
nros-platform-posix = { version = "0.1.0", path = "../nros-platform-posix", optional = true }
nros-platform-cffi = { version = "0.1.0", path = "../nros-platform-cffi", optional = true }
nros-platform-mps2-an385 = { version = "0.1.0", path = "../../platforms/nros-platform-mps2-an385", optional = true }
nros-platform-stm32f4 = { version = "0.1.0", path = "../../platforms/nros-platform-stm32f4", optional = true }
nros-platform-esp32 = { version = "0.1.0", path = "../../platforms/nros-platform-esp32", optional = true }
nros-platform-esp32-qemu = { version = "0.1.0", path = "../../platforms/nros-platform-esp32-qemu", optional = true }
nros-platform-nuttx = { version = "0.1.0", path = "../nros-platform-nuttx", optional = true }
nros-platform-freertos = { version = "0.1.0", path = "../nros-platform-freertos", optional = true }
nros-platform-threadx = { version = "0.1.0", path = "../nros-platform-threadx", optional = true }
nros-platform-zephyr = { version = "0.1.0", path = "../nros-platform-zephyr", optional = true }
nros-platform-orin-spe = { version = "0.1.0", path = "../../platforms/nros-platform-orin-spe", optional = true }

[lints]
workspace = true
