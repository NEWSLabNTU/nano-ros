[package]
name = "nros-core"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Core types, traits, and node abstraction for nros"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "embedded", "no-std", "robotics", "middleware"]
categories = ["embedded", "no-std", "network-programming"]

[features]
default = ["std"]
std = ["nros-serdes/std"]
alloc = ["nros-serdes/alloc"]

[dependencies]
log = { version = "0.4", default-features = false }
nros-serdes = { workspace = true, default-features = false }
heapless = { workspace = true }

[lints]
workspace = true
