[package]
name = "nano-ros-transport"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Transport abstraction layer for nano-ros"

[features]
default = ["std"]
std = ["nano-ros-core/std", "nano-ros-transport-zenoh?/std", "log"]
alloc = ["nano-ros-core/alloc", "nano-ros-transport-zenoh?/alloc"]

# Transport: selects the middleware protocol (only zenoh today)
# "zenoh" is a convenience alias for platform-posix + alloc (desktop default)
zenoh = ["platform-posix", "alloc"]

# Platform: selects the OS/HAL backend (mutually exclusive)
shim = ["dep:nano-ros-transport-zenoh"]  # Base shim feature (requires platform selection)
platform-posix = ["shim", "nano-ros-transport-zenoh/posix"]  # POSIX platform (desktop)
platform-zephyr = ["shim", "nano-ros-transport-zenoh/zephyr"]  # Zephyr RTOS platform
platform-bare-metal = ["shim", "nano-ros-transport-zenoh/bare-metal"]  # Bare-metal platform

# Executor backends (informational - affects sync primitive choice)
rtic = []       # RTIC executor - uses critical sections, no background threads
embassy = []    # Embassy executor - uses embassy-sync primitives
polling = []    # Simple polling mode - no background threads, manual poll required

# Synchronization backends (mutually exclusive for mutex implementation)
# Default: spin::Mutex (works everywhere, but not RTIC-compatible)
sync-spin = ["dep:spin"]
# Critical section: uses cortex_m::interrupt::free (RTIC-compatible)
sync-critical-section = ["dep:critical-section"]

# Logging
log = ["dep:log"]

[dependencies]
nano-ros-core = { workspace = true, default-features = false }
heapless = { workspace = true }
nano-ros-transport-zenoh = { path = "../../transport/nano-ros-transport-zenoh", optional = true, default-features = false }

# Synchronization backends (optional)
spin = { version = "0.9", optional = true, default-features = false, features = ["mutex", "spin_mutex"] }
critical-section = { version = "1.1", optional = true }

# Logging
log = { workspace = true, optional = true }

[dev-dependencies]
nano-ros-ghost-types = { path = "../../verification/nano-ros-ghost-types" }
