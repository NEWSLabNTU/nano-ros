[package]
name = "nros-diagnostics"
version = "0.5.0"
edition = "2021"
description = "Thin on-target contract-violation reporter (RFC-0052 W3b.1) — builds DiagnosticArray entries in the play_launch rule-id vocabulary; the caller owns the /diagnostics publisher"
license = "MIT OR Apache-2.0"

[features]
default = []
std = ["nros-diagnostic-msgs/std"]

[dependencies]
nros-diagnostic-msgs = { version = "4.9.1", path = "../../interfaces/diagnostic-msgs/generated/humble/nros-diagnostic-msgs", default-features = false }
heapless = "0.8"
