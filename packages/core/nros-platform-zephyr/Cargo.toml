[package]
name = "nros-platform-zephyr"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "[deprecated] Rust FFI bridge to Zephyr — use `nros-platform-zephyr-c` (native C port covering the canonical ABI)."
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["embedded", "zephyr", "platform", "rtos", "no-std"]
categories = ["embedded", "no-std", "os"]

[features]
default = []
# Phase 97.4.zephyr-native_sim — printk-traced mcast_read calls in
# `net::ZephyrPlatform::mcast_read`. Off by default; enabled via the
# example crate when investigating NSOS RX delivery gaps.
debug-mcast-read = []
# Phase 121.2 — emit the canonical `nros_platform_*` C ABI symbols.
cffi-export = ["dep:nros-platform-cffi"]

[dependencies]
nros-platform-api = { version = "0.1.0", path = "../nros-platform-api" }
nros-platform-cffi = { version = "0.1.0", path = "../nros-platform-cffi", optional = true }
# Other Zephyr APIs are extern "C", resolved at link time by Zephyr's build
# system (kernel + POSIX subsystem).

[lints]
workspace = true
