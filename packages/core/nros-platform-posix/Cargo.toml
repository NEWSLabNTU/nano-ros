[package]
name = "nros-platform-posix"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "POSIX platform implementation for nros"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["embedded", "posix", "platform", "linux"]
categories = ["embedded", "os::unix-apis", "os"]

[features]
default = []
# Phase 121.2 — emit the canonical `nros_platform_*` C ABI symbols by
# expanding the `nros-platform-cffi` macros against `PosixPlatform`.
# Activated transitively when a binary turns on
# `nros-platform/platform-cffi` alongside `platform-posix`.
cffi-export = ["dep:nros-platform-cffi"]

[dependencies]
libc = "0.2"
nros-platform-api = { version = "0.1.0", path = "../nros-platform-api" }
nros-platform-cffi = { version = "0.1.0", path = "../nros-platform-cffi", optional = true }

[lints]
workspace = true
