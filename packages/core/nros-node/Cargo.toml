[package]
name = "nros-node"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Node abstraction for nros"
links = "nros_node"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[features]
default = ["std"]
std = ["alloc", "nros-core/std", "nros-rmw/std", "nros-rmw-zenoh?/std", "nros-rmw-xrce?/std", "nros-rmw-dds?/std", "nros-rmw-uorb?/std", "log"]
alloc = ["nros-core/alloc", "nros-rmw/alloc", "nros-rmw-xrce?/alloc"]
rmw-zenoh = ["dep:nros-rmw-zenoh"]
rmw-xrce = ["dep:nros-rmw-xrce"]
rmw-dds = ["dep:nros-rmw-dds"]
rmw-cffi = ["dep:nros-rmw-cffi"]
rmw-uorb = ["dep:nros-rmw-uorb"]

# Phase 99: backend native slot lending (zero-copy publish via
# SlotLending trait). Forwards to whichever active backend supports it.
# Backends without lending (uORB, default zenoh-pico, dds, cffi) don't
# expose a `lending` feature; user enabling `rmw-lending` w/ such a
# backend gets a clear compile error from the missing feature
# (instead of an opaque trait-bound error).
rmw-lending = ["nros-rmw/lending", "nros-rmw-xrce?/lending", "nros-rmw-zenoh?/lending"]

# XRCE transport refinements (forwarded to nros-rmw-xrce)
platform-udp = ["nros-rmw-xrce?/platform-udp"]
posix-serial = ["nros-rmw-xrce?/posix-serial"]

# ROS edition feature flags (controls which env vars are supported)
ros-humble = ["nros-rmw-zenoh?/ros-humble"]     # ROS_LOCALHOST_ONLY (Humble+, default)
ros-iron = ["nros-rmw-zenoh?/ros-iron"]                # ROS_AUTOMATIC_DISCOVERY_RANGE, ROS_STATIC_PEERS (Iron+)
log = ["dep:log"]

# Platform backend (select one; forwarded to active RMW backend)
platform-posix = ["nros-rmw-zenoh?/platform-posix", "nros-rmw-xrce?/platform-posix", "nros-rmw-dds?/platform-posix"]
platform-zephyr = ["nros-rmw-zenoh?/platform-zephyr", "nros-rmw-xrce?/platform-zephyr", "nros-rmw-dds?/platform-zephyr"]
platform-bare-metal = ["nros-rmw-zenoh?/platform-bare-metal", "nros-rmw-xrce?/platform-bare-metal"]
platform-freertos = ["nros-rmw-zenoh?/platform-freertos", "nros-rmw-xrce?/platform-freertos", "nros-rmw-dds?/platform-freertos"]
platform-nuttx = ["nros-rmw-zenoh?/platform-nuttx", "nros-rmw-xrce?/platform-nuttx", "nros-rmw-dds?/platform-nuttx"]
platform-threadx = ["nros-rmw-zenoh?/platform-threadx", "nros-rmw-xrce?/platform-threadx", "nros-rmw-dds?/platform-threadx"]
platform-cffi = []

# E2E safety protocol (CRC-32 + sequence tracking)
safety-e2e = [
    "nros-rmw/safety-e2e",
    "nros-rmw-zenoh?/safety-e2e",
    "nros-rmw-xrce?/safety-e2e",
]

# Zero-copy receive via z_bytes_get_contiguous_view (unstable zenoh-pico API)
unstable-zenoh-api = ["nros-rmw-zenoh?/unstable-zenoh-api"]

# Async feedback stream (futures_core::Stream impl on FeedbackStream)
stream = ["dep:futures-core"]

# FFI reentrancy guards (critical-section around all RMW FFI calls)
ffi-sync = ["nros-rmw-zenoh?/ffi-sync", "nros-rmw-xrce?/ffi-sync"]

# Parameter services (ros2 param CLI support)
param-services = ["dep:nros-rcl-interfaces", "alloc"]

# Lifecycle services (ros2 lifecycle CLI support — REP-2002)
lifecycle-services = ["dep:nros-lifecycle-msgs", "alloc"]

[dependencies]
nros-core = { workspace = true, default-features = false }
nros-rmw = { workspace = true, default-features = false }
nros-rmw-zenoh = { workspace = true, default-features = false, optional = true }
nros-rmw-xrce = { workspace = true, default-features = false, optional = true }
nros-rmw-dds = { workspace = true, default-features = false, optional = true }
nros-rmw-cffi = { workspace = true, default-features = false, optional = true }
nros-rmw-uorb = { version = "0.1.0", path = "../../px4/nros-rmw-uorb", default-features = false, optional = true }
nros-params = { workspace = true, default-features = false }
heapless = { workspace = true }
portable-atomic = { version = "1", default-features = false }
atomic-waker = { version = "1.1", default-features = false, features = ["portable-atomic"] }
log = { workspace = true, optional = true }
futures-core = { version = "0.3", default-features = false, optional = true }
nros-rcl-interfaces = { version = "0.1.0", path = "../../interfaces/rcl-interfaces/generated/humble/nros-rcl-interfaces", default-features = false, optional = true }
nros-lifecycle-msgs = { version = "0.1.0", path = "../../interfaces/lifecycle-msgs/generated/humble/nros-lifecycle-msgs", default-features = false, optional = true }

[dev-dependencies]
nros-ghost-types = { version = "0.1.0", path = "../../verification/nros-ghost-types" }
