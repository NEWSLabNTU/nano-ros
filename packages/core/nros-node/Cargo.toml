[package]
name = "nros-node"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Node abstraction for nros"
links = "nros_node"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "node", "executor", "embedded", "no-std"]
categories = ["embedded", "no-std"]

[features]
default = ["std"]
std = ["alloc", "nros-core/std", "nros-rmw/std", "nros-rmw-cffi?/std", "log"]
alloc = ["nros-core/alloc", "nros-rmw/alloc", "dep:portable-atomic-util"]

# Phase 110 — compile-time scheduler selection. Default ships only
# `scheduler-fifo` so MCU builds drop unused scheduler code. Each
# flag is independent; multiple may be on simultaneously when
# runtime selection across classes is needed.
scheduler-fifo = []
scheduler-edf = []
scheduler-bucketed = []
scheduler-sporadic = []
# Phase 110.F — opt-in PiCAS-style per-callback OS priority.
scheduler-os-priority = []
# Phase 110.G — opt-in ARINC-653 cyclic executive (TimeTriggered class).
scheduler-time-triggered = []

# RMW vtable runtime registry. Every backend ships as a cffi shim
# that installs a C vtable here.
rmw-cffi = ["dep:nros-rmw-cffi"]
# Phase 248 (C2) — INTERNAL marker feature. The umbrella
# `nros/rmw-cyclonedds` activates this (via `nros-node/__cyclonedds-link`)
# so the typed-creator descriptor hook
# (`cyclonedds_register::register_type::<M>()`) compiles in via
# `cfg(rmw_cyclonedds_present)` (emitted by `build.rs` from this feature).
# **Not user-facing** — downstream callers depend on
# `nros = { features = ["rmw-cyclonedds"] }` (umbrella shape) instead.
#
# Pure marker — carries NO `dep:` edge. Issue #60 / Phase 248 made the
# descriptor registration a generic vtable seam
# (`nros_rmw::register_type_descriptor`), so the agnostic core no longer
# depends on `nros-rmw-cyclonedds[-sys]`. The umbrella brings the Cyclone
# backend (`dep:nros-rmw-cyclonedds-sys`) into the link graph on its own
# side; that backend installs its descriptor registrar at init
# (`nros-rmw-cyclonedds::install_descriptor_registrar`). This feature only
# flips on the schema-passing body + the `M: Message` bound for builds
# where a descriptor-needing backend is present.
__cyclonedds-link = []
# Phase 124.B.7.c — POSIX signal-handler-safe wake via eventfd + a
# runtime-owned worker thread that forwards eventfd writes to the
# Executor's wake condvar. Linux-only (eventfd). Off by default;
# enable when the binary installs POSIX signal handlers that need
# to wake the executor.
signal-fd-wake = ["dep:libc", "std"]
# Phase 141.B.2 — wake-latency probe. Instruments two points so
# 141.C's host-side histogram + assertion can measure P99 wake
# latency on Cortex-M3: (a) entry of `nros_rmw_runtime_wake_cb`
# captures T0 ("transport notified executor"); (b) top of arena
# dispatch captures T1 ("subscription callback ran"). Probe stores
# `(T1 - T0)` deltas in a fixed-size lock-free ring buffer that
# the host harness drains over UART (141.C). Off by default —
# production builds stay clean.
wake-latency-probe = ["portable-atomic/fallback"]
# Phase 128.C.3 — per-backend `rmw-*-cffi` features deleted. The
# walker (`nros_rmw_cffi_walk_init_section`) discovers whichever
# backend the manifest pulled in; `rmw-cffi` alone gates the vtable
# runtime.

# Phase 99: backend native slot lending (zero-copy publish via
# SlotLending trait). Forwards to whichever active backend supports it.
rmw-lending = ["nros-rmw/lending", "nros-rmw-cffi?/lending"]

# XRCE serial transport refinement. (`platform-udp` deleted in Phase
# 248 C2 — it matched the forbidden `platform-*` axis and was already
# inert; UDP-vs-serial transport selection belongs to the XRCE backend
# crate, not the agnostic core.)
posix-serial = []

# ROS edition feature flags (controls which env vars are supported).
# Phase 104.A — formerly forwarded to `nros-rmw-zenoh?/ros-*`; now
# inert at the umbrella level. Callers add the feature to their
# direct `nros-rmw-<name>` dep.
ros-humble = []
ros-iron = []
log = ["dep:log"]

# Phase 248 (C2) — `platform-*` backend-selector features DELETED.
# The core executor is platform-agnostic: it reaches the platform
# purely through the `nros-platform-api` / `nros-platform-cffi` vtable
# (`nros_platform_wake_*`, alloc, sleep, yield C ABI), never via a
# compile-time `#[cfg(feature = "platform-*")]` branch (issue #60,
# Tier 3). The wake/alloc/spin paths probe the vtable at runtime
# (`wake_storage_size() == 0` → unavailable) instead of feature-gating
# per RTOS. Platform selection is the board crate's / build's job
# (RFC-0004/0031). Callers that linked a concrete platform via
# `nros-node/platform-<rtos>` must drop it — the matching
# `nros-platform/platform-<rtos>` + board dep already brings the
# C-ABI provider into the link graph.
#
# INERT COMPAT SHIMS (Phase 248 C2 → C5 hand-off). These carry NO `dep:`
# edge, NO `?/` forwarding, and are read by NO `#[cfg]` in `src/` — so
# `nros-node`'s compiled output is byte-identical whether they exist or
# not. They exist ONLY so the `nros` umbrella's not-yet-updated
# `"nros-node/platform-<rtos>"` / `"nros-node/platform-udp"` forwarding
# still resolves (cargo errors on a forward to a missing feature). The
# core executor itself is fully platform-agnostic.
#
# **C5 MUST delete these together with the matching
# `"nros-node/platform-*"` forwarding lines in `nros/Cargo.toml`** (phase
# 248 sequences C5 after C2; this agent is scoped out of the `nros`
# umbrella). Only the 8 features `nros` actually forwards are kept;
# `platform-cffi` was dropped (no consumer).
platform-posix = []
platform-zephyr = []
platform-bare-metal = []
platform-freertos = []
platform-nuttx = []
platform-threadx = []
platform-orin-spe = []
platform-udp = []

# E2E safety protocol (CRC-32 + sequence tracking).
safety-e2e = ["nros-rmw/safety-e2e"]

# Zero-copy receive via z_bytes_get_contiguous_view (unstable zenoh-pico API).
unstable-zenoh-api = []

# Async feedback stream (futures_core::Stream impl on FeedbackStream).
stream = ["dep:futures-core"]

# FFI reentrancy guards (critical-section around all RMW FFI calls).
ffi-sync = []

# Parameter services (ros2 param CLI support).
param-services = ["dep:nros-rcl-interfaces", "alloc"]

# Lifecycle services (ros2 lifecycle CLI support — REP-2002).
lifecycle-services = ["dep:nros-lifecycle-msgs", "alloc"]

[dependencies]
nros-core = { workspace = true, default-features = false }
nros-rmw = { workspace = true, default-features = false }
# Phase 110.D — `Executor::open_threaded` consumes the `SchedPolicy`
# enum from the platform-api types layer.
nros-platform-api = { version = "0.5.0", path = "../nros-platform-api", default-features = false }
nros-rmw-cffi = { workspace = true, default-features = false, optional = true }
# Phase 104.A — concrete RMW deps (`nros-rmw-xrce-cffi`,
# `nros-rmw-zenoh`) removed. The umbrella consumes
# only the generic vtable shim (`nros-rmw-cffi`); callers depend
# on the concrete backend crate directly and trigger
# registration via the backend's `#[ctor]` (POSIX) or an explicit
# `register()` call (bare-metal). See
# `docs/roadmap/phase-104-multi-backend-bridges.md` Thread A.
nros-params = { workspace = true, default-features = false }
# Phase 88.12 — `Node::logger()` returns a `&'static Logger` from the
# nros-log intern table.
nros-log = { version = "0.5.0", path = "../nros-log" }
heapless = { workspace = true }
portable-atomic = { version = "1", default-features = false }
portable-atomic-util = { version = "0.2", default-features = false, features = ["alloc"], optional = true }
atomic-waker = { version = "1.1", default-features = false, features = ["portable-atomic"] }
log = { workspace = true, optional = true }
futures-core = { version = "0.3", default-features = false, optional = true }
nros-rcl-interfaces = { version = "0.5.0", path = "../../interfaces/rcl-interfaces/generated/humble/nros-rcl-interfaces", default-features = false, optional = true }
nros-lifecycle-msgs = { version = "0.5.0", path = "../../interfaces/lifecycle-msgs/generated/humble/nros-lifecycle-msgs", default-features = false, optional = true }
# Phase 248 (C2) — `nros-rmw-cyclonedds` + `nros-rmw-cyclonedds-sys`
# deps REMOVED (issue #60, Tier 1). The per-type descriptor
# registration that referenced them is now a generic vtable seam
# (`nros_rmw::register_type_descriptor`); the Cyclone backend installs
# its registrar from its own crate
# (`nros-rmw-cyclonedds::install_descriptor_registrar`, driven by the
# `-sys` shim's `RMW_INIT_ENTRIES` self-registration). The agnostic core
# no longer names a concrete RMW backend.
#
# Used by `MessageForRmw`'s `cfg(rmw_cyclonedds_present)` super-bound
# (`schema::Message`) and by `register_type`'s schema extraction. Pure
# schema crate — no concrete-backend coupling.
nros-serdes = { version = "0.5.0", path = "../nros-serdes", default-features = false }

# Phase 124.B.7.c — POSIX signalfd / eventfd worker (only on
# Linux + std). Other targets compile without this dep; the
# signalfd worker is feature-gated.
[target.'cfg(all(target_os = "linux"))'.dependencies]
libc = { version = "0.2", optional = true }

# Phase 214.F.2 — target-gate every dev-dep that pulls a `std` /
# `platform-posix` feature path. The `--edges=features` audit at
# F.1-landing time showed `nros-node` was the dominant residual
# leak source: its dev-deps unify `nros-platform-cffi`'s
# `posix-c-port` (via `nros-rmw-cyclonedds[bridge-stub]`'s transitive
# closure) into the workspace feature graph even when checking
# `--target thumbv7em-none-eabihf --no-default-features`. Cargo's
# feature unification doesn't honour `[dev-dependencies]` boundaries
# during target-aware resolution; the only knob that does is
# `[target.<cfg>.dev-dependencies]`. Host targets (`target_os !=
# "none"`) still see the dev-deps — `cargo test` works unchanged.
# Embedded targets (`target_os = "none"`) see an empty dev-dep set,
# so the unification path collapses.
[target.'cfg(not(target_os = "none"))'.dev-dependencies]
nros-ghost-types = { version = "0.5.0", path = "../../verification/nros-ghost-types" }
# Phase 248 (C2) — the `nros-rmw-cyclonedds[bridge-stub]` dev-dep was
# removed along with the cyclone smoke test. That test moved into the
# Cyclone crate itself (`nros-rmw-cyclonedds::seam_tests`), which
# exercises the generic `nros_rmw::register_type_descriptor` seam +
# `install_descriptor_registrar` against the `#[cfg(test)]` bridge stub.

[lints]
workspace = true
