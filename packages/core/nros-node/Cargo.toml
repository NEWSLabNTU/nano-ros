[package]
name = "nros-node"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Node abstraction for nros"

[features]
default = ["std", "ros-humble"]
std = ["alloc", "nros-core/std", "nros-rmw/std", "nros-rmw-zenoh?/std", "log"]
alloc = ["nros-core/alloc"]
zenoh = ["platform-posix", "alloc"]

# ROS edition feature flags (controls which env vars are supported)
ros-humble = []                  # ROS_LOCALHOST_ONLY (Humble+, default)
ros-iron = ["ros-humble"]        # ROS_AUTOMATIC_DISCOVERY_RANGE, ROS_STATIC_PEERS (Iron+)
log = ["dep:log"]

# Transport backend (select one platform)
shim = ["dep:nros-rmw-zenoh"]  # Base shim feature
platform-posix = ["shim", "nros-rmw-zenoh/platform-posix"]
platform-zephyr = ["shim", "nros-rmw-zenoh/platform-zephyr"]
platform-bare-metal = ["shim", "nros-rmw-zenoh/platform-bare-metal"]

# Executor support
rtic = ["nros-rmw-zenoh?/rtic"]
polling = ["nros-rmw-zenoh?/polling"]

# Parameter services (ros2 param CLI support)
param-services = ["dep:rcl_interfaces", "zenoh"]

[dependencies]
nros-core = { workspace = true, default-features = false }
nros-rmw = { workspace = true, default-features = false }
nros-rmw-zenoh = { workspace = true, default-features = false, optional = true }
nros-params = { workspace = true, default-features = false }
heapless = { workspace = true }
log = { workspace = true, optional = true }
rcl_interfaces = { path = "../../interfaces/rcl-interfaces/generated/rcl_interfaces", default-features = false, optional = true }

[dev-dependencies]
nros-ghost-types = { path = "../../verification/nros-ghost-types" }
