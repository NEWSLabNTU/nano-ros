[package]
name = "nros-node"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Node abstraction for nros"
links = "nros_node"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "node", "executor", "embedded", "no-std"]
categories = ["embedded", "no-std"]

[features]
default = ["std"]
std = ["alloc", "nros-core/std", "nros-rmw/std", "nros-rmw-cffi?/std", "log"]
alloc = ["nros-core/alloc", "nros-rmw/alloc", "dep:portable-atomic-util"]

# Phase 110 — compile-time scheduler selection. Default ships only
# `scheduler-fifo` so MCU builds drop unused scheduler code. Each
# flag is independent; multiple may be on simultaneously when
# runtime selection across classes is needed.
scheduler-fifo = []
scheduler-edf = []
scheduler-bucketed = []
scheduler-sporadic = []
# Phase 110.F — opt-in PiCAS-style per-callback OS priority.
scheduler-os-priority = []
# Phase 110.G — opt-in ARINC-653 cyclic executive (TimeTriggered class).
scheduler-time-triggered = []

# RMW vtable runtime registry. Every backend ships as a cffi shim
# that installs a C vtable here.
rmw-cffi = ["dep:nros-rmw-cffi"]
# Phase 214.S.2 — INTERNAL feature. The umbrella `nros/rmw-cyclonedds`
# activates this (via `nros-node/__cyclonedds-link`) so the K.7.6.b
# typed-creator hook (`cyclonedds_register::register_type::<M>()`)
# fires via `cfg(rmw_cyclonedds_present)`. **Not user-facing** —
# downstream callers depend on `nros = { features = ["rmw-cyclonedds"] }`
# (umbrella shape) instead. The underscore prefix marks it private; we
# kept the feature mechanism because cargo's `links =` env-var hand-off
# (which K.7.6.b's design intended to use) only propagates to *direct*
# dependents of the linking crate (`nros-rmw-cyclonedds-sys`). Pulling
# the sys crate into `nros-node` as a direct optional dep gated by this
# private feature is the smallest delta that preserves the no-extra-
# user-feature contract while making the build-time presence detection
# work. See `build.rs` and `docs/roadmap/phase-214-antipattern-audit-findings.md`
# Track S.
__cyclonedds-link = ["dep:nros-rmw-cyclonedds-sys"]
# Phase 214.S.4.b — bare detect path. Emits the
# `rmw_cyclonedds_present` cfg WITHOUT bringing the production
# `nros-rmw-cyclonedds-sys` archive into the dep graph. Used by the
# K.7.6.b `cyclonedds_register_smoke` test, which relies on the
# dev-dep on `nros-rmw-cyclonedds[bridge-stub]` for the bridge
# symbols. Production callers stay on `__cyclonedds-link`.
# Phase 214.S.5.c follow-up — `bridge-stub` activation moved from the
# unconditional dev-dep onto this feature. Smoke tests
# (`cyclonedds_register_smoke`) opt-in via `--features __cyclonedds-detect`;
# the stub then provides the bridge C ABI symbols. `__cyclonedds-link`
# does NOT activate this — it pulls the real `nros-rmw-cyclonedds-sys`
# C++ archive, structurally exclusive of the stub.
__cyclonedds-detect = ["nros-rmw-cyclonedds/bridge-stub"]
# Phase 124.B.7.c — POSIX signal-handler-safe wake via eventfd + a
# runtime-owned worker thread that forwards eventfd writes to the
# Executor's wake condvar. Linux-only (eventfd). Off by default;
# enable when the binary installs POSIX signal handlers that need
# to wake the executor.
signal-fd-wake = ["dep:libc", "std"]
# Phase 141.B.2 — wake-latency probe. Instruments two points so
# 141.C's host-side histogram + assertion can measure P99 wake
# latency on Cortex-M3: (a) entry of `nros_rmw_runtime_wake_cb`
# captures T0 ("transport notified executor"); (b) top of arena
# dispatch captures T1 ("subscription callback ran"). Probe stores
# `(T1 - T0)` deltas in a fixed-size lock-free ring buffer that
# the host harness drains over UART (141.C). Off by default —
# production builds stay clean.
wake-latency-probe = ["portable-atomic/fallback"]
# Phase 128.C.3 — per-backend `rmw-*-cffi` features deleted. The
# walker (`nros_rmw_cffi_walk_init_section`) discovers whichever
# backend the manifest pulled in; `rmw-cffi` alone gates the vtable
# runtime.

# Phase 99: backend native slot lending (zero-copy publish via
# SlotLending trait). Forwards to whichever active backend supports it.
rmw-lending = ["nros-rmw/lending", "nros-rmw-cffi?/lending"]

# XRCE transport refinements (forwarded to nros-rmw-xrce-cffi).
platform-udp = []
posix-serial = []

# ROS edition feature flags (controls which env vars are supported).
# Phase 104.A — formerly forwarded to `nros-rmw-zenoh?/ros-*`; now
# inert at the umbrella level. Callers add the feature to their
# direct `nros-rmw-<name>` dep.
ros-humble = []
ros-iron = []
log = ["dep:log"]

# Platform backend (select one). Phase 104.A — formerly forwarded
# `platform-*` features to the active RMW backend's matching
# feature via `?/`. With the optional concrete-RMW deps removed
# from this crate, those forwarding clauses are gone. Callers wire
# their own `nros-rmw-<name>` dep with the matching `platform-*`
# feature directly.
platform-posix = []
platform-zephyr = []
platform-bare-metal = []
platform-freertos = []
platform-nuttx = []
platform-threadx = []
# Phase 11 — AGX Orin SPE (zenoh-only; IVC link).
platform-orin-spe = []
platform-cffi = []

# E2E safety protocol (CRC-32 + sequence tracking).
safety-e2e = ["nros-rmw/safety-e2e"]

# Zero-copy receive via z_bytes_get_contiguous_view (unstable zenoh-pico API).
unstable-zenoh-api = []

# Async feedback stream (futures_core::Stream impl on FeedbackStream).
stream = ["dep:futures-core"]

# FFI reentrancy guards (critical-section around all RMW FFI calls).
ffi-sync = []

# Parameter services (ros2 param CLI support).
param-services = ["dep:nros-rcl-interfaces", "alloc"]

# Lifecycle services (ros2 lifecycle CLI support — REP-2002).
lifecycle-services = ["dep:nros-lifecycle-msgs", "alloc"]

[dependencies]
nros-core = { workspace = true, default-features = false }
nros-rmw = { workspace = true, default-features = false }
# Phase 110.D — `Executor::open_threaded` consumes the `SchedPolicy`
# enum from the platform-api types layer.
nros-platform-api = { version = "0.4.0", path = "../nros-platform-api", default-features = false }
nros-rmw-cffi = { workspace = true, default-features = false, optional = true }
# Phase 104.A — concrete RMW deps (`nros-rmw-xrce-cffi`,
# `nros-rmw-zenoh`) removed. The umbrella consumes
# only the generic vtable shim (`nros-rmw-cffi`); callers depend
# on the concrete backend crate directly and trigger
# registration via the backend's `#[ctor]` (POSIX) or an explicit
# `register()` call (bare-metal). See
# `docs/roadmap/phase-104-multi-backend-bridges.md` Thread A.
nros-params = { workspace = true, default-features = false }
# Phase 88.12 — `Node::logger()` returns a `&'static Logger` from the
# nros-log intern table.
nros-log = { version = "0.4.0", path = "../nros-log" }
heapless = { workspace = true }
portable-atomic = { version = "1", default-features = false }
portable-atomic-util = { version = "0.2", default-features = false, features = ["alloc"], optional = true }
atomic-waker = { version = "1.1", default-features = false, features = ["portable-atomic"] }
log = { workspace = true, optional = true }
futures-core = { version = "0.3", default-features = false, optional = true }
nros-rcl-interfaces = { version = "0.4.0", path = "../../interfaces/rcl-interfaces/generated/humble/nros-rcl-interfaces", default-features = false, optional = true }
nros-lifecycle-msgs = { version = "0.4.0", path = "../../interfaces/lifecycle-msgs/generated/humble/nros-lifecycle-msgs", default-features = false, optional = true }
# Phase 214.S.2 — runtime cyclonedds descriptor registry. Always linked
# because the `MessageForRmw` helper trait + `cyclonedds_register`
# module both reference it unconditionally; the no_std crate carries
# only Rust glue (descriptor builder + bounded registry) and `extern
# "C"` decls. Those decls become link-time references only when the
# K.7.6.b `register_type::<M>()` hook is actually compiled in (gated by
# `cfg(rmw_cyclonedds_present)` — emitted by `build.rs` when the
# sibling `-sys` shim is in the dep graph). Pure zenoh / xrce builds
# pay zero link-time cost for the bridge symbols.
nros-rmw-cyclonedds = { version = "0.4.0", path = "../../dds/nros-rmw-cyclonedds", default-features = false }
# Used by the cyclonedds register bridge for the `schema::Message`
# super trait + by every typed creator's `MessageForRmw` bound. Always
# linked — `no_std` schema-only crate, ~negligible footprint without
# downstream serializer glue.
nros-serdes = { version = "0.4.0", path = "../nros-serdes", default-features = false }
# Phase 214.S.2 — direct optional dep on the C++ backend shim. Pulled
# in by the private `__cyclonedds-link` feature (activated by
# `nros/rmw-cyclonedds`). Its `links = "cyclonedds"` metadata bridge
# sets `DEP_CYCLONEDDS_PRESENT=1` in this crate's build script, which
# emits `cfg(rmw_cyclonedds_present)` and turns the K.7.6.b hook on.
nros-rmw-cyclonedds-sys = { workspace = true, optional = true }

# Phase 124.B.7.c — POSIX signalfd / eventfd worker (only on
# Linux + std). Other targets compile without this dep; the
# signalfd worker is feature-gated.
[target.'cfg(all(target_os = "linux"))'.dependencies]
libc = { version = "0.2", optional = true }

# Phase 214.F.2 — target-gate every dev-dep that pulls a `std` /
# `platform-posix` feature path. The `--edges=features` audit at
# F.1-landing time showed `nros-node` was the dominant residual
# leak source: its dev-deps unify `nros-platform-cffi`'s
# `posix-c-port` (via `nros-rmw-cyclonedds[bridge-stub]`'s transitive
# closure) into the workspace feature graph even when checking
# `--target thumbv7em-none-eabihf --no-default-features`. Cargo's
# feature unification doesn't honour `[dev-dependencies]` boundaries
# during target-aware resolution; the only knob that does is
# `[target.<cfg>.dev-dependencies]`. Host targets (`target_os !=
# "none"`) still see the dev-deps — `cargo test` works unchanged.
# Embedded targets (`target_os = "none"`) see an empty dev-dep set,
# so the unification path collapses.
[target.'cfg(not(target_os = "none"))'.dev-dependencies]
nros-ghost-types = { version = "0.4.0", path = "../../verification/nros-ghost-types" }
# Phase 214.S.5.c follow-up — dev-dep no longer unconditionally
# activates `bridge-stub`. Smoke tests opt-in via the
# `__cyclonedds-detect` feature, which forwards `bridge-stub` here.
# This avoids the multi-def collision that fires when a user
# (or recipe) types `--features __cyclonedds-link` for a `cargo test`
# invocation — `__cyclonedds-link` brings in the real cyclonedds-sys
# C++ archive; the dev-dep stub used to clash with it. With the
# activation now feature-gated, `__cyclonedds-link` and the stub are
# structurally mutually exclusive.
nros-rmw-cyclonedds = { version = "0.4.0", path = "../../dds/nros-rmw-cyclonedds", default-features = false }

[lints]
workspace = true
