# cbindgen configuration for nros-cpp
# Generates include/nros_cpp_ffi.h from Rust #[repr(C)] types

language = "C"
header = """/**
 * nros C++ FFI — Auto-generated type definitions and function declarations
 *
 * AUTO-GENERATED by cbindgen from Rust #[repr(C)] types — DO NOT EDIT MANUALLY
 *
 * This header provides the typed FFI surface for nros-cpp. It is included
 * by the nros-cpp C++ header-only library, not by user code directly.
 *
 * Copyright 2024 nros contributors
 * Licensed under Apache-2.0
 */

#include <stdarg.h>
#include <stdbool.h>
#include <stdint.h>
#include <stddef.h>
"""
include_guard = "NROS_CPP_FFI_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = false
no_includes = true
cpp_compat = true

# Map usize to size_t (not uintptr_t)
usize_is_size_t = true

[export]

[fn]
rename_args = "None"

[struct]
rename_fields = "None"

[enum]
rename_variants = "None"

[parse]
parse_deps = false
clean = true
