# cbindgen configuration for nros-cpp — generates include/nros_cpp_ffi.h.

language = "C"
header = """/**
 * nros C++ runtime FFI — auto-generated type definitions and function declarations.
 *
 * AUTO-GENERATED — DO NOT EDIT MANUALLY.
 *
 * This header provides the typed runtime FFI surface for nros-cpp. It is
 * included by the nros-cpp C++ header-only library, not by user code
 * directly.
 *
 * Copyright 2024 nros contributors
 * Licensed under Apache-2.0
 */

#include <stdarg.h>
#include <stdbool.h>
#include <stdint.h>
#include <stddef.h>
"""
include_guard = "NROS_CPP_FFI_H"
autogen_warning = "/* Warning: this file is autogenerated. Don't modify this manually. */"
include_version = false
no_includes = true
cpp_compat = true

# Map usize to size_t (not uintptr_t)
usize_is_size_t = true

[export]
# Phase 118.D — exclude FFI symbols whose Rust signature uses
# `Option<extern "C" fn(...)>`. cbindgen renders those as opaque
# `Option_CppGoalCallback` / `Option_CppCancelCallback` structs that
# C++ callers can't construct. The hand-written `extern "C"` blocks
# in action_server.hpp use plain function-pointer typedefs that
# match the actual ABI. Excluded here to avoid signature conflict
# at the consolidation boundary.
exclude = [
    "nros_cpp_action_server_set_callbacks",
    "nros_cpp_action_client_set_callbacks",
    # Phase 189.M3.3.e — takes `RawServiceCallback` (a type alias from the
    # external nros-node crate); cbindgen names it without emitting a typedef,
    # leaving the symbol undefined in the header. Declared locally in
    # service.hpp with a matching plain fn-ptr typedef instead.
    "nros_cpp_service_server_register",
    # Phase 189.M3.3.f — same reason (`RawResponseCallback` alias); declared
    # locally in client.hpp. (`nros_cpp_service_client_send_on_handle` takes no
    # callback, so it stays in the cbindgen output.)
    "nros_cpp_service_client_register",
    # Phase 189.M3.x — same treatment for the callback-style subscription
    # register — takes `RawSubscriptionCallback` (external nros-node alias).
    # Declared locally in subscription.hpp with a matching plain fn-ptr typedef.
    "nros_cpp_subscription_register",
    # Phase 189.M3.4 — callback-style subscription with attachment; takes
    # `RawSubscriptionInfoCallback` (external nros-node alias). Declared locally
    # in subscription.hpp with a matching 5-arg plain fn-ptr typedef.
    "nros_cpp_subscription_register_with_info",
    # Phase 269 W3 — callback-style subscription with E2E integrity; takes
    # `RawSubscriptionSafetyCallback` (external nros-node alias, safety-e2e
    # gated). Declared locally in subscription.hpp with a matching 6-arg
    # plain fn-ptr typedef and in nros_cpp_ffi.h manually.
    "nros_cpp_subscription_register_validated",
    # Phase 274.W2 — `NativeTierSpecC` has a fn-ptr field typed
    # `Option<unsafe extern "C" fn(*mut c_void) -> i32>` which cbindgen
    # renders as an opaque wrapper struct. Both the struct and the
    # `nros_board_native_run_tiers` function are declared manually in
    # nros_cpp_ffi.h as `nros_native_tier_spec_t` + the function.
    "NativeTierSpecC",
    "nros_board_native_run_tiers",
]

[fn]
rename_args = "None"

[struct]
rename_fields = "None"

[enum]
rename_variants = "None"
# Phase 118.D: prefix variants with the enum name so consumers including
# the cbindgen output get scoped names (`nros_cpp_sched_class_t_Fifo`
# instead of bare `Fifo`). Without this, two unscoped enums sharing a
# variant name (`BestEffort` in `nros_cpp_sched_class_t` and
# `nros_cpp_priority_t`) collide at C++ compile time.
prefix_with_name = true

[parse]
parse_deps = false
clean = true
