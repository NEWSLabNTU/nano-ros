[package]
name = "nros-cpp"
version.workspace = true
publish = false
edition = "2024"
description = "nros C++ API — header-only C++14 library + Rust FFI staticlib"
license = "MIT OR Apache-2.0"
repository.workspace = true
keywords = ["ros", "ros2", "embedded", "cpp", "ffi"]
categories = ["embedded", "robotics", "api-bindings"]
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"

[lib]
crate-type = ["staticlib", "lib"]

[features]
default = ["std"]
std = [
    "alloc",
    "nros/std",
    "nros-node/std",
    "nros-rmw/std",
    "nros-c/std",
]
alloc = ["nros/alloc", "nros-node/alloc", "nros-rmw/alloc", "nros-c/alloc"]

# Phase 241.D3-rev — single-runtime umbrella. `nros-cpp` bundles `nros-c` (the C
# ABI + the cffi shim + the force-linked backend) as an rlib dep, so `libnros_cpp.a`
# is the ONE Rust staticlib a C++ binary links: the C++ FFI + the full C ABI + the
# backend + one `std`. Backend selection forwards to `nros-c`'s umbrella features
# (its `rmw_backend` ctor does the auto-register); `nros-cpp` no longer pulls a
# backend rlib directly. Reverts Phase 161's drop, mirroring nros-c's W2.
rmw-cffi = ["nros/rmw-cffi", "nros-c/rmw-cffi"]
# The backend is also a DIRECT dep here (`dep:`) so nros-cpp's own `rmw_backend`
# module can force-link it: nros-cpp is the staticlib root, and a `#[used]` anchor
# living in the `nros-c` dependency is DCE'd before nros-cpp's archive is emitted.
# cargo dedups the backend rlib with nros-c's, so this adds no second closure.
rmw-zenoh-cffi = ["rmw-cffi", "nros-c/rmw-zenoh", "dep:nros-rmw-zenoh"]
rmw-xrce-cffi = ["rmw-cffi", "nros-c/rmw-xrce", "dep:nros-rmw-xrce-cffi"]
rmw-cyclonedds-cffi = ["rmw-cffi", "nros-c/rmw-cyclonedds"]

# Phase 124.A — zero-copy publisher/subscriber loan ABI exposed
# through the C++ FFI (`nros_cpp_publisher_loan` / `_commit` /
# `_discard`, `nros_cpp_subscription_borrow` / `_release`).
lending = ["rmw-cffi", "nros/lending"]

# Phase 241.D3-rev (W8) — expose the param / lifecycle service surfaces through the
# umbrella. The C++ executor headers call the gated nros-c C entry points
# (nros_executor_register_parameter_services, nros_executor_lifecycle_*, …); a C++
# binary that uses them needs the umbrella built with these features so those symbols
# are compiled into libnros_cpp.a. Forward to nros-c (which pulls nros/nros-node).
param-services = ["rmw-cffi", "nros-c/param-services"]
lifecycle-services = ["rmw-cffi", "nros-c/lifecycle-services"]

# Zenoh transport refinements (require rmw-zenoh-cffi)
# Phase 128.E.1 — `link-tcp` / `link-udp-unicast` retired.

# XRCE transport refinements (require rmw-xrce-cffi)
xrce-udp = ["nros/xrce-udp"]
xrce-serial = ["nros/xrce-serial"]

# Functional capability — install the Rust `#[global_allocator]` routing
# through the platform vtable (`nros_platform_alloc`/`_dealloc`). Phase 248:
# replaces the per-platform `#[global_allocator]` cfg in lib.rs so the crate
# stays platform-agnostic. Enabled by RTOS ports whose kernel owns the
# unified heap and that don't bring an external allocator (zephyr-lang-rust
# etc.); the concrete allocator lives behind the vtable. Mirrors
# nros-platform's `global-allocator`.
global-allocator = ["alloc"]

# Functional capability — register the `critical_section::Impl` backed by
# the platform vtable (`nros_platform_critical_section_{acquire,release}`).
# Phase 248: replaces the `platform-zephyr` cfg on the critical-section
# block. Mirrors nros-platform's `critical-section`.
critical-section = ["dep:critical-section"]

# Platform backends (select one — orthogonal to RMW and ROS version).
# Phase 241.D3-rev (W12) × phase-248 — single-runtime: nros-c (bundled) owns the
# `#[global_allocator]` / `#[panic_handler]` / `critical_section::set_impl!`. nros-cpp's
# `platform-*` therefore forward to `nros-c/platform-*` (which enable nros-c's
# `global-allocator` / `critical-section`) and must NOT enable nros-cpp's OWN copies —
# two of any would conflict in the one crate graph. Embedded platforms imply `alloc` so
# the C++ FFI layer's `extern crate alloc` compiles.
# Phase 248 C5c — platform flows through `nros-c/platform-X` (which routes to a
# direct `nros-platform` dep); the agnostic `nros` umbrella no longer carries
# `platform-*`, so the old `nros/platform-X` forward is dropped.
platform-posix = [
    "nros-c/platform-posix",
]
platform-zephyr = [
    "alloc",
    "nros-c/platform-zephyr",
]
platform-freertos = [
    "alloc",
    "nros-c/platform-freertos",
]
platform-nuttx = [
    "alloc",
    "nros-c/platform-nuttx",
]
platform-threadx = [
    "alloc",
    "nros-c/platform-threadx",
]

# ROS edition (orthogonal to RMW and platform)
ros-humble = [
    "nros/ros-humble",
    "nros-c/ros-humble",
]
ros-iron = [
    "nros/ros-iron",
    "nros-c/ros-iron",
]

# Bare-metal panic handler (enables building staticlib without std)
# Phase 241.D3-rev (W12) — forward to nros-c too. nros-c is now a dependency of the
# C++ umbrella and its `[lib] crate-type` includes `staticlib`/`cdylib`, so rustc
# emits those final artifacts for the dep too; on a no_std target each needs a
# `#[panic_handler]`. Both crates `use panic_halt as _` over the SAME panic-halt crate
# (one instance), so this provides exactly one handler — no duplicate.
panic-halt = ["dep:panic-halt", "nros-c/panic-halt"]

# Opt-in instrumentation of the RTOS Rust global allocator (FreeRTOS
# pvPortMalloc / ThreadX z_malloc / Zephyr k_malloc). Tracks used/peak
# bytes routed through the Rust `#[global_allocator]` and exposes them via
# `nros_heap_used_bytes()` / `nros_heap_peak_bytes()`. Mirrors zpico-alloc's
# bare-metal `stats` feature. NOTE: counts only the Rust allocator's
# footprint — zenoh-pico's direct C-side z_malloc/pvPortMalloc traffic is not
# included (see issue #6).
alloc-stats = ["dep:zpico-alloc", "zpico-alloc/stats"]

[dependencies]
nros = { version = "0.5.0", path = "../nros", default-features = false }
nros-node.workspace = true
# Phase 241.D3-rev — bundle the C umbrella as an rlib so `libnros_cpp.a` carries the
# full C ABI + the cffi shim + the force-linked RMW backend (one archive, one std).
# Replaces the separate `libnros_c.a` + backend-staticlib links and nros-cpp's own
# optional backend deps.
nros-c = { version = "0.5.0", path = "../nros-c", default-features = false }
# Phase 88.12 — `nros_cpp_node_get_logger` returns `&'static nros_log::Logger`.
nros-log = { workspace = true }
nros-platform = { workspace = true, default-features = false }
nros-rmw = { version = "0.5.0", path = "../nros-rmw", default-features = false }
# Backend deps for nros-cpp's own root-crate force-link (`src/rmw_backend.rs`);
# shared with nros-c's copy by cargo (one backend rlib).
nros-rmw-zenoh = { workspace = true, optional = true, default-features = false }
nros-rmw-xrce-cffi = { workspace = true, optional = true, default-features = false }
# Opt-in RTOS heap-usage counter (HeapStats), gated by `alloc-stats`.
zpico-alloc = { path = "../../zpico/zpico-alloc", optional = true, default-features = false }
panic-halt = { version = "1", optional = true }
# critical-section impl provided by the Zephyr alloc module on
# platform-zephyr. DDS + portable-atomic depend on it being set.
#
# `restore-state-u32` is only safe to enable on real Cortex-M Zephyr
# targets where `nros_zephyr_irq_lock` returns a u32 IRQ key. On
# native_sim (x86_64) Zephyr DDS the DDS[std] path enables
# `critical-section/std`, which selects `restore-state-bool` — having
# both u32 and bool active produces `error[E0428]: RawRestoreStateInner
# defined multiple times` inside critical-section. Gate by target arch:
# arm → u32 (the no_std Zephyr Cortex-M path), other → no
# restore-state set (the std fallback wins).
critical-section = { version = "1.1", optional = true }

[target.'cfg(target_arch = "arm")'.dependencies]
critical-section = { version = "1.1", optional = true, features = ["restore-state-u32"] }

# AArch64 Zephyr (Phase 117.10/14) — DAIF mask used by
# `nros_zephyr_irq_{lock,unlock}` is a 32-bit value, same width as the
# armv7 path above. Mirrors `nros-c/Cargo.toml`.
[target.'cfg(target_arch = "aarch64")'.dependencies]
critical-section = { version = "1.1", optional = true, features = ["restore-state-u32"] }

[build-dependencies]
nros-build-helpers = { workspace = true }
# Phase 77.25: nros is listed as a build-dep (not only as a regular
# dep) so the host rlib is compiled *before* this build script runs.
# Without this, `nros-sizes-build`'s probe ran against a missing rlib
# on clean builds and silently returned 0 for every `NROS_*_SIZE`
# macro — see Phase 77.23 / 77.24 for the downstream damage.
nros = { version = "0.5.0", path = "../nros", default-features = false }

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true
