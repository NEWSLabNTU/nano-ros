[package]
name = "nros-cpp"
version = "0.1.0"
edition = "2024"
description = "nros C++ API — header-only C++14 library + Rust FFI staticlib"
license = "Apache-2.0"
repository.workspace = true
keywords = ["ros", "ros2", "embedded", "cpp", "ffi"]
categories = ["embedded", "robotics", "api-bindings"]
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"

[lib]
crate-type = ["staticlib", "lib"]

[features]
default = ["std"]
std = [
    "alloc",
    "nros/std",
    "nros-node/std",
    "nros-rmw/std",
]
alloc = ["nros/alloc", "nros-node/alloc", "nros-rmw/alloc"]

# RMW backend (select one) — every backend ships as a cffi shim that
# installs a C vtable into `nros-rmw-cffi`'s runtime registry.
rmw-cffi = ["nros/rmw-cffi"]
# Phase 115.K.2.5.1.1 — XRCE via the C backend (nros-rmw-xrce).
rmw-xrce-cffi = ["rmw-cffi", "nros/rmw-xrce-cffi", "dep:nros-rmw-xrce-cffi"]
# Phase 115.L.1 — dust-DDS via the C vtable.
rmw-dds-cffi = ["rmw-cffi", "nros/rmw-dds-cffi", "dep:nros-rmw-dds"]
# Phase 115.L.2 — zenoh-pico via the C vtable.
rmw-zenoh-cffi = ["rmw-cffi", "nros/rmw-zenoh-cffi", "dep:nros-rmw-zenoh"]

# Phase 124.A — zero-copy publisher/subscriber loan ABI exposed
# through the C++ FFI (`nros_cpp_publisher_loan` / `_commit` /
# `_discard`, `nros_cpp_subscription_borrow` / `_release`).
lending = ["rmw-cffi", "nros/lending"]

# Zenoh transport refinements (require rmw-zenoh-cffi)
link-tcp = ["nros/link-tcp", "nros-rmw-zenoh?/link-tcp"]
link-udp-unicast = ["nros/link-udp-unicast", "nros-rmw-zenoh?/link-udp-unicast"]

# XRCE transport refinements (require rmw-xrce-cffi)
xrce-udp = ["nros/xrce-udp"]
xrce-serial = ["nros/xrce-serial"]

# Platform backends (select one — orthogonal to RMW and ROS version).
# Embedded platforms imply `alloc` so the C++ FFI layer's `extern crate
# alloc` and the per-platform `#[global_allocator]` modules in lib.rs
# compile cleanly without the build script having to remember to pass
# `,alloc` alongside `platform-<rtos>`.
platform-posix = [
    "nros/platform-posix",
    "nros-rmw-xrce-cffi?/platform-posix",
    "nros-rmw-zenoh?/platform-posix",
    "nros-rmw-dds?/platform-posix",
]
platform-zephyr = [
    "alloc",
    "nros/platform-zephyr",
    "dep:critical-section",
    "nros-rmw-xrce-cffi?/platform-zephyr",
    "nros-rmw-zenoh?/platform-zephyr",
    "nros-rmw-dds?/platform-zephyr",
]
platform-freertos = [
    "alloc",
    "nros/platform-freertos",
    "nros-rmw-xrce-cffi?/platform-freertos",
    "nros-rmw-zenoh?/platform-freertos",
    "nros-rmw-dds?/platform-freertos",
]
platform-nuttx = [
    "alloc",
    "nros/platform-nuttx",
    "nros-rmw-xrce-cffi?/platform-nuttx",
    "nros-rmw-zenoh?/platform-nuttx",
    "nros-rmw-dds?/platform-nuttx",
]
platform-threadx = [
    "alloc",
    "nros/platform-threadx",
    "nros-rmw-xrce-cffi?/platform-threadx",
    "nros-rmw-zenoh?/platform-threadx",
    "nros-rmw-dds?/platform-threadx",
]

# ROS edition (orthogonal to RMW and platform)
ros-humble = [
    "nros/ros-humble",
    "nros-rmw-zenoh?/ros-humble",
    "nros-rmw-dds?/ros-humble",
]
ros-iron = [
    "nros/ros-iron",
    "nros-rmw-zenoh?/ros-iron",
    "nros-rmw-dds?/ros-iron",
]

# Bare-metal panic handler (enables building staticlib without std)
panic-halt = ["dep:panic-halt"]

[dependencies]
nros = { version = "0.1.0", path = "../nros", default-features = false }
nros-node.workspace = true
nros-platform = { workspace = true, default-features = false }
nros-rmw = { version = "0.1.0", path = "../nros-rmw", default-features = false }
nros-rmw-xrce-cffi = { workspace = true, optional = true, default-features = false }
nros-rmw-dds = { workspace = true, optional = true, default-features = false }
nros-rmw-zenoh = { workspace = true, optional = true, default-features = false }
panic-halt = { version = "1", optional = true }
# critical-section impl provided by the Zephyr alloc module on
# platform-zephyr. dust-dds + portable-atomic depend on it being set.
#
# `restore-state-u32` is only safe to enable on real Cortex-M Zephyr
# targets where `nros_zephyr_irq_lock` returns a u32 IRQ key. On
# native_sim (x86_64) Zephyr DDS the dust-dds[std] path enables
# `critical-section/std`, which selects `restore-state-bool` — having
# both u32 and bool active produces `error[E0428]: RawRestoreStateInner
# defined multiple times` inside critical-section. Gate by target arch:
# arm → u32 (the no_std Zephyr Cortex-M path), other → no
# restore-state set (the std fallback wins).
critical-section = { version = "1.1", optional = true }

[target.'cfg(target_arch = "arm")'.dependencies]
critical-section = { version = "1.1", optional = true, features = ["restore-state-u32"] }

# AArch64 Zephyr (Phase 117.10/14) — DAIF mask used by
# `nros_zephyr_irq_{lock,unlock}` is a 32-bit value, same width as the
# armv7 path above. Mirrors `nros-c/Cargo.toml`.
[target.'cfg(target_arch = "aarch64")'.dependencies]
critical-section = { version = "1.1", optional = true, features = ["restore-state-u32"] }

[build-dependencies]
cbindgen = "0.29"
nros-sizes-build = { workspace = true }
# Phase 77.25: nros is listed as a build-dep (not only as a regular
# dep) so the host rlib is compiled *before* this build script runs.
# Without this, `nros-sizes-build`'s probe ran against a missing rlib
# on clean builds and silently returned 0 for every `NROS_*_SIZE`
# macro — see Phase 77.23 / 77.24 for the downstream damage.
nros = { version = "0.1.0", path = "../nros", default-features = false }

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true
