[package]
name = "nros-orchestration"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Runtime support types for generated nano-ros orchestration packages"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "orchestration", "embedded", "no-std"]
categories = ["embedded", "no-std"]

[features]
default = []
std = ["nros-node/std"]
rmw-cffi = ["nros-node/rmw-cffi"]

[dependencies]
nros-node = { workspace = true, default-features = false }

[lints]
workspace = true
