[package]
name = "nros-orchestration-ir"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Shared per-tier orchestration schema + resolver (RFC-0015), consumed by both the nros CLI codegen and the nros::main! proc-macro."

[dependencies]
serde = { version = "1", features = ["derive"] }
thiserror = { workspace = true }
# RFC-0052 — the shared SystemModel tier schema. Both consumers of this crate
# (the CLI's codegen-system and the nros::main! proc-macro) resolve tiers from
# a resolved model, so the model→ir tier conversion lives here (one SSoT, no
# drift). Path crosses into the cli sub-workspace's vendored submodule — fine,
# a path dep groups by lockfile, not visibility (same rationale as nros-macros
# depping nros-pkg-index / nros-launch-parser).
ros-launch-manifest-sched = { path = "../../cli/third-party/ros-launch-manifest/sched" }

[lints]
workspace = true
