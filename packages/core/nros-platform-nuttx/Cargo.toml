[package]
name = "nros-platform-nuttx"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "nros platform implementation for NuttX (POSIX-compatible, delegates to nros-platform-posix)"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["embedded", "nuttx", "platform", "rtos", "no-std"]
categories = ["embedded", "no-std", "os"]

[features]
default = []
# Phase 121.2 — emit the canonical `nros_platform_*` C ABI symbols.
cffi-export = ["dep:nros-platform-cffi"]

[dependencies]
nros-platform-api = { version = "0.1.0", path = "../nros-platform-api" }
nros-platform-posix = { version = "0.1.0", path = "../nros-platform-posix" }
nros-platform-cffi = { version = "0.1.0", path = "../nros-platform-cffi", optional = true }
nuttx-sys = { path = "../../drivers/nuttx-sys" }

[lints]
workspace = true
