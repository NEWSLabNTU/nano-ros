[package]
name = "nros-rmw-cffi"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "C function table adapter for nros RMW backends"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "rmw", "ffi", "embedded"]
categories = ["embedded", "no-std", "api-bindings"]

[lib]
name = "nros_rmw_cffi"

[dependencies]
nros-rmw = { workspace = true, default-features = false }
portable-atomic = { version = "1", default-features = false }
# Phase 128.A — cross-platform linker-section anchoring. Replaces the
# hand-rolled `__start_/__stop_*` symbol pair + linker-script fragment
# with a maintained crate that handles ELF, Mach-O, COFF, and the
# `--gc-sections` / `start-stop-gc` interaction transparently. Backends
# emit one `#[distributed_slice(RMW_INIT_ENTRIES)]` entry; the walker
# iterates the slice on first `Executor::open`.
linkme = { version = "0.3", default-features = false }

[build-dependencies]
# Phase 115.G.4 — compiles the second-language smoke-test stubs in
# `tests/c_stubs/*.c` into a small static lib that the integration
# tests link against. Only used during `cargo build`/`cargo test`;
# the compiled stub is gated behind the `c-stub-test` feature so a
# default `cargo build` of consumers doesn't need a C toolchain.
cc = "1"

[features]
default = ["linkme-register"]
std = ["nros-rmw/std"]
alloc = ["nros-rmw/alloc"]
safety-e2e = ["nros-rmw/safety-e2e"]
# Phase 134.fix — gates the `RMW_INIT_ENTRIES` distributed_slice
# DEFINITION + the `nros_rmw_register_backend!` macro's linkme
# expansion. Default-on so the existing Rust-binary auto-register
# path keeps working. Turn it OFF on staticlib targets linked next
# to another archive that already carries the linkme machinery (the
# canonical case: `libnros_rmw_zenoh.a` linked alongside
# `libnros_c.a`). Without the gate, the C-binary link of both
# archives panics at runtime with
# `duplicate #[distributed_slice] with name "RMW_INIT_ENTRIES"` —
# two crate-hash-distinct rlib instances each install a DUPCHECK
# static in the same linker section; linkme walks on first slice
# access and detects the collision. The opt-out archive must
# register via `.init_array` instead (see
# `nros-rmw-zenoh-staticlib/src/lib.rs`).
linkme-register = []
# Phase 124.A — enables `CffiPublisher: SlotLending` +
# `CffiSubscriber: SlotBorrowing`. The vtable carries the slots either
# way; this feature gates the Rust trait impls so the trait surface
# stays gated behind `nros-rmw/lending` for the umbrella too. Becomes
# unconditional once Phase 124.A.4 lands and the umbrella drops the
# feature on its own surface.
lending = ["nros-rmw/lending"]
# Phase 115.G.4 — opt-in compile of `tests/c_stubs/c_stub_transport.c`.
# Off by default so consumers that vendor `nros-rmw-cffi` don't need a
# C toolchain on the build host. `cargo test --features c-stub-test`
# turns it on for the integration test.
c-stub-test = []

[lints]
workspace = true
