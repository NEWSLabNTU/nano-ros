[package]
name = "nros"
version = "0.1.0"
edition = "2024"
description = "Unified ROS 2 client library for embedded systems"
license = "Apache-2.0"
repository.workspace = true
keywords = ["ros", "ros2", "embedded", "no_std"]
categories = ["embedded", "no-std", "robotics"]
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"

[features]
default = ["std", "ffi-size-markers"]
# Phase 11.3.C — `#[used]` markers on the `__NROS_SIZE_*` opaque-storage
# statics. nros-c / nros-cpp build scripts probe these out of the rlib
# to derive C/C++ FFI macros (Phase 87). Pure-Rust applications (e.g.
# autoware-sentinel's SPE firmware) don't need them — the markers are
# `#[used]` so `--gc-sections` cannot drop the underlying [u8; N]
# arrays from the final binary, which costs ~340 KB on Cortex-R5
# because `size_of::<Executor>()` ≈ 348 KB. Disable this feature with
# `default-features = false` + opt back into `std` to recover the
# 340 KB at link time.
ffi-size-markers = []
std = [
    "alloc",  # std implies alloc
    "nros-core/std",
    "nros-node/std",
    "nros-rmw/std",
    "nros-params/std",
    "nros-serdes/std",
]
alloc = [
    "nros-core/alloc",
    "nros-node/alloc",
    "nros-rmw/alloc",
    "nros-params/alloc",
    "nros-serdes/alloc",
]

# RMW backend (select one — every backend ships as a cffi shim that
# installs a C vtable into `nros-rmw-cffi`'s runtime registry).
rmw-cffi = ["dep:nros-rmw-cffi", "nros-node/rmw-cffi"]
# Phase 115.K.2.5.1.1 — XRCE via the C backend (nros-rmw-xrce-c).
# Consumer must call `nros_rmw_xrce_cffi::register()` before opening
# the session.
rmw-xrce-cffi = ["rmw-cffi", "dep:nros-rmw-xrce-cffi", "nros-node/rmw-xrce-cffi"]
# Phase 115.L.1 — dust-DDS via the C vtable.
rmw-dds-cffi = ["rmw-cffi", "dep:nros-rmw-dds-cffi", "nros-node/rmw-dds-cffi"]
# Phase 115.L.2 — zenoh-pico via the C vtable.
rmw-zenoh-cffi = ["rmw-cffi", "dep:nros-rmw-zenoh-cffi", "nros-node/rmw-zenoh-cffi"]

# Phase 99: backend native slot lending. See nros-node's rmw-lending
# feature for backend support matrix.
rmw-lending = ["nros-node/rmw-lending"]

# Platform (select one; forwarded to RMW shims which forward to -sys crates).
platform-posix = [
    "nros-platform/platform-posix",
    "nros-node/platform-posix",
    "nros-rmw-dds-cffi?/platform-posix",
    "nros-rmw-zenoh-cffi?/platform-posix",
    "platform-udp",
]
platform-zephyr = [
    "nros-platform/platform-zephyr",
    "nros-node/platform-zephyr",
    "nros-rmw-dds-cffi?/platform-zephyr",
    "nros-rmw-zenoh-cffi?/platform-zephyr",
    "platform-udp",
]
platform-bare-metal = [
    "nros-node/platform-bare-metal",
    "nros-rmw-dds-cffi?/platform-bare-metal",
    "nros-rmw-zenoh-cffi?/platform-bare-metal",
]
platform-freertos = [
    "nros-platform/platform-freertos",
    "nros-node/platform-freertos",
    "nros-rmw-dds-cffi?/platform-freertos",
    "nros-rmw-zenoh-cffi?/platform-freertos",
    "platform-udp",
]
platform-nuttx = [
    "nros-platform/platform-nuttx",
    "nros-node/platform-nuttx",
    "nros-rmw-dds-cffi?/platform-nuttx",
    "nros-rmw-zenoh-cffi?/platform-nuttx",
    "platform-udp",
]
platform-threadx = [
    "nros-platform/platform-threadx",
    "nros-node/platform-threadx",
    "nros-rmw-dds-cffi?/platform-threadx",
    "nros-rmw-zenoh-cffi?/platform-threadx",
    "platform-udp",
]
platform-cffi = ["nros-platform/platform-cffi"]
# Phase 11 — AGX Orin SPE (Cortex-R5F + NVIDIA FreeRTOS FSP).
# IVC-only transport; no `platform-udp` (no Ethernet, no UDP socket
# layer).
platform-orin-spe = [
    "nros-platform/platform-orin-spe",
    "nros-node/platform-orin-spe",
]

# Zenoh link-layer protocol features (bare-metal only — posix uses CMake defaults).
link-tcp = ["nros-rmw-zenoh-cffi?/link-tcp"]
link-udp-unicast = ["nros-rmw-zenoh-cffi?/link-udp-unicast"]
link-tls = ["nros-rmw-zenoh-cffi?/link-tls"]
# Phase 115.B — runtime-pluggable user transport via the
# `custom://` locator scheme.
link-custom = ["nros-rmw-zenoh-cffi?/link-custom"]

# XRCE transport — platform-agnostic UDP (auto-enabled by OS platform features).
platform-udp = ["nros-node/platform-udp"]
# XRCE transport refinements (legacy aliases).
xrce-udp = ["platform-posix", "platform-udp"]
xrce-serial = ["nros-platform/platform-posix", "nros-node/posix-serial"]

# E2E safety protocol (CRC-32 + sequence tracking).
safety-e2e = [
    "nros-node/safety-e2e",
    "nros-rmw/safety-e2e",
]

# Zero-copy receive via z_bytes_get_contiguous_view (unstable zenoh-pico API).
unstable-zenoh-api = ["nros-node/unstable-zenoh-api"]

# Async feedback stream (futures_core::Stream impl on FeedbackStream).
stream = ["nros-node/stream"]

# FFI reentrancy guards (critical-section around all RMW FFI calls).
ffi-sync = ["nros-node/ffi-sync"]

# Parameter services for ROS 2 interop (ros2 param list/get/set).
param-services = ["nros-node/param-services"]

# Lifecycle services for ROS 2 interop (ros2 lifecycle set|get|list|nodes — REP-2002).
lifecycle-services = ["nros-node/lifecycle-services"]

# ROS edition feature flags.
ros-humble = ["nros-node/ros-humble", "nros-rmw-zenoh-cffi?/ros-humble"]
ros-iron = ["nros-node/ros-iron", "nros-rmw-zenoh-cffi?/ros-iron"]

[dependencies]
# Core functionality (default-features = false for no_std support).
nros-core = { version = "0.1.0", path = "../nros-core", default-features = false }
nros-macros = { version = "0.1.0", path = "../nros-macros" }
nros-node = { version = "0.1.0", path = "../nros-node", default-features = false }
nros-rmw = { version = "0.1.0", path = "../nros-rmw", default-features = false }
nros-rmw-cffi = { version = "0.1.0", path = "../nros-rmw-cffi", default-features = false, optional = true }
# Phase 115.K.2.5.1.0 — XRCE via the C backend.
nros-rmw-xrce-cffi = { workspace = true, optional = true }
# Phase 115.L.1 / L.2 — Rust-backend cffi shims.
nros-rmw-dds-cffi = { workspace = true, optional = true }
nros-rmw-zenoh-cffi = { workspace = true, optional = true }
nros-params = { version = "0.1.0", path = "../nros-params", default-features = false }
nros-platform = { version = "0.1.0", path = "../nros-platform", default-features = false }
nros-serdes = { version = "0.1.0", path = "../nros-serdes", default-features = false }
paste = "1"

[dev-dependencies]

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true
