[package]
name = "nros"
version = "0.1.0"
edition = "2024"
description = "Unified ROS 2 client library for embedded systems"
license = "Apache-2.0"
repository.workspace = true
keywords = ["ros", "ros2", "embedded", "no_std"]
categories = ["embedded", "no-std", "robotics"]

[features]
default = ["std", "ffi-size-markers"]
# Phase 11.3.C — `#[used]` markers on the `__NROS_SIZE_*` opaque-storage
# statics. nros-c / nros-cpp build scripts probe these out of the rlib
# to derive C/C++ FFI macros (Phase 87). Pure-Rust applications (e.g.
# autoware-sentinel's SPE firmware) don't need them — the markers are
# `#[used]` so `--gc-sections` cannot drop the underlying [u8; N]
# arrays from the final binary, which costs ~340 KB on Cortex-R5
# because `size_of::<Executor>()` ≈ 348 KB. Disable this feature with
# `default-features = false` + opt back into `std` to recover the
# 340 KB at link time.
ffi-size-markers = []
std = [
    "alloc",  # std implies alloc
    "nros-core/std",
    "nros-node/std",
    "nros-rmw/std",
    "nros-rmw-zenoh?/std",
    "nros-rmw-xrce?/std",
    "nros-rmw-dds?/std",
    "nros-rmw-uorb?/std",
    "nros-params/std",
    "nros-serdes/std",
]
alloc = [
    "nros-core/alloc",
    "nros-node/alloc",
    "nros-rmw/alloc",
    "nros-rmw-xrce?/alloc",
    "nros-params/alloc",
    "nros-serdes/alloc",
]

# RMW backend (select one)
rmw-zenoh = ["dep:nros-rmw-zenoh", "nros-node/rmw-zenoh"]
rmw-xrce = ["dep:nros-rmw-xrce", "nros-node/rmw-xrce"]
rmw-dds = ["dep:nros-rmw-dds", "nros-node/rmw-dds"]
rmw-cffi = ["dep:nros-rmw-cffi", "nros-node/rmw-cffi"]
rmw-uorb = ["dep:nros-rmw-uorb", "nros-node/rmw-uorb"]

# Phase 99: backend native slot lending. See nros-node's rmw-lending
# feature for backend support matrix. v1: only XRCE-DDS implements
# SlotLending (via uxr_prepare_output_stream).
rmw-lending = ["nros-node/rmw-lending"]

# Platform (select one; forwarded to RMW backends which forward to -sys crates)
platform-posix = [
    "nros-platform/platform-posix",
    "nros-node/platform-posix",
    "nros-rmw-zenoh?/platform-posix",
    "nros-rmw-xrce?/platform-posix",
    "nros-rmw-dds?/platform-posix",
    "platform-udp",
]
platform-zephyr = [
    "nros-platform/platform-zephyr",
    "nros-node/platform-zephyr",
    "nros-rmw-zenoh?/platform-zephyr",
    "nros-rmw-xrce?/platform-zephyr",
    "nros-rmw-dds?/platform-zephyr",
    "platform-udp",
]
platform-bare-metal = [
    "nros-node/platform-bare-metal",
    "nros-rmw-zenoh?/platform-bare-metal",
    "nros-rmw-xrce?/platform-bare-metal",
    "nros-rmw-dds?/platform-bare-metal",
]
platform-freertos = [
    "nros-platform/platform-freertos",
    "nros-node/platform-freertos",
    "nros-rmw-zenoh?/platform-freertos",
    "nros-rmw-xrce?/platform-freertos",
    "nros-rmw-dds?/platform-freertos",
    "platform-udp",
]
platform-nuttx = [
    "nros-platform/platform-nuttx",
    "nros-node/platform-nuttx",
    "nros-rmw-zenoh?/platform-nuttx",
    "nros-rmw-xrce?/platform-nuttx",
    "nros-rmw-dds?/platform-nuttx",
    "platform-udp",
]
platform-threadx = [
    "nros-platform/platform-threadx",
    "nros-node/platform-threadx",
    "nros-rmw-zenoh?/platform-threadx",
    "nros-rmw-xrce?/platform-threadx",
    "nros-rmw-dds?/platform-threadx",
    "platform-udp",
]
platform-cffi = ["nros-platform/platform-cffi"]
# Phase 11 — AGX Orin SPE (Cortex-R5F + NVIDIA FreeRTOS FSP).
# IVC-only transport; no `platform-udp` (no Ethernet, no UDP socket
# layer). zenoh-pico's `Z_FEATURE_LINK_IVC` is enabled by
# `zpico-sys/orin-spe` transitively via the rmw-zenoh feature.
platform-orin-spe = [
    "nros-platform/platform-orin-spe",
    "nros-node/platform-orin-spe",
    "nros-rmw-zenoh?/platform-orin-spe",
]

# Zenoh link-layer protocol features (bare-metal only — posix uses CMake defaults)
link-tcp = ["nros-rmw-zenoh?/link-tcp"]
link-udp-unicast = ["nros-rmw-zenoh?/link-udp-unicast"]
link-tls = ["nros-rmw-zenoh?/link-tls"]
# Phase 115.B — runtime-pluggable user transport via the
# `custom://` locator scheme.
link-custom = ["nros-rmw-zenoh?/link-custom"]

# XRCE transport — platform-agnostic UDP (auto-enabled by OS platform features)
platform-udp = ["nros-node/platform-udp"]
# XRCE transport refinements (legacy aliases)
xrce-udp = ["platform-posix", "platform-udp"]
xrce-serial = ["nros-platform/platform-posix", "nros-rmw-xrce?/posix-serial", "nros-node/posix-serial"]

# E2E safety protocol (CRC-32 + sequence tracking)
safety-e2e = [
    "nros-node/safety-e2e",
    "nros-rmw/safety-e2e",
    "nros-rmw-zenoh?/safety-e2e",
    "nros-rmw-xrce?/safety-e2e",
]

# Zero-copy receive via z_bytes_get_contiguous_view (unstable zenoh-pico API)
unstable-zenoh-api = ["nros-node/unstable-zenoh-api", "nros-rmw-zenoh?/unstable-zenoh-api"]

# Async feedback stream (futures_core::Stream impl on FeedbackStream)
stream = ["nros-node/stream"]

# Phase 101.4 — `Arc` / `Weak` substitution in dust-dds via
# `portable-atomic-util`. Required for CAS-poor RISC-V `imc`
# targets (ESP32-C3) where `target_has_atomic = "ptr"` evaluates
# false and `alloc::sync::Arc` does not exist. Off by default;
# board crates that need it (e.g. `nros-board-esp32-qemu` with
# `dds-heap`) forward through this feature.
rmw-dds-portable-atomic = ["nros-rmw-dds?/portable-atomic"]

# FFI reentrancy guards (critical-section around all RMW FFI calls)
ffi-sync = [
    "nros-node/ffi-sync",
    "nros-rmw-zenoh?/ffi-sync",
    "nros-rmw-xrce?/ffi-sync",
]

# Parameter services for ROS 2 interop (ros2 param list/get/set)
param-services = ["nros-node/param-services"]

# Lifecycle services for ROS 2 interop (ros2 lifecycle set|get|list|nodes — REP-2002)
lifecycle-services = ["nros-node/lifecycle-services"]

# ROS edition feature flags
ros-humble = ["nros-node/ros-humble", "nros-rmw-zenoh?/ros-humble"]
ros-iron = ["nros-node/ros-iron", "nros-rmw-zenoh?/ros-iron"]

[dependencies]
# Core functionality (default-features = false for no_std support)
nros-core = { version = "0.1.0", path = "../nros-core", default-features = false }
nros-macros = { version = "0.1.0", path = "../nros-macros" }
nros-node = { version = "0.1.0", path = "../nros-node", default-features = false }
nros-rmw = { version = "0.1.0", path = "../nros-rmw", default-features = false }
nros-rmw-zenoh = { version = "0.1.0", path = "../../zpico/nros-rmw-zenoh", default-features = false, optional = true }
nros-rmw-xrce = { version = "0.1.0", path = "../../xrce/nros-rmw-xrce", default-features = false, optional = true }
nros-rmw-dds = { version = "0.1.0", path = "../../dds/nros-rmw-dds", default-features = false, optional = true }
nros-rmw-cffi = { version = "0.1.0", path = "../nros-rmw-cffi", default-features = false, optional = true }
nros-rmw-uorb = { version = "0.1.0", path = "../../px4/nros-rmw-uorb", default-features = false, optional = true }
nros-params = { version = "0.1.0", path = "../nros-params", default-features = false }
nros-platform = { version = "0.1.0", path = "../nros-platform", default-features = false }
nros-serdes = { version = "0.1.0", path = "../nros-serdes", default-features = false }
paste = "1"

[dev-dependencies]

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true
