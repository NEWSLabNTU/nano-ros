[package]
name = "nros"
version = "0.1.0"
edition = "2024"
description = "Unified ROS 2 client library for embedded systems"
license = "Apache-2.0"
keywords = ["ros", "ros2", "embedded", "no_std"]
categories = ["embedded", "no-std", "robotics"]

[features]
default = ["std", "zenoh", "ros-humble"]
std = [
    "alloc",  # std implies alloc
    "nros-core/std",
    "nros-node/std",
    "nano-ros-transport/std",
    "nros-params/std",
]
alloc = [
    "nros-core/alloc",
    "nros-node/alloc",
    "nano-ros-transport/alloc",
    "nros-params/alloc",
]
# Transport: selects the middleware protocol (only zenoh today)
zenoh = [
    "nros-node/zenoh",
    "nano-ros-transport/zenoh",
]

# ROS edition feature flags
ros-humble = ["nros-node/ros-humble"]
ros-iron = ["nros-node/ros-iron"]

# Platform: selects the OS/HAL backend (mutually exclusive)
platform-posix = ["nros-node/platform-posix", "nano-ros-transport/platform-posix"]
platform-zephyr = ["nros-node/platform-zephyr", "nano-ros-transport/platform-zephyr"]
platform-bare-metal = ["nros-node/platform-bare-metal", "nano-ros-transport/platform-bare-metal"]

# Executor modes
rtic = ["nros-node/rtic"]
polling = ["nros-node/polling"]

[dependencies]
# Core functionality (default-features = false for no_std support)
nros-core = { path = "../nros-core", default-features = false }
nros-macros = { path = "../nros-macros" }
nros-node = { path = "../nros-node", default-features = false }
nano-ros-transport = { path = "../nano-ros-transport", default-features = false }
nros-params = { path = "../nros-params", default-features = false }

[dev-dependencies]

[package.metadata.docs.rs]
all-features = true
