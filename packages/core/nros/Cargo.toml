[package]
name = "nros"
version = "0.1.0"
edition = "2024"
description = "Unified ROS 2 client library for embedded systems"
license = "Apache-2.0"
keywords = ["ros", "ros2", "embedded", "no_std"]
categories = ["embedded", "no-std", "robotics"]

[features]
default = ["std", "rmw-zenoh", "platform-posix", "ros-humble"]
std = [
    "alloc",  # std implies alloc
    "nros-core/std",
    "nros-node/std",
    "nros-rmw/std",
    "nros-rmw-zenoh?/std",
    "nros-params/std",
]
alloc = [
    "nros-core/alloc",
    "nros-node/alloc",
    "nros-rmw/alloc",
    "nros-params/alloc",
]

# RMW backend (select one)
rmw-zenoh = ["dep:nros-rmw-zenoh", "nros-node/rmw-zenoh"]
rmw-xrce = ["dep:nros-rmw-xrce", "nros-node/rmw-xrce"]

# Platform (select one; forwarded to active backend via ? syntax)
platform-posix = [
    "nros-node/platform-posix",
    "nros-rmw-zenoh?/platform-posix",
    "nros-rmw-xrce?/platform-posix",
]
platform-zephyr = ["nros-node/platform-zephyr", "nros-rmw-zenoh?/platform-zephyr"]
platform-bare-metal = [
    "nros-node/platform-bare-metal",
    "nros-rmw-zenoh?/platform-bare-metal",
    "nros-rmw-xrce?/platform-bare-metal",
]

# XRCE transport refinements (posix-only)
xrce-udp = ["nros-rmw-xrce?/posix-udp", "nros-node/posix-udp"]
xrce-serial = ["nros-rmw-xrce?/posix-serial", "nros-node/posix-serial"]

# E2E safety protocol (CRC-32 + sequence tracking)
safety-e2e = ["nros-node/safety-e2e", "nros-rmw/safety-e2e", "nros-rmw-zenoh?/safety-e2e"]

# Parameter services for ROS 2 interop (ros2 param list/get/set)
param-services = ["nros-node/param-services"]

# ROS edition feature flags
ros-humble = ["nros-node/ros-humble"]
ros-iron = ["nros-node/ros-iron"]

# Executor modes
rtic = ["nros-node/rtic"]
polling = ["nros-node/polling"]

[dependencies]
# Core functionality (default-features = false for no_std support)
nros-core = { path = "../nros-core", default-features = false }
nros-macros = { path = "../nros-macros" }
nros-node = { path = "../nros-node", default-features = false }
nros-rmw = { path = "../nros-rmw", default-features = false }
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", default-features = false, optional = true }
nros-rmw-xrce = { path = "../../xrce/nros-rmw-xrce", default-features = false, optional = true }
nros-params = { path = "../nros-params", default-features = false }

[dev-dependencies]

[package.metadata.docs.rs]
all-features = true
