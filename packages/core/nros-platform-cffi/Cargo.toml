[package]
name = "nros-platform-cffi"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Rust mirror of the canonical C ABI for the nros platform abstraction"
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["embedded", "no-std", "rtos", "ffi"]
categories = ["embedded", "no-std", "os"]

[features]
default = []
threading = []
# Phase 121.4.a — compile `tests/c_stubs/platform_stubs.c` into a
# static lib that provides every `nros_platform_*` symbol with
# per-category counters. Only the in-crate integration test
# (`tests/c_stub_platform.rs`) consumes this; regular consumers
# never enable it.
c-stub-test = ["dep:cc"]
# Phase 121.3.posix / 123.A.1.x.2 — compile the sibling `nros-platform-posix`
# crate's `src/platform.c` into a static lib that supplies every
# `nros_platform_*` symbol with a real POSIX implementation. The
# in-crate integration test `tests/c_port_posix.rs` consumes it.
# Mutually exclusive with `c-stub-test` (both would supply
# definitions for the same symbols).
posix-c-port = ["dep:cc"]

[dependencies]
nros-platform-api = { version = "0.4.0", path = "../nros-platform-api" }

[build-dependencies]
cc = { version = "1", optional = true }

[dev-dependencies]
# Required by the `posix-c-port` integration test for pthread_mutex_t /
# pthread_cond_t / pthread_t type layouts.
libc = "0.2"
# Phase 110.E.b — `c_port_posix_timer.rs` exercises the
# `AtomicSporadicState` + `atomic_sporadic_refill_thunk` round-trip
# against the real POSIX `PlatformTimer` impl. Only the test pulls
# nros-node, so the production crate stays dependency-light.
nros-node = { path = "../nros-node", default-features = false, features = ["std", "rmw-cffi"] }

[lints]
workspace = true
