# cbindgen configuration for nros-platform-cffi
# Generates include/nros/platform_vtable.h from the Rust vtable struct
# + register fn. Single source of truth for C platform porters.

language = "C"
header = """/**
 * @file platform_vtable.h
 * @brief nros platform abstraction — C vtable for porters writing a
 *        platform layer in C (or any C-ABI language).
 *
 * AUTO-GENERATED by cbindgen from `nros-platform-cffi/src/lib.rs` —
 * DO NOT EDIT MANUALLY.
 *
 * A platform implementor:
 *   1. defines a `nros_platform_vtable_t` global with every function
 *      pointer filled in (see field-level docs for return-value
 *      conventions),
 *   2. calls `nros_platform_cffi_register(&vtable)` *before* opening a
 *      session,
 *   3. links the resulting object against the nros static library
 *      built with `--features platform-cffi`.
 *
 * Copyright 2026 nros contributors
 * Licensed under Apache-2.0
 */

#include <stdarg.h>
#include <stdbool.h>
#include <stdint.h>
#include <stddef.h>
"""
include_guard = "NROS_PLATFORM_VTABLE_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = false
no_includes = true
cpp_compat = true
usize_is_size_t = true

[parse]
parse_deps = false
clean = true

[fn]
rename_args = "None"

[struct]
rename_fields = "None"
