[package]
name        = "nros-build"
version     = "0.1.0"
edition     = "2024"
publish     = false
description = "Build-script helper: runs `nros codegen` from build.rs (Phase 212.C)."
license     = "MIT OR Apache-2.0"

[lib]
path = "src/lib.rs"

[dependencies]
sha2       = { version = "0.10", default-features = false }
walkdir    = "2.5"
serde_json = "1"

[dev-dependencies]
tempfile = "3"
