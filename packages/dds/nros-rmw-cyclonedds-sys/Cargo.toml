[package]
name = "nros-rmw-cyclonedds-sys"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Rust shim for nros-rmw-cyclonedds — exposes the C-linkage register entry from the C++ Cyclone DDS backend (Phase 169.5). With `vendored`, also compiles the backend in-process so `cargo build --features rmw-cyclonedds` links end-to-end (Phase 212.K.2)."
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
publish = false
build = "build.rs"
# Phase 214.S.2 — carry a `links = "cyclonedds"` marker so any direct
# dependent's build script receives `DEP_CYCLONEDDS_*` env vars. The
# value `"cyclonedds"` is distinct from `cyclonedds-sys`'s
# `links = "ddsc"` (which exports the actual libddsc include/idlc
# paths). This crate's `links =` only signals presence; we emit a
# single `cargo:present=1` for downstream cfg-detection.
links = "cyclonedds"

# Mirror of `nros-rmw-xrce-cffi`. Rust users call `register()` once
# before any session creation; the underlying C++ Cyclone DDS
# library (compiled by `packages/dds/nros-rmw-cyclonedds/`'s
# standalone CMake project, or by the Zephyr module's
# `CONFIG_NROS_RMW_CYCLONEDDS` branch, or — with the `vendored`
# feature added by Phase 212.K.2 — by this crate's own `build.rs`)
# provides the symbol.
[lib]
path = "src/lib.rs"
crate-type = ["rlib"]
# Phase 214 followup — under `vendored` (default after S.1) the test
# link drags `libnros_rmw_cyclonedds.a` which transitively needs
# `nros_rmw_cffi_register_named` (declared by `nros-rmw-cffi`, NOT in
# this crate's dep graph by design — the shim isn't a runtime, only
# a re-exporter). The lone test (`register_succeeds_with_stub`)
# exercised the cfg(not(vendored)) stub branch; with vendored
# default-on, that branch is inert. Skip the lib-test target; the
# real register path is exercised end-to-end by `nros-rmw-cyclonedds`
# unit tests + the K.7.7 native rust example e2e.
test = false

[features]
# Phase 214.S.1 — `vendored` is now part of the default feature set so
# `cargo build -p nros-rmw-cyclonedds-sys` (and any downstream that
# pulls this crate via `dep:` or workspace path) builds the C++
# backend end-to-end without requiring `--features vendored`. Matches
# the zenoh + xrce backends, which always vendor their underlying
# libraries. Existing CMake / Zephyr consumers that supply the same
# symbols externally must opt out via `default-features = false`.
default = ["linkme-register", "vendored"]
# Phase 128.B.3 — see nros-rmw-xrce-cffi for the same feature.
linkme-register = ["nros-rmw-cffi/linkme-register"]
# Phase 144.3 — toggled on when emitting this crate as a top-level
# `staticlib` (hosted POSIX builds). Embedded consumers keep the
# default no_std build.
std = []
# Phase 212.K.2 — compile the C++ backend
# (`packages/dds/nros-rmw-cyclonedds/src/*.cpp`) + the bundled
# `rmw_dds_common_graph` descriptor as part of this crate's build,
# linking against `cyclonedds-sys`'s libddsc. Lets pure-cargo native
# examples link Cyclone end-to-end without the CMake outer step.
# Phase 214.S.1 promoted this to a default — kept as a named feature
# so external CMake / Zephyr consumers can opt out via
# `default-features = false`.
vendored = ["dep:cyclonedds-sys", "dep:cc"]

[dependencies]
nros-rmw-cffi = { version = "0.5.0", path = "../../core/nros-rmw-cffi", default-features = false }
linkme = { version = "0.3", default-features = false }
# Phase 212.K.2 — `cyclonedds-sys` is a build-only path provider; we
# never `use` anything from its lib.rs. Declared as a regular dep so
# that Cargo passes `DEP_DDSC_*` env vars into our `build.rs`.
cyclonedds-sys = { version = "0.5.0", path = "../cyclonedds-sys", optional = true }

[build-dependencies]
cc = { version = "1.0", optional = true }
nros-build-paths = { path = "../../core/nros-build-paths" }

[lints]
workspace = true
