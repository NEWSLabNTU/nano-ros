[package]
name = "nros-rmw-dds"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "DDS/RTPS RMW backend for nros (via dust-dds)"
publish = false  # depends on unpublished dust-dds fork
build = "build.rs"

[features]
default = []

# Phase 97.4 debug ‚Äî sprinkle Cortex-M semihosting prints throughout
# `transport_nros::create_participant` so a hung bring-up surfaces
# the last-reached step. Off by default; enable from a bare-metal
# / FreeRTOS example crate's Cargo.toml.
debug-cortex-m-semihosting = ["dep:cortex-m-semihosting"]
# Phase 97.4 debug ‚Äî same trace as `debug-cortex-m-semihosting` but
# routed through `eprintln!` for std-capable platforms (NuttX,
# ThreadX-Linux, etc.) where Cortex-M semihosting isn't applicable.
debug-stderr = []
# Phase 97.4.threadx-riscv64 ‚Äî UART-backed trace for no_std targets
# where neither semihosting nor `eprintln!` is available. The board
# crate provides `uart_putc(u8)` via cc-compiled C; the linker
# resolves it when this feature is on. Off by default ‚Äî only the
# `transport_nros::create_participant` bind/listen path traces
# through it, which is enough to surface where bring-up dies.
debug-uart = []

# Core capability flags. `std` enables the stock dust-dds UDP transport
# (3 OS threads per participant); `alloc` is required on every platform
# because dust-dds is `no_std + alloc`, not alloc-free (see Phase 71 doc
# ‚Äî "Alloc-free claim").
std = ["alloc", "nros-rmw/std", "dust_dds/std", "dust_dds/rtps_udp_transport"]
alloc = []

# Platform selection ‚Äî mirrors nros-rmw-zenoh's Cargo.toml shape. Exactly
# one platform feature must be enabled. `platform-posix` implies `std`
# because dust-dds's stock UDP transport is the easiest path on POSIX.
# The remaining platforms plug `NrosPlatformRuntime<ConcretePlatform>`
# (Phase 71.3) into dust-dds's `DdsRuntime` trait and use nros-platform
# primitives for clock / sleep / sockets.
platform-posix    = ["std", "alloc", "nros-platform/platform-posix"]
platform-zephyr   = ["nostd-runtime", "nros-platform/platform-zephyr"]
platform-freertos = ["nostd-runtime", "nros-platform/platform-freertos"]
platform-nuttx    = ["nostd-runtime", "nros-platform/platform-nuttx"]
platform-threadx  = ["nostd-runtime", "nros-platform/platform-threadx"]

# Internal ‚Äî set by every `platform-*` feature that uses
# `NrosPlatformRuntime` + `NrosUdpTransportFactory` (i.e. every
# platform except `platform-posix`, which keeps using dust-dds's stock
# threaded transport).
nostd-runtime = ["alloc"]
# Phase 97.3 ‚Äî bare-metal slices (MPS2-AN385 / STM32F4 / ESP32-QEMU)
# pull in `nostd-runtime` and rely on the example crate to pin the
# concrete board via `nros-platform/platform-<board>` directly. Same
# shape as the per-RTOS features above, just without forwarding the
# nros-platform pin (different board crates pick different ZSTs).
# Cooperative recv runs through `<ConcretePlatform as PlatformUdp>`
# the smoltcp macro emits in the board's `nros-platform-<board>` crate.
platform-bare-metal = ["nostd-runtime"]

# ROS edition (controls topic name/type hash format)
ros-humble = []
ros-iron = []

# E2E safety protocol
safety-e2e = ["nros-rmw/safety-e2e"]

# Phase 101.4 ‚Äî forward dust-dds's `portable-atomic` feature so
# `Arc` / `Weak` route through `portable-atomic-util` on CAS-poor
# targets (ESP32-C3 / `riscv32imc`). Off by default; only enable
# from a board crate's Cargo.toml when the target needs it. See
# `docs/roadmap/phase-101-portable-atomic-arc-substitution.md`.
portable-atomic = ["dust_dds/portable-atomic"]

[dependencies]
nros-rmw = { version = "0.1.0", path = "../../core/nros-rmw", default-features = false }
nros-core = { workspace = true, default-features = false }
nros-platform = { version = "0.1.0", path = "../../core/nros-platform", default-features = false }
dust_dds = { path = "../dust-dds/dds", default-features = false, features = ["dcps", "rtps"] }
heapless = { workspace = true }
# `spin` provides the no_std Mutex used by `NrosPlatformRuntime`'s task
# queue. `std` builds use `std::sync::Mutex` instead (see runtime.rs).
# Phase 97.3.esp32-qemu ‚Äî `riscv32imc` (ESP32-C3) has no native
# atomic CAS; spin's `portable_atomic` feature swaps in the
# `portable-atomic` crate's polyfill (which itself needs the
# board crate to enable `unsafe-assume-single-core`). Harmless on
# Cortex-M / x86-64 where native CAS is used.
spin = { version = "0.9", default-features = false, features = ["spin_mutex", "portable_atomic"] }
# Phase 97.4 debug ‚Äî semihosting trace inside `transport_nros::create_participant`
# so failed bring-up shows where it dies (which RTPS port bind, which
# `mcast_listen` step, etc.). Cortex-M only; bare-metal / FreeRTOS
# examples turn it on via `features = ["debug-cortex-m-semihosting"]`.
cortex-m-semihosting = { version = "0.5", optional = true }

[dev-dependencies]
# Phase 71 ‚Äî host-side end-to-end validation drives `NrosPlatformRuntime`
# and `NrosUdpTransportFactory` directly with `PosixPlatform`, bypassing
# `Rmw::open()` (which on `platform-posix` uses dust-dds's stock threaded
# transport). Lets us run the same code path the no_std platforms run,
# on Linux, without QEMU.
nros-platform-posix = { version = "0.1.0", path = "../../core/nros-platform-posix" }

[lints]
workspace = true
