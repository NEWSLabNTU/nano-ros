[package]
name = "nros-rmw-dds-cffi"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "C-vtable shim for the dust-dds RMW backend — exposes nros_rmw_dds_register()"
publish = false

[lib]
path = "src/lib.rs"

[features]
default = []

# Platform forwarding — mirrors nros-rmw-dds's own platform-* features.
# Exactly one must be enabled.
platform-posix = ["nros-rmw-dds/platform-posix", "nros-rmw-cffi/std", "nros-rmw-cffi/alloc"]
platform-zephyr = ["nros-rmw-dds/platform-zephyr", "nros-rmw-cffi/alloc"]
platform-freertos = ["nros-rmw-dds/platform-freertos", "nros-rmw-cffi/alloc"]
platform-nuttx = ["nros-rmw-dds/platform-nuttx", "nros-rmw-cffi/alloc"]
platform-threadx = ["nros-rmw-dds/platform-threadx", "nros-rmw-cffi/alloc"]
platform-bare-metal = ["nros-rmw-dds/platform-bare-metal", "nros-rmw-cffi/alloc"]

# Phase 101.4 — forward dust-dds's portable-atomic feature for
# CAS-poor RISC-V `imc` targets (ESP32-C3) where
# `target_has_atomic = "ptr"` evaluates false.
portable-atomic = ["nros-rmw-dds/portable-atomic"]

[dependencies]
# `RustBackendAdapter` lives behind nros-rmw-cffi's `alloc` feature
# (it boxes every entity handle), so this crate force-enables it
# unconditionally — the alloc requirement is intrinsic to the cffi
# shim, not optional.
nros-rmw-cffi = { workspace = true, default-features = false, features = ["alloc"] }
nros-rmw-dds = { workspace = true, default-features = false }
nros-rmw = { workspace = true, default-features = false }

[lints]
workspace = true
