[package]
name = "nros-rmw-cyclonedds"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Phase 212.K.7 ŌĆö Rust shim co-located with the Cyclone DDS RMW C++ backend. Provides the `no_std`, alloc-free runtime descriptor builder + bounded type registry that replaces the per-msg-pkg `cyclonedds` Cargo feature pattern. The C++ backend itself is still built by the sibling CMakeLists.txt; this crate only adds the Rust side."
publish = false

[lib]
path = "src/lib.rs"
crate-type = ["rlib"]

[features]
default = []
# Hosted-build escape hatch. Off by default to honour the K.7
# `no_std`-only contract. Test code never enables `std`; the
# `#[cfg(test)]` tree compiles under `no_std + alloc-free`.
std = []
# Phase 212.K.7.6.b ŌĆö expose the in-tree `#[cfg(test)]` stubs for
# `nros_cyclonedds_build_descriptor_from_schema` and
# `nros_rmw_cyclonedds_register_descriptor` to downstream test
# builds (notably `nros-node`'s unit tests under
# `--features rmw-cyclonedds`) that would otherwise fail to link
# the C++ bridge symbols. Production builds NEVER enable this; the
# real C++ TU lives in the sibling CMake project. See
# `src/bridge.rs::test_stub` for the implementation.
bridge-stub = []

[dependencies]
# K.7.3 schema introspection trait + types.
nros-serdes = { version = "0.5.0", path = "../../core/nros-serdes", default-features = false }
# Phase 248 (C2) ŌĆö install this backend's per-type descriptor registrar
# into the generic `nros_rmw::type_descriptor` seam, so the agnostic core
# (`nros-node`) reaches Cyclone descriptors without a named dep on us.
nros-rmw = { version = "0.5.0", path = "../../core/nros-rmw", default-features = false }
# Fixed-capacity index map for the registry.
heapless = { workspace = true }
# Multi-thread guard: spin lock on hosted, critical-section on bare-metal.
# Picked at compile time via `#[cfg]` in src/sync.rs.
critical-section = { version = "1.2", default-features = false }

# Phase 225.O ŌĆö `spin` is **hosted-only**. `src/sync.rs` uses
# `spin::Mutex` exclusively under `#[cfg(not(target_os = "none"))]`
# (bare-metal uses `critical-section`), but the dependency was declared
# unconditionally, dragging `spin` 0.9.8 into every bare-metal build.
# `spin` 0.9.8 calls `core::sync::atomic` CAS, which targets WITHOUT
# atomic CAS ŌĆö riscv32imc (ESP32-C3), thumbv6m ŌĆö cannot compile,
# breaking the esp32 workspace Entry (and any fresh-locked single-node
# esp32 build). thumbv7m / threadx / native masked it because their
# targets DO have CAS. Gate `spin` to non-`target_os = "none"` so it
# exactly mirrors `sync.rs` and disappears from bare-metal builds.
[target.'cfg(not(target_os = "none"))'.dependencies]
spin = { version = "0.9", default-features = false, features = ["mutex", "spin_mutex"] }

[lints]
workspace = true
