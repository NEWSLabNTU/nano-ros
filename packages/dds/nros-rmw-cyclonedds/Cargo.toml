[package]
name = "nros-rmw-cyclonedds"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Phase 212.K.7 — Rust shim co-located with the Cyclone DDS RMW C++ backend. Provides the `no_std`, alloc-free runtime descriptor builder + bounded type registry that replaces the per-msg-pkg `cyclonedds` Cargo feature pattern. The C++ backend itself is still built by the sibling CMakeLists.txt; this crate only adds the Rust side."
publish = false

[lib]
path = "src/lib.rs"
crate-type = ["rlib"]

[features]
default = []
# Hosted-build escape hatch. Off by default to honour the K.7
# `no_std`-only contract. Test code never enables `std`; the
# `#[cfg(test)]` tree compiles under `no_std + alloc-free`.
std = []

[dependencies]
# K.7.3 schema introspection trait + types.
nros-serdes = { version = "0.1.0", path = "../../core/nros-serdes", default-features = false }
# Fixed-capacity index map for the registry.
heapless = { workspace = true }
# Multi-thread guard: spin lock on hosted, critical-section on bare-metal.
# Picked at compile time via `#[cfg]` in src/sync.rs.
spin = { version = "0.9", default-features = false, features = ["mutex", "spin_mutex"] }
critical-section = { version = "1.2", default-features = false }

[lints]
workspace = true
