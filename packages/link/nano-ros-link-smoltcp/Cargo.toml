[package]
name = "nano-ros-link-smoltcp"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "smoltcp TCP link layer for nano-ros (bare-metal systems)"

[dependencies]
nano-ros-transport-zenoh-sys = { path = "../../transport/nano-ros-transport-zenoh-sys", features = ["bare-metal", "link-tcp"] }
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet", "proto-ipv4", "socket-tcp",
] }
