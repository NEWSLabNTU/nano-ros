[package]
name = "nano-ros-platform-esp32-qemu"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ESP32-C3 QEMU platform crate for nano-ros (system primitives + node API)"

[lib]
name = "nano_ros_platform_esp32_qemu"

[dependencies]
# Zenoh FFI bindings — bare-metal only, no C shims (Rust provides all symbols)
nano-ros-transport-zenoh-sys = { path = "../../transport/nano-ros-transport-zenoh-sys", features = ["bare-metal", "link-tcp"] }
# TCP link layer via smoltcp
nano-ros-link-smoltcp = { path = "../../link/nano-ros-link-smoltcp" }
# OpenCores Ethernet MAC driver (for QEMU open_eth NIC)
openeth-smoltcp = { path = "../../drivers/openeth-smoltcp" }

# ESP32-C3 HAL and support crates
esp-hal = { version = "~1.0.0", features = ["esp32c3", "unstable"] }
esp-backtrace = { version = "~0.18.0", features = ["esp32c3", "panic-handler", "println"] }
esp-bootloader-esp-idf = { version = "~0.4.0", features = ["esp32c3"] }
esp-println = { version = "~0.16.0", features = ["esp32c3"] }
esp-alloc = { version = "~0.9.0" }

# Network stack (version must match openeth-smoltcp's smoltcp dependency)
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

# Core types (RosMessage, CDR serialization)
nano-ros-core = { path = "../../core/nano-ros-core", default-features = false }

# Heapless collections (for keyexpr formatting)
heapless = "0.8"

# Atomics for riscv32imc (no hardware atomic support)
# unsafe-assume-single-core is safe because ESP32-C3 is single-core
portable-atomic = { version = "1", default-features = false, features = ["unsafe-assume-single-core"] }

[features]
default = []
