[package]
name = "nano-ros-platform-stm32f4"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "STM32F4 platform crate for nros (system primitives + node API)"

[lib]
name = "nano_ros_platform_stm32f4"

[dependencies]
# Zenoh FFI bindings — bare-metal only, no C shims (Rust provides all symbols)
nano-ros-transport-zenoh-sys = { path = "../../transport/nano-ros-transport-zenoh-sys", features = ["bare-metal", "link-tcp"] }
# TCP link layer via smoltcp
nano-ros-link-smoltcp = { path = "../../link/nano-ros-link-smoltcp" }

# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"

# STM32F4 HAL (feature-gated for different chips)
stm32f4xx-hal = { version = "0.21" }

# STM32 Ethernet
stm32-eth = { version = "0.8", features = ["smoltcp-phy"] }

# TCP/IP stack
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

# Logging
defmt = "0.3"

# Core types (RosMessage, CDR serialization)
nros-core = { path = "../../core/nros-core", default-features = false }

# Heapless collections (for keyexpr formatting)
heapless = "0.8"

[features]
default = ["stm32f429"]

# STM32F4 chip variants
stm32f407 = ["stm32f4xx-hal/stm32f407", "stm32-eth/stm32f407"]
stm32f417 = ["stm32f4xx-hal/stm32f417", "stm32-eth/stm32f417"]
stm32f427 = ["stm32f4xx-hal/stm32f427", "stm32-eth/stm32f427"]
stm32f429 = ["stm32f4xx-hal/stm32f429", "stm32-eth/stm32f429"]
stm32f437 = ["stm32f4xx-hal/stm32f437", "stm32-eth/stm32f437"]
stm32f439 = ["stm32f4xx-hal/stm32f439", "stm32-eth/stm32f439"]
stm32f469 = ["stm32f4xx-hal/stm32f469", "stm32-eth/stm32f469"]
stm32f479 = ["stm32f4xx-hal/stm32f479", "stm32-eth/stm32f479"]
