[package]
name = "nano-ros-platform-qemu"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 platform crate for nano-ros (system primitives + node API)"

[lib]
name = "nano_ros_platform_qemu"

[dependencies]
# Zenoh FFI bindings — bare-metal only, no C shims (Rust provides all symbols)
nano-ros-transport-zenoh-sys = { path = "../../transport/nano-ros-transport-zenoh-sys", features = ["bare-metal", "link-tcp"] }
# TCP link layer via smoltcp
nano-ros-link-smoltcp = { path = "../../link/nano-ros-link-smoltcp" }
# LAN9118 Ethernet driver for QEMU MPS2-AN385
lan9118-smoltcp = { path = "../../drivers/lan9118-smoltcp" }

# Embedded dependencies
cortex-m = "0.7"
cortex-m-rt = "0.7"
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

# Semihosting for QEMU output
cortex-m-semihosting = "0.5"
panic-semihosting = "0.6"

# Core types (RosMessage, CDR serialization)
nano-ros-core = { path = "../../core/nano-ros-core", default-features = false }

# Heapless collections (for keyexpr formatting)
heapless = "0.8"

[features]
default = []
# Docker networking mode (container with NAT)
docker = []
