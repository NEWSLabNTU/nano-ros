[package]
name = "qemu-rs-common"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Common code for QEMU bare-metal examples with smoltcp + zenoh-pico"

[lib]
name = "qemu_rs_common"

[dependencies]
# Phase 214.H.2 — consume the SSoT `SOCKET_BUFFER_SIZE` from
# `nros-smoltcp` so the reference bridge stays in lock-step with the
# canonical smoltcp socket-buffer footprint.
nros-smoltcp = { path = "../../drivers/nros-smoltcp", default-features = false }
lan9118-smoltcp = { path = "../../drivers/lan9118-smoltcp" }
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

cortex-m = "0.7"
