[package]
name = "nano-ros-bsp-stm32f4"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "nano-ros BSP for STM32F4 family microcontrollers with Ethernet (thin wrapper over platform crate)"
repository = "https://github.com/example/nano-ros"
keywords = ["robotics", "ros2", "embedded", "stm32", "no_std"]
categories = ["embedded", "no-std", "science::robotics"]

[lib]
name = "nano_ros_bsp_stm32f4"
path = "src/lib.rs"

[dependencies]
nano-ros-platform-stm32f4 = { path = "../../platform/nano-ros-platform-stm32f4" }

[features]
default = ["stm32f429"]

# STM32F4 chip variants (forwarded to platform crate)
stm32f407 = ["nano-ros-platform-stm32f4/stm32f407"]
stm32f417 = ["nano-ros-platform-stm32f4/stm32f417"]
stm32f427 = ["nano-ros-platform-stm32f4/stm32f427"]
stm32f429 = ["nano-ros-platform-stm32f4/stm32f429"]
stm32f437 = ["nano-ros-platform-stm32f4/stm32f437"]
stm32f439 = ["nano-ros-platform-stm32f4/stm32f439"]
stm32f469 = ["nano-ros-platform-stm32f4/stm32f469"]
stm32f479 = ["nano-ros-platform-stm32f4/stm32f479"]
