[package]
name = "nano-ros-bsp-stm32f4"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "nano-ros BSP for STM32F4 family microcontrollers with Ethernet"
repository = "https://github.com/example/nano-ros"
keywords = ["robotics", "ros2", "embedded", "stm32", "no_std"]
categories = ["embedded", "no-std", "science::robotics"]

[lib]
name = "nano_ros_bsp_stm32f4"
path = "src/lib.rs"

[dependencies]
# Cortex-M runtime
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"

# STM32F4 HAL (feature-gated for different chips)
stm32f4xx-hal = { version = "0.21" }

# STM32 Ethernet
stm32-eth = { version = "0.8", features = ["smoltcp-phy"] }

# TCP/IP stack
smoltcp = { version = "0.12", default-features = false, features = [
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
] }

# zenoh-pico shim with smoltcp platform backend
# zenoh-pico-shim/smoltcp enables smoltcp-platform-rust which includes C shims
zenoh-pico-shim = { path = "../../transport/zenoh-pico-shim", default-features = false, features = ["smoltcp"] }
zenoh-pico-shim-sys = { path = "../../transport/zenoh-pico-shim-sys", default-features = false, features = ["smoltcp"] }

# Core types (RosMessage, CDR serialization)
nano-ros-core = { path = "../../core/nano-ros-core", default-features = false }

# Logging (defmt)
defmt = "0.3"

# Heapless collections
heapless = "0.8"

[features]
default = ["stm32f429"]

# STM32F4 chip variants
stm32f407 = ["stm32f4xx-hal/stm32f407", "stm32-eth/stm32f407"]
stm32f417 = ["stm32f4xx-hal/stm32f417", "stm32-eth/stm32f417"]
stm32f427 = ["stm32f4xx-hal/stm32f427", "stm32-eth/stm32f427"]
stm32f429 = ["stm32f4xx-hal/stm32f429", "stm32-eth/stm32f429"]
stm32f437 = ["stm32f4xx-hal/stm32f437", "stm32-eth/stm32f437"]
stm32f439 = ["stm32f4xx-hal/stm32f439", "stm32-eth/stm32f439"]
stm32f469 = ["stm32f4xx-hal/stm32f469", "stm32-eth/stm32f469"]
stm32f479 = ["stm32f4xx-hal/stm32f479", "stm32-eth/stm32f479"]

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = "fat"
opt-level = 3
overflow-checks = false

[profile.dev]
codegen-units = 1
debug = 2
incremental = false
opt-level = 1
