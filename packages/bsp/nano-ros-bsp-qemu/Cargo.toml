[package]
name = "nano-ros-bsp-qemu"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "QEMU MPS2-AN385 Board Support Package for nano-ros (thin wrapper)"
readme = "README.md"

[lib]
name = "nano_ros_bsp_qemu"

[dependencies]
# Platform crate provides system primitives + node API
nano-ros-platform-qemu = { path = "../../platform/nano-ros-platform-qemu" }

[features]
default = []
# Docker networking mode (container with NAT)
docker = ["nano-ros-platform-qemu/docker"]
