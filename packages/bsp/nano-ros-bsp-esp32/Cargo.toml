[package]
name = "nano-ros-bsp-esp32"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ESP32-C3 Board Support Package for nano-ros (thin wrapper)"
readme = "README.md"

[lib]
name = "nano_ros_bsp_esp32"

[dependencies]
# Platform crate provides system primitives + node API
nano-ros-platform-esp32 = { path = "../../platform/nano-ros-platform-esp32" }

[features]
default = []
