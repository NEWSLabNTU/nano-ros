[package]
name = "nros-msg-to-idl"
version.workspace = true
publish = false
edition = "2024"
authors = ["NEWSLabNTU"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/NEWSLabNTU/nano-ros"
description = "Convert ROS 2 .msg / .srv files to Cyclone-DDS-shaped IDL (pure-Rust port of scripts/cyclonedds/msg_to_cyclone_idl.py)."
readme = "README.md"
keywords = ["ros2", "cyclonedds", "idl", "codegen"]
categories = ["development-tools"]
rust-version = "1.85"

[lib]
name = "nros_msg_to_idl"
path = "src/lib.rs"

[[bin]]
name = "nros-msg-to-idl"
path = "src/bin/cli.rs"
required-features = ["cli"]

[features]
default = ["cli"]
cli = ["dep:clap"]

[dependencies]
clap = { version = "4", features = ["derive"], optional = true }

[dev-dependencies]
# none — golden tests are pure stdlib

[lints]
workspace = true
