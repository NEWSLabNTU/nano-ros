[workspace]

[package]
name = "qemu-bsp-large-msg-test"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "QEMU large message publish test using nros-board-mps2-an385"

[[bin]]
name = "qemu-bsp-large-msg-test"
test = false
bench = false

# Phase 212.M-F.18 — Application pkg shape (matches §M.10 native
# example pattern). Single-board bare-metal bench fixture; deploy
# target is the platform path the binary runs on.
[package.metadata.nros.application]
deploy = ["qemu-arm-baremetal"]

[features]
default = []
docker = ["nros-board-mps2-an385/docker"]

[dependencies]
# Board crate for hardware + network init
nros-board-mps2-an385 = { path = "../../../../packages/boards/nros-board-mps2-an385" }

# nros Executor API
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["rmw-cffi"] }
nros-rmw-zenoh = { path = "../../../../packages/zpico/nros-rmw-zenoh", features = ["platform-bare-metal", "ros-humble"] }

# Generated message types
std_msgs = { version = "*", default-features = false }

# Panic handler
panic-semihosting = { version = "0.6", features = ["exit"] }
