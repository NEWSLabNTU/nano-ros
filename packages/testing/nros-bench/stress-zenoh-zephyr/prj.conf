# phase-282 W2 (#145) — Zephyr streaming tx benchmark (zpico direct, no Rust).
# Zenoh RMW module (compiles zpico.c + zenoh-pico into the image).
CONFIG_NROS=y
CONFIG_NROS_RMW_ZENOH=y

# Networking base (mirrors the zephyr examples' prj.conf net section).
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MAX_CONTEXTS=16

# zenoh-pico needs TCP + POSIX threads/mutexes (see ws-realtime prj-zenoh.conf).
CONFIG_NET_TCP=y
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=262144
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=1048576
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64

# Wall-clock-true timing on native_sim (the benchmark reports elapsed_ms).
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y
