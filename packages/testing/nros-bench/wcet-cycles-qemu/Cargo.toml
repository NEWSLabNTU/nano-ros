[workspace]

[package]
name = "qemu-rs-wcet-bench"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "qemu-rs-wcet-bench"
test = false
bench = false

[dependencies]
nros = { path = "../../../../packages/core/nros", default-features = false, features = ["safety-e2e"] }
std_msgs = { version = "*", default-features = false }
builtin_interfaces = { version = "*", default-features = false }

cortex-m = "0.7"
cortex-m-rt = "0.7"
cortex-m-semihosting = "0.5"
panic-semihosting = { version = "0.6", features = ["exit"] }
heapless = "0.8"

# === BEGIN nros-managed [patch.crates-io] ===
# Auto-generated by `nros ws sync`. Do not edit between
# the BEGIN/END markers — re-run sync instead.
[patch.crates-io]
builtin_interfaces = { path = "build/nros_generator_rs/builtin_interfaces" }
std_msgs = { path = "build/nros_generator_rs/std_msgs" }

# nros-* runtime crates
nros = { path = "../../../core/nros" }
nros-core = { path = "../../../core/nros-core" }
nros-serdes = { path = "../../../core/nros-serdes" }
nros-platform = { path = "../../../core/nros-platform" }
nros-platform-cffi = { path = "../../../core/nros-platform-cffi" }
nros-node = { path = "../../../core/nros-node" }
nros-rmw = { path = "../../../core/nros-rmw" }
nros-rmw-cffi = { path = "../../../core/nros-rmw-cffi" }
nros-log = { path = "../../../core/nros-log" }
nros-macros = { path = "../../../core/nros-macros" }
nros-rmw-zenoh = { path = "../../../zpico/nros-rmw-zenoh" }
# === END nros-managed [patch.crates-io] ===
