[package]
name = "xrce-native-test"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "XRCE-DDS native test binaries for integration testing"

[[bin]]
name = "xrce-talker"
path = "src/bin/xrce-talker.rs"

[[bin]]
name = "xrce-listener"
path = "src/bin/xrce-listener.rs"

[[bin]]
name = "xrce-service-server"
path = "src/bin/xrce-service-server.rs"

[[bin]]
name = "xrce-service-client"
path = "src/bin/xrce-service-client.rs"

[dependencies]
nros-rmw-xrce = { path = "../../xrce/nros-rmw-xrce", features = ["posix"] }
nros-rmw = { path = "../../core/nros-rmw" }
nros-core = { path = "../../core/nros-core", default-features = false, features = ["std"] }
xrce-sys = { path = "../../xrce/xrce-sys", features = ["posix"] }

# Generated message types
std_msgs = { version = "*", default-features = false }
example_interfaces = { version = "*", default-features = false }
