[package]
name = "nros-tests"
version.workspace = true
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Integration tests for nros"

[dependencies]
# Test framework
rstest = "0.24"
duct = "0.13"
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.15"
thiserror = "2.0"
once_cell = "1.20"
# Phase 211.A — orchestration plan JSON inspection in `orchestration_e2e`.
serde_json = "1.0"
# Phase 212.M.11 + M.12 — TOML parsing for the example-canonical-shape
# + pre-212-file regression tests. Reads
# `[package.metadata.nros.{component,entry,deploy.*}]` out of each
# example's `Cargo.toml`. Both 212.M.11 sibling + 212.M.12 sibling tests
# consume the same dep.
toml = "0.9"
# Phase 212.H.8 — in-process LoC counter for the adapter-shim +
# workspace-metadata budget gates. Replaces the previous shell-out to
# the `tokei` CLI binary so the test runs on a stock dev machine without
# `cargo install tokei`. `default-features = false` drops the CLI bits
# (clap/colored/env_logger) — we only need the library.
tokei = { version = "14", default-features = false }

# Async support for waiting
parking_lot = "0.12"

# Phase 208.D.3 — `px4-sitl-tests` moved to the out-of-workspace
# crate `packages/testing/nros-px4-sitl-test/`. Keeping it as an
# optional path-dep here broke fresh-shell `cargo build` because
# cargo resolves optional path-deps at workspace-load time, and the
# `px4-rs` submodule is absent on a clean clone (audit blocker P3).
# Run the SITL E2E via `just px4 test-sitl`.

# Non-blocking I/O for process output capture
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Phase 100.8 — Orin SPE IVC link transport mock E2E test. The
# `unix-mock` backend implements the IVC channel API on top of an
# `AF_UNIX SOCK_DGRAM` pair, so the framing protocol can be exercised
# on any POSIX host without an SDK Manager install.
nvidia-ivc = { path = "../../drivers/nvidia-ivc", features = ["unix-mock"] }

# Workspace dependencies for type access (optional)
nros-core = { path = "../../core/nros-core", optional = true }
nros-serdes = { path = "../../core/nros-serdes", optional = true }

# RMW abstraction layer (optional, for in-process integration tests)
# `nros-rmw` defaults to no-std; tests always run with std, so opt in
# explicitly to keep rich error-context / logging available.
nros-rmw = { path = "../../core/nros-rmw", default-features = false, features = ["std"], optional = true }

# Node + executor API (optional, for trigger condition integration tests).
# Phase 141.C — `wake-latency-probe` feature pulls in
# `wake_probe::{parse_csv, percentile_ns}` for the
# `wake_latency_cortex_m3` host runner.
nros-node = { path = "../../core/nros-node", features = ["std", "rmw-cffi", "platform-posix", "ros-humble", "wake-latency-probe"], optional = true }

# Phase 124.A.8.b — zenoh-pico backend (lending feature on) for the
# loan E2E test. Optional so the default test build doesn't pull
# zenoh-pico unnecessarily.
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", features = ["lending", "platform-posix"], optional = true }
# Phase 169.2 — the retired Rust DDS backend and multi-RMW bridge test
# were deleted alongside the Rust DDS examples.
# Phase 124.A.8.b — posix C symbols (nros_platform_*) for the loan E2E
# binary. Without `posix-c-port`, nros-platform-cffi declares the
# canonical symbols extern without providing them, and link fails.
nros-platform-cffi = { path = "../../core/nros-platform-cffi", features = ["posix-c-port"], optional = true }

# Phase 88.14 — `nros-log` facade for the host-side logging tests.
nros-log = { path = "../../core/nros-log" }

# Phase 212.L.5 — top-level init API tests. The `nros` umbrella's
# `init` module is platform/RMW-independent (no backend pulled), so we
# depend on it with only `std`.
nros = { path = "../../core/nros", default-features = false, features = ["std"] }
# Phase 212.N.7 — the `nros::component!()` macro emits a
# `pub fn register(runtime: &mut ::nros_platform::RuntimeCtx<'_>)`
# wrapper. Tests that invoke that wrapper directly need `nros-platform`
# nameable in scope; gated on `component-runtime-test` because only the
# m5a4 dispatch suite touches it today.
nros-platform = { path = "../../core/nros-platform", default-features = false, features = ["platform-posix"], optional = true }

[features]
default = []
types = ["nros-core", "nros-serdes"]
rmw = ["nros-rmw", "nros-core", "nros-serdes"]
safety-e2e = ["rmw", "nros-rmw/safety-e2e"]
trigger-test = [
    "dep:nros-node",
    "nros-core",
    "nros-serdes",
    # Phase 124.B.8 — wake-latency microbench needs an actual RMW
    # backend so `Executor::open` returns a session (otherwise
    # `Transport(ConnectionFailed)` and the cv-wait path is never
    # reached). zenoh-pico auto-registers via `.init_array` on POSIX.
    "dep:nros-rmw-zenoh",
    "dep:nros-platform-cffi",
    # Phase 128.C.3 — per-backend rmw-*-cffi features removed; the
    # umbrella `rmw-cffi` enables the walker that discovers whichever
    # backend the manifest pulled in via `dep:nros-rmw-<name>`.
    "nros-node/rmw-cffi",
    "nros-node/std",
]
# Phase 169.2 — multi-RMW bridge test deleted with the retired Rust
# DDS backend.
# Feature kept commented for archaeology.
# multi-rmw-bridge = [
#     "trigger-test",
# ]
# Phase 212.M.5.a.2 — Executor-backed component runtime E2E. Pulls in
# the runtime via the `nros` umbrella (`rmw-cffi` + `platform-posix`)
# plus the trigger-test fixtures so a real zenohd backs `Executor::open`.
component-runtime-test = [
    "trigger-test",
    "nros/rmw-cffi",
    "nros/platform-posix",
    "dep:nros-platform",
]
# Phase 216.A.6 — dispatch substrate integration test. Pulls in
# `nros-platform` so `phase216_a_dispatch_strategy` can reach
# `NodeDispatchRuntime` / `NullNodeRuntime` / `SignaledCallback`
# without dragging in the heavier `component-runtime-test` chain
# (which would pull `nros-rmw-zenoh` + zenohd just to assert a
# `panic!` message).
phase216-substrate = [
    "dep:nros-platform",
]

# Phase 124.A.8.b — zero-copy loan E2E via real zenoh-pico backend.
# Pulls nros-node + nros-rmw-zenoh with the `lending` feature so the
# customised ZENOH_VTABLE (124.A.4.b) is installed at backend
# auto-register time.
loan-e2e = [
    "dep:nros-node",
    "nros-core",
    "nros-serdes",
    "nros-node/rmw-lending",
    "dep:nros-rmw-zenoh",
    "dep:nros-platform-cffi",
]
[lib]
name = "nros_tests"
path = "src/lib.rs"

# Integration tests
[[test]]
name = "emulator"
path = "tests/emulator.rs"

[[test]]
name = "nano2nano"
path = "tests/nano2nano.rs"

[[test]]
name = "platform"
path = "tests/platform.rs"

[[test]]
name = "rmw_interop"
path = "tests/rmw_interop.rs"

[[test]]
name = "zephyr"
path = "tests/zephyr.rs"

[[test]]
name = "actions"
path = "tests/actions.rs"

[[test]]
name = "native_api"
path = "tests/native_api.rs"

[[test]]
name = "xrce"
path = "tests/xrce.rs"

[[test]]
name = "safety_e2e"
path = "tests/safety_e2e.rs"

[[test]]
name = "large_msg"
path = "tests/large_msg.rs"

[[test]]
name = "trigger_conditions"
path = "tests/trigger_conditions.rs"
required-features = ["trigger-test"]

[[test]]
name = "wake_latency"
path = "tests/wake_latency.rs"
required-features = ["trigger-test"]

[[test]]
name = "rtos_e2e"
path = "tests/rtos_e2e.rs"

[[test]]
name = "orin_spe_mock_ivc"
path = "tests/orin_spe_mock_ivc.rs"

[[test]]
name = "custom_transport_loopback"
path = "tests/custom_transport_loopback.rs"
required-features = ["rmw"]

[[test]]
name = "loan_e2e"
path = "tests/loan_e2e.rs"
required-features = ["loan-e2e"]

[[test]]
name = "init_api"
path = "tests/init_api.rs"

[[test]]
name = "component_runtime"
path = "tests/component_runtime.rs"
required-features = ["component-runtime-test"]

# Phase 228 — per-tier callback-group filter + shared-session
# (session_ptr / open_with_session) acceptance test.
[[test]]
name = "tier_filter"
path = "tests/tier_filter.rs"
required-features = ["component-runtime-test"]

# Phase 212.M.5.a.4 — BSP-path dispatch wiring (typed-erased state +
# `_init` / `_dispatch` / `_tick` symbol-table coverage).
[[test]]
name = "component_dispatch"
path = "tests/component_dispatch.rs"
required-features = ["component-runtime-test"]

# Phase 134.6 E2E.1 — wraps scripts/check-zenoh-archive-symbols.sh as
# a cargo-runnable regression gate over the install tree.
[[test]]
name = "zenoh_archive_symbols"
path = "tests/zenoh_archive_symbols.rs"

# Phase 137.4 — in-tree consumer smoke test for the
# `add_subdirectory(<nano-ros>)` entry point added in 137.1.
[[test]]
name = "cmake_add_subdirectory"
path = "tests/cmake_add_subdirectory.rs"

# Phase 138.6 — per-platform cmake-module smoke matrix. POSIX runs
# natively; cross-compile platforms skip cleanly when the cross
# toolchain isn't installed.
[[test]]
name = "cmake_platform_matrix"
path = "tests/cmake_platform_matrix.rs"

# Phase 134.6 E2E.4 — asserts the canonical zenoh_generic_config.h
# matches LinkPolicy::posix() contract.
[[test]]
name = "zenoh_header_parity"
path = "tests/zenoh_header_parity.rs"

# Phase 136.7 E2E.3 — guards the source-list drift gate in
# `zpico-sys/build.rs`. Corrupts a sandboxed manifest, asserts the
# build-script panic surfaces with the documented diagnostic.
[[test]]
name = "zpico_drift_gate"
path = "tests/zpico_drift_gate.rs"

# Phase 136.7 E2E.1 + E2E.7 — guards the unified build path.
# POSIX archive carries the canonical `_z_open_tcp` / `_z_open_udp_*`
# symbols; `cargo tree -p zpico-sys` carries no `cmake` row.
[[test]]
name = "zpico_build_matrix"
path = "tests/zpico_build_matrix.rs"

# Phase 139.6 — per-RTOS integration-shell smoke tests. Each skips
# cleanly via `nros_tests::skip!` when the RTOS SDK / toolchain isn't
# installed on the test box; full builds run in per-RTOS CI.
[[test]]
name = "integration_zephyr"
path = "tests/integration_zephyr.rs"

[[test]]
name = "integration_esp_idf"
path = "tests/integration_esp_idf.rs"

[[test]]
name = "integration_platformio"
path = "tests/integration_platformio.rs"

[[test]]
name = "integration_nuttx"
path = "tests/integration_nuttx.rs"

[[test]]
name = "integration_px4"
path = "tests/integration_px4.rs"

# Phase 88.14 — `nros-log` integration coverage.
[[test]]
name = "logging"
path = "tests/logging.rs"

# Phase 88.15 — RTOS smoke fixtures + QEMU output capture.
[[test]]
name = "logging_smoke"
path = "tests/logging_smoke.rs"

# Phase 166.5 — static archive re-emission guard for board overlays.
[[test]]
name = "board_link_archives"
path = "tests/board_link_archives.rs"

# Phase 211.A — in-tree orchestration foundation: drives `nros plan`
# against `fixtures/orchestration_e2e/` and inspects nros-plan.json.
[[test]]
name = "orchestration_e2e"
path = "tests/orchestration_e2e.rs"

# Phase 211.B — composable-container plan shape: gates the planner gap
# (no container_id grouping today) + per-child fidelity (param + remap
# propagation) against `fixtures/orchestration_composable/`.
[[test]]
name = "orchestration_composable"
path = "tests/orchestration_composable.rs"

# Phase 211.I — mixed-RMW bridge e2e: zenoh talker → tt-zenoh-to-xrce
# bridge → xrce listener round-trip through the Phase 110.G example
# binary as the gateway fixture.
[[test]]
name = "bridge_mixed_rmw"
path = "tests/bridge_mixed_rmw.rs"

# Phase 211.D — conditionals + <group> scoping plan-gate: asserts the
# planner already honors `<node if="$(var ...)">` filtering AND the
# nested `<push_ros_namespace>` propagation, against
# `fixtures/orchestration_conditionals/`.
[[test]]
name = "orchestration_conditionals"
path = "tests/orchestration_conditionals.rs"

# Phase 211.E — <set_remap> propagation gate (works today) + #[ignore]
# placeholders for the <set_env> / <executable> planner-side gaps.
[[test]]
name = "orchestration_set_remap_env"
path = "tests/orchestration_set_remap_env.rs"

# Phase 211.J — <include> recursion safety: 3-level chain (works today)
# + #[ignore] gates for cycle-detection + depth-cap planner gaps.
[[test]]
name = "orchestration_includes"
path = "tests/orchestration_includes.rs"

# Phase 212.F — `nros new system` bringup scaffold + `nros check --bringup`
# lint smoke. Skips cleanly when the `nros` CLI is not installed.
[[test]]
name = "bringup_scaffold"
path = "tests/bringup_scaffold.rs"

# FreeRTOS MPS2-AN385 Entry-pkg firmware (Phase 212.H.3): asserts the build-stage
# `freertos_firmware` cross-build fixture's prebuilt run_plan.rs (issue 0034 —
# no in-test cargo build).
[[test]]
name = "freertos_firmware_entry"
path = "tests/freertos_firmware_entry.rs"

# Phase 212.H.5 — ESP-IDF 2-component bringup build via `idf.py`. Skips
# cleanly when `$IDF_PATH` / `idf.py` / nros CLI are missing.
[[test]]
name = "phase212_h5_esp_idf"
path = "tests/phase212_h5_esp_idf.rs"

# Phase 212.H.7 — PX4 hookless-vendor 2-component module-build gate.
# Skips cleanly when `$PX4_AUTOPILOT_DIR` / nros CLI / `make` are missing
# (or when `nros codegen-system --ahead-of-vendor --target px4` is not
# yet implemented in the installed CLI).
[[test]]
name = "cli_bringup_px4"
path = "tests/cli_bringup_px4.rs"

# Phase 212.M.12 — examples/ canonical-shape regression. Walks every
# package.xml-bearing leaf under examples/ and asserts the post-M
# canonical shape: package.xml present, component XOR application
# classification, deploy targets match platform path, Path A bringup
# dirs free of code, and pre-212 files absent. ESP32 (M.7 BLOCKED),
# bare-metal Cortex-M3, ESP32-baremetal, qemu-riscv64-threadx, and
# threadx-linux/c are skipped per the per-wave migration status in
# the Phase 212.M table.
[[test]]
name = "example_shape"
path = "tests/example_shape.rs"

# Phase 212.M.11 (parallel sibling) — canonical-shape regression: every
# `package.xml` under `examples/` carries the §212.L pkg taxonomy
# and no pre-212 files (nros.toml, component_nros.toml,
# gen-app-config.py, app_config.h.in, committed metadata/*.json).
# Different skip-set + punch-list shape from `phase212_m12_example_shape`;
# both run, both report.
[[test]]
name = "examples_canonical_shape"
path = "tests/examples_canonical_shape.rs"

# Phase 212.M.12 (parallel sibling) — pre-212 file ban: no nros.toml /
# component_nros.toml / gen-app-config.py / app_config.h.in /
# committed metadata/*.json file exists ANYWHERE under `examples/`
# OR `packages/testing/nros-tests/fixtures/`.
[[test]]
name = "legacy_files_forbidden"
path = "tests/legacy_files_forbidden.rs"

# Phase 210.F.4 — workspace-over-AMENT shadowing regression. Drives the
# `examples/templates/workspace-shadowing/` smoke fixture through
# cmake configure + build, then asserts (via `nm`) that the
# workspace `std_msgs` shadow (carrying `Marker.msg`) was the one
# linked — NOT the AMENT-installed `std_msgs`, which ships no
# `Marker.msg`. Skips cleanly if AMENT isn't sourced (the shadowing
# contract degenerates without an AMENT layer to displace).
[[test]]
name = "workspace_shadowing"
path = "tests/workspace_shadowing.rs"

# Phase 215.E.2 — verifies `nano_ros_use_board()` layers a board crate's
# artifacts (BOARD, EXTRA_CONF_FILE/overlay, RMW default, runner) into a
# downstream Zephyr app build via the `board_import_fvp` fixture. Skips
# cleanly when ZEPHYR_BASE / west aren't provisioned.
[[test]]
name = "phase215_e_board_import"
path = "tests/phase215_e_board_import.rs"

# Phase 216.A — dispatch substrate integration test. Exercises
# `DispatchStrategy` / `Node::DISPATCH` / `NodeDispatchRuntime`
# defaults from outside the originating crates so re-export drift
# is caught. Requires `phase216-substrate` for the `nros-platform`
# dep — host-only, no embedded toolchain needed.
[[test]]
name = "dispatch_strategy"
path = "tests/dispatch_strategy.rs"
required-features = ["phase216-substrate"]

# `nros::main!()` RTIC macro expansion (Phase 216.B.5): consumes the prebuilt
# `stm32f4-rtic-talker` fixture (examples/stm32f4/rust/talker-rtic, built by
# `just stm32f4 build-fixtures` for thumbv7em-none-eabihf) and asserts it
# exists — the fixture build IS the compile check (no in-test cargo; issue 0034).
[[test]]
name = "stm32f4_rtic_main_macro"
path = "tests/stm32f4_rtic_main_macro.rs"

# `nros::main!()` Embassy macro expansion (Phase 216.C.4): asserts the build-stage
# `embassy_main_macro` cargo-check fixture stamp (a cross `cargo check` of
# examples/stm32f4/rust/talker-embassy — no link; issue 0034).
[[test]]
name = "stm32f4_embassy_main_macro"
path = "tests/stm32f4_embassy_main_macro.rs"

[lints]
workspace = true
