[package]
name = "nros-tests"
version = "0.1.0"
edition = "2024"
publish = false
description = "Integration tests for nros"

[dependencies]
# Test framework
rstest = "0.24"
duct = "0.13"
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.15"
thiserror = "2.0"
once_cell = "1.20"

# Async support for waiting
parking_lot = "0.12"

# px4-rs's SITL test fixture (Px4Sitl::boot_in, shell, wait_for_log, Drop
# = SIGTERM process group). Path dep into the vendored submodule. Only
# pulled in via the `px4-sitl` feature. Note: px4-sitl-tests is excluded
# from px4-rs's own workspace; it works as a normal Cargo path dep.
# Pulls in regex transitively for the wait_for_log impl, so we don't
# declare regex separately here.
px4-sitl-tests = { path = "../../../third-party/px4/px4-rs/tests/sitl", optional = true }

# Non-blocking I/O for process output capture
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Phase 100.8 — Orin SPE IVC link transport mock E2E test. The
# `unix-mock` backend implements the IVC channel API on top of an
# `AF_UNIX SOCK_DGRAM` pair, so the framing protocol can be exercised
# on any POSIX host without an SDK Manager install.
nvidia-ivc = { path = "../../drivers/nvidia-ivc", features = ["unix-mock"] }

# Workspace dependencies for type access (optional)
nros-core = { path = "../../core/nros-core", optional = true }
nros-serdes = { path = "../../core/nros-serdes", optional = true }

# RMW abstraction layer (optional, for in-process integration tests)
# `nros-rmw` defaults to no-std; tests always run with std, so opt in
# explicitly to keep rich error-context / logging available.
nros-rmw = { path = "../../core/nros-rmw", default-features = false, features = ["std"], optional = true }
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", features = ["platform-posix", "std"], optional = true }

# Node + executor API (optional, for trigger condition integration tests)
nros-node = { path = "../../core/nros-node", features = ["std", "rmw-zenoh", "platform-posix", "ros-humble"], optional = true }

[features]
default = []
types = ["nros-core", "nros-serdes"]
rmw = ["nros-rmw", "nros-rmw-zenoh", "nros-core", "nros-serdes"]
safety-e2e = ["rmw", "nros-rmw/safety-e2e", "nros-rmw-zenoh/safety-e2e"]
trigger-test = ["dep:nros-node", "nros-core", "nros-serdes"]
# PX4 SITL E2E test (requires PX4_AUTOPILOT_DIR + working PX4 build env).
# Test FAILS (does not silently skip) if PX4_AUTOPILOT_DIR is unset; this
# matches the project-wide "no silent skip" rule from CLAUDE.md.
px4-sitl = ["dep:px4-sitl-tests"]

[lib]
name = "nros_tests"
path = "src/lib.rs"

# Integration tests
[[test]]
name = "emulator"
path = "tests/emulator.rs"

[[test]]
name = "nano2nano"
path = "tests/nano2nano.rs"

[[test]]
name = "platform"
path = "tests/platform.rs"

[[test]]
name = "rmw_interop"
path = "tests/rmw_interop.rs"

[[test]]
name = "zephyr"
path = "tests/zephyr.rs"

[[test]]
name = "actions"
path = "tests/actions.rs"

[[test]]
name = "native_api"
path = "tests/native_api.rs"

[[test]]
name = "rmw"
path = "tests/rmw.rs"
required-features = ["rmw"]

[[test]]
name = "xrce"
path = "tests/xrce.rs"

[[test]]
name = "safety_e2e"
path = "tests/safety_e2e.rs"

[[test]]
name = "large_msg"
path = "tests/large_msg.rs"

[[test]]
name = "trigger_conditions"
path = "tests/trigger_conditions.rs"
required-features = ["trigger-test"]

[[test]]
name = "rtos_e2e"
path = "tests/rtos_e2e.rs"

[[test]]
name = "px4_e2e"
path = "tests/px4_e2e.rs"
required-features = ["px4-sitl"]

[[test]]
name = "orin_spe_mock_ivc"
path = "tests/orin_spe_mock_ivc.rs"
