[workspace]

[package]
name = "qos-override-pubsub"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 211.H — qos_overrides runtime-delivery fixture. Installs a per-topic QoS override on a NodeHandle (as a baked entry's &'static [QosOverride] table would) and proves it is honoured on a LIVE raw pub/sub entity at /chatter. Pairs with tests/qos_overrides_runtime_delivery.rs."

[[bin]]
name = "qos-override-pubsub"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../core/nros", default-features = false, features = ["std", "rmw-cffi"] }
# Phase 248 C5c — posix `nros_platform_*` symbols via a direct `nros-platform`
# dep (pulls `nros-platform-cffi[posix-c-port]`); retires the `nros/platform-posix` forward.
nros-platform = { path = "../../../../core/nros-platform", default-features = false, features = ["platform-posix"] }
nros-rmw-zenoh = { path = "../../../../zpico/nros-rmw-zenoh", features = ["std", "platform-posix", "ros-humble"] }
log = "0.4"
env_logger = "0.11"
