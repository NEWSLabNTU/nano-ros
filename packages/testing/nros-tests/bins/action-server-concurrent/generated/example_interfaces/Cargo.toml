[package]
name = "example_interfaces"
version = "0.9.3"
edition = "2021"

[features]
default = []
std = ["nros-core/std", "nros-serdes/std", "builtin_interfaces/std", "action_msgs/std", "unique_identifier_msgs/std"]
rmw-cyclonedds = ["dep:nros-rmw-cyclonedds"]

[dependencies]
# nros crates (patched to local via .cargo/config.toml during development)
nros-core = { version = "*", default-features = false }
nros-serdes = { version = "*", default-features = false }
heapless = "0.8"
nros-rmw-cyclonedds = { version = "*", default-features = false, optional = true }
builtin_interfaces = { path = "../builtin_interfaces", default-features = false }
action_msgs = { path = "../action_msgs", default-features = false }
unique_identifier_msgs = { path = "../unique_identifier_msgs", default-features = false }
