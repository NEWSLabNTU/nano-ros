[workspace]

[package]
name = "logging-smoke-nuttx-qemu-arm"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 88.15.c — NuttX QEMU ARM virt nros-log smoke fixture"

[[bin]]
name = "logging-smoke-nuttx-qemu-arm"
test = false
bench = false

[dependencies]
nros-log = { path = "../../../../core/nros-log" }
# #127 — board-centric NuttX image link (RFC-0032 "third leg"): the board
# dep's build.rs compiles the C platform port (`nros_platform_nuttx`, which
# provides `nros_platform_log_write`/`_flush` for nros-log's default sink)
# AND stages the image-link inputs (processed dramboot.ld, vectortab +
# builtins-stub boot archive, `-L` search dirs) via propagating
# `cargo:rustc-link-search`/`rustc-link-lib` directives — this bin has ZERO
# build.rs. The static link args live in `.cargo/config.toml`. The board's
# `entry.rs` `nsh_main` (nsh_initialize → Rust `main`) is the init
# entrypoint; `#[used]` + fat LTO (`lto = true` below) keep it in the image.
nros-board-nuttx-qemu-arm = { path = "../../../../boards/nros-board-nuttx-qemu-arm" }

[profile.release]
opt-level = "s"
lto = true
