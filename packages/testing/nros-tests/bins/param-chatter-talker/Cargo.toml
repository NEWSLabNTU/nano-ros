[workspace]

[package]
name = "param-chatter-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Parameterised talker fixture (extracted from the examples/native/rust/talker `param-services` feature gates in phase-277 W3.a). Registers the REP-2002 parameter services, declares an integer `start_value` parameter, starts its /chatter Int32 counter from it, and publishes every 1 s. Consumed by tests/params.rs (default-value + declaration + ros2 param interop tests)."

[[bin]]
name = "param-chatter-talker"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../core/nros", default-features = false, features = [
    "std",
    "rmw-cffi",
    "ros-humble",
    "param-services",
] }
nros-platform-cffi = { path = "../../../../core/nros-platform-cffi", features = ["posix-c-port"] }
nros-rmw-zenoh = { path = "../../../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "std",
    "platform-posix",
    "ros-humble",
] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../core/nros-core" }
nros-serdes = { path = "../../../../core/nros-serdes" }
