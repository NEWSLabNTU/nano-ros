[workspace]

[package]
name = "int32-observer"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "phase-276 W5 — generic std_msgs/Int32 topic observer. Raw zenoh subscriber on an env-selected topic (default /qos_ok) that logs `Received:` per sample; the cross-process assertion half for embedded-image e2es whose nodes republish a counter for external observers."

[[bin]]
name = "int32-observer"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../core/nros", default-features = false, features = ["std", "rmw-cffi"] }
nros-platform = { path = "../../../../core/nros-platform", default-features = false, features = ["platform-posix"] }
nros-rmw-zenoh = { path = "../../../../zpico/nros-rmw-zenoh", features = ["std", "platform-posix", "ros-humble"] }
log = "0.4"
env_logger = "0.11"
