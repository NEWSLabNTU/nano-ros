[workspace]

[package]
name = "safety-chatter-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "E2E-safety talker fixture (extracted from the examples/native/rust/talker `safety-e2e` feature build in phase-277 W3.a). Publishes std_msgs/Int32 on /chatter every 1 s with the zenoh backend's safety-e2e CRC attach baked in. Cross-process publisher for tests/safety_e2e.rs, paired with safety-chatter-listener / declarative-safety-listener over zenohd."

[[bin]]
name = "safety-chatter-talker"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../core/nros", default-features = false, features = [
    "std",
    "rmw-cffi",
    "ros-humble",
    "safety-e2e",
] }
nros-platform-cffi = { path = "../../../../core/nros-platform-cffi", features = ["posix-c-port"] }
nros-rmw-zenoh = { path = "../../../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "std",
    "platform-posix",
    "ros-humble",
    # The CRC attach (publisher) + validate (subscriber) live behind the
    # BACKEND's own safety-e2e feature; `nros/safety-e2e` does not forward to it,
    # so it must be enabled directly or no CRC goes on the wire.
    "safety-e2e",
] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../core/nros-core" }
nros-serdes = { path = "../../../../core/nros-serdes" }
