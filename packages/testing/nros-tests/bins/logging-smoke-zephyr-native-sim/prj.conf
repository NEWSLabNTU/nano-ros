# Phase 88.15.e — minimal nros-log smoke for Zephyr native_sim.
#
# Doesn't init RMW — just installs the nros-log dispatcher (which
# routes via `nros-platform-zephyr::PlatformLog` → Zephyr `LOG_*`)
# and emits every severity.

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Logging — required for the platform impl's LOG_INF / LOG_ERR
# forwarders.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=n

# nros module — C API only; pick zenoh as the RMW choice to satisfy
# Kconfig's `choice NROS_RMW_BACKEND` but never call any RMW APIs.
CONFIG_NROS=y
CONFIG_NROS_C_API=y
CONFIG_NROS_RMW_ZENOH=y

# POSIX threading the staticlib needs.
CONFIG_PTHREAD_IPC=y
CONFIG_POSIX_API=y
CONFIG_POSIX_THREAD_THREADS_MAX=8
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16

# Networking — the Zephyr nros module's RMW-backend CMake branches
# all source `zpico_zephyr.c`, which references `iface->config.ip`.
# That member is gated on `CONFIG_NET_IP=y`, so a minimal app
# still has to enable IPv4 even if it never opens a socket.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
