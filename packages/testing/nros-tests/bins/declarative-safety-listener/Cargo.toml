[workspace]

[package]
name = "declarative-safety-listener"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Phase 250 Wave 5 — declarative (Node + NodeContext) listener using the .safety() opt-in + ctx.integrity(). Cross-process subscriber for tests/safety_e2e.rs: receives from the safety talker over zenohd and logs the per-message IntegrityStatus, proving the declarative safety path surfaces CRC/seq end-to-end."

[[bin]]
name = "declarative-safety-listener"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../core/nros", default-features = false, features = [
    "std",
    "rmw-cffi",
    "ros-humble",
    "safety-e2e",
] }
nros-platform-cffi = { path = "../../../../core/nros-platform-cffi", features = ["posix-c-port"] }
nros-rmw-zenoh = { path = "../../../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "std",
    "platform-posix",
    "ros-humble",
] }
std_msgs = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../core/nros-core" }
nros-serdes = { path = "../../../../core/nros-serdes" }
