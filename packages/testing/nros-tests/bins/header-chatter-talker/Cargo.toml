[workspace]

[package]
name = "header-chatter-talker"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Nested-message talker fixture (extracted from the examples/native/rust/talker `header` feature gates in phase-277 W3.a). Publishes std_msgs/Int32 on /chatter AND a NESTED std_msgs/Header (builtin_interfaces/Time stamp + string frame_id) on /header every 1 s, so the declarative bridge's non-flat typed forwarding can be exercised end-to-end. Consumed by tests/declarative_bridge_zenoh_to_cyclonedds.rs."

[[bin]]
name = "header-chatter-talker"
path = "src/main.rs"

[dependencies]
nros = { path = "../../../../core/nros", default-features = false, features = [
    "std",
    "rmw-cffi",
    "ros-humble",
] }
nros-platform-cffi = { path = "../../../../core/nros-platform-cffi", features = ["posix-c-port"] }
nros-rmw-zenoh = { path = "../../../../zpico/nros-rmw-zenoh", default-features = false, features = [
    "std",
    "platform-posix",
    "ros-humble",
] }
std_msgs = { version = "*", default-features = false }
builtin_interfaces = { version = "*", default-features = false }
log = "0.4"
env_logger = "0.11"

[patch.crates-io]
builtin_interfaces = { path = "generated/builtin_interfaces" }
std_msgs = { path = "generated/std_msgs" }
nros-core = { path = "../../../../core/nros-core" }
nros-serdes = { path = "../../../../core/nros-serdes" }
