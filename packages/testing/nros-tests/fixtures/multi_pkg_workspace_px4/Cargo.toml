# Phase 212.H.7 fixture — PX4 multi-component workspace.
#
# C++-only adapter per Phase 115.K.4 (PX4 uORB has no Rust bindings on
# the SITL path). The Cargo.toml is here purely so `nros plan` /
# `nros codegen-system` can discover the workspace shape; cargo itself
# never builds anything for the PX4 target — `make px4_sitl_default`
# does. The component pkgs use plain CMake, not cargo.
#
# `exclude` covers the bringup, both component pkgs, and the
# `px4_overlay` placeholder so cargo doesn't try to read their
# CMakeLists.txt as Cargo manifests.

[workspace]
resolver = "2"
members  = []
exclude  = ["demo_bringup", "talker_pkg", "brake_arbiter_pkg", "px4_overlay"]

[workspace.metadata.nros]
default_system = "demo_bringup"
