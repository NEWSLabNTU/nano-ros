# Phase 212.O.5 fixture — secondary Component pkg (Rust, no_std).
#
# This pkg ships a sibling `launch/secondary.launch.xml` that the
# primary launch `<include>`s via `$(find secondary_node)/launch/…`.
# The launch_parser's pkg-index walk resolves that substitution to the
# absolute path of this directory (the pkg-index keys by `package.xml`
# `<name>` element — see [`nros_build::pkg_index`]).

[workspace]

[package]
name = "secondary_node"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "secondary_node::Secondary"
name = "secondary"
default_namespace = "/"

[dependencies]
nros = { path = "@NANO_ROS_ROOT@/packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
