# Phase 211.J — `<include>` recursion-safety fixture.
#
# Tests use the pre-baked `record-{chain,cycle,deep}.json` (output of
# `play_launch_parser`) — the test does NOT re-parse the launch files,
# decoupling from `play_launch_parser` AND from `<include file=…>`'s
# absolute-path requirement (the parser doesn't expand `$(dirname)` or
# `$(find-pkg-share <in-tree-pkg>)`, so any committed launch file would
# either bind to the baker's host filesystem or fail to parse on every
# other host). The launch files committed under `src/demo_inc/launch/`
# document the SHAPE of each scenario; they intentionally use
# `$(dirname)` placeholders so re-baking requires rewriting them with
# absolute paths first — see `bake-records.sh`.

[workspace]
default = "native"

[system]
launch     = "src/demo_inc/launch/system.launch.xml"
components = ["demo_inc"]
rmw        = "zenoh"
domain_id  = 0

[deploy.native]
kind   = "self"
target = "x86_64-unknown-linux-gnu"
