# Phase 211.D — conditionals + <group> scoping fixture.
#
# Mirrors the parser+planner audit: a launch file with `<arg enable_logger>`
# + `<node if=$(var enable_logger)>` inside `<group><push_ros_namespace
# namespace="scoped"/>…</group>` exercises BOTH 211.D bullets:
#   (a) deploy-time `if_condition` evaluation
#   (b) nested `<group>` namespace propagation onto child entities
#
# Pre-baked `record-{false,true}.json` files decouple the test from
# `play_launch_parser` on PATH (same pattern as 211.A/B).

[workspace]
default = "native"

[system]
launch     = "src/demo_cond/launch/system.launch.xml"
components = ["demo_cond"]
rmw        = "zenoh"
domain_id  = 0

[deploy.native]
kind   = "self"
target = "x86_64-unknown-linux-gnu"
