[package]
name = "ctrl_pkg"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "ctrl_pkg::Control"
name = "control_node"
default_namespace = "/"
callback_groups = [{ id = "ctrl", tier = "high" }]

[dependencies]
nros = { path = "@NANO_ROS_ROOT@/packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble"] }
