# Phase 211.A — demo_pkg declares its `talker` component so `nros plan`
# resolves it via the root nros.toml's [system].components = ["demo_pkg"]
# entry. source_metadata points at a pre-collected artifact (committed
# below) so the plan stage doesn't have to run `cargo nros metadata` —
# 211.A is a plan-stage foundation; the build stage is a separate item.
version   = 1
package   = "demo_pkg"
component = "talker"
language  = "rust"

[linkage]
crate_name      = "demo_pkg"
executable      = "talker"
exported_symbol = "nros_component_talker"

[metadata]
source_metadata = "metadata/talker.json"
generated_by    = "phase-211.A mirror"

[overrides]
default_namespace = "/"
parameters = {}
remaps = []
