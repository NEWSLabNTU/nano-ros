# Phase 212.M.10 fixture — talker Component pkg (Rust staticlib).
#
# Cargo-native Phase 212.L Component shape: `[package.metadata.nros.component]`
# carries the class declaration; `[package.metadata.nros.deploy.threadx-linux]`
# carries the deploy hints. Sidecar `component_nros.toml` and
# `metadata/talker.json` retired per §212.M.10 (mirrors the M.5.b FreeRTOS
# Component pkg sweep at `8bd016d66`).
#
# Standalone [workspace] table keeps this crate from being folded into
# the outer nano-ros workspace when `cargo build` is invoked from a
# parent that scans the path. The lib name stays `talker_pkg_component`
# so `cmake/NanoRosThreadxSystemCodegen.cmake` can locate the Corrosion-
# imported target as `talker_pkg_component[-static]`.
[workspace]

[package]
name = "talker_pkg_component"
version = "0.1.0"
edition = "2024"
publish = false
description = "Phase 212.H.4 ThreadX 2-component bringup fixture — talker."

[lib]
crate-type = ["staticlib"]
path = "src/lib.rs"

[package.metadata.nros.component]
class = "talker_pkg::Talker"
name = "talker"
default_namespace = "/"

[package.metadata.nros.deploy.threadx-linux]
board = "threadx-linux"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
