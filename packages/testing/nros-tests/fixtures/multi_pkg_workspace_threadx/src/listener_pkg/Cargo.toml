# Phase 212.M.10 fixture — listener Component pkg (Rust staticlib).
#
# Cargo-native Phase 212.L Component shape: `[package.metadata.nros.node]`
# carries the class declaration; `[package.metadata.nros.deploy.threadx-linux]`
# carries the deploy hints. Sidecar `component_nros.toml` and
# `metadata/listener.json` retired per §212.M.10.
[workspace]

[package]
name = "listener_pkg_component"
version = "0.1.0"
edition = "2024"
publish = false
description = "Phase 212.H.4 ThreadX 2-component bringup fixture — listener."

[lib]
crate-type = ["staticlib"]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "listener_pkg::Listener"
name = "listener"
default_namespace = "/"

[package.metadata.nros.deploy.threadx-linux]
board = "threadx-linux"
rmw = "zenoh"
domain_id = 0

[package.metadata.ament]
