[package]
name = "telem_pkg"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "telem_pkg::Telem"
name = "telem_node"
default_namespace = "/"
callback_groups = [{ id = "telem", tier = "low" }]

[dependencies]
nros = { path = "@NANO_ROS_ROOT@/packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "platform-posix",
    "ros-humble",
] }
