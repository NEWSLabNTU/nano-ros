# Phase 212.D fixture — transitional `nros.toml` at workspace root.
#
# The 212.D-canonical shape carries the system spec in
# `demo_bringup/system.toml`; today's `nros plan` reader is pre-212.B, so
# we mirror the relevant bits here. The cmake function still drives the
# planner via this file; the fixture migrates to pure-system.toml once
# 212.B's loader lands.
[workspace]
default = "native"

[system]
launch     = "src/demo_bringup/launch/system.launch.xml"
components = ["talker_pkg", "listener_pkg"]
rmw        = "zenoh"
domain_id  = 0

[deploy.native]
kind   = "self"
target = "x86_64-unknown-linux-gnu"
