; Phase 212.H.6 fixture — PIO consumer of the nano-ros library.
;
; The integration test rewrites @NANO_ROS_ROOT@ before invoking pio.
; A host-compilable env (`native`) is the cheap path the test exercises.

[env:native]
platform = native
lib_deps =
    nano-ros = symlink://@NANO_ROS_ROOT@
build_flags =
    -DNROS_BRINGUP_NAME=demo_bringup
extra_scripts = pre:@NANO_ROS_ROOT@/integrations/platformio/nros_codegen.py
