# Phase 212.H.3 firmware bin — depends on `freertos-qemu-mps2-an385-bsp`
# and ships a 5-line `main.rs`. The empty `[workspace]` table makes
# this its own workspace root so the embedded `thumbv7m-none-eabi`
# target pinned in `.cargo/config.toml` doesn't leak onto the outer
# fixture's host-target component crates.
#
# `@NANO_ROS_ROOT@` placeholders are rewritten by the integration
# test's `stage_fixture` helper to the absolute path of the nano-ros
# checkout. This lets the fixture live in the source tree without
# committing absolute paths.

[workspace]

[package]
name = "firmware"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "firmware"
path = "src/main.rs"

[dependencies]
freertos-qemu-mps2-an385-bsp = { path = "@NANO_ROS_ROOT@/packages/boards/freertos-qemu-mps2-an385-bsp", default-features = false, features = ["rmw-zenoh"] }
panic-semihosting = { version = "0.6", features = ["exit"] }

# Phase 212.M.5.a.3 — link the component pkgs so their
# `__nros_component_<pkg>_register` symbols (emitted by
# `nros::component!()`) reach the final firmware. The BSP-baked
# `system_main.rs` declares them `extern "Rust"` and packs them into
# `NROS_REGISTER_FNS`; without these path deps the link step would
# fail with `undefined reference to __nros_component_talker_pkg_register`.
talker_pkg = { path = "../src/talker_pkg" }
listener_pkg = { path = "../src/listener_pkg" }
