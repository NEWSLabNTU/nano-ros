# Phase 212.N.7 step-5 firmware bin — Entry pkg shape.
#
# Replaces the M.5.a baker-driven `freertos-qemu-mps2-an385-bsp` /
# `nros_run()` shape with the Phase 212.N Entry pkg form: `BoardEntry::run`
# + codegen-emitted `run_plan(runtime)` from `nros-build`. The 5-line
# `main.rs` body matches the wave-4 sibling Entry pkgs under
# `examples/qemu-arm-freertos/rust/<name>_entry/`.
#
# The empty `[workspace]` table makes this its own workspace root so the
# embedded `thumbv7m-none-eabi` target pinned in `.cargo/config.toml`
# doesn't leak onto the outer fixture's host-target component crates.
#
# `@NANO_ROS_ROOT@` placeholders are rewritten by the integration
# test's `stage_fixture` helper to the absolute path of the nano-ros
# checkout.

[workspace]

[package]
name = "firmware"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "firmware"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "freertos"

[dependencies]
# Phase 212.N.3 tier-1 per-board shim — `Mps2An385::run` provides the
# `BoardEntry` lifecycle the Entry pkg invokes.
nros-board-mps2-an385-freertos = { path = "@NANO_ROS_ROOT@/packages/boards/nros-board-mps2-an385-freertos", default-features = false, features = ["rmw-zenoh"] }
# Phase 212.N.1 trait surface — `BoardEntry`, `RuntimeCtx`, `RuntimeError`.
nros-platform = { path = "@NANO_ROS_ROOT@/packages/core/nros-platform", default-features = false, features = ["platform-freertos"] }
panic-semihosting = { version = "0.6", features = ["exit"] }

# Phase 212.N.7 step-5 — Component pkgs are linked here so the codegen
# `run_plan(runtime)` body can call `<pkg>::register(runtime)` (the
# wrapper emitted by `nros::component!()` since step-3.4).
talker_pkg = { path = "../src/talker_pkg" }
listener_pkg = { path = "../src/listener_pkg" }

[build-dependencies]
# Phase 212.N.4 codegen library — emits `$OUT_DIR/run_plan.rs` from the
# launch file + workspace cargo-metadata. In-tree CLI (post-Phase-218
# `packages/cli/`); the archived `NEWSLabNTU/nros-cli` git dep is retired.
nros-build = { path = "@NANO_ROS_ROOT@/packages/cli/nros-build" }
