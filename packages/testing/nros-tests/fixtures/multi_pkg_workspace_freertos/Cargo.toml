# Phase 212.H.3 fixture — multi-pkg FreeRTOS workspace.
#
# Mirrors `multi_pkg_workspace_cpp` shape but Path-A (Rust): two
# component crates + a bringup pkg (declarative-only — no `Cargo.toml`)
# + a `firmware/` bin crate that depends on
# `freertos-qemu-mps2-an385-bsp` and ships the 5-line `main.rs`.
#
# Phase 212.M.5.a.3 — talker_pkg / listener_pkg + firmware/ are each
# their own workspace roots (mirrors the ThreadX H.4 fixture). The
# embedded crates pull in `nros` with `platform-freertos` features
# that would break the outer host workspace if folded in; the per-crate
# `[workspace]` table keeps them standalone. The outer workspace has
# nothing to enumerate today.

[workspace]
resolver = "2"
members = []
exclude = ["src/talker_pkg", "src/listener_pkg", "src/demo_bringup", "firmware"]
