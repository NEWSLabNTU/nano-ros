# Phase 212.O.3 — FreeRTOS Entry pkg #2.
#
# Sibling to `posix_entry/`. Builds the SAME `shared_node_pkg` rlib
# against the QEMU MPS2-AN385 + FreeRTOS Board impl
# (`nros-board-mps2-an385-freertos::Mps2An385`).
#
# Standalone `[workspace]` table is REQUIRED — the embedded target
# (`thumbv7m-none-eabi` pinned in `.cargo/config.toml`) would otherwise
# leak onto the outer fixture's host-target component crates.
[workspace]

[package]
name = "freertos_entry"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "freertos_entry"
path = "src/main.rs"

[package.metadata.nros.entry]
deploy = "freertos"

[dependencies]
# Board impl for the FreeRTOS / MPS2-AN385 family.
nros-board-mps2-an385-freertos = { path = "@NANO_ROS_ROOT@/packages/boards/nros-board-mps2-an385-freertos", default-features = false, features = ["rmw-zenoh"] }
# Trait surface — BoardEntry / RuntimeCtx / RuntimeError.
nros-platform = { path = "@NANO_ROS_ROOT@/packages/core/nros-platform", default-features = false, features = ["platform-freertos"] }
panic-semihosting = { version = "0.6", features = ["exit"] }
# Codegen-emitted `run_plan.rs` defines a `register_dispatch` shim
# typed `&mut ::nros::Executor`, so the Entry pkg depends on `nros`
# directly — same platform features the Component pkg forwards (no
# `std` on `thumbv7m-none-eabi`).
nros = { path = "@NANO_ROS_ROOT@/packages/core/nros", default-features = false, features = ["alloc", "rmw-cffi", "ros-humble", "platform-freertos"] }
# Component pkg under test — enable the `freertos` feature gate so
# its `nros` dep links the FreeRTOS platform backend.
shared_node_pkg = { path = "../src/shared_node_pkg", features = ["freertos"] }

[build-dependencies]
# Phase 212.N.4 codegen library — emits `$OUT_DIR/run_plan.rs` from
# `launch/system.launch.xml`. Shared by BOTH Entry pkgs at the SAME
# source (mirrors the sibling posix_entry Cargo.toml) — the
# byte-identical OUT_DIR/run_plan.rs assertion depends on that. In-tree
# CLI (post-Phase-218 `packages/cli/`); archived git dep retired.
nros-build = { path = "@NANO_ROS_ROOT@/packages/cli/nros-build" }
