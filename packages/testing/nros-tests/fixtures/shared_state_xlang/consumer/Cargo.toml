# Self-rooting workspace so the parent nano-ros workspace never sweeps this
# fixture; the test stages it to a tempdir and rewrites @NANO_ROS_ROOT@.
[workspace]

[package]
name = "xlang_consumer"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "xlang_consumer"
path = "src/main.rs"

[dependencies]
# The generated `nros_shared_state.rs` references `::nros_orchestration::*`.
nros-orchestration = { path = "@NANO_ROS_ROOT@/packages/core/nros-orchestration", default-features = false }
# Supplies the `critical_section` impl the guarded `LockedSharedRegion` links
# against (native = std mutex). Standalone graph here — no `ffi-sync` to clash
# with under feature unification.
critical-section = { version = "1", features = ["std"] }

[build-dependencies]
cc = "1"
