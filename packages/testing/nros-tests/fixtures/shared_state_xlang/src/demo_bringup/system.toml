[system]
name = "xlang_demo"
rmw = "zenoh"
domain_id = 0
default_launch = "system.launch.xml"

[[component]]
pkg = "ctrl_pkg"
class = "ctrl_pkg::Control"
name = "control_node"

[[component]]
pkg = "telem_pkg"
class = "telem_pkg::Telem"
name = "telem_node"

# Phase 228.D.2 — one cross-language shared region. `sync = "mutex"` forces the
# guarded `LockedSharedRegion` (the cross-tier shape) so the example exercises
# the `critical_section`-guarded path, including a C `modify` callback.
[[shared_state]]
name = "vehicle_state"
schema = "VehicleState"
sync = "mutex"
read = ["telem_node"]
write = ["control_node"]
fields = [
    { name = "speed", type = "f32" },
    { name = "heading", type = "f32" },
    { name = "ticks", type = "u32" },
]

[deploy.native]
kind = "self"
target = "x86_64-unknown-linux-gnu"
