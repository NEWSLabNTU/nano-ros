[package]
name = "talker_pkg"
version = "0.1.0"
edition = "2024"
publish = false

# Both crate types so the bin-target Entry pkg can `use talker_pkg::*`
# and the codegen path can link the staticlib if a future test
# variant wires that up.
[lib]
path = "src/lib.rs"

[package.metadata.nros.node]
class = "talker_pkg::Talker"
name = "talker"
default_namespace = "/"

[dependencies]
# Phase 248 C5c — node pkgs are platform/RMW-agnostic; `platform-posix`
# was removed from `nros`. Platform + backend come from the entry/board.
nros = { path = "@NANO_ROS_ROOT@/packages/core/nros", default-features = false, features = [
    "alloc",
    "rmw-cffi",
    "ros-humble",
] }
