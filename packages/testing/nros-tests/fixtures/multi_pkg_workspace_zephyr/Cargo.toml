# Phase 212.H.1 fixture — Zephyr multi-pkg workspace.
#
# Two component crates (`talker_pkg`, `listener_pkg`) plus a Path A
# bringup pkg (`demo_bringup/`, no Cargo.toml) plus a Zephyr app
# (`zephyr_app/`, CMake-only).
#
# The bringup dir is `exclude`d so cargo doesn't try to read it; the
# `default_system` key under `[workspace.metadata.nros]` tells `nros
# plan` / `nros codegen-system` which bringup pkg to resolve.

[workspace]
resolver = "2"
members  = ["talker_pkg", "listener_pkg"]
exclude  = ["demo_bringup", "zephyr_app"]

[workspace.metadata.nros]
default_system = "demo_bringup"
