[package]
name = "nano-ros-tests"
version = "0.1.0"
edition = "2024"
publish = false
description = "Integration tests for nros"

[dependencies]
# Test framework
rstest = "0.24"
duct = "0.13"
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.15"
thiserror = "2.0"
once_cell = "1.20"

# Async support for waiting
parking_lot = "0.12"

# Non-blocking I/O for process output capture
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Workspace dependencies for type access (optional)
nros-core = { path = "../../core/nros-core", optional = true }
nros-serdes = { path = "../../core/nros-serdes", optional = true }

# RMW abstraction layer (optional, for in-process integration tests)
nros-rmw = { path = "../../core/nros-rmw", optional = true }
nros-rmw-zenoh = { path = "../../zpico/nros-rmw-zenoh", features = ["platform-posix", "std"], optional = true }

[features]
default = []
types = ["nros-core", "nros-serdes"]
rmw = ["nros-rmw", "nros-rmw-zenoh", "nros-core", "nros-serdes"]

[lib]
name = "nano_ros_tests"
path = "src/lib.rs"

# Integration tests
[[test]]
name = "emulator"
path = "tests/emulator.rs"

[[test]]
name = "nano2nano"
path = "tests/nano2nano.rs"

[[test]]
name = "platform"
path = "tests/platform.rs"

[[test]]
name = "rmw_interop"
path = "tests/rmw_interop.rs"

[[test]]
name = "zephyr"
path = "tests/zephyr.rs"

[[test]]
name = "actions"
path = "tests/actions.rs"

[[test]]
name = "c_api"
path = "tests/c_api.rs"

[[test]]
name = "rmw"
path = "tests/rmw.rs"
required-features = ["rmw"]
