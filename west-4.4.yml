# nros West Manifest — Zephyr 4.4 variant (Phase 180.A)
#
# Sibling of west.yml (the 3.7 LTS pin). Selected by
# NROS_ZEPHYR_VERSION=4.4 (Phase 180.A Task 2). Used to bring up a
# 4.4 workspace alongside the 3.7 one so the module can be made to
# build on both lines.
#
#   NROS_ZEPHYR_WORKSPACE=../nano-ros-workspace-4.4 \
#     west init -l --mf west-4.4.yml <manifest-repo>
#   west update

manifest:
  version: "1.0"

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    # Zephyr RTOS — 4.4 (latest rolling; 3.7 LTS lives in west.yml)
    - name: zephyr
      remote: zephyrproject-rtos
      revision: v4.4.0
      import:
        name-allowlist:
          # Core
          - cmsis
          - picolibc
          # Crypto
          - mbedtls
          - tinycrypt
          # HALs
          - hal_stm32
          - hal_nordic
          - hal_espressif
          - hal_nxp
          # Bootloader
          - mcuboot
          # Tools
          - net-tools

    # Rust language support. Pinned (Phase 180.A Task 9) for reproducible
    # 4.4 bringup. Task 9 verified the 4 nano-ros Rust patches against this
    # rev: native_sim (x86_64/aarch64 host) is upstream-supported by
    # _rust_map_target, so the native_sim line needs none of them; the 3
    # arch patches (aarch64/cortex-a9/cortex-r) remain re-anchorable and
    # travel with the FVP/S32Z/Zynq board targets; cargo-features re-anchors
    # into rust_cargo_application. zephyr-lang-rust has no Zephyr-version tag,
    # so we pin the SHA that 4.4 main resolved to.
    - name: zephyr-lang-rust
      remote: zephyrproject-rtos
      revision: a763400f31e92994d5c5aa0836346e19048f5bde
      path: modules/lang/rust

  self:
    path: nros
