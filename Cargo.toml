    "examples/qemu-arm-nuttx/rust/zenoh/listener",
    "examples/qemu-arm-nuttx/rust/zenoh/service-server",
    "examples/qemu-arm-nuttx/rust/zenoh/service-client",
    "examples/qemu-arm-nuttx/rust/zenoh/action-server",
    "examples/qemu-arm-nuttx/rust/zenoh/action-client",
