[workspace]
resolver = "2"

members = [
    "packages/core/nros",
    "packages/core/nros-core",
    "packages/core/nros-serdes",
    "packages/core/nros-macros",
    "packages/core/nros-params",
    "packages/core/nros-rmw",
    "packages/core/nros-node",
    # Zenoh-pico FFI bindings
    "packages/zpico/zpico-sys",
    # Free-list allocator for z_malloc/z_free on bare-metal
    "packages/zpico/zpico-alloc",
    # XRCE-DDS FFI bindings
    "packages/xrce/xrce-sys",
    # Zenoh RMW backend (shim + zpico wrapper)
    "packages/zpico/nros-rmw-zenoh",
    # DDS RMW backend (pure Rust, dust-dds)
    "packages/dds/nros-rmw-dds",
    # Integration tests
    "packages/testing/nros-tests",
    # C API for embedded systems
    "packages/core/nros-c",
    # C++ API (header-only C++14 library + Rust FFI staticlib)
    "packages/core/nros-cpp",
    # LAN9118 Ethernet driver for smoltcp
    "packages/drivers/lan9118-smoltcp",
    # Generated ROS 2 interface types (rcl_interfaces, builtin_interfaces).
    # Required by nros-node's param-services feature. Checked into git because
    # cargo requires workspace member paths to exist on disk.
    "packages/interfaces/rcl-interfaces/generated/humble/nros-builtin-interfaces",
    "packages/interfaces/rcl-interfaces/generated/humble/nros-rcl-interfaces",
    # C function table adapter for third-party RMW backends
    "packages/core/nros-rmw-cffi",
    # Ghost model types for verification (shared between production tests and Verus proofs)
    "packages/verification/nros-ghost-types",
    # Unified platform abstraction
    "packages/core/nros-platform",
    "packages/core/nros-platform-cffi",
    "packages/core/nros-platform-posix",
    "packages/core/nros-platform-nuttx",
    "packages/core/nros-platform-freertos",
    "packages/core/nros-platform-threadx",
    # Platform shims for RMW backends
    "packages/zpico/zpico-platform-shim",
    "packages/xrce/xrce-platform-shim",
]

# Excluded from workspace — standalone packages and third-party forks
exclude = [
    # dust-dds fork (has its own workspace root)
    "packages/dds/dust-dds",
    # rcl-interfaces parent package (metadata only, no Rust targets)
    "packages/interfaces/rcl-interfaces",
    # Examples are standalone packages that generate their own bindings
    # Native Rust examples (desktop/Linux)
    "examples/native/rust/zenoh/talker",
    "examples/native/rust/zenoh/listener",
    "examples/native/rust/zenoh/custom-msg",
    "examples/native/rust/zenoh/service-server",
    "examples/native/rust/zenoh/service-client",
    "examples/native/rust/zenoh/async-service-client",
    "examples/native/rust/zenoh/action-server",
    "examples/native/rust/zenoh/action-client",
    "examples/native/rust/zenoh/async-action-client",
    "examples/native/rust/zenoh/fairness-bench",
    "examples/native/rust/zenoh/stress-test",
    "examples/native/rust/zenoh/rtic-talker",
    "examples/native/rust/zenoh/rtic-listener",
    "examples/native/rust/zenoh/rtic-service-server",
    "examples/native/rust/zenoh/rtic-service-client",
    "examples/native/rust/zenoh/rtic-action-server",
    "examples/native/rust/zenoh/rtic-action-client",
    # Native DDS examples
    "examples/native/rust/dds/talker",
    "examples/native/rust/dds/listener",
    # QEMU ARM examples (bare-metal Cortex-M3)
    "examples/qemu-arm-baremetal/rust/zenoh/talker",
    "examples/qemu-arm-baremetal/rust/zenoh/listener",
    "examples/qemu-arm-baremetal/rust/core/cdr-test",
    "examples/qemu-arm-baremetal/rust/core/wcet-bench",
    "examples/qemu-arm-baremetal/rust/zenoh/large-msg-test",
    "examples/qemu-arm-baremetal/rust/standalone/lan9118",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-talker",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-listener",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-service-server",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-service-client",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-action-server",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-action-client",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-mixed-talker",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-mixed-listener",
    "examples/qemu-arm-baremetal/rust/zenoh/serial-talker",
    "examples/qemu-arm-baremetal/rust/zenoh/serial-listener",
    # QEMU ARM FreeRTOS examples (Cortex-M3 + FreeRTOS + lwIP)
    "examples/qemu-arm-freertos/rust/zenoh/talker",
    "examples/qemu-arm-freertos/rust/zenoh/listener",
    "examples/qemu-arm-freertos/rust/zenoh/service-server",
    "examples/qemu-arm-freertos/rust/zenoh/service-client",
    "examples/qemu-arm-freertos/rust/zenoh/action-server",
    "examples/qemu-arm-freertos/rust/zenoh/action-client",
    # QEMU ARM NuttX examples (Cortex-M3 + NuttX)
    "examples/qemu-arm-nuttx/rust/zenoh/talker",
    "examples/qemu-arm-nuttx/rust/zenoh/listener",
    "examples/qemu-arm-nuttx/rust/zenoh/service-server",
    "examples/qemu-arm-nuttx/rust/zenoh/service-client",
    "examples/qemu-arm-nuttx/rust/zenoh/action-server",
    "examples/qemu-arm-nuttx/rust/zenoh/action-client",
    # STM32F4 examples
    "examples/stm32f4/rust/zenoh/talker",
    "examples/stm32f4/rust/zenoh/polling",
    "examples/stm32f4/rust/zenoh/rtic-talker",
    "examples/stm32f4/rust/zenoh/rtic-listener",
    "examples/stm32f4/rust/zenoh/rtic-service-server",
    "examples/stm32f4/rust/zenoh/rtic-service-client",
    "examples/stm32f4/rust/zenoh/rtic-action-server",
    "examples/stm32f4/rust/zenoh/rtic-action-client",
    "examples/stm32f4/rust/core/embassy",
    "examples/stm32f4/rust/standalone/smoltcp",
    # Zephyr examples
    "examples/zephyr/rust/zenoh/talker",
    "examples/zephyr/rust/zenoh/listener",
    "examples/zephyr/rust/zenoh/service-server",
    "examples/zephyr/rust/zenoh/service-client",
    "examples/zephyr/rust/zenoh/action-server",
    "examples/zephyr/rust/zenoh/action-client",
    "examples/zephyr/rust/zenoh/async-service-client",
    # Zephyr XRCE examples (require Zephyr workspace + XRCE Agent)
    "examples/zephyr/rust/xrce/talker",
    "examples/zephyr/rust/xrce/listener",
    # Reference implementations (library, not an example)
    "packages/reference/qemu-smoltcp-bridge",
    # smoltcp link layer (embedded-only, requires cross-compilation)
    "packages/zpico/zpico-smoltcp",
    # Serial (UART) link layer (embedded-only, requires cross-compilation)
    "packages/zpico/zpico-serial",
    # CMSDK UART driver (embedded-only, Cortex-M)
    "packages/drivers/cmsdk-uart",
    # STM32F4 USART driver (embedded-only, Cortex-M)
    "packages/drivers/stm32f4-usart",
    # XRCE-DDS smoltcp UDP transport (embedded-only, requires cross-compilation)
    "packages/xrce/xrce-smoltcp",
    # XRCE-DDS RMW backend (embedded-only, requires xrce-sys linking)
    "packages/xrce/nros-rmw-xrce",
    # Native XRCE-DDS examples (requires XRCE Agent)
    "examples/native/rust/xrce/talker",
    "examples/native/rust/xrce/listener",
    "examples/native/rust/xrce/service-server",
    "examples/native/rust/xrce/service-client",
    "examples/native/rust/xrce/action-server",
    "examples/native/rust/xrce/action-client",
    "examples/native/rust/xrce/serial-talker",
    "examples/native/rust/xrce/serial-listener",
    "examples/native/rust/xrce/large-msg-test",
    "examples/native/rust/xrce/stress-test",
    # Board crates (embedded-only, require cross-compilation)
    "packages/boards/mps2-an385-pac",
    "packages/boards/nros-mps2-an385",
    "packages/boards/nros-platform-mps2-an385",
    "packages/boards/nros-platform-stm32f4",
    "packages/boards/nros-platform-esp32",
    "packages/boards/nros-platform-esp32-qemu",
    "packages/boards/nros-esp32",
    "packages/boards/nros-esp32-qemu",
    "packages/boards/nros-stm32f4",
    "packages/boards/nros-nuttx-qemu-arm",
    "packages/boards/nros-mps2-an385-freertos",
    "packages/boards/nros-threadx-linux",
    "packages/boards/nros-threadx-qemu-riscv64",
    # ThreadX Linux examples (require ThreadX + NetX Duo SDKs)
    "examples/threadx-linux/rust/zenoh/talker",
    "examples/threadx-linux/rust/zenoh/listener",
    "examples/threadx-linux/rust/zenoh/service-server",
    "examples/threadx-linux/rust/zenoh/service-client",
    "examples/threadx-linux/rust/zenoh/action-server",
    "examples/threadx-linux/rust/zenoh/action-client",
    # ThreadX QEMU RISC-V examples (require ThreadX + NetX Duo SDKs + RISC-V toolchain)
    "examples/qemu-riscv64-threadx/rust/zenoh/talker",
    "examples/qemu-riscv64-threadx/rust/zenoh/listener",
    "examples/qemu-riscv64-threadx/rust/zenoh/service-server",
    "examples/qemu-riscv64-threadx/rust/zenoh/service-client",
    "examples/qemu-riscv64-threadx/rust/zenoh/action-server",
    "examples/qemu-riscv64-threadx/rust/zenoh/action-client",
    # ESP32 crates (RISC-V, require nightly + esp-hal)
    "packages/drivers/openeth-smoltcp",
    # ESP32 examples (RISC-V, require nightly + esp-hal)
    "examples/esp32/rust/standalone/hello-world",
    "examples/esp32/rust/zenoh/talker",
    "examples/esp32/rust/zenoh/listener",
    "examples/qemu-esp32-baremetal/rust/zenoh/talker",
    "examples/qemu-esp32-baremetal/rust/zenoh/listener",
    # Verus verification crate (requires Verus toolchain, excluded from workspace)
    "packages/verification/nros-verification",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/user/nano-ros"
rust-version = "1.75"

[workspace.dependencies]
# Internal crates (default-features = false for no_std flexibility)
nros-core = { path = "packages/core/nros-core", default-features = false }
nros-serdes = { path = "packages/core/nros-serdes", default-features = false }
nros-macros = { path = "packages/core/nros-macros" }
nros-params = { path = "packages/core/nros-params", default-features = false }
nros-rmw = { path = "packages/core/nros-rmw", default-features = false }
nros-rmw-zenoh = { path = "packages/zpico/nros-rmw-zenoh", default-features = false }
nros-rmw-xrce = { path = "packages/xrce/nros-rmw-xrce", default-features = false }
nros-rmw-dds = { path = "packages/dds/nros-rmw-dds", default-features = false }
nros-rmw-cffi = { path = "packages/core/nros-rmw-cffi", default-features = false }
nros-node = { path = "packages/core/nros-node", default-features = false }

# no_std compatible
heapless = "0.8"
embedded-io = "0.6"

# Serialization
byteorder = { version = "1.5", default-features = false }

# Proc macros
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

# Optional std dependencies
thiserror = "1"

# Embedded runtime (QEMU testing)
cortex-m = "0.7"
cortex-m-rt = "0.7"
cortex-m-semihosting = "0.5"
panic-semihosting = { version = "0.6", features = ["exit"] }
panic-halt = "1.0"
qemu-exit = "3.0"

# Logging
log = { version = "0.4", default-features = false }
env_logger = "0.11"

# Embedded logging
defmt = "0.3"
defmt-rtt = "0.4"

# FFI / C interop
cty = "0.2"

[profile.release]
opt-level = "s"      # Optimize for size
lto = true           # Link-time optimization
codegen-units = 1    # Better optimization
panic = "abort"      # Smaller binary, no unwinding

[profile.dev]
opt-level = 1        # Some optimization even in dev for embedded

# Patches for generated crates that use version = "*"
[patch.crates-io]
nros-core = { path = "packages/core/nros-core" }
nros-serdes = { path = "packages/core/nros-serdes" }
