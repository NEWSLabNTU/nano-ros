    # Zephyr examples
    "examples/zephyr/rust/zenoh/talker",
    "examples/zephyr/rust/zenoh/listener",
    "examples/zephyr/rust/zenoh/service-server",
    "examples/zephyr/rust/zenoh/service-client",
    "examples/zephyr/rust/zenoh/action-server",
    "examples/zephyr/rust/zenoh/action-client",
    "examples/zephyr/rust/zenoh/async-service-client",
