    "examples/qemu-arm-baremetal/rust/zenoh/rtic-service-server",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-service-client",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-action-server",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-action-client",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-mixed-talker",
    "examples/qemu-arm-baremetal/rust/zenoh/rtic-mixed-listener",
    "examples/qemu-arm-baremetal/rust/zenoh/serial-talker",
    "examples/qemu-arm-baremetal/rust/zenoh/serial-listener",
    "examples/qemu-arm-baremetal/rust/dds/talker",
    "examples/qemu-arm-baremetal/rust/dds/listener",
