[workspace]
resolver = "2"

members = [
    "packages/core/nano-ros",
    "packages/core/nano-ros-core",
    "packages/core/nano-ros-serdes",
    "packages/core/nano-ros-macros",
    "packages/core/nano-ros-params",
    "packages/core/nano-ros-transport",
    "packages/core/nano-ros-node",
    # Zenoh transport for cross-platform support (POSIX, Zephyr, bare-metal)
    "packages/transport/nano-ros-transport-zenoh-sys",
    "packages/transport/nano-ros-transport-zenoh",
    # Integration tests
    "packages/testing/nano-ros-tests",
    # C API for embedded systems
    "packages/core/nano-ros-c",
    # LAN9118 Ethernet driver for smoltcp
    "packages/drivers/lan9118-smoltcp",
    # Generated ROS 2 interface types (rcl_interfaces, builtin_interfaces).
    # Required by nano-ros-node's param-services feature. Checked into git because
    # cargo requires workspace member paths to exist on disk.
    "packages/interfaces/rcl-interfaces/generated/builtin_interfaces",
    "packages/interfaces/rcl-interfaces/generated/rcl_interfaces",
]

# Examples are excluded from workspace - they are standalone packages
# that generate their own bindings via `cargo nano-ros generate`
exclude = [
    # Embedded crates (require cross-compilation)
    "packages/bsp/nano-ros-bsp-qemu",
    "packages/bsp/nano-ros-bsp-stm32f4",
    # Native examples (desktop/Linux)
    "examples/native/rs-talker",
    "examples/native/rs-listener",
    "examples/native/rs-custom-msg",
    "examples/native/rs-service-server",
    "examples/native/rs-service-client",
    "examples/native/rs-action-server",
    "examples/native/rs-action-client",
    # QEMU examples (bare-metal ARM)
    "examples/qemu/rs-talker",
    "examples/qemu/rs-listener",
    "examples/qemu/rs-test",
    "examples/qemu/rs-wcet-bench",
    "examples/qemu/bsp-talker",
    "examples/qemu/bsp-listener",
    # STM32F4 examples
    "examples/stm32f4/bsp-talker",
    # Zephyr examples
    "examples/zephyr/rs-talker",
    "examples/zephyr/rs-listener",
    "examples/zephyr/rs-service-server",
    "examples/zephyr/rs-service-client",
    "examples/zephyr/rs-action-server",
    "examples/zephyr/rs-action-client",
    # Reference implementations (low-level platform examples)
    "packages/reference/qemu-smoltcp-bridge",
    "packages/reference/qemu-lan9118",
    "packages/reference/stm32f4-smoltcp",
    "packages/reference/stm32f4-rtic",
    "packages/reference/stm32f4-polling",
    "packages/reference/stm32f4-embassy",
    # smoltcp link layer (embedded-only, requires cross-compilation)
    "packages/link/nano-ros-link-smoltcp",
    # Platform crates (embedded-only, require cross-compilation)
    "packages/platform/nano-ros-platform-qemu",
    "packages/platform/nano-ros-platform-esp32-qemu",
    "packages/platform/nano-ros-platform-esp32",
    "packages/platform/nano-ros-platform-stm32f4",
    # ESP32 crates (RISC-V, require nightly + esp-hal)
    "packages/bsp/nano-ros-bsp-esp32",
    "packages/bsp/nano-ros-bsp-esp32-qemu",
    "packages/drivers/openeth-smoltcp",
    # ESP32 examples (RISC-V, require nightly + esp-hal)
    "examples/esp32/hello-world",
    "examples/esp32/bsp-talker",
    "examples/esp32/bsp-listener",
    "examples/esp32/qemu-talker",
    "examples/esp32/qemu-listener",
    # Verus verification crate (requires Verus toolchain, excluded from workspace)
    "packages/verification/nano-ros-verification",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/user/nano-ros"
rust-version = "1.75"

[workspace.dependencies]
# Internal crates (default-features = false for no_std flexibility)
nano-ros-core = { path = "packages/core/nano-ros-core", default-features = false }
nano-ros-serdes = { path = "packages/core/nano-ros-serdes", default-features = false }
nano-ros-macros = { path = "packages/core/nano-ros-macros" }
nano-ros-params = { path = "packages/core/nano-ros-params", default-features = false }
nano-ros-transport = { path = "packages/core/nano-ros-transport", default-features = false }
nano-ros-node = { path = "packages/core/nano-ros-node", default-features = false }

# no_std compatible
heapless = "0.8"
embedded-io = "0.6"

# Serialization
byteorder = { version = "1.5", default-features = false }

# Proc macros
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

# Optional std dependencies
thiserror = "1"

# Embedded runtime (QEMU testing)
cortex-m = "0.7"
cortex-m-rt = "0.7"
cortex-m-semihosting = "0.5"
panic-semihosting = { version = "0.6", features = ["exit"] }
panic-halt = "1.0"
qemu-exit = "3.0"

# Logging
log = { version = "0.4", default-features = false }
env_logger = "0.11"

# Embedded logging
defmt = "0.3"
defmt-rtt = "0.4"

# FFI / C interop
cty = "0.2"

[profile.release]
opt-level = "s"      # Optimize for size
lto = true           # Link-time optimization
codegen-units = 1    # Better optimization
panic = "abort"      # Smaller binary, no unwinding

[profile.dev]
opt-level = 1        # Some optimization even in dev for embedded

# Patches for generated crates that use version = "*"
[patch.crates-io]
nano-ros-core = { path = "packages/core/nano-ros-core" }
nano-ros-serdes = { path = "packages/core/nano-ros-serdes" }
