[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/NEWSLabNTU/nano-ros"
rust-version = "1.75"

[workspace.dependencies]
# Internal crates — version required for crates.io; path used locally.
nros-core = { version = "0.1.0", path = "packages/core/nros-core", default-features = false }
nros-serdes = { version = "0.1.0", path = "packages/core/nros-serdes", default-features = false }
nros-macros = { version = "0.1.0", path = "packages/core/nros-macros" }
nros-params = { version = "0.1.0", path = "packages/core/nros-params", default-features = false }
nros-rmw = { version = "0.1.0", path = "packages/core/nros-rmw", default-features = false }
nros-rmw-zenoh = { version = "0.1.0", path = "packages/zpico/nros-rmw-zenoh", default-features = false }
nros-rmw-xrce = { version = "0.1.0", path = "packages/xrce/nros-rmw-xrce", default-features = false }
nros-rmw-dds = { version = "0.1.0", path = "packages/dds/nros-rmw-dds", default-features = false }
nros-rmw-cffi = { version = "0.1.0", path = "packages/core/nros-rmw-cffi", default-features = false }
nros-node = { version = "0.1.0", path = "packages/core/nros-node", default-features = false }
nros-sizes-build = { version = "0.1.0", path = "packages/core/nros-sizes-build" }
nros-platform = { version = "0.1.0", path = "packages/core/nros-platform", default-features = false }
nros-platform-cffi = { version = "0.1.0", path = "packages/core/nros-platform-cffi", default-features = false }
nros-platform-posix = { version = "0.1.0", path = "packages/core/nros-platform-posix", default-features = false }
nros-platform-freertos = { version = "0.1.0", path = "packages/core/nros-platform-freertos" }
nros-platform-nuttx = { version = "0.1.0", path = "packages/core/nros-platform-nuttx" }
nros-platform-threadx = { version = "0.1.0", path = "packages/core/nros-platform-threadx" }
nros-platform-zephyr = { version = "0.1.0", path = "packages/core/nros-platform-zephyr" }
zpico-platform-shim = { version = "0.1.0", path = "packages/zpico/zpico-platform-shim", default-features = false }
xrce-platform-shim = { version = "0.1.0", path = "packages/xrce/xrce-platform-shim", default-features = false }
zpico-sys = { version = "0.1.0", path = "packages/zpico/zpico-sys", default-features = false }
zpico-alloc = { version = "0.1.0", path = "packages/zpico/zpico-alloc" }
xrce-sys = { version = "0.1.0", path = "packages/xrce/xrce-sys", default-features = false }

# no_std compatible
heapless = "0.8"
embedded-io = "0.6"

# Serialization
byteorder = { version = "1.5", default-features = false }

# Proc macros
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

# Optional std dependencies
thiserror = "1"

# Embedded runtime (QEMU testing)
cortex-m = "0.7"
cortex-m-rt = "0.7"
cortex-m-semihosting = "0.5"
panic-semihosting = { version = "0.6", features = ["exit"] }
panic-halt = "1.0"
qemu-exit = "3.0"

# Logging
log = { version = "0.4", default-features = false }
env_logger = "0.11"

# Embedded logging
defmt = "0.3"
defmt-rtt = "0.4"

# FFI / C interop
cty = "0.2"

# ---------------------------------------------------------------------------
# Workspace-wide lint configuration. Member crates opt in with
# `[lints] workspace = true`. Replaces the ad-hoc CLIPPY_LINTS string the
# justfile used to pass on the command line.
# ---------------------------------------------------------------------------
[workspace.lints.rust]
warnings = "deny"
# Whitelist cfg flags consumed by the workspace's verifiers / codegen tools
# (Kani for bounded model checking, cbindgen for C header generation,
# zpico_backend for the zenoh-pico backend selector). Combined here so
# each crate can opt in via `[lints] workspace = true` without needing
# its own per-crate `[lints.rust] unexpected_cfgs` override.
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(kani)',
    'cfg(cbindgen)',
    'cfg(verus_keep_ghost)',
    'cfg(verus_keep_ghost_body)',
    'cfg(zpico_backend, values("posix", "zephyr", "bare-metal", "freertos", "nuttx", "threadx"))',
] }

[workspace.lints.clippy]
infinite_iter = "deny"
while_immutable_condition = "deny"
never_loop = "deny"
empty_loop = "deny"
unconditional_recursion = "deny"
large_stack_arrays = "warn"
large_types_passed_by_value = "warn"

[profile.release]
opt-level = "s"      # Optimize for size
# `lto = true` makes rustc emit each rlib's codegen units as LLVM
# bitcode .rcgu.o members. The `nros-sizes-build` probe parses rlib
# members as ELF objects via the `object` crate, which cannot read
# bitcode, so every `__NROS_SIZE_*` symbol comes back as 0 — see
# Phase 89.3. With `lto = "off"` the rlib contains native objects
# and the probe recovers the correct `size_of::<T>()` values, which
# nros-cpp uses to size `alignas(…) uint8_t storage_[…]` buffers
# for ActionClient / ActionServer / Executor. The binary-size cost
# is small in practice and can be revisited by a future sizes-probe
# that reads bitcode directly.
lto = "off"
codegen-units = 1    # Better optimization
panic = "abort"      # Smaller binary, no unwinding

[profile.dev]
opt-level = 1        # Some optimization even in dev for embedded

# Patches for generated crates that use version = "*"
[patch.crates-io]
nros-core = { path = "packages/core/nros-core" }
nros-serdes = { path = "packages/core/nros-serdes" }
