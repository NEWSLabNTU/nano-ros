    "examples/qemu-arm-nuttx/rust/zenoh/action-client",
    # Phase 169.2 — qemu-arm-nuttx rust/dds deleted.
    # STM32F4 examples
    "examples/stm32f4/rust/zenoh/talker",
    "examples/stm32f4/rust/zenoh/polling",
    "examples/stm32f4/rust/zenoh/talker-rtic",
    "examples/stm32f4/rust/zenoh/listener-rtic",
    "examples/stm32f4/rust/zenoh/service-server-rtic",
    "examples/stm32f4/rust/zenoh/service-client-rtic",
    "examples/stm32f4/rust/zenoh/action-server-rtic",
    "examples/stm32f4/rust/zenoh/action-client-rtic",
    "examples/stm32f4/rust/zenoh/talker-embassy",
    "packages/testing/nros-smoke/stm32f4-smoltcp-echo",
    # Zephyr examples
