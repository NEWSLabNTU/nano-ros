    "examples/zephyr/rust/xrce/listener",
    "examples/zephyr/rust/xrce/service-server",
    "examples/zephyr/rust/xrce/service-client",
    "examples/zephyr/rust/xrce/action-server",
    "examples/zephyr/rust/xrce/action-client",
    # Zephyr DDS examples (Phase 71.8 — require Zephyr workspace)
    "examples/zephyr/rust/dds/talker",
    "examples/zephyr/rust/dds/listener",
    "examples/zephyr/rust/dds/service-server",
    "examples/zephyr/rust/dds/service-client",
    "examples/zephyr/rust/dds/action-server",
    "examples/zephyr/rust/dds/action-client",
    "examples/zephyr/rust/dds/async-service-client",
