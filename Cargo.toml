    "examples/qemu-arm-freertos/rust/action-client",
    "examples/qemu-riscv64-threadx/rust/talker",
    "examples/qemu-riscv64-threadx/rust/listener",
    "examples/qemu-riscv64-threadx/rust/service-server",
    "examples/qemu-riscv64-threadx/rust/service-client",
    "examples/qemu-riscv64-threadx/rust/action-server",
    "examples/qemu-riscv64-threadx/rust/action-client",
    "examples/threadx-linux/rust/talker",
    "examples/threadx-linux/rust/listener",
    "examples/threadx-linux/rust/service-server",
    "examples/threadx-linux/rust/service-client",
    "examples/threadx-linux/rust/action-server",
    "examples/threadx-linux/rust/action-client",
    "examples/native/rust/zenoh/talker",
    "examples/native/rust/zenoh/listener",
    "examples/native/rust/zenoh/logging",
    "examples/native/rust/zenoh/custom-transport-talker",
    "examples/native/rust/zenoh/custom-transport-listener",
    "examples/native/rust/zenoh/lifecycle-node",
    "examples/native/rust/zenoh/custom-msg",
    "examples/native/rust/zenoh/service-server",
    "examples/native/rust/zenoh/service-client",
    "examples/native/rust/zenoh/service-client-async",
    "examples/native/rust/zenoh/action-server",
    "examples/native/rust/zenoh/action-client",
    "examples/native/rust/zenoh/action-client-async",
    "packages/testing/nros-bench/executor-fairness",
    "packages/testing/nros-bench/stress-zenoh",
    "examples/native/rust/zenoh/talker-rtic",
    "examples/native/rust/zenoh/listener-rtic",
    "examples/native/rust/zenoh/service-server-rtic",
    "examples/native/rust/zenoh/service-client-rtic",
    "examples/native/rust/zenoh/action-server-rtic",
    "examples/native/rust/zenoh/action-client-rtic",
    # Phase 169.2 — examples/bridges/native-rust-zenoh-to-dds
