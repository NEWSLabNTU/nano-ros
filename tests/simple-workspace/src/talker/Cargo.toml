[package]
name = "talker"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "talker"
path = "src/main.rs"

[lib]
name = "talker"
path = "src/lib.rs"

[features]
default = ["std"]
std = ["nros-core/std", "nros-serdes/std", "std_msgs/std"]

[dependencies]
# Message bindings (patched to local generated via .cargo/config.toml)
std_msgs = { version = "*", default-features = false }

# nros runtime (patched via .cargo/config.toml)
nros-core = { version = "*", default-features = false }
nros-serdes = { version = "*", default-features = false }
heapless = "0.8"
