# Phase 121.6.zephyr-c smoke — minimal config.

# Required for nros-platform-zephyr-c/src/timer.c (k_timer_*).
CONFIG_TIMESLICING=y

# k_condvar_* (used by platform.c condvar paths) needs POSIX-ish APIs.
# These are part of the kernel base config; no extra flag needed.

# Heap for k_malloc / k_free.
CONFIG_HEAP_MEM_POOL_SIZE=65536

# Stack a bit larger than default for the smoke thread's printk usage.
CONFIG_MAIN_STACK_SIZE=8192

# Console (printk via UART or POSIX stdout on native_sim).
CONFIG_PRINTK=y

# Random source. native_sim provides a host-backed entropy driver
# (CONFIG_FAKE_ENTROPY_NATIVE_POSIX); sys_rand_get pulls from it.
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# native_sim exits via the standard return-from-main path; allow it.
CONFIG_REBOOT=n
