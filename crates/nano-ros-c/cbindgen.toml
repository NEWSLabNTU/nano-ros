# cbindgen configuration for nano-ros-c

language = "C"
header = """
/**
 * nano-ros C API
 *
 * An rclc-compatible C interface for nano-ros, designed for embedded systems.
 * This header is auto-generated by cbindgen - DO NOT EDIT MANUALLY.
 *
 * Copyright 2024 nano-ros contributors
 * Licensed under Apache-2.0
 */
"""
include_guard = "NANO_ROS_H"
pragma_once = false
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true
no_includes = false
cpp_compat = true

[defines]
"feature = std" = "NANO_ROS_STD"
"feature = alloc" = "NANO_ROS_ALLOC"

[export]
# No prefix since our types already have nano_ros_ prefix
prefix = ""
include = []
exclude = []

[fn]
# Function naming - no prefix since functions already have nano_ros_ prefix
prefix = ""
postfix = ""
args = "vertical"
rename_args = "SnakeCase"

[struct]
rename_fields = "SnakeCase"
derive_constructor = false
derive_eq = false
derive_neq = false
derive_lt = false
derive_lte = false
derive_gt = false
derive_gte = false

[enum]
# Don't add type name prefix since our variants already have full names
rename_variants = "None"
prefix_with_name = false
derive_helper_methods = false
derive_const_casts = false
derive_tagged_enum_destructor = false
derive_tagged_enum_copy_constructor = false
cast_assert_name = "assert"

[const]
allow_static_const = true
allow_constexpr = false

[macro_expansion]
bitflags = false

[parse]
parse_deps = false
clean = false
