# Phase 180.A/C — per-Zephyr-line native_sim NSOS overlay (3.7 LTS).
#
# Version-aware overlay mechanism: the only native_sim NSOS setting that
# diverges between Zephyr lines is the native-eth-driver disable
# (CONFIG_ETH_NATIVE_POSIX on 3.7 → CONFIG_ETH_NATIVE_TAP on 4.4; driver
# renamed eth_native_posix → eth_native_tap). Everything else is identical.
# Recipes select this file by NROS_ZEPHYR_VERSION and append it to CONF_FILE,
# so the shared per-example overlays stay line-agnostic.
#
# NSOS = host BSD sockets instead of a TAP device (no bridge / root). The
# native eth driver is disabled so it doesn't try to create a zeth TAP.
CONFIG_ETH_NATIVE_POSIX=n
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y
