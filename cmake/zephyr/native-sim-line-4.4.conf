# Phase 180.A/C — per-Zephyr-line native_sim NSOS overlay (4.4 rolling).
#
# Version-aware overlay mechanism: identical to native-sim-line-3.7.conf
# except the native-eth-driver disable uses the 4.4 symbol name
# (CONFIG_ETH_NATIVE_TAP; the driver was renamed eth_native_posix →
# eth_native_tap between 3.7 and 4.4). Recipes select this file by
# NROS_ZEPHYR_VERSION and append it to CONF_FILE.
#
# NSOS = host BSD sockets instead of a TAP device (no bridge / root). The
# native eth driver is disabled so it doesn't try to create a zeth TAP.
CONFIG_ETH_NATIVE_TAP=n
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y
