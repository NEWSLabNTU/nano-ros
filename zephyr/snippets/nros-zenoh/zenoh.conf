# Phase 180.C — nano-ros zenoh RMW Kconfig (Zephyr 4.x snippet).
#
# RMW-common settings derived from examples/zephyr/c/talker/prj-zenoh.conf.
# Kept in lockstep with that overlay (the canonical zenoh example config).
# NSOS / native_sim line overlay is intentionally NOT included here — it is
# board+line specific (cmake/zephyr/native-sim-line-<v>.conf).

CONFIG_NROS_RMW_ZENOH=y

CONFIG_NET_TCP=y
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=32
CONFIG_MAX_PTHREAD_COND_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
