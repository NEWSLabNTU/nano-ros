# Phase 180.C — nano-ros zenoh RMW snippet (Zephyr 4.x only).
#
# 4.x-native equivalent of the per-example `prj-zenoh.conf` overlay.
# Selecting `-S nros-zenoh` appends zenoh.conf (RMW select + transport +
# POSIX/thread + resource sizing) to the build's Kconfig fragments — the
# same settings the legacy `-DCONF_FILE="...;prj-zenoh.conf"` path supplies.
#
# Additive: the prj-zenoh.conf overlays are NOT removed, and 3.7 (no
# snippet support) keeps using CONF_FILE. This snippet is RMW-only; the
# native_sim NSOS / line overlay (cmake/zephyr/native-sim-line-<v>.conf)
# is board+line specific and stays on the -D / board-overlay path.
name: nros-zenoh
append:
  EXTRA_CONF_FILE: zenoh.conf
