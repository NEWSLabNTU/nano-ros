# Phase 180.C — nano-ros Cyclone DDS RMW Kconfig (Zephyr 4.x snippet).
#
# RMW-common settings derived from examples/zephyr/c/talker/prj-cyclonedds.conf.
# Kept in lockstep with that overlay (the canonical Cyclone example config).
# The NSOS tail of that overlay (NET_DRIVERS / NET_SOCKETS_OFFLOAD /
# NET_NATIVE_OFFLOADED_SOCKETS) is intentionally NOT included here — that is
# native_sim board+line specific and lives in the version-aware NSOS overlay
# (cmake/zephyr/native-sim-line-<v>.conf), applied via the -D / board path.

CONFIG_NROS_RMW_CYCLONEDDS=y
CONFIG_CPP=y

# RTPS uses UDP multicast for SPDP discovery.
CONFIG_NET_IPV4_IGMP=y
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=256
CONFIG_MAX_PTHREAD_COND_COUNT=256
CONFIG_POSIX_THREAD_THREADS_MAX=16

# Resource sizing — Cyclone is heavy.
CONFIG_MAIN_STACK_SIZE=524288
CONFIG_HEAP_MEM_POOL_SIZE=4194304
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

CONFIG_NET_PKT_RX_COUNT=64
CONFIG_NET_PKT_TX_COUNT=64
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128

# Phase 11W.12 — runtime parity with the Rust cyclonedds overlay. The
# universal bool configs (THREAD_LOCAL_STORAGE / THREAD_CUSTOM_DATA /
# DYNAMIC_THREAD(+ALLOC) / THREAD_STACK_INFO / THREAD_MONITOR) come from
# CONFIG_NROS_RMW_CYCLONEDDS in zephyr/Kconfig. The int knobs are
# RMW-local:
#   COMMON_LIBC_MALLOC_ARENA_SIZE — Cyclone's participant init does many
#     small mallocs; the ARCH_POSIX default (16 KiB) trips ddsrt_malloc →
#     CODE_UNREACHABLE in picolibc libc-hooks. 16 MiB gives ample headroom.
#   DYNAMIC_THREAD_STACK_SIZE — per-worker-thread stack.
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=16777216
CONFIG_DYNAMIC_THREAD_STACK_SIZE=32768

# NET_TCP — sockwaitset self-pipe (loopback TCP socket pair). Kept here
# because selecting it from NROS_RMW_CYCLONEDDS forms a Kconfig dependency
# loop through NET_SOCKETS.
CONFIG_NET_TCP=y
# Zephyr's default tcp_work workqueue stack (1024 B) overflows on arm64 —
# corrupted context, wild ERET to __start at EL0, EC 0x18 fatal in tcp_work
# (ASI wall #3, phase-292 W2). Anything enabling NET_TCP must raise it.
CONFIG_NET_TCP_WORKQ_STACK_SIZE=4096

# Diagnostics — verbose asserts + immediate logging keep Cyclone init
# failures legible (picolibc drops fprintf(stderr)).
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
CONFIG_PICOLIBC_ASSERT_VERBOSE=y
CONFIG_LOG_MODE_IMMEDIATE=y

# phase-292 W2 (ASI wall #5) — the recv-thread waitset self-pipe on
# native-IP-stack Zephyr targets is an AF_UNIX socketpair
# (q_sockwaitset.c make_pipe); the TCP-loopback pair is NSOS-only.
CONFIG_NET_SOCKETPAIR=y
