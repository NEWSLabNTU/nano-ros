# Phase 180.C — nano-ros Cyclone DDS RMW snippet (Zephyr 4.x only).
#
# 4.x-native equivalent of the per-example `prj-cyclonedds.conf` overlay.
# Selecting `-S nros-cyclonedds` appends cyclonedds.conf (RMW select + C++ +
# IGMP + POSIX/thread + heavy resource sizing + NET_TCP + verbose asserts)
# to the build's Kconfig fragments — the same settings the legacy
# `-DCONF_FILE="...;prj-cyclonedds.conf"` path supplies.
#
# Additive: the prj-cyclonedds.conf overlays are NOT removed, and 3.7 (no
# snippet support) keeps using CONF_FILE. This snippet is RMW-only; the
# native_sim NSOS / line overlay (cmake/zephyr/native-sim-line-<v>.conf) is
# board+line specific and stays on the -D / board-overlay path.
name: nros-cyclonedds
append:
  EXTRA_CONF_FILE: cyclonedds.conf
