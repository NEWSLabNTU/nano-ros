# Phase 180.C — nano-ros XRCE-DDS RMW Kconfig (Zephyr 4.x snippet).
#
# RMW-common settings derived from examples/zephyr/c/talker/prj-xrce.conf.
# Kept in lockstep with that overlay (the canonical XRCE example config).
# The agent address/port default to the local Micro XRCE-DDS Agent; override
# them per app if your agent lives elsewhere. NSOS / native_sim line overlay
# is intentionally NOT included here — it is board+line specific
# (cmake/zephyr/native-sim-line-<v>.conf).

CONFIG_NROS_RMW_XRCE=y
CONFIG_NROS_XRCE_AGENT_ADDR="127.0.0.1"
CONFIG_NROS_XRCE_AGENT_PORT=2018

CONFIG_NET_TCP=y
# Zephyr's default tcp_work workqueue stack (1024 B) overflows on arm64 —
# corrupted context, wild ERET to __start at EL0, EC 0x18 fatal in tcp_work
# (ASI wall #3, phase-292 W2). Anything enabling NET_TCP must raise it.
CONFIG_NET_TCP_WORKQ_STACK_SIZE=4096

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
