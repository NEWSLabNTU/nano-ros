name: nros

# Phase 215.D.3 follow-up — `west-commands` is NOT a valid key in
# Zephyr 3.7's module.yml schema (the schema validator rejects it at
# `find_package(Zephyr)` time). West extension registration moves to
# the workspace `west.yml` manifest's nano-ros project entry:
#
#     projects:
#       - name: nano-ros
#         path: nano-ros
#         west-commands: scripts/west-commands.yml
#
# Or users can run `west config --global commands.allow_extensions true`
# and pick up `scripts/west-commands.yml` from this checkout via
# `west config manifest.path`. See `scripts/west-commands.yml` +
# `scripts/west_commands/fvp.py`.

build:
  cmake: zephyr
  kconfig: zephyr/Kconfig
  settings:
    # Phase 180.C — module-contributed snippets (Zephyr 4.x only). The
    # snippet_root is interpreted relative to the MODULE ROOT (the dir
    # containing zephyr/module.yml = the repo root), and snippets.py then
    # scans `<snippet_root>/snippets/`. Pointing it at `zephyr` makes
    # Zephyr discover `zephyr/snippets/*/snippet.yml`, so a downstream
    # user can select the nano-ros RMW with `west build -S nros-<rmw>`
    # instead of `-DCONF_FILE="...;prj-<rmw>.conf"`. Additive to the
    # existing CONF_FILE overlay path (which 3.7 — no snippet support —
    # still relies on). `.` would scan `<repo-root>/snippets/`; the
    # snippets live under `zephyr/`, so `zephyr` is the correct root.
    snippet_root: zephyr

# Phase 180.C — module-contributed Twister samples. Each path is relative
# to the MODULE ROOT (the repo root; the `nano-ros` west project) and is
# emitted by `zephyr_module.py::process_twister` as a `-T <module>/<path>`
# argument to Twister. So `west twister` / `scripts/twister` (run from the
# workspace) discovers + builds these nano-ros examples as samples, each
# carrying its own `sample.yaml` (board + RMW snippet). Build-coverage
# only (build_only: true) — the data plane is exercised by the nros-tests
# Zephyr E2E suite, which pairs talker+listener with a zenohd router.
samples:
  - examples/zephyr/c/talker
  - examples/zephyr/c/listener
  - examples/zephyr/cpp/talker
  - examples/zephyr/cpp/listener
  - examples/zephyr/rust/talker
  - examples/zephyr/rust/listener
