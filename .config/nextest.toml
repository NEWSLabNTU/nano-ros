# nextest configuration
# See: https://nexte.st/book/configuration.html

[profile.default]
# Mark tests as slow after 30 seconds, terminate after 60 seconds
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false

[profile.default.junit]
path = "junit.xml"
# Store stdout/stderr for failing tests; skip for passing tests
store-success-output = false
store-failure-output = true

# Per-platform groups for QEMU + bridge-networked tests.
#
# Each platform has a fixed zenohd port in `nros_tests::platform`
# (baremetal=7450, freertos=7451, nuttx=7452, threadx-riscv=7453,
# esp32=7454, threadx-linux=7455, zephyr=7456) so cross-platform
# runs can't collide on the router port. Within a platform the
# zenohd fixture re-uses the same fixed port, so same-platform
# tests must stay serial (one QEMU/native-sim instance + one
# zenohd per test).
#
# `rtos_e2e` is parametrised across all 4 RTOSes in one binary;
# individual `#[rstest]` cases are routed to their platform group
# via `binary(rtos_e2e) and test(Platform__<Name>)` filtersets —
# rstest emits `platform_N_Platform__<Variant>` in each case's test
# name, which nextest's `test(...)` substring predicate matches.
#
# `large_msg` shares port 7450 with the baremetal suite, so it
# belongs in `qemu-baremetal`.
[test-groups.qemu-baremetal]
max-threads = 1

# Phase 89.10 — slirp-isolated QEMU platforms can run the three rtos_e2e
# cases (pubsub/service/action) concurrently because (a) slirp gives each
# QEMU instance a fully isolated 10.0.2.0/24 so guest IPs can't collide
# across concurrent tests, and (b) each case targets a different host
# zenohd port (base + 0/10/20) so the host routers don't collide either.
# `max-threads = 3` caps at the three cases.
[test-groups.qemu-freertos]
max-threads = 3

[test-groups.qemu-nuttx]
max-threads = 3

[test-groups.qemu-threadx-riscv]
max-threads = 3

# ESP32 examples are pubsub-only today (no service/action variants), so the
# per-variant port split doesn't help — keep serial until service/action
# examples land.
[test-groups.qemu-esp32]
max-threads = 1

# Phase 89.9 — ThreadX Linux is native-process + nsos-netx (NSOS offloads
# BSD sockets straight to host kernel, ignoring the legacy `interface`/
# `ip` fields), so per-case port splitting is sufficient for concurrent
# pubsub/service/action runs.
[test-groups.threadx-linux]
max-threads = 3

[test-groups.qemu-zephyr]
max-threads = 1

# Native C / C++ API tests share the same `target/release/libnros_c.a`
# between zenoh and XRCE-DDS variants, so running them concurrently
# causes library overwrites and link-time failures. c_xrce_api lives
# in the same group for the same reason.
[test-groups.native_api]
max-threads = 1

# XRCE-DDS tests: single Agent instance per test.
[test-groups.xrce]
max-threads = 1

# XRCE ↔ ROS 2 DDS interop: needs XRCE Agent + ROS 2 + rmw_fastrtps.
[test-groups.xrce_ros2_interop]
max-threads = 1

# ROS 2 interop tests: ros2 CLI commands with rmw_zenoh_cpp are
# heavyweight (each spawns zenoh sessions for discovery). Running in
# parallel causes resource contention and discovery timeouts.
[test-groups.ros2-interop]
max-threads = 1

# Per-platform bindings for the QEMU / bridge-networked binaries.
# Each override assigns one binary (or one slice of rtos_e2e) to its
# matching platform group. Slow-timeout + retries stay identical to
# the former single `qemu-serial` block.

# QEMU bare-metal (MPS2-AN385) — port 7450. `large_msg` shares this
# port, so it lives in the same group.
[[profile.default.overrides]]
filter = "binary(emulator) or binary(large_msg)"
test-group = "qemu-baremetal"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# FreeRTOS QEMU (MPS2-AN385 + FreeRTOS kernel) — port 7451.
[[profile.default.overrides]]
filter = "binary(freertos_qemu) or (binary(rtos_e2e) and test(Platform__Freertos))"
test-group = "qemu-freertos"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# NuttX QEMU — port 7452.
[[profile.default.overrides]]
filter = "binary(nuttx_qemu) or (binary(rtos_e2e) and test(Platform__Nuttx))"
test-group = "qemu-nuttx"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX QEMU RISC-V — port 7453. Match only the RV64 rtos_e2e
# slice, not `ThreadxLinux`, by using the trailing-underscore-free
# `Platform__ThreadxRiscv64` marker.
[[profile.default.overrides]]
filter = "binary(threadx_riscv64_qemu) or (binary(rtos_e2e) and test(Platform__ThreadxRiscv64))"
test-group = "qemu-threadx-riscv"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ESP32 QEMU (Espressif RISC-V fork) — port 7454.
[[profile.default.overrides]]
filter = "binary(esp32_emulator)"
test-group = "qemu-esp32"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX Linux sim (veth bridge) — port 7455.
[[profile.default.overrides]]
filter = "binary(threadx_linux) or (binary(rtos_e2e) and test(Platform__ThreadxLinux))"
test-group = "threadx-linux"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Zephyr native_sim (NSOS, Phase 81) — port 7456.
[[profile.default.overrides]]
filter = "binary(zephyr)"
test-group = "qemu-zephyr"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(native_api)"
test-group = "native_api"

[[profile.default.overrides]]
filter = "binary(xrce)"
test-group = "xrce"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(c_xrce_api)"
test-group = "native_api"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(xrce_ros2_interop)"
test-group = "xrce_ros2_interop"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(params)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(rmw_interop)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(ros2_lifecycle_interop)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(dds_ros2_interop)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

# Safety E2E tests: 3s stabilization + 30s collection = ~33s expected runtime
[[profile.default.overrides]]
filter = "binary(safety_e2e)"
slow-timeout = { period = "60s", terminate-after = 2 }

# Zero-copy tests: 3s stabilization + 30s collection = ~33s expected runtime
[[profile.default.overrides]]
filter = "binary(zero_copy)"
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# CI profile with stricter timeouts
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = true

# The "fast path" — invoked by `just test` — excludes heavy-dep
# binaries by referencing the test-groups defined above via the
# nextest 0.9.133+ `group(...)` filterset predicate. The filter
# lives in `justfile` because `group(...)` is CLI-only; see
# https://nexte.st/docs/filtersets/reference/ and
# https://github.com/nextest-rs/nextest/pull/3273.
#
# Groups currently excluded from the fast path:
#   * qemu-baremetal       — MPS2-AN385 + large_msg stress
#   * qemu-freertos        — FreeRTOS on MPS2-AN385
#   * qemu-nuttx           — NuttX on MPS2-AN385
#   * qemu-threadx-riscv   — ThreadX on QEMU RV64
#   * qemu-esp32           — ESP32-C3 on Espressif QEMU
#   * threadx-linux        — ThreadX Linux sim + veth bridge
#   * qemu-zephyr          — Zephyr native_sim (NSOS)
#   * ros2-interop         — needs ROS 2 CLI on PATH
#   * xrce_ros2_interop    — needs XRCE Agent + ROS 2
#
# When a new heavy test binary lands, assign it to one of these
# groups via a `[[profile.default.overrides]]` entry — `just test`
# will automatically pick up the exclusion.
