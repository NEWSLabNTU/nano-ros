# nextest configuration
# See: https://nexte.st/book/configuration.html

[profile.default]
# Mark tests as slow after 30 seconds, terminate after 60 seconds
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false

[profile.fail-fast]
# Local diagnosis profile: stop scheduling after the first real failure.
fail-fast = true

[profile.fail-fast.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

[profile.default.junit]
path = "junit.xml"
# Store stdout/stderr for failing tests; skip for passing tests
store-success-output = false
store-failure-output = true

# Per-platform groups for QEMU + bridge-networked tests.
#
# phase-295 W4 — port/domain isolation comes from the ONE allocator
# (`nros_tests::alloc`, RFC-0051 §3): every baked image owns a unique
# (platform × workload × lang) router port / agent port / DDS domain
# (windows: zephyr 7400+, freertos 7800+, nuttx-arm 8200+, nuttx-riscv
# 8600+, threadx-linux 9000+, threadx-riscv64 9400+, esp32 9800+,
# baremetal 10200+). Groups therefore no longer exist to keep shared
# ports apart — each surviving group names the GENUINELY EXCLUSIVE
# resource it guards (an FVP license seat, the ros2 daemon, a
# multi-test shared baked image, or a QEMU host-load throttle).
#
# `rtos_e2e` is parametrised across all 4 RTOSes in one binary;
# individual `#[rstest]` cases are routed to their platform group
# via `binary(rtos_e2e) and test(Platform__<Name>)` filtersets —
# rstest emits `platform_N_Platform__<Variant>` in each case's test
# name, which nextest's `test(...)` substring predicate matches.
#
# Resource: QEMU host-load throttle (each test boots 1–2 MPS2 guests).
# Ports are per-image since W4 (rtic pair 10200, service 10210, action
# 10220; bsp/mixed/large-msg on the 10500/10510/10520 aux slots), so
# the old serial `qemu-baremetal-shared` sub-group is retired.
[test-groups.qemu-baremetal]
max-threads = 3

# issue #141 — RESOURCE: one baked image serves two tests. The qos zephyr
# entry image + its baked router port (allocator 7460) are shared by the
# sink-based capability e2e (entry_e2e::zephyr_rust_qos) and the ros2-echo
# interop e2e; serialize them so the routers never collide.
[test-groups.zephyr-qos-port]
max-threads = 1

# phase-296 W5.5 (final-review finding 1) — issue-#141-style RESOURCE: one
# baked image serves two tests. The ws-realtime-rust Zephyr native_sim entry
# (`build_zephyr_workspace_rust_realtime_entry`) and its baked router port
# (`port_of(ZephyrNativeSim, Rust, RealtimeTiers)`) are shared by
# `realtime_tiers_e2e`'s `zephyr_rust` cell and the new
# `zephyr_edf_deadline_applied` e2e — serialize them so the two router
# starts never collide. W5.8 follow-up: the EDF e2e grew cpp/c cases that
# share the ws-realtime-{cpp,c} images + their baked ports with the
# realtime_tiers_e2e zephyr_cpp/zephyr_c cells, so those join the group too.
[test-groups.zephyr-realtime-rust-port]
max-threads = 1

# phase-296 W5.9 — same RESOURCE pattern for NuttX: the arm cpp realtime
# image + its baked router port are shared by realtime_tiers_e2e's
# nuttx_arm_cpp cell and the sporadic-policy e2e — serialize them.
[test-groups.nuttx-realtime-cpp-port]
max-threads = 1

# phase-296 W5.10 — shared threadx-linux realtime image + baked port:
# serialize the preempt-threshold e2e with the realtime cell.
[test-groups.threadx-realtime-rust-port]
max-threads = 1

# phase-296 W5.11 — shared nuttx-arm RUST realtime image + baked port
# (`port_of(NuttxArm, Rust, RealtimeTiers)`): the core-pin e2e and
# realtime_tiers_e2e's `nuttx_arm_rust` cell start a router on the same port.
[test-groups.nuttx-realtime-rust-port]
max-threads = 1

# phase-296 W5.11 — shared freertos mps2 CPP realtime image + baked port
# (`port_of(FreertosMps2, Cpp, RealtimeTiers)`): the core-pin e2e and
# realtime_tiers_e2e's `freertos_cpp` cell start a router on the same port.
[test-groups.freertos-realtime-cpp-port]
max-threads = 1

# Resource: QEMU host-load throttle (2 MPS2 slirp guests + a zenohd per
# test). Ports are allocator-unique per (variant, lang) since phase-89.13/
# W4, so the per-variant `qemu-freertos-{pubsub,service,action}` sub-groups
# (which only re-stated the outer cap) are retired.
[test-groups.qemu-freertos]
max-threads = 9

# Resource: shared baked images. The per-Entry-pkg boot+connected gates in
# `freertos_run_plan_runtime.rs` consume the SAME `*-entry` images (and
# thus deploy-locator ports 7800/7810/7820) as rtos_e2e's freertos rust
# lanes, plus a QEMU MPS2-AN385 slirp guest each — keep them
# one-at-a-time so their routers never fight a concurrent rtos_e2e lane's.
[test-groups.qemu-freertos-entry]
max-threads = 1

# Resource: QEMU host-load throttle (arm-virt cold boots are heavy). Ports
# are allocator-unique per (variant, lang); the per-variant sub-groups are
# retired (W4).
[test-groups.qemu-nuttx]
max-threads = 9

# Resource: QEMU host-load throttle (riscv64 virt). Allocator-unique ports;
# per-variant sub-groups retired (W4).
[test-groups.qemu-threadx-riscv]
max-threads = 9

# Resource: one baked image pair serves three tests. The esp32 pubsub
# talker/listener images bake ONE allocator port (9800), and the
# esp32↔esp32 e2e + the two esp32↔native interop tests all start a router
# on it — serialize just those three (the boot smoke + the ws-entry e2e
# have their own/no port and run free; the blanket serial `qemu-esp32`
# group is retired — W4).
[test-groups.qemu-esp32-pubsub-port]
max-threads = 1

# Resource: host-load throttle (native-process ThreadX sim + NSOS; no
# QEMU). Allocator-unique ports; per-variant sub-groups retired (W4).
[test-groups.threadx-linux]
max-threads = 9

# Phase 89.Zephyr — Zephyr native_sim uses NSOS (Phase 81) which offloads BSD
# sockets to the host kernel, so per-variant host zenohd ports (base + 0/10/20)
# are sufficient to run pubsub/service/action concurrently. XRCE tests now
# also use per-(variant, lang) Agent ports (`xrce_agent_port_for` —
# 2018/2028/2038 ± 100 per language) so all 7 XRCE tests can run in parallel
# in the `qemu-zephyr-xrce` group.
#
# Phase 89.13 — migrated to per-(variant, lang) host ports
# (`ZEPHYR.lang_stride = 100`): C++ tests get +200 on top of the
# per-variant offset so Rust/C++ same-variant pairs no longer share
# a zenohd port. Unlike `rtos_e2e` (one test per (variant, lang)),
# the `zephyr` binary has MULTIPLE tests per (variant, lang) — they
# still share a single port and must stay serial WITHIN their
# (variant, lang) sub-group. Since nextest assigns one group per test,
# the specific sub-groups provide cross-slot parallelism while the
# generic `qemu-zephyr` group only handles fall-through tests.
#
# Phase 179.I — Zephyr tests no longer configure/build fixtures inside
# the test body. `get_prebuilt_zephyr_example` and the Phase 118
# `build_zephyr_*` helpers only resolve prebuilt images and fail with a
# `just zephyr build-fixtures` remedy if they are missing or stale. Keep
# per-(variant, lang) runtime groups serial because tests in each slot
# share ports, but let the non-DDS fall-through smoke/build/availability
# tests run concurrently again. The old CMake corruption remains a
# `just zephyr build-fixtures` concern, not a nextest runtime concern.
[test-groups.qemu-zephyr]
max-threads = 6

# #166 / phase-286 W1 — no longer serial. The 4 rust pubsub e2e each spin their
# own ephemeral zenohd and pass the locator to the images via
# `-testargs --nros-locator` (native_sim runtime override), so they no longer
# share a fixed baked router port and run in parallel. Capped at 4 to bound host
# load (each test boots native_sim images + a zenohd). `workspace_entry` now
# also reads the override (its ws-runtime `rust_main` prefers
# `nros_runtime_locator_override()` over the bake — phase-286 W1 follow-up), so
# it dials its own ephemeral router and falls through to the general
# `qemu-zephyr` group instead of a private serial one.
[test-groups.qemu-zephyr-pubsub-rust]
max-threads = 4

# #166 / phase-286 W1 slice 2 — parallelized. The 3 cpp pubsub e2e each spin
# their own ephemeral zenohd + pass the locator to the images via
# `-testargs --nros-locator` (ZephyrBoard::run_components reads the override), so
# they no longer share a fixed baked router port.
[test-groups.qemu-zephyr-pubsub-cpp]
max-threads = 3

# #166 / phase-286 W1 slice 4 — parallelized. The service/action e2e each spin
# their own ephemeral zenohd + pass the locator via `-testargs --nros-locator`
# (Rust `zephyr_component_main!` / C++ `ZephyrBoard::run_components` read the
# override), so they no longer share a fixed baked router port.
[test-groups.qemu-zephyr-service-rust]
max-threads = 2

[test-groups.qemu-zephyr-service-cpp]
max-threads = 2

[test-groups.qemu-zephyr-action-rust]
max-threads = 2

[test-groups.qemu-zephyr-action-cpp]
max-threads = 2

# Resource: none (distinct allocator agent ports) — this group is a
# host-load cap. Each XRCE cell starts its Agent on a (variant,
# lang)-specific UDP port (`ZEPHYR.xrce_agent_port_for`, matching the
# west-lane `CONFIG_NROS_XRCE_AGENT_PORT` bake). With distinct
# ports per (variant, lang), the 9 XRCE e2e cells run in parallel; the two
# port-less `xrce_cpp_*_boots` smokes ride along (phase-295 W3.c).
[test-groups.qemu-zephyr-xrce]
max-threads = 9

# Zephyr Cyclone DDS native_sim cells (e2e + boot smokes — phase-295 W3.c
# consolidated the ex-zephyr_cyclonedds_native_sim_e2e tests in here; its
# `zephyr-native-cyclonedds` group is retired). Each fixture BAKES a distinct
# ROS_DOMAIN_ID per communicating role-set: build-fixtures passes
# -DCONFIG_NROS_DOMAIN_ID per (variant, lang) (allocator domains 22..30), so a
# talker+listener / server+client pair shares one domain and unrelated sets
# differ. Cyclone derives its RTPS ports from the domain (7400 + 250*domain),
# so concurrent tests no longer collide on the old domain-0 ports (issue 0161
# history: the phase-180 CONFIG_NROS_CYCLONE_DOMAIN_ID split-brain pinned
# everything back to 0; the knob now defaults to NROS_DOMAIN_ID).
# Parallel-safe; capped at 4 to bound host load (each native_sim Cyclone
# process carries discovery threads). Compile-time (Kconfig) — no runtime
# arg/env (177.37).
[test-groups.qemu-zephyr-dds]
max-threads = 4

# Phase 217.C.2 — FVP runtime smoke. The ARM `FVP_BaseR_AEMv8R` license is
# commonly node-locked + the UART telnet ports the FVP opens collide on
# parallel runs (Zephyr `cmake/emu/armfvp.cmake` passes fixed `-C
# bp.pl011_uart*.out_file=-` redirects). Keep serial.
[test-groups.zephyr-fvp]
max-threads = 1

# XRCE-DDS tests (Phase 183.7): each test starts its OWN Agent (ephemeral UDP
# port via XrceAgent::start_unique, or a per-test tempdir PTY pair via
# XrceSerialAgent) AND now assigns a per-test ROS_DOMAIN_ID so the Agent's DDS
# bridge can't cross-talk with concurrent tests. With transport + DDS domain
# both isolated, the suite runs fully parallel (no max-threads cap). The old
# max-threads=1 ("single Agent per test") was stale — it serialized to avoid a
# cross-talk that tolerant assertions were already hiding.
[test-groups.xrce]
max-threads = 9

# Host-DDS ROS 2 interop — XRCE ↔ ROS 2 *and* CycloneDDS ↔ ROS 2 share ONE
# group. Both suites run real DDS (RTPS) participants on the host's interfaces
# and isolate each test with a per-test ROS_DOMAIN_ID from the shared PID-seeded
# `unique_ros_domain_id()`. With separate per-suite groups the two RMW suites
# run *concurrently with each other*, and two PID-seeded domains can still
# collide modulo the 232-slot DDS domain space — a cross-RMW domain clash (an
# XRCE test and a Cyclone test landing on the same domain → topic/service
# cross-talk → wrong counts). One shared group bounds *total* concurrent
# host-DDS interop to max-threads (the two suites compete for the same slots),
# and the per-suite `retries` below re-roll the PID → domain on the rare
# residual collision. (zenoh ROS 2 interop is unaffected — it isolates via the
# zenoh router + keyexpr on the default domain, disjoint from 1..=232.)
[test-groups.host-dds-ros2-interop]
max-threads = 3

# ROS 2 interop tests: ros2 CLI commands with rmw_zenoh_cpp are
# heavyweight (each spawns zenoh sessions for discovery). Running in
# parallel causes resource contention and discovery timeouts. Some list/info
# helpers are still daemon-sensitive, so keep this group serial until the CLI
# paths are all no-daemon or otherwise process-local.
[test-groups.ros2-interop]
max-threads = 1

# Per-platform bindings for the QEMU / bridge-networked binaries.
# Each override assigns one binary (or one slice of rtos_e2e) to its
# matching platform group. Slow-timeout + retries stay identical to
# the former single `qemu-serial` block.

# QEMU bare-metal (MPS2-AN385). Every image owns an allocator port since
# W4 (rtic 10200/10210/10220; bsp 10500, mixed 10510, large-msg 10520) —
# the former serial `qemu-baremetal-shared` sub-group is retired and the
# platform group is purely the QEMU host-load throttle.
[[profile.default.overrides]]
filter = "binary(emulator) or binary(large_msg)"
test-group = "qemu-baremetal"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# issue #139 follow-up — the lifecycle zephyr e2e polls `ros2 lifecycle` CLIs
# (multi-second python startup per poll); solo it finishes in ~10 s but under
# a parallel suite the CLI contention pushes past the default 60 s ceiling.
# phase-295 W3.b — lifecycle_zephyr_entry_e2e consolidated into the
# binary(entry_e2e) matrix consumer; its cell is `zephyr_rust_lifecycle`.
[[profile.default.overrides]]
filter = "binary(entry_e2e) and test(zephyr_rust_lifecycle)"
slow-timeout = { period = "60s", terminate-after = 3 }

# issue #141 — see [test-groups.zephyr-qos-port]. phase-295 W3.b —
# qos_zephyr_entry_e2e consolidated into binary(entry_e2e); the baked-port
# (17849) sharer is now the `zephyr_rust_qos` cell.
[[profile.default.overrides]]
filter = "(binary(entry_e2e) and test(zephyr_rust_qos)) or binary(qos_zephyr_ros2_interop_e2e)"
test-group = "zephyr-qos-port"
slow-timeout = { period = "60s", terminate-after = 3 }

# Issue #34 — host-integration "compile-shape" tests shell out to cargo / nros
# to build a generated crate or workspace, so a COLD build legitimately exceeds
# the 60s default kill (period 30s × terminate-after 2). Measured: a single
# `orchestration_tiers_native` case passes in ~72s. Under the 60s limit these
# were terminated mid-compile and counted as failures — the bulk of the 31
# failures the now-honest host-integration lane surfaced. Give them headroom
# (120s × 4 = 480s) so a slow compile is not a false failure. These binaries do
# not match any earlier override, so first-match-wins routing reaches this rule.
#
# This is a STOPGAP, not the fix. The durable fix (AGENTS.md "No compilation
# inside tests") is to convert each compile-in-test into a build-stage fixture
# (examples/fixtures.toml) that the test merely asserts exists — see the
# `stm32f4_rtic_main_macro` conversion. As each binary is converted it becomes
# fast and is dropped from this filter (phase216_b already converted + removed);
# the rule shrinks to empty when the last compile-in-test is gone.
[[profile.default.overrides]]
# NOTE: as each compile-in-test binary is CONVERTED to consume a build-stage
# fixture (issue 0034 — it becomes a fast artifact check, no in-test cargo), it
# is removed from this list; it no longer needs the headroom AND nextest errors
# on a `binary()` that matches nothing. Converted so far: phase216_b →
# stm32f4_rtic_main_macro, phase212_n_entry_poc_runs → native_entry_boot.
filter = """
  binary(native_orchestration_misuse) \
  or binary(native_main_macro_misuse) \
"""
slow-timeout = { period = "120s", terminate-after = 4 }

# Phase 169.4 — bare-metal Rust DDS E2E binary removed.
# W4 — the 12 per-variant rtos_e2e serialization overrides (Phase 89.12's
# same-variant shared-port workaround) are retired: every (variant, lang)
# image owns an allocator port, so the generic per-platform host-load
# groups below are the only routing rtos_e2e needs.

# Per-Entry-pkg boot+connected gates: serialize (see the
# qemu-freertos-entry group comment — shared images with rtos_e2e's rust
# lanes + QEMU slirp) and give cold QEMU-boot + connect headroom.
[[profile.default.overrides]]
filter = "binary(freertos_run_plan_runtime)"
test-group = "qemu-freertos-entry"
slow-timeout = { period = "180s", terminate-after = 4 }
retries = 1

# FreeRTOS QEMU (MPS2-AN385 + FreeRTOS kernel) — allocator window 7800+.
[[profile.default.overrides]]
filter = "binary(freertos_qemu) or (binary(rtos_e2e) and test(Platform__Freertos))"
test-group = "qemu-freertos"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# NuttX QEMU — allocator window 8200+. Includes the entry-image e2e cells (issues
# #130/0152; phase-295 W3.b folded rust_nuttx_entry_e2e / c_nuttx_entry_e2e
# into binary(entry_e2e)'s `nuttx_arm_*` cases): they boot a NuttX arm-virt
# guest that dials the SAME allocator slirp port as this group (the rust
# cell reuses rtos_e2e's talker image/port 8200) —
# they must serialize with it, and the default 60 s kill is shorter than a
# NuttX QEMU cold boot + zenoh discovery.
# phase-285 W6 — the rv-virt realtime-tiers e2e cells boot a riscv32 NuttX
# guest under -icount; cold boot + zenoh discovery + the 5-sample slow-tier
# anchor exceed the default 60 s kill. Each cell has its own slirp port
# (allocator 8691/8791/8891, derived in the realtime_tiers_e2e cell table
# via `alloc::port_of`), so no group serialization needed against the
# arm-nuttx groups. The #199-follow-up C talker e2e (c_riscv_nuttx_e2e,
# allocator port 8700) has the same boot profile.
# phase-295 W3.b — the 15 per-cell realtime_tiers_* binaries consolidated
# into binary(realtime_tiers_e2e); the riscv cells are selected by their
# `nuttx_riscv_*` case names.
[[profile.default.overrides]]
filter = "binary(c_riscv_nuttx_e2e) | (binary(realtime_tiers_e2e) & test(nuttx_riscv))"
slow-timeout = { period = "150s", terminate-after = 2 }
retries = 1

# phase-296 W5.5 (final-review finding 1) — see
# [test-groups.zephyr-realtime-rust-port]. Same slow-timeout/retries as the
# other Zephyr native_sim (NSOS) QEMU-class lanes below (cold boot + zenoh
# discovery flakes under host load).
[[profile.default.overrides]]
filter = "binary(zephyr_edf_deadline_applied) or binary(zephyr_core_pin_applied) or (binary(realtime_tiers_e2e) and (test(zephyr_rust) or test(zephyr_cpp) or test(zephyr_c)))"
test-group = "zephyr-realtime-rust-port"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# phase-296 W5.9 — serialize the shared nuttx cpp realtime image/port; QEMU
# lane timeout/retries mirror the nuttx cells' own budget.
[[profile.default.overrides]]
filter = "binary(nuttx_sporadic_budget_applied) or (binary(realtime_tiers_e2e) and test(nuttx_arm_cpp))"
test-group = "nuttx-realtime-cpp-port"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# phase-296 W5.10 — see [test-groups.threadx-realtime-rust-port].
[[profile.default.overrides]]
filter = "binary(threadx_preempt_threshold_applied) or (binary(realtime_tiers_e2e) and test(threadx_linux_rust))"
test-group = "threadx-realtime-rust-port"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# phase-296 W5.11 — serialize the nuttx-arm RUST core-pin e2e with the shared
# realtime image/port; QEMU lane timeout/retries mirror the nuttx cells.
[[profile.default.overrides]]
filter = "binary(nuttx_core_pin_applied) or (binary(realtime_tiers_e2e) and test(nuttx_arm_rust))"
test-group = "nuttx-realtime-rust-port"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# phase-296 W5.11 — serialize the freertos CPP core-pin e2e with the shared
# realtime image/port; same QEMU throttle as the other freertos lanes.
[[profile.default.overrides]]
filter = "binary(freertos_core_pin_applied) or (binary(realtime_tiers_e2e) and test(freertos_cpp))"
test-group = "freertos-realtime-cpp-port"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(nuttx_qemu) or (binary(entry_e2e) and test(nuttx_arm)) or (binary(rtos_e2e) and test(Platform__Nuttx))"
test-group = "qemu-nuttx"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX QEMU RISC-V — allocator window 9400+. Match only the RV64 rtos_e2e
# slice, not `ThreadxLinux`, by using the trailing-underscore-free
# `Platform__ThreadxRiscv64` marker.
[[profile.default.overrides]]
filter = "binary(threadx_riscv64_qemu) or (binary(rtos_e2e) and test(Platform__ThreadxRiscv64))"
test-group = "qemu-threadx-riscv"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ESP32 QEMU (Espressif RISC-V fork) — allocator window 9800+. The three
# tests that dial the shared pubsub-pair image port (9800) serialize in
# qemu-esp32-pubsub-port; everything else (boot smoke, ws-entry e2e on its
# own 9830 bake, detection probes) runs with the default scheduler.
[[profile.default.overrides]]
filter = "binary(esp32_emulator) and (test(test_esp32_talker_listener_e2e) or test(test_esp32_to_native) or test(test_native_to_esp32))"
test-group = "qemu-esp32-pubsub-port"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(esp32_emulator)"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX Linux sim (veth bridge) — allocator window 9000+. The
# realtime_tiers_e2e threadx_linux_rust case (phase-297 W5) rides the same
# host-load throttle.
[[profile.default.overrides]]
filter = "binary(threadx_linux) or (binary(rtos_e2e) and test(Platform__ThreadxLinux)) or (binary(realtime_tiers_e2e) and test(threadx_linux))"
test-group = "threadx-linux"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Zephyr native_sim (NSOS, Phase 81) — allocator window 7400+, lang_stride = 100.
#
# phase-295 W3.c — zephyr.rs is now the parametrized example matrix consumer:
# the (rmw × lang × workload) cells are rstest cases named
# `example_e2e::…_<rmw>_<lang>_<workload>_e2e` plus `boot_smoke::…_boots`
# smokes; the bespoke cross-platform tests keep their historical names. The
# filters below key on those case-name fragments (nextest matches substrings
# of the full test id).
#
# XRCE cells start their Agent on a per-(variant, lang) baked UDP port
# (`xrce_agent_port_for` — 2400/2410/2420 ± 100 per language), so the 9 e2e
# cells run in parallel; the two `xrce_cpp_*_boots` smokes need no port.
# This override comes BEFORE the generic `binary(zephyr)` rule so nextest's
# first-match-wins routing assigns them to `qemu-zephyr-xrce`.
[[profile.default.overrides]]
filter = "binary(zephyr) and test(xrce)"
test-group = "qemu-zephyr-xrce"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Zephyr Cyclone DDS native_sim cells (e2e + boot smokes; consolidated from
# the retired zephyr_cyclonedds_native_sim_e2e binary in phase-295 W3.c).
# `test(dds)` matches the `cyclonedds_*` case names. Fixtures bake a distinct
# ROS_DOMAIN_ID per (lang, variant) role-set (50..58) so pairs never collide
# on RTPS ports; the group caps host load, not ports.
[[profile.default.overrides]]
filter = "binary(zephyr) and test(dds)"
