# nextest configuration
# See: https://nexte.st/book/configuration.html

[profile.default]
# Mark tests as slow after 30 seconds, terminate after 60 seconds
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false

[profile.default.junit]
path = "junit.xml"
# Store stdout/stderr for failing tests; skip for passing tests
store-success-output = false
store-failure-output = true

# All tests using the TAP bridge (qemu-br + tap-qemu0/tap-qemu1) or zenohd
# on port 7447 must be serialized. Firmware hardcodes the zenohd port, and
# TAP devices can only be used by one QEMU instance at a time.
# Includes: zephyr (port 7447), freertos, threadx-linux, threadx-riscv64,
# nuttx, esp32 (port 7448 but shares TAP devices).
[test-groups.qemu-network]
max-threads = 1

# ARM QEMU tests: shares TAP bridge + zenohd port 7447 with FreeRTOS/NuttX/ThreadX.
# Previously a separate group for target directory serialization, but RTIC E2E tests
# now use the same network infrastructure and must not run concurrently.
# Merged into qemu-network below.

[test-groups.c_api]
max-threads = 1

[test-groups.cpp_api]
max-threads = 1

# XRCE-DDS tests: single Agent instance per test
[test-groups.xrce]
max-threads = 1

# Note: C XRCE tests use the c_api group (not a separate group) because both
# zenoh and XRCE C tests write to the same target/release/libnros_c.a — running
# them concurrently causes library overwrites and link-time failures.

[[profile.default.overrides]]
filter = "binary(esp32_emulator)"
test-group = "qemu-network"
slow-timeout = { period = "120s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(zephyr)"
test-group = "qemu-network"
slow-timeout = { period = "120s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(emulator) and not binary(esp32_emulator)"
test-group = "qemu-network"
slow-timeout = { period = "120s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(c_api)"
test-group = "c_api"

[[profile.default.overrides]]
filter = "binary(xrce)"
test-group = "xrce"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(cpp_api)"
test-group = "cpp_api"

[[profile.default.overrides]]
filter = "binary(c_xrce_api)"
test-group = "c_api"
slow-timeout = { period = "60s", terminate-after = 3 }

# XRCE ↔ ROS 2 DDS interop: needs XRCE Agent + ROS 2 + rmw_fastrtps
[test-groups.xrce_ros2_interop]
max-threads = 1

[[profile.default.overrides]]
filter = "binary(xrce_ros2_interop)"
test-group = "xrce_ros2_interop"
slow-timeout = { period = "60s", terminate-after = 3 }

# ROS 2 interop tests: ros2 CLI commands with rmw_zenoh_cpp are heavyweight
# (each spawns zenoh sessions for discovery). Running in parallel causes
# resource contention and discovery timeouts.
[test-groups.ros2-interop]
max-threads = 1

[[profile.default.overrides]]
filter = "binary(params)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(rmw_interop)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

# Safety E2E tests: 3s stabilization + 30s collection = ~33s expected runtime
[[profile.default.overrides]]
filter = "binary(safety_e2e)"
slow-timeout = { period = "60s", terminate-after = 2 }

# Large message & throughput stress tests: sequential (shared zenohd/agent ports)
[test-groups.large_msg]
max-threads = 1

[[profile.default.overrides]]
filter = "binary(large_msg)"
test-group = "large_msg"
slow-timeout = { period = "60s", terminate-after = 3 }

# Zero-copy tests: 3s stabilization + 30s collection = ~33s expected runtime
[[profile.default.overrides]]
filter = "binary(zero_copy)"
slow-timeout = { period = "60s", terminate-after = 2 }

# NuttX QEMU tests: nightly build + QEMU ARM virt
[[profile.default.overrides]]
filter = "binary(nuttx_qemu)"
test-group = "qemu-network"
slow-timeout = { period = "120s", terminate-after = 3 }

# FreeRTOS QEMU tests: shared TAP bridge + port 7447
[[profile.default.overrides]]
filter = "binary(freertos_qemu)"
test-group = "qemu-network"
slow-timeout = { period = "120s", terminate-after = 3 }

# ThreadX Linux tests: shared TAP bridge + port 7447
[[profile.default.overrides]]
filter = "binary(threadx_linux)"
test-group = "qemu-network"
slow-timeout = { period = "120s", terminate-after = 3 }

# ThreadX QEMU RISC-V tests: shared TAP bridge + port 7447
[[profile.default.overrides]]
filter = "binary(threadx_riscv64_qemu)"
test-group = "qemu-network"
slow-timeout = { period = "120s", terminate-after = 3 }

[profile.ci]
# CI profile with stricter timeouts
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = true
