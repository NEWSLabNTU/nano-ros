test-group = "qemu-zephyr"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# phase-298 W3.2 (issue 0232) — the FVP runtime gate over the
# ws-realtime-cpp-fvp workspace Entry (replaces the retired 217.C.2/D.3
