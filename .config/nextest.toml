# nextest configuration
# See: https://nexte.st/book/configuration.html

[profile.default]
# Mark tests as slow after 30 seconds, terminate after 60 seconds
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false

[profile.default.junit]
path = "junit.xml"
# Store stdout/stderr for failing tests; skip for passing tests
store-success-output = false
store-failure-output = true

# Per-platform groups for QEMU + bridge-networked tests.
#
# Each platform has a fixed zenohd port in `nros_tests::platform`
# (baremetal=7450, freertos=7451, nuttx=7452, threadx-riscv=7453,
# esp32=7454, threadx-linux=7455, zephyr=7456) so cross-platform
# runs can't collide on the router port. Within a platform the
# zenohd fixture re-uses the same fixed port, so same-platform
# tests must stay serial (one QEMU/native-sim instance + one
# zenohd per test).
#
# `rtos_e2e` is parametrised across all 4 RTOSes in one binary;
# individual `#[rstest]` cases are routed to their platform group
# via `binary(rtos_e2e) and test(Platform__<Name>)` filtersets —
# rstest emits `platform_N_Platform__<Variant>` in each case's test
# name, which nextest's `test(...)` substring predicate matches.
#
# Phase 89.Baremetal — service/action use per-variant host ports
# (`BAREMETAL.zenohd_port + 10/20`), so they can run concurrently
# with pubsub. The basic pubsub e2e, the mixed-priority pubsub
# e2e, and the `large_msg` binary all keep port 7450 and share
# the serial `qemu-baremetal-shared` sub-group. Overall cap = 3
# (service || action || one-of-the-three-port-7450 tests).
[test-groups.qemu-baremetal]
max-threads = 3

[test-groups.qemu-baremetal-shared]
max-threads = 1

# Phase 89.10 — slirp-isolated QEMU platforms can run the three rtos_e2e
# cases (pubsub/service/action) concurrently because (a) slirp gives each
# QEMU instance a fully isolated 10.0.2.0/24 so guest IPs can't collide
# across concurrent tests, and (b) each case targets a different host
# zenohd port (base + 0/10/20) so the host routers don't collide either.
# `max-threads = 3` caps at the three cases.
#
# Phase 89.12 #15-17 — same-variant-different-language tests (e.g., pubsub
# Rust/C/C++) used to share the SAME host zenohd port (keyed off variant
# only), forcing max-threads=1 within a variant via dedicated sub-groups.
#
# Phase 89.13 — FreeRTOS migrated to per-(variant, lang) host ports
# (`PlatformConfig::lang_stride = 100`). C gets Rust+100, C++ gets
# Rust+200, so no two same-variant tests share a port. Lifting
# `qemu-freertos-{pubsub,service,action}` to `max-threads = 3` enables
# true 9-way parallelism (3 variants × 3 languages). Other RTOS variants
# remain on `lang_stride = 0` and keep their per-variant max-threads=1
# until migrated.
[test-groups.qemu-freertos]
max-threads = 9

[test-groups.qemu-freertos-pubsub]
max-threads = 3

[test-groups.qemu-freertos-service]
max-threads = 3

[test-groups.qemu-freertos-action]
max-threads = 3

# Phase 89.13 — NuttX / ThreadX-RISC-V migrated to per-(variant, lang) host
# ports (`lang_stride = 100`). Each (variant, lang) pair now owns a unique
# zenohd port, so same-variant Rust/C/C++ tests no longer need serialization.
# Outer cap of 9 = 3 variants × 3 languages.
[test-groups.qemu-nuttx]
max-threads = 9

[test-groups.qemu-nuttx-pubsub]
max-threads = 3

[test-groups.qemu-nuttx-service]
max-threads = 3

[test-groups.qemu-nuttx-action]
max-threads = 3

[test-groups.qemu-threadx-riscv]
max-threads = 9

[test-groups.qemu-threadx-riscv-pubsub]
max-threads = 3

[test-groups.qemu-threadx-riscv-service]
max-threads = 3

[test-groups.qemu-threadx-riscv-action]
max-threads = 3

# ESP32 examples are pubsub-only today (no service/action variants), so the
# per-variant port split doesn't help — keep serial until service/action
# examples land.
[test-groups.qemu-esp32]
max-threads = 1

# Phase 89.9 — ThreadX Linux is native-process + nsos-netx (NSOS offloads
# BSD sockets straight to host kernel, ignoring the legacy `interface`/
# `ip` fields), so per-case port splitting is sufficient for concurrent
# pubsub/service/action runs.
#
# Phase 89.13 — migrated to per-(variant, lang) ports (`lang_stride = 100`).
# NSOS ignores the veth interface, so language-level parallelism is safe.
[test-groups.threadx-linux]
max-threads = 9

[test-groups.threadx-linux-pubsub]
max-threads = 3

[test-groups.threadx-linux-service]
max-threads = 3

[test-groups.threadx-linux-action]
max-threads = 3

# Phase 89.Zephyr — Zephyr native_sim uses NSOS (Phase 81) which offloads BSD
# sockets to the host kernel, so per-variant host zenohd ports (base + 0/10/20)
# are sufficient to run pubsub/service/action concurrently. XRCE tests share
# a hardcoded Agent port (2018, baked into firmware via Kconfig) and must
# stay serial — they live in `qemu-zephyr-xrce`.
#
# Phase 89.13 — migrated to per-(variant, lang) host ports
# (`ZEPHYR.lang_stride = 100`): C++ tests get +200 on top of the
# per-variant offset so Rust/C++ same-variant pairs no longer share
# a zenohd port. Unlike `rtos_e2e` (one test per (variant, lang)),
# the `zephyr` binary has MULTIPLE tests per (variant, lang) — they
# still share a single port and must stay serial WITHIN their
# (variant, lang) sub-group. The six sub-groups × max=1 × outer
# max=6 give us full cross-slot parallelism while keeping within-slot
# serialization. Overall cap = 6 (3 variants × 2 langs).
[test-groups.qemu-zephyr]
max-threads = 6

[test-groups.qemu-zephyr-pubsub-rust]
max-threads = 1

[test-groups.qemu-zephyr-pubsub-cpp]
max-threads = 1

[test-groups.qemu-zephyr-service-rust]
max-threads = 1

[test-groups.qemu-zephyr-service-cpp]
max-threads = 1

[test-groups.qemu-zephyr-action-rust]
max-threads = 1

[test-groups.qemu-zephyr-action-cpp]
max-threads = 1

[test-groups.qemu-zephyr-xrce]
max-threads = 1

# Native C / C++ API tests share the same `target/release/libnros_c.a`
# between zenoh and XRCE-DDS variants, so running them concurrently
# causes library overwrites and link-time failures. c_xrce_api lives
# in the same group for the same reason.
[test-groups.native_api]
max-threads = 1

# XRCE-DDS tests: single Agent instance per test.
[test-groups.xrce]
max-threads = 1

# XRCE ↔ ROS 2 DDS interop: needs XRCE Agent + ROS 2 + rmw_fastrtps.
[test-groups.xrce_ros2_interop]
max-threads = 1

# ROS 2 interop tests: ros2 CLI commands with rmw_zenoh_cpp are
# heavyweight (each spawns zenoh sessions for discovery). Running in
# parallel causes resource contention and discovery timeouts.
[test-groups.ros2-interop]
max-threads = 1

# Per-platform bindings for the QEMU / bridge-networked binaries.
# Each override assigns one binary (or one slice of rtos_e2e) to its
# matching platform group. Slow-timeout + retries stay identical to
# the former single `qemu-serial` block.

# QEMU bare-metal (MPS2-AN385).
#
# Port-7450 sharers: basic pubsub e2e, mixed-priority pubsub e2e, and
# the `large_msg` binary all keep the base port. This override comes
# BEFORE the generic `binary(emulator) or binary(large_msg)` rule so
# nextest's first-match-wins routing assigns them to the serial
# `qemu-baremetal-shared` group. Service/action use offset ports
# (7460/7470) and stay in the parallel `qemu-baremetal` group.
[[profile.default.overrides]]
filter = "(binary(emulator) and (test(rtic_pubsub_e2e) or test(mixed_priority_pubsub_e2e))) or binary(large_msg)"
test-group = "qemu-baremetal-shared"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(emulator) or binary(large_msg)"
test-group = "qemu-baremetal"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Phase 89.12 #15-17 — Per-variant serialization for rtos_e2e. These overrides
# MUST come before the generic per-platform rules so nextest's first-match-wins
# routing picks them up first. The three pubsub/service/action language cases
# share a zenohd port (keyed off variant only), so same-variant tests cannot run
# concurrently without `ZenohRouter::start_on` killing each other's router.

# FreeRTOS per-variant — must come before qemu-freertos.
[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_pubsub_e2e::platform_1_Platform__Freertos)"
test-group = "qemu-freertos-pubsub"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_service_e2e::platform_1_Platform__Freertos)"
test-group = "qemu-freertos-service"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_action_e2e::platform_1_Platform__Freertos)"
test-group = "qemu-freertos-action"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# NuttX per-variant — must come before qemu-nuttx.
[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_pubsub_e2e::platform_2_Platform__Nuttx)"
test-group = "qemu-nuttx-pubsub"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_service_e2e::platform_2_Platform__Nuttx)"
test-group = "qemu-nuttx-service"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_action_e2e::platform_2_Platform__Nuttx)"
test-group = "qemu-nuttx-action"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX-RISC-V per-variant — must come before qemu-threadx-riscv.
[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_pubsub_e2e::platform_4_Platform__ThreadxRiscv64)"
test-group = "qemu-threadx-riscv-pubsub"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_service_e2e::platform_4_Platform__ThreadxRiscv64)"
test-group = "qemu-threadx-riscv-service"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_action_e2e::platform_4_Platform__ThreadxRiscv64)"
test-group = "qemu-threadx-riscv-action"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX-Linux per-variant — must come before threadx-linux.
[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_pubsub_e2e::platform_3_Platform__ThreadxLinux)"
test-group = "threadx-linux-pubsub"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_service_e2e::platform_3_Platform__ThreadxLinux)"
test-group = "threadx-linux-service"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_action_e2e::platform_3_Platform__ThreadxLinux)"
test-group = "threadx-linux-action"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# FreeRTOS QEMU (MPS2-AN385 + FreeRTOS kernel) — port 7451.
[[profile.default.overrides]]
filter = "binary(freertos_qemu) or (binary(rtos_e2e) and test(Platform__Freertos))"
test-group = "qemu-freertos"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# NuttX QEMU — port 7452.
[[profile.default.overrides]]
filter = "binary(nuttx_qemu) or (binary(rtos_e2e) and test(Platform__Nuttx))"
test-group = "qemu-nuttx"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX QEMU RISC-V — port 7453. Match only the RV64 rtos_e2e
# slice, not `ThreadxLinux`, by using the trailing-underscore-free
# `Platform__ThreadxRiscv64` marker.
[[profile.default.overrides]]
filter = "binary(threadx_riscv64_qemu) or (binary(rtos_e2e) and test(Platform__ThreadxRiscv64))"
test-group = "qemu-threadx-riscv"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ESP32 QEMU (Espressif RISC-V fork) — port 7454.
[[profile.default.overrides]]
filter = "binary(esp32_emulator)"
test-group = "qemu-esp32"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX Linux sim (veth bridge) — port 7455.
[[profile.default.overrides]]
filter = "binary(threadx_linux) or (binary(rtos_e2e) and test(Platform__ThreadxLinux))"
test-group = "threadx-linux"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Zephyr native_sim (NSOS, Phase 81) — base port 7456, lang_stride = 100.
#
# XRCE tests within the zephyr binary share a hardcoded Agent port (2018,
# baked into firmware via Kconfig), so they must stay serial. This override
# comes BEFORE the generic `binary(zephyr)` rule so nextest's first-match-wins
# routing assigns them to `qemu-zephyr-xrce` instead of the parallel group.
[[profile.default.overrides]]
filter = "binary(zephyr) and test(xrce)"
test-group = "qemu-zephyr-xrce"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Phase 89.13 — Zephyr per-(variant, lang) sub-groups. Ordered most-specific
# first so nextest's first-match-wins picks the right slot. C++ E2E tests
# must match BEFORE the Rust patterns (the `cpp` substring bucket catches
# them), and variant-specific matches must precede the pubsub fall-through.
[[profile.default.overrides]]
filter = "binary(zephyr) and test(cpp_service_server_to_client)"
test-group = "qemu-zephyr-service-cpp"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and test(cpp_action_server_to_client)"
test-group = "qemu-zephyr-action-cpp"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and (test(cpp_talker_to_listener_e2e) or test(cpp_talker_to_native_listener) or test(native_talker_to_zephyr_cpp_listener))"
test-group = "qemu-zephyr-pubsub-cpp"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and (test(native_server_zephyr_client) or test(zephyr_server_native_client))"
test-group = "qemu-zephyr-service-rust"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and test(zephyr_action_e2e)"
test-group = "qemu-zephyr-action-rust"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and (test(zephyr_talker_to_listener_e2e) or test(zephyr_to_native_e2e) or test(native_to_zephyr_e2e) or test(bidirectional_native_zephyr_e2e))"
test-group = "qemu-zephyr-pubsub-rust"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Fall-through: smoke tests, build tests, availability_checks share the
# outer `qemu-zephyr` cap. None of these allocate a zenohd router, so
# they only contribute to CPU load.
[[profile.default.overrides]]
filter = "binary(zephyr)"
test-group = "qemu-zephyr"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(native_api)"
test-group = "native_api"

[[profile.default.overrides]]
filter = "binary(xrce)"
test-group = "xrce"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(c_xrce_api)"
test-group = "native_api"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(xrce_ros2_interop)"
test-group = "xrce_ros2_interop"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(params)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(rmw_interop)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(ros2_lifecycle_interop)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(dds_ros2_interop)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

# Safety E2E tests: 3s stabilization + 30s collection = ~33s expected runtime
[[profile.default.overrides]]
filter = "binary(safety_e2e)"
slow-timeout = { period = "60s", terminate-after = 2 }

# Zero-copy tests: 3s stabilization + 30s collection = ~33s expected runtime
[[profile.default.overrides]]
filter = "binary(zero_copy)"
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# CI profile with stricter timeouts
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = true

# The "fast path" — invoked by `just test` — excludes heavy-dep
# binaries by referencing the test-groups defined above via the
# nextest 0.9.133+ `group(...)` filterset predicate. The filter
# lives in `justfile` because `group(...)` is CLI-only; see
# https://nexte.st/docs/filtersets/reference/ and
# https://github.com/nextest-rs/nextest/pull/3273.
#
# Groups currently excluded from the fast path:
#   * qemu-baremetal       — MPS2-AN385, service/action variants
#   * qemu-baremetal-shared — MPS2-AN385 port-7450 sharers (basic pubsub, mixed-priority pubsub, large_msg)
#   * qemu-freertos        — FreeRTOS on MPS2-AN385
#   * qemu-nuttx           — NuttX on MPS2-AN385
#   * qemu-threadx-riscv   — ThreadX on QEMU RV64
#   * qemu-esp32           — ESP32-C3 on Espressif QEMU
#   * threadx-linux        — ThreadX Linux sim + veth bridge
#   * qemu-zephyr          — Zephyr native_sim (NSOS), zenoh variants
#   * qemu-zephyr-xrce     — Zephyr native_sim, XRCE variant (shared Agent port)
#   * ros2-interop         — needs ROS 2 CLI on PATH
#   * xrce_ros2_interop    — needs XRCE Agent + ROS 2
#
# When a new heavy test binary lands, assign it to one of these
# groups via a `[[profile.default.overrides]]` entry — `just test`
# will automatically pick up the exclusion.
