# nextest configuration
# See: https://nexte.st/book/configuration.html

[profile.default]
# Mark tests as slow after 30 seconds, terminate after 60 seconds
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false

[profile.default.junit]
path = "junit.xml"
# Store stdout/stderr for failing tests; skip for passing tests
store-success-output = false
store-failure-output = true

# QEMU + bridge-networked tests: serialize across all platforms. Host
# resource pressure (one QEMU instance per test plus a zenohd router)
# is the remaining reason for serialising — the per-platform zenohd-port
# table (`nros_tests::platform`) already prevents port collisions, so
# the 7 former per-platform groups (qemu-baremetal / qemu-freertos /
# qemu-nuttx / qemu-threadx-riscv / qemu-esp32 / qemu-zephyr /
# threadx-linux) have been collapsed into this single group.
# Ports: baremetal=7450, freertos=7451, nuttx=7452, threadx-riscv=7453,
# esp32=7454, threadx-linux=7455, zephyr=7456.
[test-groups.qemu-serial]
max-threads = 1

# Native C / C++ API tests share the same `target/release/libnros_c.a`
# between zenoh and XRCE-DDS variants, so running them concurrently
# causes library overwrites and link-time failures. c_xrce_api lives
# in the same group for the same reason.
[test-groups.native_api]
max-threads = 1

# XRCE-DDS tests: single Agent instance per test.
[test-groups.xrce]
max-threads = 1

# XRCE ↔ ROS 2 DDS interop: needs XRCE Agent + ROS 2 + rmw_fastrtps.
[test-groups.xrce_ros2_interop]
max-threads = 1

# ROS 2 interop tests: ros2 CLI commands with rmw_zenoh_cpp are
# heavyweight (each spawns zenoh sessions for discovery). Running in
# parallel causes resource contention and discovery timeouts.
[test-groups.ros2-interop]
max-threads = 1

# Large message & throughput stress tests: sequential (shared
# zenohd/agent ports).
[test-groups.large_msg]
max-threads = 1

# QEMU + bridge-networked binaries.
[[profile.default.overrides]]
filter = "binary(emulator) or binary(esp32_emulator) or binary(zephyr) or binary(freertos_qemu) or binary(nuttx_qemu) or binary(threadx_riscv64_qemu) or binary(threadx_linux) or binary(rtos_e2e)"
test-group = "qemu-serial"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(native_api)"
test-group = "native_api"

[[profile.default.overrides]]
filter = "binary(xrce)"
test-group = "xrce"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(c_xrce_api)"
test-group = "native_api"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(xrce_ros2_interop)"
test-group = "xrce_ros2_interop"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "binary(params)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(rmw_interop)"
test-group = "ros2-interop"
slow-timeout = { period = "60s", terminate-after = 2 }

# Safety E2E tests: 3s stabilization + 30s collection = ~33s expected runtime
[[profile.default.overrides]]
filter = "binary(safety_e2e)"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "binary(large_msg)"
test-group = "large_msg"
slow-timeout = { period = "60s", terminate-after = 3 }

# Zero-copy tests: 3s stabilization + 30s collection = ~33s expected runtime
[[profile.default.overrides]]
filter = "binary(zero_copy)"
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# CI profile with stricter timeouts
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = true

# `fast` profile — skips external-dependency-heavy binaries.
#
# `just test` uses this profile so the fast path stays fast even as
# new heavy test binaries land. Binaries are excluded when they
# require one of:
#   * QEMU / bridge-networked simulation (qemu-serial group)
#   * A ROS 2 CLI or DDS implementation on PATH
#   * An XRCE-DDS Agent spawned as a sibling process
#   * Large-message stress payloads that serialise zenohd
#
# When a new heavy test binary lands, add it to this filter AND to
# the relevant group override above — the two lists should stay in
# sync. (A future change could derive one from the other; today the
# duplication is the cost of the nextest filter DSL not supporting
# a `test_group(...)` predicate.)
[profile.fast]
default-filter = """
not (binary(emulator) or binary(esp32_emulator) or binary(zephyr)
  or binary(freertos_qemu) or binary(nuttx_qemu)
  or binary(threadx_riscv64_qemu) or binary(threadx_linux)
  or binary(rtos_e2e)
  or binary(rmw_interop) or binary(params)
  or binary(xrce_ros2_interop) or binary(dds_ros2_interop)
  or binary(large_msg))
"""
