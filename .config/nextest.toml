# nextest configuration
# See: https://nexte.st/book/configuration.html

[profile.default]
# Mark tests as slow after 30 seconds, terminate after 60 seconds
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false

[profile.fail-fast]
# Local diagnosis profile: stop scheduling after the first real failure.
fail-fast = true

[profile.fail-fast.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

[profile.default.junit]
path = "junit.xml"
# Store stdout/stderr for failing tests; skip for passing tests
store-success-output = false
store-failure-output = true

# Per-platform groups for QEMU + bridge-networked tests.
#
# Each platform has a fixed zenohd port in `nros_tests::platform`
# (baremetal=7450, freertos=7451, nuttx=7452, threadx-riscv=7453,
# esp32=7454, threadx-linux=7455, zephyr=7456) so cross-platform
# runs can't collide on the router port. Within a platform the
# zenohd fixture re-uses the same fixed port, so same-platform
# tests must stay serial (one QEMU/native-sim instance + one
# zenohd per test).
#
# `rtos_e2e` is parametrised across all 4 RTOSes in one binary;
# individual `#[rstest]` cases are routed to their platform group
# via `binary(rtos_e2e) and test(Platform__<Name>)` filtersets —
# rstest emits `platform_N_Platform__<Variant>` in each case's test
# name, which nextest's `test(...)` substring predicate matches.
#
# Phase 89.Baremetal — service/action use per-variant host ports
# (`BAREMETAL.zenohd_port + 10/20`), so they can run concurrently
# with pubsub. The basic pubsub e2e, the mixed-priority pubsub
# e2e, and the `large_msg` binary all keep port 7450 and share
# the serial `qemu-baremetal-shared` sub-group. Overall cap = 3
# (service || action || one-of-the-three-port-7450 tests).
[test-groups.qemu-baremetal]
max-threads = 3

[test-groups.qemu-baremetal-shared]
max-threads = 1

# issue #141 — the qos zephyr entry image + its baked router port (17849) are
# shared by the sink-based capability e2e and the ros2-echo interop e2e;
# serialize them so the routers never collide.
[test-groups.zephyr-qos-port]
max-threads = 1

# Phase 89.10 — slirp-isolated QEMU platforms can run the three rtos_e2e
# cases (pubsub/service/action) concurrently because (a) slirp gives each
# QEMU instance a fully isolated 10.0.2.0/24 so guest IPs can't collide
# across concurrent tests, and (b) each case targets a different host
# zenohd port (base + 0/10/20) so the host routers don't collide either.
# `max-threads = 3` caps at the three cases.
#
# Phase 89.12 #15-17 — same-variant-different-language tests (e.g., pubsub
# Rust/C/C++) used to share the SAME host zenohd port (keyed off variant
# only), forcing max-threads=1 within a variant via dedicated sub-groups.
#
# Phase 89.13 — FreeRTOS migrated to per-(variant, lang) host ports
# (`PlatformConfig::lang_stride = 100`). C gets Rust+100, C++ gets
# Rust+200, so no two same-variant tests share a port. Lifting
# `qemu-freertos-{pubsub,service,action}` to `max-threads = 3` enables
# true 9-way parallelism (3 variants × 3 languages). Other RTOS variants
# remain on `lang_stride = 0` and keep their per-variant max-threads=1
# until migrated.
[test-groups.qemu-freertos]
max-threads = 9

[test-groups.qemu-freertos-pubsub]
max-threads = 3

[test-groups.qemu-freertos-service]
max-threads = 3

[test-groups.qemu-freertos-action]
max-threads = 3

# Phase 212.O.1 — the per-Entry-pkg boot+connected gates in
# `freertos_run_plan_runtime.rs` all share the `tcp/10.0.2.2:7451` deploy locator
# (one host zenohd per test) and a QEMU MPS2-AN385 slirp instance, so they must
# run one-at-a-time.
[test-groups.qemu-freertos-entry]
max-threads = 1

# Phase 89.13 — NuttX / ThreadX-RISC-V migrated to per-(variant, lang) host
# ports (`lang_stride = 100`). Each (variant, lang) pair now owns a unique
# zenohd port, so same-variant Rust/C/C++ tests no longer need serialization.
# Outer cap of 9 = 3 variants × 3 languages.
[test-groups.qemu-nuttx]
max-threads = 9

[test-groups.qemu-nuttx-pubsub]
max-threads = 3

[test-groups.qemu-nuttx-service]
max-threads = 3

[test-groups.qemu-nuttx-action]
max-threads = 3

[test-groups.qemu-threadx-riscv]
max-threads = 9

[test-groups.qemu-threadx-riscv-pubsub]
max-threads = 3

[test-groups.qemu-threadx-riscv-service]
max-threads = 3

[test-groups.qemu-threadx-riscv-action]
max-threads = 3

# ESP32 examples are pubsub-only today (no service/action variants), so the
# per-variant port split doesn't help — keep serial until service/action
# examples land.
[test-groups.qemu-esp32]
max-threads = 1

# Phase 89.9 — ThreadX Linux is native-process + nsos-netx (NSOS offloads
# BSD sockets straight to host kernel, ignoring the legacy `interface`/
# `ip` fields), so per-case port splitting is sufficient for concurrent
# pubsub/service/action runs.
#
# Phase 89.13 — migrated to per-(variant, lang) ports (`lang_stride = 100`).
# NSOS ignores the veth interface, so language-level parallelism is safe.
[test-groups.threadx-linux]
max-threads = 9

[test-groups.threadx-linux-pubsub]
max-threads = 3

[test-groups.threadx-linux-service]
max-threads = 3

[test-groups.threadx-linux-action]
max-threads = 3

# Phase 89.Zephyr — Zephyr native_sim uses NSOS (Phase 81) which offloads BSD
# sockets to the host kernel, so per-variant host zenohd ports (base + 0/10/20)
# are sufficient to run pubsub/service/action concurrently. XRCE tests now
# also use per-(variant, lang) Agent ports (`xrce_agent_port_for` —
# 2018/2028/2038 ± 100 per language) so all 7 XRCE tests can run in parallel
# in the `qemu-zephyr-xrce` group.
#
# Phase 89.13 — migrated to per-(variant, lang) host ports
# (`ZEPHYR.lang_stride = 100`): C++ tests get +200 on top of the
# per-variant offset so Rust/C++ same-variant pairs no longer share
# a zenohd port. Unlike `rtos_e2e` (one test per (variant, lang)),
# the `zephyr` binary has MULTIPLE tests per (variant, lang) — they
# still share a single port and must stay serial WITHIN their
# (variant, lang) sub-group. Since nextest assigns one group per test,
# the specific sub-groups provide cross-slot parallelism while the
# generic `qemu-zephyr` group only handles fall-through tests.
#
# Phase 179.I — Zephyr tests no longer configure/build fixtures inside
# the test body. `get_prebuilt_zephyr_example` and the Phase 118
# `build_zephyr_*` helpers only resolve prebuilt images and fail with a
# `just zephyr build-fixtures` remedy if they are missing or stale. Keep
# per-(variant, lang) runtime groups serial because tests in each slot
# share ports, but let the non-DDS fall-through smoke/build/availability
# tests run concurrently again. The old CMake corruption remains a
# `just zephyr build-fixtures` concern, not a nextest runtime concern.
[test-groups.qemu-zephyr]
max-threads = 6

# #166 / phase-286 W1 — no longer serial. The 4 rust pubsub e2e each spin their
# own ephemeral zenohd and pass the locator to the images via
# `-testargs --nros-locator` (native_sim runtime override), so they no longer
# share a fixed baked router port and run in parallel. Capped at 4 to bound host
# load (each test boots native_sim images + a zenohd). `workspace_entry` now
# also reads the override (its ws-runtime `rust_main` prefers
# `nros_runtime_locator_override()` over the bake — phase-286 W1 follow-up), so
# it dials its own ephemeral router and falls through to the general
# `qemu-zephyr` group instead of a private serial one.
[test-groups.qemu-zephyr-pubsub-rust]
max-threads = 4

# #166 / phase-286 W1 slice 2 — parallelized. The 3 cpp pubsub e2e each spin
# their own ephemeral zenohd + pass the locator to the images via
# `-testargs --nros-locator` (ZephyrBoard::run_components reads the override), so
# they no longer share a fixed baked router port.
[test-groups.qemu-zephyr-pubsub-cpp]
max-threads = 3

# #166 / phase-286 W1 slice 4 — parallelized. The service/action e2e each spin
# their own ephemeral zenohd + pass the locator via `-testargs --nros-locator`
# (Rust `zephyr_component_main!` / C++ `ZephyrBoard::run_components` read the
# override), so they no longer share a fixed baked router port.
[test-groups.qemu-zephyr-service-rust]
max-threads = 2

[test-groups.qemu-zephyr-service-cpp]
max-threads = 2

[test-groups.qemu-zephyr-action-rust]
max-threads = 2

[test-groups.qemu-zephyr-action-cpp]
max-threads = 2

# Each XRCE test now starts its Agent on a (variant, lang)-specific
# UDP port (see `ZEPHYR.xrce_agent_port_for` in nros-tests/platform.rs
# + the matching `xrce_port` column in just/zephyr.just). With distinct
# ports per (variant, lang), the 7 XRCE tests can run in parallel.
[test-groups.qemu-zephyr-xrce]
max-threads = 7

# Zephyr Cyclone DDS native_sim tests. Each fixture now BAKES a distinct
# ROS_DOMAIN_ID per communicating role-set: build-fixtures passes
# -DCONFIG_NROS_DOMAIN_ID per (lang, variant) (domains 50..58), so a
# talker+listener / server+client pair shares one domain and unrelated sets
# differ. Cyclone derives its RTPS ports from the domain (7400 + 250*domain),
# so concurrent tests no longer collide on the old domain-0 ports. Parallel-safe;
# capped at 4 to bound host load (each native_sim Cyclone process carries
# discovery threads). Compile-time (Kconfig) — no runtime arg/env (177.37).
[test-groups.qemu-zephyr-dds]
max-threads = 4

# Phase 11W.12 — native_sim Cyclone DDS boot + pub/sub + service E2E tests.
# Previously serial: all fixtures baked CONFIG_NROS_DOMAIN_ID=0, so every
# participant bound the same RTPS ports and NSOS (no SO_REUSEADDR) aborted on
# the collision. Now build-fixtures bakes a distinct domain per (lang, variant)
# set via -DCONFIG_NROS_DOMAIN_ID (pairs share, sets differ → distinct ports),
# so they run in parallel. Capped at 4 to bound host load (177.37).
[test-groups.zephyr-native-cyclonedds]
# 177.37 bakes a distinct Cyclone domain per communicating role-set (50..58)
# so parallel pairs don't share SPDP ports (NSOS forwards no SO_REUSEADDR).
# Issue 0161: phase-180's separate CONFIG_NROS_CYCLONE_DOMAIN_ID knob had
# silently pinned every image back to domain 0 (snippet + per-example confs),
# which forced max-threads = 1 during #157; the knob now defaults to
# NROS_DOMAIN_ID and the pins are gone, so the group is parallel again.
max-threads = 4

# Phase 217.C.2 — FVP runtime smoke. The ARM `FVP_BaseR_AEMv8R` license is
# commonly node-locked + the UART telnet ports the FVP opens collide on
# parallel runs (Zephyr `cmake/emu/armfvp.cmake` passes fixed `-C
# bp.pl011_uart*.out_file=-` redirects). Keep serial.
[test-groups.zephyr-fvp]
max-threads = 1

# XRCE-DDS tests (Phase 183.7): each test starts its OWN Agent (ephemeral UDP
# port via XrceAgent::start_unique, or a per-test tempdir PTY pair via
# XrceSerialAgent) AND now assigns a per-test ROS_DOMAIN_ID so the Agent's DDS
# bridge can't cross-talk with concurrent tests. With transport + DDS domain
# both isolated, the suite runs fully parallel (no max-threads cap). The old
# max-threads=1 ("single Agent per test") was stale — it serialized to avoid a
# cross-talk that tolerant assertions were already hiding.
[test-groups.xrce]
max-threads = 9

# Host-DDS ROS 2 interop — XRCE ↔ ROS 2 *and* CycloneDDS ↔ ROS 2 share ONE
# group. Both suites run real DDS (RTPS) participants on the host's interfaces
# and isolate each test with a per-test ROS_DOMAIN_ID from the shared PID-seeded
# `unique_ros_domain_id()`. With separate per-suite groups the two RMW suites
# run *concurrently with each other*, and two PID-seeded domains can still
# collide modulo the 232-slot DDS domain space — a cross-RMW domain clash (an
# XRCE test and a Cyclone test landing on the same domain → topic/service
# cross-talk → wrong counts). One shared group bounds *total* concurrent
# host-DDS interop to max-threads (the two suites compete for the same slots),
# and the per-suite `retries` below re-roll the PID → domain on the rare
# residual collision. (zenoh ROS 2 interop is unaffected — it isolates via the
# zenoh router + keyexpr on the default domain, disjoint from 1..=232.)
[test-groups.host-dds-ros2-interop]
max-threads = 3

# ROS 2 interop tests: ros2 CLI commands with rmw_zenoh_cpp are
# heavyweight (each spawns zenoh sessions for discovery). Running in
# parallel causes resource contention and discovery timeouts. Some list/info
# helpers are still daemon-sensitive, so keep this group serial until the CLI
# paths are all no-daemon or otherwise process-local.
[test-groups.ros2-interop]
max-threads = 1

# Per-platform bindings for the QEMU / bridge-networked binaries.
# Each override assigns one binary (or one slice of rtos_e2e) to its
# matching platform group. Slow-timeout + retries stay identical to
# the former single `qemu-serial` block.

# QEMU bare-metal (MPS2-AN385).
#
# Port-7450 sharers: basic pubsub e2e, mixed-priority pubsub e2e, and
# the `large_msg` binary all keep the base port. This override comes
# BEFORE the generic `binary(emulator) or binary(large_msg)` rule so
# nextest's first-match-wins routing assigns them to the serial
# `qemu-baremetal-shared` group. Service/action use offset ports
# (7460/7470) and stay in the parallel `qemu-baremetal` group.
[[profile.default.overrides]]
filter = "(binary(emulator) and (test(rtic_pubsub_e2e) or test(mixed_priority_pubsub_e2e) or test(qemu_bsp_pubsub_e2e))) or binary(large_msg)"
test-group = "qemu-baremetal-shared"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(emulator) or binary(large_msg)"
test-group = "qemu-baremetal"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# issue #139 follow-up — the lifecycle zephyr e2e polls `ros2 lifecycle` CLIs
# (multi-second python startup per poll); solo it finishes in ~10 s but under
# a parallel suite the CLI contention pushes past the default 60 s ceiling.
[[profile.default.overrides]]
filter = "binary(lifecycle_zephyr_entry_e2e)"
slow-timeout = { period = "60s", terminate-after = 3 }

# issue #141 — see [test-groups.zephyr-qos-port].
[[profile.default.overrides]]
filter = "binary(qos_zephyr_entry_e2e) or binary(qos_zephyr_ros2_interop_e2e)"
test-group = "zephyr-qos-port"
slow-timeout = { period = "60s", terminate-after = 3 }

# Issue #34 — host-integration "compile-shape" tests shell out to cargo / nros
# to build a generated crate or workspace, so a COLD build legitimately exceeds
# the 60s default kill (period 30s × terminate-after 2). Measured: a single
# `orchestration_tiers_native` case passes in ~72s. Under the 60s limit these
# were terminated mid-compile and counted as failures — the bulk of the 31
# failures the now-honest host-integration lane surfaced. Give them headroom
# (120s × 4 = 480s) so a slow compile is not a false failure. These binaries do
# not match any earlier override, so first-match-wins routing reaches this rule.
#
# This is a STOPGAP, not the fix. The durable fix (AGENTS.md "No compilation
# inside tests") is to convert each compile-in-test into a build-stage fixture
# (examples/fixtures.toml) that the test merely asserts exists — see the
# `stm32f4_rtic_main_macro` conversion. As each binary is converted it becomes
# fast and is dropped from this filter (phase216_b already converted + removed);
# the rule shrinks to empty when the last compile-in-test is gone.
[[profile.default.overrides]]
# NOTE: as each compile-in-test binary is CONVERTED to consume a build-stage
# fixture (issue 0034 — it becomes a fast artifact check, no in-test cargo), it
# is removed from this list; it no longer needs the headroom AND nextest errors
# on a `binary()` that matches nothing. Converted so far: phase216_b →
# stm32f4_rtic_main_macro, phase212_n_entry_poc_runs → native_entry_poc_boot.
filter = """
  binary(native_orchestration_misuse) \
  or binary(native_main_macro_misuse) \
"""
slow-timeout = { period = "120s", terminate-after = 4 }

# Phase 169.4 — bare-metal Rust DDS E2E binary removed.

# Phase 89.12 #15-17 — Per-variant serialization for rtos_e2e. These overrides
# MUST come before the generic per-platform rules so nextest's first-match-wins
# routing picks them up first. The three pubsub/service/action language cases
# share a zenohd port (keyed off variant only), so same-variant tests cannot run
# concurrently without `ZenohRouter::start_on` killing each other's router.

# FreeRTOS per-variant — must come before qemu-freertos.
[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_pubsub_e2e::platform_1_Platform__Freertos)"
test-group = "qemu-freertos-pubsub"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_service_e2e::platform_1_Platform__Freertos)"
test-group = "qemu-freertos-service"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_action_e2e::platform_1_Platform__Freertos)"
test-group = "qemu-freertos-action"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Phase 212.O.1 — per-Entry-pkg boot+connected gates: serialize (shared port 7451
# + QEMU slirp) and give cold release-build + QEMU-boot + connect headroom.
[[profile.default.overrides]]
filter = "binary(freertos_run_plan_runtime)"
test-group = "qemu-freertos-entry"
slow-timeout = { period = "180s", terminate-after = 4 }
retries = 1

# NuttX per-variant — must come before qemu-nuttx.
[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_pubsub_e2e::platform_2_Platform__Nuttx)"
test-group = "qemu-nuttx-pubsub"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_service_e2e::platform_2_Platform__Nuttx)"
test-group = "qemu-nuttx-service"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_action_e2e::platform_2_Platform__Nuttx)"
test-group = "qemu-nuttx-action"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX-RISC-V per-variant — must come before qemu-threadx-riscv.
[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_pubsub_e2e::platform_4_Platform__ThreadxRiscv64)"
test-group = "qemu-threadx-riscv-pubsub"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_service_e2e::platform_4_Platform__ThreadxRiscv64)"
test-group = "qemu-threadx-riscv-service"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_action_e2e::platform_4_Platform__ThreadxRiscv64)"
test-group = "qemu-threadx-riscv-action"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX-Linux per-variant — must come before threadx-linux.
[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_pubsub_e2e::platform_3_Platform__ThreadxLinux)"
test-group = "threadx-linux-pubsub"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_service_e2e::platform_3_Platform__ThreadxLinux)"
test-group = "threadx-linux-service"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(rtos_e2e) and test(rtos_action_e2e::platform_3_Platform__ThreadxLinux)"
test-group = "threadx-linux-action"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# FreeRTOS QEMU (MPS2-AN385 + FreeRTOS kernel) — port 7451.
[[profile.default.overrides]]
filter = "binary(freertos_qemu) or (binary(rtos_e2e) and test(Platform__Freertos))"
test-group = "qemu-freertos"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# NuttX QEMU — port 7452. Includes the entry-image e2e binaries
# (rust_nuttx_entry_e2e / c_nuttx_entry_e2e, issues #130/0152): they boot a
# NuttX arm-virt guest that dials the SAME slirp port 7452 as this group —
# they must serialize with it, and the default 60 s kill is shorter than a
# NuttX QEMU cold boot + zenoh discovery.
[[profile.default.overrides]]
filter = "binary(nuttx_qemu) or binary(rust_nuttx_entry_e2e) or binary(c_nuttx_entry_e2e) or (binary(rtos_e2e) and test(Platform__Nuttx))"
test-group = "qemu-nuttx"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX QEMU RISC-V — port 7453. Match only the RV64 rtos_e2e
# slice, not `ThreadxLinux`, by using the trailing-underscore-free
# `Platform__ThreadxRiscv64` marker.
[[profile.default.overrides]]
filter = "binary(threadx_riscv64_qemu) or (binary(rtos_e2e) and test(Platform__ThreadxRiscv64))"
test-group = "qemu-threadx-riscv"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ESP32 QEMU (Espressif RISC-V fork) — port 7454.
[[profile.default.overrides]]
filter = "binary(esp32_emulator)"
test-group = "qemu-esp32"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# ThreadX Linux sim (veth bridge) — port 7455.
[[profile.default.overrides]]
filter = "binary(threadx_linux) or (binary(rtos_e2e) and test(Platform__ThreadxLinux))"
test-group = "threadx-linux"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Zephyr native_sim (NSOS, Phase 81) — base port 7456, lang_stride = 100.
#
# XRCE tests within the zephyr binary share a hardcoded Agent port (2018,
# baked into firmware via Kconfig), so they must stay serial. This override
# comes BEFORE the generic `binary(zephyr)` rule so nextest's first-match-wins
# routing assigns them to `qemu-zephyr-xrce` instead of the parallel group.
[[profile.default.overrides]]
filter = "binary(zephyr) and test(xrce)"
test-group = "qemu-zephyr-xrce"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

# Phase 89.13 — Zephyr per-(variant, lang) sub-groups. Ordered most-specific
# first so nextest's first-match-wins picks the right slot. C++ E2E tests
# must match BEFORE the Rust patterns (the `cpp` substring bucket catches
# them), and variant-specific matches must precede the pubsub fall-through.
[[profile.default.overrides]]
filter = "binary(zephyr) and test(cpp_service_server_to_client)"
test-group = "qemu-zephyr-service-cpp"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and test(cpp_action_server_to_client)"
test-group = "qemu-zephyr-action-cpp"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and (test(cpp_talker_to_listener_e2e) or test(cpp_talker_to_native_listener) or test(native_talker_to_zephyr_cpp_listener))"
test-group = "qemu-zephyr-pubsub-cpp"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and (test(native_server_zephyr_client) or test(zephyr_server_native_client))"
test-group = "qemu-zephyr-service-rust"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.default.overrides]]
filter = "binary(zephyr) and test(zephyr_action_e2e)"
