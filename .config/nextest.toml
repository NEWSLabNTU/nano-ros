# phase-295 W6.c — the ROS 2 interop family (rmw_interop / cyclonedds_ros2_interop
# / demo_nodes_cpp_interop / ros2_lifecycle_interop) consolidated into
# binary(interop_e2e). Routing splits by RMW: the cyclone cells run real DDS
# (RTPS) participants and share the 232-slot domain space, so they join
# host-dds-ros2-interop (this override MUST precede the generic one — first-match
# wins); the zenoh + lifecycle cells drive the singleton ros2 daemon and stay in
# the serial ros2-interop group.
[[profile.default.overrides]]
filter = "binary(interop_e2e) and test(cyclone)"
test-group = "host-dds-ros2-interop"
slow-timeout = { period = "60s", terminate-after = 3 }
