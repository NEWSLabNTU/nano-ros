# Phase 217.C.2 — FVP runtime smoke. The test drives `just zephyr
# run-fvp-aemv8r-cyclonedds` end-to-end (cold FVP boot ~30 s + Cyclone DDS
# discovery + Published: line) under a 120 s wall-clock budget. Allow up to
# 180 s × 2 terminate-after for the cold-cache first run; skip cleanly when
# ARM FVP isn't installed.
[[profile.default.overrides]]
filter = "binary(fvp_runtime)"
test-group = "zephyr-fvp"
slow-timeout = { period = "180s", terminate-after = 2 }
retries = 1

# Phase 217.D.3 — Rust sibling smoke on the same FVP. Boots the Rust
# Component-pkg ELF (no `Published:` assertion yet — pending Phase
# 212.L.7 self-pkg `rust_main` codegen). Same group / timeout as C.1
# so the two tests don't race the single FVP license seat.
[[profile.default.overrides]]
filter = "binary(fvp_runtime_rust)"
test-group = "zephyr-fvp"
slow-timeout = { period = "180s", terminate-after = 2 }
retries = 1

# Phase 215.G — FVP smoke through the board-crate IMPORT surface. Drives
# `just zephyr run-fvp-board-import` (the minimal ASI-shaped fixture) and
# scrapes the `nros: smoke ok` UART line. Same single-seat FVP license +
# UART-port constraints as 217.C/D, so share the serial `zephyr-fvp`
# group + cold-boot timeout; skips cleanly when ARM FVP isn't installed.
[[profile.default.overrides]]
filter = "binary(fvp_smoke)"
test-group = "zephyr-fvp"
slow-timeout = { period = "180s", terminate-after = 2 }
retries = 1

# Phase 11W.12 — serialize the native_sim Cyclone DDS boot + pub/sub
# E2E tests (in phase_118_collapse). They spawn host native_sim
# processes that bind the fixed SPDP multicast port; concurrent runs
# collide (NSOS doesn't forward SO_REUSEADDR). The `*_variant_exists`
# tests only check file presence and stay in the parallel default.
[[profile.default.overrides]]
filter = "binary(phase_118_collapse) and test(cyclonedds) and (test(_boot) or test(_e2e))"
test-group = "zephyr-native-cyclonedds"
slow-timeout = { period = "120s", terminate-after = 3 }
# Phase 177.37 baked distinct per-role-set domains so these run parallel
# (max-threads = 4). No retries needed: 177.39 root-fixed the Rust Cyclone
# service e2e's under-load flake (its 5 s call budget was too tight for the
# slow native_sim discovery/match; raised to 15 s in the example to match the
# C client's blocking tolerance) — verified 3/3 parallel runs with --retries 0.

[[profile.default.overrides]]
filter = "binary(native_api)"
# Phase 179.G: native C/C++ API tests consume prebuilt per-RMW CMake
# fixture dirs (`build-zenoh`, `build-xrce`, `build-cyclonedds`) instead
# of compiling in the test body, so they no longer need the old
# single-thread native_api group. Keep the longer timeout for runtime
# startup/E2E cases under host load.
slow-timeout = { period = "60s", terminate-after = 5 }

# Phase 89.14 follow-up: `nano2nano` tests still exercise slower native
# fixture variants (rtic-action-server/client, link-tls talker, etc.) and
# can blow past 60 s under load.
[[profile.default.overrides]]
filter = "binary(nano2nano)"
slow-timeout = { period = "60s", terminate-after = 5 }

# Phase 169.4 — `binary(dds_api)` removed (test deleted).

[[profile.default.overrides]]
filter = "binary(xrce)"
test-group = "xrce"
slow-timeout = { period = "60s", terminate-after = 3 }
# Phase 177/G6 — same retry budget as the other process-heavy E2E groups
# (rtos_e2e/emulator/large_msg). The xrce group now runs parallel (Phase
# 183.7), but these tests still share the host with the wide QEMU groups, so
# a transient CPU-starvation timeout (the in-test wait_for_output_pattern
# expiring) was a hard fail with 0 retries. retries=2 recovers it.
retries = 2

[[profile.default.overrides]]
filter = "binary(c_xrce_api)"
